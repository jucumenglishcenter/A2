<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grammar Summary — Comparatives: Patterns | A2 | JUCUM</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Fredoka:wght@400;500;600;700&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
:root{
--bg:#FAFAF6;--card:#fff;--text:#2A2A2A;--text-soft:#777;--border:#E8E5DC;
--shadow:0 3px 16px rgba(0,0,0,.06);--radius:14px;
--lp:#4CAF50;--ld:#1B5E20;--ll:#E8F5E9;--lm:#C8E6C9;
--lg:linear-gradient(135deg,#388E3C,#4CAF50);--lglow:rgba(76,175,80,.15);
--badge-text:#1A3D1C;
--subj:#1565C0;--subj-bg:#E3F2FD;
--verb:#E53935;--verb-bg:#FFEBEE;
--comp:#00897B;--comp-bg:#E0F2F1;
--neg:#AD1457;--neg-bg:#FCE4EC;
--quest:#7B1FA2;--quest-bg:#F3E5F5;
--ok:#2E7D32;--ok-bg:#E8F5E9;
--err:#C62828;--err-bg:#FFEBEE;
--note-bg:#FFFDE7;--note-border:#FBC02D;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;padding:1.5rem 1rem;-webkit-font-smoothing:antialiased}
.container{max-width:780px;margin:0 auto}

.level-header{text-align:center;padding:2rem;border-radius:20px;color:#fff;position:relative;overflow:hidden;margin-bottom:1.2rem;background:var(--lg)}
.level-header::before{content:'';position:absolute;top:-40%;right:-15%;width:250px;height:250px;background:rgba(255,255,255,.1);border-radius:50%}
.level-header h1{font-family:'Fredoka',sans-serif;font-size:1.8rem;font-weight:600;position:relative;z-index:1}
.level-header .module-name{font-family:'Fredoka',sans-serif;font-size:1.1rem;font-weight:500;opacity:.95;position:relative;z-index:1;margin-top:.2rem}
.level-header .subtitle{opacity:.85;font-size:.85rem;position:relative;z-index:1;margin-top:.15rem}
.level-badge{display:inline-flex;align-items:center;gap:6px;font-size:.7rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;background:var(--ll);color:var(--badge-text);padding:4px 12px;border-radius:20px;border:1.5px solid var(--lm);margin-bottom:.8rem}

.step-tabs{display:flex;gap:.35rem;margin-bottom:1rem;flex-wrap:wrap}
.step-tab{padding:.45rem .85rem;border-radius:8px;font-size:.78rem;font-weight:700;cursor:pointer;border:2px solid var(--border);background:var(--card);transition:.2s;font-family:'Nunito',sans-serif}
.step-tab:hover{background:var(--ll)}
.step-tab.active{background:var(--ll);border-color:var(--lp);color:var(--ld)}
.step-tab.done{background:var(--ok-bg);border-color:var(--ok);color:var(--ok)}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.6rem;margin-bottom:1.2rem;box-shadow:var(--shadow);border-top:3.5px solid var(--lp);display:none}
.card.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.section-label{display:flex;align-items:center;gap:.5rem;font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--ld);margin-bottom:.3rem}
.section-label::before{content:'';width:20px;height:3px;background:var(--lp);border-radius:2px}
.section-title{font-family:'Fredoka',sans-serif;font-size:1.25rem;font-weight:600;margin-bottom:.1rem}
.section-desc{font-size:.85rem;color:var(--text-soft);margin-bottom:1rem}

.g-subj{background:var(--subj-bg);color:var(--subj);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--subj)}
.g-verb{background:var(--verb-bg);color:var(--verb);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--verb)}
.g-comp{background:var(--comp-bg);color:var(--comp);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--comp)}
.g-neg{background:var(--neg-bg);color:var(--neg);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--neg)}
.g-quest{background:var(--quest-bg);color:var(--quest);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--quest)}

.g-table{width:100%;border-collapse:separate;border-spacing:0;margin:.8rem 0;border-radius:10px;overflow:hidden;font-size:.83rem;border:1px solid var(--border)}
.g-table th{background:var(--lg);color:#fff;padding:.65rem .6rem;font-size:.7rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
.g-table td{padding:.6rem;border-bottom:1px solid #f0f0f0;vertical-align:middle}
.g-table tr:nth-child(even) td{background:var(--ll)}
.g-table tr:last-child td{border-bottom:none}

.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin:.8rem 0}
.compare-card{padding:1rem;border-radius:12px;text-align:center}
.compare-card.esp{background:var(--ll);border:2px solid var(--lm)}
.compare-card.eng{background:var(--subj-bg);border:2px solid #90CAF9}
.compare-card h4{font-family:'Fredoka',sans-serif;font-size:.85rem;margin-bottom:.5rem}
.compare-card.esp h4{color:var(--ld)}
.compare-card.eng h4{color:var(--subj)}
.compare-card ul{list-style:none;font-size:.82rem;color:var(--text-soft)}
.compare-card li{padding:2px 0}

.formula-box{background:var(--note-bg);border:2px solid var(--note-border);border-radius:12px;padding:1rem;margin:.8rem 0;text-align:center;font-family:'Fredoka',sans-serif;font-size:.95rem;color:var(--ld);line-height:1.8}
.tip-card{background:var(--ll);border-radius:10px;padding:.8rem 1rem;margin:.5rem 0;font-size:.83rem;border-left:3px solid var(--lp)}
.tip-card strong{color:var(--ld)}
.alert-card{background:var(--err-bg);border:2px solid #EF5350;border-radius:10px;padding:.8rem 1rem;margin:.8rem 0}
.alert-card .atitle{font-family:'Fredoka',sans-serif;color:var(--err);font-size:.82rem;margin-bottom:.3rem}
.alert-card p{font-size:.82rem;color:var(--text-soft);line-height:1.5}

.ex-row{display:flex;align-items:flex-start;gap:.6rem;padding:.6rem .8rem;border-radius:10px;margin:.4rem 0;font-size:.88rem;transition:background .2s}
.ex-row:hover{background:var(--lglow)}
.ex-row .icon{font-size:1.2rem;flex-shrink:0;line-height:1.4}
.ex-row .en{font-weight:700;color:var(--text)}
.ex-row .es{font-family:'Lora',serif;font-style:italic;font-size:.82rem;color:var(--text-soft);margin-top:1px}
.ex-right{border-left:3px solid var(--ok);background:var(--ok-bg)}
.ex-wrong{border-left:3px solid var(--err);background:var(--err-bg)}

.conj-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem;margin:.8rem 0}
.conj-item{padding:.6rem;border-radius:10px;text-align:center;background:var(--card);border:1.5px solid var(--border)}
.conj-item .pron{font-size:.75rem;color:var(--subj);font-weight:800}
.conj-item .vrb{font-family:'Fredoka',sans-serif;font-size:1.05rem;color:var(--verb)}
.conj-item .meaning{font-size:.65rem;color:var(--text-soft)}

.ex-section{margin-top:1.2rem;padding-top:1rem;border-top:2px dashed var(--lm)}
.ex-section h3{font-family:'Fredoka',sans-serif;color:var(--ld);font-size:.9rem;margin-bottom:.8rem}
.exercise{background:#fafafa;border-radius:12px;padding:1rem;margin-bottom:.7rem;border:2px solid #eee;transition:.2s}
.exercise.correct{border-color:var(--ok);background:var(--ok-bg)}
.exercise.incorrect{border-color:var(--err);background:var(--err-bg)}
.exercise-q{font-size:.88rem;margin-bottom:.7rem;line-height:1.4}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:.4rem}
.opt-btn{padding:.65rem .5rem;border:2px solid #e0e0e0;border-radius:10px;background:var(--card);color:var(--text);font-size:.83rem;font-weight:600;cursor:pointer;transition:.15s;font-family:'Nunito',sans-serif;text-align:left}
.opt-btn:hover:not(:disabled){border-color:var(--lp);background:var(--ll)}
.opt-btn:disabled{cursor:not-allowed;opacity:.85}
.opt-btn.sel-ok{background:var(--ok);color:#fff;border-color:var(--ok)}
.opt-btn.sel-bad{background:var(--err);color:#fff;border-color:var(--err)}
.opt-btn.show-ok{background:var(--ok);color:#fff;border-color:var(--ok)}
.fb{margin-top:.7rem;padding:0;border-radius:12px;font-size:.82rem;display:none;line-height:1.6;overflow:hidden}
.fb.show{display:block;animation:fbSlide .35s ease}
@keyframes fbSlide{from{opacity:0;max-height:0;transform:translateY(-8px)}to{opacity:1;max-height:500px;transform:translateY(0)}}
.fb-header{display:flex;align-items:center;gap:.5rem;padding:.7rem 1rem;font-family:'Fredoka',sans-serif;font-size:.85rem;font-weight:600}
.fb.fb-ok .fb-header{background:#C8E6C9;color:var(--ok)}
.fb.fb-bad .fb-header{background:#FFCDD2;color:var(--err)}
.fb-header .fb-icon{font-size:1.2rem}
.fb-body{padding:.8rem 1rem}
.fb.fb-ok .fb-body{background:var(--ok-bg)}
.fb.fb-bad .fb-body{background:var(--err-bg)}
.fb-row{display:flex;align-items:flex-start;gap:.5rem;margin-bottom:.4rem}
.fb-row:last-child{margin-bottom:0}
.fb-row .fb-dot{font-size:.9rem;flex-shrink:0;margin-top:1px}
.fb-row .fb-text{flex:1}
.fb-row .fb-text strong{color:var(--text)}
.fb-correct-answer{color:var(--ok);font-weight:700}
.fb-wrong-reason{color:var(--err);font-weight:600}
.fb-example{display:inline-flex;align-items:center;gap:.3rem;margin-top:.3rem;padding:3px 10px;border-radius:6px;font-size:.78rem;font-weight:700}
.fb.fb-ok .fb-example{background:#A5D6A7;color:#1B5E20}
.fb.fb-bad .fb-example{background:#EF9A9A;color:#B71C1C}
.fb-tip{margin-top:.5rem;padding:.5rem .7rem;border-radius:8px;background:var(--note-bg);border:1px solid var(--note-border);font-size:.76rem;color:#6D4C00}
.fb-tip strong{color:var(--ld)}
.score-bar{text-align:center;padding:.8rem;background:var(--ll);border-radius:10px;margin-top:.8rem;border:1px solid var(--lm)}
.score-bar .num{font-family:'Fredoka',sans-serif;font-size:1.4rem;color:var(--ld)}
.score-bar .lbl{font-size:.7rem;color:var(--lp);font-weight:700;text-transform:uppercase;letter-spacing:1px}

.summary-final{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.6rem;margin-top:1rem;box-shadow:var(--shadow);border-top:3.5px solid var(--ok);display:none}
.summary-final.show{display:block}
.summary-final h3{font-family:'Fredoka',sans-serif;color:var(--ok);margin-bottom:.6rem}
.summary-final ul{list-style:none}
.summary-final li{padding:4px 0 4px 22px;position:relative;font-size:.83rem;color:var(--text-soft);line-height:1.6}
.summary-final li:before{content:"\2713";position:absolute;left:0;color:var(--lp);font-weight:700}
.summary-final .total-score{margin-top:1rem;padding:.8rem;background:var(--ll);border-radius:10px;text-align:center;font-family:'Fredoka',sans-serif}
.summary-final .total-score .big{font-size:1.6rem;color:var(--ld)}
.summary-final .total-score .small{font-size:.8rem;color:var(--text-soft);font-weight:600}

@media(max-width:600px){.level-header h1{font-size:1.4rem}.card{padding:1.2rem}.compare-grid,.conj-grid{grid-template-columns:1fr}.opts{grid-template-columns:1fr}}
.illus{display:flex;justify-content:center;align-items:center;gap:.5rem;margin:.4rem 0 1rem;background:linear-gradient(135deg,#E8F5E9,#C8E6C9);border:2px dashed var(--lm);border-radius:16px;padding:1rem}.illus .big{font-size:3.2rem;line-height:1}.illus .big.sm{font-size:2.4rem}
.info-illus{display:flex;align-items:center;gap:.8rem;background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:.8rem 1rem;margin:.6rem 0}.info-illus .emo{font-size:2.4rem;line-height:1;flex-shrink:0}.info-illus .txt{font-size:.85rem;line-height:1.55}.info-illus .txt b{color:var(--ld)}
.eg-card{position:relative;display:flex;align-items:center;gap:.7rem;background:#E3F2FD;border:2px solid #64B5F6;border-radius:12px;padding:1rem .9rem .9rem;margin:.4rem 0 1.1rem}.eg-card .eg-emo{font-size:2.3rem;line-height:1;flex-shrink:0}.eg-card .eg-body .en{font-weight:800;color:#0D47A1;font-size:.95rem;line-height:1.4}.eg-card .eg-body .es{font-family:'Lora',serif;font-style:italic;color:#1565C0;font-size:.82rem;margin-top:3px}.eg-card::before{content:'\1F4DD EJEMPLO';position:absolute;top:-11px;left:14px;background:#1565C0;color:#fff;font-family:'Fredoka',sans-serif;font-size:.62rem;font-weight:600;letter-spacing:.06em;padding:2px 9px;border-radius:20px}.eg-card.ok{background:#E8F5E9;border-color:#81C784}.eg-card.ok .en{color:#1B5E20}.eg-card.ok .es{color:#2E7D32}.eg-card.ok::before{content:'\2705 BIEN';background:#2E7D32}.eg-card.bad{background:#FFEBEE;border-color:#EF9A9A}.eg-card.bad .en{color:#B71C1C}.eg-card.bad .es{color:#C62828}.eg-card.bad::before{content:'\274C MAL';background:#C62828}
.why-box{background:#EDF7ED;border:1.5px solid #A5D6A7;border-left:4px solid var(--ok);border-radius:10px;padding:.7rem .9rem;margin:.7rem 0;font-size:.83rem;line-height:1.6}.why-box .wt{font-family:'Fredoka',sans-serif;color:var(--ok);font-size:.8rem;display:block;margin-bottom:.2rem}
.note-box{background:var(--note-bg);border:1.5px solid var(--note-border);border-left:4px solid var(--lp);border-radius:10px;padding:.7rem .9rem;margin:.7rem 0;font-size:.83rem;line-height:1.6}.note-box .nt{font-family:'Fredoka',sans-serif;color:var(--ld);font-size:.8rem;display:block;margin-bottom:.2rem}
.art-hero{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin:.8rem 0}.art-hero.three{grid-template-columns:1fr 1fr 1fr}.art-box{background:#fff;border:2px solid var(--lm);border-radius:16px;padding:1rem .9rem;text-align:center;box-shadow:0 2px 10px rgba(76,175,80,.10)}.art-box .word{font-family:'Fredoka',sans-serif;font-size:1.9rem;font-weight:700;color:var(--ld);line-height:1.1;background:linear-gradient(135deg,#E8F5E9,#A5D6A7);border-radius:12px;padding:.5rem .4rem;margin-bottom:.5rem}.art-box.eng .word{background:linear-gradient(135deg,#E3F2FD,#90CAF9);color:#0D47A1}.art-box .role{font-family:'Fredoka',sans-serif;font-size:.78rem;color:var(--lp);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.35rem}.art-box.eng .role{color:#1976D2}.art-box .desc{font-size:.8rem;color:var(--text-soft);line-height:1.5}
@media(max-width:600px){.art-hero,.art-hero.three{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
<div class="level-header">
<span class="level-badge">💚 A2 · Module 7</span>
<h1>📝 Grammar Summary</h1>
<div class="module-name">⚖️ Comparatives — Patterns (as...as / the...the...)</div>
<p class="subtitle">A2 · Module 7 · 5 pasos × 5 ejercicios</p>
</div>
<div class="step-tabs" id="stepTabs"></div>
<div id="cardArea"></div>
<div class="summary-final" id="summaryFinal">
<h3>🎓 Resumen del Tema</h3>
<ul id="summaryList"></ul>
<div class="total-score" id="totalScore"></div>
</div>
</div>
<script>

let curStep=0;const scores={};const answered={};
const DATA={"summary": ["<b>AS...AS:</b> igualdad — \"She is <b>as tall as</b> her sister\" (tan alta como)", "<b>NOT AS...AS:</b> menor grado — \"He is <b>not as fast as</b> me\" (no tan rápido como)", "<b>THE + comp + ..., THE + comp + ...:</b> dos cosas que cambian juntas — \"<b>The more you study, the better you learn</b>\"", "<b>Comparativos dobles:</b> \"<b>more and more</b> tired\", \"<b>bigger and bigger</b>\" (cambio progresivo)", "<b>Twice / three times as...as:</b> proporciones — \"twice as expensive as\"", "<b>Less...than:</b> menor grado — \"less interesting than\" (alternativa a not as...as)", "Las tres fórmulas: as...as (=), not as...as (≠), the...the... (proporcional)"], "steps": [{"icon": "🇪🇸", "title": "Repaso en Español", "html": "<div class=\"section-label\">Paso 1</div><div class=\"section-title\">Paso 1: 🇪🇸 Repaso en Español</div><div class=\"illus\"><span class=\"big\">⚖️</span><span class=\"big\">📈</span><span class=\"big\">🔄</span></div><div class=\"section-desc\">Comparar es decir si dos cosas son <b>iguales</b>, si una es <b>menos</b> que otra, o cómo <b>cambian juntas</b>. Ya haces esto en español todos los días — solo vamos a ponerle nombre a cada patrón.</div><div class=\"section-label\">Los 3 patrones en grande</div><div class=\"art-hero three\"><div class=\"art-box\"><div class=\"word\">tan…como</div><div class=\"role\">Igualdad</div><div class=\"desc\">Las dos cosas son iguales: <i>tan alto como su papá</i>.</div></div><div class=\"art-box\"><div class=\"word\">menos…que</div><div class=\"role\">Inferioridad</div><div class=\"desc\">Una es menos que la otra: <i>menos caro que el otro</i>.</div></div><div class=\"art-box\"><div class=\"word\">cuanto+…más+</div><div class=\"role\">Proporcional</div><div class=\"desc\">Dos cosas cambian juntas: <i>cuanto más estudias, más aprendes</i>.</div></div></div><div class=\"info-illus\"><span class=\"emo\">⚖️</span><span class=\"txt\"><b>Igualdad.</b> Decimos que dos cosas miden, pesan o valen lo mismo en una cualidad. En español: <b>tan</b> + adjetivo + <b>como</b>.</span></div><div class=\"eg-card\"><span class=\"eg-emo\">👭</span><div class=\"eg-body\"><div class=\"en\">María es <b>tan</b> alta <b>como</b> Juana.</div><div class=\"es\">Las dos miden lo mismo → As tall as.</div></div></div><div class=\"info-illus\"><span class=\"emo\">📉</span><span class=\"txt\"><b>Inferioridad.</b> Una cosa tiene menos de una cualidad que otra. En español: <b>no tan…como</b> o <b>menos…que</b>.</span></div><div class=\"eg-card\"><span class=\"eg-emo\">🏃</span><div class=\"eg-body\"><div class=\"en\">Carlos <b>no</b> es <b>tan</b> rápido <b>como</b> Pedro.</div><div class=\"es\">Carlos es más lento → Not as fast as.</div></div></div><div class=\"info-illus\"><span class=\"emo\">🔄</span><span class=\"txt\"><b>Proporcional.</b> Dos cambios avanzan al mismo tiempo, ligados. En español: <b>cuanto más…, más…</b></span></div><div class=\"eg-card\"><span class=\"eg-emo\">🎸</span><div class=\"eg-body\"><div class=\"en\"><b>Cuanto más</b> practicas, <b>mejor</b> tocas.</div><div class=\"es\">Dos cosas suben juntas → The more…, the better…</div></div></div><div class=\"why-box\"><span class=\"wt\">💡 ¿Por qué importa?</span>Estos tres patrones existen <b>igual</b> en inglés. Si ya los entiendes en español, solo te falta cambiar las palabras: <b>as…as</b>, <b>not as…as / less…than</b>, y <b>the… the…</b></div>", "exercises": [{"q": "\"Tan alto como\" en español expresa:", "a": "a", "o": ["Igualdad", "Diferencia"], "fc": "\"Tan...como\" indica que las dos cosas son IGUALES en esa cualidad.", "fi": "Para diferencia usaríamos \"más...que\" o \"menos...que\".", "ex": "Tan alto como su papá → As tall as his dad", "tip": "Tan...como = igualdad"}, {"q": "\"No tan rápido como tú\" significa:", "a": "b", "o": ["Más rápido que tú", "Menos rápido que tú"], "fc": "\"No tan rápido como tú\" = soy MENOS rápido que tú.", "fi": "Si fuera más rápido diríamos \"más rápido que tú\".", "ex": "No tan rápido como tú → Not as fast as you", "tip": "No tan...como = inferioridad"}, {"q": "\"Cuanto más estudias, más aprendes\" — ¿cuántos cambios?", "a": "a", "o": ["Dos, ligados (estudio → aprendizaje)", "Solo uno (estudiar)"], "fc": "Hay DOS cambios que avanzan juntos: más estudio → más aprendizaje.", "fi": "No es solo uno; ambos cambian de manera ligada.", "ex": "The more you study, the more you learn", "tip": "Cuanto más..., más... = the...the..."}, {"q": "\"Cada vez más cansado\" indica:", "a": "b", "o": ["Cantidad fija de cansancio", "Cansancio que aumenta"], "fc": "\"Cada vez más\" = aumento progresivo en el tiempo.", "fi": "No es fijo; describe un cambio creciente.", "ex": "Cada vez más cansado → More and more tired", "tip": "Cada vez más = more and more"}, {"q": "\"Es el doble de caro\" expresa:", "a": "b", "o": ["Una igualdad", "Una proporción exacta"], "fc": "\"El doble de\" = proporción exacta: cuesta 2 veces lo que otra cosa.", "fi": "No es igualdad; es una diferencia cuantificada (proporción).", "ex": "El doble de caro → Twice as expensive", "tip": "El doble = twice as...as"}]}, {"icon": "🤝", "title": "Similitudes", "html": "<div class=\"section-label\">Paso 2</div><div class=\"section-title\">Paso 2: 🤝 Similitudes ESP ↔ ENG</div><div class=\"illus\"><span class=\"big\">🇪🇸</span><span class=\"big sm\">➡️</span><span class=\"big\">🇬🇧</span></div><div class=\"section-desc\">El mapeo es directo: cada patrón español tiene su gemelo en inglés. Same logic, same order — only the words change.</div><table class=\"g-table\"><tr><th>Patrón</th><th>🇪🇸 Español</th><th>🇬🇧 English</th></tr><tr><td>Igualdad</td><td><b>tan</b> alto <b>como</b></td><td><span class=\"g-comp\">as</span> tall <span class=\"g-comp\">as</span></td></tr><tr><td>Inferioridad</td><td><b>no tan</b> rápido <b>como</b></td><td><span class=\"g-neg\">not as</span> fast <span class=\"g-neg\">as</span></td></tr><tr><td>Inferioridad alt.</td><td><b>menos</b> caro <b>que</b></td><td><span class=\"g-neg\">less</span> expensive <span class=\"g-neg\">than</span></td></tr><tr><td>Proporcional</td><td><b>cuanto más</b>…, <b>más</b>…</td><td><span class=\"g-quest\">the more</span>…, <span class=\"g-quest\">the more</span>…</td></tr><tr><td>Cambio progresivo</td><td><b>cada vez más</b> cansado</td><td><span class=\"g-verb\">more and more</span> tired</td></tr><tr><td>Proporción</td><td>el <b>doble de</b> caro</td><td><span class=\"g-comp\">twice as</span> expensive <span class=\"g-comp\">as</span></td></tr></table><div class=\"info-illus\"><span class=\"emo\">🔁</span><span class=\"txt\"><b>Mismo orden, mismo molde.</b> El adjetivo va <b>en medio</b> en los dos idiomas: <i>tan __ como</i> = <i>as __ as</i>.</span></div><div class=\"eg-card ok\"><span class=\"eg-emo\">⚖️</span><div class=\"eg-body\"><div class=\"en\">She is <b>as tall as</b> her sister.</div><div class=\"es\">Es tan alta como su hermana. (igualdad)</div></div></div><div class=\"info-illus\"><span class=\"emo\">📉</span><span class=\"txt\"><b>Dos formas para \"menos\".</b> Igual que en español tienes <i>no tan…como</i> y <i>menos…que</i>, en inglés tienes <b>not as…as</b> y <b>less…than</b>.</span></div><div class=\"eg-card ok\"><span class=\"eg-emo\">💰</span><div class=\"eg-body\"><div class=\"en\">This phone is <b>less expensive than</b> that one.</div><div class=\"es\">Este teléfono es menos caro que ese.</div></div></div><div class=\"info-illus\"><span class=\"emo\">🔄</span><span class=\"txt\"><b>El patrón proporcional.</b> <i>Cuanto más…, más…</i> se convierte en <b>the more…, the more…</b> — con \"the\" en las dos partes.</span></div><div class=\"eg-card ok\"><span class=\"eg-emo\">📚</span><div class=\"eg-body\"><div class=\"en\"><b>The more</b> you practice, <b>the better</b> you become.</div><div class=\"es\">Cuanto más practicas, mejor te vuelves.</div></div></div><div class=\"why-box\"><span class=\"wt\">💡 Key similarity</span>If you master <i>tan…como</i>, <i>menos…que</i> and <i>cuanto más…más…</i> in Spanish, you already understand the logic. Just memorize the words: <b>as</b>, <b>not as / less</b>, <b>the</b>.</div>", "exercises": [{"q": "\"María is ___ tall ___ Juana.\" (igualdad)", "a": "a", "o": ["as / as", "not as / as"], "fc": "Igualdad = <b>as ... as</b>: \"as tall as\".", "fi": "\"Not as...as\" indicaría inferioridad, no igualdad.", "ex": "María is as tall as Juana → Es tan alta como Juana", "tip": "Igualdad → as + adj + as"}, {"q": "\"This phone is ___ expensive ___ that one.\" (no tan caro)", "a": "b", "o": ["as / as", "not as / as"], "fc": "Inferioridad = <b>not as ... as</b>: \"not as expensive as\".", "fi": "\"As / as\" sería igualdad (mismo precio).", "ex": "Not as expensive as that one → No tan caro como ese", "tip": "Inferioridad → not as...as"}, {"q": "\"___ you practice, ___ you become.\"", "a": "a", "o": ["The more / the better", "More / better"], "fc": "Patrón proporcional: <b>The more ... the better</b>.", "fi": "\"More / better\" sin \"the\" no es la estructura correcta.", "ex": "The more you practice, the better you become → Cuanto más practicas, mejor eres", "tip": "The + comp..., the + comp..."}, {"q": "\"He gets ___ tired every day.\"", "a": "b", "o": ["more tired", "more and more tired"], "fc": "Para cambio progresivo (cada vez más) usamos <b>more and more</b>.", "fi": "\"More tired\" sola es comparativo simple, no progresivo.", "ex": "More and more tired → Cada vez más cansado", "tip": "Progresivo → more and more / -er and -er"}, {"q": "\"This car is ___ expensive ___ that one.\" (el doble)", "a": "a", "o": ["twice as / as", "twice more / than"], "fc": "Proporción exacta = <b>twice as ... as</b>: \"twice as expensive as\".", "fi": "\"Twice more than\" no es una estructura estándar.", "ex": "Twice as expensive as that one → El doble de caro que ese", "tip": "El doble = twice as...as"}]}, {"icon": "⚡", "title": "Diferencias", "html": "<div class=\"section-label\">Paso 3</div><div class=\"section-title\">Paso 3: ⚡ Diferencias Importantes</div><div class=\"illus\"><span class=\"big\">⚠️</span><span class=\"big sm\">vs</span><span class=\"big\">✅</span></div><div class=\"section-desc\">Las trampas están en la <b>posición</b> y en la <b>formación</b> del comparativo (adjetivos cortos vs largos). Aquí es donde los alumnos pierden puntos.</div><table class=\"g-table\"><tr><th>🇪🇸 Español</th><th>🇬🇧 English</th><th>💡 Explanation</th></tr><tr><td>tan + adj + como</td><td><span class=\"g-comp\">as</span> + adj + <span class=\"g-comp\">as</span></td><td>El adjetivo va EN MEDIO de las dos \"as\"</td></tr><tr><td>menos + adj + que</td><td><span class=\"g-neg\">less</span> + adj + <span class=\"g-neg\">than</span></td><td>Con \"less\" se usa \"than\", no \"as\"</td></tr><tr><td>cuanto más…, más…</td><td><span class=\"g-quest\">the more</span>…, <span class=\"g-quest\">the more</span>…</td><td>\"The\" es obligatorio en las dos partes</td></tr><tr><td>cuanto más alto, mejor</td><td>the <span class=\"g-quest\">taller</span>, the better</td><td>Adj cortos: usar -er, no \"more\"</td></tr><tr><td>cada vez más grande</td><td><span class=\"g-verb\">bigger and bigger</span></td><td>Adj cortos: doble -er, no \"more and more big\"</td></tr></table><div class=\"info-illus\"><span class=\"emo\">📏</span><span class=\"txt\"><b>Cortos vs largos.</b> 1 sílaba (o 2 acabadas en -y) → <b>-er</b> (taller, easier). 2+ sílabas → <b>more</b> (more interesting).</span></div><div class=\"eg-card bad\"><span class=\"eg-emo\">🚫</span><div class=\"eg-body\"><div class=\"en\">She is <b>more tall as</b> her sister.</div><div class=\"es\">Dos errores: \"more tall\" + \"as\".</div></div></div><div class=\"eg-card ok\"><span class=\"eg-emo\">⚖️</span><div class=\"eg-body\"><div class=\"en\">She is <b>as tall as</b> her sister.</div><div class=\"es\">Es tan alta como su hermana.</div></div></div><div class=\"eg-card bad\"><span class=\"eg-emo\">🚫</span><div class=\"eg-body\"><div class=\"en\"><b>More</b> you study, <b>more</b> you learn.</div><div class=\"es\">Falta \"the\" en las dos partes.</div></div></div><div class=\"eg-card ok\"><span class=\"eg-emo\">📖</span><div class=\"eg-body\"><div class=\"en\"><b>The more</b> you study, <b>the more</b> you learn.</div><div class=\"es\">Cuanto más estudias, más aprendes.</div></div></div><div class=\"alert-card\"><div class=\"atitle\">⚠️ Adjetivos cortos en patrones proporcionales y progresivos</div><p>La regla de comparativos básicos aplica aquí también:<br>✅ \"<b>The bigger</b>, the better\" / \"<b>Bigger and bigger</b>\"<br>✅ \"<b>The more interesting</b>, the better\" / \"<b>More and more interesting</b>\"<br>❌ \"The more big\" / \"More big and more big\"</p></div><div class=\"note-box\"><span class=\"nt\">📌 Recuerda</span>Con <b>as…as</b> el adjetivo <b>nunca</b> cambia de forma (no lleva -er ni \"more\"): <i>as tall as</i>, <i>as interesting as</i>.</div>", "exercises": [{"q": "\"___ harder you work, ___ more you earn.\"", "a": "b", "o": ["Ø / Ø", "The / the"], "fc": "En patrón proporcional, ambos comparativos llevan \"the\".", "fi": "Sin \"the\" no es la estructura estándar en inglés.", "ex": "The harder you work, the more you earn", "tip": "The + comp..., the + comp..."}, {"q": "\"This book is ___ as the other one.\"", "a": "a", "o": ["as interesting", "interestinger"], "fc": "Adj largo (interesting) en igualdad: <b>as interesting as</b>.", "fi": "\"Interestinger\" no existe; adj largos no llevan -er.", "ex": "As interesting as the other one → Tan interesante como el otro", "tip": "Adj largo + as = as + adj + as"}, {"q": "\"The weather is getting ___.\"", "a": "b", "o": ["more cold and more cold", "colder and colder"], "fc": "\"Cold\" es adj corto → <b>colder and colder</b> (no \"more cold\").", "fi": "\"More cold and more cold\" no es estándar; cold es corto.", "ex": "Colder and colder → Cada vez más frío", "tip": "Adj corto → -er and -er"}, {"q": "\"This car is ___ that one.\" (el doble de rápido)", "a": "b", "o": ["as fast than", "twice as fast as"], "fc": "\"El doble\" = <b>twice as ... as</b>: twice as fast as.", "fi": "\"As fast than\" mezcla \"as\" y \"than\" — no existe.", "ex": "Twice as fast as that one → El doble de rápido", "tip": "El doble → twice as...as"}, {"q": "\"Spanish is ___ Russian.\" (menos difícil)", "a": "a", "o": ["less difficult than", "not as difficult as"], "fc": "Ambas son válidas, pero <b>less difficult than</b> es la estructura clásica con \"less\".", "fi": "\"Not as difficult as\" también significa lo mismo; ambas correctas.", "ex": "Spanish is less difficult than Russian → El español es menos difícil que el ruso", "tip": "less + adj + than (alt: not as...as)"}]}, {"icon": "💡", "title": "Consejos", "html": "<div class=\"section-label\">Paso 4</div><div class=\"section-title\">Paso 4: 💡 Consejos Prácticos</div><div class=\"illus\"><span class=\"big\">🧠</span><span class=\"big\">💡</span></div><div class=\"tip-card\"><strong>Tip 1 — As…as lleva el adjetivo EN MEDIO:</strong> \"as <b>tall</b> as\", \"as <b>fast</b> as\". El adjetivo nunca cambia (no -er, no more).</div><div class=\"tip-card\"><strong>Tip 2 — The…the… siempre con DOS comparativos:</strong> \"The <b>more</b>… the <b>better</b>\". Ambas partes con un comparativo y un \"the\".</div><div class=\"tip-card\"><strong>Tip 3 — Cambio progresivo:</strong> adj cortos → <b>-er and -er</b> (bigger and bigger); adj largos → <b>more and more + adj</b> (more and more difficult).</div><div class=\"tip-card\"><strong>Tip 4 — Proporciones exactas:</strong> twice as…as (el doble), three times as…as (el triple), half as…as (la mitad). Siempre \"as…as\", nunca \"than\".</div><div class=\"info-illus\"><span class=\"emo\">🔀</span><span class=\"txt\"><b>Irregulares clave.</b> good → <b>better</b>, bad → <b>worse</b>. Nunca \"more good\" ni \"more bad\".</span></div><div class=\"eg-card ok\"><span class=\"eg-emo\">📈</span><div class=\"eg-body\"><div class=\"en\">Her English is getting <b>better and better</b>.</div><div class=\"es\">Su inglés mejora cada vez más.</div></div></div><div class=\"formula-box\">⚖️ <span class=\"g-comp\">as + adj + as</span> = igualdad<br>📉 <span class=\"g-neg\">not as + adj + as</span> / <span class=\"g-neg\">less + adj + than</span> = inferioridad<br>🔄 <span class=\"g-quest\">the + comp…, the + comp…</span> = proporcional<br>📈 <span class=\"g-verb\">comp + and + comp</span> = cambio progresivo<br>🔢 <span class=\"g-comp\">twice as + adj + as</span> = el doble</div><table class=\"g-table\"><tr><th>Estructura</th><th>Ejemplo</th><th>Significado</th></tr><tr><td>as … as</td><td>as cold as ice</td><td>tan frío como hielo</td></tr><tr><td>not as … as</td><td>not as tall as</td><td>no tan alto como</td></tr><tr><td>less … than</td><td>less expensive than</td><td>menos caro que</td></tr><tr><td>the more, the more</td><td>the more, the better</td><td>cuanto más, mejor</td></tr><tr><td>-er and -er</td><td>hotter and hotter</td><td>cada vez más caliente</td></tr><tr><td>twice as … as</td><td>twice as fast as</td><td>el doble de rápido</td></tr></table>", "exercises": [{"q": "\"He earns ___ his brother.\" (la mitad)", "a": "a", "o": ["half as much as", "half than"], "fc": "\"La mitad\" = <b>half as ... as</b>. \"Much\" para sustantivos incontables (dinero).", "fi": "\"Half than\" no es estructura válida; siempre es \"as...as\" con proporciones.", "ex": "He earns half as much as his brother → Gana la mitad que su hermano", "tip": "Half/Twice/Three times + as...as"}, {"q": "\"___ you sleep, ___ tired you feel.\"", "a": "b", "o": ["More / less", "The less / the more"], "fc": "Patrón proporcional con sentidos opuestos: <b>The less ... the more</b>.", "fi": "\"More / less\" sin \"the\" no es la estructura.", "ex": "The less you sleep, the more tired you feel → Cuanto menos duermes, más cansado te sientes", "tip": "The + comp..., the + comp..."}, {"q": "\"Her English is getting ___.\"", "a": "a", "o": ["better and better", "more and more good"], "fc": "\"Good\" es irregular: comparativo = <b>better</b>. Progresivo: <b>better and better</b>.", "fi": "\"More and more good\" no existe; usa \"better\".", "ex": "Her English is getting better and better → Su inglés mejora cada vez más", "tip": "good → better (irregular)"}, {"q": "\"This room is ___ the other one.\" (igual de grande)", "a": "b", "o": ["bigger as", "as big as"], "fc": "Igualdad = <b>as + adj + as</b>: \"as big as\".", "fi": "\"Bigger as\" mezcla dos estructuras incorrectas.", "ex": "As big as the other one → Tan grande como el otro", "tip": "as + adj BASE + as"}, {"q": "\"My new job is ___ my old one.\" (no tan estresante)", "a": "a", "o": ["not as stressful as", "less stressful as"], "fc": "Estructura: <b>not as + adj + as</b>: \"not as stressful as\".", "fi": "\"Less stressful as\" mezcla estructuras — es \"less stressful THAN\" o \"not as stressful AS\", no \"less...as\".", "ex": "Not as stressful as my old one → No tan estresante como el anterior", "tip": "not as + adj + as"}]}, {"icon": "✨", "title": "Práctica Final", "html": "<div class=\"section-label\">Paso 5</div><div class=\"section-title\">Paso 5: ✨ Práctica Final</div><div class=\"illus\"><span class=\"big\">✨</span><span class=\"big\">🎯</span></div><div class=\"section-desc\">Combina los patrones: as…as, the…the…, less…than y comparativos progresivos.</div><div class=\"formula-box\">⚖️ Igualdad: <span class=\"g-comp\">as + adj + as</span><br>📉 Inferioridad: <span class=\"g-neg\">not as + adj + as</span> / <span class=\"g-neg\">less + adj + than</span><br>🔄 Proporcional: <span class=\"g-quest\">the + comp…, the + comp…</span><br>📈 Progresivo: <span class=\"g-verb\">-er and -er</span> / <span class=\"g-verb\">more and more + adj</span></div><div class=\"eg-card ok\"><span class=\"eg-emo\">⚖️</span><div class=\"eg-body\"><div class=\"en\"><span class=\"g-subj\">My phone</span> is <span class=\"g-comp\">as fast as</span> <span class=\"g-subj\">yours</span>.</div><div class=\"es\">Mi teléfono es tan rápido como el tuyo. (igualdad)</div></div></div><div class=\"eg-card ok\"><span class=\"eg-emo\">🌡️</span><div class=\"eg-body\"><div class=\"en\"><span class=\"g-subj\">Today</span> is <span class=\"g-neg\">not as cold as</span> <span class=\"g-subj\">yesterday</span>.</div><div class=\"es\">Hoy no hace tanto frío como ayer. (inferioridad)</div></div></div><div class=\"eg-card ok\"><span class=\"eg-emo\">📖</span><div class=\"eg-body\"><div class=\"en\"><span class=\"g-quest\">The more</span> you read, <span class=\"g-quest\">the more</span> you learn.</div><div class=\"es\">Cuanto más lees, más aprendes. (proporcional)</div></div></div><div class=\"eg-card ok\"><span class=\"eg-emo\">📅</span><div class=\"eg-body\"><div class=\"en\"><span class=\"g-subj\">The days</span> are getting <span class=\"g-verb\">shorter and shorter</span>.</div><div class=\"es\">Los días se hacen cada vez más cortos. (progresivo)</div></div></div><div class=\"alert-card\"><div class=\"atitle\">⚠️ Errores Comunes</div><p>❌ \"She is more tall as her sister\" → ✅ \"She is <b>as tall as</b> her sister\"<br>❌ \"More you practice, more you improve\" → ✅ \"<b>The more</b> you practice, <b>the more</b> you improve\"<br>❌ \"More and more good\" → ✅ \"<b>Better and better</b>\" (good → better)<br>❌ \"Not so fast than\" → ✅ \"Not <b>as</b> fast <b>as</b>\" (no \"than\" con as…as)<br>❌ \"Two times as fast\" → ✅ \"<b>Twice as</b> fast\" (twice, no \"two times\")</p></div>", "exercises": [{"q": "\"This city is ___ I expected.\" (más caro de lo)", "a": "a", "o": ["more expensive than", "as expensive as"], "fc": "Comparativo simple con expectativa = <b>more expensive than</b>.", "fi": "\"As expensive as\" sería igualdad, no superioridad.", "ex": "This city is more expensive than I expected", "tip": "Más + adj + de lo que = more + adj + than"}, {"q": "\"The exam was ___ I thought.\" (no tan difícil como)", "a": "b", "o": ["less difficult than", "not as difficult as"], "fc": "\"No tan...como\" → <b>not as + adj + as</b>. Ambas son válidas pero esta es la estructura clásica.", "fi": "\"Less difficult than\" también correcto pero \"not as difficult as\" mapea más directo.", "ex": "The exam was not as difficult as I thought → El examen no fue tan difícil como pensé", "tip": "No tan...como → not as...as"}, {"q": "\"___ you eat, ___ you weigh.\" (cuanto más comes, más pesas)", "a": "a", "o": ["The more / the more", "More / more"], "fc": "Patrón proporcional: <b>The more ... the more</b>. Ambas con \"the\".", "fi": "Sin \"the\" no es la estructura estándar.", "ex": "The more you eat, the more you weigh", "tip": "Cuanto más..., más..."}, {"q": "\"My headache is getting ___.\" (cada vez peor)", "a": "b", "o": ["more and more bad", "worse and worse"], "fc": "\"Bad\" es irregular: comparativo = <b>worse</b>. Progresivo: <b>worse and worse</b>.", "fi": "\"More and more bad\" no es correcto; \"bad\" es irregular.", "ex": "My headache is getting worse and worse → Mi dolor de cabeza empeora cada vez más", "tip": "bad → worse (irregular)"}, {"q": "\"This bag costs ___ that one.\" (el triple)", "a": "b", "o": ["three times much than", "three times as much as"], "fc": "\"El triple\" = <b>three times as ... as</b>. \"Much\" para precio (incontable).", "fi": "\"Three times much than\" mezcla \"much\" con \"than\" sin estructura válida.", "ex": "This bag costs three times as much as that one → Esta bolsa cuesta el triple que esa", "tip": "X times + as...as"}]}]};

function renderStepTabs(){
  const c=document.getElementById("stepTabs");c.innerHTML="";
  DATA.steps.forEach(function(s,i){
    const b=document.createElement("button");
    b.className="step-tab"+(i===curStep?" active":"");
    const k="s"+i;
    if(scores[k]!==undefined && answered["s"+i+"e0"] && answered["s"+i+"e1"] && answered["s"+i+"e2"] && answered["s"+i+"e3"] && answered["s"+i+"e4"] && i!==curStep){b.classList.add("done");}
    b.textContent=(i+1)+". "+s.icon+" "+s.title;
    b.addEventListener("click",function(){curStep=i;renderStepTabs();renderCard();document.getElementById("summaryFinal").classList.remove("show");});
    c.appendChild(b);
  });
}

function renderCard(){
  const s=DATA.steps[curStep];
  const k="s"+curStep;
  if(scores[k]===undefined)scores[k]=0;
  const card=document.createElement("div");
  card.className="card active";
  card.innerHTML=s.html;

  const exSection=document.createElement("div");
  exSection.className="ex-section";
  const h3=document.createElement("h3");
  h3.textContent="✏️ Ejercicios — "+s.title;
  exSection.appendChild(h3);

  s.exercises.forEach(function(e,i){
    const eid=k+"e"+i;
    const exDiv=document.createElement("div");
    exDiv.className="exercise";
    exDiv.id=eid;

    const q=document.createElement("div");
    q.className="exercise-q";
    q.innerHTML=(i+1)+". "+e.q;
    exDiv.appendChild(q);

    const opts=document.createElement("div");
    opts.className="opts";
    ["a","b"].forEach(function(letter,idx){
      const btn=document.createElement("button");
      btn.className="opt-btn";
      btn.textContent=letter+") "+e.o[idx];
      btn.addEventListener("click",function(){chk(eid,letter,e.a,e,btn);});
      opts.appendChild(btn);
    });
    exDiv.appendChild(opts);

    const correctIdx=(e.a==="a"?0:1);
    const wrongIdx=(e.a==="a"?1:0);

    const fbOk=document.createElement("div");
    fbOk.className="fb fb-ok";
    fbOk.id="fbok-"+eid;
    let okHtml='<div class="fb-header"><span class="fb-icon">🎉</span> ¡Correcto!</div><div class="fb-body">';
    okHtml+='<div class="fb-row"><span class="fb-dot">✅</span><div class="fb-text"><span class="fb-correct-answer">'+e.o[correctIdx]+'</span> — '+e.fc+'</div></div>';
    okHtml+='<div class="fb-row"><span class="fb-dot">💡</span><div class="fb-text">La otra opción: '+e.fi+'</div></div>';
    if(e.ex){okHtml+='<div class="fb-example">📝 '+e.ex+'</div>';}
    if(e.tip){okHtml+='<div class="fb-tip"><strong>💡 Recuerda:</strong> '+e.tip+'</div>';}
    okHtml+='</div>';
    fbOk.innerHTML=okHtml;
    exDiv.appendChild(fbOk);

    const fbBad=document.createElement("div");
    fbBad.className="fb fb-bad";
    fbBad.id="fbbad-"+eid;
    let badHtml='<div class="fb-header"><span class="fb-icon">😕</span> No es correcto</div><div class="fb-body">';
    badHtml+='<div class="fb-row"><span class="fb-dot">❌</span><div class="fb-text"><span class="fb-wrong-reason">'+e.fi+'</span></div></div>';
    badHtml+='<div class="fb-row"><span class="fb-dot">✅</span><div class="fb-text">La respuesta correcta es <span class="fb-correct-answer">'+e.o[correctIdx]+'</span> — '+e.fc+'</div></div>';
    if(e.ex){badHtml+='<div class="fb-example">📝 '+e.ex+'</div>';}
    if(e.tip){badHtml+='<div class="fb-tip"><strong>💡 Recuerda:</strong> '+e.tip+'</div>';}
    badHtml+='</div>';
    fbBad.innerHTML=badHtml;
    exDiv.appendChild(fbBad);

    exSection.appendChild(exDiv);
  });

  const score=document.createElement("div");
  score.className="score-bar";
  score.innerHTML='<div class="num" id="sc-'+k+'">'+scores[k]+'/5</div><div class="lbl">Puntuación</div>';
  exSection.appendChild(score);

  card.appendChild(exSection);

  const area=document.getElementById("cardArea");
  area.innerHTML="";
  area.appendChild(card);

  // Restore previously answered
  s.exercises.forEach(function(e,i){
    const eid=k+"e"+i;
    if(answered[eid]){
      const ex=document.getElementById(eid);
      const btns=ex.querySelectorAll(".opt-btn");
      btns.forEach(function(b){b.disabled=true;});
      const userPick=answered[eid];
      const correctIdx=(e.a==="a"?0:1);
      if(userPick===e.a){
        ex.classList.add("correct");
        btns.forEach(function(b){if(b.textContent.indexOf(userPick+")")===0)b.classList.add("sel-ok");});
        document.getElementById("fbok-"+eid).classList.add("show");
      }else{
        ex.classList.add("incorrect");
        btns.forEach(function(b){
          if(b.textContent.indexOf(userPick+")")===0)b.classList.add("sel-bad");
          if(b.textContent.indexOf(e.a+")")===0)b.classList.add("show-ok");
        });
        document.getElementById("fbbad-"+eid).classList.add("show");
      }
    }
  });
}

function chk(eid,sel,correct,e,btn){
  if(answered[eid])return;
  answered[eid]=sel;
  const ex=document.getElementById(eid);
  const btns=ex.querySelectorAll(".opt-btn");
  btns.forEach(function(b){b.disabled=true;});
  const k=eid.match(/s\d+/)[0];
  if(sel===correct){
    ex.classList.add("correct");
    btns.forEach(function(b){if(b.textContent.indexOf(sel+")")===0)b.classList.add("sel-ok");});
    document.getElementById("fbok-"+eid).classList.add("show");
    scores[k]++;
  }else{
    ex.classList.add("incorrect");
    btns.forEach(function(b){
      if(b.textContent.indexOf(sel+")")===0)b.classList.add("sel-bad");
      if(b.textContent.indexOf(correct+")")===0)b.classList.add("show-ok");
    });
    document.getElementById("fbbad-"+eid).classList.add("show");
  }
  document.getElementById("sc-"+k).textContent=scores[k]+"/5";
  const allDone=[0,1,2,3,4].every(function(i){return answered[k+"e"+i];});
  if(allDone && curStep===4){
    setTimeout(function(){
      const sf=document.getElementById("summaryFinal");
      const sl=document.getElementById("summaryList");
      sl.innerHTML=DATA.summary.map(function(s){return "<li>"+s+"</li>";}).join("");
      var total=0;for(var ti=0;ti<5;ti++){total+=(scores["s"+ti]||0);}
      var ts=document.getElementById("totalScore");
      if(ts)ts.innerHTML='<div class="big">'+total+'/25</div><div class="small">Total del tema</div>';
      sf.classList.add("show");
      sf.scrollIntoView({behavior:"smooth"});
    },600);
  }
}

renderStepTabs();renderCard();

</script>
</body>
</html>
