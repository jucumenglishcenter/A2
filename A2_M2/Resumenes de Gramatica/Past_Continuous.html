<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grammar Summary — Past Continuous | A2 | JUCUM</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Fredoka:wght@400;500;600;700&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
:root{
--bg:#FAFAF6;--card:#fff;--text:#2A2A2A;--text-soft:#777;--border:#E8E5DC;
--shadow:0 3px 16px rgba(0,0,0,.06);--radius:14px;
--lp:#4CAF50;--ld:#1B5E20;--ll:#E8F5E9;--lm:#C8E6C9;
--lg:linear-gradient(135deg,#388E3C,#4CAF50);--lglow:rgba(76,175,80,.15);
--badge-text:#1A3D1C;
--subj:#1565C0;--subj-bg:#E3F2FD;
--verb:#E53935;--verb-bg:#FFEBEE;
--comp:#00897B;--comp-bg:#E0F2F1;
--neg:#AD1457;--neg-bg:#FCE4EC;
--quest:#7B1FA2;--quest-bg:#F3E5F5;
--ok:#2E7D32;--ok-bg:#E8F5E9;
--err:#C62828;--err-bg:#FFEBEE;
--note-bg:#FFFDE7;--note-border:#FBC02D;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;padding:1.5rem 1rem;-webkit-font-smoothing:antialiased}
.container{max-width:780px;margin:0 auto}

.level-header{text-align:center;padding:2rem;border-radius:20px;color:#fff;position:relative;overflow:hidden;margin-bottom:1.2rem;background:var(--lg)}
.level-header::before{content:'';position:absolute;top:-40%;right:-15%;width:250px;height:250px;background:rgba(255,255,255,.1);border-radius:50%}
.level-header h1{font-family:'Fredoka',sans-serif;font-size:1.8rem;font-weight:600;position:relative;z-index:1}
.level-header .module-name{font-family:'Fredoka',sans-serif;font-size:1.1rem;font-weight:500;opacity:.95;position:relative;z-index:1;margin-top:.2rem}
.level-header .subtitle{opacity:.85;font-size:.85rem;position:relative;z-index:1;margin-top:.15rem}
.level-badge{display:inline-flex;align-items:center;gap:6px;font-size:.7rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;background:var(--ll);color:var(--badge-text);padding:4px 12px;border-radius:20px;border:1.5px solid var(--lm);margin-bottom:.8rem}

.step-tabs{display:flex;gap:.35rem;margin-bottom:1rem;flex-wrap:wrap}
.step-tab{padding:.45rem .85rem;border-radius:8px;font-size:.78rem;font-weight:700;cursor:pointer;border:2px solid var(--border);background:var(--card);transition:.2s;font-family:'Nunito',sans-serif}
.step-tab:hover{background:var(--ll)}
.step-tab.active{background:var(--ll);border-color:var(--lp);color:var(--ld)}
.step-tab.done{background:var(--ok-bg);border-color:var(--ok);color:var(--ok)}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.6rem;margin-bottom:1.2rem;box-shadow:var(--shadow);border-top:3.5px solid var(--lp);display:none}
.card.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.section-label{display:flex;align-items:center;gap:.5rem;font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--ld);margin-bottom:.3rem}
.section-label::before{content:'';width:20px;height:3px;background:var(--lp);border-radius:2px}
.section-title{font-family:'Fredoka',sans-serif;font-size:1.25rem;font-weight:600;margin-bottom:.1rem}
.section-desc{font-size:.85rem;color:var(--text-soft);margin-bottom:1rem}

.g-subj{background:var(--subj-bg);color:var(--subj);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--subj)}
.g-verb{background:var(--verb-bg);color:var(--verb);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--verb)}
.g-comp{background:var(--comp-bg);color:var(--comp);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--comp)}
.g-neg{background:var(--neg-bg);color:var(--neg);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--neg)}
.g-quest{background:var(--quest-bg);color:var(--quest);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--quest)}

.g-table{width:100%;border-collapse:separate;border-spacing:0;margin:.8rem 0;border-radius:10px;overflow:hidden;font-size:.83rem;border:1px solid var(--border)}
.g-table th{background:var(--lg);color:#fff;padding:.65rem .6rem;font-size:.7rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
.g-table td{padding:.6rem;border-bottom:1px solid #f0f0f0;vertical-align:middle}
.g-table tr:nth-child(even) td{background:var(--ll)}
.g-table tr:last-child td{border-bottom:none}

.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin:.8rem 0}
.compare-card{padding:1rem;border-radius:12px;text-align:center}
.compare-card.esp{background:var(--ll);border:2px solid var(--lm)}
.compare-card.eng{background:var(--subj-bg);border:2px solid #90CAF9}
.compare-card h4{font-family:'Fredoka',sans-serif;font-size:.85rem;margin-bottom:.5rem}
.compare-card.esp h4{color:var(--ld)}
.compare-card.eng h4{color:var(--subj)}
.compare-card ul{list-style:none;font-size:.82rem;color:var(--text-soft)}
.compare-card li{padding:2px 0}

.formula-box{background:var(--note-bg);border:2px solid var(--note-border);border-radius:12px;padding:1rem;margin:.8rem 0;text-align:center;font-family:'Fredoka',sans-serif;font-size:.95rem;color:var(--ld);line-height:1.8}
.tip-card{background:var(--ll);border-radius:10px;padding:.8rem 1rem;margin:.5rem 0;font-size:.83rem;border-left:3px solid var(--lp)}
.tip-card strong{color:var(--ld)}
.alert-card{background:var(--err-bg);border:2px solid #EF5350;border-radius:10px;padding:.8rem 1rem;margin:.8rem 0}
.alert-card .atitle{font-family:'Fredoka',sans-serif;color:var(--err);font-size:.82rem;margin-bottom:.3rem}
.alert-card p{font-size:.82rem;color:var(--text-soft);line-height:1.5}

.ex-row{display:flex;align-items:flex-start;gap:.6rem;padding:.6rem .8rem;border-radius:10px;margin:.4rem 0;font-size:.88rem;transition:background .2s}
.ex-row:hover{background:var(--lglow)}
.ex-row .icon{font-size:1.2rem;flex-shrink:0;line-height:1.4}
.ex-row .en{font-weight:700;color:var(--text)}
.ex-row .es{font-family:'Lora',serif;font-style:italic;font-size:.82rem;color:var(--text-soft);margin-top:1px}
.ex-right{border-left:3px solid var(--ok);background:var(--ok-bg)}
.ex-wrong{border-left:3px solid var(--err);background:var(--err-bg)}

.conj-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem;margin:.8rem 0}
.conj-item{padding:.6rem;border-radius:10px;text-align:center;background:var(--card);border:1.5px solid var(--border)}
.conj-item .pron{font-size:.75rem;color:var(--subj);font-weight:800}
.conj-item .vrb{font-family:'Fredoka',sans-serif;font-size:1.05rem;color:var(--verb)}
.conj-item .meaning{font-size:.65rem;color:var(--text-soft)}

.ex-section{margin-top:1.2rem;padding-top:1rem;border-top:2px dashed var(--lm)}
.ex-section h3{font-family:'Fredoka',sans-serif;color:var(--ld);font-size:.9rem;margin-bottom:.8rem}
.exercise{background:#fafafa;border-radius:12px;padding:1rem;margin-bottom:.7rem;border:2px solid #eee;transition:.2s}
.exercise.correct{border-color:var(--ok);background:var(--ok-bg)}
.exercise.incorrect{border-color:var(--err);background:var(--err-bg)}
.exercise-q{font-size:.88rem;margin-bottom:.7rem;line-height:1.4}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:.4rem}
.opt-btn{padding:.65rem .5rem;border:2px solid #e0e0e0;border-radius:10px;background:var(--card);color:var(--text);font-size:.83rem;font-weight:600;cursor:pointer;transition:.15s;font-family:'Nunito',sans-serif;text-align:left}
.opt-btn:hover:not(:disabled){border-color:var(--lp);background:var(--ll)}
.opt-btn:disabled{cursor:not-allowed;opacity:.85}
.opt-btn.sel-ok{background:var(--ok);color:#fff;border-color:var(--ok)}
.opt-btn.sel-bad{background:var(--err);color:#fff;border-color:var(--err)}
.opt-btn.show-ok{background:var(--ok);color:#fff;border-color:var(--ok)}
.fb{margin-top:.7rem;padding:0;border-radius:12px;font-size:.82rem;display:none;line-height:1.6;overflow:hidden}
.fb.show{display:block;animation:fbSlide .35s ease}
@keyframes fbSlide{from{opacity:0;max-height:0;transform:translateY(-8px)}to{opacity:1;max-height:500px;transform:translateY(0)}}
.fb-header{display:flex;align-items:center;gap:.5rem;padding:.7rem 1rem;font-family:'Fredoka',sans-serif;font-size:.85rem;font-weight:600}
.fb.fb-ok .fb-header{background:#C8E6C9;color:var(--ok)}
.fb.fb-bad .fb-header{background:#FFCDD2;color:var(--err)}
.fb-header .fb-icon{font-size:1.2rem}
.fb-body{padding:.8rem 1rem}
.fb.fb-ok .fb-body{background:var(--ok-bg)}
.fb.fb-bad .fb-body{background:var(--err-bg)}
.fb-row{display:flex;align-items:flex-start;gap:.5rem;margin-bottom:.4rem}
.fb-row:last-child{margin-bottom:0}
.fb-row .fb-dot{font-size:.9rem;flex-shrink:0;margin-top:1px}
.fb-row .fb-text{flex:1}
.fb-row .fb-text strong{color:var(--text)}
.fb-correct-answer{color:var(--ok);font-weight:700}
.fb-wrong-reason{color:var(--err);font-weight:600}
.fb-example{display:inline-flex;align-items:center;gap:.3rem;margin-top:.3rem;padding:3px 10px;border-radius:6px;font-size:.78rem;font-weight:700}
.fb.fb-ok .fb-example{background:#A5D6A7;color:#1B5E20}
.fb.fb-bad .fb-example{background:#EF9A9A;color:#B71C1C}
.fb-tip{margin-top:.5rem;padding:.5rem .7rem;border-radius:8px;background:var(--note-bg);border:1px solid var(--note-border);font-size:.76rem;color:#6D4C00}
.fb-tip strong{color:var(--ld)}
.score-bar{text-align:center;padding:.8rem;background:var(--ll);border-radius:10px;margin-top:.8rem;border:1px solid var(--lm)}
.score-bar .num{font-family:'Fredoka',sans-serif;font-size:1.4rem;color:var(--ld)}
.score-bar .lbl{font-size:.7rem;color:var(--lp);font-weight:700;text-transform:uppercase;letter-spacing:1px}

.summary-final{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.6rem;margin-top:1rem;box-shadow:var(--shadow);border-top:3.5px solid var(--ok);display:none}
.summary-final.show{display:block}
.summary-final h3{font-family:'Fredoka',sans-serif;color:var(--ok);margin-bottom:.6rem}
.summary-final ul{list-style:none}
.summary-final li{padding:4px 0 4px 22px;position:relative;font-size:.83rem;color:var(--text-soft);line-height:1.6}
.summary-final li:before{content:"\2713";position:absolute;left:0;color:var(--lp);font-weight:700}

@media(max-width:600px){.level-header h1{font-size:1.4rem}.card{padding:1.2rem}.compare-grid,.conj-grid{grid-template-columns:1fr}.opts{grid-template-columns:1fr}}
</style>
</head>

<div class="container">
<div class="level-header">
<span class="level-badge">💚 A2 · Module 7</span>

<p class="subtitle">A2 · Module 7 · 5 pasos × 5 ejercicios</p>
</div>

<script>

let curStep=0;const scores={};const answered={};
const DATA={"summary": ["<b>Estructura:</b> was/were + verb-ing \u2014 \"I was working\" / \"They were sleeping\"", "<b>was</b> con I/He/She/It \u00b7 <b>were</b> con You/We/They", "<b>Uso principal:</b> acciones EN PROGRESO en un momento del pasado", "Negativo: was/were + <b>not</b> + ing \u2014 \"She wasn't listening\"", "Pregunta: <b>Was/Were</b> + sujeto + ing? \u2014 \"Were you sleeping?\"", "Equivale al espa\u00f1ol \"estaba/estabas + gerundio\" (estaba comiendo)", "Spelling: run \u2192 running, sit \u2192 sitting, lie \u2192 lying, make \u2192 making"], "steps": [{"icon": "\ud83c\uddea\ud83c\uddf8", "title": "Repaso en Espa\u00f1ol", "html": "<div class=\"section-label\">Paso 1</div>\n<div class=\"section-title\">Paso 1: \ud83c\uddea\ud83c\uddf8 Repaso en Espa\u00f1ol</div>\n<div class=\"section-desc\">En espa\u00f1ol usamos <b>\"estaba/estabas + gerundio\"</b> para hablar de acciones que estaban ocurriendo en un momento del pasado. En ingl\u00e9s funciona igual: <b>was/were + verb-ing</b>.</div>\n\n<div class=\"compare-grid\">\n<div class=\"compare-card esp\"><h4>\ud83c\uddea\ud83c\uddf8 Espa\u00f1ol</h4><ul>\n<li>Yo <b>estaba</b> com<b>iendo</b></li>\n<li>T\u00fa <b>estabas</b> dorm<b>iendo</b></li>\n<li>Ellos <b>estaban</b> jug<b>ando</b></li>\n<li>Nosotros <b>est\u00e1bamos</b> trabaj<b>ando</b></li>\n</ul></div>\n<div class=\"compare-card eng\"><h4>\ud83c\uddec\ud83c\udde7 English</h4><ul>\n<li>I <b>was</b> eat<b>ing</b></li>\n<li>You <b>were</b> sleep<b>ing</b></li>\n<li>They <b>were</b> play<b>ing</b></li>\n<li>We <b>were</b> work<b>ing</b></li>\n</ul></div></div>\n\n<div class=\"ex-row\"><div class=\"icon\">\ud83c\udf73</div><div><div class=\"en\">A las 8 PM, yo estaba cocinando.</div><div class=\"es\">Acci\u00f3n en progreso en un momento espec\u00edfico</div></div></div>\n<div class=\"ex-row\"><div class=\"icon\">\ud83d\udcde</div><div><div class=\"en\">Cuando me llamaste, ella estaba estudiando.</div><div class=\"es\">Acci\u00f3n larga interrumpida por otra acci\u00f3n corta</div></div></div>\n<div class=\"tip-card\"><strong>\ud83d\udca1 Clave:</strong> No describimos el inicio ni el final \u2014 solo que la acci\u00f3n estaba \"en medio\" en ese momento del pasado.</div>", "exercises": [{"q": "En espa\u00f1ol, \"estaba comiendo\" describe:", "a": "a", "o": ["Una acci\u00f3n EN PROGRESO en el pasado", "Una acci\u00f3n terminada"], "fc": "\"Estaba\" + gerundio = acci\u00f3n en desarrollo en el pasado.", "fi": "Para acci\u00f3n terminada usar\u00edamos \"com\u00ed\".", "ex": "Estaba comiendo \u2192 I was eating", "tip": "Estaba/Estabas + gerundio = was/were + ing"}, {"q": "\u00bfQu\u00e9 sufijo lleva el gerundio en espa\u00f1ol?", "a": "b", "o": ["-ado/-ido", "-ando/-iendo"], "fc": "\"-ando\" (cantando) y \"-iendo\" (comiendo) son los gerundios.", "fi": "\"-ado/-ido\" son los participios (cantado, comido), no gerundios.", "ex": "Cantando = singing \u00b7 Comiendo = eating"}, {"q": "\"Cuando llegaste, yo dorm\u00eda\" \u2014 la acci\u00f3n m\u00e1s larga es:", "a": "a", "o": ["Yo dorm\u00eda", "T\u00fa llegaste"], "fc": "\"Dorm\u00eda\" describe una acci\u00f3n en progreso (m\u00e1s larga).", "fi": "\"Llegaste\" es la acci\u00f3n corta que interrumpe.", "ex": "When you arrived, I was sleeping", "tip": "Larga = was/were + ing \u00b7 Corta = pasado simple"}, {"q": "\"Ayer a las 6, nosotros ___ tarea.\" \u2014 \u00bfqu\u00e9 forma verbal en espa\u00f1ol?", "a": "b", "o": ["hicimos la", "est\u00e1bamos haciendo la"], "fc": "A una hora espec\u00edfica en el pasado, la acci\u00f3n estaba EN PROGRESO \u2192 \"est\u00e1bamos haciendo\".", "fi": "\"Hicimos\" indica acci\u00f3n terminada, no enfatiza que estaba en medio.", "ex": "Est\u00e1bamos haciendo tarea \u2192 We were doing homework", "tip": "Hora espec\u00edfica + en progreso \u2192 estaba/estabas + gerundio"}, {"q": "\u00bfCu\u00e1l es gerundio en espa\u00f1ol?", "a": "a", "o": ["Hablando", "Hablado"], "fc": "\"Hablando\" = gerundio (acci\u00f3n en progreso).", "fi": "\"Hablado\" = participio (acci\u00f3n terminada).", "ex": "Hablando = speaking \u00b7 Hablado = spoken"}]}, {"icon": "\ud83e\udd1d", "title": "Similitudes", "html": "<div class=\"section-label\">Paso 2</div>\n<div class=\"section-title\">Paso 2: \ud83e\udd1d Similitudes ESP \u2194 ENG</div>\n<div class=\"section-desc\">El past continuous funciona casi igual que el \"estaba + gerundio\" del espa\u00f1ol. Both languages use this tense for the same purposes.</div>\n\n<table class=\"g-table\">\n<tr><th>Use / Uso</th><th>\ud83c\uddea\ud83c\uddf8 Espa\u00f1ol</th><th>\ud83c\uddec\ud83c\udde7 English</th></tr>\n<tr><td>Auxiliar + gerundio</td><td>estaba/estabas + -ando</td><td><span class=\"g-verb\">was/were</span> + -ing</td></tr>\n<tr><td>Acci\u00f3n en progreso</td><td>Estaba leyendo a las 9</td><td>I <span class=\"g-verb\">was reading</span> at 9</td></tr>\n<tr><td>Acci\u00f3n interrumpida</td><td>Dorm\u00eda cuando lleg\u00f3</td><td>I <span class=\"g-verb\">was sleeping</span> when he arrived</td></tr>\n<tr><td>Dos acciones simult\u00e1neas</td><td>Mientras com\u00edamos, llov\u00eda</td><td>While we <span class=\"g-verb\">were eating</span>, it <span class=\"g-verb\">was raining</span></td></tr>\n<tr><td>Cambia con la persona</td><td>estaba / estabas / est\u00e1bamos</td><td><span class=\"g-verb\">was</span> / <span class=\"g-verb\">were</span></td></tr>\n</table>\n\n<div class=\"section-label\">Conjugaci\u00f3n visual</div>\n<div class=\"conj-grid\">\n<div class=\"conj-item\"><div class=\"pron\">I</div><div class=\"vrb\">was</div><div class=\"meaning\">estaba</div></div>\n<div class=\"conj-item\"><div class=\"pron\">You</div><div class=\"vrb\">were</div><div class=\"meaning\">estabas</div></div>\n<div class=\"conj-item\"><div class=\"pron\">He / She / It</div><div class=\"vrb\">was</div><div class=\"meaning\">estaba</div></div>\n<div class=\"conj-item\"><div class=\"pron\">We</div><div class=\"vrb\">were</div><div class=\"meaning\">est\u00e1bamos</div></div>\n<div class=\"conj-item\"><div class=\"pron\">You (pl.)</div><div class=\"vrb\">were</div><div class=\"meaning\">estaban</div></div>\n<div class=\"conj-item\"><div class=\"pron\">They</div><div class=\"vrb\">were</div><div class=\"meaning\">estaban</div></div>\n</div>\n\n<div class=\"tip-card\"><strong>\ud83d\udca1 Key similarity:</strong> En ambos idiomas necesitas <b>2 partes</b>: el auxiliar (was/were \u2194 estaba/estabas) y el verbo en ing/gerundio. Same logic, same structure.</div>", "exercises": [{"q": "\"I ___ working at 8 PM.\"", "a": "a", "o": ["was", "were"], "fc": "\"I\" siempre usa \"was\" en past continuous.", "fi": "\"Were\" se usa con You/We/They.", "ex": "I was working at 8 PM \u2192 Yo estaba trabajando a las 8 PM", "tip": "I + was \u00b7 You + were"}, {"q": "\"They ___ playing soccer.\"", "a": "b", "o": ["was", "were"], "fc": "\"They\" (plural) usa \"were\".", "fi": "\"Was\" es para singular (I/He/She/It).", "ex": "They were playing \u2192 Ellos estaban jugando"}, {"q": "\"She ___ studying when I called.\"", "a": "a", "o": ["was", "were"], "fc": "\"She\" (3a singular) usa \"was\".", "fi": "\"Were\" no combina con she.", "ex": "She was studying \u2192 Ella estaba estudiando"}, {"q": "\u00bfQu\u00e9 forma del verbo va despu\u00e9s de was/were?", "a": "b", "o": ["Forma base (work)", "Forma -ing (working)"], "fc": "Past continuous = was/were + verb<b>-ing</b>.", "fi": "La forma base se usa con auxiliares como \"do\", no con was/were.", "ex": "She was working \u2192 Ella estaba trabajando", "tip": "was/were SIEMPRE pide -ing"}, {"q": "\"We ___ watching TV.\"", "a": "a", "o": ["were", "was"], "fc": "\"We\" (plural) usa \"were\".", "fi": "\"Was\" es solo para singular (I/He/She/It).", "ex": "We were watching TV \u2192 Est\u00e1bamos viendo TV"}]}, {"icon": "\u26a1", "title": "Diferencias", "html": "<div class=\"section-label\">Paso 3</div>\n<div class=\"section-title\">Paso 3: \u26a1 Diferencias Importantes</div>\n<div class=\"section-desc\">Aunque la l\u00f3gica es similar, hay reglas espec\u00edficas del ingl\u00e9s que debes dominar.</div>\n\n<table class=\"g-table\">\n<tr><th>\ud83c\uddea\ud83c\uddf8 Espa\u00f1ol</th><th>\ud83c\uddec\ud83c\udde7 English</th><th>\ud83d\udca1 Explanation</th></tr>\n<tr><td>2 verbos: estar + gerundio</td><td>2 partes: <span class=\"g-verb\">was/were + ing</span></td><td>Mismo concepto, estructura similar</td></tr>\n<tr><td>1 forma de \"estar\" para singular</td><td>2 formas: <span class=\"g-verb\">was</span> (I/He/She/It) / <span class=\"g-verb\">were</span> (You/We/They)</td><td>Ingl\u00e9s distingue persona</td></tr>\n<tr><td>\"no estaba comiendo\"</td><td>\"<span class=\"g-neg\">wasn't eating</span>\" / \"<span class=\"g-neg\">weren't eating</span>\"</td><td>\"not\" va DESPU\u00c9S de was/were</td></tr>\n<tr><td>\"\u00bfEstabas durmiendo?\"</td><td>\"<span class=\"g-quest\">Were you</span> sleeping?\"</td><td>Inversi\u00f3n obligatoria</td></tr>\n<tr><td>\"corriendo\" (regular)</td><td>\"run<b>ning</b>\" (doble n)</td><td>Spelling rules de -ing</td></tr>\n</table>\n\n<div class=\"alert-card\"><div class=\"atitle\">\u26a0\ufe0f Spelling Rules \u2014 -ing</div>\n<p>\u2022 Mayor\u00eda: <b>add -ing</b> \u2192 work \u2192 working, eat \u2192 eating<br>\n\u2022 Termina en <b>-e</b>: <b>drop -e</b> \u2192 make \u2192 making, write \u2192 writing<br>\n\u2022 CVC corto + acentuado: <b>doble consonante</b> \u2192 run \u2192 running, sit \u2192 sitting<br>\n\u2022 Termina en <b>-ie</b>: <b>cambia a -ying</b> \u2192 lie \u2192 lying, die \u2192 dying</p></div>\n\n<div class=\"ex-row ex-wrong\"><div class=\"icon\">\u274c</div><div><div class=\"en\">She was runing in the park.</div><div class=\"es\">\"Run\" necesita doble \"n\" \u2192 running</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\u2705</div><div><div class=\"en\">She <span class=\"g-verb\">was running</span> in the park.</div><div class=\"es\">Ella estaba corriendo en el parque.</div></div></div>\n<div class=\"ex-row ex-wrong\"><div class=\"icon\">\u274c</div><div><div class=\"en\">I was makeing dinner.</div><div class=\"es\">\"Make\" pierde la \"e\" \u2192 making</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\u2705</div><div><div class=\"en\">I <span class=\"g-verb\">was making</span> dinner.</div><div class=\"es\">Estaba preparando la cena.</div></div></div>", "exercises": [{"q": "\u00bfCu\u00e1l es la forma -ing correcta de \"run\"?", "a": "b", "o": ["runing", "running"], "fc": "CVC corto acentuado \u2192 doble consonante: run + n + ing = running.", "fi": "\"Runing\" con una sola \"n\" es incorrecto en ingl\u00e9s.", "ex": "She was running \u2192 Ella estaba corriendo", "tip": "Run/Sit/Swim \u2192 doble consonante final"}, {"q": "\u00bfCu\u00e1l es la forma -ing correcta de \"make\"?", "a": "a", "o": ["making", "makeing"], "fc": "Verbos terminados en -e silenciosa: se quita la \"e\" \u2192 making.", "fi": "\"Makeing\" mantiene la \"e\" \u2014 incorrecto.", "ex": "I was making coffee \u2192 Estaba preparando caf\u00e9", "tip": "Make/Write/Take \u2192 quitar -e"}, {"q": "\"He ___ not listening.\"", "a": "a", "o": ["was", "were"], "fc": "\"He\" (3a singular) usa \"was\". Negativo: was not / wasn't.", "fi": "\"Were\" es para You/We/They.", "ex": "He wasn't listening \u2192 \u00c9l no estaba escuchando"}, {"q": "\"___ you sleeping at 11?\"", "a": "b", "o": ["Was", "Were"], "fc": "\"You\" siempre usa \"were\", incluso en preguntas.", "fi": "\"Was\" es para I/He/She/It.", "ex": "Were you sleeping? \u2192 \u00bfEstabas durmiendo?", "tip": "Pregunta = was/were va PRIMERO"}, {"q": "\u00bfCu\u00e1l es la forma -ing de \"lie\" (mentir/acostarse)?", "a": "a", "o": ["lying", "lieing"], "fc": "Verbos en -ie cambian a -ying: lie \u2192 lying, die \u2192 dying.", "fi": "\"Lieing\" no es correcto en ingl\u00e9s est\u00e1ndar.", "ex": "She was lying on the bed \u2192 Ella estaba acostada en la cama"}]}, {"icon": "\ud83d\udca1", "title": "Consejos", "html": "<div class=\"section-label\">Paso 4</div>\n<div class=\"section-title\">Paso 4: \ud83d\udca1 Consejos Pr\u00e1cticos</div>\n\n<div class=\"tip-card\"><strong>Tip 1 \u2014 La regla de oro:</strong> Si en espa\u00f1ol dices \"estaba/estabas + ando/iendo\", en ingl\u00e9s di \"was/were + ing\". The mapping is direct.</div>\n<div class=\"tip-card\"><strong>Tip 2 \u2014 Memoriza las 2 parejas:</strong> <b>I / He / She / It + WAS</b> \u00b7 <b>You / We / They + WERE</b>. Same as past simple of \"to be\".</div>\n<div class=\"tip-card\"><strong>Tip 3 \u2014 Time markers:</strong> at 8 PM yesterday, this morning, all day, while, when, at that moment. These signal a moment in the past \u2192 use past continuous.</div>\n<div class=\"tip-card\"><strong>Tip 4 \u2014 Combo cl\u00e1sico:</strong> WHEN + past simple, past continuous \u2014 \"When she called, I <b>was working</b>\". The longer action goes in past continuous.</div>\n\n<div class=\"formula-box\">\n\u2705 <span class=\"g-subj\">Subject</span> + <span class=\"g-verb\">was/were</span> + <span class=\"g-comp\">verb-ing</span><br>\n\u274c <span class=\"g-subj\">Subject</span> + <span class=\"g-verb\">was/were</span> + <span class=\"g-neg\">not</span> + <span class=\"g-comp\">verb-ing</span><br>\n\u2753 <span class=\"g-quest\">Was/Were</span> + <span class=\"g-subj\">subject</span> + <span class=\"g-comp\">verb-ing</span>?\n</div>\n\n<table class=\"g-table\">\n<tr><th>Verbo base</th><th>Forma -ing</th><th>Regla</th></tr>\n<tr><td>work</td><td>work<b>ing</b></td><td>Solo a\u00f1adir -ing</td></tr>\n<tr><td>write</td><td>writ<b>ing</b></td><td>Quitar -e final</td></tr>\n<tr><td>sit</td><td>sit<b>ting</b></td><td>Doblar consonante</td></tr>\n<tr><td>lie</td><td>l<b>ying</b></td><td>-ie \u2192 -ying</td></tr>\n<tr><td>study</td><td>study<b>ing</b></td><td>-y se mantiene en -ing</td></tr>\n</table>", "exercises": [{"q": "\"At 9 AM, I ___ breakfast.\"", "a": "b", "o": ["had", "was having"], "fc": "\"At 9 AM\" indica un momento exacto \u2192 acci\u00f3n EN PROGRESO \u2192 was having.", "fi": "\"Had\" es pasado simple, no enfatiza el progreso en ese momento.", "ex": "At 9 AM, I was having breakfast \u2192 A las 9 AM, estaba desayunando", "tip": "\"At + hora\" \u2192 was/were + ing"}, {"q": "\"While she ___, the phone rang.\"", "a": "a", "o": ["was reading", "read"], "fc": "\"While\" introduce la acci\u00f3n LARGA en progreso \u2192 was reading.", "fi": "\"Read\" (pasado simple) no expresa progreso.", "ex": "While she was reading, the phone rang \u2192 Mientras le\u00eda, son\u00f3 el tel\u00e9fono", "tip": "While + was/were + ing"}, {"q": "\"They ___ TV when I arrived.\"", "a": "b", "o": ["watched", "were watching"], "fc": "Acci\u00f3n larga interrumpida por una corta \u2192 past continuous (were watching).", "fi": "\"Watched\" (pasado simple) indica acci\u00f3n terminada, no interrumpida.", "ex": "They were watching TV when I arrived \u2192 Ve\u00edan TV cuando llegu\u00e9"}, {"q": "\u00bfCu\u00e1l es el -ing correcto de \"swim\"?", "a": "a", "o": ["swimming", "swiming"], "fc": "CVC corto acentuado \u2192 doble m: swim \u2192 swimming.", "fi": "\"Swiming\" con una sola \"m\" es incorrecto.", "ex": "He was swimming \u2192 \u00c9l estaba nadando", "tip": "Swim/Run/Sit \u2014 doble consonante"}, {"q": "\"It ___ raining all morning.\"", "a": "b", "o": ["were", "was"], "fc": "\"It\" (singular) usa \"was\". \"All morning\" indica progreso continuo.", "fi": "\"Were\" no combina con \"it\" (singular).", "ex": "It was raining all morning \u2192 Estuvo lloviendo toda la ma\u00f1ana"}]}, {"icon": "\u2728", "title": "Pr\u00e1ctica Final", "html": "<div class=\"section-label\">Paso 5</div>\n<div class=\"section-title\">Paso 5: \u2728 Pr\u00e1ctica Final</div>\n<div class=\"section-desc\">Aplica todo lo aprendido. Estructura completa: afirmativo, negativo e interrogativo.</div>\n\n<div class=\"formula-box\">\n\u2705 <span class=\"g-subj\">Subject</span> + <span class=\"g-verb\">was/were</span> + <span class=\"g-comp\">verb-ing</span><br>\n\u274c <span class=\"g-subj\">Subject</span> + <span class=\"g-verb\">wasn't / weren't</span> + <span class=\"g-comp\">verb-ing</span><br>\n\u2753 <span class=\"g-quest\">Was / Were</span> + <span class=\"g-subj\">subject</span> + <span class=\"g-comp\">verb-ing</span>?\n</div>\n\n<div class=\"ex-row ex-right\"><div class=\"icon\">\ud83d\udcda</div><div><div class=\"en\"><span class=\"g-subj\">I</span> <span class=\"g-verb\">was studying</span> <span class=\"g-comp\">English at 7 PM</span>.</div><div class=\"es\">Yo estaba estudiando ingl\u00e9s a las 7 PM.</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\ud83c\udf73</div><div><div class=\"en\"><span class=\"g-subj\">She</span> <span class=\"g-verb\">was cooking</span> <span class=\"g-comp\">when he called</span>.</div><div class=\"es\">Ella estaba cocinando cuando \u00e9l llam\u00f3.</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\ud83d\udeb6</div><div><div class=\"en\"><span class=\"g-subj\">They</span> <span class=\"g-verb\">were not (weren't) walking</span> <span class=\"g-comp\">in the park</span>.</div><div class=\"es\">Ellos no estaban caminando en el parque.</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\u2753</div><div><div class=\"en\"><span class=\"g-quest\">Were</span> <span class=\"g-subj\">you</span> <span class=\"g-verb\">sleeping</span> <span class=\"g-comp\">at midnight</span>?</div><div class=\"es\">\u00bfEstabas durmiendo a medianoche?</div></div></div>\n\n<div class=\"alert-card\"><div class=\"atitle\">\u26a0\ufe0f Errores Comunes</div><p>\n\u274c \"I were working\" \u2192 \u2705 \"I <b>was</b> working\" (I siempre con was)<br>\n\u274c \"She was runing\" \u2192 \u2705 \"She was <b>running</b>\" (doble n)<br>\n\u274c \"Was you sleeping?\" \u2192 \u2705 \"<b>Were</b> you sleeping?\" (you siempre con were)<br>\n\u274c \"They was eating\" \u2192 \u2705 \"They <b>were</b> eating\" (plural \u2192 were)\n</p></div>", "exercises": [{"q": "\"I ___ a book yesterday at 5 PM.\"", "a": "b", "o": ["was readed", "was reading"], "fc": "Past continuous = was + verb-ing. \"Reading\", no \"readed\".", "fi": "\"Readed\" no existe; el pasado de read es \"read\", pero aqu\u00ed necesitamos -ing.", "ex": "I was reading a book \u2192 Estaba leyendo un libro", "tip": "was/were + ing (nunca + ed)"}, {"q": "\"They ___ when the teacher entered.\"", "a": "a", "o": ["were talking", "was talking"], "fc": "\"They\" (plural) \u2192 were. Acci\u00f3n en progreso interrumpida.", "fi": "\"Was\" es singular; con \"they\" usamos \"were\".", "ex": "They were talking when the teacher entered \u2192 Estaban hablando cuando entr\u00f3 el profe"}, {"q": "\"She ___ TV; she was studying.\"", "a": "b", "o": ["weren't watching", "wasn't watching"], "fc": "\"She\" (singular) \u2192 was. Negativo: wasn't watching.", "fi": "\"Weren't\" se usa con You/We/They (plural).", "ex": "She wasn't watching TV \u2192 Ella no estaba viendo TV"}, {"q": "\"___ it raining when you left?\"", "a": "a", "o": ["Was", "Were"], "fc": "\"It\" (singular) \u2192 Was. Pregunta: Was it raining?", "fi": "\"Were\" es para plural y \"you\".", "ex": "Was it raining? \u2192 \u00bfEstaba lloviendo?", "tip": "It \u2192 always was"}, {"q": "\"While we ___ dinner, the lights went out.\"", "a": "b", "o": ["had", "were having"], "fc": "\"While\" + acci\u00f3n larga en progreso \u2192 past continuous (were having).", "fi": "\"Had\" (pasado simple) no expresa el progreso requerido tras \"while\".", "ex": "While we were having dinner, the lights went out \u2192 Mientras cen\u00e1bamos, se fue la luz", "tip": "While + past continuous"}]}]};

function renderStepTabs(){
  const c=document.getElementById("stepTabs");c.innerHTML="";
  DATA.steps.forEach(function(s,i){
    const b=document.createElement("button");
    b.className="step-tab"+(i===curStep?" active":"");
    const k="s"+i;
    if(scores[k]!==undefined && answered["s"+i+"e0"] && answered["s"+i+"e1"] && answered["s"+i+"e2"] && answered["s"+i+"e3"] && answered["s"+i+"e4"] && i!==curStep){b.classList.add("done");}
    b.textContent=(i+1)+". "+s.icon+" "+s.title;
    b.addEventListener("click",function(){curStep=i;renderStepTabs();renderCard();document.getElementById("summaryFinal").classList.remove("show");});
    c.appendChild(b);
  });
}

function renderCard(){
  const s=DATA.steps[curStep];
  const k="s"+curStep;
  if(scores[k]===undefined)scores[k]=0;
  const card=document.createElement("div");
  card.className="card active";
  card.innerHTML=s.html;

  const exSection=document.createElement("div");
  exSection.className="ex-section";
  const h3=document.createElement("h3");
  h3.textContent="✏️ Ejercicios — "+s.title;
  exSection.appendChild(h3);

  s.exercises.forEach(function(e,i){
    const eid=k+"e"+i;
    const exDiv=document.createElement("div");
    exDiv.className="exercise";
    exDiv.id=eid;

    const q=document.createElement("div");
    q.className="exercise-q";
    q.innerHTML=(i+1)+". "+e.q;
    exDiv.appendChild(q);

    const opts=document.createElement("div");
    opts.className="opts";
    ["a","b"].forEach(function(letter,idx){
      const btn=document.createElement("button");
      btn.className="opt-btn";
      btn.textContent=letter+") "+e.o[idx];
      btn.addEventListener("click",function(){chk(eid,letter,e.a,e,btn);});
      opts.appendChild(btn);
    });
    exDiv.appendChild(opts);

    const correctIdx=(e.a==="a"?0:1);
    const wrongIdx=(e.a==="a"?1:0);

    const fbOk=document.createElement("div");
    fbOk.className="fb fb-ok";
    fbOk.id="fbok-"+eid;
    let okHtml='<div class="fb-header"><span class="fb-icon">🎉</span> ¡Correcto!</div><div class="fb-body">';
    okHtml+='<div class="fb-row"><span class="fb-dot">✅</span><div class="fb-text"><span class="fb-correct-answer">'+e.o[correctIdx]+'</span> — '+e.fc+'</div></div>';
    okHtml+='<div class="fb-row"><span class="fb-dot">💡</span><div class="fb-text">La otra opción: '+e.fi+'</div></div>';
    if(e.ex){okHtml+='<div class="fb-example">📝 '+e.ex+'</div>';}
    if(e.tip){okHtml+='<div class="fb-tip"><strong>💡 Recuerda:</strong> '+e.tip+'</div>';}
    okHtml+='</div>';
    fbOk.innerHTML=okHtml;
    exDiv.appendChild(fbOk);

    const fbBad=document.createElement("div");
    fbBad.className="fb fb-bad";
    fbBad.id="fbbad-"+eid;
    let badHtml='<div class="fb-header"><span class="fb-icon">😕</span> No es correcto</div><div class="fb-body">';
    badHtml+='<div class="fb-row"><span class="fb-dot">❌</span><div class="fb-text"><span class="fb-wrong-reason">'+e.fi+'</span></div></div>';
    badHtml+='<div class="fb-row"><span class="fb-dot">✅</span><div class="fb-text">La respuesta correcta es <span class="fb-correct-answer">'+e.o[correctIdx]+'</span> — '+e.fc+'</div></div>';
    if(e.ex){badHtml+='<div class="fb-example">📝 '+e.ex+'</div>';}
    if(e.tip){badHtml+='<div class="fb-tip"><strong>💡 Recuerda:</strong> '+e.tip+'</div>';}
    badHtml+='</div>';
    fbBad.innerHTML=badHtml;
    exDiv.appendChild(fbBad);

    exSection.appendChild(exDiv);
  });

  const score=document.createElement("div");
  score.className="score-bar";
  score.innerHTML='<div class="num" id="sc-'+k+'">'+scores[k]+'/5</div><div class="lbl">Puntuación</div>';
  exSection.appendChild(score);

  card.appendChild(exSection);

  const area=document.getElementById("cardArea");
  area.innerHTML="";
  area.appendChild(card);

  // Restore previously answered
  s.exercises.forEach(function(e,i){
    const eid=k+"e"+i;
    if(answered[eid]){
      const ex=document.getElementById(eid);
      const btns=ex.querySelectorAll(".opt-btn");
      btns.forEach(function(b){b.disabled=true;});
      const userPick=answered[eid];
      const correctIdx=(e.a==="a"?0:1);
      if(userPick===e.a){
        ex.classList.add("correct");
        btns.forEach(function(b){if(b.textContent.indexOf(userPick+")")===0)b.classList.add("sel-ok");});
        document.getElementById("fbok-"+eid).classList.add("show");
      }else{
        ex.classList.add("incorrect");
        btns.forEach(function(b){
          if(b.textContent.indexOf(userPick+")")===0)b.classList.add("sel-bad");
          if(b.textContent.indexOf(e.a+")")===0)b.classList.add("show-ok");
        });
        document.getElementById("fbbad-"+eid).classList.add("show");
      }
    }
  });
}

function chk(eid,sel,correct,e,btn){
  if(answered[eid])return;
  answered[eid]=sel;
  const ex=document.getElementById(eid);
  const btns=ex.querySelectorAll(".opt-btn");
  btns.forEach(function(b){b.disabled=true;});
  const k=eid.match(/s\d+/)[0];
  if(sel===correct){
    ex.classList.add("correct");
    btns.forEach(function(b){if(b.textContent.indexOf(sel+")")===0)b.classList.add("sel-ok");});
    document.getElementById("fbok-"+eid).classList.add("show");
    scores[k]++;
  }else{
    ex.classList.add("incorrect");
    btns.forEach(function(b){
      if(b.textContent.indexOf(sel+")")===0)b.classList.add("sel-bad");
      if(b.textContent.indexOf(correct+")")===0)b.classList.add("show-ok");
    });
    document.getElementById("fbbad-"+eid).classList.add("show");
  }
  document.getElementById("sc-"+k).textContent=scores[k]+"/5";
  const allDone=[0,1,2,3,4].every(function(i){return answered[k+"e"+i];});
  if(allDone && curStep===4){
    setTimeout(function(){
      const sf=document.getElementById("summaryFinal");
      const sl=document.getElementById("summaryList");
      sl.innerHTML=DATA.summary.map(function(s){return "<li>"+s+"</li>";}).join("");
      sf.classList.add("show");
      sf.scrollIntoView({behavior:"smooth"});
    },600);
  }
}

renderStepTabs();renderCard();

</script>
</body>
