<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Fredoka:wght@400;500;600;700&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>

*{margin:0;padding:0;box-sizing:border-box}

.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin:.8rem 0}

.compare-card.esp{background:var(--ll);border:2px solid var(--lm)}
.compare-card.eng{background:var(--subj-bg);border:2px solid #90CAF9}
.compare-card h4{font-family:'Fredoka',sans-serif;font-size:.85rem;margin-bottom:.5rem}
.compare-card.esp h4{color:var(--ld)}
.compare-card.eng h4{color:var(--subj)}

.formula-box{background:var(--note-bg);border:2px solid var(--note-border);border-radius:12px;padding:1rem;margin:.8rem 0;text-align:center;font-family:'Fredoka',sans-serif;font-size:.95rem;color:var(--ld);line-height:1.8}

.illus{display:flex;align-items:center;justify-content:center;gap:.6rem;flex-wrap:wrap;background:var(--ll);border:1.5px solid var(--lm);border-radius:14px;padding:1rem;margin:0 0 1rem;font-size:2.1rem;line-height:1}

.tl-point .lbl{font-family:'Fredoka',sans-serif;font-size:.78rem;color:var(--ld);margin-top:2px;display:block}

.why-box{background:var(--ok-bg);border:1.5px solid #A5D6A7;border-radius:12px;padding:.8rem 1rem;margin:.8rem 0;font-size:.84rem}

.note-box .wt{font-family:'Fredoka',sans-serif;color:var(--ld);font-size:.85rem;margin-bottom:.25rem}
.ex-row{display:flex;align-items:flex-start;gap:.6rem;padding:.6rem .8rem;border-radius:10px;margin:.4rem 0;font-size:.88rem;transition:background .2s}
.ex-row:hover{background:var(--lglow)}

.ex-section{margin-top:1.2rem;padding-top:1rem;border-top:2px dashed var(--lm)}
.ex-section h3{font-family:'Fredoka',sans-serif;color:var(--ld);font-size:.9rem;margin-bottom:.8rem}
.exercise{background:#fafafa;border-radius:12px;padding:1rem;margin-bottom:.7rem;border:2px solid #eee;transition:.2s}
.exercise.correct{border-color:var(--ok);background:var(--ok-bg)}
.exercise.incorrect{border-color:var(--err);background:var(--err-bg)}

.opts{display:grid;grid-template-columns:1fr 1fr;gap:.4rem}
.opt-btn{padding:.65rem .5rem;border:2px solid #e0e0e0;border-radius:10px;background:var(--card);color:var(--text);font-size:.83rem;font-weight:600;cursor:pointer;transition:.15s;font-family:'Nunito',sans-serif;text-align:left}
.opt-btn:hover:not(:disabled){border-color:var(--lp);background:var(--ll)}

.opt-btn.sel-ok{background:var(--ok);color:#fff;border-color:var(--ok)}
.opt-btn.sel-bad{background:var(--err);color:#fff;border-color:var(--err)}
.opt-btn.show-ok{background:var(--ok);color:#fff;border-color:var(--ok)}
.fb{margin-top:.7rem;padding:0;border-radius:12px;font-size:.82rem;display:none;line-height:1.6;overflow:hidden}
.fb.show{display:block;animation:fbSlide .35s ease}
@keyframes fbSlide{from{opacity:0;max-height:0;transform:translateY(-8px)}to{opacity:1;max-height:500px;transform:translateY(0)}}
.fb-header{display:flex;align-items:center;gap:.5rem;padding:.7rem 1rem;font-family:'Fredoka',sans-serif;font-size:.85rem;font-weight:600}
.fb.fb-ok .fb-header{background:#C8E6C9;color:var(--ok)}

.fb-header .fb-icon{font-size:1.2rem}

.fb.fb-bad .fb-body{background:var(--err-bg)}
.fb-row{display:flex;align-items:flex-start;gap:.5rem;margin-bottom:.4rem}
.fb-row:last-child{margin-bottom:0}
.fb-row .fb-dot{font-size:.9rem;flex-shrink:0;margin-top:1px}
.fb-row .fb-text{flex:1}
.fb-row .fb-text strong{color:var(--text)}
.fb-correct-answer{color:var(--ok);font-weight:700}
.fb-wrong-reason{color:var(--err);font-weight:600}
.fb-example{display:inline-flex;align-items:center;gap:.3rem;margin-top:.3rem;padding:3px 10px;border-radius:6px;font-size:.78rem;font-weight:700}
.fb.fb-ok .fb-example{background:#A5D6A7;color:#1B5E20}
.fb.fb-bad .fb-example{background:#EF9A9A;color:#B71C1C}
.fb-tip{margin-top:.5rem;padding:.5rem .7rem;border-radius:8px;background:var(--note-bg);border:1px solid var(--note-border);font-size:.76rem;color:#6D4C00}
.fb-tip strong{color:var(--ld)}
.score-bar{text-align:center;padding:.8rem;background:var(--ll);border-radius:10px;margin-top:.8rem;border:1px solid var(--lm)}
.score-bar .num{font-family:'Fredoka',sans-serif;font-size:1.4rem;color:var(--ld)}
.score-bar .lbl{font-size:.7rem;color:var(--lp);font-weight:700;text-transform:uppercase;letter-spacing:1px}

.summary-final{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.6rem;margin-top:1rem;box-shadow:var(--shadow);border-top:3.5px solid var(--ok);display:none}
.summary-final.show{display:block}
.summary-final h3{font-family:'Fredoka',sans-serif;color:var(--ok);margin-bottom:.6rem}

@media(max-width:600px){.level-header h1{font-size:1.4rem}.card{padding:1.2rem}.compare-grid,.conj-grid,.viz-grid{grid-template-columns:1fr}.timeline{flex-direction:column}.tl-arrow{transform:rotate(90deg)}.opts{grid-template-columns:1fr}}

<div class="container">

<p class="subtitle">A2 · Module 7 · 5 pasos × 5 ejercicios</p>
</div>

</div>

<script>

let curStep=0;const scores={};const answered={};
const DATA={"summary": ["<b>WHEN:</b> conecta con un <b>momento</b> o una acción <b>corta/puntual</b>", "<b>WHILE:</b> conecta con una <b>acción larga</b> en progreso (duración)", "<b>WHEN + past simple, past continuous</b> — \"When he arrived, I was cooking\"", "<b>WHILE + past continuous, past simple</b> — \"While I was cooking, he arrived\"", "<b>WHILE + 2 past continuous</b> — acciones simultáneas en progreso", "<b>AS</b> funciona casi igual que WHILE (al mismo tiempo, a medida que)", "Tras coma inicial: \"When/While + clause, main clause\" — con coma"], "steps": [{"icon": "🇪🇸", "title": "Repaso en Español", "html": "<div class=\"illus\">⏰ 🔗 ⏳<div class=\"cap\">Conectar acciones en el tiempo</div></div><div class=\"section-label\">Paso 1</div>\n<div class=\"section-title\">Paso 1: 🇪🇸 Repaso en Español</div>\n<div class=\"section-desc\">En español usamos <b>\"cuando\"</b> y <b>\"mientras\"</b> para conectar acciones en el tiempo. La diferencia: \"cuando\" señala un momento puntual; \"mientras\" enfatiza la duración de una acción.</div>\n\n<div class=\"compare-grid\">\n<div class=\"compare-card esp\"><h4>🔹 \"CUANDO\" (momento)</h4><ul>\n<li><b>Cuando</b> llegó, yo comía</li>\n<li>Salí <b>cuando</b> sonó la alarma</li>\n<li><b>Cuando</b> era niño, vivía allá</li>\n</ul></div>\n<div class=\"compare-card esp\"><h4>🔸 \"MIENTRAS\" (duración)</h4><ul>\n<li><b>Mientras</b> comía, sonaba música</li>\n<li>Leé <b>mientras</b> él cocinaba</li>\n<li><b>Mientras</b> llovía, nosotros esperamos</li>\n</ul></div></div>\n\n<div class=\"section-label\">Punto vs duración</div><div class=\"viz-grid\"><div class=\"viz-item\"><span class=\"ico\">⚡</span><span class=\"lbl\">when</span><span class=\"es\">un punto / acción corta</span></div><div class=\"viz-item\"><span class=\"ico\">⏳</span><span class=\"lbl\">while</span><span class=\"es\">duración / en progreso</span></div><div class=\"viz-item\"><span class=\"ico\">🎬</span><span class=\"lbl\">while + was -ing</span><span class=\"es\">acción larga</span></div><div class=\"viz-item\"><span class=\"ico\">✅</span><span class=\"lbl\">when + past simple</span><span class=\"es\">acción corta</span></div></div><div class=\"ex-row\"><div class=\"icon\">⌛</div><div><div class=\"en\">\"Cuando sonó el teléfono, estaba en la ducha\" — el teléfono sonó un MOMENTO, yo estaba en medio de la ducha.</div><div class=\"es\">\"Cuando\" marca un punto en el tiempo</div></div></div>\n<div class=\"ex-row\"><div class=\"icon\">🔁</div><div><div class=\"en\">\"Mientras lavábamos los platos, escuchábamos música\" — ambas acciones eran largas y ocurrían al mismo tiempo.</div><div class=\"es\">\"Mientras\" enfatiza la duración simultánea</div></div></div>\n<div class=\"tip-card\"><strong>💡 Clave:</strong> Pregunta clave: ¿enfatizas UN MOMENTO específico (cuando) o UN PERÍODO de duración (mientras)? Esta lógica se traslada tal cual al inglés.</div>", "exercises": [{"q": "\"___ llegó a casa, yo ya estaba durmiendo.\"", "a": "a", "o": ["Cuando", "Mientras"], "fc": "\"Llegó\" es una acción puntual → se introduce con \"cuando\".", "fi": "\"Mientras llegó\" no suena natural; llegar es puntual, no duradero.", "ex": "When he arrived, I was already sleeping", "tip": "Cuando = momento puntual"}, {"q": "\"___ yo cocinaba, él ponía la mesa.\"", "a": "b", "o": ["Cuando", "Mientras"], "fc": "Ambas acciones son largas y simultáneas → \"mientras\".", "fi": "\"Cuando\" también es posible, pero \"mientras\" enfatiza mejor la simultaneidad.", "ex": "While I was cooking, he was setting the table", "tip": "Mientras = duración simultánea"}, {"q": "¿Cuál enfatiza más la DURACIÓN?", "a": "a", "o": ["Mientras", "Cuando"], "fc": "\"Mientras\" pone el foco en la extensión temporal de la acción.", "fi": "\"Cuando\" sugiere más un punto o cambio.", "tip": "Mientras → línea larga · Cuando → punto"}, {"q": "\"___ era niño, me gustaba nadar.\"", "a": "a", "o": ["Cuando", "Mientras"], "fc": "\"Era niño\" indica un periodo de vida, pero en español usamos \"cuando\" para contextos/etapas.", "fi": "\"Mientras era niño\" no es natural para hablar de una etapa de vida.", "ex": "When I was a child, I liked swimming", "tip": "Etapas de vida → cuando/when"}, {"q": "\"Leí un libro ___ esperaba el bus.\"", "a": "b", "o": ["cuando", "mientras"], "fc": "\"Esperar el bus\" es acción larga de fondo → \"mientras\".", "fi": "\"Cuando esperaba\" también existe, pero \"mientras\" es más natural para describir la acción de fondo larga.", "ex": "I read a book while I was waiting for the bus", "tip": "Acción de fondo larga → mientras/while"}]}, {"icon": "🤝", "title": "Similitudes", "html": "<div class=\"illus\">🇪🇸 cuando/mientras  🤝  🇬🇧 when/while<div class=\"cap\">Conectores temporales</div></div><div class=\"section-label\">Paso 2</div>\n<div class=\"section-title\">Paso 2: 🤝 Similitudes ESP ↔ ENG</div>\n<div class=\"section-desc\">El mapeo es directo: <b>cuando = when</b>, <b>mientras = while</b>. La lógica temporal es idéntica.</div>\n\n<table class=\"g-table\">\n<tr><th>Situación</th><th>🇪🇸 Español</th><th>🇬🇧 English</th></tr>\n<tr><td>Conectar momento</td><td>cuando</td><td><span class=\"g-quest\">when</span></td></tr>\n<tr><td>Conectar duración</td><td>mientras</td><td><span class=\"g-quest\">while</span></td></tr>\n<tr><td>Momento + acción larga</td><td>Cuando llegó, yo comía</td><td><span class=\"g-quest\">When</span> he arrived, I was eating</td></tr>\n<tr><td>Acción larga + momento</td><td>Mientras comía, llegó</td><td><span class=\"g-quest\">While</span> I was eating, he arrived</td></tr>\n<tr><td>Dos largas simultáneas</td><td>Mientras cocinaba, cantaba</td><td><span class=\"g-quest\">While</span> I was cooking, I was singing</td></tr>\n<tr><td>Posición flexible</td><td>Al inicio (con coma) o en medio</td><td>At the beginning (with comma) or middle</td></tr>\n</table>\n\n<div class=\"formula-box\" style=\"text-align:left;font-size:.88rem\">\n📝 Posición en la oración:<br>\n• <b>Al inicio:</b> <span class=\"g-quest\">When</span> he arrived<b>,</b> I was cooking. (con coma)<br>\n• <b>En medio:</b> I was cooking <span class=\"g-quest\">when</span> he arrived. (sin coma)\n</div>\n\n<div class=\"tip-card\"><strong>💡 Key similarity:</strong> La elección entre \"when\" y \"while\" en inglés sigue la misma lógica que \"cuando\" y \"mientras\" en español. Si dudas, traduce mentalmente.</div>", "exercises": [{"q": "\"___ I was a student, I lived in Lima.\"", "a": "a", "o": ["When", "While"], "fc": "\"Was a student\" es una etapa/contexto → se introduce con <b>when</b>.", "fi": "\"While\" enfatizaría duración progresiva, menos natural aquí.", "ex": "When I was a student, I lived in Lima → Cuando era estudiante, vivía en Lima", "tip": "When = cuando (estados/momentos)"}, {"q": "\"___ she was sleeping, the dog barked.\"", "a": "b", "o": ["When", "While"], "fc": "\"She was sleeping\" es acción larga de fondo → <b>while</b>.", "fi": "\"When\" se usa con acciones puntuales, no con larga de fondo.", "ex": "While she was sleeping, the dog barked", "tip": "Larga de fondo → while"}, {"q": "\"I was reading ___ the phone rang.\"", "a": "a", "o": ["when", "while"], "fc": "\"The phone rang\" es puntual → <b>when</b>.", "fi": "\"While the phone rang\" no es natural; sonar es puntual.", "ex": "I was reading when the phone rang", "tip": "Puntual → when"}, {"q": "\"___ we were walking in the park, it started to rain.\"", "a": "b", "o": ["When", "While"], "fc": "\"We were walking\" = acción larga en progreso → <b>while</b> es la opción natural.", "fi": "\"When we were walking\" es posible pero con past continuous el estándar es \"while\".", "ex": "While we were walking in the park, it started to rain", "tip": "While + past continuous (acción larga)"}, {"q": "¿Dónde va la coma cuando \"when/while\" empieza la oración?", "a": "b", "o": ["No lleva coma", "Después de la cláusula with when/while"], "fc": "\"When/While + cláusula<b>,</b> + main clause\". Coma al final de la primera cláusula.", "fi": "Sí lleva coma, es obligatorio en escritura formal.", "ex": "When he arrived, I was cooking. · While I was cooking, he arrived.", "tip": "Inicio con when/while → siempre coma"}]}, {"icon": "⚡", "title": "Diferencias", "html": "<div class=\"illus\">⚡ when  ⏳ while<div class=\"cap\">Punto vs duración</div></div><div class=\"section-label\">Paso 3</div>\n<div class=\"section-title\">Paso 3: ⚡ Diferencias Importantes</div>\n<div class=\"section-desc\">Las trampas donde los estudiantes suelen confundir when y while.</div>\n\n<table class=\"g-table\">\n<tr><th>Situación</th><th>🔹 WHEN</th><th>🔸 WHILE</th></tr>\n<tr><td>Acción puntual/corta</td><td>✅ When he <span class=\"g-verb\">called</span>...</td><td>❌ No natural</td></tr>\n<tr><td>Acción larga en progreso</td><td>⚠️ Posible pero menos común</td><td>✅ While he <span class=\"g-verb\">was working</span>...</td></tr>\n<tr><td>Estado o etapa de vida</td><td>✅ When I <span class=\"g-verb\">was a child</span>...</td><td>❌ No se usa</td></tr>\n<tr><td>2 acciones simultáneas largas</td><td>❌ No natural</td><td>✅ While I cooked, she read</td></tr>\n<tr><td>Secuencia rápida</td><td>✅ When the bell rang, we left</td><td>❌ No aplica</td></tr>\n</table>\n\n<div class=\"eg-card\"><span class=\"badge good\">✅ Bien</span><div class=\"eg-en\"><b>While</b> I was cooking, he <b>arrived</b>.</div><div class=\"eg-es\">Mientras cocinaba, él llegó.</div></div><div class=\"eg-card\"><span class=\"badge bad\">❌ Mal</span><div class=\"eg-en\"><b>When</b> I was cooking all evening...</div><div class=\"eg-es\">(acción larga → while)</div></div><div class=\"alert-card\"><div class=\"atitle\">⚠️ Trampa clásica</div>\n<p>Con verbos de ESTADO (be, know, live, have) casi siempre usamos <b>when</b>, nunca <b>while</b>:<br>\n❌ \"While I was a child...\" → ✅ \"<b>When</b> I was a child...\"<br>\n❌ \"While I knew him...\" → ✅ \"<b>When</b> I knew him...\"<br>\n❌ \"While they lived in Paris...\" → ✅ \"<b>When</b> they lived in Paris...\"</p></div>\n\n<div class=\"ex-row ex-wrong\"><div class=\"icon\">❌</div><div><div class=\"en\">While I was young, I played football.</div><div class=\"es\">\"Ser joven\" es estado → with \"when\"</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">✅</div><div><div class=\"en\"><span class=\"g-quest\">When</span> I was young, I played football.</div><div class=\"es\">Cuando era joven, jugaba fútbol.</div></div></div>\n<div class=\"ex-row ex-wrong\"><div class=\"icon\">❌</div><div><div class=\"en\">When I was cooking, I was listening to music.</div><div class=\"es\">2 largas simultáneas → \"while\"</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">✅</div><div><div class=\"en\"><span class=\"g-quest\">While</span> I was cooking, I was listening to music.</div><div class=\"es\">Mientras cocinaba, escuchaba música.</div></div></div>", "exercises": [{"q": "\"___ I was a child, we had a dog.\"", "a": "a", "o": ["When", "While"], "fc": "Estado de vida (\"was a child\") → <b>when</b>.", "fi": "\"While I was a child\" no es natural con estados.", "ex": "When I was a child, we had a dog → Cuando era niño, teníamos un perro", "tip": "Estados/etapas → when"}, {"q": "\"___ she was studying, I was cleaning.\"", "a": "b", "o": ["When", "While"], "fc": "Dos acciones largas simultáneas → <b>while</b>.", "fi": "\"When\" no es natural para acciones simultáneas largas.", "ex": "While she was studying, I was cleaning", "tip": "2 largas simultáneas → while"}, {"q": "\"___ the phone rang, she answered immediately.\"", "a": "a", "o": ["When", "While"], "fc": "\"Rang\" es acción puntual (sonar una vez) → <b>when</b>.", "fi": "\"While the phone rang\" no es natural; sonar es momentáneo, no una duración larga.", "ex": "When the phone rang, she answered immediately", "tip": "Acción puntual (ring, knock, hear) → when"}, {"q": "\"___ I heard the noise, I ran out.\"", "a": "a", "o": ["When", "While"], "fc": "\"Heard the noise\" es puntual → <b>when</b>.", "fi": "\"While\" con acciones puntuales no es natural.", "ex": "When I heard the noise, I ran out", "tip": "Percepciones puntuales (hear, see) → when"}, {"q": "\"___ she was cooking dinner, I was setting the table.\"", "a": "b", "o": ["When", "While"], "fc": "Dos acciones largas simultáneas (was cooking + was setting) → <b>while</b>.", "fi": "\"When\" no captura la simultaneidad de dos acciones en progreso.", "ex": "While she was cooking dinner, I was setting the table", "tip": "2 past continuous simultáneos → while"}]}, {"icon": "💡", "title": "Consejos", "html": "<div class=\"illus\">🕐 🎬 💡<div class=\"cap\">Combinar con los pasados</div></div><div class=\"section-label\">Paso 4</div>\n<div class=\"section-title\">Paso 4: 💡 Consejos Prácticos</div>\n\n<div class=\"tip-card\"><strong>Tip 1 — La regla del \"tipo de acción\":</strong> Si el verbo tras el conector es <b>past simple</b>, generalmente es <b>when</b>. Si es <b>past continuous</b>, generalmente es <b>while</b>.</div>\n<div class=\"tip-card\"><strong>Tip 2 — Estados SIEMPRE con when:</strong> be, know, live, have, like, understand → \"When I was...\", \"When I knew...\", \"When we lived...\". Nunca \"While I was a child\".</div>\n<div class=\"tip-card\"><strong>Tip 3 — Coma al inicio:</strong> Si empiezas la oración con when/while + cláusula, pon coma al terminar esa cláusula. \"When he arrived<b>,</b> I left\". Si va en medio, sin coma.</div>\n<div class=\"tip-card\"><strong>Tip 4 — AS como sustituto de WHILE:</strong> \"As I was walking home...\" = \"While I was walking home...\". \"As\" es más formal/literario pero intercambiable con while en past continuous.</div>\n\n<div class=\"formula-box\">\n🔹 <span class=\"g-quest\">WHEN</span> + past simple · <span class=\"g-verb\">acción puntual</span><br>\n🔸 <span class=\"g-quest\">WHILE</span> + past continuous · <span class=\"g-verb\">acción larga</span><br>\n🎯 Combo: <span class=\"g-quest\">While</span> + past cont., past simple<br>\n🎯 Combo: <span class=\"g-quest\">When</span> + past simple, past cont.\n</div>\n\n<table class=\"g-table\">\n<tr><th>Conector</th><th>Suele ir con</th><th>Ejemplo</th></tr>\n<tr><td><b>When</b></td><td>Past simple (puntual/estado)</td><td>When she <b>arrived</b>...</td></tr>\n<tr><td><b>While</b></td><td>Past continuous (larga)</td><td>While he <b>was reading</b>...</td></tr>\n<tr><td><b>As</b></td><td>Past continuous (= while)</td><td>As I <b>was leaving</b>...</td></tr>\n<tr><td><b>Just as</b></td><td>Simultaneidad exacta</td><td>Just as I <b>opened</b> the door, it rang</td></tr>\n<tr><td><b>The moment</b></td><td>Instante preciso</td><td>The moment he <b>saw</b> her, he smiled</td></tr>\n</table>", "exercises": [{"q": "\"___ she heard the news, she cried.\"", "a": "a", "o": ["When", "While"], "fc": "\"Heard\" es acción puntual → <b>when</b>.", "fi": "\"While she heard\" no es natural; oír es momentáneo.", "ex": "When she heard the news, she cried", "tip": "Puntual + emoción → when"}, {"q": "\"___ my brother was playing, I was studying.\"", "a": "b", "o": ["When", "While"], "fc": "Dos acciones largas simultáneas → <b>while</b>.", "fi": "\"When\" no captura la simultaneidad prolongada.", "ex": "While my brother was playing, I was studying", "tip": "2 largas = while"}, {"q": "\"___ I lived in Paris, I learned French.\"", "a": "a", "o": ["When", "While"], "fc": "\"Lived\" = estado/período de vida → <b>when</b>.", "fi": "\"While I lived\" no es natural con verbos de estado como \"live\".", "ex": "When I lived in Paris, I learned French", "tip": "Live (vivir) = estado → when"}, {"q": "\"The bell rang ___ I was writing.\"", "a": "b", "o": ["when", "while"], "fc": "\"Was writing\" = acción larga → <b>while</b> es más natural.", "fi": "\"When I was writing\" también existe pero \"while\" prefiere con past cont.", "ex": "The bell rang while I was writing", "tip": "while + past cont."}, {"q": "¿Es correcto decir \"While I was a teenager...\"?", "a": "b", "o": ["Sí, es correcto", "No, debe ser When"], "fc": "\"Was a teenager\" es estado/etapa → obligatorio <b>when</b>.", "fi": "\"While\" no se usa con estados ni etapas de vida.", "ex": "When I was a teenager, I played basketball", "tip": "Etapas de vida → siempre when"}]}, {"icon": "✨", "title": "Práctica Final", "html": "<div class=\"illus\">📖 ✅ ❌<div class=\"cap\">Ordena la secuencia temporal</div></div><div class=\"section-label\">Paso 5</div>\n<div class=\"section-title\">Paso 5: ✨ Práctica Final</div>\n<div class=\"section-desc\">Aplica when/while en todos los patrones aprendidos.</div>\n\n<div class=\"formula-box\">\n🔹 <span class=\"g-quest\">WHEN</span> + past simple → momento / acción puntual / estado<br>\n🔸 <span class=\"g-quest\">WHILE</span> + past continuous → duración / acción larga / simultáneas<br>\n📝 Coma solo si empieza con when/while al inicio\n</div>\n\n<div class=\"ex-row ex-right\"><div class=\"icon\">📞</div><div><div class=\"en\"><span class=\"g-quest\">When</span> the phone <span class=\"g-verb\">rang</span>, I <span class=\"g-verb\">was having</span> dinner.</div><div class=\"es\">Cuando sonó el teléfono, estaba cenando.</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">🍳</div><div><div class=\"en\"><span class=\"g-quest\">While</span> I <span class=\"g-verb\">was cooking</span>, my sister <span class=\"g-verb\">was setting</span> the table.</div><div class=\"es\">Mientras cocinaba, mi hermana ponía la mesa.</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">🎓</div><div><div class=\"en\"><span class=\"g-quest\">When</span> I <span class=\"g-verb\">was</span> a student, I <span class=\"g-verb\">lived</span> with my parents.</div><div class=\"es\">Cuando era estudiante, vivía con mis padres.</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">🎬</div><div><div class=\"en\">We <span class=\"g-verb\">were watching</span> a movie <span class=\"g-quest\">when</span> the lights <span class=\"g-verb\">went out</span>.</div><div class=\"es\">Veíamos una peli cuando se fue la luz. (when en medio → sin coma)</div></div></div>\n\n<div class=\"alert-card\"><div class=\"atitle\">⚠️ Errores Comunes</div><p>\n❌ \"While I was young\" → ✅ \"<b>When</b> I was young\" (estado)<br>\n❌ \"When I was cooking, I was singing\" → ✅ \"<b>While</b> I was cooking, I was singing\" (2 largas)<br>\n❌ \"When he arrived I was cooking\" → ✅ \"When he arrived<b>,</b> I was cooking\" (coma)<br>\n❌ \"While the bell rang\" → ✅ \"<b>When</b> the bell rang\" (puntual)\n</p></div>", "exercises": [{"q": "\"___ we arrived at the restaurant, our friends were waiting.\"", "a": "a", "o": ["When", "While"], "fc": "\"Arrived\" es acción puntual → <b>when</b>.", "fi": "\"While we arrived\" no es natural; llegar es momentáneo.", "ex": "When we arrived, our friends were waiting", "tip": "Llegar = puntual → when"}, {"q": "\"I found my keys ___ I was cleaning my room.\"", "a": "b", "o": ["when", "while"], "fc": "\"Was cleaning\" = acción larga de fondo → <b>while</b>.", "fi": "\"When I was cleaning\" también existe, pero \"while\" es más natural para la acción larga.", "ex": "I found my keys while I was cleaning my room", "tip": "Acción larga de fondo → while"}, {"q": "\"___ the teacher explained the lesson, students took notes.\"", "a": "b", "o": ["When", "While"], "fc": "Aquí ambas acciones tienen duración simultánea → <b>while</b>.", "fi": "\"When\" suena más secuencial; \"while\" captura la simultaneidad.", "ex": "While the teacher explained, students took notes", "tip": "Simultaneidad → while"}, {"q": "\"___ he saw her, he knew it was love.\"", "a": "a", "o": ["When", "While"], "fc": "\"Saw\" es puntual + \"knew\" es estado → <b>when</b>.", "fi": "\"While he saw\" no es natural con percepciones puntuales.", "ex": "When he saw her, he knew it was love", "tip": "Percepción puntual + estado → when"}, {"q": "\"She was driving ___ she got a flat tire.\"", "a": "a", "o": ["when", "while"], "fc": "\"Got a flat tire\" es puntual → <b>when</b>. \"Was driving\" es la acción larga de fondo.", "fi": "\"While she got\" no es natural; pinchar es momentáneo.", "ex": "She was driving when she got a flat tire", "tip": "Larga (background) + when + puntual"}]}]};
function renderStepTabs(){
  const c=document.getElementById("stepTabs");c.innerHTML="";
  DATA.steps.forEach(function(s,i){
    const b=document.createElement("button");
    b.className="step-tab"+(i===curStep?" active":"");
    const k="s"+i;
    if(scores[k]!==undefined && answered["s"+i+"e0"] && answered["s"+i+"e1"] && answered["s"+i+"e2"] && answered["s"+i+"e3"] && answered["s"+i+"e4"] && i!==curStep){b.classList.add("done");}
    b.textContent=(i+1)+". "+s.icon+" "+s.title;
    b.addEventListener("click",function(){curStep=i;renderStepTabs();renderCard();document.getElementById("summaryFinal").classList.remove("show");});
    c.appendChild(b);
  });
}

function renderCard(){
  const s=DATA.steps[curStep];
  const k="s"+curStep;
  if(scores[k]===undefined)scores[k]=0;
  const card=document.createElement("div");
  card.className="card active";
  card.innerHTML=s.html;

  const exSection=document.createElement("div");
  exSection.className="ex-section";
  const h3=document.createElement("h3");
  h3.textContent="✏️ Ejercicios — "+s.title;
  exSection.appendChild(h3);

  s.exercises.forEach(function(e,i){
    const eid=k+"e"+i;
    const exDiv=document.createElement("div");
    exDiv.className="exercise";
    exDiv.id=eid;

    const q=document.createElement("div");
    q.className="exercise-q";
    q.innerHTML=(i+1)+". "+e.q;
    exDiv.appendChild(q);

    const opts=document.createElement("div");
    opts.className="opts";
    ["a","b"].forEach(function(letter,idx){
      const btn=document.createElement("button");
      btn.className="opt-btn";
      btn.textContent=letter+") "+e.o[idx];
      btn.addEventListener("click",function(){chk(eid,letter,e.a,e,btn);});
      opts.appendChild(btn);
    });
    exDiv.appendChild(opts);

    const correctIdx=(e.a==="a"?0:1);
    const wrongIdx=(e.a==="a"?1:0);

    const fbOk=document.createElement("div");
    fbOk.className="fb fb-ok";
    fbOk.id="fbok-"+eid;
    let okHtml='<div class="fb-header"><span class="fb-icon">🎉</span> ¡Correcto!</div><div class="fb-body">';
    okHtml+='<div class="fb-row"><span class="fb-dot">✅</span><div class="fb-text"><span class="fb-correct-answer">'+e.o[correctIdx]+'</span> — '+e.fc+'</div></div>';
    okHtml+='<div class="fb-row"><span class="fb-dot">💡</span><div class="fb-text">La otra opción: '+e.fi+'</div></div>';
    if(e.ex){okHtml+='<div class="fb-example">📝 '+e.ex+'</div>';}
    if(e.tip){okHtml+='<div class="fb-tip"><strong>💡 Recuerda:</strong> '+e.tip+'</div>';}
    okHtml+='</div>';
    fbOk.innerHTML=okHtml;
    exDiv.appendChild(fbOk);

    const fbBad=document.createElement("div");
    fbBad.className="fb fb-bad";
    fbBad.id="fbbad-"+eid;
    let badHtml='<div class="fb-header"><span class="fb-icon">😕</span> No es correcto</div><div class="fb-body">';
    badHtml+='<div class="fb-row"><span class="fb-dot">❌</span><div class="fb-text"><span class="fb-wrong-reason">'+e.fi+'</span></div></div>';
    badHtml+='<div class="fb-row"><span class="fb-dot">✅</span><div class="fb-text">La respuesta correcta es <span class="fb-correct-answer">'+e.o[correctIdx]+'</span> — '+e.fc+'</div></div>';
    if(e.ex){badHtml+='<div class="fb-example">📝 '+e.ex+'</div>';}
    if(e.tip){badHtml+='<div class="fb-tip"><strong>💡 Recuerda:</strong> '+e.tip+'</div>';}
    badHtml+='</div>';
    fbBad.innerHTML=badHtml;
    exDiv.appendChild(fbBad);

    exSection.appendChild(exDiv);
  });

  const score=document.createElement("div");
  score.className="score-bar";
  score.innerHTML='<div class="num" id="sc-'+k+'">'+scores[k]+'/5</div><div class="lbl">Puntuación</div>';
  exSection.appendChild(score);

  card.appendChild(exSection);

  const area=document.getElementById("cardArea");
  area.innerHTML="";
  area.appendChild(card);

  // Restore previously answered
  s.exercises.forEach(function(e,i){
    const eid=k+"e"+i;
    if(answered[eid]){
      const ex=document.getElementById(eid);
      const btns=ex.querySelectorAll(".opt-btn");
      btns.forEach(function(b){b.disabled=true;});
      const userPick=answered[eid];
      const correctIdx=(e.a==="a"?0:1);
      if(userPick===e.a){
        ex.classList.add("correct");
        btns.forEach(function(b){if(b.textContent.indexOf(userPick+")")===0)b.classList.add("sel-ok");});
        document.getElementById("fbok-"+eid).classList.add("show");
      }else{
        ex.classList.add("incorrect");
        btns.forEach(function(b){
          if(b.textContent.indexOf(userPick+")")===0)b.classList.add("sel-bad");
          if(b.textContent.indexOf(e.a+")")===0)b.classList.add("show-ok");
        });
        document.getElementById("fbbad-"+eid).classList.add("show");
      }
    }
  });
}

function chk(eid,sel,correct,e,btn){
  if(answered[eid])return;
  answered[eid]=sel;
  const ex=document.getElementById(eid);
  const btns=ex.querySelectorAll(".opt-btn");
  btns.forEach(function(b){b.disabled=true;});
  const k=eid.match(/s\d+/)[0];
  if(sel===correct){
    ex.classList.add("correct");
    btns.forEach(function(b){if(b.textContent.indexOf(sel+")")===0)b.classList.add("sel-ok");});
    document.getElementById("fbok-"+eid).classList.add("show");
    scores[k]++;
  }else{
    ex.classList.add("incorrect");
    btns.forEach(function(b){
      if(b.textContent.indexOf(sel+")")===0)b.classList.add("sel-bad");
      if(b.textContent.indexOf(correct+")")===0)b.classList.add("show-ok");
    });
    document.getElementById("fbbad-"+eid).classList.add("show");
  }
  document.getElementById("sc-"+k).textContent=scores[k]+"/5";
  const allDone=[0,1,2,3,4].every(function(i){return answered[k+"e"+i];});
  if(allDone && curStep===4){
    setTimeout(function(){
      const sf=document.getElementById("summaryFinal");
      const sl=document.getElementById("summaryList");
      sl.innerHTML=DATA.summary.map(function(s){return "<li>"+s+"</li>";}).join("");
      var tot=0;Object.keys(scores).forEach(function(kk){tot+=scores[kk];});var ts=document.getElementById("totalScore");if(ts)ts.innerHTML="<div class=\"big\">"+tot+"/25</div><div class=\"small\">Total de aciertos</div>";
      sf.classList.add("show");
      sf.scrollIntoView({behavior:"smooth"});
    },600);
  }
}

renderStepTabs();renderCard();
