<style>
:root{
--bg:#FAFAF6;--card:#fff;--text:#2A2A2A;--text-soft:#777;--border:#E8E5DC;
--shadow:0 3px 16px rgba(0,0,0,.06);--radius:14px;
--lp:#4CAF50;--ld:#1B5E20;--ll:#E8F5E9;--lm:#C8E6C9;
--lg:linear-gradient(135deg,#388E3C,#4CAF50);--lglow:rgba(76,175,80,.15);
--badge-text:#1A3D1C;
--subj:#1565C0;--subj-bg:#E3F2FD;

--comp:#00897B;--comp-bg:#E0F2F1;

--quest:#7B1FA2;--quest-bg:#F3E5F5;
--ok:#2E7D32;--ok-bg:#E8F5E9;

}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;padding:1.5rem 1rem;-webkit-font-smoothing:antialiased}
.container{max-width:780px;margin:0 auto}

.level-header{text-align:center;padding:2rem;border-radius:20px;color:#fff;position:relative;overflow:hidden;margin-bottom:1.2rem;background:var(--lg)}
.level-header::before{content:'';position:absolute;top:-40%;right:-15%;width:250px;height:250px;background:rgba(255,255,255,.1);border-radius:50%}
.level-header h1{font-family:'Fredoka',sans-serif;font-size:1.8rem;font-weight:600;position:relative;z-index:1}
.level-header .module-name{font-family:'Fredoka',sans-serif;font-size:1.1rem;font-weight:500;opacity:.95;position:relative;z-index:1;margin-top:.2rem}
.level-header .subtitle{opacity:.85;font-size:.85rem;position:relative;z-index:1;margin-top:.15rem}
.level-badge{display:inline-flex;align-items:center;gap:6px;font-size:.7rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;background:var(--ll);color:var(--badge-text);padding:4px 12px;border-radius:20px;border:1.5px solid var(--lm);margin-bottom:.8rem}

.step-tabs{display:flex;gap:.35rem;margin-bottom:1rem;flex-wrap:wrap}
.step-tab{padding:.45rem .85rem;border-radius:8px;font-size:.78rem;font-weight:700;cursor:pointer;border:2px solid var(--border);background:var(--card);transition:.2s;font-family:'Nunito',sans-serif}
.step-tab:hover{background:var(--ll)}
.step-tab.active{background:var(--ll);border-color:var(--lp);color:var(--ld)}
.step-tab.done{background:var(--ok-bg);border-color:var(--ok);color:var(--ok)}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.6rem;margin-bottom:1.2rem;box-shadow:var(--shadow);border-top:3.5px solid var(--lp);display:none}
.card.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.section-label{display:flex;align-items:center;gap:.5rem;font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--ld);margin-bottom:.3rem}
.section-label::before{content:'';width:20px;height:3px;background:var(--lp);border-radius:2px}
.section-title{font-family:'Fredoka',sans-serif;font-size:1.25rem;font-weight:600;margin-bottom:.1rem}
.section-desc{font-size:.85rem;color:var(--text-soft);margin-bottom:1rem}

.g-subj{background:var(--subj-bg);color:var(--subj);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--subj)}
.g-verb{background:var(--verb-bg);color:var(--verb);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--verb)}
.g-comp{background:var(--comp-bg);color:var(--comp);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--comp)}
.g-neg{background:var(--neg-bg);color:var(--neg);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--neg)}
.g-quest{background:var(--quest-bg);color:var(--quest);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--quest)}

.g-table{width:100%;border-collapse:separate;border-spacing:0;margin:.8rem 0;border-radius:10px;overflow:hidden;font-size:.83rem;border:1px solid var(--border)}
.g-table th{background:var(--lg);color:#fff;padding:.65rem .6rem;font-size:.7rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
.g-table td{padding:.6rem;border-bottom:1px solid #f0f0f0;vertical-align:middle}
.g-table tr:nth-child(even) td{background:var(--ll)}
.g-table tr:last-child td{border-bottom:none}

.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin:.8rem 0}
.compare-card{padding:1rem;border-radius:12px;text-align:center}
.compare-card.esp{background:var(--ll);border:2px solid var(--lm)}
.compare-card.eng{background:var(--subj-bg);border:2px solid #90CAF9}
.compare-card h4{font-family:'Fredoka',sans-serif;font-size:.85rem;margin-bottom:.5rem}
.compare-card.esp h4{color:var(--ld)}
.compare-card.eng h4{color:var(--subj)}
.compare-card ul{list-style:none;font-size:.82rem;color:var(--text-soft)}
.compare-card li{padding:2px 0}

.formula-box{background:var(--note-bg);border:2px solid var(--note-border);border-radius:12px;padding:1rem;margin:.8rem 0;text-align:center;font-family:'Fredoka',sans-serif;font-size:.95rem;color:var(--ld);line-height:1.8}
.tip-card{background:var(--ll);border-radius:10px;padding:.8rem 1rem;margin:.5rem 0;font-size:.83rem;border-left:3px solid var(--lp)}
.tip-card strong{color:var(--ld)}
.alert-card{background:var(--err-bg);border:2px solid #EF5350;border-radius:10px;padding:.8rem 1rem;margin:.8rem 0}
.alert-card .atitle{font-family:'Fredoka',sans-serif;color:var(--err);font-size:.82rem;margin-bottom:.3rem}
.alert-card p{font-size:.82rem;color:var(--text-soft);line-height:1.5}

.ex-row{display:flex;align-items:flex-start;gap:.6rem;padding:.6rem .8rem;border-radius:10px;margin:.4rem 0;font-size:.88rem;transition:background .2s}
.ex-row:hover{background:var(--lglow)}
.ex-row .icon{font-size:1.2rem;flex-shrink:0;line-height:1.4}
.ex-row .en{font-weight:700;color:var(--text)}
.ex-row .es{font-family:'Lora',serif;font-style:italic;font-size:.82rem;color:var(--text-soft);margin-top:1px}
.ex-right{border-left:3px solid var(--ok);background:var(--ok-bg)}
.ex-wrong{border-left:3px solid var(--err);background:var(--err-bg)}

.conj-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem;margin:.8rem 0}
.conj-item{padding:.6rem;border-radius:10px;text-align:center;background:var(--card);border:1.5px solid var(--border)}
.conj-item .pron{font-size:.75rem;color:var(--subj);font-weight:800}
.conj-item .vrb{font-family:'Fredoka',sans-serif;font-size:1.05rem;color:var(--verb)}
.conj-item .meaning{font-size:.65rem;color:var(--text-soft)}

.ex-section{margin-top:1.2rem;padding-top:1rem;border-top:2px dashed var(--lm)}
.ex-section h3{font-family:'Fredoka',sans-serif;color:var(--ld);font-size:.9rem;margin-bottom:.8rem}
.exercise{background:#fafafa;border-radius:12px;padding:1rem;margin-bottom:.7rem;border:2px solid #eee;transition:.2s}
.exercise.correct{border-color:var(--ok);background:var(--ok-bg)}
.exercise.incorrect{border-color:var(--err);background:var(--err-bg)}
.exercise-q{font-size:.88rem;margin-bottom:.7rem;line-height:1.4}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:.4rem}
.opt-btn{padding:.65rem .5rem;border:2px solid #e0e0e0;border-radius:10px;background:var(--card);color:var(--text);font-size:.83rem;font-weight:600;cursor:pointer;transition:.15s;font-family:'Nunito',sans-serif;text-align:left}
.opt-btn:hover:not(:disabled){border-color:var(--lp);background:var(--ll)}
.opt-btn:disabled{cursor:not-allowed;opacity:.85}
.opt-btn.sel-ok{background:var(--ok);color:#fff;border-color:var(--ok)}
.opt-btn.sel-bad{background:var(--err);color:#fff;border-color:var(--err)}
.opt-btn.show-ok{background:var(--ok);color:#fff;border-color:var(--ok)}
.fb{margin-top:.7rem;padding:0;border-radius:12px;font-size:.82rem;display:none;line-height:1.6;overflow:hidden}
.fb.show{display:block;animation:fbSlide .35s ease}
@keyframes fbSlide{from{opacity:0;max-height:0;transform:translateY(-8px)}to{opacity:1;max-height:500px;transform:translateY(0)}}
.fb-header{display:flex;align-items:center;gap:.5rem;padding:.7rem 1rem;font-family:'Fredoka',sans-serif;font-size:.85rem;font-weight:600}
.fb.fb-ok .fb-header{background:#C8E6C9;color:var(--ok)}
.fb.fb-bad .fb-header{background:#FFCDD2;color:var(--err)}
.fb-header .fb-icon{font-size:1.2rem}
.fb-body{padding:.8rem 1rem}
.fb.fb-ok .fb-body{background:var(--ok-bg)}
.fb.fb-bad .fb-body{background:var(--err-bg)}
.fb-row{display:flex;align-items:flex-start;gap:.5rem;margin-bottom:.4rem}
.fb-row:last-child{margin-bottom:0}
.fb-row .fb-dot{font-size:.9rem;flex-shrink:0;margin-top:1px}
.fb-row .fb-text{flex:1}
.fb-row .fb-text strong{color:var(--text)}
.fb-correct-answer{color:var(--ok);font-weight:700}
.fb-wrong-reason{color:var(--err);font-weight:600}
.fb-example{display:inline-flex;align-items:center;gap:.3rem;margin-top:.3rem;padding:3px 10px;border-radius:6px;font-size:.78rem;font-weight:700}
.fb.fb-ok .fb-example{background:#A5D6A7;color:#1B5E20}
.fb.fb-bad .fb-example{background:#EF9A9A;color:#B71C1C}
.fb-tip{margin-top:.5rem;padding:.5rem .7rem;border-radius:8px;background:var(--note-bg);border:1px solid var(--note-border);font-size:.76rem;color:#6D4C00}
.fb-tip strong{color:var(--ld)}
.score-bar{text-align:center;padding:.8rem;background:var(--ll);border-radius:10px;margin-top:.8rem;border:1px solid var(--lm)}
.score-bar .num{font-family:'Fredoka',sans-serif;font-size:1.4rem;color:var(--ld)}
.score-bar .lbl{font-size:.7rem;color:var(--lp);font-weight:700;text-transform:uppercase;letter-spacing:1px}

.summary-final{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.6rem;margin-top:1rem;box-shadow:var(--shadow);border-top:3.5px solid var(--ok);display:none}
.summary-final.show{display:block}
.summary-final h3{font-family:'Fredoka',sans-serif;color:var(--ok);margin-bottom:.6rem}
.summary-final ul{list-style:none}
.summary-final li{padding:4px 0 4px 22px;position:relative;font-size:.83rem;color:var(--text-soft);line-height:1.6}
.summary-final li:before{content:"\2713";position:absolute;left:0;color:var(--lp);font-weight:700}

@media(max-width:600px){.level-header h1{font-size:1.4rem}.card{padding:1.2rem}.compare-grid,.conj-grid{grid-template-columns:1fr}.opts{grid-template-columns:1fr}}
</style>

<script>

let curStep=0;const scores={};const answered={};
const DATA={"summary": ["<b>WHEN:</b> conecta con un <b>momento</b> o una acci\u00f3n <b>corta/puntual</b>", "<b>WHILE:</b> conecta con una <b>acci\u00f3n larga</b> en progreso (duraci\u00f3n)", "<b>WHEN + past simple, past continuous</b> \u2014 \"When he arrived, I was cooking\"", "<b>WHILE + past continuous, past simple</b> \u2014 \"While I was cooking, he arrived\"", "<b>WHILE + 2 past continuous</b> \u2014 acciones simult\u00e1neas en progreso", "<b>AS</b> funciona casi igual que WHILE (al mismo tiempo, a medida que)", "Tras coma inicial: \"When/While + clause, main clause\" \u2014 con coma"], "steps": [{"icon": "\ud83c\uddea\ud83c\uddf8", "title": "Repaso en Espa\u00f1ol", "html": "<div class=\"section-label\">Paso 1</div>\n<div class=\"section-title\">Paso 1: \ud83c\uddea\ud83c\uddf8 Repaso en Espa\u00f1ol</div>\n<div class=\"section-desc\">En espa\u00f1ol usamos <b>\"cuando\"</b> y <b>\"mientras\"</b> para conectar acciones en el tiempo. La diferencia: \"cuando\" se\u00f1ala un momento puntual; \"mientras\" enfatiza la duraci\u00f3n de una acci\u00f3n.</div>\n\n<div class=\"compare-grid\">\n<div class=\"compare-card esp\"><h4>\ud83d\udd39 \"CUANDO\" (momento)</h4><ul>\n<li><b>Cuando</b> lleg\u00f3, yo com\u00eda</li>\n<li>Sal\u00ed <b>cuando</b> son\u00f3 la alarma</li>\n<li><b>Cuando</b> era ni\u00f1o, viv\u00eda all\u00e1</li>\n</ul></div>\n<div class=\"compare-card esp\"><h4>\ud83d\udd38 \"MIENTRAS\" (duraci\u00f3n)</h4><ul>\n<li><b>Mientras</b> com\u00eda, sonaba m\u00fasica</li>\n<li>Le\u00e9 <b>mientras</b> \u00e9l cocinaba</li>\n<li><b>Mientras</b> llov\u00eda, nosotros esperamos</li>\n</ul></div></div>\n\n<div class=\"ex-row\"><div class=\"icon\">\u231b</div><div><div class=\"en\">\"Cuando son\u00f3 el tel\u00e9fono, estaba en la ducha\" \u2014 el tel\u00e9fono son\u00f3 un MOMENTO, yo estaba en medio de la ducha.</div><div class=\"es\">\"Cuando\" marca un punto en el tiempo</div></div></div>\n<div class=\"ex-row\"><div class=\"icon\">\ud83d\udd01</div><div><div class=\"en\">\"Mientras lav\u00e1bamos los platos, escuch\u00e1bamos m\u00fasica\" \u2014 ambas acciones eran largas y ocurr\u00edan al mismo tiempo.</div><div class=\"es\">\"Mientras\" enfatiza la duraci\u00f3n simult\u00e1nea</div></div></div>\n<div class=\"tip-card\"><strong>\ud83d\udca1 Clave:</strong> Pregunta clave: \u00bfenfatizas UN MOMENTO espec\u00edfico (cuando) o UN PER\u00cdODO de duraci\u00f3n (mientras)? Esta l\u00f3gica se traslada tal cual al ingl\u00e9s.</div>", "exercises": [{"q": "\"___ lleg\u00f3 a casa, yo ya estaba durmiendo.\"", "a": "a", "o": ["Cuando", "Mientras"], "fc": "\"Lleg\u00f3\" es una acci\u00f3n puntual \u2192 se introduce con \"cuando\".", "fi": "\"Mientras lleg\u00f3\" no suena natural; llegar es puntual, no duradero.", "ex": "When he arrived, I was already sleeping", "tip": "Cuando = momento puntual"}, {"q": "\"___ yo cocinaba, \u00e9l pon\u00eda la mesa.\"", "a": "b", "o": ["Cuando", "Mientras"], "fc": "Ambas acciones son largas y simult\u00e1neas \u2192 \"mientras\".", "fi": "\"Cuando\" tambi\u00e9n es posible, pero \"mientras\" enfatiza mejor la simultaneidad.", "ex": "While I was cooking, he was setting the table", "tip": "Mientras = duraci\u00f3n simult\u00e1nea"}, {"q": "\u00bfCu\u00e1l enfatiza m\u00e1s la DURACI\u00d3N?", "a": "b", "o": ["Cuando", "Mientras"], "fc": "\"Mientras\" pone el foco en la extensi\u00f3n temporal de la acci\u00f3n.", "fi": "\"Cuando\" sugiere m\u00e1s un punto o cambio.", "tip": "Mientras \u2192 l\u00ednea larga \u00b7 Cuando \u2192 punto"}, {"q": "\"___ era ni\u00f1o, me gustaba nadar.\"", "a": "a", "o": ["Cuando", "Mientras"], "fc": "\"Era ni\u00f1o\" indica un periodo de vida, pero en espa\u00f1ol usamos \"cuando\" para contextos/etapas.", "fi": "\"Mientras era ni\u00f1o\" no es natural para hablar de una etapa de vida.", "ex": "When I was a child, I liked swimming", "tip": "Etapas de vida \u2192 cuando/when"}, {"q": "\"Le\u00ed un libro ___ esperaba el bus.\"", "a": "b", "o": ["cuando", "mientras"], "fc": "\"Esperar el bus\" es acci\u00f3n larga de fondo \u2192 \"mientras\".", "fi": "\"Cuando esperaba\" tambi\u00e9n existe, pero \"mientras\" es m\u00e1s natural para describir la acci\u00f3n de fondo larga.", "ex": "I read a book while I was waiting for the bus", "tip": "Acci\u00f3n de fondo larga \u2192 mientras/while"}]}, {"icon": "\ud83e\udd1d", "title": "Similitudes", "html": "<div class=\"section-label\">Paso 2</div>\n<div class=\"section-title\">Paso 2: \ud83e\udd1d Similitudes ESP \u2194 ENG</div>\n<div class=\"section-desc\">El mapeo es directo: <b>cuando = when</b>, <b>mientras = while</b>. La l\u00f3gica temporal es id\u00e9ntica.</div>\n\n<table class=\"g-table\">\n<tr><th>Situaci\u00f3n</th><th>\ud83c\uddea\ud83c\uddf8 Espa\u00f1ol</th><th>\ud83c\uddec\ud83c\udde7 English</th></tr>\n<tr><td>Conectar momento</td><td>cuando</td><td><span class=\"g-quest\">when</span></td></tr>\n<tr><td>Conectar duraci\u00f3n</td><td>mientras</td><td><span class=\"g-quest\">while</span></td></tr>\n<tr><td>Momento + acci\u00f3n larga</td><td>Cuando lleg\u00f3, yo com\u00eda</td><td><span class=\"g-quest\">When</span> he arrived, I was eating</td></tr>\n<tr><td>Acci\u00f3n larga + momento</td><td>Mientras com\u00eda, lleg\u00f3</td><td><span class=\"g-quest\">While</span> I was eating, he arrived</td></tr>\n<tr><td>Dos largas simult\u00e1neas</td><td>Mientras cocinaba, cantaba</td><td><span class=\"g-quest\">While</span> I was cooking, I was singing</td></tr>\n<tr><td>Posici\u00f3n flexible</td><td>Al inicio (con coma) o en medio</td><td>At the beginning (with comma) or middle</td></tr>\n</table>\n\n<div class=\"formula-box\" style=\"text-align:left;font-size:.88rem\">\n\ud83d\udcdd Posici\u00f3n en la oraci\u00f3n:<br>\n\u2022 <b>Al inicio:</b> <span class=\"g-quest\">When</span> he arrived<b>,</b> I was cooking. (con coma)<br>\n\u2022 <b>En medio:</b> I was cooking <span class=\"g-quest\">when</span> he arrived. (sin coma)\n</div>\n\n<div class=\"tip-card\"><strong>\ud83d\udca1 Key similarity:</strong> La elecci\u00f3n entre \"when\" y \"while\" en ingl\u00e9s sigue la misma l\u00f3gica que \"cuando\" y \"mientras\" en espa\u00f1ol. Si dudas, traduce mentalmente.</div>", "exercises": [{"q": "\"___ I was a student, I lived in Lima.\"", "a": "a", "o": ["When", "While"], "fc": "\"Was a student\" es una etapa/contexto \u2192 se introduce con <b>when</b>.", "fi": "\"While\" enfatizar\u00eda duraci\u00f3n progresiva, menos natural aqu\u00ed.", "ex": "When I was a student, I lived in Lima \u2192 Cuando era estudiante, viv\u00eda en Lima", "tip": "When = cuando (estados/momentos)"}, {"q": "\"___ she was sleeping, the dog barked.\"", "a": "b", "o": ["When", "While"], "fc": "\"She was sleeping\" es acci\u00f3n larga de fondo \u2192 <b>while</b>.", "fi": "\"When\" se usa con acciones puntuales, no con larga de fondo.", "ex": "While she was sleeping, the dog barked", "tip": "Larga de fondo \u2192 while"}, {"q": "\"I was reading ___ the phone rang.\"", "a": "a", "o": ["when", "while"], "fc": "\"The phone rang\" es puntual \u2192 <b>when</b>.", "fi": "\"While the phone rang\" no es natural; sonar es puntual.", "ex": "I was reading when the phone rang", "tip": "Puntual \u2192 when"}, {"q": "\"___ we were walking in the park, it started to rain.\"", "a": "b", "o": ["When", "While"], "fc": "\"We were walking\" = acci\u00f3n larga en progreso \u2192 <b>while</b> es la opci\u00f3n natural.", "fi": "\"When we were walking\" es posible pero con past continuous el est\u00e1ndar es \"while\".", "ex": "While we were walking in the park, it started to rain", "tip": "While + past continuous (acci\u00f3n larga)"}, {"q": "\u00bfD\u00f3nde va la coma cuando \"when/while\" empieza la oraci\u00f3n?", "a": "b", "o": ["No lleva coma", "Despu\u00e9s de la cl\u00e1usula with when/while"], "fc": "\"When/While + cl\u00e1usula<b>,</b> + main clause\". Coma al final de la primera cl\u00e1usula.", "fi": "S\u00ed lleva coma, es obligatorio en escritura formal.", "ex": "When he arrived, I was cooking. \u00b7 While I was cooking, he arrived.", "tip": "Inicio con when/while \u2192 siempre coma"}]}, {"icon": "\u26a1", "title": "Diferencias", "html": "<div class=\"section-label\">Paso 3</div>\n<div class=\"section-title\">Paso 3: \u26a1 Diferencias Importantes</div>\n<div class=\"section-desc\">Las trampas donde los estudiantes suelen confundir when y while.</div>\n\n<table class=\"g-table\">\n<tr><th>Situaci\u00f3n</th><th>\ud83d\udd39 WHEN</th><th>\ud83d\udd38 WHILE</th></tr>\n<tr><td>Acci\u00f3n puntual/corta</td><td>\u2705 When he <span class=\"g-verb\">called</span>...</td><td>\u274c No natural</td></tr>\n<tr><td>Acci\u00f3n larga en progreso</td><td>\u26a0\ufe0f Posible pero menos com\u00fan</td><td>\u2705 While he <span class=\"g-verb\">was working</span>...</td></tr>\n<tr><td>Estado o etapa de vida</td><td>\u2705 When I <span class=\"g-verb\">was a child</span>...</td><td>\u274c No se usa</td></tr>\n<tr><td>2 acciones simult\u00e1neas largas</td><td>\u274c No natural</td><td>\u2705 While I cooked, she read</td></tr>\n<tr><td>Secuencia r\u00e1pida</td><td>\u2705 When the bell rang, we left</td><td>\u274c No aplica</td></tr>\n</table>\n\n<div class=\"alert-card\"><div class=\"atitle\">\u26a0\ufe0f Trampa cl\u00e1sica</div>\n<p>Con verbos de ESTADO (be, know, live, have) casi siempre usamos <b>when</b>, nunca <b>while</b>:<br>\n\u274c \"While I was a child...\" \u2192 \u2705 \"<b>When</b> I was a child...\"<br>\n\u274c \"While I knew him...\" \u2192 \u2705 \"<b>When</b> I knew him...\"<br>\n\u274c \"While they lived in Paris...\" \u2192 \u2705 \"<b>When</b> they lived in Paris...\"</p></div>\n\n<div class=\"ex-row ex-wrong\"><div class=\"icon\">\u274c</div><div><div class=\"en\">While I was young, I played football.</div><div class=\"es\">\"Ser joven\" es estado \u2192 with \"when\"</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\u2705</div><div><div class=\"en\"><span class=\"g-quest\">When</span> I was young, I played football.</div><div class=\"es\">Cuando era joven, jugaba f\u00fatbol.</div></div></div>\n<div class=\"ex-row ex-wrong\"><div class=\"icon\">\u274c</div><div><div class=\"en\">When I was cooking, I was listening to music.</div><div class=\"es\">2 largas simult\u00e1neas \u2192 \"while\"</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\u2705</div><div><div class=\"en\"><span class=\"g-quest\">While</span> I was cooking, I was listening to music.</div><div class=\"es\">Mientras cocinaba, escuchaba m\u00fasica.</div></div></div>", "exercises": [{"q": "\"___ I was a child, we had a dog.\"", "a": "a", "o": ["When", "While"], "fc": "Estado de vida (\"was a child\") \u2192 <b>when</b>.", "fi": "\"While I was a child\" no es natural con estados.", "ex": "When I was a child, we had a dog \u2192 Cuando era ni\u00f1o, ten\u00edamos un perro", "tip": "Estados/etapas \u2192 when"}, {"q": "\"___ she was studying, I was cleaning.\"", "a": "b", "o": ["When", "While"], "fc": "Dos acciones largas simult\u00e1neas \u2192 <b>while</b>.", "fi": "\"When\" no es natural para acciones simult\u00e1neas largas.", "ex": "While she was studying, I was cleaning", "tip": "2 largas simult\u00e1neas \u2192 while"}, {"q": "\"___ the phone rang, she answered immediately.\"", "a": "a", "o": ["When", "While"], "fc": "\"Rang\" es acci\u00f3n puntual (sonar una vez) \u2192 <b>when</b>.", "fi": "\"While the phone rang\" no es natural; sonar es moment\u00e1neo, no una duraci\u00f3n larga.", "ex": "When the phone rang, she answered immediately", "tip": "Acci\u00f3n puntual (ring, knock, hear) \u2192 when"}, {"q": "\"___ I heard the noise, I ran out.\"", "a": "a", "o": ["When", "While"], "fc": "\"Heard the noise\" es puntual \u2192 <b>when</b>.", "fi": "\"While\" con acciones puntuales no es natural.", "ex": "When I heard the noise, I ran out", "tip": "Percepciones puntuales (hear, see) \u2192 when"}, {"q": "\"___ she was cooking dinner, I was setting the table.\"", "a": "b", "o": ["When", "While"], "fc": "Dos acciones largas simult\u00e1neas (was cooking + was setting) \u2192 <b>while</b>.", "fi": "\"When\" no captura la simultaneidad de dos acciones en progreso.", "ex": "While she was cooking dinner, I was setting the table", "tip": "2 past continuous simult\u00e1neos \u2192 while"}]}, {"icon": "\ud83d\udca1", "title": "Consejos", "html": "<div class=\"section-label\">Paso 4</div>\n<div class=\"section-title\">Paso 4: \ud83d\udca1 Consejos Pr\u00e1cticos</div>\n\n<div class=\"tip-card\"><strong>Tip 1 \u2014 La regla del \"tipo de acci\u00f3n\":</strong> Si el verbo tras el conector es <b>past simple</b>, generalmente es <b>when</b>. Si es <b>past continuous</b>, generalmente es <b>while</b>.</div>\n<div class=\"tip-card\"><strong>Tip 2 \u2014 Estados SIEMPRE con when:</strong> be, know, live, have, like, understand \u2192 \"When I was...\", \"When I knew...\", \"When we lived...\". Nunca \"While I was a child\".</div>\n<div class=\"tip-card\"><strong>Tip 3 \u2014 Coma al inicio:</strong> Si empiezas la oraci\u00f3n con when/while + cl\u00e1usula, pon coma al terminar esa cl\u00e1usula. \"When he arrived<b>,</b> I left\". Si va en medio, sin coma.</div>\n<div class=\"tip-card\"><strong>Tip 4 \u2014 AS como sustituto de WHILE:</strong> \"As I was walking home...\" = \"While I was walking home...\". \"As\" es m\u00e1s formal/literario pero intercambiable con while en past continuous.</div>\n\n<div class=\"formula-box\">\n\ud83d\udd39 <span class=\"g-quest\">WHEN</span> + past simple \u00b7 <span class=\"g-verb\">acci\u00f3n puntual</span><br>\n\ud83d\udd38 <span class=\"g-quest\">WHILE</span> + past continuous \u00b7 <span class=\"g-verb\">acci\u00f3n larga</span><br>\n\ud83c\udfaf Combo: <span class=\"g-quest\">While</span> + past cont., past simple<br>\n\ud83c\udfaf Combo: <span class=\"g-quest\">When</span> + past simple, past cont.\n</div>\n\n<table class=\"g-table\">\n<tr><th>Conector</th><th>Suele ir con</th><th>Ejemplo</th></tr>\n<tr><td><b>When</b></td><td>Past simple (puntual/estado)</td><td>When she <b>arrived</b>...</td></tr>\n<tr><td><b>While</b></td><td>Past continuous (larga)</td><td>While he <b>was reading</b>...</td></tr>\n<tr><td><b>As</b></td><td>Past continuous (= while)</td><td>As I <b>was leaving</b>...</td></tr>\n<tr><td><b>Just as</b></td><td>Simultaneidad exacta</td><td>Just as I <b>opened</b> the door, it rang</td></tr>\n<tr><td><b>The moment</b></td><td>Instante preciso</td><td>The moment he <b>saw</b> her, he smiled</td></tr>\n</table>", "exercises": [{"q": "\"___ she heard the news, she cried.\"", "a": "a", "o": ["When", "While"], "fc": "\"Heard\" es acci\u00f3n puntual \u2192 <b>when</b>.", "fi": "\"While she heard\" no es natural; o\u00edr es moment\u00e1neo.", "ex": "When she heard the news, she cried", "tip": "Puntual + emoci\u00f3n \u2192 when"}, {"q": "\"___ my brother was playing, I was studying.\"", "a": "b", "o": ["When", "While"], "fc": "Dos acciones largas simult\u00e1neas \u2192 <b>while</b>.", "fi": "\"When\" no captura la simultaneidad prolongada.", "ex": "While my brother was playing, I was studying", "tip": "2 largas = while"}, {"q": "\"___ I lived in Paris, I learned French.\"", "a": "a", "o": ["When", "While"], "fc": "\"Lived\" = estado/per\u00edodo de vida \u2192 <b>when</b>.", "fi": "\"While I lived\" no es natural con verbos de estado como \"live\".", "ex": "When I lived in Paris, I learned French", "tip": "Live (vivir) = estado \u2192 when"}, {"q": "\"The bell rang ___ I was writing.\"", "a": "b", "o": ["when", "while"], "fc": "\"Was writing\" = acci\u00f3n larga \u2192 <b>while</b> es m\u00e1s natural.", "fi": "\"When I was writing\" tambi\u00e9n existe pero \"while\" prefiere con past cont.", "ex": "The bell rang while I was writing", "tip": "while + past cont."}, {"q": "\u00bfEs correcto decir \"While I was a teenager...\"?", "a": "b", "o": ["S\u00ed, es correcto", "No, debe ser When"], "fc": "\"Was a teenager\" es estado/etapa \u2192 obligatorio <b>when</b>.", "fi": "\"While\" no se usa con estados ni etapas de vida.", "ex": "When I was a teenager, I played basketball", "tip": "Etapas de vida \u2192 siempre when"}]}, {"icon": "\u2728", "title": "Pr\u00e1ctica Final", "html": "<div class=\"section-label\">Paso 5</div>\n<div class=\"section-title\">Paso 5: \u2728 Pr\u00e1ctica Final</div>\n<div class=\"section-desc\">Aplica when/while en todos los patrones aprendidos.</div>\n\n<div class=\"formula-box\">\n\ud83d\udd39 <span class=\"g-quest\">WHEN</span> + past simple \u2192 momento / acci\u00f3n puntual / estado<br>\n\ud83d\udd38 <span class=\"g-quest\">WHILE</span> + past continuous \u2192 duraci\u00f3n / acci\u00f3n larga / simult\u00e1neas<br>\n\ud83d\udcdd Coma solo si empieza con when/while al inicio\n</div>\n\n<div class=\"ex-row ex-right\"><div class=\"icon\">\ud83d\udcde</div><div><div class=\"en\"><span class=\"g-quest\">When</span> the phone <span class=\"g-verb\">rang</span>, I <span class=\"g-verb\">was having</span> dinner.</div><div class=\"es\">Cuando son\u00f3 el tel\u00e9fono, estaba cenando.</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\ud83c\udf73</div><div><div class=\"en\"><span class=\"g-quest\">While</span> I <span class=\"g-verb\">was cooking</span>, my sister <span class=\"g-verb\">was setting</span> the table.</div><div class=\"es\">Mientras cocinaba, mi hermana pon\u00eda la mesa.</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\ud83c\udf93</div><div><div class=\"en\"><span class=\"g-quest\">When</span> I <span class=\"g-verb\">was</span> a student, I <span class=\"g-verb\">lived</span> with my parents.</div><div class=\"es\">Cuando era estudiante, viv\u00eda con mis padres.</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\ud83c\udfac</div><div><div class=\"en\">We <span class=\"g-verb\">were watching</span> a movie <span class=\"g-quest\">when</span> the lights <span class=\"g-verb\">went out</span>.</div><div class=\"es\">Ve\u00edamos una peli cuando se fue la luz. (when en medio \u2192 sin coma)</div></div></div>\n\n<div class=\"alert-card\"><div class=\"atitle\">\u26a0\ufe0f Errores Comunes</div><p>\n\u274c \"While I was young\" \u2192 \u2705 \"<b>When</b> I was young\" (estado)<br>\n\u274c \"When I was cooking, I was singing\" \u2192 \u2705 \"<b>While</b> I was cooking, I was singing\" (2 largas)<br>\n\u274c \"When he arrived I was cooking\" \u2192 \u2705 \"When he arrived<b>,</b> I was cooking\" (coma)<br>\n\u274c \"While the bell rang\" \u2192 \u2705 \"<b>When</b> the bell rang\" (puntual)\n</p></div>", "exercises": [{"q": "\"___ we arrived at the restaurant, our friends were waiting.\"", "a": "a", "o": ["When", "While"], "fc": "\"Arrived\" es acci\u00f3n puntual \u2192 <b>when</b>.", "fi": "\"While we arrived\" no es natural; llegar es moment\u00e1neo.", "ex": "When we arrived, our friends were waiting", "tip": "Llegar = puntual \u2192 when"}, {"q": "\"I found my keys ___ I was cleaning my room.\"", "a": "b", "o": ["when", "while"], "fc": "\"Was cleaning\" = acci\u00f3n larga de fondo \u2192 <b>while</b>.", "fi": "\"When I was cleaning\" tambi\u00e9n existe, pero \"while\" es m\u00e1s natural para la acci\u00f3n larga.", "ex": "I found my keys while I was cleaning my room", "tip": "Acci\u00f3n larga de fondo \u2192 while"}, {"q": "\"___ the teacher explained the lesson, students took notes.\"", "a": "b", "o": ["When", "While"], "fc": "Aqu\u00ed ambas acciones tienen duraci\u00f3n simult\u00e1nea \u2192 <b>while</b>.", "fi": "\"When\" suena m\u00e1s secuencial; \"while\" captura la simultaneidad.", "ex": "While the teacher explained, students took notes", "tip": "Simultaneidad \u2192 while"}, {"q": "\"___ he saw her, he knew it was love.\"", "a": "a", "o": ["When", "While"], "fc": "\"Saw\" es puntual + \"knew\" es estado \u2192 <b>when</b>.", "fi": "\"While he saw\" no es natural con percepciones puntuales.", "ex": "When he saw her, he knew it was love", "tip": "Percepci\u00f3n puntual + estado \u2192 when"}, {"q": "\"She was driving ___ she got a flat tire.\"", "a": "a", "o": ["when", "while"], "fc": "\"Got a flat tire\" es puntual \u2192 <b>when</b>. \"Was driving\" es la acci\u00f3n larga de fondo.", "fi": "\"While she got\" no es natural; pinchar es moment\u00e1neo.", "ex": "She was driving when she got a flat tire", "tip": "Larga (background) + when + puntual"}]}]};

function renderStepTabs(){
  const c=document.getElementById("stepTabs");c.innerHTML="";
  DATA.steps.forEach(function(s,i){
    const b=document.createElement("button");
    b.className="step-tab"+(i===curStep?" active":"");
    const k="s"+i;
    if(scores[k]!==undefined && answered["s"+i+"e0"] && answered["s"+i+"e1"] && answered["s"+i+"e2"] && answered["s"+i+"e3"] && answered["s"+i+"e4"] && i!==curStep){b.classList.add("done");}
    b.textContent=(i+1)+". "+s.icon+" "+s.title;
    b.addEventListener("click",function(){curStep=i;renderStepTabs();renderCard();document.getElementById("summaryFinal").classList.remove("show");});
    c.appendChild(b);
  });
}

function renderCard(){
  const s=DATA.steps[curStep];
  const k="s"+curStep;
  if(scores[k]===undefined)scores[k]=0;
  const card=document.createElement("div");
  card.className="card active";
  card.innerHTML=s.html;

  const exSection=document.createElement("div");
  exSection.className="ex-section";
  const h3=document.createElement("h3");
  h3.textContent="✏️ Ejercicios — "+s.title;
  exSection.appendChild(h3);

  s.exercises.forEach(function(e,i){
    const eid=k+"e"+i;
    const exDiv=document.createElement("div");
    exDiv.className="exercise";
    exDiv.id=eid;

    const q=document.createElement("div");
    q.className="exercise-q";
    q.innerHTML=(i+1)+". "+e.q;
    exDiv.appendChild(q);

    const opts=document.createElement("div");
    opts.className="opts";
    ["a","b"].forEach(function(letter,idx){
      const btn=document.createElement("button");
      btn.className="opt-btn";
      btn.textContent=letter+") "+e.o[idx];
      btn.addEventListener("click",function(){chk(eid,letter,e.a,e,btn);});
      opts.appendChild(btn);
    });
    exDiv.appendChild(opts);

    const correctIdx=(e.a==="a"?0:1);
    const wrongIdx=(e.a==="a"?1:0);

    const fbOk=document.createElement("div");
    fbOk.className="fb fb-ok";
    fbOk.id="fbok-"+eid;
    let okHtml='<div class="fb-header"><span class="fb-icon">🎉</span> ¡Correcto!</div><div class="fb-body">';
    okHtml+='<div class="fb-row"><span class="fb-dot">✅</span><div class="fb-text"><span class="fb-correct-answer">'+e.o[correctIdx]+'</span> — '+e.fc+'</div></div>';
    okHtml+='<div class="fb-row"><span class="fb-dot">💡</span><div class="fb-text">La otra opción: '+e.fi+'</div></div>';
    if(e.ex){okHtml+='<div class="fb-example">📝 '+e.ex+'</div>';}
    if(e.tip){okHtml+='<div class="fb-tip"><strong>💡 Recuerda:</strong> '+e.tip+'</div>';}
    okHtml+='</div>';
    fbOk.innerHTML=okHtml;
    exDiv.appendChild(fbOk);

    const fbBad=document.createElement("div");
    fbBad.className="fb fb-bad";
    fbBad.id="fbbad-"+eid;
    let badHtml='<div class="fb-header"><span class="fb-icon">😕</span> No es correcto</div><div class="fb-body">';
    badHtml+='<div class="fb-row"><span class="fb-dot">❌</span><div class="fb-text"><span class="fb-wrong-reason">'+e.fi+'</span></div></div>';
    badHtml+='<div class="fb-row"><span class="fb-dot">✅</span><div class="fb-text">La respuesta correcta es <span class="fb-correct-answer">'+e.o[correctIdx]+'</span> — '+e.fc+'</div></div>';
    if(e.ex){badHtml+='<div class="fb-example">📝 '+e.ex+'</div>';}
    if(e.tip){badHtml+='<div class="fb-tip"><strong>💡 Recuerda:</strong> '+e.tip+'</div>';}
    badHtml+='</div>';
    fbBad.innerHTML=badHtml;
    exDiv.appendChild(fbBad);

    exSection.appendChild(exDiv);
  });

  const score=document.createElement("div");
  score.className="score-bar";
  score.innerHTML='<div class="num" id="sc-'+k+'">'+scores[k]+'/5</div><div class="lbl">Puntuación</div>';
  exSection.appendChild(score);

  card.appendChild(exSection);

  const area=document.getElementById("cardArea");
  area.innerHTML="";
  area.appendChild(card);

  // Restore previously answered
  s.exercises.forEach(function(e,i){
    const eid=k+"e"+i;
    if(answered[eid]){
      const ex=document.getElementById(eid);
      const btns=ex.querySelectorAll(".opt-btn");
      btns.forEach(function(b){b.disabled=true;});
      const userPick=answered[eid];
      const correctIdx=(e.a==="a"?0:1);
      if(userPick===e.a){
        ex.classList.add("correct");
        btns.forEach(function(b){if(b.textContent.indexOf(userPick+")")===0)b.classList.add("sel-ok");});
        document.getElementById("fbok-"+eid).classList.add("show");
      }else{
        ex.classList.add("incorrect");
        btns.forEach(function(b){
          if(b.textContent.indexOf(userPick+")")===0)b.classList.add("sel-bad");
          if(b.textContent.indexOf(e.a+")")===0)b.classList.add("show-ok");
        });
        document.getElementById("fbbad-"+eid).classList.add("show");
      }
    }
  });
}

function chk(eid,sel,correct,e,btn){
  if(answered[eid])return;
  answered[eid]=sel;
  const ex=document.getElementById(eid);
  const btns=ex.querySelectorAll(".opt-btn");
  btns.forEach(function(b){b.disabled=true;});
  const k=eid.match(/s\d+/)[0];
  if(sel===correct){
    ex.classList.add("correct");
    btns.forEach(function(b){if(b.textContent.indexOf(sel+")")===0)b.classList.add("sel-ok");});
    document.getElementById("fbok-"+eid).classList.add("show");
    scores[k]++;
  }else{
    ex.classList.add("incorrect");
    btns.forEach(function(b){
      if(b.textContent.indexOf(sel+")")===0)b.classList.add("sel-bad");
      if(b.textContent.indexOf(correct+")")===0)b.classList.add("show-ok");
    });
    document.getElementById("fbbad-"+eid).classList.add("show");
  }
  document.getElementById("sc-"+k).textContent=scores[k]+"/5";
  const allDone=[0,1,2,3,4].every(function(i){return answered[k+"e"+i];});
  if(allDone && curStep===4){
    setTimeout(function(){
      const sf=document.getElementById("summaryFinal");
      const sl=document.getElementById("summaryList");
      sl.innerHTML=DATA.summary.map(function(s){return "<li>"+s+"</li>";}).join("");
      sf.classList.add("show");
      sf.scrollIntoView({behavior:"smooth"});
    },600);
  }
}

renderStepTabs();renderCard();

</script>
</body>
