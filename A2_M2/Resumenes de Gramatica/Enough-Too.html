<script>

let curStep=0;const scores={};const answered={};
const DATA={"summary": ["<b>TOO:</b> demasiado (sentido NEGATIVO, exceso) — \"too cold\", \"too much noise\"", "<b>ENOUGH:</b> suficiente (sentido NEUTRO/POSITIVO) — \"warm enough\", \"enough money\"", "<b>TOO + adjetivo</b>: \"It's <b>too cold</b>\" (precede al adj)", "<b>Adjetivo + ENOUGH</b>: \"It's <b>warm enough</b>\" (sigue al adj)", "<b>ENOUGH + sustantivo</b>: \"<b>enough</b> water\" / \"<b>enough</b> books\"", "<b>TOO MUCH</b> + incontable · <b>TOO MANY</b> + contable plural", "Para infinitivo de propósito: too/enough + adj + <b>to + verb</b>"], "steps": [{"icon": "🇪🇸", "title": "Repaso en Español", "html": "<div class=\"illus\">⚖️ 🔺 🔻<div class=\"cap\">Demasiado vs suficiente</div></div><div class=\"section-label\">Paso 1</div>\n<div class=\"section-title\">Paso 1: 🇪🇸 Repaso en Español</div>\n<div class=\"section-desc\">En español usamos <b>\"demasiado\"</b> (exceso, negativo) y <b>\"suficiente / bastante\"</b> (cantidad correcta). Son conceptos opuestos en cuanto a tono.</div>\n\n<div class=\"compare-grid\">\n<div class=\"compare-card esp\"><h4>🔴 DEMASIADO (exceso)</h4><ul>\n<li>Hace <b>demasiado</b> frío</li>\n<li>Hay <b>demasiado</b> ruido</li>\n<li>Comiste <b>demasiado</b></li>\n<li>Es <b>demasiado</b> caro</li>\n</ul></div>\n<div class=\"compare-card esp\"><h4>🟢 SUFICIENTE (correcto)</h4><ul>\n<li>Tengo <b>suficiente</b> dinero</li>\n<li>Es lo <b>bastante</b> grande</li>\n<li>No hay <b>suficientes</b> sillas</li>\n<li>Tienes <b>suficiente</b> tiempo</li>\n</ul></div></div>\n\n<div class=\"section-label\">Demasiado vs suficiente</div><div class=\"viz-grid\"><div class=\"viz-item\"><span class=\"ico\">🔺</span><span class=\"lbl\">too + adj</span><span class=\"es\">demasiado (exceso)</span></div><div class=\"viz-item\"><span class=\"ico\">✅</span><span class=\"lbl\">adj + enough</span><span class=\"es\">suficiente</span></div><div class=\"viz-item\"><span class=\"ico\">🔻</span><span class=\"lbl\">not + adj + enough</span><span class=\"es\">no suficiente</span></div><div class=\"viz-item\"><span class=\"ico\">📦</span><span class=\"lbl\">enough + noun</span><span class=\"es\">suficiente (sustantivo)</span></div></div><div class=\"ex-row\"><div class=\"icon\">🥶</div><div><div class=\"en\">\"Hace demasiado frío para salir\" → el frío es EXCESIVO, problemático.</div><div class=\"es\">Demasiado = más de lo deseable</div></div></div>\n<div class=\"ex-row\"><div class=\"icon\">✅</div><div><div class=\"en\">\"Tengo suficiente dinero para el bus\" → la cantidad es la NECESARIA.</div><div class=\"es\">Suficiente = la cantidad correcta</div></div></div>\n<div class=\"tip-card\"><strong>💡 Clave:</strong> \"Demasiado\" y \"suficiente\" son OPUESTOS en sentido. \"Demasiado\" suena a queja; \"suficiente\" suena a OK. En inglés pasa igual con \"too\" y \"enough\".</div>", "exercises": [{"q": "\"Hace demasiado frío\" — ¿el tono es:?", "a": "a", "o": ["Negativo (queja)", "Positivo (OK)"], "fc": "\"Demasiado\" implica exceso indeseable.", "fi": "El tono positivo sería \"hace bastante frío\" o \"perfecto\".", "ex": "Hace demasiado frío → It's too cold", "tip": "Demasiado = too (negativo)"}, {"q": "\"Tengo suficiente comida\" — ¿la cantidad es:?", "a": "b", "o": ["Excesiva", "Adecuada"], "fc": "\"Suficiente\" = la cantidad correcta, ni más ni menos.", "fi": "Excesiva sería \"demasiada\".", "ex": "Tengo suficiente comida → I have enough food", "tip": "Suficiente = enough (neutro)"}, {"q": "\"Esta sopa está demasiado salada\" — ¿qué quiere decir?", "a": "a", "o": ["Tiene más sal de lo que debería", "Tiene la sal perfecta"], "fc": "\"Demasiado salada\" = exceso de sal, no se puede comer bien.", "fi": "La cantidad perfecta no se describiría con \"demasiado\".", "tip": "Demasiado + adj → problema"}, {"q": "\"¿Hay suficientes sillas?\" — ¿qué pregunto?", "a": "b", "o": ["Si sobran sillas", "Si alcanzan para todos"], "fc": "Suficientes = la cantidad necesaria para todos.", "fi": "Que sobren sería \"demasiadas\".", "ex": "¿Hay suficientes sillas? → Are there enough chairs?", "tip": "Suficiente = la cantidad justa"}, {"q": "\"Es bastante grande\" en español significa:", "a": "b", "o": ["Es demasiado grande", "Es lo suficientemente grande"], "fc": "\"Bastante\" aquí = suficientemente, no exceso.", "fi": "Para exceso sería \"demasiado grande\".", "ex": "Es bastante grande → It's big enough", "tip": "Bastante = enough (sinónimo)"}]}, {"icon": "🤝", "title": "Similitudes", "html": "<div class=\"illus\">🇪🇸 demasiado  🤝  🇬🇧 too<div class=\"cap\">Exceso y suficiencia</div></div><div class=\"section-label\">Paso 2</div>\n<div class=\"section-title\">Paso 2: 🤝 Similitudes ESP ↔ ENG</div>\n<div class=\"section-desc\">Both languages use the same logic: opposite tones, same uses.</div>\n\n<table class=\"g-table\">\n<tr><th>Concepto</th><th>🇪🇸 Español</th><th>🇬🇧 English</th></tr>\n<tr><td>Exceso (negativo)</td><td>demasiado frío</td><td><span class=\"g-neg\">too</span> cold</td></tr>\n<tr><td>Cantidad correcta</td><td>suficiente / bastante</td><td><span class=\"g-comp\">enough</span></td></tr>\n<tr><td>Demasiado + sustantivo</td><td>demasiada agua / demasiados libros</td><td><span class=\"g-neg\">too much</span> water / <span class=\"g-neg\">too many</span> books</td></tr>\n<tr><td>Suficiente + sustantivo</td><td>suficiente agua / suficientes libros</td><td><span class=\"g-comp\">enough</span> water / <span class=\"g-comp\">enough</span> books</td></tr>\n<tr><td>Para + infinitivo</td><td>demasiado caro <b>para</b> comprar</td><td>too expensive <b>to</b> buy</td></tr>\n</table>\n\n<div class=\"section-label\">Mapa visual de uso</div>\n<div class=\"conj-grid\">\n<div class=\"conj-item\"><div class=\"pron\">Too + adj</div><div class=\"vrb\">too cold</div><div class=\"meaning\">demasiado frío</div></div>\n<div class=\"conj-item\"><div class=\"pron\">Adj + enough</div><div class=\"vrb\">cold enough</div><div class=\"meaning\">bastante frío</div></div>\n<div class=\"conj-item\"><div class=\"pron\">Enough + noun</div><div class=\"vrb\">enough food</div><div class=\"meaning\">suficiente comida</div></div>\n<div class=\"conj-item\"><div class=\"pron\">Too much + Unc.</div><div class=\"vrb\">too much water</div><div class=\"meaning\">demasiada agua</div></div>\n<div class=\"conj-item\"><div class=\"pron\">Too many + Plu.</div><div class=\"vrb\">too many cars</div><div class=\"meaning\">demasiados autos</div></div>\n<div class=\"conj-item\"><div class=\"pron\">+ to + verb</div><div class=\"vrb\">too tired to walk</div><div class=\"meaning\">muy cansado para caminar</div></div>\n</div>\n\n<div class=\"tip-card\"><strong>💡 Key similarity:</strong> Si domínas \"demasiado/suficiente\" en español, ya entiendes el concepto. Solo necesitas memorizar DÓNDE va cada palabra (antes o después del adj/sust).</div>", "exercises": [{"q": "\"It's ___ hot today!\" (queja por calor)", "a": "a", "o": ["too", "enough"], "fc": "Queja por exceso → <b>too hot</b>.", "fi": "\"Hot enough\" sería positivo (lo necesario), no encaja con queja.", "ex": "It's too hot → Hace demasiado calor", "tip": "Queja → too (exceso)"}, {"q": "\"Are you ___ to lift this box?\" (capacidad)", "a": "b", "o": ["too strong", "strong enough"], "fc": "¿Tienes la fuerza necesaria? → <b>strong enough</b>.", "fi": "\"Too strong\" sería exceso de fuerza, no es la pregunta.", "ex": "Are you strong enough? → ¿Eres lo bastante fuerte?", "tip": "Capacidad necesaria → enough"}, {"q": "\"There's ___ noise here. I can't think.\" (exceso)", "a": "a", "o": ["too much", "enough"], "fc": "\"Noise\" es incontable + queja por exceso → <b>too much noise</b>.", "fi": "\"Enough noise\" suena raro como queja.", "ex": "There's too much noise → Hay demasiado ruido", "tip": "Incontable + exceso → too much"}, {"q": "\"We have ___ chairs for everyone.\" (suficientes)", "a": "a", "o": ["enough", "too many"], "fc": "Cantidad correcta para todos → <b>enough chairs</b>.", "fi": "\"Too many chairs\" sería exceso (sobran sillas).", "ex": "We have enough chairs → Tenemos suficientes sillas", "tip": "Cantidad justa → enough"}, {"q": "\"The coffee is ___ hot to drink right now.\" (no se puede)", "a": "b", "o": ["enough", "too"], "fc": "No se puede tomar = exceso de calor → <b>too hot</b>.", "fi": "\"Hot enough\" sería perfecto para beber, no encaja.", "ex": "The coffee is too hot to drink → El café está demasiado caliente para beber", "tip": "Too + adj + to = no se puede"}]}, {"icon": "⚡", "title": "Diferencias", "html": "<div class=\"illus\">🔺 too + adj  ✅ adj + enough<div class=\"cap\">El orden cambia todo</div></div><div class=\"section-label\">Paso 3</div>\n<div class=\"section-title\">Paso 3: ⚡ Diferencias Importantes</div>\n<div class=\"section-desc\">La gran diferencia: la POSICIÓN de \"enough\" cambia según a qué acompañe.</div>\n\n<table class=\"g-table\">\n<tr><th>Estructura</th><th>✅ Correcto</th><th>❌ Incorrecto</th></tr>\n<tr><td>Too + adj</td><td><span class=\"g-neg\">too</span> cold</td><td>cold too</td></tr>\n<tr><td>Adj + enough</td><td>cold <span class=\"g-comp\">enough</span></td><td>enough cold</td></tr>\n<tr><td>Enough + noun</td><td><span class=\"g-comp\">enough</span> water</td><td>water enough</td></tr>\n<tr><td>Too much + Unc.</td><td><span class=\"g-neg\">too much</span> water</td><td>too many water</td></tr>\n<tr><td>Too many + Plu.</td><td><span class=\"g-neg\">too many</span> books</td><td>too much books</td></tr>\n</table>\n\n<div class=\"eg-card\"><span class=\"badge good\">✅ Bien</span><div class=\"eg-en\">The coffee is <b>too hot</b>.</div><div class=\"eg-es\">El café está demasiado caliente.</div></div><div class=\"eg-card\"><span class=\"badge good\">✅ Bien</span><div class=\"eg-en\">He is old <b>enough</b> to drive.</div><div class=\"eg-es\">Tiene edad suficiente para conducir.</div></div><div class=\"eg-card\"><span class=\"badge bad\">❌ Mal</span><div class=\"eg-en\">He is <b>enough old</b>.</div><div class=\"eg-es\">(enough va DESPUÉS del adjetivo)</div></div><div class=\"alert-card\"><div class=\"atitle\">⚠️ ¡Cuidado con la posición!</div>\n<p>Los hispanohablantes tienden a poner \"enough\" siempre antes (como \"suficiente\"). Pero:<br>\n• <b>Antes de ADJETIVO:</b> No → \"enough cold\" ❌ → \"<b>cold enough</b>\" ✅<br>\n• <b>Antes de SUSTANTIVO:</b> Sí → \"<b>enough money</b>\" ✅<br>\n• <b>Antes de ADVERBIO:</b> No → \"enough fast\" ❌ → \"<b>fast enough</b>\" ✅</p></div>\n\n<div class=\"ex-row ex-wrong\"><div class=\"icon\">❌</div><div><div class=\"en\">She is enough tall to play basketball.</div><div class=\"es\">\"Enough\" va DESPUÉS del adj</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">✅</div><div><div class=\"en\">She is <span class=\"g-comp\">tall enough</span> to play basketball.</div><div class=\"es\">Es lo bastante alta para jugar baloncesto.</div></div></div>\n<div class=\"ex-row ex-wrong\"><div class=\"icon\">❌</div><div><div class=\"en\">There are too much cars in the city.</div><div class=\"es\">\"Cars\" es plural → too many</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">✅</div><div><div class=\"en\">There are <span class=\"g-neg\">too many</span> cars in the city.</div><div class=\"es\">Hay demasiados coches en la ciudad.</div></div></div>", "exercises": [{"q": "\"He runs fast ___ to win the race.\"", "a": "a", "o": ["enough", "too"], "fc": "Adverbio + <b>enough</b>: \"fast enough\" = lo bastante rápido.", "fi": "\"Too\" no funciona aquí; sería \"demasiado rápido para ganar\" (sin lógica).", "ex": "He runs fast enough to win", "tip": "Adverbio/adj + enough"}, {"q": "\"She has ___ patience for kids.\" (cantidad correcta)", "a": "a", "o": ["enough", "too much"], "fc": "Cantidad adecuada de paciencia → <b>enough patience</b>.", "fi": "\"Too much patience\" sería exceso, raro y casi nunca aplica.", "ex": "She has enough patience for kids", "tip": "Sustantivo + cantidad correcta → enough + noun"}, {"q": "\"There are ___ people in the elevator. It's full.\" (exceso plural)", "a": "b", "o": ["too much", "too many"], "fc": "\"People\" es plural contable → <b>too many</b>.", "fi": "\"Too much\" se usa con incontables (water, time, money).", "ex": "Too many people in the elevator", "tip": "Plural → too many"}, {"q": "\"This soup is too ___.\"", "a": "b", "o": ["salty enough", "salty"], "fc": "\"Too\" siempre va antes del adjetivo solo: <b>too salty</b>.", "fi": "\"Too salty enough\" no existe; usa una u otra, no ambas.", "ex": "This soup is too salty → Esta sopa está demasiado salada", "tip": "Too + adj (sin enough)"}, {"q": "\"I don't have ___ time to finish.\" (no suficiente)", "a": "a", "o": ["enough", "too much"], "fc": "Falta de tiempo (incontable) → <b>enough time</b> en negativo = no suficiente.", "fi": "\"Too much time\" sería demasiado tiempo (exceso), no falta.", "ex": "I don't have enough time → No tengo suficiente tiempo", "tip": "Falta → don't have enough"}]}, {"icon": "💡", "title": "Consejos", "html": "<div class=\"illus\">📏 💡 🧠<div class=\"cap\">Cuándo va antes o después</div></div><div class=\"section-label\">Paso 4</div>\n<div class=\"section-title\">Paso 4: 💡 Consejos Prácticos</div>\n\n<div class=\"tip-card\"><strong>Tip 1 — La regla de oro de POSICIÓN:</strong> ENOUGH va <b>después</b> de adjetivo/adverbio (cold enough, fast enough), pero <b>antes</b> de sustantivo (enough money, enough time).</div>\n<div class=\"tip-card\"><strong>Tip 2 — Too: SIEMPRE antes del adjetivo:</strong> too cold, too tired, too expensive. Nunca al final (\"cold too\" ❌).</div>\n<div class=\"tip-card\"><strong>Tip 3 — Much vs Many con TOO:</strong> Recuerda la regla clásica: TOO <b>MUCH</b> + incontable (water, time, money). TOO <b>MANY</b> + contable plural (cars, people, books).</div>\n<div class=\"tip-card\"><strong>Tip 4 — Para infinitivo:</strong> <b>too + adj + to + verb</b> = \"demasiado X para Y\". <b>adj + enough + to + verb</b> = \"lo bastante X para Y\". \"Too tired <b>to</b> walk\" / \"Old enough <b>to</b> drive\".</div>\n\n<div class=\"formula-box\">\n🔴 <span class=\"g-neg\">TOO</span> + adj/adv: too cold, too fast<br>\n🔴 <span class=\"g-neg\">TOO MUCH</span> + incontable: too much water<br>\n🔴 <span class=\"g-neg\">TOO MANY</span> + plural: too many cars<br>\n🟢 adj/adv + <span class=\"g-comp\">ENOUGH</span>: cold enough, fast enough<br>\n🟢 <span class=\"g-comp\">ENOUGH</span> + noun: enough water, enough cars\n</div>\n\n<table class=\"g-table\">\n<tr><th>Posición</th><th>Estructura</th><th>Ejemplo</th></tr>\n<tr><td>TOO + ADJ</td><td>antes del adjetivo</td><td>too <b>tired</b></td></tr>\n<tr><td>ADJ + ENOUGH</td><td>después del adjetivo</td><td><b>tired</b> enough</td></tr>\n<tr><td>ENOUGH + N</td><td>antes del sustantivo</td><td>enough <b>money</b></td></tr>\n<tr><td>TOO MUCH + N</td><td>incontable</td><td>too much <b>noise</b></td></tr>\n<tr><td>TOO MANY + N</td><td>plural contable</td><td>too many <b>questions</b></td></tr>\n</table>", "exercises": [{"q": "\"He is ___ young to drive a car.\"", "a": "b", "o": ["enough", "too"], "fc": "No puede manejar = exceso de juventud → <b>too young</b>.", "fi": "\"Young enough\" sería lo contrario (positivo).", "ex": "He is too young to drive → Es muy joven para manejar", "tip": "Too + adj + to = no puede"}, {"q": "\"Is your house big ___ for 5 people?\"", "a": "b", "o": ["too", "enough"], "fc": "¿Tiene el tamaño necesario? → <b>big enough</b>.", "fi": "\"Too big\" sería exceso, no es la pregunta.", "ex": "Is your house big enough? → ¿Es lo bastante grande?", "tip": "Capacidad necesaria → enough"}, {"q": "\"There is ___ sugar in this coffee. It's sweet!\"", "a": "a", "o": ["too much", "too many"], "fc": "\"Sugar\" es incontable → <b>too much sugar</b>.", "fi": "\"Too many\" se usa con plurales contables.", "ex": "Too much sugar", "tip": "Incontable → too much"}, {"q": "\"She bought ___ shoes last month. Her closet is full.\"", "a": "b", "o": ["too much", "too many"], "fc": "\"Shoes\" es plural contable → <b>too many shoes</b>.", "fi": "\"Too much shoes\" no es correcto.", "ex": "She bought too many shoes → Compró demasiados zapatos", "tip": "Plural contable → too many"}, {"q": "\"I'm ___ to go out tonight. I just want to sleep.\"", "a": "a", "o": ["too tired", "tired enough"], "fc": "\"I just want to sleep\" confirma exceso de cansancio → <b>too tired</b>.", "fi": "\"Tired enough\" significaría \"lo bastante cansado para algo\" — no encaja con querer dormir.", "ex": "I'm too tired to go out tonight → Estoy muy cansado para salir", "tip": "Too + adj + to = exceso que impide"}]}, {"icon": "✨", "title": "Práctica Final", "html": "<div class=\"illus\">🎯 ✅ ❌<div class=\"cap\">Equilibra tus oraciones</div></div><div class=\"section-label\">Paso 5</div>\n<div class=\"section-title\">Paso 5: ✨ Práctica Final</div>\n<div class=\"section-desc\">Combina too/enough con adjetivos, sustantivos e infinitivos.</div>\n\n<div class=\"formula-box\">\n🔴 <span class=\"g-neg\">too</span> + <span class=\"g-comp\">adj</span> [+ to + verb] → exceso<br>\n🟢 <span class=\"g-comp\">adj</span> + <span class=\"g-comp\">enough</span> [+ to + verb] → suficiente<br>\n🔴 <span class=\"g-neg\">too much/many</span> + <span class=\"g-subj\">noun</span> → exceso de cantidad<br>\n🟢 <span class=\"g-comp\">enough</span> + <span class=\"g-subj\">noun</span> → cantidad correcta\n</div>\n\n<div class=\"ex-row ex-right\"><div class=\"icon\">☕</div><div><div class=\"en\">This coffee is <span class=\"g-neg\">too hot</span> <span class=\"g-verb\">to drink</span>.</div><div class=\"es\">Este café está demasiado caliente para beber. (exceso + infinitivo)</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">🚗</div><div><div class=\"en\">She is <span class=\"g-comp\">old enough</span> <span class=\"g-verb\">to drive</span>.</div><div class=\"es\">Tiene la edad suficiente para manejar. (suficiente + infinitivo)</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">🏙️</div><div><div class=\"en\">There are <span class=\"g-neg\">too many</span> <span class=\"g-subj\">tourists</span> in summer.</div><div class=\"es\">Hay demasiados turistas en verano. (exceso + plural)</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">💰</div><div><div class=\"en\">I have <span class=\"g-comp\">enough</span> <span class=\"g-subj\">money</span> for the bus.</div><div class=\"es\">Tengo suficiente dinero para el bus. (cantidad correcta)</div></div></div>\n\n<div class=\"alert-card\"><div class=\"atitle\">⚠️ Errores Comunes</div><p>\n❌ \"She is enough tall\" → ✅ \"She is <b>tall enough</b>\" (adj + enough)<br>\n❌ \"Too many water\" → ✅ \"<b>Too much</b> water\" (incontable)<br>\n❌ \"Too much books\" → ✅ \"<b>Too many</b> books\" (plural contable)<br>\n❌ \"He has enough not money\" → ✅ \"He <b>doesn't have enough</b> money\" (orden negativo)<br>\n❌ \"It's too cold for go out\" → ✅ \"It's too cold <b>to</b> go out\" (infinitivo con to)\n</p></div>", "exercises": [{"q": "\"This bag is ___ heavy for me to carry.\" (no puedo)", "a": "a", "o": ["too", "enough"], "fc": "No puedo cargar = exceso de peso → <b>too heavy</b>.", "fi": "\"Heavy enough\" sería lo bastante pesada (positivo), no encaja.", "ex": "This bag is too heavy to carry", "tip": "No puedo + razon → too + adj + to"}, {"q": "\"Do we have ___ bread for breakfast?\" (suficiente)", "a": "b", "o": ["too much", "enough"], "fc": "Pregunta por cantidad necesaria → <b>enough bread</b>.", "fi": "\"Too much bread\" sería demasiado pan, no encaja con la pregunta.", "ex": "Do we have enough bread?", "tip": "¿Tenemos lo necesario? → enough"}, {"q": "\"My grandfather is ___ old to climb stairs.\"", "a": "a", "o": ["too", "enough"], "fc": "No puede subir escaleras = exceso de edad para esa actividad → <b>too old</b>.", "fi": "\"Old enough\" sería positivo (capaz por edad), no encaja con limitación.", "ex": "He is too old to climb stairs", "tip": "Limitación por exceso → too"}, {"q": "\"There were ___ mistakes in your essay. Be careful.\"", "a": "a", "o": ["too many", "too much"], "fc": "\"Mistakes\" es plural contable → <b>too many</b>.", "fi": "\"Too much mistakes\" no es correcto; \"too much\" se usa con incontables.", "ex": "Too many mistakes", "tip": "Mistakes = plural contable → too many"}, {"q": "\"She didn't study ___ to pass the exam.\"", "a": "b", "o": ["too", "enough"], "fc": "No estudió lo necesario → <b>didn't study enough</b>. Aquí enough es adverbio (después del verbo).", "fi": "\"Too\" no funciona; sería exceso de estudio.", "ex": "She didn't study enough → No estudió lo suficiente", "tip": "Verbo + enough (después del verbo)"}]}]};
function renderStepTabs(){
  const c=document.getElementById("stepTabs");c.innerHTML="";
  DATA.steps.forEach(function(s,i){
    const b=document.createElement("button");
    b.className="step-tab"+(i===curStep?" active":"");
    const k="s"+i;
    if(scores[k]!==undefined && answered["s"+i+"e0"] && answered["s"+i+"e1"] && answered["s"+i+"e2"] && answered["s"+i+"e3"] && answered["s"+i+"e4"] && i!==curStep){b.classList.add("done");}
    b.textContent=(i+1)+". "+s.icon+" "+s.title;
    b.addEventListener("click",function(){curStep=i;renderStepTabs();renderCard();document.getElementById("summaryFinal").classList.remove("show");});
    c.appendChild(b);
  });
}

function renderCard(){
  const s=DATA.steps[curStep];
  const k="s"+curStep;
  if(scores[k]===undefined)scores[k]=0;
  const card=document.createElement("div");
  card.className="card active";
  card.innerHTML=s.html;

  const exSection=document.createElement("div");
  exSection.className="ex-section";
  const h3=document.createElement("h3");
  h3.textContent="✏️ Ejercicios — "+s.title;
  exSection.appendChild(h3);

  s.exercises.forEach(function(e,i){
    const eid=k+"e"+i;
    const exDiv=document.createElement("div");
    exDiv.className="exercise";
    exDiv.id=eid;

    const q=document.createElement("div");
    q.className="exercise-q";
    q.innerHTML=(i+1)+". "+e.q;
    exDiv.appendChild(q);

    const opts=document.createElement("div");
    opts.className="opts";
    ["a","b"].forEach(function(letter,idx){
      const btn=document.createElement("button");
      btn.className="opt-btn";
      btn.textContent=letter+") "+e.o[idx];
      btn.addEventListener("click",function(){chk(eid,letter,e.a,e,btn);});
      opts.appendChild(btn);
    });
    exDiv.appendChild(opts);

    const correctIdx=(e.a==="a"?0:1);
    const wrongIdx=(e.a==="a"?1:0);

    const fbOk=document.createElement("div");
    fbOk.className="fb fb-ok";
    fbOk.id="fbok-"+eid;
    let okHtml='<div class="fb-header"><span class="fb-icon">🎉</span> ¡Correcto!</div><div class="fb-body">';
    okHtml+='<div class="fb-row"><span class="fb-dot">✅</span><div class="fb-text"><span class="fb-correct-answer">'+e.o[correctIdx]+'</span> — '+e.fc+'</div></div>';
    okHtml+='<div class="fb-row"><span class="fb-dot">💡</span><div class="fb-text">La otra opción: '+e.fi+'</div></div>';
    if(e.ex){okHtml+='<div class="fb-example">📝 '+e.ex+'</div>';}
    if(e.tip){okHtml+='<div class="fb-tip"><strong>💡 Recuerda:</strong> '+e.tip+'</div>';}
    okHtml+='</div>';
    fbOk.innerHTML=okHtml;
    exDiv.appendChild(fbOk);

    const fbBad=document.createElement("div");
    fbBad.className="fb fb-bad";
    fbBad.id="fbbad-"+eid;
    let badHtml='<div class="fb-header"><span class="fb-icon">😕</span> No es correcto</div><div class="fb-body">';
    badHtml+='<div class="fb-row"><span class="fb-dot">❌</span><div class="fb-text"><span class="fb-wrong-reason">'+e.fi+'</span></div></div>';
    badHtml+='<div class="fb-row"><span class="fb-dot">✅</span><div class="fb-text">La respuesta correcta es <span class="fb-correct-answer">'+e.o[correctIdx]+'</span> — '+e.fc+'</div></div>';
    if(e.ex){badHtml+='<div class="fb-example">📝 '+e.ex+'</div>';}
    if(e.tip){badHtml+='<div class="fb-tip"><strong>💡 Recuerda:</strong> '+e.tip+'</div>';}
    badHtml+='</div>';
    fbBad.innerHTML=badHtml;
    exDiv.appendChild(fbBad);

    exSection.appendChild(exDiv);
  });

  const score=document.createElement("div");
  score.className="score-bar";
  score.innerHTML='<div class="num" id="sc-'+k+'">'+scores[k]+'/5</div><div class="lbl">Puntuación</div>';
  exSection.appendChild(score);

  card.appendChild(exSection);

  const area=document.getElementById("cardArea");
  area.innerHTML="";
  area.appendChild(card);

  // Restore previously answered
  s.exercises.forEach(function(e,i){
    const eid=k+"e"+i;
    if(answered[eid]){
      const ex=document.getElementById(eid);
      const btns=ex.querySelectorAll(".opt-btn");
      btns.forEach(function(b){b.disabled=true;});
      const userPick=answered[eid];
      const correctIdx=(e.a==="a"?0:1);
      if(userPick===e.a){
        ex.classList.add("correct");
        btns.forEach(function(b){if(b.textContent.indexOf(userPick+")")===0)b.classList.add("sel-ok");});
        document.getElementById("fbok-"+eid).classList.add("show");
      }else{
        ex.classList.add("incorrect");
        btns.forEach(function(b){
          if(b.textContent.indexOf(userPick+")")===0)b.classList.add("sel-bad");
          if(b.textContent.indexOf(e.a+")")===0)b.classList.add("show-ok");
        });
        document.getElementById("fbbad-"+eid).classList.add("show");
      }
    }
  });
}

function chk(eid,sel,correct,e,btn){
  if(answered[eid])return;
  answered[eid]=sel;
  const ex=document.getElementById(eid);
  const btns=ex.querySelectorAll(".opt-btn");
  btns.forEach(function(b){b.disabled=true;});
  const k=eid.match(/s\d+/)[0];
  if(sel===correct){
    ex.classList.add("correct");
    btns.forEach(function(b){if(b.textContent.indexOf(sel+")")===0)b.classList.add("sel-ok");});
    document.getElementById("fbok-"+eid).classList.add("show");
    scores[k]++;
  }else{
    ex.classList.add("incorrect");
    btns.forEach(function(b){
      if(b.textContent.indexOf(sel+")")===0)b.classList.add("sel-bad");
      if(b.textContent.indexOf(correct+")")===0)b.classList.add("show-ok");
    });
    document.getElementById("fbbad-"+eid).classList.add("show");
  }
  document.getElementById("sc-"+k).textContent=scores[k]+"/5";
  const allDone=[0,1,2,3,4].every(function(i){return answered[k+"e"+i];});
  if(allDone && curStep===4){
    setTimeout(function(){
      const sf=document.getElementById("summaryFinal");
      const sl=document.getElementById("summaryList");
      sl.innerHTML=DATA.summary.map(function(s){return "<li>"+s+"</li>";}).join("");
      var tot=0;Object.keys(scores).forEach(function(kk){tot+=scores[kk];});var ts=document.getElementById("totalScore");if(ts)ts.innerHTML="<div class=\"big\">"+tot+"/25</div><div class=\"small\">Total de aciertos</div>";
      sf.classList.add("show");
      sf.scrollIntoView({behavior:"smooth"});
    },600);
  }
}

renderStepTabs();renderCard();

</script>
