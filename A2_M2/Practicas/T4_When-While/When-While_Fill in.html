<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fill in the Blanks - A2 M2 · When / While | JUCUM English</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10B981; --primary-light: #6EE7B7; --primary-dark: #059669;
            --accent: #34D399; --bg-gradient-start: #ECFDF5; --bg-gradient-end: #D1FAE5;
            --text-dark: #064E3B; --text-medium: #065F46; --text-light: #047857;
            --success: #10B981; --success-light: #D1FAE5; --success-dark: #059669;
            --error: #EF4444; --error-light: #FEE2E2; --error-dark: #DC2626;
            --info: #3B82F6; --info-light: #DBEAFE; --info-dark: #1D4ED8;
            --purple: #8B5CF6; --purple-light: #EDE9FE; --purple-dark: #6D28D9;
            --white: #FFFFFF;
            --shadow-soft: 0 4px 20px rgba(16,185,129,0.15);
            --shadow-strong: 0 8px 30px rgba(16,185,129,0.25);
            --border-radius: 20px;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:'Nunito',sans-serif; background:linear-gradient(135deg,var(--bg-gradient-start) 0%,var(--bg-gradient-end) 100%); min-height:100vh; color:var(--text-dark); }

        .header { background:linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%); padding:1rem 1.5rem; display:flex; align-items:center; gap:1rem; position:sticky; top:0; z-index:100; box-shadow:var(--shadow-soft); }
        .back-btn { width:40px; height:40px; border-radius:50%; background:rgba(255,255,255,0.3); border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1.4rem; text-decoration:none; color:white; transition:all .2s; flex-shrink:0; }
        .back-btn:hover { background:rgba(255,255,255,0.5); transform:scale(1.1); }
        .header-info { flex:1; }
        .header-title { font-family:'Fredoka',sans-serif; font-size:1.1rem; font-weight:600; color:white; }
        .header-subtitle { font-size:0.8rem; color:rgba(255,255,255,0.85); margin-top:2px; }
        .progress-indicator { background:rgba(255,255,255,0.3); padding:0.4rem 0.9rem; border-radius:20px; font-weight:700; color:white; font-size:0.9rem; white-space:nowrap; }
        .progress-container { padding:0; height:6px; background:rgba(255,255,255,0.3); }
        .progress-fill { height:100%; background:white; border-radius:0 3px 3px 0; transition:width .5s ease; width:0%; }

        main { padding:1.5rem; max-width:650px; margin:0 auto; }
        .instructions { background:white; border-radius:16px; padding:1rem 1.25rem; margin-bottom:1.25rem; box-shadow:var(--shadow-soft); border-left:5px solid var(--primary); display:flex; gap:0.75rem; align-items:flex-start; }
        .instructions-icon { font-size:1.6rem; flex-shrink:0; }
        .instructions-title { font-family:'Fredoka',sans-serif; font-size:1rem; font-weight:600; color:var(--text-dark); margin-bottom:0.2rem; }
        .instructions-text { font-size:0.85rem; color:var(--text-medium); line-height:1.5; }

        .ref-panel { background:white; border-radius:16px; padding:1rem 1.25rem; margin-bottom:1.25rem; box-shadow:var(--shadow-soft); border-left:5px solid var(--info); }
        .ref-title { font-family:'Fredoka',sans-serif; font-size:0.95rem; font-weight:600; color:var(--info-dark); margin-bottom:0.6rem; display:flex; align-items:center; gap:0.4rem; }
        .ref-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.6rem; }
        .ref-card { background:#F0F9FF; border:1.5px solid #BFDBFE; border-radius:10px; padding:0.6rem 0.8rem; }
        .ref-card.while { background:#F0FDF4; border-color:#BBF7D0; }
        .ref-word { font-family:'Fredoka',sans-serif; font-weight:700; font-size:1rem; color:var(--info-dark); display:block; margin-bottom:0.2rem; }
        .ref-card.while .ref-word { color:var(--success-dark); }
        .ref-text { font-size:0.78rem; color:var(--text-medium); line-height:1.4; }

        .question-card { background:white; border-radius:var(--border-radius); box-shadow:var(--shadow-soft); padding:1.5rem; margin-bottom:1rem; animation:slideIn .4s ease; }
        .question-card.hidden { display:none; }
        @keyframes slideIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }

        .q-header { display:flex; align-items:center; gap:0.75rem; margin-bottom:1rem; }
        .question-number { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; display:flex; align-items:center; justify-content:center; font-family:'Fredoka',sans-serif; font-weight:700; font-size:0.95rem; flex-shrink:0; }
        .topic-badge { display:inline-flex; align-items:center; gap:0.3rem; padding:0.2rem 0.7rem; border-radius:20px; font-size:0.72rem; font-weight:700; background:#DBEAFE; color:#1D4ED8; }

        .hint-box { background:#F0FDF4; border-left:4px solid var(--primary); padding:0.7rem 1rem; border-radius:0 10px 10px 0; margin-bottom:1rem; font-size:0.88rem; color:var(--text-dark); line-height:1.5; }
        .hint-label { font-weight:700; color:var(--primary-dark); display:flex; align-items:center; gap:0.4rem; margin-bottom:0.2rem; font-size:0.82rem; text-transform:uppercase; letter-spacing:.5px; }

        .question-text { font-size:1.1rem; line-height:1.7; margin-bottom:0.4rem; font-weight:600; }
        .blank { display:inline-block; min-width:80px; padding:0.2rem 0.6rem; background:var(--primary-light); border:2px dashed var(--primary-dark); border-radius:8px; text-align:center; font-weight:700; color:var(--primary-dark); transition:all .3s; }
        .blank.correct { background:var(--success-light); border:2px solid var(--success); color:var(--success-dark); }
        .blank.incorrect { background:var(--error-light); border:2px solid var(--error); color:var(--error-dark); }

        .translate-toggle { display:flex; align-items:center; gap:0.4rem; background:#FFF; border:1.5px solid #E5E7EB; padding:0.4rem 0.8rem; border-radius:20px; font-size:0.78rem; font-weight:700; color:var(--text-medium); cursor:pointer; margin-bottom:1rem; transition:all .2s; }
        .translate-toggle:hover { border-color:var(--primary); color:var(--primary-dark); background:#F0FDF4; }
        .translate-toggle.active { background:var(--primary-light); border-color:var(--primary); color:var(--primary-dark); }
        .translation { display:none; color:var(--text-light); font-style:italic; font-size:0.85rem; margin-bottom:1rem; padding:0.6rem 0.9rem; background:#F0FDF4; border-radius:10px; border-left:3px solid var(--primary-light); }
        .translation.show { display:block; animation:fadeUp .3s ease; }

        .options-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:0.7rem; margin-top:0.5rem; }
        .option-btn { padding:0.9rem 0.5rem; border:2.5px solid #E5E7EB; border-radius:12px; background:white; font-family:'Nunito',sans-serif; font-size:1.05rem; font-weight:700; cursor:pointer; transition:all .2s; color:var(--text-dark); }
        .option-btn:hover:not(:disabled) { border-color:var(--primary); background:var(--primary-light); transform:translateY(-2px); }
        .option-btn:disabled { cursor:default; }
        .option-btn.correct { border-color:var(--success); background:var(--success-light); color:var(--success-dark); }
        .option-btn.incorrect { border-color:var(--error); background:var(--error-light); color:var(--error-dark); }

        .feedback { margin-top:1.25rem; border-radius:16px; overflow:hidden; display:none; box-shadow:0 4px 16px rgba(0,0,0,0.1); }
        .feedback.show { display:block; animation:fadeUp .35s ease; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

        .fb-header { padding:0.9rem 1.25rem; display:flex; align-items:center; gap:0.75rem; }
        .feedback.correct .fb-header { background:linear-gradient(135deg,var(--success),var(--success-dark)); }
        .feedback.incorrect .fb-header { background:linear-gradient(135deg,var(--error),var(--error-dark)); }
        .fb-icon { font-size:1.6rem; }
        .fb-title { font-family:'Fredoka',sans-serif; font-size:1.1rem; color:white; font-weight:600; }
        .fb-subtitle { font-size:0.8rem; color:rgba(255,255,255,0.85); margin-top:1px; }

        .fb-body { background:white; border:2px solid; border-top:none; border-radius:0 0 16px 16px; padding:1.25rem; display:flex; flex-direction:column; gap:0.9rem; }
        .feedback.correct .fb-body { border-color:var(--success); }
        .feedback.incorrect .fb-body { border-color:var(--error); }

        .fb-signal { background:#F0FDF4; border:1px solid #BBF7D0; border-radius:12px; padding:0.9rem 1rem; }
        .fb-signal.wrong { background:#FFF1F2; border-color:#FECDD3; }
        .fb-block-title { font-weight:800; font-size:0.78rem; text-transform:uppercase; letter-spacing:.6px; margin-bottom:0.5rem; display:flex; align-items:center; gap:0.4rem; }
        .fb-signal .fb-block-title { color:var(--success-dark); }
        .fb-signal.wrong .fb-block-title { color:var(--error-dark); }
        .fb-signal-text { font-size:0.92rem; color:var(--text-dark); line-height:1.55; }
        .signal-tag { display:inline-block; background:var(--success); color:white; border-radius:6px; padding:0.1rem 0.5rem; font-size:0.8rem; font-weight:700; margin:0 2px; }
        .signal-tag.red { background:var(--error); }

        .fb-compare { background:#F8FAFC; border:1px solid #E2E8F0; border-radius:12px; padding:0.9rem 1rem; }
        .fb-compare-row { display:flex; align-items:baseline; gap:0.6rem; padding:0.35rem 0; border-bottom:1px dashed #E2E8F0; }
        .fb-compare-row:last-child { border-bottom:none; }
        .compare-label { font-size:0.72rem; font-weight:800; text-transform:uppercase; letter-spacing:.5px; white-space:nowrap; padding:0.15rem 0.5rem; border-radius:6px; flex-shrink:0; }
        .compare-label.wrong { background:var(--error-light); color:var(--error-dark); }
        .compare-label.right { background:var(--success-light); color:var(--success-dark); }
        .compare-text { font-size:0.95rem; color:var(--text-dark); line-height:1.5; }
        .word-wrong { color:var(--error); font-weight:700; text-decoration:line-through; }
        .word-right { color:var(--success-dark); font-weight:700; }

        .fb-error { background:var(--error-light); border-radius:12px; padding:0.9rem 1rem; }
        .error-badge { display:inline-block; background:var(--error); color:white; padding:0.2rem 0.6rem; border-radius:6px; font-size:0.75rem; font-weight:700; margin-left:auto; }
        .fb-error .fb-block-title { color:var(--error-dark); }
        .error-word-row { display:flex; align-items:center; justify-content:center; gap:0.75rem; margin:0.6rem 0; flex-wrap:wrap; }
        .ew-box { padding:0.4rem 1rem; border-radius:8px; font-weight:700; font-size:1rem; }
        .ew-wrong { background:white; color:var(--error); border:2px solid var(--error); text-decoration:line-through; }
        .ew-arrow { font-size:1.3rem; color:var(--text-medium); }
        .ew-right { background:var(--success); color:white; }
        .error-rule { font-size:0.88rem; color:var(--error-dark); line-height:1.5; }

        .fb-rule { background:var(--info-light); border:1px solid #BFDBFE; border-radius:12px; padding:0.9rem 1rem; }
        .fb-rule .fb-block-title { color:var(--info-dark); }
        .rule-formula { background:white; border-radius:8px; padding:0.5rem 0.9rem; font-family:'Fredoka',sans-serif; font-size:0.95rem; color:var(--info-dark); font-weight:600; margin-bottom:0.6rem; text-align:center; border:1px solid #BFDBFE; }

        .fb-why { background:#F0FDF4; border:1px solid #BBF7D0; border-radius:12px; padding:0.9rem 1rem; }
        .fb-why .fb-block-title { color:var(--success-dark); }
        .fb-why-text { font-size:0.92rem; color:var(--text-dark); line-height:1.55; }

        .nav-buttons { display:flex; gap:0.75rem; margin-top:1.25rem; }
        .nav-btn { padding:0.8rem 1.2rem; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-size:0.95rem; font-weight:700; cursor:pointer; transition:all .2s; }
        .nav-btn.next { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; flex:1; }
        .nav-btn.prev { background:#F1F5F9; color:var(--text-dark); }
        .nav-btn:disabled { opacity:.4; cursor:default; }
        .nav-btn:not(:disabled):hover { transform:translateY(-2px); box-shadow:var(--shadow-soft); }

        .results-screen { display:none; text-align:center; padding:2rem 1.5rem; }
        .results-screen.show { display:block; animation:fadeUp .5s ease; }
        .results-emoji { font-size:4rem; margin-bottom:1rem; }
        .results-title { font-family:'Fredoka',sans-serif; font-size:2rem; margin-bottom:0.5rem; }
        .results-score { font-size:3rem; font-weight:800; color:var(--purple); margin:1rem 0; }
        .results-message { font-size:1.05rem; color:var(--text-medium); margin-bottom:1.5rem; }
        .stars-container { display:flex; justify-content:center; gap:0.5rem; margin:1.5rem 0; }
        .star { font-size:2.5rem; opacity:.3; transition:all .5s ease; }
        .star.earned { opacity:1; animation:starPop .5s ease; }
        @keyframes starPop { 0%{transform:scale(0)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }
        .results-buttons { display:flex; flex-direction:column; gap:1rem; margin-top:2rem; }
        .result-btn { padding:1rem 2rem; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; text-decoration:none; display:flex; align-items:center; justify-content:center; gap:0.5rem; transition:all .2s; }
        .result-btn.primary { background:linear-gradient(135deg,var(--purple),var(--purple-dark)); color:white; }
        .result-btn.secondary { background:#F1F5F9; color:var(--text-dark); }
        .result-btn:hover { transform:translateY(-2px); box-shadow:var(--shadow-soft); }
    </style>
</head>
<body>
    <header class="header">
        <a href="https://jucumenglishcenter.github.io/A2/A2_M1/Panel.html" class="back-btn">←</a>
        <div class="header-info">
            <div class="header-title">📝 Fill in the Blanks</div>

    <main>

                <div class="instructions-title">Choose between when and while</div>
                <div class="instructions-text">Look at the verb tense and the type of action to decide which time linker fits. Tap 🇪🇸 to see Spanish.</div>
            </div>
        </div>

        <div id="questionsContainer"></div>

        <div class="results-screen" id="resultsScreen">
            <div class="results-emoji">🎉</div>

            </div>
        </div>
    </main>

    <script>
    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    // ============================================================
    // WHEN / WHILE — time linkers
    // when: short, sudden, completed actions (Past Simple typical)
    // while: long, ongoing actions in progress (Past Continuous typical)
    // ============================================================
    const quizData = [
        {
            id: 1,
            sentence: "Sofía was walking to the bank _____ she suddenly realized she forgot her wallet.",
            translation: "Sofía estaba caminando al banco cuando se dio cuenta de repente que olvidó su billetera.",
            hint: "Look at the verb 'realized' — is it a sudden short action or a long ongoing action?",
            clue: "suddenly realized (sudden short action)",
            clueExplain: "'Realized' is a sudden, short action — perfect for 'when'. 'When' marks the moment of interruption.",
            options: ["when", "while"],
            correct: "when",
            feedback: {
                "while": { errorType: "Wrong linker", explanation: "'While' usually introduces a long ongoing action, not a sudden one. 'Realized' is a quick moment, so we use 'when'.", rule: "Sudden moment → when" }
            },
            correctReason: "'Realized' is a sudden, short event that marks the interruption point. 'When' is used for short, sudden, or completed actions.",
            ruleFormula: "longer action (PC) + when + sudden action (PS)"
        },
        {
            id: 2,
            sentence: "_____ the clerk was explaining each option, Sofía was looking at the chart.",
            translation: "Mientras la cajera estaba explicando cada opción, Sofía estaba mirando la tabla.",
            hint: "Both verbs are in Past Continuous (was + -ing) — what does that suggest about the type of linker?",
            clue: "was explaining + was looking (parallel ongoing)",
            clueExplain: "Both verbs are in Past Continuous, showing two parallel ongoing actions. 'While' is the typical linker for parallel ongoing actions.",
            options: ["When", "While"],
            correct: "While",
            feedback: {
                "When": { errorType: "Wrong linker", explanation: "'When' usually links a sudden event, but here both actions are ongoing in progress (Past Continuous in both). 'While' fits parallel ongoing actions.", rule: "Parallel ongoing actions → while" }
            },
            correctReason: "Both clauses use Past Continuous, showing two simultaneous ongoing actions. 'While' is the standard linker for parallel actions in progress.",
            ruleFormula: "While + PC, + PC (parallel actions)"
        },
        {
            id: 3,
            sentence: "Marcos was paying with his card _____ his phone rang.",
            translation: "Marcos estaba pagando con su tarjeta cuando su teléfono sonó.",
            hint: "The phone ringing is a sudden, short event interrupting the longer action.",
            clue: "rang (sudden short event)",
            clueExplain: "'Rang' is a sudden short event that interrupts the longer ongoing action of paying. 'When' is the linker for sudden interruptions.",
            options: ["when", "while"],
            correct: "when",
            feedback: {
                "while": { errorType: "Wrong linker", explanation: "'While' fits long ongoing actions, but 'rang' is a sudden short event. The interrupting event uses 'when'.", rule: "Sudden interruption → when" }
            },
            correctReason: "The phone ringing is a sudden, short event that interrupts the paying. We use 'when' for sudden short events that interrupt longer ongoing actions.",
            ruleFormula: "PC + when + PS (sudden interruption)"
        },
        {
            id: 4,
            sentence: "_____ Marcos was waiting for his card, he reviewed his bank statement.",
            translation: "Mientras Marcos estaba esperando su tarjeta, revisó su estado de cuenta.",
            hint: "The first verb 'was waiting' is in Past Continuous — what linker fits long ongoing actions?",
            clue: "was waiting (long ongoing action)",
            clueExplain: "'Was waiting' is Past Continuous, showing a long ongoing situation. 'While' fits long ongoing actions perfectly.",
            options: ["When", "While"],
            correct: "While",
            feedback: {
                "When": { errorType: "Wrong linker", explanation: "'When' is for sudden short events, but 'was waiting' is a long ongoing action. 'While' fits long ongoing situations.", rule: "Long ongoing action → while" }
            },
            correctReason: "Waiting is a long ongoing action shown by Past Continuous. 'While' is the typical linker for long ongoing situations.",
            ruleFormula: "While + PC (long action), + PS"
        },
        {
            id: 5,
            sentence: "I was reviewing my budget _____ the doorbell rang.",
            translation: "Estaba revisando mi presupuesto cuando sonó el timbre.",
            hint: "Look at the second verb 'rang' — is it a sudden short event or a long ongoing action?",
            clue: "rang (sudden short event)",
            clueExplain: "'Rang' is a quick, defined event that interrupts the longer ongoing action. 'When' marks the interruption point.",
            options: ["when", "while"],
            correct: "when",
            feedback: {
                "while": { errorType: "Wrong linker", explanation: "'While' fits long ongoing actions, but 'rang' is a sudden short event. The interrupting event needs 'when'.", rule: "Doorbell rang → sudden event → when" }
            },
            correctReason: "The doorbell ringing is a sudden, short event that interrupts the longer activity. 'When' is the linker for sudden interruptions.",
            ruleFormula: "PC + when + PS (interruption)"
        },
        {
            id: 6,
            sentence: "_____ I was a child, I lived near a small park.",
            translation: "Cuando era niño, vivía cerca de un pequeño parque.",
            hint: "Special use: this expression talks about a long period of life, but uses a different linker.",
            clue: "was a child (life period)",
            clueExplain: "Even though 'being a child' is a long period, the fixed expression 'when I was a child' uses 'when', not 'while'. It refers to a stage of life.",
            options: ["While", "When"],
            correct: "When",
            feedback: {
                "While": { errorType: "Wrong linker for life stages", explanation: "Although 'being a child' is a long period, English uses the fixed expression 'when I was a child' or 'when I was young'. 'While I was a child' sounds unnatural.", rule: "Life stages → when (fixed expression)" }
            },
            correctReason: "Fixed expressions about life stages always use 'when': when I was a child, when I was young, when I was at school. These are conventional uses.",
            ruleFormula: "When + I was a child / young / at school"
        },
        {
            id: 7,
            sentence: "The clerks were organizing the documents _____ the manager arrived.",
            translation: "Las cajeras estaban organizando los documentos cuando el gerente llegó.",
            hint: "Arriving is a sudden, defined event — what linker marks that interruption?",
            clue: "arrived (sudden defined event)",
            clueExplain: "'Arrived' is a sudden, defined moment that interrupts the longer ongoing action. 'When' marks the interruption point.",
            options: ["when", "while"],
            correct: "when",
            feedback: {
                "while": { errorType: "Wrong linker", explanation: "'While' usually introduces a long ongoing action, but 'arrived' is a sudden defined moment. The interrupting event needs 'when'.", rule: "Arrival = defined moment → when" }
            },
            correctReason: "Arriving at a place is a sudden, punctual event that interrupts the ongoing organizing. 'When' marks this kind of interruption.",
            ruleFormula: "PC + when + PS (sudden arrival)"
        },
        {
            id: 8,
            sentence: "_____ the customers were waiting in the room, the security guard was checking the doors.",
            translation: "Mientras los clientes estaban esperando en la sala, el guardia estaba revisando las puertas.",
            hint: "Two ongoing actions in Past Continuous happening at the same time.",
            clue: "was waiting + was checking (parallel ongoing)",
            clueExplain: "Both verbs are in Past Continuous, showing two parallel ongoing activities at the same time. 'While' fits parallel ongoing actions.",
            options: ["When", "While"],
            correct: "While",
            feedback: {

    let currentQuestion = 0;
    let score = 0;
    let answered = new Array(quizData.length).fill(false);

    function initQuiz() {
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';
        quizData.forEach((q, index) => container.appendChild(createQuestionCard(q, index)));
        showQuestion(0);
        updateProgress();
    }

    function createQuestionCard(q, index) {
        const card = document.createElement('div');
        card.className = `question-card ${index !== 0 ? 'hidden' : ''}`;
        card.id = `question-${index}`;
        const shuffled = shuffle(q.options);

        card.innerHTML = `
            <div class="q-header">
                <div class="question-number">${index + 1}</div>
                <span class="topic-badge">⏱️ when / while</span>
            </div>
            <div class="hint-box">
                <div class="hint-label">💡 Hint</div>
                ${q.hint}
            </div>
            <p class="question-text">${q.sentence.replace('_____', `<span class="blank" id="blank-${index}">?</span>`)}</p>
            <button class="translate-toggle" onclick="toggleTranslation(${index}, this)">🇪🇸 <span>Show Spanish</span></button>
            <div class="translation" id="translation-${index}">${q.translation}</div>
            <div class="options-grid" id="options-${index}">
                ${shuffled.map((opt, i) => `
                    <button class="option-btn" data-idx="${i}" onclick="selectAnswer(${index}, ${i}, this)">${opt}</button>
                `).join('')}
            </div>
            <div class="feedback" id="feedback-${index}"></div>
            <div class="nav-buttons">
                <button class="nav-btn prev" onclick="prevQuestion()" ${index === 0 ? 'disabled' : ''}>← Previous</button>
                <button class="nav-btn next" id="next-${index}" onclick="nextQuestion(${index})" disabled>
                    ${index === quizData.length - 1 ? 'See Results 🎉' : 'Next →'}
                </button>
            </div>
        `;
        card._shuffled = shuffled;
        return card;
    }

    function toggleTranslation(qi, btn) {
        const tr = document.getElementById(`translation-${qi}`);
        const span = btn.querySelector('span');
        if (tr.classList.contains('show')) {
            tr.classList.remove('show');
            btn.classList.remove('active');
            span.textContent = 'Show Spanish';
        } else {
            tr.classList.add('show');
            btn.classList.add('active');
            span.textContent = 'Hide Spanish';
        }
    }

    function selectAnswer(qi, optIdx, btn) {
        if (answered[qi]) return;
        answered[qi] = true;
        const q = quizData[qi];
        const card = document.getElementById(`question-${qi}`);
        const shuffled = card._shuffled;
        const selected = shuffled[optIdx];
        const isCorrect = selected === q.correct;
        if (isCorrect) score++;

        const blank = document.getElementById(`blank-${qi}`);
        blank.textContent = selected;
        blank.className = `blank ${isCorrect ? 'correct' : 'incorrect'}`;

        document.querySelectorAll(`#options-${qi} .option-btn`).forEach(b => {
            b.disabled = true;
            const idx = parseInt(b.getAttribute('data-idx'));
            const t = shuffled[idx];
            if (t === q.correct) b.classList.add('correct');
            else if (idx === optIdx) b.classList.add('incorrect');
        });

        buildFeedback(qi, selected, isCorrect, q);
        document.getElementById(`next-${qi}`).disabled = false;
        updateProgress();
    }

    function buildFeedback(qi, selected, isCorrect, q) {
        const el = document.getElementById(`feedback-${qi}`);
        el.className = `feedback show ${isCorrect ? 'correct' : 'incorrect'}`;

        if (isCorrect) {
            el.innerHTML = `
                <div class="fb-header">
                    <span class="fb-icon">✅</span>
                    <div>
                        <div class="fb-title">Correct!</div>
                        <div class="fb-subtitle">You chose the right time linker</div>
                    </div>
                </div>
                <div class="fb-body">
                    <div class="fb-signal">
                        <div class="fb-block-title">🔍 The key signal you spotted</div>
                        <div class="fb-signal-text">
                            <span class="signal-tag">${q.clue}</span> — ${q.clueExplain}
                        </div>
                    </div>
                    <div class="fb-rule">
                        <div class="fb-block-title">📐 Pattern</div>
                        <div class="rule-formula">${q.ruleFormula}</div>
                    </div>
                    <div class="fb-why">
                        <div class="fb-block-title">💡 Why is it correct?</div>
                        <div class="fb-why-text">${q.correctReason}</div>
                    </div>
                </div>
            `;
        } else {
            const err = q.feedback[selected] || { errorType: 'Error', explanation: 'Incorrect answer.', rule: '' };
            el.innerHTML = `
                <div class="fb-header">
                    <span class="fb-icon">❌</span>
                    <div>
                        <div class="fb-title">Incorrect</div>
                        <div class="fb-subtitle">Let's review what happened</div>
                    </div>
                </div>
                <div class="fb-body">
                    <div class="fb-signal wrong">
                        <div class="fb-block-title">🔍 The key signal you needed to spot</div>
                        <div class="fb-signal-text">
                            <span class="signal-tag red">${q.clue}</span> — ${q.clueExplain}
                        </div>
                    </div>
                    <div class="fb-compare">
                        <div class="fb-block-title" style="color:#64748B;">🔄 Your answer vs. correct</div>
                        <div class="fb-compare-row">
                            <span class="compare-label wrong">You wrote</span>
                            <span class="compare-text"><span class="word-wrong">${selected}</span></span>
                        </div>
                        <div class="fb-compare-row">
                            <span class="compare-label right">Correct</span>
                            <span class="compare-text"><span class="word-right">${q.correct}</span></span>
                        </div>
                    </div>
                    <div class="fb-error">
                        <div class="fb-block-title">⚠️ Error type: <span class="error-badge">${err.errorType}</span></div>
                        <div class="error-word-row">
                            <span class="ew-box ew-wrong">${selected}</span>
                            <span class="ew-arrow">→</span>
                            <span class="ew-box ew-right">${q.correct}</span>
                        </div>
                        <div class="error-rule">${err.explanation}</div>
                        ${err.rule ? `<div style="margin-top:0.5rem;font-size:0.82rem;color:var(--error-dark);font-weight:700;">📌 ${err.rule}</div>` : ''}
                    </div>
                    <div class="fb-rule">
                        <div class="fb-block-title">📐 The correct pattern</div>
                        <div class="rule-formula">${q.ruleFormula}</div>
                    </div>
                    <div class="fb-why">
                        <div class="fb-block-title">💡 Why is the correct answer right?</div>
                        <div class="fb-why-text">${q.correctReason}</div>
                    </div>
                </div>
            `;
        }
    }

    function showQuestion(i) {
        document.querySelectorAll('.question-card').forEach((c, idx) => c.classList.toggle('hidden', idx !== i));
        document.getElementById('currentQ').textContent = i + 1;
        currentQuestion = i;
    }

    function nextQuestion(i) {
        if (i < quizData.length - 1) showQuestion(i + 1);
        else showResults();
    }

    function prevQuestion() { if (currentQuestion > 0) showQuestion(currentQuestion - 1); }

    function updateProgress() {
        const done = answered.filter(Boolean).length;
        document.getElementById('progressFill').style.width = (done / quizData.length * 100) + '%';
    }

    function showResults() {
        document.querySelectorAll('.question-card').forEach(c => c.classList.add('hidden'));
        const rs = document.getElementById('resultsScreen');
        rs.classList.add('show');
        const pct = score / quizData.length * 100;
        document.getElementById('finalScore').textContent = `${score}/${quizData.length}`;
        let stars = pct >= 90 ? 3 : pct >= 70 ? 2 : 1;
        document.getElementById('resultsMessage').textContent = pct >= 90
            ? 'Excellent! You master when and while perfectly. 🏆'
            : pct >= 70 ? 'Well done! Keep practicing. 💪'
            : 'Good effort. Review the rules and try again. 📚';
        document.querySelectorAll('.star').forEach((s, i) => {
            if (i < stars) setTimeout(() => s.classList.add('earned'), i * 300);
        });
    }

    document.addEventListener('DOMContentLoaded', initQuiz);
    </script>
