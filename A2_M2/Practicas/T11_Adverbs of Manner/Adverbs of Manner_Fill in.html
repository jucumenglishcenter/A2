        .rule-formula { background:white; border-radius:8px; padding:0.5rem 0.9rem; font-family:'Fredoka',sans-serif; font-size:0.95rem; color:var(--info-dark); font-weight:600; margin-bottom:0.6rem; text-align:center; border:1px solid #BFDBFE; }

        .fb-why { background:#F0FDF4; border:1px solid #BBF7D0; border-radius:12px; padding:0.9rem 1rem; }

        .nav-buttons { display:flex; gap:0.75rem; margin-top:1.25rem; }

        .nav-btn.next { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; flex:1; }

        .results-screen { display:none; text-align:center; padding:2rem 1.5rem; }

        .stars-container { display:flex; justify-content:center; gap:0.5rem; margin:1.5rem 0; }

        @keyframes starPop { 0%{transform:scale(0)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }
        .results-buttons { display:flex; flex-direction:column; gap:1rem; margin-top:2rem; }

        .result-btn.primary { background:linear-gradient(135deg,var(--purple),var(--purple-dark)); color:white; }
        .result-btn.secondary { background:#F1F5F9; color:var(--text-dark); }

<body>
    <header class="header">
        <a href="https://jucumenglishcenter.github.io/A2/A2_M1/Panel.html" class="back-btn">←</a>

    </header>
    <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>

    <main>
        <div class="instructions">
            <div class="instructions-icon">⚡</div>
            <div>
                <div class="instructions-title">Choose the correct adverb of manner</div>
                <div class="instructions-text">Adverbs of manner describe HOW an action happens. Most are formed adjective + -ly. Pay attention to spelling rules and irregular forms. Tap 🇪🇸 to see Spanish.</div>
            </div>
        </div>

        <div id="questionsContainer"></div>

        <div class="results-screen" id="resultsScreen">
            <div class="results-emoji">🎉</div>
            <div class="results-title">Completed!</div>
            <div class="results-score" id="finalScore">0/15</div>

                <span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span>
            </div>

                <button class="result-btn primary" onclick="location.reload()">🔄 Try Again</button>

            </div>

    </main>

    <script>
    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    // ============================================================
    // ADVERBS OF MANNER & POSITION
    // - Regular: adj + ly (slow→slowly, quick→quickly)
    // - Spelling: -y→-ily (happy→happily) / -le→-ly (simple→simply)
    // - Irregular: good→well, fast→fast, hard→hard, late→late
    // - Position: after verb / after object (NOT between verb and object)
    // ============================================================
    const quizData = [
        {
            id: 1,
            sentence: "Sofía speaks _____ when she explains things to her grandmother.",
            translation: "Sofía habla despacio cuando explica cosas a su abuela.",
            type: "regular",
            adjective: "slow",
            hint: "We need an ADVERB (describes HOW she speaks). The adjective is 'slow'. What's the adverb form?",
            clue: "describes how she speaks (verb + adverb)",
            clueExplain: "After the verb 'speaks', we need an ADVERB to describe HOW she speaks. Most adverbs are formed: adjective + -ly.",
            options: ["slowly", "slow", "slow-ly", "slowely"],
            correct: "slowly",
            feedback: {
                "slow": { errorType: "Wrong form — adjective", explanation: "'Slow' is an ADJECTIVE (describes a noun: 'a slow car'). To describe a VERB ('speaks'), we need an ADVERB: 'slowly'.", rule: "adjective + ly = adverb" },
                "slow-ly": { errorType: "Wrong spelling — no hyphen", explanation: "We don't use hyphens to form adverbs. The correct form is 'slowly' (one word, no hyphen).", rule: "adjective + ly (no hyphen)" },
                "slowely": { errorType: "Wrong spelling — extra 'e'", explanation: "When 'slow' ends in a consonant, we just add '-ly' (slow + ly). Don't add an extra 'e': 'slowly'.", rule: "consonant + ly (no extra letter)" }
            },
            correctReason: "'Speaks' is a verb. To describe HOW she speaks, we need an adverb. The adjective 'slow' becomes 'slowly' by adding -ly.",
            ruleFormula: "verb + adverb (adj + ly)"
        },
        {
            id: 2,
            sentence: "Marcos drives _____ on the highway to be safe.",
            translation: "Marcos conduce con cuidado en la autopista para estar seguro.",
            type: "regular",
            adjective: "careful",
            hint: "The adjective is 'careful'. What's the adverb form to describe HOW he drives?",
            clue: "describes how he drives",
            clueExplain: "After 'drives', we need an adverb. 'Careful' becomes 'carefully' by adding -ly.",
            options: ["careful", "carefully", "carely", "carefuly"],
            correct: "carefully",
            feedback: {
                "careful": { errorType: "Wrong form — adjective", explanation: "'Careful' is an ADJECTIVE. To describe a VERB ('drives'), we need an ADVERB: 'carefully'.", rule: "verb needs adverb (adj + ly)" },
                "carely": { errorType: "Wrong spelling — missing 'ful'", explanation: "We don't drop letters. The base adjective is 'careful' (with -ful). Add -ly to get 'carefully'.", rule: "Keep the full adjective + ly" },
                "carefuly": { errorType: "Wrong spelling — single 'l'", explanation: "When the adjective ends in -ful, we still add -ly normally. 'Careful' + 'ly' = 'carefully' (with double l).", rule: "careful + ly = carefully (double l)" }
            },
            correctReason: "'Drives' is a verb. The adverb 'carefully' describes how Marcos drives. Adjective 'careful' + -ly = 'carefully'.",
            ruleFormula: "verb + adverb (careful → carefully)"
        },
        {
            id: 3,
            sentence: "The children laughed _____ at the funny clown's jokes.",
            translation: "Los niños rieron felizmente con los chistes del payaso divertido.",
            type: "spelling",
            adjective: "happy",
            hint: "The adjective 'happy' ends in -y. What happens with the spelling when forming the adverb?",
            clue: "adjective ending in -y (spelling change)",
            clueExplain: "When the adjective ends in -y, we change y → i and add -ly: happy → happily.",
            options: ["happyly", "happy", "happily", "happlily"],
            correct: "happily",
            feedback: {
                "happyly": { errorType: "Wrong spelling — y→i", explanation: "When the adjective ends in -y, we MUST change y → i before adding -ly. 'Happy' becomes 'happily' (NOT 'happyly').", rule: "-y → -ily (consonant + y)" },
                "happy": { errorType: "Wrong form — adjective", explanation: "'Happy' is an ADJECTIVE. After the verb 'laughed', we need an ADVERB: 'happily'.", rule: "verb needs adverb" },
                "happlily": { errorType: "Wrong spelling — extra letter", explanation: "We just change y → i and add -ly. 'Happy' → 'happi' + 'ly' = 'happily' (no extra 'l').", rule: "happy → happi → happily" }
            },
            correctReason: "'Happy' ends in -y. The spelling rule: y → i + ly. So 'happy' becomes 'happily' to describe the action of laughing.",
            ruleFormula: "-y → -ily (happy → happily)"
        },
        {
            id: 4,
            sentence: "Carlos sings _____ in the church choir every Sunday.",
            translation: "Carlos canta bien en el coro de la iglesia cada domingo.",
            type: "irregular",
            adjective: "good",
            hint: "The adjective is 'good'. What's the IRREGULAR adverb form? It's NOT 'goodly'.",
            clue: "good → ??? (irregular)",
            clueExplain: "'Good' has an IRREGULAR adverb form: 'well' (not 'goodly'). This is one of the most common irregulars.",
            options: ["good", "goodly", "goodlly", "well"],
            correct: "well",

    let currentQuestion = 0;
    let score = 0;
    let answered = new Array(quizData.length).fill(false);

    function initQuiz() {
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';
        quizData.forEach((q, index) => container.appendChild(createQuestionCard(q, index)));
        showQuestion(0);
        updateProgress();
    }

    function createQuestionCard(q, index) {
        const card = document.createElement('div');
        card.className = `question-card ${index !== 0 ? 'hidden' : ''}`;
        card.id = `question-${index}`;
        const shuffled = shuffle(q.options);
        let badgeClass, badgeText;
        if (q.type === 'regular') { badgeClass = 'regular'; badgeText = '⚡ Regular -ly'; }
        else if (q.type === 'spelling') { badgeClass = 'spelling'; badgeText = '🔤 Spelling change'; }
        else if (q.type === 'irregular') { badgeClass = 'irregular'; badgeText = '⚠️ Irregular'; }
        else { badgeClass = 'position'; badgeText = '📍 Position'; }

        card.innerHTML = `
            <div class="q-header">
                <div class="question-number">${index + 1}</div>
                <span class="topic-badge ${badgeClass}">${badgeText}</span>
            </div>
            <div class="verb-label">Adjective: ${q.adjective}</div>
            <div class="hint-box">
                <div class="hint-label">💡 Hint</div>
                ${q.hint}
            </div>
            <p class="question-text">${q.sentence.replace('_____', `<span class="blank" id="blank-${index}">?</span>`)}</p>
            <button class="translate-toggle" onclick="toggleTranslation(${index}, this)">🇪🇸 <span>Show Spanish</span></button>
            <div class="translation" id="translation-${index}">${q.translation}</div>
            <div class="options-grid" id="options-${index}">
                ${shuffled.map((opt, i) => `
                    <button class="option-btn" data-idx="${i}" onclick="selectAnswer(${index}, ${i}, this)">${opt}</button>
                `).join('')}
            </div>
            <div class="feedback" id="feedback-${index}"></div>
            <div class="nav-buttons">
                <button class="nav-btn prev" onclick="prevQuestion()" ${index === 0 ? 'disabled' : ''}>← Previous</button>
                <button class="nav-btn next" id="next-${index}" onclick="nextQuestion(${index})" disabled>
                    ${index === quizData.length - 1 ? 'See Results 🎉' : 'Next →'}
                </button>
            </div>
        `;
        card._shuffled = shuffled;
        return card;
    }

    function toggleTranslation(qi, btn) {
        const tr = document.getElementById(`translation-${qi}`);
        const span = btn.querySelector('span');
        if (tr.classList.contains('show')) {
            tr.classList.remove('show');
            btn.classList.remove('active');
            span.textContent = 'Show Spanish';
        } else {
            tr.classList.add('show');
            btn.classList.add('active');
            span.textContent = 'Hide Spanish';
        }
    }

    function selectAnswer(qi, optIdx, btn) {
        if (answered[qi]) return;
        answered[qi] = true;
        const q = quizData[qi];
        const card = document.getElementById(`question-${qi}`);
        const shuffled = card._shuffled;
        const selected = shuffled[optIdx];
        const isCorrect = selected === q.correct;
        if (isCorrect) score++;

        const blank = document.getElementById(`blank-${qi}`);
        blank.textContent = selected;
        blank.className = `blank ${isCorrect ? 'correct' : 'incorrect'}`;

        document.querySelectorAll(`#options-${qi} .option-btn`).forEach(b => {
            b.disabled = true;
            const idx = parseInt(b.getAttribute('data-idx'));
            const t = shuffled[idx];
            if (t === q.correct) b.classList.add('correct');
            else if (idx === optIdx) b.classList.add('incorrect');
        });

        buildFeedback(qi, selected, isCorrect, q);
        document.getElementById(`next-${qi}`).disabled = false;
        updateProgress();
    }

    function buildFeedback(qi, selected, isCorrect, q) {
        const el = document.getElementById(`feedback-${qi}`);
        el.className = `feedback show ${isCorrect ? 'correct' : 'incorrect'}`;

        if (isCorrect) {
            el.innerHTML = `
                <div class="fb-header">
                    <span class="fb-icon">✅</span>
                    <div>
                        <div class="fb-title">Correct!</div>
                        <div class="fb-subtitle">You chose the right adverb form</div>
                    </div>
                </div>
                <div class="fb-body">
                    <div class="fb-signal">
                        <div class="fb-block-title">🔍 The key signal you spotted</div>
                        <div class="fb-signal-text">
                            <span class="signal-tag">${q.clue}</span> — ${q.clueExplain}
                        </div>
                    </div>
                    <div class="fb-rule">
                        <div class="fb-block-title">📐 Pattern</div>
                        <div class="rule-formula">${q.ruleFormula}</div>
                    </div>
                    <div class="fb-why">
                        <div class="fb-block-title">💡 Why is it correct?</div>
                        <div class="fb-why-text">${q.correctReason}</div>
                    </div>
                </div>
            `;
        } else {
            const err = q.feedback[selected] || { errorType: 'Error', explanation: 'Incorrect answer.', rule: '' };
            el.innerHTML = `
                <div class="fb-header">
                    <span class="fb-icon">❌</span>
                    <div>
                        <div class="fb-title">Incorrect</div>
                        <div class="fb-subtitle">Let's review what happened</div>
                    </div>
                </div>
                <div class="fb-body">
                    <div class="fb-signal wrong">
                        <div class="fb-block-title">🔍 The key signal you needed to spot</div>
                        <div class="fb-signal-text">
                            <span class="signal-tag red">${q.clue}</span> — ${q.clueExplain}
                        </div>
                    </div>
                    <div class="fb-compare">
                        <div class="fb-block-title" style="color:#64748B;">🔄 Your answer vs. correct</div>
                        <div class="fb-compare-row">
                            <span class="compare-label wrong">You wrote</span>
                            <span class="compare-text"><span class="word-wrong">${selected}</span></span>
                        </div>
                        <div class="fb-compare-row">
                            <span class="compare-label right">Correct</span>
                            <span class="compare-text"><span class="word-right">${q.correct}</span></span>
                        </div>
                    </div>
                    <div class="fb-error">
                        <div class="fb-block-title">⚠️ Error type: <span class="error-badge">${err.errorType}</span></div>
                        <div class="error-word-row">
                            <span class="ew-box ew-wrong">${selected}</span>
                            <span class="ew-arrow">→</span>
                            <span class="ew-box ew-right">${q.correct}</span>
                        </div>
                        <div class="error-rule">${err.explanation}</div>
                        ${err.rule ? `<div style="margin-top:0.5rem;font-size:0.82rem;color:var(--error-dark);font-weight:700;">📌 ${err.rule}</div>` : ''}
                    </div>
                    <div class="fb-rule">
                        <div class="fb-block-title">📐 The correct pattern</div>
                        <div class="rule-formula">${q.ruleFormula}</div>
                    </div>
                    <div class="fb-why">
                        <div class="fb-block-title">💡 Why is the correct answer right?</div>
                        <div class="fb-why-text">${q.correctReason}</div>
                    </div>
                </div>
            `;
        }
    }

    function showQuestion(i) {
        document.querySelectorAll('.question-card').forEach((c, idx) => c.classList.toggle('hidden', idx !== i));
        document.getElementById('currentQ').textContent = i + 1;
        currentQuestion = i;
    }

    function nextQuestion(i) {
        if (i < quizData.length - 1) showQuestion(i + 1);
        else showResults();
    }

    function prevQuestion() { if (currentQuestion > 0) showQuestion(currentQuestion - 1); }

    function updateProgress() {
        const done = answered.filter(Boolean).length;
        document.getElementById('progressFill').style.width = (done / quizData.length * 100) + '%';
    }

    function showResults() {
        document.querySelectorAll('.question-card').forEach(c => c.classList.add('hidden'));
        const rs = document.getElementById('resultsScreen');
        rs.classList.add('show');
        const pct = score / quizData.length * 100;
        document.getElementById('finalScore').textContent = `${score}/${quizData.length}`;
        let stars = pct >= 90 ? 3 : pct >= 70 ? 2 : 1;
        document.getElementById('resultsMessage').textContent = pct >= 90
            ? 'Excellent! You master adverbs of manner perfectly. 🏆'
            : pct >= 70 ? 'Well done! Keep practicing. 💪'
            : 'Good effort. Review the rules and try again. 📚';
        document.querySelectorAll('.star').forEach((s, i) => {
            if (i < stars) setTimeout(() => s.classList.add('earned'), i * 300);
        });
    }

    document.addEventListener('DOMContentLoaded', initQuiz);
    </script>
