    <header class="header">
        <a href="https://jucumenglishcenter.github.io/A2/A2_M1/Panel.html" class="back-btn">←</a>

    <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>

    <main>
        <div class="instructions">
            <div class="instructions-icon">🔄</div>
            <div>
                <div class="instructions-title">Transform the sentence</div>
                <div class="instructions-text">Read the original sentence and the goal. Choose the option that correctly transforms the meaning. Tap 🇪🇸 to see Spanish translations.</div>
            </div>
        </div>

        <div id="questionsContainer"></div>

            <div class="results-emoji">🎉</div>

            </div>

            <div class="results-buttons">
                <button class="result-btn primary" onclick="location.reload()">🔄 Try Again</button>

            </div>

    </main>

    <script>
    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    // Goals: change between excess/sufficient OR between affirmative/negative
    // Goals NEUTRAL — never reveal which structure to use
    const quizData = [
        {
            id: 1,
            base: "The coffee is too hot to drink.",
            baseEs: "El café está demasiado caliente para beber.",
            goal: "Change to sufficient meaning (positive ability)",
            goalEs: "Cambiar a significado suficiente (habilidad positiva)",
            hint: "The original means excess. Change to mean the temperature is right for drinking — positive sufficiency.",
            options: [
                { text: "The coffee is hot enough to drink.", textEs: "El café está suficientemente caliente para beber.", correct: true },
                { text: "The coffee is enough hot to drink.", textEs: "El café está suficiente caliente para beber.", correct: false,
                  errorType: "Wrong word order",
                  explanation: "'Enough' goes AFTER the adjective, not before. Correct order: 'hot enough'." },
                { text: "The coffee is too much hot to drink.", textEs: "El café está demasiado mucho caliente para beber.", correct: false,
                  errorType: "Wrong form",
                  explanation: "'Too much' is for uncountable nouns, not adjectives. Plus the meaning is sufficient (positive), not excess." }
            ],
            ruleFormula: "too + adj (excess) → adj + enough (sufficient)",
            correctReason: "To change from excess to sufficient meaning with adjectives, replace 'too' with 'enough' AFTER the adjective: 'too hot' → 'hot enough'."
        },
        {
            id: 2,
            base: "Sofía is tall enough to reach the top shelf.",
            baseEs: "Sofía es lo suficientemente alta para alcanzar el estante superior.",
            goal: "Change to excess meaning (causes a problem)",
            goalEs: "Cambiar a significado excesivo (causa un problema)",
            hint: "The original means sufficient ability. Change to mean her height is excessive (a problem).",
            options: [
                { text: "Sofía is enough tall to reach the top shelf.", textEs: "Sofía es suficiente alta para alcanzar el estante superior.", correct: false,
                  errorType: "Wrong word order",
                  explanation: "'Enough' goes AFTER the adjective. 'Enough tall' is incorrect. Plus the meaning is excess, so use 'too'." },
                { text: "Sofía is too tall to reach the top shelf.", textEs: "Sofía es demasiado alta para alcanzar el estante superior.", correct: true },
                { text: "Sofía is too much tall to reach the top shelf.", textEs: "Sofía es demasiado mucho alta para alcanzar el estante superior.", correct: false,
                  errorType: "Wrong form",
                  explanation: "'Too much' is for uncountable nouns, not adjectives. With adjectives we use just 'too': 'too tall'." }
            ],
            ruleFormula: "adj + enough (sufficient) → too + adj (excess)",
            correctReason: "To change from sufficient to excess meaning with adjectives, replace 'enough' with 'too' BEFORE the adjective: 'tall enough' → 'too tall'."
        },
        {
            id: 3,
            base: "Marcos has too much money in his account.",
            baseEs: "Marcos tiene demasiado dinero en su cuenta.",
            goal: "Change to insufficient meaning (negative)",
            goalEs: "Cambiar a significado insuficiente (negativo)",
            hint: "The original means excess money. Change to mean he doesn't have enough money.",
            options: [
                { text: "Marcos hasn't money enough in his account.", textEs: "Marcos no tiene dinero suficiente en su cuenta.", correct: false,
                  errorType: "Wrong word order",
                  explanation: "With nouns, 'enough' goes BEFORE the noun. 'Money enough' has the wrong order — we say 'enough money'." },
                { text: "Marcos doesn't have too much money in his account.", textEs: "Marcos no tiene demasiado dinero en su cuenta.", correct: false,
                  errorType: "Wrong meaning",
                  explanation: "'Doesn't have too much' means 'doesn't have an excess', not 'doesn't have enough'. The goal is INSUFFICIENT, so use 'enough'." },
                { text: "Marcos doesn't have enough money in his account.", textEs: "Marcos no tiene suficiente dinero en su cuenta.", correct: true }
            ],
            ruleFormula: "too much + noun (excess) → not + enough + noun (insufficient)",
            correctReason: "To change from excess to insufficient with nouns, use 'doesn't have enough + noun': 'too much money' → 'not enough money'. 'Enough' goes BEFORE the noun."
        },
        {
            id: 4,
            base: "There were too many people in the meeting.",
            baseEs: "Había demasiada gente en la reunión.",
            goal: "Change to sufficient meaning (the right amount)",
            goalEs: "Cambiar a significado suficiente (la cantidad correcta)",
            hint: "The original means excess of people. Change to mean the right amount of people.",
            options: [
                { text: "There were people enough in the meeting.", textEs: "Había gente suficiente en la reunión.", correct: false,
                  errorType: "Wrong word order",
                  explanation: "With nouns, 'enough' goes BEFORE the noun. 'People enough' has the wrong order — we say 'enough people'." },
                { text: "There were enough people in the meeting.", textEs: "Había suficiente gente en la reunión.", correct: true },
                { text: "There were too people in the meeting.", textEs: "Había demasiada gente en la reunión.", correct: false,
                  errorType: "Missing 'many' or wrong choice",
                  explanation: "'Too' alone doesn't go with nouns. The goal is SUFFICIENT, so we need 'enough people' (not any 'too' form)." }
            ],
            ruleFormula: "too many + plural (excess) → enough + plural (sufficient)",
            correctReason: "To change from excess to sufficient with countable plural nouns, replace 'too many' with 'enough': 'too many people' → 'enough people'."
        },
        {
            id: 5,
            base: "Carlos is too young to drive a car.",
            baseEs: "Carlos es demasiado joven para conducir un coche.",
            goal: "Express the same meaning using 'old' instead of 'young' (insufficient age)",
            goalEs: "Expresar el mismo significado usando 'old' en lugar de 'young' (edad insuficiente)",
            hint: "If he's TOO YOUNG, then he's NOT OLD ENOUGH. Same meaning, opposite adjective with negative form.",
            options: [
                { text: "Carlos is old enough to drive a car.", textEs: "Carlos es lo suficientemente mayor para conducir un coche.", correct: false,
                  errorType: "Wrong meaning — opposite",
                  explanation: "'Old enough' means he CAN drive (positive). But the original says he can't — the same meaning needs negation: 'isn't old enough'." },
                { text: "Carlos isn't enough old to drive a car.", textEs: "Carlos no es suficiente mayor para conducir un coche.", correct: false,
                  errorType: "Wrong word order",
                  explanation: "'Enough' goes AFTER the adjective. 'Enough old' is incorrect. Correct: 'isn't old enough'." },
                { text: "Carlos isn't old enough to drive a car.", textEs: "Carlos no es lo suficientemente mayor para conducir un coche.", correct: true }
            ],
            ruleFormula: "too + adj₁ → not + opposite_adj + enough",
            correctReason: "'Too young' = 'not old enough'. Same meaning expressed with the opposite adjective and negative form. 'Enough' goes AFTER the adjective."
        },
        {
            id: 6,
            base: "Sofía has enough time to finish the report.",
            baseEs: "Sofía tiene suficiente tiempo para terminar el informe.",

    let currentQuestion = 0, score = 0;
    let answered = new Array(quizData.length).fill(false);

    function initQuiz() {
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';
        quizData.forEach((q, i) => {
            q.shuffled = shuffle(q.options);
            container.appendChild(createCard(q, i));
        });
        showQuestion(0);
        updateProgress();
    }

    function createCard(q, index) {
        const card = document.createElement('div');
        card.className = `question-card ${index !== 0 ? 'hidden' : ''}`;
        card.id = `question-${index}`;
        const letters = ['A','B','C'];

        card.innerHTML = `
            <div class="q-header">
                <div class="question-number">${index + 1}</div>
                <span class="q-label">Transform the sentence:</span>
                <span class="topic-badge">⚖️ enough/too</span>
            </div>
            <div class="hint-box">
                <div class="hint-label">💡 Hint</div>
                ${q.hint}
            </div>
            <div class="transform-visual">
                <div class="transform-box base">
                    <span class="transform-label">🔶 Original sentence</span>
                    <div class="transform-sentence">${q.base}</div>
                </div>
                <div class="transform-arrow">⬇ Transform to...</div>
                <div class="transform-box goal">
                    <span class="transform-label">🎯 Goal</span>
                    <div class="transform-sentence">${q.goal}</div>
                </div>
            </div>
            <button class="translate-toggle" onclick="toggleTranslation(${index}, this)">🇪🇸 <span>Show Spanish</span></button>
            <div class="translation-block" id="translation-${index}">
                <div><strong>Original:</strong> ${q.baseEs}</div>
                <div style="margin-top:0.3rem;"><strong>Goal:</strong> ${q.goalEs}</div>
                <div style="margin-top:0.3rem;border-top:1px dashed #BBF7D0;padding-top:0.3rem;"><strong>Options:</strong></div>
                ${q.shuffled.map((opt, i) => `<div style="margin-top:0.2rem;">${letters[i]}. ${opt.textEs}</div>`).join('')}
            </div>
            <div class="options-container" id="options-${index}">
                ${q.shuffled.map((opt, i) => `
                    <button class="option-btn" data-idx="${i}" onclick="selectOption(${index}, ${i})">
                        <div class="option-letter">${letters[i]}</div>
                        <div class="option-text">${opt.text}</div>
                    </button>
                `).join('')}
            </div>
            <div class="feedback" id="feedback-${index}"></div>
            <div class="nav-buttons">
                <button class="nav-btn prev" onclick="prevQuestion()" ${index === 0 ? 'disabled' : ''}>← Previous</button>
                <button class="nav-btn next" id="next-${index}" onclick="nextQuestion(${index})" disabled>
                    ${index === quizData.length - 1 ? 'See Results 🎉' : 'Next →'}
                </button>
            </div>
        `;
        return card;
    }

    function toggleTranslation(qi, btn) {
        const tr = document.getElementById(`translation-${qi}`);
        const span = btn.querySelector('span');
        if (tr.classList.contains('show')) {
            tr.classList.remove('show');
            btn.classList.remove('active');
            span.textContent = 'Show Spanish';
        } else {
            tr.classList.add('show');
            btn.classList.add('active');
            span.textContent = 'Hide Spanish';
        }
    }

    function selectOption(qi, optIdx) {
        if (answered[qi]) return;
        answered[qi] = true;
        const q = quizData[qi];
        const selected = q.shuffled[optIdx];
        const isCorrect = selected.correct;
        const correctOpt = q.shuffled.find(o => o.correct);
        const correctIdx = q.shuffled.indexOf(correctOpt);
        if (isCorrect) score++;

        document.querySelectorAll(`#options-${qi} .option-btn`).forEach((btn, i) => {
            btn.classList.add('disabled');
            if (i === correctIdx) btn.classList.add('correct');
            else if (i === optIdx) btn.classList.add('incorrect');
        });

        buildFeedback(qi, selected, isCorrect, correctOpt, q);
        document.getElementById(`next-${qi}`).disabled = false;
        updateProgress();
    }

    function buildFeedback(qi, selected, isCorrect, correctOpt, q) {
        const el = document.getElementById(`feedback-${qi}`);
        el.className = `feedback show ${isCorrect ? 'correct' : 'incorrect'}`;

        const transformFlow = (showWrong) => `
            <div class="transform-flow">
                <div class="tf-step present"><span class="tf-label">Original</span>${q.base}</div>
                <div class="tf-arrow">⬇</div>
                ${showWrong ? `<div class="tf-step past-wrong"><span class="tf-label">Your answer</span>${selected.text}</div><div class="tf-arrow">↕</div>` : ''}
                <div class="tf-step past-correct"><span class="tf-label">Correct</span>${correctOpt.text}</div>
            </div>
        `;

        if (isCorrect) {
            el.innerHTML = `
                <div class="fb-header">
                    <span class="fb-icon">✅</span>
                    <div>
                        <div class="fb-title">Correct transformation!</div>
                        <div class="fb-subtitle">You changed the meaning correctly</div>
                    </div>
                </div>
                <div class="fb-body">
                    <div class="fb-block fb-transform">
                        <div class="fb-block-title">🔄 Transformation done</div>
                        ${transformFlow(false)}
                    </div>
                    <div class="fb-block fb-rule">
                        <div class="fb-block-title">📐 Pattern</div>
                        <div class="rule-formula">${q.ruleFormula}</div>
                    </div>
                    <div class="fb-block fb-why">
                        <div class="fb-block-title">💡 Why is the transformation correct?</div>
                        <div class="fb-why-text">${q.correctReason}</div>
                    </div>
                </div>
            `;
        } else {
            el.innerHTML = `
                <div class="fb-header">
                    <span class="fb-icon">❌</span>
                    <div>
                        <div class="fb-title">Incorrect transformation</div>
                        <div class="fb-subtitle">Let's review what went wrong</div>
                    </div>
                </div>
                <div class="fb-body">
                    <div class="fb-block fb-transform">
                        <div class="fb-block-title">🔄 Your transformation vs. correct</div>
                        ${transformFlow(true)}
                    </div>
                    <div class="fb-block fb-error">
                        <div class="fb-block-title">⚠️ The error: <span class="error-badge">${selected.errorType}</span></div>
                        <div class="error-text">${selected.explanation}</div>
                    </div>
                    <div class="fb-block fb-rule">
                        <div class="fb-block-title">📐 The correct pattern</div>
                        <div class="rule-formula">${q.ruleFormula}</div>
                    </div>
                    <div class="fb-block fb-why">
                        <div class="fb-block-title">💡 How should the transformation be done?</div>
                        <div class="fb-why-text">${q.correctReason}</div>
                    </div>
                </div>
            `;
        }
    }

    function showQuestion(i) {
        document.querySelectorAll('.question-card').forEach((c, idx) => c.classList.toggle('hidden', idx !== i));
        document.getElementById('currentQ').textContent = i + 1;
        currentQuestion = i;
    }
    function nextQuestion(i) { i < quizData.length - 1 ? showQuestion(i + 1) : showResults(); }
    function prevQuestion() { if (currentQuestion > 0) showQuestion(currentQuestion - 1); }
    function updateProgress() {
        const done = answered.filter(Boolean).length;
        document.getElementById('progressFill').style.width = (done / quizData.length * 100) + '%';
    }
    function showResults() {
        document.querySelectorAll('.question-card').forEach(c => c.classList.add('hidden'));
        document.getElementById('resultsScreen').classList.add('show');
        const pct = score / quizData.length * 100;
        document.getElementById('finalScore').textContent = `${score}/${quizData.length}`;
        let stars = pct >= 90 ? 3 : pct >= 70 ? 2 : 1;
        document.getElementById('resultsMessage').textContent = pct >= 90
            ? 'Excellent! You transform enough/too perfectly. 🏆'
            : pct >= 70 ? 'Well done! Keep practicing. 💪'
            : 'Good effort. Review the rules and try again. 📚';
        document.querySelectorAll('.star').forEach((s, i) => {
            if (i < stars) setTimeout(() => s.classList.add('earned'), i * 300);
        });
    }
    document.addEventListener('DOMContentLoaded', initQuiz);
    </script>
