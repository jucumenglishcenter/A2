        .nav-buttons { display:flex; gap:0.75rem; margin-top:1.25rem; }
        .nav-btn { padding:0.8rem 1.2rem; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-size:0.95rem; font-weight:700; cursor:pointer; transition:all .2s; }
        .nav-btn.next { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; flex:1; }

        .results-screen { display:none; text-align:center; padding:2rem 1.5rem; }

        .results-title { font-family:'Fredoka',sans-serif; font-size:2rem; margin-bottom:0.5rem; }
        .results-score { font-size:3rem; font-weight:800; color:var(--purple); margin:1rem 0; }
        .results-message { font-size:1.05rem; color:var(--text-medium); margin-bottom:1.5rem; }

        @keyframes starPop { 0%{transform:scale(0)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }
        .results-buttons { display:flex; flex-direction:column; gap:1rem; margin-top:2rem; }

        .result-btn.primary { background:linear-gradient(135deg,var(--purple),var(--purple-dark)); color:white; }
        .result-btn.secondary { background:#F1F5F9; color:var(--text-dark); }
        .result-btn:hover { transform:translateY(-2px); box-shadow:var(--shadow-soft); }

<body>
    <header class="header">

                <div class="instructions-title">Identify the correct sentence</div>

    <script>
    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    const quizData = [
        {
            id: 1,
            type: "excess_adj",
            hint: "Pay attention to the meaning (excess vs sufficient) and the position of 'enough' or 'too'.",
            options: [
                { text: "The coffee is too hot to drink — I need to wait.", textEs: "El café está demasiado caliente para beber — necesito esperar.", correct: true },
                { text: "The coffee is hot enough to drink — I need to wait.", textEs: "El café está suficientemente caliente para beber — necesito esperar.", correct: false,
                  errorType: "Wrong meaning — sufficient",
                  explanation: "'Hot enough' means appropriately hot (positive). But 'I need to wait' shows the heat is EXCESSIVE — use 'too hot'." },
                { text: "The coffee is enough hot to drink — I need to wait.", textEs: "El café está suficiente caliente para beber — necesito esperar.", correct: false,
                  errorType: "Wrong word order",
                  explanation: "'Enough' goes AFTER the adjective, not before. 'Enough hot' is incorrect. With excess we use 'too' before: 'too hot'." }
            ],
            ruleFormula: "too + adjective (excess)",
            correctReason: "'Need to wait' shows the heat is excessive. 'Too' goes BEFORE the adjective to express excess: 'too hot'."
        },
        {
            id: 2,
            type: "sufficient_adj",
            hint: "Look at the word order — 'enough' has a specific position with adjectives.",
            options: [
                { text: "Sofía is enough tall to reach the top shelf without help.", textEs: "Sofía es lo suficientemente alta para alcanzar el estante superior sin ayuda.", correct: false,
                  errorType: "Wrong word order",
                  explanation: "'Enough' goes AFTER the adjective, not before. 'Enough tall' is incorrect. The correct order is 'tall enough'." },
                { text: "Sofía is tall enough to reach the top shelf without help.", textEs: "Sofía es lo suficientemente alta para alcanzar el estante superior sin ayuda.", correct: true },
                { text: "Sofía is too tall to reach the top shelf without help.", textEs: "Sofía es demasiado alta para alcanzar el estante superior sin ayuda.", correct: false,
                  errorType: "Wrong meaning — excess",
                  explanation: "'Too tall' means excessive height (a problem). But she CAN reach — that's positive sufficiency. Use 'tall enough'." }
            ],
            ruleFormula: "adjective + enough (sufficient)",
            correctReason: "'Without help' shows the height is sufficient. 'Enough' goes AFTER the adjective: 'tall enough'."
        },
        {
            id: 3,
            type: "sufficient_noun",
            hint: "With nouns, 'enough' has a different position than with adjectives. Where does it go?",
            options: [
                { text: "Marcos doesn't have money enough to pay all his bills.", textEs: "Marcos no tiene suficiente dinero para pagar todos sus recibos.", correct: false,
                  errorType: "Wrong word order",
                  explanation: "With NOUNS, 'enough' goes BEFORE the noun, not after. The correct order is 'enough money'." },
                { text: "Marcos doesn't have too much money to pay all his bills.", textEs: "Marcos no tiene demasiado dinero para pagar todos sus recibos.", correct: false,
                  errorType: "Wrong meaning — excess",
                  explanation: "'Too much money' means excessive amount. The context is the OPPOSITE — he doesn't have ENOUGH to pay." },
                { text: "Marcos doesn't have enough money to pay all his bills.", textEs: "Marcos no tiene suficiente dinero para pagar todos sus recibos.", correct: true }
            ],
            ruleFormula: "enough + noun (before noun)",
            correctReason: "Insufficient money to pay bills. With nouns, 'enough' goes BEFORE the noun: 'enough money'."
        },
        {
            id: 4,
            type: "excess_countable",
            hint: "Excess of a countable plural noun. Which quantifier word follows 'too'?",
            options: [
                { text: "There were too much people in the meeting — we couldn't sit comfortably.", textEs: "Había demasiada gente en la reunión — no pudimos sentarnos cómodamente.", correct: false,
                  errorType: "Wrong quantifier",
                  explanation: "'Too much' is for UNCOUNTABLE nouns (water, money). 'People' is countable plural — we use 'too many'." },
                { text: "There were too many people in the meeting — we couldn't sit comfortably.", textEs: "Había demasiada gente en la reunión — no pudimos sentarnos cómodamente.", correct: true },
                { text: "There were enough people in the meeting — we couldn't sit comfortably.", textEs: "Había suficiente gente en la reunión — no pudimos sentarnos cómodamente.", correct: false,
                  errorType: "Wrong meaning — sufficient",
                  explanation: "'Enough people' means the right amount. But 'couldn't sit comfortably' shows EXCESS — use 'too many'." }
            ],
            ruleFormula: "too many + countable plural (excess)",
            correctReason: "'Couldn't sit' shows excess. 'People' is countable plural, so we use 'too many people'."
        },
        {
            id: 5,
            type: "excess_adj",
            hint: "Carlos can't drive — what does that say about his age?",
            options: [
                { text: "Carlos is young enough to drive a car — he is only 15 years old.", textEs: "Carlos es lo suficientemente joven para conducir un coche — solo tiene 15 años.", correct: false,
                  errorType: "Wrong meaning — sufficient",
                  explanation: "'Young enough' means sufficient youth (positive ability). But Carlos is too YOUNG to drive — that's excess." },
                { text: "Carlos is too young to drive a car — he is only 15 years old.", textEs: "Carlos es demasiado joven para conducir un coche — solo tiene 15 años.", correct: true },
                { text: "Carlos is enough young to drive a car — he is only 15 years old.", textEs: "Carlos es suficiente joven para conducir un coche — solo tiene 15 años.", correct: false,
                  errorType: "Wrong word order",
                  explanation: "'Enough' goes AFTER the adjective, not before. 'Enough young' is incorrect. Plus, the meaning here is excess: 'too young'." }
            ],
            ruleFormula: "too + adjective (excess)",
            correctReason: "'Only 15' shows his age is excessive (too young to drive legally). 'Too' + adjective expresses excess."
        },
        {
            id: 6,
            type: "sufficient_adj",
            hint: "The bank is walkable — what does that say about its distance?",
            options: [
                { text: "The bank office is too close to walk to from here — about 5 minutes.", textEs: "La oficina del banco está demasiado cerca para caminar desde aquí — unos 5 minutos.", correct: false,
                  errorType: "Wrong meaning — excess",
                  explanation: "'Too close' would mean problematically close. But they CAN walk there in 5 minutes — that's positive sufficiency." },
                { text: "The bank office is enough close to walk to from here — about 5 minutes.", textEs: "La oficina del banco está suficiente cerca para caminar desde aquí — unos 5 minutos.", correct: false,
                  errorType: "Wrong word order",
                  explanation: "'Enough' goes AFTER the adjective. 'Enough close' is incorrect. The correct order is 'close enough'." },
                { text: "The bank office is close enough to walk to from here — about 5 minutes.", textEs: "La oficina del banco está suficientemente cerca para caminar desde aquí — unos 5 minutos.", correct: true }
            ],
            ruleFormula: "adjective + enough (sufficient)",
            correctReason: "5 minutes walk shows sufficient closeness. 'Enough' goes AFTER the adjective: 'close enough'."
        },
        {
            id: 7,
            type: "sufficient_noun",
            hint: "With nouns, the position of 'enough' is fixed. Where does it go?",
            options: [
                { text: "Sofía has time enough to finish the report before 5 PM.", textEs: "Sofía tiene suficiente tiempo para terminar el informe antes de las 5 PM.", correct: false,
                  errorType: "Wrong word order",
                  explanation: "With NOUNS, 'enough' goes BEFORE the noun. 'Time enough' has the wrong order — we say 'enough time'." },
                { text: "Sofía has enough time to finish the report before 5 PM.", textEs: "Sofía tiene suficiente tiempo para terminar el informe antes de las 5 PM.", correct: true },
                { text: "Sofía has too much time to finish the report before 5 PM.", textEs: "Sofía tiene demasiado tiempo para terminar el informe antes de las 5 PM.", correct: false,
                  errorType: "Wrong meaning — excess",
                  explanation: "'Too much time' means excessive time. The context shows positive sufficiency (she CAN finish). Use 'enough time'." }
            ],
            ruleFormula: "enough + noun (before noun)",
            correctReason: "Sufficient time to finish. With nouns, 'enough' goes BEFORE: 'enough time'."
        },
        {
            id: 8,
            type: "excess_uncountable",
            hint: "Excess of an uncountable noun (coffee). Which quantifier word follows 'too'?",
            options: [
                { text: "Marcos drinks too many coffee — his doctor says it's bad.", textEs: "Marcos toma demasiado café — su doctor dice que es malo.", correct: false,
                  errorType: "Wrong quantifier",
                  explanation: "'Too many' is for COUNTABLE plural nouns. 'Coffee' is uncountable — we use 'too much'." },
                { text: "Marcos drinks enough coffee — his doctor says it's bad.", textEs: "Marcos toma suficiente café — su doctor dice que es malo.", correct: false,
                  errorType: "Wrong meaning — sufficient",
                  explanation: "'Enough coffee' means the right amount (positive). But 'bad for health' shows EXCESS — use 'too much'." },
                { text: "Marcos drinks too much coffee — his doctor says it's bad.", textEs: "Marcos toma demasiado café — su doctor dice que es malo.", correct: true }
            ],
            ruleFormula: "too much + uncountable (excess)",
            correctReason: "'Bad for health' shows excess. 'Coffee' is uncountable, so we use 'too much coffee'."
        },
        {
            id: 9,
            type: "sufficient_countable",
            hint: "Insufficient amount of a countable plural noun. Where does 'enough' go?",
            options: [
                { text: "There aren't enough chairs in the kitchen for everyone to sit.", textEs: "No hay suficientes sillas en la cocina para que todos se sienten.", correct: true },
                { text: "There aren't chairs enough in the kitchen for everyone to sit.", textEs: "No hay sillas suficientes en la cocina para que todos se sienten.", correct: false,
                  errorType: "Wrong word order",
                  explanation: "With NOUNS, 'enough' goes BEFORE the noun. 'Chairs enough' has the wrong order — we say 'enough chairs'." },
                { text: "There aren't too many chairs in the kitchen for everyone to sit.", textEs: "No hay demasiadas sillas en la cocina para que todos se sienten.", correct: false,
                  errorType: "Wrong meaning — excess",
                  explanation: "'Too many chairs' means excessive amount. The context is the OPPOSITE — there AREN'T enough." }
            ],
            ruleFormula: "enough + countable plural (sufficient/insufficient)",
            correctReason: "Insufficient chairs. 'Enough' goes BEFORE the noun: 'enough chairs'."
        },
        {
            id: 10,
            type: "excess_adj",
            hint: "Discomfort caused by excessive quality — which form fits?",
            options: [
                { text: "The soup is salty enough — it makes me feel uncomfortable.", textEs: "La sopa está suficientemente salada — me hace sentir incómoda.", correct: false,
                  errorType: "Wrong meaning — sufficient",
                  explanation: "'Salty enough' means appropriately salty (positive). But 'uncomfortable' shows EXCESS — use 'too salty'." },
                { text: "The soup is too salty — it makes me feel uncomfortable.", textEs: "La sopa está demasiado salada — me hace sentir incómoda.", correct: true },
                { text: "The soup is too much salty — it makes me feel uncomfortable.", textEs: "La sopa está demasiado mucho salada — me hace sentir incómoda.", correct: false,
                  errorType: "Wrong form",
                  explanation: "'Too much' is for uncountable nouns, not adjectives. With adjectives we use just 'too': 'too salty'." }
            ],
            ruleFormula: "too + adjective (excess)",
            correctReason: "'Uncomfortable' shows excess saltiness. 'Too' + adjective expresses excess: 'too salty'."
        },
        {
            id: 11,
            type: "sufficient_adj",
            hint: "Carlos can't enter — what does that say about his age (insufficient or excessive)?",
            options: [
                { text: "Carlos is too old to enter the night club — he is only 17.", textEs: "Carlos es demasiado mayor para entrar al club nocturno — solo tiene 17 años.", correct: false,
                  errorType: "Wrong meaning — opposite",
                  explanation: "'Too old' means excessive age. But Carlos is only 17 — he's too YOUNG, meaning his age is INSUFFICIENT (not old enough)." },
                { text: "Carlos isn't old enough to enter the night club — he is only 17.", textEs: "Carlos no es lo suficientemente mayor para entrar al club nocturno — solo tiene 17 años.", correct: true },
                { text: "Carlos isn't enough old to enter the night club — he is only 17.", textEs: "Carlos no es suficiente mayor para entrar al club nocturno — solo tiene 17 años.", correct: false,
                  errorType: "Wrong word order",
                  explanation: "'Enough' goes AFTER the adjective. 'Enough old' is incorrect. The correct order is 'old enough'." }
            ],
            ruleFormula: "subject + isn't + adjective + enough (insufficient)",
            correctReason: "'Only 17' = insufficient age. 'Isn't old enough' = doesn't meet the age requirement. Adj + enough."
        },
        {
            id: 12,
            type: "sufficient_countable",
            hint: "She CAN cook — what does that say about the ingredients (sufficient or excessive)?",
            options: [
                { text: "Sofía bought ingredients enough — now she can prepare a big meal.", textEs: "Sofía compró ingredientes suficientes — ahora puede preparar una gran comida.", correct: false,
                  errorType: "Wrong word order",
                  explanation: "With nouns, 'enough' goes BEFORE the noun. 'Ingredients enough' has the wrong order — we say 'enough ingredients'." },
                { text: "Sofía bought too many ingredients — now she can prepare a big meal.", textEs: "Sofía compró demasiados ingredientes — ahora puede preparar una gran comida.", correct: false,
                  errorType: "Wrong meaning — excess",
                  explanation: "'Too many ingredients' means excessive amount. The context is positive — she CAN prepare a meal. Use 'enough'." },
                { text: "Sofía bought enough ingredients — now she can prepare a big meal.", textEs: "Sofía compró suficientes ingredientes — ahora puede preparar una gran comida.", correct: true }
            ],
            ruleFormula: "enough + countable plural (sufficient)",
            correctReason: "Sufficient ingredients to cook. 'Enough' goes BEFORE the noun: 'enough ingredients'."
        },
        {
            id: 13,
            type: "sufficient_uncountable",
            hint: "Look at the position of 'enough' with uncountable nouns.",
            options: [
                { text: "There is water enough in this glass for both of us to drink.", textEs: "Hay agua suficiente en este vaso para que los dos bebamos.", correct: false,
                  errorType: "Wrong word order",
                  explanation: "With nouns, 'enough' goes BEFORE the noun. 'Water enough' has the wrong order — we say 'enough water'." },
                { text: "There is enough water in this glass for both of us to drink.", textEs: "Hay suficiente agua en este vaso para que los dos bebamos.", correct: true },
                { text: "There is too much water in this glass for both of us to drink.", textEs: "Hay demasiada agua en este vaso para que los dos bebamos.", correct: false,
                  errorType: "Wrong meaning — excess",
                  explanation: "'Too much water' means excessive amount. The context is positive (sufficient for both). Use 'enough'." }
            ],
            ruleFormula: "enough + uncountable (sufficient)",
            correctReason: "Sufficient water for both. 'Enough' goes BEFORE the uncountable noun: 'enough water'."
        },
        {
            id: 14,
            type: "excess_adj",
            hint: "Many students didn't pass — what does that say about the difficulty?",
            options: [
                { text: "The exam was difficult enough — many students didn't pass.", textEs: "El examen fue suficientemente difícil — muchos estudiantes no pasaron.", correct: false,
                  errorType: "Wrong meaning — sufficient",
                  explanation: "'Difficult enough' would mean appropriately difficult. But many students DIDN'T pass — that shows EXCESS difficulty." },
                { text: "The exam was too much difficult — many students didn't pass.", textEs: "El examen fue demasiado mucho difícil — muchos estudiantes no pasaron.", correct: false,
                  errorType: "Wrong form",
                  explanation: "'Too much' is for uncountable nouns. With adjectives we use just 'too': 'too difficult'." },
                { text: "The exam was too difficult — many students didn't pass.", textEs: "El examen fue demasiado difícil — muchos estudiantes no pasaron.", correct: true }
            ],
            ruleFormula: "too + adjective (excess)",
            correctReason: "'Didn't pass' shows excessive difficulty. 'Too' + adjective expresses excess: 'too difficult'."
        },
        {
            id: 15,
            type: "excess_countable",
            hint: "Excess of a countable plural noun — which quantifier follows 'too'?",
            options: [
                { text: "There are too people at this restaurant — we should leave.", textEs: "Hay demasiada gente en este restaurante — deberíamos irnos.", correct: false,
                  errorType: "Missing 'many'",
                  explanation: "'Too' alone is for adjectives. With nouns we need 'too much' (uncountable) or 'too many' (countable plural). 'People' is plural — use 'too many'." },
                { text: "There are too much people at this restaurant — we should leave.", textEs: "Hay demasiada gente en este restaurante — deberíamos irnos.", correct: false,
                  errorType: "Wrong quantifier",
                  explanation: "'Too much' is for UNCOUNTABLE nouns. 'People' is countable plural — we use 'too many'." },
                { text: "There are too many people at this restaurant — we should leave.", textEs: "Hay demasiada gente en este restaurante — deberíamos irnos.", correct: true }
            ],
            ruleFormula: "too many + countable plural (excess)",
            correctReason: "'Should leave' shows excess. 'People' is countable plural, so 'too many people'."
        }
    ];

    let currentQuestion = 0, score = 0;
    let answered = new Array(quizData.length).fill(false);

    function initQuiz() {
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';
        quizData.forEach((q, i) => {
            q.shuffled = shuffle(q.options);
            container.appendChild(createCard(q, i));
        });
        showQuestion(0);
        updateProgress();
    }

    function createCard(q, index) {
        const card = document.createElement('div');
        card.className = `question-card ${index !== 0 ? 'hidden' : ''}`;
        card.id = `question-${index}`;
        const letters = ['A','B','C'];
        const isExcess = q.type.startsWith('excess');
        const badgeClass = isExcess ? 'excess' : 'sufficient';
        const badgeText = isExcess ? '➕ Excess' : '✅ Sufficient';

        card.innerHTML = `
            <div class="q-header">
                <div class="question-number">${index + 1}</div>
                <span class="q-label">Choose the grammatically correct sentence:</span>
                <span class="topic-badge ${badgeClass}">${badgeText}</span>
            </div>
            <div class="hint-box">
                <div class="hint-label">💡 Hint</div>
                ${q.hint}
            </div>
            <button class="translate-toggle" onclick="toggleTranslation(${index}, this)">🇪🇸 <span>Show Spanish</span></button>
            <div class="sentence-options" id="options-${index}">
                ${q.shuffled.map((opt, i) => `
                    <button class="sent-option" data-idx="${i}" onclick="selectOption(${index}, ${i})">
                        <div class="option-letter">${letters[i]}</div>
                        <div class="option-text">
                            ${opt.text}
                            <div class="option-text-es" id="es-${index}-${i}">${opt.textEs}</div>
                        </div>
                        <div class="option-status"></div>
                    </button>
                `).join('')}
            </div>
            <div class="feedback" id="feedback-${index}"></div>
            <div class="nav-buttons">
                <button class="nav-btn prev" onclick="prevQuestion()" ${index === 0 ? 'disabled' : ''}>← Previous</button>
                <button class="nav-btn next" id="next-${index}" onclick="nextQuestion(${index})" disabled>
                    ${index === quizData.length - 1 ? 'See Results 🎉' : 'Next →'}
                </button>
            </div>
        `;
        return card;
    }

    function toggleTranslation(qi, btn) {
        const span = btn.querySelector('span');
        const esItems = document.querySelectorAll(`#options-${qi} .option-text-es`);
        const isOn = btn.classList.contains('active');
        if (isOn) {
            esItems.forEach(el => el.classList.remove('show'));
            btn.classList.remove('active');
            span.textContent = 'Show Spanish';
        } else {
            esItems.forEach(el => el.classList.add('show'));
            btn.classList.add('active');
            span.textContent = 'Hide Spanish';
        }
    }

    function selectOption(qi, optIdx) {
        if (answered[qi]) return;
        answered[qi] = true;
        const q = quizData[qi];
        const selected = q.shuffled[optIdx];
        const isCorrect = selected.correct;
        const correctOpt = q.shuffled.find(o => o.correct);
        const correctIdx = q.shuffled.indexOf(correctOpt);
        if (isCorrect) score++;

        document.querySelectorAll(`#options-${qi} .sent-option`).forEach((btn, i) => {
            btn.classList.add('disabled');
            const statusEl = btn.querySelector('.option-status');
            if (i === correctIdx) {
                btn.classList.add('correct');
                statusEl.textContent = '✅';
            } else if (i === optIdx) {
                btn.classList.add('incorrect');
                statusEl.textContent = '❌';
            }
        });

        buildFeedback(qi, selected, isCorrect, correctOpt, q);
        document.getElementById(`next-${qi}`).disabled = false;
        updateProgress();
    }

    function buildFeedback(qi, selected, isCorrect, correctOpt, q) {
        const el = document.getElementById(`feedback-${qi}`);
        el.className = `feedback show ${isCorrect ? 'correct' : 'incorrect'}`;
        const wrongOptions = q.shuffled.filter(o => !o.correct);

        if (isCorrect) {
            el.innerHTML = `
                <div class="fb-header">
                    <span class="fb-icon">✅</span>
                    <div>
                        <div class="fb-title">Correct! You identified the right sentence</div>
                        <div class="fb-subtitle">Let's see why the others were wrong</div>
                    </div>
                </div>
                <div class="fb-body">
                    <div class="fb-block fb-rule">
                        <div class="fb-block-title">📐 Pattern</div>
                        <div class="rule-formula">${q.ruleFormula}</div>
                    </div>
                    ${wrongOptions.map(err => `
                    <div class="fb-block fb-error">
                        <div class="fb-block-title">⚠️ Error in another option: <span class="error-badge">${err.errorType}</span></div>
                        <div class="error-text" style="margin-bottom:0.5rem;font-style:italic;">"${err.text}"</div>
                        <div class="error-text">${err.explanation}</div>
                    </div>`).join('')}
                    <div class="fb-block fb-why">
                        <div class="fb-block-title">💡 Why is the correct sentence right?</div>
                        <div class="fb-why-text">${q.correctReason}</div>
                    </div>
                </div>
            `;
        } else {
            el.innerHTML = `
                <div class="fb-header">
                    <span class="fb-icon">❌</span>
                    <div>
                        <div class="fb-title">Incorrect — let's review</div>
                        <div class="fb-subtitle">Compare your choice with the correct sentence</div>
                    </div>
                </div>
                <div class="fb-body">
                    <div class="fb-block fb-compare">
                        <div class="fb-block-title">🔄 Your choice vs. correct</div>
                        <div class="compare-row">
                            <span class="compare-label wrong">You chose</span>
                            <span class="compare-text">${selected.text}</span>
                        </div>
                        <div class="compare-row">
                            <span class="compare-label right">Correct</span>
                            <span class="compare-text">${correctOpt.text}</span>
                        </div>
                    </div>
                    <div class="fb-block fb-error">
                        <div class="fb-block-title">⚠️ The error: <span class="error-badge">${selected.errorType}</span></div>
                        <div class="error-text">${selected.explanation}</div>
                    </div>
                    <div class="fb-block fb-rule">
                        <div class="fb-block-title">📐 Pattern</div>
                        <div class="rule-formula">${q.ruleFormula}</div>
                    </div>
                    <div class="fb-block fb-why">
                        <div class="fb-block-title">💡 Why is the correct sentence right?</div>
                        <div class="fb-why-text">${q.correctReason}</div>
                    </div>
                </div>
            `;
        }
    }

    function showQuestion(i) {
        document.querySelectorAll('.question-card').forEach((c, idx) => c.classList.toggle('hidden', idx !== i));
        document.getElementById('currentQ').textContent = i + 1;
        currentQuestion = i;
    }
    function nextQuestion(i) { i < quizData.length - 1 ? showQuestion(i + 1) : showResults(); }
    function prevQuestion() { if (currentQuestion > 0) showQuestion(currentQuestion - 1); }
    function updateProgress() {
        const done = answered.filter(Boolean).length;
        document.getElementById('progressFill').style.width = (done / quizData.length * 100) + '%';
    }
    function showResults() {
        document.querySelectorAll('.question-card').forEach(c => c.classList.add('hidden'));
        document.getElementById('resultsScreen').classList.add('show');
        const pct = score / quizData.length * 100;
        document.getElementById('finalScore').textContent = `${score}/${quizData.length}`;
        let stars = pct >= 90 ? 3 : pct >= 70 ? 2 : 1;
        document.getElementById('resultsMessage').textContent = pct >= 90
            ? 'Excellent! You can identify enough/too perfectly. 🏆'
            : pct >= 70 ? 'Well done! Keep practicing. 💪'
            : 'Good effort. Review the patterns and try again. 📚';
        document.querySelectorAll('.star').forEach((s, i) => {
            if (i < stars) setTimeout(() => s.classList.add('earned'), i * 300);
        });
    }
    document.addEventListener('DOMContentLoaded', initQuiz);
    </script>
</body>
</html>
