        .rule-formula { background:white; border-radius:8px; padding:0.5rem 0.9rem; font-family:'Fredoka',sans-serif; font-size:0.95rem; color:var(--info-dark); font-weight:600; margin-bottom:0.6rem; text-align:center; border:1px solid #BFDBFE; }

        .fb-why { background:#F0FDF4; border:1px solid #BBF7D0; border-radius:12px; padding:0.9rem 1rem; }

        @keyframes starPop { 0%{transform:scale(0)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }

        .result-btn.primary { background:linear-gradient(135deg,var(--purple),var(--purple-dark)); color:white; }
        .result-btn.secondary { background:#F1F5F9; color:var(--text-dark); }
        .result-btn:hover { transform:translateY(-2px); box-shadow:var(--shadow-soft); }

<body>
    <header class="header">
        <a href="https://jucumenglishcenter.github.io/A2/A2_M1/Panel.html" class="back-btn">←</a>
        <div class="header-info">
            <div class="header-title">📝 Fill in the Blanks</div>
            <div class="header-subtitle">💚 A2 · Module 2 · Enough / Too</div>
        </div>
        <div class="progress-indicator"><span id="currentQ">1</span>/15</div>
    </header>
    <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>

    <main>
        <div class="instructions">
            <div class="instructions-icon">⚖️</div>
            <div>
                <div class="instructions-title">Choose between forms with enough and too</div>
                <div class="instructions-text">Look at the meaning (excess vs sufficient) and the word category (adjective vs noun). Tap 🇪🇸 to see Spanish.</div>
            </div>
        </div>

        <div id="questionsContainer"></div>

        <div class="results-screen" id="resultsScreen">
            <div class="results-emoji">🎉</div>
            <div class="results-title">Completed!</div>
            <div class="results-score" id="finalScore">0/15</div>
            <div class="stars-container">
                <span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span>
            </div>
            <div class="results-message" id="resultsMessage"></div>
            <div class="results-buttons">
                <button class="result-btn primary" onclick="location.reload()">🔄 Try Again</button>
                <a href="https://jucumenglishcenter.github.io/A2/A2_M1/Panel.html" class="result-btn secondary">← Back to Panel</a>
            </div>
        </div>
    </main>

    <script>
    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    // ============================================================
    // ENOUGH / TOO
    // - too + adj = excess
    // - adj + enough = sufficient
    // - too much/many + noun = excess (uncountable/countable)
    // - enough + noun = sufficient
    // ============================================================
    const quizData = [
        {
            id: 1,
            sentence: "The coffee is _____ to drink — I need to wait a few minutes.",
            translation: "El café está demasiado caliente para beber — necesito esperar unos minutos.",
            type: "excess_adj",
            hint: "The coffee CAN'T be drunk because the temperature is excessive. The structure is [word] + adjective.",
            clue: "can't drink it (excess)",
            clueExplain: "When something has more of a quality than needed (causing a problem), we use 'too' BEFORE the adjective.",
            options: ["too hot", "hot enough", "enough hot", "too much hot"],
            correct: "too hot",
            feedback: {
                "hot enough": { errorType: "Wrong meaning — sufficient", explanation: "'Hot enough' means 'sufficient temperature' (positive). But the context says she CAN'T drink it — that's excess, not sufficiency. Use 'too hot'.", rule: "too + adj = excess / adj + enough = sufficient" },
                "enough hot": { errorType: "Wrong word order", explanation: "'Enough' goes AFTER the adjective, not before. 'Enough hot' is incorrect. Correct order: 'hot enough'. But here we need excess, so 'too hot'.", rule: "Order: adj + enough (NOT enough + adj)" },
                "too much hot": { errorType: "Wrong form", explanation: "'Too much' is for uncountable nouns, not adjectives. With adjectives, we use just 'too' (without 'much'): 'too hot'.", rule: "too + adjective (NOT too much + adjective)" }
            },
            correctReason: "'Can't drink' shows the heat is EXCESSIVE — too much. With adjectives expressing excess, we use 'too' before: 'too hot'.",
            ruleFormula: "too + adjective (excess)"
        },
        {
            id: 2,
            sentence: "Sofía is _____ to reach the top shelf without help.",
            translation: "Sofía es lo suficientemente alta para alcanzar el estante superior sin ayuda.",
            type: "sufficient_adj",
            hint: "She CAN reach the shelf — the height is sufficient. The structure is [adjective] + [word].",
            clue: "can reach (sufficient)",
            clueExplain: "When someone has the right amount of a quality (positive ability), we use 'enough' AFTER the adjective.",
            options: ["too tall", "tall enough", "enough tall", "too much tall"],
            correct: "tall enough",
            feedback: {
                "too tall": { errorType: "Wrong meaning — excess", explanation: "'Too tall' means excessive height (a problem). But she CAN reach — that's sufficient height, not excess. Use 'tall enough'.", rule: "too + adj = problem / adj + enough = positive" },
                "enough tall": { errorType: "Wrong word order", explanation: "'Enough' goes AFTER the adjective, not before. 'Enough tall' is incorrect. Correct order: 'tall enough'.", rule: "Order: adjective + enough" },
                "too much tall": { errorType: "Wrong form", explanation: "'Too much' is for uncountable nouns, not adjectives. With adjectives, we use just 'too' (without 'much').", rule: "too + adjective (NOT too much + adjective)" }
            },
            correctReason: "'Can reach' shows the height is SUFFICIENT for the action. With adjectives expressing sufficiency, we use 'enough' AFTER: 'tall enough'.",
            ruleFormula: "adjective + enough (sufficient)"
        },
        {
            id: 3,
            sentence: "Marcos doesn't have _____ to pay all his bills this month.",
            translation: "Marcos no tiene suficiente dinero para pagar todos sus recibos este mes.",
            type: "sufficient_noun",
            hint: "He doesn't have a sufficient amount of money. The structure is [word] + noun.",
            clue: "money (uncountable noun)",
            clueExplain: "With nouns, 'enough' goes BEFORE the noun (not after). 'Enough money' = sufficient money.",
            options: ["money enough", "too money", "enough money", "too much money"],
            correct: "enough money",
            feedback: {
                "money enough": { errorType: "Wrong word order", explanation: "With NOUNS, 'enough' goes BEFORE the noun, not after. With adjectives it goes after — but money is a noun, so: 'enough money'.", rule: "Noun: enough + noun (NOT noun + enough)" },
                "too money": { errorType: "Wrong form for noun", explanation: "'Too' alone is for adjectives. For uncountable nouns we use 'too much' or for excess. But here the meaning is INSUFFICIENT — use 'enough'.", rule: "too + adjective / too much + uncountable noun" },
                "too much money": { errorType: "Wrong meaning — excess", explanation: "'Too much money' means excessive amount. The context is the OPPOSITE — he doesn't have ENOUGH. Use 'enough money'.", rule: "Doesn't have enough = insufficient" }
            },
            correctReason: "The context shows he has insufficient money to pay bills. With nouns, 'enough' goes BEFORE the noun: 'enough money'.",
            ruleFormula: "enough + noun (sufficient)"
        },
        {
            id: 4,
            sentence: "There were _____ in the meeting — we couldn't all sit comfortably.",
            translation: "Había demasiada gente en la reunión — no pudimos sentarnos todos cómodamente.",
            type: "excess_countable",
            hint: "Excess of a countable plural noun (people). Which form fits 'too much/many' with plurals?",
            clue: "couldn't sit (excess of people)",
            clueExplain: "With countable PLURAL nouns expressing excess, we use 'too many' (not 'too much').",
            options: ["too much people", "enough people", "too people", "too many people"],
            correct: "too many people",
            feedback: {
                "too much people": { errorType: "Wrong quantifier", explanation: "'Too much' is for UNCOUNTABLE nouns (water, money). 'People' is countable plural — we use 'too many'.", rule: "too much + uncountable / too many + countable plural" },
                "enough people": { errorType: "Wrong meaning — sufficient", explanation: "'Enough people' means the right amount. But the context says they COULDN'T sit comfortably — that's excess. Use 'too many'.", rule: "couldn't sit = excess → too many" },
                "too people": { errorType: "Missing 'many'", explanation: "'Too' alone goes with adjectives, not nouns. With nouns we need 'too much' (uncountable) or 'too many' (countable).", rule: "too + adjective (NOT too + noun)" }
            },
            correctReason: "'Couldn't sit comfortably' shows excess. 'People' is countable plural, so we use 'too many people'.",
            ruleFormula: "too many + countable plural (excess)"
        },
        {
            id: 5,
            sentence: "Carlos is _____ to drive a car — he is only 15 years old.",
            translation: "Carlos es demasiado joven para conducir un coche — solo tiene 15 años.",
            type: "excess_adj",
            hint: "Carlos CAN'T drive because of his age. Excess + adjective.",

    let currentQuestion = 0;
    let score = 0;
    let answered = new Array(quizData.length).fill(false);

    function initQuiz() {
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';
        quizData.forEach((q, index) => container.appendChild(createQuestionCard(q, index)));
        showQuestion(0);
        updateProgress();
    }

    function createQuestionCard(q, index) {
        const card = document.createElement('div');
        card.className = `question-card ${index !== 0 ? 'hidden' : ''}`;
        card.id = `question-${index}`;
        const shuffled = shuffle(q.options);
        const isExcess = q.type.startsWith('excess');
        const badgeClass = isExcess ? 'excess' : 'sufficient';
        const badgeText = isExcess ? '➕ Excess' : '✅ Sufficient';

        card.innerHTML = `
            <div class="q-header">
                <div class="question-number">${index + 1}</div>
                <span class="topic-badge ${badgeClass}">${badgeText}</span>
            </div>
            <div class="hint-box">
                <div class="hint-label">💡 Hint</div>
                ${q.hint}
            </div>
            <p class="question-text">${q.sentence.replace('_____', `<span class="blank" id="blank-${index}">?</span>`)}</p>
            <button class="translate-toggle" onclick="toggleTranslation(${index}, this)">🇪🇸 <span>Show Spanish</span></button>
            <div class="translation" id="translation-${index}">${q.translation}</div>
            <div class="options-grid col-1" id="options-${index}">
                ${shuffled.map((opt, i) => `
                    <button class="option-btn" data-idx="${i}" onclick="selectAnswer(${index}, ${i}, this)">${opt}</button>
                `).join('')}
            </div>
            <div class="feedback" id="feedback-${index}"></div>
            <div class="nav-buttons">
                <button class="nav-btn prev" onclick="prevQuestion()" ${index === 0 ? 'disabled' : ''}>← Previous</button>
                <button class="nav-btn next" id="next-${index}" onclick="nextQuestion(${index})" disabled>
                    ${index === quizData.length - 1 ? 'See Results 🎉' : 'Next →'}
                </button>
            </div>
        `;
        card._shuffled = shuffled;
        return card;
    }

    function toggleTranslation(qi, btn) {
        const tr = document.getElementById(`translation-${qi}`);
        const span = btn.querySelector('span');
        if (tr.classList.contains('show')) {
            tr.classList.remove('show');
            btn.classList.remove('active');
            span.textContent = 'Show Spanish';
        } else {
            tr.classList.add('show');
            btn.classList.add('active');
            span.textContent = 'Hide Spanish';
        }
    }

    function selectAnswer(qi, optIdx, btn) {
        if (answered[qi]) return;
        answered[qi] = true;
        const q = quizData[qi];
        const card = document.getElementById(`question-${qi}`);
        const shuffled = card._shuffled;
        const selected = shuffled[optIdx];
        const isCorrect = selected === q.correct;
        if (isCorrect) score++;

        const blank = document.getElementById(`blank-${qi}`);
        blank.textContent = selected;
        blank.className = `blank ${isCorrect ? 'correct' : 'incorrect'}`;

        document.querySelectorAll(`#options-${qi} .option-btn`).forEach(b => {
            b.disabled = true;
            const idx = parseInt(b.getAttribute('data-idx'));
            const t = shuffled[idx];
            if (t === q.correct) b.classList.add('correct');
            else if (idx === optIdx) b.classList.add('incorrect');
        });

        buildFeedback(qi, selected, isCorrect, q);
        document.getElementById(`next-${qi}`).disabled = false;
        updateProgress();
    }

    function buildFeedback(qi, selected, isCorrect, q) {
        const el = document.getElementById(`feedback-${qi}`);
        el.className = `feedback show ${isCorrect ? 'correct' : 'incorrect'}`;

        if (isCorrect) {
            el.innerHTML = `
                <div class="fb-header">
                    <span class="fb-icon">✅</span>
                    <div>
                        <div class="fb-title">Correct!</div>
                        <div class="fb-subtitle">You chose the right form</div>
                    </div>
                </div>
                <div class="fb-body">
                    <div class="fb-signal">
                        <div class="fb-block-title">🔍 The key signal you spotted</div>
                        <div class="fb-signal-text">
                            <span class="signal-tag">${q.clue}</span> — ${q.clueExplain}
                        </div>
                    </div>
                    <div class="fb-rule">
                        <div class="fb-block-title">📐 Pattern</div>
                        <div class="rule-formula">${q.ruleFormula}</div>
                    </div>
                    <div class="fb-why">
                        <div class="fb-block-title">💡 Why is it correct?</div>
                        <div class="fb-why-text">${q.correctReason}</div>
                    </div>
                </div>
            `;
        } else {
            const err = q.feedback[selected] || { errorType: 'Error', explanation: 'Incorrect answer.', rule: '' };
            el.innerHTML = `
                <div class="fb-header">
                    <span class="fb-icon">❌</span>
                    <div>
                        <div class="fb-title">Incorrect</div>
                        <div class="fb-subtitle">Let's review what happened</div>
                    </div>
                </div>
                <div class="fb-body">
                    <div class="fb-signal wrong">
                        <div class="fb-block-title">🔍 The key signal you needed to spot</div>
                        <div class="fb-signal-text">
                            <span class="signal-tag red">${q.clue}</span> — ${q.clueExplain}
                        </div>
                    </div>
                    <div class="fb-compare">
                        <div class="fb-block-title" style="color:#64748B;">🔄 Your answer vs. correct</div>
                        <div class="fb-compare-row">
                            <span class="compare-label wrong">You wrote</span>
                            <span class="compare-text"><span class="word-wrong">${selected}</span></span>
                        </div>
                        <div class="fb-compare-row">
                            <span class="compare-label right">Correct</span>
                            <span class="compare-text"><span class="word-right">${q.correct}</span></span>
                        </div>
                    </div>
                    <div class="fb-error">
                        <div class="fb-block-title">⚠️ Error type: <span class="error-badge">${err.errorType}</span></div>
                        <div class="error-word-row">
                            <span class="ew-box ew-wrong">${selected}</span>
                            <span class="ew-arrow">→</span>
                            <span class="ew-box ew-right">${q.correct}</span>
                        </div>
                        <div class="error-rule">${err.explanation}</div>
                        ${err.rule ? `<div style="margin-top:0.5rem;font-size:0.82rem;color:var(--error-dark);font-weight:700;">📌 ${err.rule}</div>` : ''}
                    </div>
                    <div class="fb-rule">
                        <div class="fb-block-title">📐 The correct pattern</div>
                        <div class="rule-formula">${q.ruleFormula}</div>
                    </div>
                    <div class="fb-why">
                        <div class="fb-block-title">💡 Why is the correct answer right?</div>
                        <div class="fb-why-text">${q.correctReason}</div>
                    </div>
                </div>
            `;
        }
    }

    function showQuestion(i) {
        document.querySelectorAll('.question-card').forEach((c, idx) => c.classList.toggle('hidden', idx !== i));
        document.getElementById('currentQ').textContent = i + 1;
        currentQuestion = i;
    }

    function nextQuestion(i) {
        if (i < quizData.length - 1) showQuestion(i + 1);
        else showResults();
    }

    function prevQuestion() { if (currentQuestion > 0) showQuestion(currentQuestion - 1); }

    function updateProgress() {
        const done = answered.filter(Boolean).length;
        document.getElementById('progressFill').style.width = (done / quizData.length * 100) + '%';
    }

    function showResults() {
        document.querySelectorAll('.question-card').forEach(c => c.classList.add('hidden'));
        const rs = document.getElementById('resultsScreen');
        rs.classList.add('show');
        const pct = score / quizData.length * 100;
        document.getElementById('finalScore').textContent = `${score}/${quizData.length}`;
        let stars = pct >= 90 ? 3 : pct >= 70 ? 2 : 1;
        document.getElementById('resultsMessage').textContent = pct >= 90
            ? 'Excellent! You master enough and too perfectly. 🏆'
            : pct >= 70 ? 'Well done! Keep practicing. 💪'
            : 'Good effort. Review the rules and try again. 📚';
        document.querySelectorAll('.star').forEach((s, i) => {
            if (i < stars) setTimeout(() => s.classList.add('earned'), i * 300);
        });
    }

    document.addEventListener('DOMContentLoaded', initQuiz);
    </script>
