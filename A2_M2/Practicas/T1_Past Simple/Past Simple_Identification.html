<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Identification - A2 M2 · Past Simple Irregular | JUCUM English</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10B981; --primary-light: #6EE7B7; --primary-dark: #059669;
            --accent: #34D399; --bg-gradient-start: #ECFDF5; --bg-gradient-end: #D1FAE5;
            --text-dark: #064E3B; --text-medium: #065F46; --text-light: #047857;
            --success: #10B981; --success-light: #D1FAE5; --success-dark: #059669;
            --error: #EF4444; --error-light: #FEE2E2; --error-dark: #DC2626;
            --info: #3B82F6; --info-light: #DBEAFE; --info-dark: #1D4ED8;
            --purple: #8B5CF6; --purple-light: #EDE9FE; --purple-dark: #6D28D9;
            --white: #FFFFFF;
            --shadow-soft: 0 4px 20px rgba(16,185,129,0.15);
            --shadow-strong: 0 8px 30px rgba(16,185,129,0.25);
            --border-radius: 20px;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:'Nunito',sans-serif; background:linear-gradient(135deg,var(--bg-gradient-start) 0%,var(--bg-gradient-end) 100%); min-height:100vh; color:var(--text-dark); }

        .header { background:linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%); padding:1rem 1.5rem; display:flex; align-items:center; gap:1rem; position:sticky; top:0; z-index:100; box-shadow:var(--shadow-soft); }
        .back-btn { width:40px; height:40px; border-radius:50%; background:rgba(255,255,255,0.3); border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1.4rem; text-decoration:none; color:white; transition:all .2s; flex-shrink:0; }
        .back-btn:hover { background:rgba(255,255,255,0.5); transform:scale(1.1); }
        .header-info { flex:1; }
        .header-title { font-family:'Fredoka',sans-serif; font-size:1.1rem; font-weight:600; color:white; }
        .header-subtitle { font-size:0.8rem; color:rgba(255,255,255,0.85); margin-top:2px; }
        .progress-indicator { background:rgba(255,255,255,0.3); padding:0.4rem 0.9rem; border-radius:20px; font-weight:700; color:white; font-size:0.9rem; white-space:nowrap; }
        .progress-container { padding:0; height:6px; background:rgba(255,255,255,0.3); }
        .progress-fill { height:100%; background:white; border-radius:0 3px 3px 0; transition:width .5s ease; width:0%; }

        main { padding:1.5rem; max-width:680px; margin:0 auto; }
        .instructions { background:white; border-radius:16px; padding:1rem 1.25rem; margin-bottom:1.25rem; box-shadow:var(--shadow-soft); border-left:5px solid var(--primary); display:flex; gap:0.75rem; align-items:flex-start; }
        .instructions-icon { font-size:1.6rem; flex-shrink:0; }
        .instructions-title { font-family:'Fredoka',sans-serif; font-size:1rem; font-weight:600; color:var(--text-dark); margin-bottom:0.2rem; }
        .instructions-text { font-size:0.85rem; color:var(--text-medium); line-height:1.5; }

        .question-card { background:white; border-radius:var(--border-radius); box-shadow:var(--shadow-soft); padding:1.5rem; margin-bottom:1rem; animation:slideIn .4s ease; }
        .question-card.hidden { display:none; }
        @keyframes slideIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }

        .q-header { display:flex; align-items:center; gap:0.75rem; margin-bottom:1rem; }
        .question-number { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; display:flex; align-items:center; justify-content:center; font-family:'Fredoka',sans-serif; font-weight:700; font-size:0.95rem; flex-shrink:0; }
        .q-label { font-size:0.88rem; color:var(--text-medium); font-weight:600; flex:1; }
        .topic-badge { display:inline-flex; align-items:center; gap:0.3rem; padding:0.2rem 0.7rem; border-radius:20px; font-size:0.72rem; font-weight:700; background:#EDE9FE; color:#6D28D9; }

        .hint-box { background:#F0FDF4; border-left:4px solid var(--primary); padding:0.7rem 1rem; border-radius:0 10px 10px 0; margin-bottom:1rem; font-size:0.88rem; color:var(--text-dark); line-height:1.5; }
        .hint-label { font-weight:700; color:var(--primary-dark); display:flex; align-items:center; gap:0.4rem; margin-bottom:0.3rem; font-size:0.82rem; text-transform:uppercase; letter-spacing:.5px; }

        .translate-toggle { display:flex; align-items:center; gap:0.4rem; background:#FFF; border:1.5px solid #E5E7EB; padding:0.4rem 0.8rem; border-radius:20px; font-size:0.78rem; font-weight:700; color:var(--text-medium); cursor:pointer; margin-bottom:0.8rem; transition:all .2s; }
        .translate-toggle:hover { border-color:var(--primary); color:var(--primary-dark); background:#F0FDF4; }
        .translate-toggle.active { background:var(--primary-light); border-color:var(--primary); color:var(--primary-dark); }

        .sentence-options { display:flex; flex-direction:column; gap:0.7rem; margin-top:0.5rem; }
        .sent-option { display:flex; align-items:center; gap:0.85rem; padding:1rem 1.1rem; border:2.5px solid #E5E7EB; border-radius:14px; background:white; font-family:'Nunito',sans-serif; font-size:0.95rem; cursor:pointer; transition:all .2s; color:var(--text-dark); text-align:left; width:100%; }
        .sent-option:hover:not(.disabled) { border-color:var(--primary); background:#F0FDF4; transform:translateY(-2px); box-shadow:var(--shadow-soft); }
        .sent-option.disabled { cursor:default; }
        .sent-option.correct { border-color:var(--success); background:var(--success-light); }
        .sent-option.incorrect { border-color:var(--error); background:var(--error-light); }
        .option-letter { width:32px; height:32px; flex-shrink:0; border-radius:50%; background:#E5E7EB; color:var(--text-medium); display:flex; align-items:center; justify-content:center; font-family:'Fredoka',sans-serif; font-weight:700; font-size:0.9rem; }
        .sent-option.correct .option-letter { background:var(--success); color:white; }
        .sent-option.incorrect .option-letter { background:var(--error); color:white; }
        .option-text { flex:1; font-weight:600; line-height:1.45; }
        .option-text-es { display:none; font-size:0.8rem; color:var(--text-light); font-style:italic; font-weight:400; margin-top:0.3rem; }
        .option-text-es.show { display:block; }
        .option-status { font-size:1.3rem; flex-shrink:0; min-width:1.5rem; text-align:center; }

        .feedback { margin-top:1.25rem; border-radius:16px; overflow:hidden; display:none; box-shadow:0 4px 16px rgba(0,0,0,0.1); }
        .feedback.show { display:block; animation:fadeUp .35s ease; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        .fb-header { padding:0.9rem 1.25rem; display:flex; align-items:center; gap:0.75rem; }
        .feedback.correct .fb-header { background:linear-gradient(135deg,var(--success),var(--success-dark)); }
        .feedback.incorrect .fb-header { background:linear-gradient(135deg,var(--error),var(--error-dark)); }
        .fb-icon { font-size:1.6rem; }
        .fb-title { font-family:'Fredoka',sans-serif; font-size:1.1rem; color:white; font-weight:600; }
        .fb-subtitle { font-size:0.8rem; color:rgba(255,255,255,0.85); margin-top:1px; }
        .fb-body { background:white; border:2px solid; border-top:none; border-radius:0 0 16px 16px; padding:1.25rem; display:flex; flex-direction:column; gap:0.9rem; }
        .feedback.correct .fb-body { border-color:var(--success); }
        .feedback.incorrect .fb-body { border-color:var(--error); }

        .fb-block { padding:0.9rem 1rem; border-radius:12px; }
        .fb-block-title { font-weight:800; font-size:0.78rem; text-transform:uppercase; letter-spacing:.6px; margin-bottom:0.5rem; display:flex; align-items:center; gap:0.4rem; }

        .fb-compare { background:#F8FAFC; border:1px solid #E2E8F0; }
        .compare-row { display:flex; align-items:flex-start; gap:0.6rem; padding:0.4rem 0; border-bottom:1px dashed #E2E8F0; }
        .compare-row:last-child { border-bottom:none; }
        .compare-label { font-size:0.7rem; font-weight:800; text-transform:uppercase; letter-spacing:.5px; white-space:nowrap; padding:0.2rem 0.5rem; border-radius:6px; flex-shrink:0; margin-top:2px; }
        .compare-label.wrong { background:var(--error-light); color:var(--error-dark); }
        .compare-label.right { background:var(--success-light); color:var(--success-dark); }
        .compare-text { font-size:0.92rem; color:var(--text-dark); line-height:1.5; }

        .fb-error { background:var(--error-light); }
        .error-badge { display:inline-block; background:var(--error); color:white; padding:0.2rem 0.6rem; border-radius:6px; font-size:0.75rem; font-weight:700; margin-left:auto; }
        .fb-error .fb-block-title { color:var(--error-dark); }
        .error-text { font-size:0.88rem; color:var(--error-dark); line-height:1.5; }

        .fb-rule { background:var(--info-light); border:1px solid #BFDBFE; }
        .fb-rule .fb-block-title { color:var(--info-dark); }
        .rule-formula { background:white; border-radius:8px; padding:0.5rem 0.9rem; font-family:'Fredoka',sans-serif; font-size:0.92rem; color:var(--info-dark); font-weight:600; text-align:center; border:1px solid #BFDBFE; }

        .fb-why { background:#F0FDF4; border:1px solid #BBF7D0; }
        .fb-why .fb-block-title { color:var(--success-dark); }
        .fb-why-text { font-size:0.92rem; color:var(--text-dark); line-height:1.55; }

        .nav-buttons { display:flex; gap:0.75rem; margin-top:1.25rem; }
        .nav-btn { padding:0.8rem 1.2rem; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-size:0.95rem; font-weight:700; cursor:pointer; transition:all .2s; }
        .nav-btn.next { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; flex:1; }
        .nav-btn.prev { background:#F1F5F9; color:var(--text-dark); }
        .nav-btn:disabled { opacity:.4; cursor:default; }
        .nav-btn:not(:disabled):hover { transform:translateY(-2px); box-shadow:var(--shadow-soft); }

        .results-screen { display:none; text-align:center; padding:2rem 1.5rem; }
        .results-screen.show { display:block; animation:fadeUp .5s ease; }
        .results-emoji { font-size:4rem; margin-bottom:1rem; }
        .results-title { font-family:'Fredoka',sans-serif; font-size:2rem; margin-bottom:0.5rem; }
        .results-score { font-size:3rem; font-weight:800; color:var(--purple); margin:1rem 0; }
        .results-message { font-size:1.05rem; color:var(--text-medium); margin-bottom:1.5rem; }
        .stars-container { display:flex; justify-content:center; gap:0.5rem; margin:1.5rem 0; }
        .star { font-size:2.5rem; opacity:.3; transition:all .5s ease; }
        .star.earned { opacity:1; animation:starPop .5s ease; }
        @keyframes starPop { 0%{transform:scale(0)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }
        .results-buttons { display:flex; flex-direction:column; gap:1rem; margin-top:2rem; }
        .result-btn { padding:1rem 2rem; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; text-decoration:none; display:flex; align-items:center; justify-content:center; gap:0.5rem; transition:all .2s; }
        .result-btn.primary { background:linear-gradient(135deg,var(--purple),var(--purple-dark)); color:white; }
        .result-btn.secondary { background:#F1F5F9; color:var(--text-dark); }
        .result-btn:hover { transform:translateY(-2px); box-shadow:var(--shadow-soft); }
    </style>
</head>
<body>
    <header class="header">
        <a href="https://jucumenglishcenter.github.io/A2/A2_M1/Panel.html" class="back-btn">←</a>
        <div class="header-info">
            <div class="header-title">🔍 Identification</div>
            <div class="header-subtitle">💚 A2 · Module 2 · Past Simple Irregular</div>
        </div>
        <div class="progress-indicator"><span id="currentQ">1</span>/15</div>
    </header>
    <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>

    <main>
        <div class="instructions">
            <div class="instructions-icon">🔍</div>
            <div>
                <div class="instructions-title">Identify the correct sentence</div>
                <div class="instructions-text">Read three different sentences and choose the one that uses the irregular past simple correctly. Tap 🇪🇸 to see Spanish translations.</div>
            </div>
        </div>

        <div id="questionsContainer"></div>

        <div class="results-screen" id="resultsScreen">
            <div class="results-emoji">🎉</div>

            <div class="results-score" id="finalScore">0/15</div>
            <div class="stars-container">
                <span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span>
            </div>
            <div class="results-message" id="resultsMessage"></div>
            <div class="results-buttons">
                <button class="result-btn primary" onclick="location.reload()">🔄 Try Again</button>
                <a href="https://jucumenglishcenter.github.io/A2/A2_M1/Panel.html" class="result-btn secondary">← Back to Panel</a>
            </div>
        </div>
    </main>

    <script>
    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    const quizData = [
        {
            id: 1,
            hint: "Pay attention to which past form belongs with each verb. Some look similar but are not interchangeable.",
            options: [
                { text: "Sofía went to the bank and bought a new card.", textEs: "Sofía fue al banco y compró una tarjeta nueva.", correct: true },
                { text: "Sofía goed to the bank and bought a new card.", textEs: "Sofía fue al banco y compró una tarjeta nueva.", correct: false,
                  errorType: "Overgeneralization",
                  explanation: "'Goed' doesn't exist. 'Go' is irregular and its past form is 'went' — a completely different word, not 'go + ed'." },
                { text: "Sofía gone to the bank and bought a new card.", textEs: "Sofía ido al banco y compró una tarjeta nueva.", correct: false,
                  errorType: "Wrong form — past participle",
                  explanation: "'Gone' is the past participle, used with 'have/has' (has gone). For Past Simple alone, we use 'went'." }
            ],
            ruleFormula: "go → went (Past Simple) / gone (Past Participle)",
            correctReason: "'Go' is irregular: Past Simple is 'went'. The participle 'gone' is only used with auxiliaries like 'have/has'."
        },
        {
            id: 2,
            hint: "The verb 'have' has only one past form for all subjects. Look for that consistency.",
            options: [
                { text: "Marcos haved a problem with his card last weekend.", textEs: "Marcos tuvo un problema con su tarjeta el fin de semana pasado.", correct: false,
                  errorType: "Overgeneralization",
                  explanation: "'Haved' doesn't exist. 'Have' is irregular — past form is 'had' for all subjects, not 'have + ed'." },
                { text: "Marcos has a problem with his card last weekend.", textEs: "Marcos tiene un problema con su tarjeta el fin de semana pasado.", correct: false,
                  errorType: "Wrong tense — present",
                  explanation: "'Has' is present simple. The marker 'last weekend' demands a past form. 'Have' becomes 'had' in past." },
                { text: "Marcos had a problem with his card last weekend.", textEs: "Marcos tuvo un problema con su tarjeta el fin de semana pasado.", correct: true }
            ],
            ruleFormula: "have/has → had (all subjects, past)",
            correctReason: "'Have' is irregular: 'had' works for I, you, he, she, we, they. The marker 'last weekend' confirms Past Simple."
        },
        {
            id: 3,
            hint: "Be careful with verbs that look similar to other words. One option uses a word that is not a verb at all.",
            options: [
                { text: "I seed the new debit card on the counter yesterday.", textEs: "Yo vi la nueva tarjeta de débito en el mostrador ayer.", correct: false,
                  errorType: "Confused with another word",
                  explanation: "'Seed' is a noun meaning a small plant unit (semilla in Spanish). It's not the past of 'see'. The correct past form is 'saw'." },
                { text: "I saw the new debit card on the counter yesterday.", textEs: "Yo vi la nueva tarjeta de débito en el mostrador ayer.", correct: true },
                { text: "I seen the new debit card on the counter yesterday.", textEs: "Yo visto la nueva tarjeta de débito en el mostrador ayer.", correct: false,
                  errorType: "Wrong form — past participle",
                  explanation: "'Seen' is the past participle, used with 'have/has' (have seen). For Past Simple alone, we use 'saw'." }
            ],
            ruleFormula: "see → saw (Past Simple) / seen (Past Participle)",
            correctReason: "'See' is irregular: Past Simple is 'saw'. Don't confuse with 'seed' (a plant) or 'seen' (past participle)."
        },
        {
            id: 4,
            hint: "Look at the verb that means 'to grab' or 'to receive'. Its past form changes the vowel completely.",
            options: [
                { text: "The clerk taked my ID and checked the address.", textEs: "La cajera tomó mi identificación y verificó la dirección.", correct: false,
                  errorType: "Overgeneralization",
                  explanation: "'Taked' doesn't exist. 'Take' is irregular — past form is 'took' (vowel change a→oo)." },
                { text: "The clerk took my ID and checked the address.", textEs: "La cajera tomó mi identificación y verificó la dirección.", correct: true },
                { text: "The clerk taken my ID and checked the address.", textEs: "La cajera tomada mi identificación y verificó la dirección.", correct: false,
                  errorType: "Wrong form — past participle",
                  explanation: "'Taken' is the past participle (have taken). Past Simple alone uses 'took'." }
            ],
            ruleFormula: "take → took (Past Simple) / taken (Past Participle)",
            correctReason: "'Take' is irregular: past form is 'took'. The vowel changes from 'a' to 'oo'. Same pattern: shake → shook, stand → stood."
        },
        {
            id: 5,
            hint: "Watch out for the difference between Past Simple and Past Participle of this verb of giving.",
            options: [
                { text: "We gived the bank manager our complaint.", textEs: "Le dimos al gerente del banco nuestra queja.", correct: false,
                  errorType: "Overgeneralization",
                  explanation: "'Gived' doesn't exist. 'Give' is irregular — past form is 'gave' (vowel change i→a)." },
                { text: "We given the bank manager our complaint.", textEs: "Nosotros dado al gerente del banco nuestra queja.", correct: false,
                  errorType: "Wrong form — past participle",
                  explanation: "'Given' is the past participle (have given). Past Simple alone uses 'gave'." },
                { text: "We gave the bank manager our complaint.", textEs: "Le dimos al gerente del banco nuestra queja.", correct: true }
            ],
            ruleFormula: "give → gave (Past Simple) / given (Past Participle)",
            correctReason: "'Give' is irregular: past form is 'gave'. The vowel changes from 'i' to 'a'. Same pattern: sit → sat, sing → sang."
        },
        {
            id: 6,
            hint: "Be careful: this verb has a past form that doesn't follow the regular '-ed' rule and is not the same as the base.",
            options: [
                { text: "Carlos make his decision based on the monthly fees.", textEs: "Carlos hace su decisión basándose en los costos mensuales.", correct: false,
                  errorType: "Wrong tense — base form",
                  explanation: "'Make' is the base form (present). The context is past, so we need 'made'." },
                { text: "Carlos made his decision based on the monthly fees.", textEs: "Carlos hizo su decisión basándose en los costos mensuales.", correct: true },
                { text: "Carlos maked his decision based on the monthly fees.", textEs: "Carlos hizo su decisión basándose en los costos mensuales.", correct: false,
                  errorType: "Overgeneralization",
                  explanation: "'Maked' doesn't exist. 'Make' is irregular — past form is 'made'." }
            ],
            ruleFormula: "make → made (irregular)",
            correctReason: "'Make' is irregular: past form is 'made'. The vowel changes and the 'k' is replaced by 'd'."
        },
        {
            id: 7,
            hint: "This verb of becoming is short and irregular. Pay attention to the vowel change.",
            options: [
                { text: "The customer get angry when he saw the extra charges.", textEs: "El cliente se pone enojado cuando ve los cargos adicionales.", correct: false,
                  errorType: "Tense inconsistency",
                  explanation: "'Get' is base/present, but 'saw' is past. Both verbs in the sentence describe past events, so 'get' must also be in past: 'got'." },
                { text: "The customer got angry when he saw the extra charges.", textEs: "El cliente se puso enojado cuando vio los cargos adicionales.", correct: true },
                { text: "The customer getted angry when he saw the extra charges.", textEs: "El cliente se enojó cuando vio los cargos adicionales.", correct: false,
                  errorType: "Overgeneralization",
                  explanation: "'Getted' doesn't exist. 'Get' is irregular — past form is 'got' (vowel change e→o)." }
            ],
            ruleFormula: "get → got (irregular)",
            correctReason: "'Get' is irregular: past form is 'got'. The vowel changes from 'e' to 'o'. Same pattern: forget → forgot."
        },
        {
            id: 8,
            hint: "This verb of movement has its past form with vowel change. Don't confuse base and past forms.",
            options: [
                { text: "Sofía come to the bank quickly because she had little time.", textEs: "Sofía viene al banco rápidamente porque tenía poco tiempo.", correct: false,
                  errorType: "Tense inconsistency",
                  explanation: "'Come' is base/present, but 'had' is past. The whole sentence is past, so 'come' must change to 'came'." },
                { text: "Sofía comed to the bank quickly because she had little time.", textEs: "Sofía vino al banco rápidamente porque tenía poco tiempo.", correct: false,
                  errorType: "Overgeneralization",
                  explanation: "'Comed' doesn't exist. 'Come' is irregular — past form is 'came' (vowel change o→a)." },
                { text: "Sofía came to the bank quickly because she had little time.", textEs: "Sofía vino al banco rápidamente porque tenía poco tiempo.", correct: true }
            ],
            ruleFormula: "come → came (irregular)",
            correctReason: "'Come' is irregular: past form is 'came'. The vowel changes from 'o' to 'a'. Same pattern: become → became, run → ran."
        },
        {
            id: 9,
            hint: "Some irregular verbs have the same form in the present and the past. Use context (the time markers) to identify the right one.",
            options: [
                { text: "I putted my new card in my wallet, but later it was gone.", textEs: "Puse mi nueva tarjeta en mi billetera, pero después había desaparecido.", correct: false,
                  errorType: "Overgeneralization",
                  explanation: "'Putted' doesn't exist as a past form. 'Put' is irregular — its past form is identical to the base form: 'put'." },
                { text: "I put my new card in my wallet, but later it was gone.", textEs: "Puse mi nueva tarjeta en mi billetera, pero después había desaparecido.", correct: true },
                { text: "I puts my new card in my wallet, but later it was gone.", textEs: "Yo pone mi nueva tarjeta en mi billetera, pero después había desaparecido.", correct: false,
                  errorType: "Wrong form — third person present",
                  explanation: "'Puts' is third-person present (he/she/it puts). The subject is 'I' and the context is past, so we need 'put' (Past Simple)." }
            ],
            ruleFormula: "put → put (no change)",
            correctReason: "'Put' is a special irregular verb: base and past have the same form. Other examples: cut, hit, let, set."
        },
        {
            id: 10,
            hint: "This verb of communication has an irregular past with an unusual spelling.",
            options: [
                { text: "The clerk says that the bill was acceptable.", textEs: "La cajera dice que el recibo era aceptable.", correct: false,
                  errorType: "Tense inconsistency",
                  explanation: "'Says' is present, but 'was' is past. The whole sentence is past, so the reporting verb must also be past: 'said'." },
                { text: "The clerk sayed that the bill was acceptable.", textEs: "La cajera dijo que el recibo era aceptable.", correct: false,
                  errorType: "Overgeneralization",
                  explanation: "'Sayed' doesn't exist. 'Say' is irregular — past form is 'said' (irregular spelling, pronounced 'sed')." },
                { text: "The clerk said that the bill was acceptable.", textEs: "La cajera dijo que el recibo era aceptable.", correct: true }
            ],
            ruleFormula: "say → said (irregular)",
            correctReason: "'Say' is irregular: past form is 'said'. Same pattern as 'pay → paid' and 'lay → laid'."
        },
        {
            id: 11,
            hint: "Look at how the past form ends with 't' instead of 'ed' for this short verb.",
            options: [
                { text: "The bank build a new branch near the park last year.", textEs: "El banco construye una nueva sucursal cerca del parque el año pasado.", correct: false,
                  errorType: "Tense inconsistency",
                  explanation: "'Build' is base/present, but 'last year' is a past time marker. The verb must be in past: 'built'." },
                { text: "The bank builded a new branch near the park last year.", textEs: "El banco construyó una nueva sucursal cerca del parque el año pasado.", correct: false,
                  errorType: "Overgeneralization",
                  explanation: "'Builded' doesn't exist. 'Build' is irregular — past form is 'built' (ends in 't', not 'ed')." },
                { text: "The bank built a new branch near the park last year.", textEs: "El banco construyó una nueva sucursal cerca del parque el año pasado.", correct: true }
            ],
            ruleFormula: "build → built (irregular)",
            correctReason: "'Build' is irregular: past form is 'built'. The vowel and ending change. Same pattern: keep → kept, sleep → slept."
        },
        {
            id: 12,
            hint: "This verb of communication ends in '-old' in the past. Don't confuse with another similar-looking verb.",
            options: [
                { text: "I told the manager about the wrong charge on my bill.", textEs: "Le dije al gerente sobre el cargo incorrecto en mi recibo.", correct: true },
                { text: "I telled the manager about the wrong charge on my bill.", textEs: "Le dije al gerente sobre el cargo incorrecto en mi recibo.", correct: false,
                  errorType: "Overgeneralization",
                  explanation: "'Telled' doesn't exist. 'Tell' is irregular — past form is 'told' (vowel change e→o)." },
                { text: "I tell the manager about the wrong charge on my bill.", textEs: "Le digo al gerente sobre el cargo incorrecto en mi recibo.", correct: false,
                  errorType: "Wrong tense — base form",
                  explanation: "'Tell' is the base form (present). The context refers to a past conversation, so we need 'told'." }
            ],
            ruleFormula: "tell → told (irregular)",
            correctReason: "'Tell' is irregular: past form is 'told'. Same pattern: sell → sold, find → found."
        },
        {
            id: 13,
            hint: "Compare the past form of this verb of departure with its base form. The change is significant.",
            options: [
                { text: "The customers leaved the bank when it closed at 6 PM.", textEs: "Los clientes dejaron el banco cuando cerró a las 6 PM.", correct: false,
                  errorType: "Overgeneralization",
                  explanation: "'Leaved' doesn't exist as the past of 'leave'. 'Leave' is irregular — past form is 'left' (vowel and ending change)." },
                { text: "The customers leave the bank when it closed at 6 PM.", textEs: "Los clientes dejan el banco cuando cerró a las 6 PM.", correct: false,
                  errorType: "Tense inconsistency",
                  explanation: "'Leave' is base/present, but 'closed' is past. The whole sentence is past, so 'leave' must change to 'left'." },
                { text: "The customers left the bank when it closed at 6 PM.", textEs: "Los clientes dejaron el banco cuando cerró a las 6 PM.", correct: true }
            ],
            ruleFormula: "leave → left (irregular)",
            correctReason: "'Leave' is irregular: past form is 'left'. Same pattern: feel → felt, keep → kept (vowel + ending change)."
        },
        {
            id: 14,
            hint: "This verb describes an emotional state. Its past form changes the vowel and the ending.",
            options: [
                { text: "Marcos feeled tired after the long day at the bank.", textEs: "Marcos se sintió cansado después del largo día en el banco.", correct: false,
                  errorType: "Overgeneralization",
                  explanation: "'Feeled' doesn't exist. 'Feel' is irregular — past form is 'felt' (vowel and ending change)." },
                { text: "Marcos felt tired after the long day at the bank.", textEs: "Marcos se sintió cansado después del largo día en el banco.", correct: true },
                { text: "Marcos feel tired after the long day at the bank.", textEs: "Marcos se siente cansado después del largo día en el banco.", correct: false,
                  errorType: "Wrong tense — base form",
                  explanation: "'Feel' is the base form. The context (after the long day) shows the day is finished, so we need past: 'felt'." }
            ],
            ruleFormula: "feel → felt (irregular)",
            correctReason: "'Feel' is irregular: past form is 'felt'. Same pattern: leave → left, keep → kept, sleep → slept."
        },
        {
            id: 15,
            hint: "This sentence has TWO irregular verbs. Make sure both forms are correctly past.",
            options: [
                { text: "Sofía got the document and gived it to the clerk.", textEs: "Sofía obtuvo el documento y lo dio a la cajera.", correct: false,
                  errorType: "One verb wrong",
                  explanation: "'Got' is correct, but 'gived' doesn't exist. 'Give' is irregular — past form is 'gave', not 'gived'." },
                { text: "Sofía get the document and gave it to the clerk.", textEs: "Sofía obtiene el documento y lo dio a la cajera.", correct: false,
                  errorType: "One verb wrong",
                  explanation: "'Gave' is correct, but 'get' is the base form. With past context (gave), the first verb must also be past: 'got'." },
                { text: "Sofía got the document and gave it to the clerk.", textEs: "Sofía obtuvo el documento y lo dio a la cajera.", correct: true }
            ],
            ruleFormula: "get → got / give → gave (both irregular)",
            correctReason: "Both verbs must be past simple. 'Get' becomes 'got' (vowel e→o) and 'give' becomes 'gave' (vowel i→a). Both are irregular."
        }
    ];

    let currentQuestion = 0, score = 0;
    let answered = new Array(quizData.length).fill(false);

    function initQuiz() {
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';
        quizData.forEach((q, i) => {
            q.shuffled = shuffle(q.options);
            container.appendChild(createCard(q, i));
        });
        showQuestion(0);
        updateProgress();
    }

    function createCard(q, index) {
        const card = document.createElement('div');
        card.className = `question-card ${index !== 0 ? 'hidden' : ''}`;
        card.id = `question-${index}`;
        const letters = ['A','B','C'];

        card.innerHTML = `
            <div class="q-header">
                <div class="question-number">${index + 1}</div>
                <span class="q-label">Choose the grammatically correct sentence:</span>
                <span class="topic-badge">★ Irregular</span>
            </div>
            <div class="hint-box">
                <div class="hint-label">💡 Hint</div>
                ${q.hint}
            </div>
            <button class="translate-toggle" onclick="toggleTranslation(${index}, this)">🇪🇸 <span>Show Spanish</span></button>
            <div class="sentence-options" id="options-${index}">
                ${q.shuffled.map((opt, i) => `
                    <button class="sent-option" data-idx="${i}" onclick="selectOption(${index}, ${i})">
                        <div class="option-letter">${letters[i]}</div>
                        <div class="option-text">
                            ${opt.text}
                            <div class="option-text-es" id="es-${index}-${i}">${opt.textEs}</div>
                        </div>
                        <div class="option-status"></div>
                    </button>
                `).join('')}
            </div>
            <div class="feedback" id="feedback-${index}"></div>
            <div class="nav-buttons">
                <button class="nav-btn prev" onclick="prevQuestion()" ${index === 0 ? 'disabled' : ''}>← Previous</button>
                <button class="nav-btn next" id="next-${index}" onclick="nextQuestion(${index})" disabled>
                    ${index === quizData.length - 1 ? 'See Results 🎉' : 'Next →'}
                </button>
            </div>
        `;
        return card;
    }

    function toggleTranslation(qi, btn) {
        const span = btn.querySelector('span');
        const esItems = document.querySelectorAll(`#options-${qi} .option-text-es`);
        const isOn = btn.classList.contains('active');
        if (isOn) {
            esItems.forEach(el => el.classList.remove('show'));
            btn.classList.remove('active');
            span.textContent = 'Show Spanish';
        } else {
            esItems.forEach(el => el.classList.add('show'));
            btn.classList.add('active');
            span.textContent = 'Hide Spanish';
        }
    }

    function selectOption(qi, optIdx) {
        if (answered[qi]) return;
        answered[qi] = true;
        const q = quizData[qi];
        const selected = q.shuffled[optIdx];
        const isCorrect = selected.correct;
        const correctOpt = q.shuffled.find(o => o.correct);
        const correctIdx = q.shuffled.indexOf(correctOpt);
        if (isCorrect) score++;

        document.querySelectorAll(`#options-${qi} .sent-option`).forEach((btn, i) => {
            btn.classList.add('disabled');
            const statusEl = btn.querySelector('.option-status');
            if (i === correctIdx) {
                btn.classList.add('correct');
                statusEl.textContent = '✅';
            } else if (i === optIdx) {
                btn.classList.add('incorrect');
                statusEl.textContent = '❌';
            }
        });

        buildFeedback(qi, selected, isCorrect, correctOpt, q);
        document.getElementById(`next-${qi}`).disabled = false;
        updateProgress();
    }

    function buildFeedback(qi, selected, isCorrect, correctOpt, q) {
        const el = document.getElementById(`feedback-${qi}`);
        el.className = `feedback show ${isCorrect ? 'correct' : 'incorrect'}`;
        const wrongOptions = q.shuffled.filter(o => !o.correct);

        if (isCorrect) {
            el.innerHTML = `
                <div class="fb-header">
                    <span class="fb-icon">✅</span>
                    <div>
                        <div class="fb-title">Correct! You identified the right sentence</div>
                        <div class="fb-subtitle">Let's see why the others were wrong</div>
                    </div>
                </div>
                <div class="fb-body">
                    <div class="fb-block fb-rule">
                        <div class="fb-block-title">📐 Irregular pattern</div>
                        <div class="rule-formula">${q.ruleFormula}</div>
                    </div>
                    ${wrongOptions.map(err => `
                    <div class="fb-block fb-error">
                        <div class="fb-block-title">⚠️ Error in another option: <span class="error-badge">${err.errorType}</span></div>
                        <div class="error-text" style="margin-bottom:0.5rem;font-style:italic;">"${err.text}"</div>
                        <div class="error-text">${err.explanation}</div>
                    </div>`).join('')}
                    <div class="fb-block fb-why">
                        <div class="fb-block-title">💡 Why is the correct sentence right?</div>
                        <div class="fb-why-text">${q.correctReason}</div>
                    </div>
                </div>
            `;
        } else {
            el.innerHTML = `
                <div class="fb-header">
                    <span class="fb-icon">❌</span>
                    <div>
                        <div class="fb-title">Incorrect — let's review</div>
                        <div class="fb-subtitle">Compare your choice with the correct sentence</div>
                    </div>
                </div>
                <div class="fb-body">
                    <div class="fb-block fb-compare">
                        <div class="fb-block-title">🔄 Your choice vs. correct</div>
                        <div class="compare-row">
                            <span class="compare-label wrong">You chose</span>
                            <span class="compare-text">${selected.text}</span>
                        </div>
                        <div class="compare-row">
                            <span class="compare-label right">Correct</span>
                            <span class="compare-text">${correctOpt.text}</span>
                        </div>
                    </div>
                    <div class="fb-block fb-error">
                        <div class="fb-block-title">⚠️ The error: <span class="error-badge">${selected.errorType}</span></div>
                        <div class="error-text">${selected.explanation}</div>
                    </div>
                    <div class="fb-block fb-rule">
                        <div class="fb-block-title">📐 Irregular pattern</div>
                        <div class="rule-formula">${q.ruleFormula}</div>
                    </div>
                    <div class="fb-block fb-why">
                        <div class="fb-block-title">💡 Why is the correct sentence right?</div>
                        <div class="fb-why-text">${q.correctReason}</div>
                    </div>
                </div>
            `;
        }
    }

    function showQuestion(i) {
        document.querySelectorAll('.question-card').forEach((c, idx) => c.classList.toggle('hidden', idx !== i));
        document.getElementById('currentQ').textContent = i + 1;
        currentQuestion = i;
    }
    function nextQuestion(i) { i < quizData.length - 1 ? showQuestion(i + 1) : showResults(); }
    function prevQuestion() { if (currentQuestion > 0) showQuestion(currentQuestion - 1); }
    function updateProgress() {
        const done = answered.filter(Boolean).length;
        document.getElementById('progressFill').style.width = (done / quizData.length * 100) + '%';
    }
    function showResults() {
        document.querySelectorAll('.question-card').forEach(c => c.classList.add('hidden'));
        document.getElementById('resultsScreen').classList.add('show');
        const pct = score / quizData.length * 100;
        document.getElementById('finalScore').textContent = `${score}/${quizData.length}`;
        let stars = pct >= 90 ? 3 : pct >= 70 ? 2 : 1;
        document.getElementById('resultsMessage').textContent = pct >= 90
            ? 'Excellent! You can identify irregular past forms perfectly. 🏆'
            : pct >= 70 ? 'Well done! Keep practicing. 💪'
            : 'Good effort. Review the irregular forms and try again. 📚';
        document.querySelectorAll('.star').forEach((s, i) => {
            if (i < stars) setTimeout(() => s.classList.add('earned'), i * 300);
        });
    }
    document.addEventListener('DOMContentLoaded', initQuiz);
    </script>
</body>
</html>
