<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Identification - A2 M2 · Zero Article | JUCUM English</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10B981; --primary-light: #6EE7B7; --primary-dark: #059669;
            --accent: #34D399; --bg-gradient-start: #ECFDF5; --bg-gradient-end: #D1FAE5;
            --text-dark: #064E3B; --text-medium: #065F46; --text-light: #047857;
            --success: #10B981; --success-light: #D1FAE5; --success-dark: #059669;
            --error: #EF4444; --error-light: #FEE2E2; --error-dark: #DC2626;
            --info: #3B82F6; --info-light: #DBEAFE; --info-dark: #1D4ED8;
            --purple: #8B5CF6; --purple-light: #EDE9FE; --purple-dark: #6D28D9;
            --white: #FFFFFF;
            --shadow-soft: 0 4px 20px rgba(16,185,129,0.15);
            --shadow-strong: 0 8px 30px rgba(16,185,129,0.25);
            --border-radius: 20px;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:'Nunito',sans-serif; background:linear-gradient(135deg,var(--bg-gradient-start) 0%,var(--bg-gradient-end) 100%); min-height:100vh; color:var(--text-dark); }

        .header { background:linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%); padding:1rem 1.5rem; display:flex; align-items:center; gap:1rem; position:sticky; top:0; z-index:100; box-shadow:var(--shadow-soft); }
        .back-btn { width:40px; height:40px; border-radius:50%; background:rgba(255,255,255,0.3); border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1.4rem; text-decoration:none; color:white; transition:all .2s; flex-shrink:0; }
        .back-btn:hover { background:rgba(255,255,255,0.5); transform:scale(1.1); }
        .header-info { flex:1; }
        .header-title { font-family:'Fredoka',sans-serif; font-size:1.1rem; font-weight:600; color:white; }
        .header-subtitle { font-size:0.8rem; color:rgba(255,255,255,0.85); margin-top:2px; }
        .progress-indicator { background:rgba(255,255,255,0.3); padding:0.4rem 0.9rem; border-radius:20px; font-weight:700; color:white; font-size:0.9rem; white-space:nowrap; }
        .progress-container { padding:0; height:6px; background:rgba(255,255,255,0.3); }
        .progress-fill { height:100%; background:white; border-radius:0 3px 3px 0; transition:width .5s ease; width:0%; }

        main { padding:1.5rem; max-width:680px; margin:0 auto; }
        .instructions { background:white; border-radius:16px; padding:1rem 1.25rem; margin-bottom:1.25rem; box-shadow:var(--shadow-soft); border-left:5px solid var(--primary); display:flex; gap:0.75rem; align-items:flex-start; }
        .instructions-icon { font-size:1.6rem; flex-shrink:0; }
        .instructions-title { font-family:'Fredoka',sans-serif; font-size:1rem; font-weight:600; color:var(--text-dark); margin-bottom:0.2rem; }
        .instructions-text { font-size:0.85rem; color:var(--text-medium); line-height:1.5; }

        .ref-panel { background:white; border-radius:16px; padding:1rem 1.25rem; margin-bottom:1.25rem; box-shadow:var(--shadow-soft); border-left:5px solid var(--info); }
        .ref-title { font-family:'Fredoka',sans-serif; font-size:0.95rem; font-weight:600; color:var(--info-dark); margin-bottom:0.6rem; display:flex; align-items:center; gap:0.4rem; }
        .ref-card { background:#F0F9FF; border:1.5px solid #BFDBFE; border-radius:10px; padding:0.6rem 0.8rem; margin-bottom:0.5rem; }
        .ref-card.zero { background:#F0FDF4; border-color:#BBF7D0; }
        .ref-card.the { background:#FEF3C7; border-color:#FCD34D; }
        .ref-card.aan { background:#EDE9FE; border-color:#DDD6FE; }
        .ref-word { font-family:'Fredoka',sans-serif; font-weight:700; font-size:0.95rem; display:block; margin-bottom:0.2rem; }
        .ref-card.zero .ref-word { color:var(--success-dark); }
        .ref-card.the .ref-word { color:#B45309; }
        .ref-card.aan .ref-word { color:#6D28D9; }
        .ref-text { font-size:0.78rem; color:var(--text-medium); line-height:1.4; }

        .question-card { background:white; border-radius:var(--border-radius); box-shadow:var(--shadow-soft); padding:1.5rem; margin-bottom:1rem; animation:slideIn .4s ease; }
        .question-card.hidden { display:none; }
        @keyframes slideIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }

        .q-header { display:flex; align-items:center; gap:0.75rem; margin-bottom:1rem; }
        .question-number { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; display:flex; align-items:center; justify-content:center; font-family:'Fredoka',sans-serif; font-weight:700; font-size:0.95rem; flex-shrink:0; }
        .q-label { font-size:0.88rem; color:var(--text-medium); font-weight:600; flex:1; }
        .topic-badge { display:inline-flex; align-items:center; gap:0.3rem; padding:0.2rem 0.7rem; border-radius:20px; font-size:0.72rem; font-weight:700; }
        .topic-badge.general { background:#D1FAE5; color:#059669; }
        .topic-badge.specific { background:#FEF3C7; color:#B45309; }
        .topic-badge.singular { background:#EDE9FE; color:#6D28D9; }

        .hint-box { background:#F0FDF4; border-left:4px solid var(--primary); padding:0.7rem 1rem; border-radius:0 10px 10px 0; margin-bottom:1rem; font-size:0.88rem; color:var(--text-dark); line-height:1.5; }
        .hint-label { font-weight:700; color:var(--primary-dark); display:flex; align-items:center; gap:0.4rem; margin-bottom:0.3rem; font-size:0.82rem; text-transform:uppercase; letter-spacing:.5px; }

        .translate-toggle { display:flex; align-items:center; gap:0.4rem; background:#FFF; border:1.5px solid #E5E7EB; padding:0.4rem 0.8rem; border-radius:20px; font-size:0.78rem; font-weight:700; color:var(--text-medium); cursor:pointer; margin-bottom:0.8rem; transition:all .2s; }
        .translate-toggle:hover { border-color:var(--primary); color:var(--primary-dark); background:#F0FDF4; }
        .translate-toggle.active { background:var(--primary-light); border-color:var(--primary); color:var(--primary-dark); }

        .sentence-options { display:flex; flex-direction:column; gap:0.7rem; margin-top:0.5rem; }
        .sent-option { display:flex; align-items:center; gap:0.85rem; padding:1rem 1.1rem; border:2.5px solid #E5E7EB; border-radius:14px; background:white; font-family:'Nunito',sans-serif; font-size:0.95rem; cursor:pointer; transition:all .2s; color:var(--text-dark); text-align:left; width:100%; }
        .sent-option:hover:not(.disabled) { border-color:var(--primary); background:#F0FDF4; transform:translateY(-2px); box-shadow:var(--shadow-soft); }
        .sent-option.disabled { cursor:default; }
        .sent-option.correct { border-color:var(--success); background:var(--success-light); }
        .sent-option.incorrect { border-color:var(--error); background:var(--error-light); }
        .option-letter { width:32px; height:32px; flex-shrink:0; border-radius:50%; background:#E5E7EB; color:var(--text-medium); display:flex; align-items:center; justify-content:center; font-family:'Fredoka',sans-serif; font-weight:700; font-size:0.9rem; }
        .sent-option.correct .option-letter { background:var(--success); color:white; }
        .sent-option.incorrect .option-letter { background:var(--error); color:white; }
        .option-text { flex:1; font-weight:600; line-height:1.45; }
        .option-text-es { display:none; font-size:0.8rem; color:var(--text-light); font-style:italic; font-weight:400; margin-top:0.3rem; }
        .option-text-es.show { display:block; }
        .option-status { font-size:1.3rem; flex-shrink:0; min-width:1.5rem; text-align:center; }

        .feedback { margin-top:1.25rem; border-radius:16px; overflow:hidden; display:none; box-shadow:0 4px 16px rgba(0,0,0,0.1); }
        .feedback.show { display:block; animation:fadeUp .35s ease; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        .fb-header { padding:0.9rem 1.25rem; display:flex; align-items:center; gap:0.75rem; }
        .feedback.correct .fb-header { background:linear-gradient(135deg,var(--success),var(--success-dark)); }
        .feedback.incorrect .fb-header { background:linear-gradient(135deg,var(--error),var(--error-dark)); }
        .fb-icon { font-size:1.6rem; }
        .fb-title { font-family:'Fredoka',sans-serif; font-size:1.1rem; color:white; font-weight:600; }
        .fb-subtitle { font-size:0.8rem; color:rgba(255,255,255,0.85); margin-top:1px; }
        .fb-body { background:white; border:2px solid; border-top:none; border-radius:0 0 16px 16px; padding:1.25rem; display:flex; flex-direction:column; gap:0.9rem; }
        .feedback.correct .fb-body { border-color:var(--success); }
        .feedback.incorrect .fb-body { border-color:var(--error); }

        .fb-block { padding:0.9rem 1rem; border-radius:12px; }
        .fb-block-title { font-weight:800; font-size:0.78rem; text-transform:uppercase; letter-spacing:.6px; margin-bottom:0.5rem; display:flex; align-items:center; gap:0.4rem; }

        .fb-compare { background:#F8FAFC; border:1px solid #E2E8F0; }
        .compare-row { display:flex; align-items:flex-start; gap:0.6rem; padding:0.4rem 0; border-bottom:1px dashed #E2E8F0; }
        .compare-row:last-child { border-bottom:none; }
        .compare-label { font-size:0.7rem; font-weight:800; text-transform:uppercase; letter-spacing:.5px; white-space:nowrap; padding:0.2rem 0.5rem; border-radius:6px; flex-shrink:0; margin-top:2px; }
        .compare-label.wrong { background:var(--error-light); color:var(--error-dark); }
        .compare-label.right { background:var(--success-light); color:var(--success-dark); }
        .compare-text { font-size:0.92rem; color:var(--text-dark); line-height:1.5; }

        .fb-error { background:var(--error-light); }
        .error-badge { display:inline-block; background:var(--error); color:white; padding:0.2rem 0.6rem; border-radius:6px; font-size:0.75rem; font-weight:700; margin-left:auto; }
        .fb-error .fb-block-title { color:var(--error-dark); }
        .error-text { font-size:0.88rem; color:var(--error-dark); line-height:1.5; }

        .fb-rule { background:var(--info-light); border:1px solid #BFDBFE; }
        .fb-rule .fb-block-title { color:var(--info-dark); }
        .rule-formula { background:white; border-radius:8px; padding:0.5rem 0.9rem; font-family:'Fredoka',sans-serif; font-size:0.92rem; color:var(--info-dark); font-weight:600; text-align:center; border:1px solid #BFDBFE; }

        .fb-why { background:#F0FDF4; border:1px solid #BBF7D0; }
        .fb-why .fb-block-title { color:var(--success-dark); }
        .fb-why-text { font-size:0.92rem; color:var(--text-dark); line-height:1.55; }

        .nav-buttons { display:flex; gap:0.75rem; margin-top:1.25rem; }
        .nav-btn { padding:0.8rem 1.2rem; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-size:0.95rem; font-weight:700; cursor:pointer; transition:all .2s; }
        .nav-btn.next { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; flex:1; }
        .nav-btn.prev { background:#F1F5F9; color:var(--text-dark); }
        .nav-btn:disabled { opacity:.4; cursor:default; }
        .nav-btn:not(:disabled):hover { transform:translateY(-2px); box-shadow:var(--shadow-soft); }

        .results-screen { display:none; text-align:center; padding:2rem 1.5rem; }
        .results-screen.show { display:block; animation:fadeUp .5s ease; }
        .results-emoji { font-size:4rem; margin-bottom:1rem; }
        .results-title { font-family:'Fredoka',sans-serif; font-size:2rem; margin-bottom:0.5rem; }
        .results-score { font-size:3rem; font-weight:800; color:var(--purple); margin:1rem 0; }
        .results-message { font-size:1.05rem; color:var(--text-medium); margin-bottom:1.5rem; }
        .stars-container { display:flex; justify-content:center; gap:0.5rem; margin:1.5rem 0; }
        .star { font-size:2.5rem; opacity:.3; transition:all .5s ease; }
        .star.earned { opacity:1; animation:starPop .5s ease; }
        @keyframes starPop { 0%{transform:scale(0)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }
        .results-buttons { display:flex; flex-direction:column; gap:1rem; margin-top:2rem; }
        .result-btn { padding:1rem 2rem; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; text-decoration:none; display:flex; align-items:center; justify-content:center; gap:0.5rem; transition:all .2s; }
        .result-btn.primary { background:linear-gradient(135deg,var(--purple),var(--purple-dark)); color:white; }
        .result-btn.secondary { background:#F1F5F9; color:var(--text-dark); }
        .result-btn:hover { transform:translateY(-2px); box-shadow:var(--shadow-soft); }
    </style>
</head>
<body>
    <header class="header">
        <a href="https://jucumenglishcenter.github.io/A2/A2_M1/Panel.html" class="back-btn">←</a>
        <div class="header-info">
            <div class="header-title">🔍 Identification</div>
            <div class="header-subtitle">💚 A2 · Module 2 · Zero article</div>
        </div>
        <div class="progress-indicator"><span id="currentQ">1</span>/15</div>
    </header>
    <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>

    <main>
        <div class="instructions">
            <div class="instructions-icon">📖</div>
            <div>
                <div class="instructions-title">Identify the correct sentence</div>
                <div class="instructions-text">Read three different sentences and choose the one that uses articles correctly (Ø, the, a, an). Tap 🇪🇸 to see Spanish translations.</div>
            </div>
        </div>

        <div id="questionsContainer"></div>

        <div class="results-screen" id="resultsScreen">
            <div class="results-emoji">🎉</div>
            <div class="results-title">Completed!</div>
            <div class="results-score" id="finalScore">0/15</div>
            <div class="stars-container">
                <span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span>
            </div>
            <div class="results-message" id="resultsMessage"></div>
            <div class="results-buttons">
                <button class="result-btn primary" onclick="location.reload()">🔄 Try Again</button>
                <a href="https://jucumenglishcenter.github.io/A2/A2_M1/Panel.html" class="result-btn secondary">← Back to Panel</a>
            </div>
        </div>
    </main>

    <script>
    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    const quizData = [
        {
            id: 1,
            type: "general_plural",
            hint: "When we talk about likes/dislikes in general with plural countable nouns, what article is used?",
            options: [
                { text: "Sofía likes apples in the morning, especially red ones.", textEs: "A Sofía le gustan las manzanas por la mañana, especialmente las rojas.", correct: true },
                { text: "Sofía likes the apples in the morning, especially red ones.", textEs: "A Sofía le gustan las manzanas por la mañana, especialmente las rojas.", correct: false,
                  errorType: "Wrong article — too specific",
                  explanation: "'The apples' refers to specific apples already known. Here she likes apples in GENERAL, which uses Ø (no article)." },
                { text: "Sofía likes a apples in the morning, especially red ones.", textEs: "A Sofía le gustan unas manzanas por la mañana, especialmente las rojas.", correct: false,
                  errorType: "Wrong article — singular only",
                  explanation: "'A' is for singular countable nouns. 'Apples' is plural — we never say 'a apples'. Plural general → Ø." }
            ],
            ruleFormula: "Ø + plural countable (general meaning)",
            correctReason: "Talking about likes in general with plural countable nouns uses Ø (no article). 'Sofía likes apples' = apples in general."
        },
        {
            id: 2,
            type: "general_uncountable",
            hint: "Daily habits with uncountable nouns — what article fits?",
            options: [
                { text: "Carlos drinks the coffee every morning before work.", textEs: "Carlos toma el café cada mañana antes del trabajo.", correct: false,
                  errorType: "Wrong article — too specific",
                  explanation: "'The coffee' refers to specific coffee already known. As a general daily habit, we use Ø: 'Carlos drinks coffee'." },
                { text: "Carlos drinks coffee every morning before work.", textEs: "Carlos toma café cada mañana antes del trabajo.", correct: true },
                { text: "Carlos drinks a coffee every morning before work.", textEs: "Carlos toma un café cada mañana antes del trabajo.", correct: false,
                  errorType: "Wrong article — never with uncountables",
                  explanation: "'Coffee' is uncountable. We NEVER use 'a/an' with uncountable nouns to express a general habit. Use Ø." }
            ],
            ruleFormula: "Ø + uncountable noun (general habit)",
            correctReason: "Drinking coffee as a daily habit uses Ø with the uncountable noun. 'Carlos drinks coffee every morning' = coffee in general."
        },
        {
            id: 3,
            type: "specific_uncountable",
            hint: "When the noun is followed by a defining phrase that identifies it specifically — what article fits?",
            options: [
                { text: "Coffee in this café is very strong, I prefer the other one.", textEs: "Café en este café es muy fuerte, prefiero el otro.", correct: false,
                  errorType: "Wrong article — context is specific",
                  explanation: "The coffee here is NOT general — it's the SPECIFIC coffee in THIS café. We need 'the coffee'." },
                { text: "A coffee in this café is very strong, I prefer the other one.", textEs: "Un café en este café es muy fuerte, prefiero el otro.", correct: false,
                  errorType: "Wrong article — never with uncountables",
                  explanation: "'Coffee' is uncountable. We NEVER use 'a/an' with uncountable nouns. With a specific reference, use 'the'." },
                { text: "The coffee in this café is very strong, I prefer the other one.", textEs: "El café en este café es muy fuerte, prefiero el otro.", correct: true }
            ],
            ruleFormula: "the + uncountable noun (specific by phrase)",
            correctReason: "'In this café' makes the coffee specific. Specific uncountable → 'the'."
        },
        {
            id: 4,
            type: "general_plural",
            hint: "General activity (typical habit) with plural countable nouns — what article fits?",
            options: [
                { text: "Marcos sometimes pays bills online to save time.", textEs: "Marcos a veces paga cuentas online para ahorrar tiempo.", correct: true },
                { text: "Marcos sometimes pays the bills online to save time.", textEs: "Marcos a veces paga las cuentas online para ahorrar tiempo.", correct: false,
                  errorType: "Wrong article — too specific",
                  explanation: "'The bills' would mean specific bills already mentioned. Here it's a general habit — bills in general use Ø." },
                { text: "Marcos sometimes pays a bills online to save time.", textEs: "Marcos a veces paga unas cuentas online para ahorrar tiempo.", correct: false,
                  errorType: "Wrong article — singular only",
                  explanation: "'A' is for singular countable nouns. 'Bills' is plural — we never say 'a bills'." }
            ],
            ruleFormula: "Ø + plural countable (general habit)",
            correctReason: "Paying bills is a general habit. With plural countable nouns in general meaning, we use Ø."
        },
        {
            id: 5,
            type: "singular_first_mention",
            hint: "Singular countable noun mentioned for the first time, not specific yet — what article fits?",
            options: [
                { text: "I need to find the bank that is open on Saturdays.", textEs: "Necesito encontrar el banco que está abierto los sábados.", correct: false,
                  errorType: "Wrong article — not yet specific",
                  explanation: "'The bank' would mean a specific known bank. Here he's looking for ANY bank that fits — first mention requires 'a'." },
                { text: "I need to find a bank that is open on Saturdays.", textEs: "Necesito encontrar un banco que esté abierto los sábados.", correct: true },
                { text: "I need to find an bank that is open on Saturdays.", textEs: "Necesito encontrar un banco que esté abierto los sábados.", correct: false,
                  errorType: "Wrong article — wrong sound",
                  explanation: "'An' is used before vowel SOUNDS (apple, hour). 'Bank' starts with consonant sound 'b' — we use 'a bank'." }
            ],
            ruleFormula: "a + singular countable (first mention, consonant sound)",
            correctReason: "'Bank' is singular countable, first mention, and starts with consonant 'b'. We use 'a bank'."
        },
        {
            id: 6,
            type: "general_uncountable",
            hint: "A universal truth about an uncountable noun — what article fits?",
            options: [
                { text: "The water is essential for life and health.", textEs: "El agua es esencial para la vida y la salud.", correct: false,
                  errorType: "Wrong article — too specific",
                  explanation: "'The water' refers to specific water (e.g., water in a glass). Here it's a universal truth — water in general uses Ø." },
                { text: "A water is essential for life and health.", textEs: "Un agua es esencial para la vida y la salud.", correct: false,
                  errorType: "Wrong article — never with uncountables",
                  explanation: "'Water' is uncountable. We NEVER use 'a/an' with uncountable nouns. General truth → Ø." },
                { text: "Water is essential for life and health.", textEs: "El agua es esencial para la vida y la salud.", correct: true }
            ],
            ruleFormula: "Ø + uncountable (universal truth)",
            correctReason: "Universal truths about uncountable nouns use Ø. 'Water is essential' = water in general."
        },
        {
            id: 7,
            type: "specific_plural",
            hint: "When a plural noun is followed by a defining phrase that identifies a specific group — what article fits?",
            options: [
                { text: "The children in this park are very friendly to everyone.", textEs: "Los niños en este parque son muy amables con todos.", correct: true },
                { text: "Children in this park are very friendly to everyone.", textEs: "Niños en este parque son muy amables con todos.", correct: false,
                  errorType: "Wrong article — context is specific",
                  explanation: "Children IN THIS PARK is a specific group, not children in general. We need 'the children'." },
                { text: "A children in this park are very friendly to everyone.", textEs: "Un niños en este parque son muy amables con todos.", correct: false,
                  errorType: "Wrong article — singular only",
                  explanation: "'A' is for singular countable nouns. 'Children' is plural — we use 'the' for specific groups." }
            ],
            ruleFormula: "the + plural noun (specific by location)",
            correctReason: "'In this park' makes the children specific (this particular group). Specific plural → 'the'."
        },
        {
            id: 8,
            type: "language_general",
            hint: "Languages used as study subjects or general communication — what article fits?",
            options: [
                { text: "Sofía is studying the French at university this year.", textEs: "Sofía está estudiando el francés en la universidad este año.", correct: false,
                  errorType: "Wrong article for languages",
                  explanation: "Languages don't take 'the' when used as study subjects. We say 'study French', 'speak Spanish' — Ø." },
                { text: "Sofía is studying French at university this year.", textEs: "Sofía está estudiando francés en la universidad este año.", correct: true },
                { text: "Sofía is studying a French at university this year.", textEs: "Sofía está estudiando un francés en la universidad este año.", correct: false,
                  errorType: "Wrong article for languages",
                  explanation: "Languages are uncountable concepts. We don't say 'a French' — just 'French' with Ø." }
            ],
            ruleFormula: "Ø + language name",
            correctReason: "Languages used as study subjects or general communication take Ø. 'Study French', 'speak English'."
        },
        {
            id: 9,
            type: "specific_plural",
            hint: "A relative clause makes the noun specific — what article fits with plural countable + defining clause?",
            options: [
                { text: "Books I bought yesterday are very interesting.", textEs: "Libros que compré ayer son muy interesantes.", correct: false,
                  errorType: "Wrong article — context is specific",
                  explanation: "Books bought YESTERDAY is a specific group, not books in general. The defining clause demands 'the'." },
                { text: "A books I bought yesterday are very interesting.", textEs: "Unos libros que compré ayer son muy interesantes.", correct: false,
                  errorType: "Wrong article — singular only",
                  explanation: "'A' is for singular countable nouns. 'Books' is plural — for specific plural we use 'the'." },
                { text: "The books I bought yesterday are very interesting.", textEs: "Los libros que compré ayer son muy interesantes.", correct: true }
            ],
            ruleFormula: "the + plural noun (defined by clause)",
            correctReason: "The relative clause 'I bought yesterday' specifies which books (the specific ones). Specific plural → 'the'."
        },
        {
            id: 10,
            type: "abstract_uncountable",
            hint: "Abstract concepts (honesty, freedom, love) used in general meaning — what article fits?",
            options: [
                { text: "Marcos thinks honesty is the best policy in business.", textEs: "Marcos piensa que la honestidad es la mejor política en los negocios.", correct: true },
                { text: "Marcos thinks the honesty is the best policy in business.", textEs: "Marcos piensa que la honestidad es la mejor política en los negocios.", correct: false,
                  errorType: "Wrong article — abstract general",
                  explanation: "'The honesty' would refer to specific honesty (e.g., 'the honesty of his speech'). Here it's the general concept — Ø." },
                { text: "Marcos thinks an honesty is the best policy in business.", textEs: "Marcos piensa que una honestidad es la mejor política en los negocios.", correct: false,
                  errorType: "Wrong article — never with uncountables",
                  explanation: "'Honesty' is uncountable. We NEVER use 'a/an' with uncountable nouns." }
            ],
            ruleFormula: "Ø + abstract uncountable (general)",
            correctReason: "Abstract concepts used in general meaning take Ø. 'Honesty is the best policy' = honesty in general."
        },
        {
            id: 11,
            type: "specific_plural",
            hint: "Specific people identified by a defining clause — what article fits?",
            options: [
                { text: "People who work at this bank are very professional.", textEs: "Gente que trabaja en este banco es muy profesional.", correct: false,
                  errorType: "Wrong article — context is specific",
                  explanation: "These people are NOT in general — they're the specific ones at THIS bank. The defining clause demands 'the'." },
                { text: "The people who work at this bank are very professional.", textEs: "La gente que trabaja en este banco es muy profesional.", correct: true },
                { text: "A people who work at this bank are very professional.", textEs: "Una gente que trabaja en este banco es muy profesional.", correct: false,
                  errorType: "Wrong article — singular only",
                  explanation: "'A' is for singular countable nouns. 'People' is plural (one person, two people)." }
            ],
            ruleFormula: "the + plural noun (specific by clause)",
            correctReason: "'Who work at this bank' specifies which people (the specific ones). Specific plural → 'the'."
        },
        {
            id: 12,
            type: "general_uncountable",
            hint: "General amount of an uncountable noun (no specific time period defined) — what article fits?",
            options: [
                { text: "I don't have the time to wait in line today.", textEs: "No tengo el tiempo para esperar en la fila hoy.", correct: false,
                  errorType: "Wrong article — too specific",
                  explanation: "'The time' would mean a specific known time period. Here it's general (any time) — Ø." },
                { text: "I don't have a time to wait in line today.", textEs: "No tengo un tiempo para esperar en la fila hoy.", correct: false,
                  errorType: "Wrong article — never with uncountables",
                  explanation: "'Time' is uncountable. We NEVER use 'a/an' with uncountable nouns." },
                { text: "I don't have time to wait in line today.", textEs: "No tengo tiempo para esperar en la fila hoy.", correct: true }
            ],
            ruleFormula: "Ø + uncountable (general meaning)",
            correctReason: "'Time' is uncountable, used in a general sense (any time). General uncountable → Ø."
        },
        {
            id: 13,
            type: "singular_first_mention",
            hint: "Singular countable noun starting with vowel sound, mentioned for the first time — what article fits?",
            options: [
                { text: "Carlos brought an apple from the kitchen for breakfast.", textEs: "Carlos trajo una manzana de la cocina para el desayuno.", correct: true },
                { text: "Carlos brought a apple from the kitchen for breakfast.", textEs: "Carlos trajo una manzana de la cocina para el desayuno.", correct: false,
                  errorType: "Wrong sound — needs vowel form",
                  explanation: "'A' is used before consonant SOUNDS. 'Apple' starts with vowel sound 'a' — we use 'an apple'." },
                { text: "Carlos brought apple from the kitchen for breakfast.", textEs: "Carlos trajo manzana de la cocina para el desayuno.", correct: false,
                  errorType: "Wrong article — singular needs article",
                  explanation: "Singular countable nouns ALWAYS need an article (a/an or the). We can't say 'brought Ø apple'." }
            ],
            ruleFormula: "an + singular countable (vowel sound)",
            correctReason: "'Apple' is singular countable, first mention, and starts with vowel sound 'a'. We use 'an apple'."
        },
        {
            id: 14,
            type: "general_uncountable",
            hint: "General dietary preference about an uncountable noun — what article fits?",
            options: [
                { text: "Sofía never eats the meat because she is vegetarian.", textEs: "Sofía nunca come la carne porque es vegetariana.", correct: false,
                  errorType: "Wrong article — too specific",
                  explanation: "'The meat' would refer to specific meat. Here she avoids meat in general (vegetarian habit) — Ø." },
                { text: "Sofía never eats meat because she is vegetarian.", textEs: "Sofía nunca come carne porque es vegetariana.", correct: true },
                { text: "Sofía never eats a meat because she is vegetarian.", textEs: "Sofía nunca come una carne porque es vegetariana.", correct: false,
                  errorType: "Wrong article — never with uncountables",
                  explanation: "'Meat' is uncountable. We NEVER use 'a/an' with uncountable nouns." }
            ],
            ruleFormula: "Ø + uncountable (general dietary preference)",
            correctReason: "'Meat' is uncountable, used here in a general sense (any meat). Vegetarian habit refers to meat in general."
        },
        {
            id: 15,
            type: "specific_plural",
            hint: "A prepositional phrase ('on the desk') makes the noun specific — what article fits?",
            options: [
                { text: "Documents on the desk need to be signed today.", textEs: "Documentos en el escritorio necesitan firmarse hoy.", correct: false,
                  errorType: "Wrong article — context is specific",
                  explanation: "Documents ON THE DESK is a specific group, not documents in general. We need 'the documents'." },
                { text: "A documents on the desk need to be signed today.", textEs: "Unos documentos en el escritorio necesitan firmarse hoy.", correct: false,
                  errorType: "Wrong article — singular only",
                  explanation: "'A' is for singular countable nouns. 'Documents' is plural — for specific plural we use 'the'." },
                { text: "The documents on the desk need to be signed today.", textEs: "Los documentos en el escritorio necesitan firmarse hoy.", correct: true }
            ],
            ruleFormula: "the + plural noun (specific by location)",
            correctReason: "'On the desk' specifies which documents (the specific ones). Specific plural → 'the'."
        }
    ];

    let currentQuestion = 0, score = 0;
    let answered = new Array(quizData.length).fill(false);

    function initQuiz() {
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';
        quizData.forEach((q, i) => {
            q.shuffled = shuffle(q.options);
            container.appendChild(createCard(q, i));
        });
        showQuestion(0);
        updateProgress();
    }

    function createCard(q, index) {
        const card = document.createElement('div');
        card.className = `question-card ${index !== 0 ? 'hidden' : ''}`;
        card.id = `question-${index}`;
        const letters = ['A','B','C'];
        let badgeClass, badgeText;
        if (q.type.startsWith('general') || q.type.startsWith('abstract') || q.type.startsWith('language')) {
            badgeClass = 'general'; badgeText = '🌍 General';
        } else if (q.type.startsWith('specific')) {
            badgeClass = 'specific'; badgeText = '🎯 Specific';
        } else {
            badgeClass = 'singular'; badgeText = '1️⃣ Singular';
        }

        card.innerHTML = `
            <div class="q-header">
                <div class="question-number">${index + 1}</div>
                <span class="q-label">Choose the grammatically correct sentence:</span>
                <span class="topic-badge ${badgeClass}">${badgeText}</span>
            </div>
            <div class="hint-box">
                <div class="hint-label">💡 Hint</div>
                ${q.hint}
            </div>
            <button class="translate-toggle" onclick="toggleTranslation(${index}, this)">🇪🇸 <span>Show Spanish</span></button>
            <div class="sentence-options" id="options-${index}">
                ${q.shuffled.map((opt, i) => `
                    <button class="sent-option" data-idx="${i}" onclick="selectOption(${index}, ${i})">
                        <div class="option-letter">${letters[i]}</div>
                        <div class="option-text">
                            ${opt.text}
                            <div class="option-text-es" id="es-${index}-${i}">${opt.textEs}</div>
                        </div>
                        <div class="option-status"></div>
                    </button>
                `).join('')}
            </div>
            <div class="feedback" id="feedback-${index}"></div>
            <div class="nav-buttons">
                <button class="nav-btn prev" onclick="prevQuestion()" ${index === 0 ? 'disabled' : ''}>← Previous</button>
                <button class="nav-btn next" id="next-${index}" onclick="nextQuestion(${index})" disabled>
                    ${index === quizData.length - 1 ? 'See Results 🎉' : 'Next →'}
                </button>
            </div>
        `;
        return card;
    }

    function toggleTranslation(qi, btn) {
        const span = btn.querySelector('span');
        const esItems = document.querySelectorAll(`#options-${qi} .option-text-es`);
        const isOn = btn.classList.contains('active');
        if (isOn) {
            esItems.forEach(el => el.classList.remove('show'));
            btn.classList.remove('active');
            span.textContent = 'Show Spanish';
        } else {
            esItems.forEach(el => el.classList.add('show'));
            btn.classList.add('active');
            span.textContent = 'Hide Spanish';
        }
    }

    function selectOption(qi, optIdx) {
        if (answered[qi]) return;
        answered[qi] = true;
        const q = quizData[qi];
        const selected = q.shuffled[optIdx];
        const isCorrect = selected.correct;
        const correctOpt = q.shuffled.find(o => o.correct);
        const correctIdx = q.shuffled.indexOf(correctOpt);
        if (isCorrect) score++;

        document.querySelectorAll(`#options-${qi} .sent-option`).forEach((btn, i) => {
            btn.classList.add('disabled');
            const statusEl = btn.querySelector('.option-status');
            if (i === correctIdx) {
                btn.classList.add('correct');
                statusEl.textContent = '✅';
            } else if (i === optIdx) {
                btn.classList.add('incorrect');
                statusEl.textContent = '❌';
            }
        });

        buildFeedback(qi, selected, isCorrect, correctOpt, q);
        document.getElementById(`next-${qi}`).disabled = false;
        updateProgress();
    }

    function buildFeedback(qi, selected, isCorrect, correctOpt, q) {
        const el = document.getElementById(`feedback-${qi}`);
        el.className = `feedback show ${isCorrect ? 'correct' : 'incorrect'}`;
        const wrongOptions = q.shuffled.filter(o => !o.correct);

        if (isCorrect) {
            el.innerHTML = `
                <div class="fb-header">
                    <span class="fb-icon">✅</span>
                    <div>
                        <div class="fb-title">Correct! You identified the right sentence</div>
                        <div class="fb-subtitle">Let's see why the others were wrong</div>
                    </div>
                </div>
                <div class="fb-body">
                    <div class="fb-block fb-rule">
                        <div class="fb-block-title">📐 Pattern</div>
                        <div class="rule-formula">${q.ruleFormula}</div>
                    </div>
                    ${wrongOptions.map(err => `
                    <div class="fb-block fb-error">
                        <div class="fb-block-title">⚠️ Error in another option: <span class="error-badge">${err.errorType}</span></div>
                        <div class="error-text" style="margin-bottom:0.5rem;font-style:italic;">"${err.text}"</div>
                        <div class="error-text">${err.explanation}</div>
                    </div>`).join('')}
                    <div class="fb-block fb-why">
                        <div class="fb-block-title">💡 Why is the correct sentence right?</div>
                        <div class="fb-why-text">${q.correctReason}</div>
                    </div>
                </div>
            `;
        } else {
            el.innerHTML = `
                <div class="fb-header">
                    <span class="fb-icon">❌</span>
                    <div>
                        <div class="fb-title">Incorrect — let's review</div>
                        <div class="fb-subtitle">Compare your choice with the correct sentence</div>
                    </div>
                </div>
                <div class="fb-body">
                    <div class="fb-block fb-compare">
                        <div class="fb-block-title">🔄 Your choice vs. correct</div>
                        <div class="compare-row">
                            <span class="compare-label wrong">You chose</span>
                            <span class="compare-text">${selected.text}</span>
                        </div>
                        <div class="compare-row">
                            <span class="compare-label right">Correct</span>
                            <span class="compare-text">${correctOpt.text}</span>
                        </div>
                    </div>
                    <div class="fb-block fb-error">
                        <div class="fb-block-title">⚠️ The error: <span class="error-badge">${selected.errorType}</span></div>
                        <div class="error-text">${selected.explanation}</div>
                    </div>
                    <div class="fb-block fb-rule">
                        <div class="fb-block-title">📐 Pattern</div>
                        <div class="rule-formula">${q.ruleFormula}</div>
                    </div>
                    <div class="fb-block fb-why">
                        <div class="fb-block-title">💡 Why is the correct sentence right?</div>
                        <div class="fb-why-text">${q.correctReason}</div>
                    </div>
                </div>
            `;
        }
    }

    function showQuestion(i) {
        document.querySelectorAll('.question-card').forEach((c, idx) => c.classList.toggle('hidden', idx !== i));
        document.getElementById('currentQ').textContent = i + 1;
        currentQuestion = i;
    }
    function nextQuestion(i) { i < quizData.length - 1 ? showQuestion(i + 1) : showResults(); }
    function prevQuestion() { if (currentQuestion > 0) showQuestion(currentQuestion - 1); }
    function updateProgress() {
        const done = answered.filter(Boolean).length;
        document.getElementById('progressFill').style.width = (done / quizData.length * 100) + '%';
    }
    function showResults() {
        document.querySelectorAll('.question-card').forEach(c => c.classList.add('hidden'));
        document.getElementById('resultsScreen').classList.add('show');
        const pct = score / quizData.length * 100;
        document.getElementById('finalScore').textContent = `${score}/${quizData.length}`;
        let stars = pct >= 90 ? 3 : pct >= 70 ? 2 : 1;
        document.getElementById('resultsMessage').textContent = pct >= 90
            ? 'Excellent! You can identify articles perfectly. 🏆'
            : pct >= 70 ? 'Well done! Keep practicing. 💪'
            : 'Good effort. Review the patterns and try again. 📚';
        document.querySelectorAll('.star').forEach((s, i) => {
            if (i < stars) setTimeout(() => s.classList.add('earned'), i * 300);
        });
    }
    document.addEventListener('DOMContentLoaded', initQuiz);
    </script>
</body>
</html>
