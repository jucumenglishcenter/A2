<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Identification - A2 M2 · Comparatives Patterns | JUCUM English</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10B981; --primary-light: #6EE7B7; --primary-dark: #059669;
            --accent: #34D399; --bg-gradient-start: #ECFDF5; --bg-gradient-end: #D1FAE5;
            --text-dark: #064E3B; --text-medium: #065F46; --text-light: #047857;
            --success: #10B981; --success-light: #D1FAE5; --success-dark: #059669;
            --error: #EF4444; --error-light: #FEE2E2; --error-dark: #DC2626;
            --info: #3B82F6; --info-light: #DBEAFE; --info-dark: #1D4ED8;
            --purple: #8B5CF6; --purple-light: #EDE9FE; --purple-dark: #6D28D9;
            --white: #FFFFFF;
            --shadow-soft: 0 4px 20px rgba(16,185,129,0.15);
            --shadow-strong: 0 8px 30px rgba(16,185,129,0.25);
            --border-radius: 20px;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:'Nunito',sans-serif; background:linear-gradient(135deg,var(--bg-gradient-start) 0%,var(--bg-gradient-end) 100%); min-height:100vh; color:var(--text-dark); }

        .header { background:linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%); padding:1rem 1.5rem; display:flex; align-items:center; gap:1rem; position:sticky; top:0; z-index:100; box-shadow:var(--shadow-soft); }
        .back-btn { width:40px; height:40px; border-radius:50%; background:rgba(255,255,255,0.3); border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1.4rem; text-decoration:none; color:white; transition:all .2s; flex-shrink:0; }
        .back-btn:hover { background:rgba(255,255,255,0.5); transform:scale(1.1); }
        .header-info { flex:1; }
        .header-title { font-family:'Fredoka',sans-serif; font-size:1.1rem; font-weight:600; color:white; }
        .header-subtitle { font-size:0.8rem; color:rgba(255,255,255,0.85); margin-top:2px; }
        .progress-indicator { background:rgba(255,255,255,0.3); padding:0.4rem 0.9rem; border-radius:20px; font-weight:700; color:white; font-size:0.9rem; white-space:nowrap; }
        .progress-container { padding:0; height:6px; background:rgba(255,255,255,0.3); }
        .progress-fill { height:100%; background:white; border-radius:0 3px 3px 0; transition:width .5s ease; width:0%; }

        main { padding:1.5rem; max-width:680px; margin:0 auto; }
        .instructions { background:white; border-radius:16px; padding:1rem 1.25rem; margin-bottom:1.25rem; box-shadow:var(--shadow-soft); border-left:5px solid var(--primary); display:flex; gap:0.75rem; align-items:flex-start; }
        .instructions-icon { font-size:1.6rem; flex-shrink:0; }
        .instructions-title { font-family:'Fredoka',sans-serif; font-size:1rem; font-weight:600; color:var(--text-dark); margin-bottom:0.2rem; }
        .instructions-text { font-size:0.85rem; color:var(--text-medium); line-height:1.5; }

        .ref-panel { background:white; border-radius:16px; padding:1rem 1.25rem; margin-bottom:1.25rem; box-shadow:var(--shadow-soft); border-left:5px solid var(--info); }
        .ref-title { font-family:'Fredoka',sans-serif; font-size:0.95rem; font-weight:600; color:var(--info-dark); margin-bottom:0.6rem; display:flex; align-items:center; gap:0.4rem; }
        .ref-card { background:#F0FDF4; border:1.5px solid #BBF7D0; border-radius:10px; padding:0.6rem 0.85rem; margin-bottom:0.5rem; }
        .ref-card.equal { background:#EFF6FF; border-color:#BFDBFE; }
        .ref-card.notequal { background:#FFE4E6; border-color:#FECACA; }
        .ref-card.double { background:#FEF3C7; border-color:#FCD34D; }
        .ref-card.gradual { background:#EDE9FE; border-color:#DDD6FE; }
        .ref-card.less { background:#F0FDF4; border-color:#BBF7D0; }
        .ref-word { font-family:'Fredoka',sans-serif; font-weight:700; font-size:0.92rem; display:block; margin-bottom:0.25rem; color:var(--text-dark); }
        .ref-text { font-size:0.78rem; color:var(--text-medium); line-height:1.4; }
        .ref-text strong { color:var(--text-dark); font-weight:700; }

        .question-card { background:white; border-radius:var(--border-radius); box-shadow:var(--shadow-soft); padding:1.5rem; margin-bottom:1rem; animation:slideIn .4s ease; }
        .question-card.hidden { display:none; }
        @keyframes slideIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }

        .q-header { display:flex; align-items:center; gap:0.75rem; margin-bottom:1rem; }
        .question-number { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; display:flex; align-items:center; justify-content:center; font-family:'Fredoka',sans-serif; font-weight:700; font-size:0.95rem; flex-shrink:0; }
        .q-label { font-size:0.88rem; color:var(--text-medium); font-weight:600; flex:1; }
        .topic-badge { display:inline-flex; align-items:center; gap:0.3rem; padding:0.2rem 0.7rem; border-radius:20px; font-size:0.72rem; font-weight:700; }
        .topic-badge.equal { background:#DBEAFE; color:#1D4ED8; }
        .topic-badge.notequal { background:#FEE2E2; color:#DC2626; }
        .topic-badge.double { background:#FEF3C7; color:#B45309; }
        .topic-badge.gradual { background:#EDE9FE; color:#6D28D9; }
        .topic-badge.less { background:#D1FAE5; color:#059669; }

        .hint-box { background:#F0FDF4; border-left:4px solid var(--primary); padding:0.7rem 1rem; border-radius:0 10px 10px 0; margin-bottom:1rem; font-size:0.88rem; color:var(--text-dark); line-height:1.5; }
        .hint-label { font-weight:700; color:var(--primary-dark); display:flex; align-items:center; gap:0.4rem; margin-bottom:0.3rem; font-size:0.82rem; text-transform:uppercase; letter-spacing:.5px; }

        .translate-toggle { display:flex; align-items:center; gap:0.4rem; background:#FFF; border:1.5px solid #E5E7EB; padding:0.4rem 0.8rem; border-radius:20px; font-size:0.78rem; font-weight:700; color:var(--text-medium); cursor:pointer; margin-bottom:0.8rem; transition:all .2s; }
        .translate-toggle:hover { border-color:var(--primary); color:var(--primary-dark); background:#F0FDF4; }
        .translate-toggle.active { background:var(--primary-light); border-color:var(--primary); color:var(--primary-dark); }

        .sentence-options { display:flex; flex-direction:column; gap:0.7rem; margin-top:0.5rem; }
        .sent-option { display:flex; align-items:center; gap:0.85rem; padding:1rem 1.1rem; border:2.5px solid #E5E7EB; border-radius:14px; background:white; font-family:'Nunito',sans-serif; font-size:0.95rem; cursor:pointer; transition:all .2s; color:var(--text-dark); text-align:left; width:100%; }
        .sent-option:hover:not(.disabled) { border-color:var(--primary); background:#F0FDF4; transform:translateY(-2px); box-shadow:var(--shadow-soft); }
        .sent-option.disabled { cursor:default; }
        .sent-option.correct { border-color:var(--success); background:var(--success-light); }
        .sent-option.incorrect { border-color:var(--error); background:var(--error-light); }
        .option-letter { width:32px; height:32px; flex-shrink:0; border-radius:50%; background:#E5E7EB; color:var(--text-medium); display:flex; align-items:center; justify-content:center; font-family:'Fredoka',sans-serif; font-weight:700; font-size:0.9rem; }
        .sent-option.correct .option-letter { background:var(--success); color:white; }
        .sent-option.incorrect .option-letter { background:var(--error); color:white; }
        .option-text { flex:1; font-weight:600; line-height:1.45; }
        .option-text-es { display:none; font-size:0.8rem; color:var(--text-light); font-style:italic; font-weight:400; margin-top:0.3rem; }
        .option-text-es.show { display:block; }
        .option-status { font-size:1.3rem; flex-shrink:0; min-width:1.5rem; text-align:center; }

        .feedback { margin-top:1.25rem; border-radius:16px; overflow:hidden; display:none; box-shadow:0 4px 16px rgba(0,0,0,0.1); }
        .feedback.show { display:block; animation:fadeUp .35s ease; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        .fb-header { padding:0.9rem 1.25rem; display:flex; align-items:center; gap:0.75rem; }
        .feedback.correct .fb-header { background:linear-gradient(135deg,var(--success),var(--success-dark)); }
        .feedback.incorrect .fb-header { background:linear-gradient(135deg,var(--error),var(--error-dark)); }
        .fb-icon { font-size:1.6rem; }
        .fb-title { font-family:'Fredoka',sans-serif; font-size:1.1rem; color:white; font-weight:600; }
        .fb-subtitle { font-size:0.8rem; color:rgba(255,255,255,0.85); margin-top:1px; }
        .fb-body { background:white; border:2px solid; border-top:none; border-radius:0 0 16px 16px; padding:1.25rem; display:flex; flex-direction:column; gap:0.9rem; }
        .feedback.correct .fb-body { border-color:var(--success); }
        .feedback.incorrect .fb-body { border-color:var(--error); }

        .fb-block { padding:0.9rem 1rem; border-radius:12px; }
        .fb-block-title { font-weight:800; font-size:0.78rem; text-transform:uppercase; letter-spacing:.6px; margin-bottom:0.5rem; display:flex; align-items:center; gap:0.4rem; }

        .fb-compare { background:#F8FAFC; border:1px solid #E2E8F0; }
        .compare-row { display:flex; align-items:flex-start; gap:0.6rem; padding:0.4rem 0; border-bottom:1px dashed #E2E8F0; }
        .compare-row:last-child { border-bottom:none; }
        .compare-label { font-size:0.7rem; font-weight:800; text-transform:uppercase; letter-spacing:.5px; white-space:nowrap; padding:0.2rem 0.5rem; border-radius:6px; flex-shrink:0; margin-top:2px; }
        .compare-label.wrong { background:var(--error-light); color:var(--error-dark); }
        .compare-label.right { background:var(--success-light); color:var(--success-dark); }
        .compare-text { font-size:0.92rem; color:var(--text-dark); line-height:1.5; }

        .fb-error { background:var(--error-light); }
        .error-badge { display:inline-block; background:var(--error); color:white; padding:0.2rem 0.6rem; border-radius:6px; font-size:0.75rem; font-weight:700; margin-left:auto; }
        .fb-error .fb-block-title { color:var(--error-dark); }
        .error-text { font-size:0.88rem; color:var(--error-dark); line-height:1.5; }

        .fb-rule { background:var(--info-light); border:1px solid #BFDBFE; }
        .fb-rule .fb-block-title { color:var(--info-dark); }
        .rule-formula { background:white; border-radius:8px; padding:0.5rem 0.9rem; font-family:'Fredoka',sans-serif; font-size:0.92rem; color:var(--info-dark); font-weight:600; text-align:center; border:1px solid #BFDBFE; }

        .fb-why { background:#F0FDF4; border:1px solid #BBF7D0; }
        .fb-why .fb-block-title { color:var(--success-dark); }
        .fb-why-text { font-size:0.92rem; color:var(--text-dark); line-height:1.55; }

        .nav-buttons { display:flex; gap:0.75rem; margin-top:1.25rem; }
        .nav-btn { padding:0.8rem 1.2rem; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-size:0.95rem; font-weight:700; cursor:pointer; transition:all .2s; }
        .nav-btn.next { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; flex:1; }
        .nav-btn.prev { background:#F1F5F9; color:var(--text-dark); }
        .nav-btn:disabled { opacity:.4; cursor:default; }
        .nav-btn:not(:disabled):hover { transform:translateY(-2px); box-shadow:var(--shadow-soft); }

        .results-screen { display:none; text-align:center; padding:2rem 1.5rem; }
        .results-screen.show { display:block; animation:fadeUp .5s ease; }
        .results-emoji { font-size:4rem; margin-bottom:1rem; }
        .results-title { font-family:'Fredoka',sans-serif; font-size:2rem; margin-bottom:0.5rem; }
        .results-score { font-size:3rem; font-weight:800; color:var(--purple); margin:1rem 0; }
        .results-message { font-size:1.05rem; color:var(--text-medium); margin-bottom:1.5rem; }
        .stars-container { display:flex; justify-content:center; gap:0.5rem; margin:1.5rem 0; }
        .star { font-size:2.5rem; opacity:.3; transition:all .5s ease; }
        .star.earned { opacity:1; animation:starPop .5s ease; }
        @keyframes starPop { 0%{transform:scale(0)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }
        .results-buttons { display:flex; flex-direction:column; gap:1rem; margin-top:2rem; }
        .result-btn { padding:1rem 2rem; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; text-decoration:none; display:flex; align-items:center; justify-content:center; gap:0.5rem; transition:all .2s; }
        .result-btn.primary { background:linear-gradient(135deg,var(--purple),var(--purple-dark)); color:white; }
        .result-btn.secondary { background:#F1F5F9; color:var(--text-dark); }
        .result-btn:hover { transform:translateY(-2px); box-shadow:var(--shadow-soft); }
    </style>
</head>
<body>
    <header class="header">
        <a href="https://jucumenglishcenter.github.io/A2/A2_M1/Panel.html" class="back-btn">←</a>
        <div class="header-info">
            <div class="header-title">🔍 Identification</div>
            <div class="header-subtitle">💚 A2 · Module 2 · Comparatives Patterns</div>
        </div>
        <div class="progress-indicator"><span id="currentQ">1</span>/15</div>
    </header>
    <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>

    <main>
        <div class="instructions">
            <div class="instructions-icon">⚖️</div>
            <div>
                <div class="instructions-title">Identify the correct sentence</div>
                <div class="instructions-text">Read three different sentences and choose the one that uses the comparative pattern correctly. Tap 🇪🇸 to see Spanish translations.</div>
            </div>
        </div>

        <div id="questionsContainer"></div>

        <div class="results-screen" id="resultsScreen">
            <div class="results-emoji">🎉</div>
            <div class="results-title">Completed!</div>
            <div class="results-score" id="finalScore">0/15</div>
            <div class="stars-container">
                <span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span>
            </div>
            <div class="results-message" id="resultsMessage"></div>
            <div class="results-buttons">
                <button class="result-btn primary" onclick="location.reload()">🔄 Try Again</button>
                <a href="https://jucumenglishcenter.github.io/A2/A2_M1/Panel.html" class="result-btn secondary">← Back to Panel</a>
            </div>
        </div>
    </main>

    <script>
    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    const quizData = [
        {
            id: 1,
            type: "equal",
            hint: "Look at the structure: which one correctly uses 'as + adjective + as' for equality?",
            options: [
                { text: "Sofía's car is as fast as Marcos's car — they are exactly the same model.", textEs: "El coche de Sofía es tan rápido como el coche de Marcos — son exactamente el mismo modelo.", correct: true },
                { text: "Sofía's car is so fast as Marcos's car — they are exactly the same model.", textEs: "El coche de Sofía es tan rápido como el coche de Marcos — son exactamente el mismo modelo.", correct: false,
                  errorType: "Wrong word — 'so' instead of 'as'",
                  explanation: "The equality pattern is 'AS + adjective + AS', not 'so + adjective + as'. Use 'as fast as'." },
                { text: "Sofía's car is as faster as Marcos's car — they are exactly the same model.", textEs: "El coche de Sofía es tan más rápido como el coche de Marcos — son exactamente el mismo modelo.", correct: false,
                  errorType: "Wrong form — comparative",
                  explanation: "Inside 'as...as' we use the BASE adjective ('fast'), NOT the comparative ('faster'). Pattern: as + ADJECTIVE + as." }
            ],
            ruleFormula: "as + adjective + as (equality)",
            correctReason: "When two things are equal in a quality, the correct pattern is 'as + adjective + as' with the BASE form of the adjective: 'as fast as'."
        },
        {
            id: 2,
            type: "notequal",
            hint: "The correct pattern uses 'not as + adjective + as' for inequality (something is lower).",
            options: [
                { text: "This restaurant is no as good as the one we visited last week.", textEs: "Este restaurante no es tan bueno como el que visitamos la semana pasada.", correct: false,
                  errorType: "Wrong negation — 'no' instead of 'not'",
                  explanation: "The negative form uses 'NOT' (not 'no'). Correct: 'not as good as' (NOT 'no as good as')." },
                { text: "This restaurant is not as good as the one we visited last week.", textEs: "Este restaurante no es tan bueno como el que visitamos la semana pasada.", correct: true },
                { text: "This restaurant is not as better as the one we visited last week.", textEs: "Este restaurante no es tan mejor como el que visitamos la semana pasada.", correct: false,
                  errorType: "Wrong form — comparative",
                  explanation: "Inside 'not as...as' we use the BASE adjective ('good'), NOT the comparative ('better'). Pattern: not as + ADJECTIVE + as." }
            ],
            ruleFormula: "not as + adjective + as (inequality)",
            correctReason: "To express something is INFERIOR, we use 'NOT as + base adjective + as': 'not as good as'."
        },
        {
            id: 3,
            type: "double",
            hint: "Proportional pattern: the + comparative, the + comparative. Check the use of 'the'.",
            options: [
                { text: "More you study, more you learn — that's the secret.", textEs: "Cuanto más estudias, más aprendes — ese es el secreto.", correct: false,
                  errorType: "Missing 'the'",
                  explanation: "The proportional pattern requires 'THE' before each comparative: 'THE more you study, THE more you learn'." },
                { text: "The most you study, the most you learn — that's the secret.", textEs: "Cuanto más estudias, más aprendes — ese es el secreto.", correct: false,
                  errorType: "Wrong form — superlative",
                  explanation: "'The most' is the SUPERLATIVE form. The proportional pattern needs the COMPARATIVE: 'the more...the more'." },
                { text: "The more you study, the more you learn — that's the secret.", textEs: "Cuanto más estudias, más aprendes — ese es el secreto.", correct: true }
            ],
            ruleFormula: "the + comparative, the + comparative (proportional)",
            correctReason: "Proportional changes use 'the + comparative, the + comparative'. Both 'the's are required, and we use the COMPARATIVE (more), not superlative (most)."
        },
        {
            id: 4,
            type: "gradual",
            hint: "Gradual change pattern: comparative + and + comparative. Check the form of the adjective.",
            options: [
                { text: "It's getting colder and colder as winter approaches.", textEs: "Está haciendo cada vez más frío conforme se acerca el invierno.", correct: true },
                { text: "It's getting cold and cold as winter approaches.", textEs: "Está haciendo cada vez más frío conforme se acerca el invierno.", correct: false,
                  errorType: "Wrong form — adjective",
                  explanation: "Gradual change requires the COMPARATIVE form ('colder'), not the simple adjective ('cold'). Pattern: 'colder and colder'." },
                { text: "It's getting more and more cold as winter approaches.", textEs: "Está haciendo cada vez más y más frío conforme se acerca el invierno.", correct: false,
                  errorType: "Wrong pattern — short adjective",
                  explanation: "For SHORT adjectives like 'cold', we use 'colder and colder' (NOT 'more and more cold'). 'More and more' is for LONG adjectives." }
            ],
            ruleFormula: "comparative + and + comparative (gradual change)",
            correctReason: "Gradual change uses the COMPARATIVE form repeated. For short adjectives like 'cold', the comparative is 'colder', so: 'colder and colder'."
        },
        {
            id: 5,
            type: "less",
            hint: "Less + adjective + than. Check the structure carefully.",
            options: [
                { text: "Carlos's new bike is more less expensive than his old one.", textEs: "La bicicleta nueva de Carlos es más menos cara que la antigua.", correct: false,
                  errorType: "Wrong pattern — double comparative",
                  explanation: "We can't combine 'more' and 'less'. The correct pattern is just 'LESS + adjective + than'." },
                { text: "Carlos's new bike is less expensive than his old one.", textEs: "La bicicleta nueva de Carlos es menos cara que la antigua.", correct: true },
                { text: "Carlos's new bike is less expensive that his old one.", textEs: "La bicicleta nueva de Carlos es menos cara que la antigua.", correct: false,
                  errorType: "Wrong word — 'that' instead of 'than'",
                  explanation: "Comparative comparisons use 'THAN' (the comparison word), not 'that' (a relative pronoun). Correct: 'less expensive THAN'." }
            ],
            ruleFormula: "less + adjective + than (lower)",
            correctReason: "To express something is lower in a quality, we use 'less + base adjective + than': 'less expensive than'."
        },
        {
            id: 6,
            type: "equal",
            hint: "Equal pattern: as + adjective + as. Look for the correct word order.",
            options: [
                { text: "Sofía and her sister are twins — Sofía is as tall than her sister.", textEs: "Sofía y su hermana son gemelas — Sofía es tan alta que su hermana.", correct: false,
                  errorType: "Wrong word — 'than' instead of 'as'",
                  explanation: "Equality uses 'as...AS' (both 'as'). 'Than' is for comparative ('taller than'). Mixing them is incorrect." },
                { text: "Sofía and her sister are twins — Sofía is so tall as her sister.", textEs: "Sofía y su hermana son gemelas — Sofía es tan alta como su hermana.", correct: false,
                  errorType: "Wrong word — 'so' instead of 'as'",
                  explanation: "The equality pattern is 'AS + adjective + AS', not 'so + adjective + as'. Use 'as tall as'." },
                { text: "Sofía and her sister are twins — Sofía is as tall as her sister.", textEs: "Sofía y su hermana son gemelas — Sofía es tan alta como su hermana.", correct: true }
            ],
            ruleFormula: "as + adjective + as (equality)",
            correctReason: "Equality uses 'as + adjective + as' with BOTH 'as' words. Twins have equal heights, so 'as tall as'."
        },
        {
            id: 7,
            type: "double",
            hint: "Proportional pattern: the + comparative, the + comparative. Check the comparative forms.",
            options: [
                { text: "The more you eat, the more you weigh — it's a simple proportion.", textEs: "Cuanto más comes, más pesas — es una proporción simple.", correct: true },
                { text: "The most you eat, the most you weigh — it's a simple proportion.", textEs: "Cuanto más comes, más pesas — es una proporción simple.", correct: false,
                  errorType: "Wrong form — superlative",
                  explanation: "'The most' is SUPERLATIVE (the highest of all). For proportional change, we need the COMPARATIVE: 'the more'." },
                { text: "More you eat, more you weigh — it's a simple proportion.", textEs: "Más comes, más pesas — es una proporción simple.", correct: false,

                  explanation: "Proportional pattern requires 'THE' before each comparative: 'THE more you eat, THE more you weigh'." }
            ],
            ruleFormula: "the + comparative, the + comparative (proportional)",
            correctReason: "Proportional change uses 'the + comparative, the + comparative'. Both 'the's required, and we use 'more' (comparative), not 'most' (superlative)."
        },
        {
            id: 8,
            type: "gradual",
            hint: "Gradual change with irregular adjective 'bad'. What's the correct comparative?",
            options: [
                { text: "The traffic is becoming bad and bad in this city.", textEs: "El tráfico se está volviendo malo y malo en esta ciudad.", correct: false,
                  errorType: "Wrong form — adjective",

                { text: "The traffic is becoming worse and worse in this city.", textEs: "El tráfico se está volviendo cada vez peor en esta ciudad.", correct: true },
                { text: "The traffic is becoming more bad and more bad in this city.", textEs: "El tráfico se está volviendo más malo y más malo en esta ciudad.", correct: false,

                  explanation: "'Bad' has an IRREGULAR comparative: 'worse' (NOT 'more bad'). The correct form is 'worse and worse'." }

                { text: "This new model is less powerful than the old one.", textEs: "Este nuevo modelo es menos potente que el antiguo.", correct: true }
            ],
            ruleFormula: "less + adjective + than (lower)",
            correctReason: "'Less + adjective + than' uses an ADJECTIVE form (powerful), not adverb (powerfully). Correct order: less powerful than."
        },
        {

                { text: "The exam was not so easy as I expected — the questions were difficult.", textEs: "El examen no fue tan fácil como esperaba — las preguntas eran difíciles.", correct: false,
                  errorType: "Wrong word — 'so' instead of 'as'",
                  explanation: "In modern English, the negative inequality pattern is 'not AS + adj + AS' (NOT 'not so + adj + as'). Use 'not as easy as'." },
                { text: "The exam was not as easier as I expected — the questions were difficult.", textEs: "El examen no fue tan más fácil como esperaba — las preguntas eran difíciles.", correct: false,
                  errorType: "Wrong form — comparative",
                  explanation: "Inside 'not as...as' we use the BASE adjective ('easy'), NOT the comparative ('easier'). Pattern: not as + ADJECTIVE + as." }
            ],
            ruleFormula: "not as + adjective + as (inequality)",
            correctReason: "Inequality uses 'not as + base adjective + as'. We use the BASE form (easy), not comparative (easier)."
        },
        {
            id: 11,
            type: "double",
            hint: "Proportional pattern with two different adjectives. Check the structure.",
            options: [

                  errorType: "Missing both 'the's",
                  explanation: "The proportional pattern requires 'THE' BEFORE each comparative: 'THE smaller... THE more...'. Both are required." },
                { text: "The smaller this town gets, the more residents move away.", textEs: "Cuanto más pequeño se vuelve este pueblo, más residentes se van.", correct: true },
                { text: "The smaller this town gets, the much residents move away.", textEs: "Cuanto más pequeño se vuelve este pueblo, mucha residentes se van.", correct: false,
                  errorType: "Wrong form — 'much' instead of 'more'",
                  explanation: "We need the COMPARATIVE 'more' (with countable plural 'residents'). 'Much' is for uncountables, NOT plural countables." }
            ],
            ruleFormula: "the + comparative, the + comparative (proportional)",
            correctReason: "Proportional change uses 'the + comparative, the + comparative'. With countable plurals, use 'more' (comparative of 'many')."
        },
        {
            id: 12,
            type: "gradual",
            hint: "Gradual change with irregular adjective 'good'. What's the correct comparative?",
            options: [
                { text: "Carlos's English is getting good and good thanks to daily practice.", textEs: "El inglés de Carlos se está volviendo bueno y bueno gracias a la práctica diaria.", correct: false,
                  errorType: "Wrong form — adjective",
                  explanation: "Gradual change requires the COMPARATIVE. 'Good' is irregular: 'good' → 'better'. So: 'better and better'." },
                { text: "Carlos's English is getting more good and more good thanks to daily practice.", textEs: "El inglés de Carlos se está volviendo más bueno y más bueno gracias a la práctica diaria.", correct: false,
                  errorType: "Wrong form — irregular ignored",
                  explanation: "'Good' has an IRREGULAR comparative: 'better' (NOT 'more good'). The correct form is 'better and better'." },
                { text: "Carlos's English is getting better and better thanks to daily practice.", textEs: "El inglés de Carlos está mejorando cada vez más gracias a la práctica diaria.", correct: true }
            ],
            ruleFormula: "comparative + and + comparative (gradual change)",
            correctReason: "Gradual change uses the COMPARATIVE form. 'Good' is irregular: good → better, so 'better and better'."
        },
        {
            id: 13,
            type: "less",
            hint: "Less + adjective + than. Check the negation and the structure.",
            options: [
                { text: "Marcos's apartment is less spacious than his brother's.", textEs: "El apartamento de Marcos es menos espacioso que el de su hermano.", correct: true },
                { text: "Marcos's apartment is no less spacious than his brother's.", textEs: "El apartamento de Marcos no es menos espacioso que el de su hermano.", correct: false,
                  errorType: "Wrong meaning — double negative",
                  explanation: "'No less spacious than' would mean 'just as spacious or more'. The original meaning is just 'less spacious than' (smaller)." },
                { text: "Marcos's apartment is less spaciously than his brother's.", textEs: "El apartamento de Marcos es menos espaciosamente que el de su hermano.", correct: false,
                  errorType: "Wrong form — adverb",
                  explanation: "'Spaciously' is an ADVERB. Inside 'less...than' we need an ADJECTIVE: 'less SPACIOUS than'." }
            ],

        },
        {
            id: 14,
            type: "equal",
            hint: "Equality pattern with the verb 'to be'. Check the structure.",
            options: [
                { text: "Sofía's salary is as high than Marcos's salary — they both earn $3,000.", textEs: "El salario de Sofía es tan alto que el salario de Marcos — ambos ganan $3,000.", correct: false,
                  errorType: "Wrong word — 'than' instead of 'as'",
                  explanation: "Equality uses 'as + adj + AS' (both 'as'). 'Than' is for comparatives. Use 'as high AS'." },
                { text: "Sofía's salary is as high as Marcos's salary — they both earn $3,000.", textEs: "El salario de Sofía es tan alto como el salario de Marcos — ambos ganan $3,000.", correct: true },
                { text: "Sofía's salary is so high as Marcos's salary — they both earn $3,000.", textEs: "El salario de Sofía es tan alto como el salario de Marcos — ambos ganan $3,000.", correct: false,
                  errorType: "Wrong word — 'so' instead of 'as'",
                  explanation: "The equality pattern is 'AS + adjective + AS' (NOT 'so + adjective + as'). Use 'as high as'." }
            ],
            ruleFormula: "as + adjective + as (equality)",
            correctReason: "Equality uses 'as + adjective + as' with BOTH 'as' words (NOT 'so...as' or 'as...than'). Both salaries equal: 'as high as'."
        },
        {
            id: 15,

                  errorType: "Wrong word — 'so' instead of 'as'",
                  explanation: "In modern English, the inequality pattern is 'not AS + adj + AS' (NOT 'not so + adj + as'). Use 'not as high as'." },
                { text: "This restaurant's prices aren't as higher as the one across the street.", textEs: "Los precios de este restaurante no son tan más altos como los del otro lado de la calle.", correct: false,
                  errorType: "Wrong form — comparative",
                  explanation: "Inside 'not as...as' we use the BASE adjective ('high'), NOT the comparative ('higher'). Pattern: not as + ADJECTIVE + as." },
                { text: "This restaurant's prices aren't as high as the one across the street.", textEs: "Los precios de este restaurante no son tan altos como los del otro lado de la calle.", correct: true }
            ],
            ruleFormula: "not as + adjective + as (inequality)",
            correctReason: "Inequality uses 'not as + base adjective + as'. We use the BASE form (high), not comparative (higher)."
        }
    ];

    let currentQuestion = 0, score = 0;
    let answered = new Array(quizData.length).fill(false);

    function initQuiz() {
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';
        quizData.forEach((q, i) => {
            q.shuffled = shuffle(q.options);
            container.appendChild(createCard(q, i));
        });
        showQuestion(0);
        updateProgress();
    }

    function createCard(q, index) {
        const card = document.createElement('div');
        card.className = `question-card ${index !== 0 ? 'hidden' : ''}`;
        card.id = `question-${index}`;
        const letters = ['A','B','C'];
        let badgeClass, badgeText;
        if (q.type === 'equal') { badgeClass = 'equal'; badgeText = '⚖️ Equal'; }
        else if (q.type === 'notequal') { badgeClass = 'notequal'; badgeText = '❌ Not equal'; }
        else if (q.type === 'double') { badgeClass = 'double'; badgeText = '🔄 Proportional'; }
        else if (q.type === 'gradual') { badgeClass = 'gradual'; badgeText = '📈 Gradual'; }
        else { badgeClass = 'less'; badgeText = '⬇️ Less'; }

        card.innerHTML = `
            <div class="q-header">
                <div class="question-number">${index + 1}</div>
                <span class="q-label">Choose the grammatically correct sentence:</span>
                <span class="topic-badge ${badgeClass}">${badgeText}</span>
            </div>
            <div class="hint-box">
                <div class="hint-label">💡 Hint</div>
                ${q.hint}
            </div>
            <button class="translate-toggle" onclick="toggleTranslation(${index}, this)">🇪🇸 <span>Show Spanish</span></button>
            <div class="sentence-options" id="options-${index}">
                ${q.shuffled.map((opt, i) => `
                    <button class="sent-option" data-idx="${i}" onclick="selectOption(${index}, ${i})">
                        <div class="option-letter">${letters[i]}</div>
                        <div class="option-text">
                            ${opt.text}
                            <div class="option-text-es" id="es-${index}-${i}">${opt.textEs}</div>
                        </div>
                        <div class="option-status"></div>
                    </button>
                `).join('')}
            </div>
            <div class="feedback" id="feedback-${index}"></div>
            <div class="nav-buttons">
                <button class="nav-btn prev" onclick="prevQuestion()" ${index === 0 ? 'disabled' : ''}>← Previous</button>
                <button class="nav-btn next" id="next-${index}" onclick="nextQuestion(${index})" disabled>
                    ${index === quizData.length - 1 ? 'See Results 🎉' : 'Next →'}
                </button>
            </div>
        `;
        return card;
    }

    function toggleTranslation(qi, btn) {
        const span = btn.querySelector('span');
        const esItems = document.querySelectorAll(`#options-${qi} .option-text-es`);
        const isOn = btn.classList.contains('active');
        if (isOn) {
            esItems.forEach(el => el.classList.remove('show'));
            btn.classList.remove('active');
            span.textContent = 'Show Spanish';
        } else {
            esItems.forEach(el => el.classList.add('show'));
            btn.classList.add('active');
            span.textContent = 'Hide Spanish';
        }
    }

    function selectOption(qi, optIdx) {
        if (answered[qi]) return;
        answered[qi] = true;
        const q = quizData[qi];
        const selected = q.shuffled[optIdx];
        const isCorrect = selected.correct;
        const correctOpt = q.shuffled.find(o => o.correct);
        const correctIdx = q.shuffled.indexOf(correctOpt);
        if (isCorrect) score++;

        document.querySelectorAll(`#options-${qi} .sent-option`).forEach((btn, i) => {
            btn.classList.add('disabled');
            const statusEl = btn.querySelector('.option-status');
            if (i === correctIdx) {
                btn.classList.add('correct');
                statusEl.textContent = '✅';
            } else if (i === optIdx) {
                btn.classList.add('incorrect');
                statusEl.textContent = '❌';
            }
        });

        buildFeedback(qi, selected, isCorrect, correctOpt, q);
        document.getElementById(`next-${qi}`).disabled = false;
        updateProgress();
    }

    function buildFeedback(qi, selected, isCorrect, correctOpt, q) {
        const el = document.getElementById(`feedback-${qi}`);
        el.className = `feedback show ${isCorrect ? 'correct' : 'incorrect'}`;
        const wrongOptions = q.shuffled.filter(o => !o.correct);

        if (isCorrect) {
            el.innerHTML = `
                <div class="fb-header">
                    <span class="fb-icon">✅</span>
                    <div>
                        <div class="fb-title">Correct! You identified the right sentence</div>
                        <div class="fb-subtitle">Let's see why the others were wrong</div>
                    </div>
                </div>
                <div class="fb-body">
                    <div class="fb-block fb-rule">
                        <div class="fb-block-title">📐 Pattern</div>
                        <div class="rule-formula">${q.ruleFormula}</div>
                    </div>
                    ${wrongOptions.map(err => `
                    <div class="fb-block fb-error">
                        <div class="fb-block-title">⚠️ Error in another option: <span class="error-badge">${err.errorType}</span></div>
                        <div class="error-text" style="margin-bottom:0.5rem;font-style:italic;">"${err.text}"</div>
                        <div class="error-text">${err.explanation}</div>
                    </div>`).join('')}
                    <div class="fb-block fb-why">
                        <div class="fb-block-title">💡 Why is the correct sentence right?</div>
                        <div class="fb-why-text">${q.correctReason}</div>
                    </div>
                </div>
            `;
        } else {
            el.innerHTML = `
                <div class="fb-header">
                    <span class="fb-icon">❌</span>
                    <div>
                        <div class="fb-title">Incorrect — let's review</div>
                        <div class="fb-subtitle">Compare your choice with the correct sentence</div>
                    </div>
                </div>
                <div class="fb-body">
                    <div class="fb-block fb-compare">
                        <div class="fb-block-title">🔄 Your choice vs. correct</div>
                        <div class="compare-row">
                            <span class="compare-label wrong">You chose</span>
                            <span class="compare-text">${selected.text}</span>
                        </div>
                        <div class="compare-row">
                            <span class="compare-label right">Correct</span>
                            <span class="compare-text">${correctOpt.text}</span>
                        </div>
                    </div>
                    <div class="fb-block fb-error">
                        <div class="fb-block-title">⚠️ The error: <span class="error-badge">${selected.errorType}</span></div>
                        <div class="error-text">${selected.explanation}</div>
                    </div>
                    <div class="fb-block fb-rule">
                        <div class="fb-block-title">📐 Pattern</div>
                        <div class="rule-formula">${q.ruleFormula}</div>
                    </div>
                    <div class="fb-block fb-why">
                        <div class="fb-block-title">💡 Why is the correct sentence right?</div>
                        <div class="fb-why-text">${q.correctReason}</div>
                    </div>
                </div>
            `;
        }
    }

    function showQuestion(i) {
        document.querySelectorAll('.question-card').forEach((c, idx) => c.classList.toggle('hidden', idx !== i));
        document.getElementById('currentQ').textContent = i + 1;
        currentQuestion = i;
    }
    function nextQuestion(i) { i < quizData.length - 1 ? showQuestion(i + 1) : showResults(); }
    function prevQuestion() { if (currentQuestion > 0) showQuestion(currentQuestion - 1); }
    function updateProgress() {
        const done = answered.filter(Boolean).length;
        document.getElementById('progressFill').style.width = (done / quizData.length * 100) + '%';
    }
    function showResults() {
        document.querySelectorAll('.question-card').forEach(c => c.classList.add('hidden'));
        document.getElementById('resultsScreen').classList.add('show');
        const pct = score / quizData.length * 100;
        document.getElementById('finalScore').textContent = `${score}/${quizData.length}`;
        let stars = pct >= 90 ? 3 : pct >= 70 ? 2 : 1;
        document.getElementById('resultsMessage').textContent = pct >= 90
            ? 'Excellent! You can identify comparative patterns perfectly. 🏆'
            : pct >= 70 ? 'Well done! Keep practicing. 💪'
            : 'Good effort. Review the patterns and try again. 📚';
        document.querySelectorAll('.star').forEach((s, i) => {
            if (i < stars) setTimeout(() => s.classList.add('earned'), i * 300);
        });
    }
    document.addEventListener('DOMContentLoaded', initQuiz);
    </script>
</body>
</html>
