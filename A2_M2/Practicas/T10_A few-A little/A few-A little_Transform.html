    <header class="header">
        <a href="https://jucumenglishcenter.github.io/A2/A2_M1/Panel.html" class="back-btn">←</a>
        <div class="header-info">
            <div class="header-title">🔄 Transform</div>
            <div class="header-subtitle">💚 A2 · Module 2 · A few / few · A little / little</div>
        </div>
        <div class="progress-indicator"><span id="currentQ">1</span>/15</div>
    </header>
    <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>

    <main>
        <div class="instructions">
            <div class="instructions-icon">🔄</div>
            <div>
                <div class="instructions-title">Transform the sentence</div>
                <div class="instructions-text">Read the original sentence and the goal. Choose the option that correctly transforms the quantifier according to the goal. Tap 🇪🇸 to see Spanish translations.</div>
            </div>
        </div>

        <div id="questionsContainer"></div>

        <div class="results-screen" id="resultsScreen">
            <div class="results-emoji">🎉</div>
            <div class="results-title">Completed!</div>
            <div class="results-score" id="finalScore">0/15</div>
            <div class="stars-container">
                <span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span>
            </div>
            <div class="results-message" id="resultsMessage"></div>
            <div class="results-buttons">
                <button class="result-btn primary" onclick="location.reload()">🔄 Try Again</button>
                <a href="https://jucumenglishcenter.github.io/A2/A2_M1/Panel.html" class="result-btn secondary">← Back to Panel</a>
            </div>
        </div>
    </main>

    <script>
    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    // Goals neutral — describe the change without revealing the answer
    // Mix of: nuance change (positive↔negative) and noun category change (countable↔uncountable)
    const quizData = [
        {
            id: 1,
            base: "Sofía has a few coins in her wallet, so she can pay for the bus.",
            baseEs: "Sofía tiene algunas monedas en su billetera, así que puede pagar el autobús.",
            goal: "Change to negative meaning (insufficient quantity)",
            goalEs: "Cambiar a significado negativo (cantidad insuficiente)",
            hint: "Keep the same noun. Change the quantifier to express that the quantity is NOT enough.",
            options: [
                { text: "Sofía has few coins in her wallet, so she can't pay for the bus.", textEs: "Sofía tiene pocas monedas en su billetera, así que no puede pagar el autobús.", correct: true },
                { text: "Sofía has little coins in her wallet, so she can't pay for the bus.", textEs: "Sofía tiene poco monedas en su billetera, así que no puede pagar el autobús.", correct: false,
                  errorType: "Wrong category",
                  explanation: "'Little' is for uncountable nouns. 'Coins' is countable plural — the negative form is 'few coins', not 'little coins'." },
                { text: "Sofía has a few coins in her wallet, so she can't pay for the bus.", textEs: "Sofía tiene algunas monedas en su billetera, así que no puede pagar el autobús.", correct: false,
                  errorType: "Quantifier not changed",
                  explanation: "The quantifier stayed positive ('a few' = some, enough). The goal is to change to negative meaning (not enough), so we need to drop the article 'a'." }
            ],
            ruleFormula: "a few → few (positive → negative, countable)",
            correctReason: "To change from positive to negative meaning with countable plural nouns, drop the article 'a': 'a few' → 'few' = almost none, not enough."
        },
        {
            id: 2,
            base: "I have little money in my account, so I can't pay this bill.",
            baseEs: "Tengo poco dinero en mi cuenta, por eso no puedo pagar este recibo.",
            goal: "Change to positive meaning (sufficient quantity)",
            goalEs: "Cambiar a significado positivo (cantidad suficiente)",
            hint: "Keep the same noun. Change the quantifier to express that the quantity IS enough.",
            options: [
                { text: "I have a few money in my account, so I can pay this bill.", textEs: "Tengo algunos dinero en mi cuenta, así que puedo pagar este recibo.", correct: false,
                  errorType: "Wrong category",
                  explanation: "'A few' is for countable plural. 'Money' is uncountable — the positive form is 'a little money', not 'a few money'." },
                { text: "I have a little money in my account, so I can pay this bill.", textEs: "Tengo un poco de dinero en mi cuenta, así que puedo pagar este recibo.", correct: true },
                { text: "I have little money in my account, so I can pay this bill.", textEs: "Tengo poco dinero en mi cuenta, así que puedo pagar este recibo.", correct: false,
                  errorType: "Quantifier not changed",
                  explanation: "The quantifier stayed negative ('little' = not enough). The goal is to change to positive meaning (enough), so we need to add the article 'a'." }
            ],
            ruleFormula: "little → a little (negative → positive, uncountable)",
            correctReason: "To change from negative to positive meaning with uncountable nouns, add the article 'a': 'little' → 'a little' = some, enough."
        },
        {
            id: 3,
            base: "Marcos has a few minutes before the bank closes.",
            baseEs: "Marcos tiene algunos minutos antes de que el banco cierre.",
            goal: "Change the noun to uncountable equivalent",
            goalEs: "Cambiar el sustantivo a equivalente incontable",
            hint: "'Minutes' is countable. What's the uncountable equivalent that means the same general concept?",
            options: [
                { text: "Marcos has a few time before the bank closes.", textEs: "Marcos tiene algún tiempo antes de que el banco cierre.", correct: false,
                  errorType: "Quantifier not adjusted",
                  explanation: "'Time' is uncountable, but the quantifier 'a few' stayed (used for countable). We need to also change the quantifier to 'a little' for uncountable nouns." },
                { text: "Marcos has a little time before the bank closes.", textEs: "Marcos tiene un poco de tiempo antes de que el banco cierre.", correct: true },
                { text: "Marcos has little time before the bank closes.", textEs: "Marcos tiene poco tiempo antes de que el banco cierre.", correct: false,
                  errorType: "Nuance changed",
                  explanation: "The original is positive ('a few' = some, enough). 'Little' (without 'a') is negative. To keep the positive meaning with uncountable, use 'a little'." }
            ],
            ruleFormula: "a few + minutes (countable) → a little + time (uncountable)",
            correctReason: "When changing from countable 'minutes' to uncountable 'time', the quantifier must change from 'a few' to 'a little'. The positive nuance stays."
        },
        {
            id: 4,
            base: "There is little time left, so we should hurry.",
            baseEs: "Queda poco tiempo, así que deberíamos darnos prisa.",
            goal: "Change the noun to countable equivalent",
            goalEs: "Cambiar el sustantivo a equivalente contable",
            hint: "'Time' is uncountable. What's a countable equivalent that fits the context?",
            options: [
                { text: "There are little minutes left, so we should hurry.", textEs: "Quedan poco minutos, así que deberíamos darnos prisa.", correct: false,
                  errorType: "Quantifier not adjusted",
                  explanation: "'Minutes' is countable plural, but the quantifier 'little' stayed (used for uncountable). We need to change to 'few' for countable plural." },
                { text: "There are a few minutes left, so we should hurry.", textEs: "Quedan algunos minutos, así que deberíamos darnos prisa.", correct: false,
                  errorType: "Nuance changed",
                  explanation: "The original is negative ('little' = not enough). 'A few' is positive (some, enough). To keep the negative meaning with countable, use 'few' (without 'a')." },
                { text: "There are few minutes left, so we should hurry.", textEs: "Quedan pocos minutos, así que deberíamos darnos prisa.", correct: true }
            ],
            ruleFormula: "little + time (uncountable) → few + minutes (countable)",
            correctReason: "When changing from uncountable 'time' to countable 'minutes', the quantifier changes from 'little' to 'few'. The negative nuance stays. Note: 'is' also changes to 'are' for plural."
        },
        {
            id: 5,
            base: "Carlos has a little water in his bottle, just enough for a walk.",
            baseEs: "Carlos tiene un poco de agua en su botella, justo lo suficiente para una caminata.",
            goal: "Change to negative meaning (not enough)",
            goalEs: "Cambiar a significado negativo (no suficiente)",
            hint: "Keep the same noun. Change the quantifier to express that the quantity is NOT enough.",
            options: [
                { text: "Carlos has a few water in his bottle, not enough for a walk.", textEs: "Carlos tiene algunos agua en su botella, no suficiente para una caminata.", correct: false,

    let currentQuestion = 0, score = 0;
    let answered = new Array(quizData.length).fill(false);

    function initQuiz() {
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';
        quizData.forEach((q, i) => {
            q.shuffled = shuffle(q.options);
            container.appendChild(createCard(q, i));
        });
        showQuestion(0);
        updateProgress();
    }

    function createCard(q, index) {
        const card = document.createElement('div');
        card.className = `question-card ${index !== 0 ? 'hidden' : ''}`;
        card.id = `question-${index}`;
        const letters = ['A','B','C'];

        card.innerHTML = `
            <div class="q-header">
                <div class="question-number">${index + 1}</div>
                <span class="q-label">Transform the sentence:</span>
                <span class="topic-badge">⚖️ few/little</span>
            </div>
            <div class="hint-box">
                <div class="hint-label">💡 Hint</div>
                ${q.hint}
            </div>
            <div class="transform-visual">
                <div class="transform-box base">
                    <span class="transform-label">🔶 Original sentence</span>
                    <div class="transform-sentence">${q.base}</div>
                </div>
                <div class="transform-arrow">⬇ Transform to...</div>
                <div class="transform-box goal">
                    <span class="transform-label">🎯 Goal</span>
                    <div class="transform-sentence">${q.goal}</div>
                </div>
            </div>
            <button class="translate-toggle" onclick="toggleTranslation(${index}, this)">🇪🇸 <span>Show Spanish</span></button>
            <div class="translation-block" id="translation-${index}">
                <div><strong>Original:</strong> ${q.baseEs}</div>
                <div style="margin-top:0.3rem;"><strong>Goal:</strong> ${q.goalEs}</div>
                <div style="margin-top:0.3rem;border-top:1px dashed #BBF7D0;padding-top:0.3rem;"><strong>Options:</strong></div>
                ${q.shuffled.map((opt, i) => `<div style="margin-top:0.2rem;">${letters[i]}. ${opt.textEs}</div>`).join('')}
            </div>
            <div class="options-container" id="options-${index}">
                ${q.shuffled.map((opt, i) => `
                    <button class="option-btn" data-idx="${i}" onclick="selectOption(${index}, ${i})">
                        <div class="option-letter">${letters[i]}</div>
                        <div class="option-text">${opt.text}</div>
                    </button>
                `).join('')}
            </div>
            <div class="feedback" id="feedback-${index}"></div>
            <div class="nav-buttons">
                <button class="nav-btn prev" onclick="prevQuestion()" ${index === 0 ? 'disabled' : ''}>← Previous</button>
                <button class="nav-btn next" id="next-${index}" onclick="nextQuestion(${index})" disabled>
                    ${index === quizData.length - 1 ? 'See Results 🎉' : 'Next →'}
                </button>
            </div>
        `;
        return card;
    }

    function toggleTranslation(qi, btn) {
        const tr = document.getElementById(`translation-${qi}`);
        const span = btn.querySelector('span');
        if (tr.classList.contains('show')) {
            tr.classList.remove('show');
            btn.classList.remove('active');
            span.textContent = 'Show Spanish';
        } else {
            tr.classList.add('show');
            btn.classList.add('active');
            span.textContent = 'Hide Spanish';
        }
    }

    function selectOption(qi, optIdx) {
        if (answered[qi]) return;
        answered[qi] = true;
        const q = quizData[qi];
        const selected = q.shuffled[optIdx];
        const isCorrect = selected.correct;
        const correctOpt = q.shuffled.find(o => o.correct);
        const correctIdx = q.shuffled.indexOf(correctOpt);
        if (isCorrect) score++;

        document.querySelectorAll(`#options-${qi} .option-btn`).forEach((btn, i) => {
            btn.classList.add('disabled');
            if (i === correctIdx) btn.classList.add('correct');
            else if (i === optIdx) btn.classList.add('incorrect');
        });

        buildFeedback(qi, selected, isCorrect, correctOpt, q);
        document.getElementById(`next-${qi}`).disabled = false;
        updateProgress();
    }

    function buildFeedback(qi, selected, isCorrect, correctOpt, q) {
        const el = document.getElementById(`feedback-${qi}`);
        el.className = `feedback show ${isCorrect ? 'correct' : 'incorrect'}`;

        const transformFlow = (showWrong) => `
            <div class="transform-flow">
                <div class="tf-step present"><span class="tf-label">Original</span>${q.base}</div>
                <div class="tf-arrow">⬇</div>
                ${showWrong ? `<div class="tf-step past-wrong"><span class="tf-label">Your answer</span>${selected.text}</div><div class="tf-arrow">↕</div>` : ''}
                <div class="tf-step past-correct"><span class="tf-label">Correct</span>${correctOpt.text}</div>
            </div>
        `;

        if (isCorrect) {
            el.innerHTML = `
                <div class="fb-header">
                    <span class="fb-icon">✅</span>
                    <div>
                        <div class="fb-title">Correct transformation!</div>
                        <div class="fb-subtitle">You changed the quantifier correctly</div>
                    </div>
                </div>
                <div class="fb-body">
                    <div class="fb-block fb-transform">
                        <div class="fb-block-title">🔄 Transformation done</div>
                        ${transformFlow(false)}
                    </div>
                    <div class="fb-block fb-rule">
                        <div class="fb-block-title">📐 Pattern</div>
                        <div class="rule-formula">${q.ruleFormula}</div>
                    </div>
                    <div class="fb-block fb-why">
                        <div class="fb-block-title">💡 Why is the transformation correct?</div>
                        <div class="fb-why-text">${q.correctReason}</div>
                    </div>
                </div>
            `;
        } else {
            el.innerHTML = `
                <div class="fb-header">
                    <span class="fb-icon">❌</span>
                    <div>
                        <div class="fb-title">Incorrect transformation</div>
                        <div class="fb-subtitle">Let's review what went wrong</div>
                    </div>
                </div>
                <div class="fb-body">
                    <div class="fb-block fb-transform">
                        <div class="fb-block-title">🔄 Your transformation vs. correct</div>
                        ${transformFlow(true)}
                    </div>
                    <div class="fb-block fb-error">
                        <div class="fb-block-title">⚠️ The error: <span class="error-badge">${selected.errorType}</span></div>
                        <div class="error-text">${selected.explanation}</div>
                    </div>
                    <div class="fb-block fb-rule">
                        <div class="fb-block-title">📐 The correct pattern</div>
                        <div class="rule-formula">${q.ruleFormula}</div>
                    </div>
                    <div class="fb-block fb-why">
                        <div class="fb-block-title">💡 How should the transformation be done?</div>
                        <div class="fb-why-text">${q.correctReason}</div>
                    </div>
                </div>
            `;
        }
    }

    function showQuestion(i) {
        document.querySelectorAll('.question-card').forEach((c, idx) => c.classList.toggle('hidden', idx !== i));
        document.getElementById('currentQ').textContent = i + 1;
        currentQuestion = i;
    }
    function nextQuestion(i) { i < quizData.length - 1 ? showQuestion(i + 1) : showResults(); }
    function prevQuestion() { if (currentQuestion > 0) showQuestion(currentQuestion - 1); }
    function updateProgress() {
        const done = answered.filter(Boolean).length;
        document.getElementById('progressFill').style.width = (done / quizData.length * 100) + '%';
    }
    function showResults() {
        document.querySelectorAll('.question-card').forEach(c => c.classList.add('hidden'));
        document.getElementById('resultsScreen').classList.add('show');
        const pct = score / quizData.length * 100;
        document.getElementById('finalScore').textContent = `${score}/${quizData.length}`;
        let stars = pct >= 90 ? 3 : pct >= 70 ? 2 : 1;
        document.getElementById('resultsMessage').textContent = pct >= 90
            ? 'Excellent! You transform a few/few and a little/little perfectly. 🏆'
            : pct >= 70 ? 'Well done! Keep practicing. 💪'
            : 'Good effort. Review the rules and try again. 📚';
        document.querySelectorAll('.star').forEach((s, i) => {
            if (i < stars) setTimeout(() => s.classList.add('earned'), i * 300);
        });
    }
    document.addEventListener('DOMContentLoaded', initQuiz);
    </script>
