<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grammar Summary — some / any / no | A2 | JUCUM</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Fredoka:wght@400;500;600;700&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
:root{
--bg:#FAFAF6;--card:#fff;--text:#2A2A2A;--text-soft:#777;--border:#E8E5DC;
--shadow:0 3px 16px rgba(0,0,0,.06);--radius:14px;
--lp:#4CAF50;--ld:#1B5E20;--ll:#E8F5E9;--lm:#C8E6C9;
--lg:linear-gradient(135deg,#388E3C,#4CAF50);--lglow:rgba(76,175,80,.15);
--badge-text:#1A3D1C;
--subj:#1565C0;--subj-bg:#E3F2FD;
--verb:#E53935;--verb-bg:#FFEBEE;
--comp:#00897B;--comp-bg:#E0F2F1;
--neg:#AD1457;--neg-bg:#FCE4EC;
--quest:#7B1FA2;--quest-bg:#F3E5F5;
--ok:#2E7D32;--ok-bg:#E8F5E9;
--err:#C62828;--err-bg:#FFEBEE;
--note-bg:#F1F8E9;--note-border:#AED581;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Nunito",sans-serif;background:var(--bg);color:var(--text);line-height:1.7;padding:1.5rem 1rem;-webkit-font-smoothing:antialiased}
.container{max-width:800px;margin:0 auto}
.level-header{text-align:center;padding:2rem;border-radius:20px;color:#fff;position:relative;overflow:hidden;margin-bottom:1.2rem;background:var(--lg)}
.level-header::before{content:"";position:absolute;top:-40%;right:-15%;width:250px;height:250px;background:rgba(255,255,255,.1);border-radius:50%}
.level-header h1{font-family:"Fredoka",sans-serif;font-size:1.8rem;font-weight:600;position:relative;z-index:1}
.level-header .module-name{font-family:"Fredoka",sans-serif;font-size:1.05rem;opacity:.95;position:relative;z-index:1;margin-top:.2rem}
.level-header .subtitle{opacity:.8;font-size:.83rem;position:relative;z-index:1;margin-top:.15rem}
.level-badge{display:inline-flex;align-items:center;gap:6px;font-size:.7rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;background:var(--ll);color:var(--badge-text);padding:4px 12px;border-radius:20px;border:1.5px solid var(--lm);margin-bottom:.8rem}
.step-tabs{display:flex;gap:.35rem;margin-bottom:1rem;flex-wrap:wrap}
.step-tab{padding:.45rem .85rem;border-radius:8px;font-size:.78rem;font-weight:700;cursor:pointer;border:2px solid var(--border);background:var(--card);transition:.2s;font-family:"Nunito",sans-serif}
.step-tab:hover{background:var(--ll)}
.step-tab.active{background:var(--ll);border-color:var(--lp);color:var(--ld)}
.step-tab.done{background:var(--ok-bg);border-color:var(--ok);color:var(--ok)}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.6rem;margin-bottom:1.2rem;box-shadow:var(--shadow);border-top:3.5px solid var(--lp);animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.section-label{display:flex;align-items:center;gap:.5rem;font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--ld);margin-bottom:.3rem;margin-top:1.1rem}
.section-label::before{content:"";width:20px;height:3px;background:var(--lp);border-radius:2px}
.section-label:first-child{margin-top:0}
.section-title{font-family:"Fredoka",sans-serif;font-size:1.25rem;font-weight:600;margin-bottom:.1rem}
.section-desc{font-size:.85rem;color:var(--text-soft);margin-bottom:1rem}
.g-subj{background:var(--subj-bg);color:var(--subj);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--subj)}
.g-verb{background:var(--verb-bg);color:var(--verb);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--verb)}
.g-comp{background:var(--comp-bg);color:var(--comp);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--comp)}
.g-neg{background:var(--neg-bg);color:var(--neg);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--neg)}
.g-quest{background:var(--quest-bg);color:var(--quest);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--quest)}
.g-table{width:100%;border-collapse:separate;border-spacing:0;margin:.8rem 0;border-radius:10px;overflow:hidden;font-size:.83rem;border:1px solid var(--border)}
.g-table th{background:var(--lg);color:#fff;padding:.65rem .6rem;font-size:.7rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
.g-table td{padding:.6rem;border-bottom:1px solid #f0f0f0;vertical-align:middle}
.g-table tr:nth-child(even) td{background:var(--ll)}
.g-table tr:last-child td{border-bottom:none}
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin:.8rem 0}
.compare-card{padding:1rem;border-radius:12px;text-align:center}
.compare-card.esp{background:var(--ll);border:2px solid var(--lm)}
.compare-card.eng{background:var(--subj-bg);border:2px solid #90CAF9}
.compare-card h4{font-family:"Fredoka",sans-serif;font-size:.85rem;margin-bottom:.5rem}
.compare-card.esp h4{color:var(--ld)}
.compare-card.eng h4{color:var(--subj)}
.compare-card ul{list-style:none;font-size:.82rem;color:var(--text-soft)}
.compare-card li{padding:3px 0}
.formula-box{background:var(--note-bg);border:2px solid var(--note-border);border-radius:12px;padding:1rem;margin:.8rem 0;text-align:center;font-family:"Fredoka",sans-serif;font-size:.93rem;color:var(--ld);line-height:2.1}
.tip-card{background:var(--ll);border-radius:10px;padding:.8rem 1rem;margin:.5rem 0;font-size:.83rem;border-left:3px solid var(--lp)}
.tip-card strong{color:var(--ld)}
.alert-card{background:var(--err-bg);border:2px solid #EF5350;border-radius:10px;padding:.8rem 1rem;margin:.8rem 0}
.alert-card .atitle{font-family:"Fredoka",sans-serif;color:var(--err);font-size:.82rem;margin-bottom:.3rem;font-weight:700}
.alert-card p{font-size:.82rem;color:#555;line-height:1.7}
.ex-row{display:flex;align-items:flex-start;gap:.6rem;padding:.6rem .8rem;border-radius:10px;margin:.4rem 0;font-size:.88rem}
.ex-row .icon{font-size:1.2rem;flex-shrink:0;margin-top:2px}
.ex-row .en{font-weight:700;color:var(--text)}
.ex-row .es{font-family:"Lora",serif;font-style:italic;font-size:.82rem;color:var(--text-soft);margin-top:1px}
.ex-right{border-left:3px solid var(--ok);background:var(--ok-bg)}
.ex-wrong{border-left:3px solid var(--err);background:var(--err-bg)}

/* CONTEXT PILLS */
.context-pills{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.6rem;margin:1rem 0}
.cp-item{display:flex;align-items:center;gap:.6rem;padding:.7rem .9rem;border-radius:12px;font-size:.83rem}
.cp-pos{background:var(--ok-bg);border:2px solid #A5D6A7}
.cp-q{background:var(--quest-bg);border:2px solid #CE93D8}
.cp-neg{background:var(--err-bg);border:2px solid #EF9A9A}
.cp-icon{font-size:1.3rem;flex-shrink:0}
.cp-label{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--text-soft)}
.cp-word{font-family:"Fredoka",sans-serif;font-size:1.05rem;font-weight:600}
.cp-pos .cp-word{color:var(--ok)}
.cp-q .cp-word{color:var(--quest)}
.cp-neg .cp-word{color:var(--err)}
/* EXCEPTION GRID */
.exception-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-top:.7rem}
.exc-item{background:#fff3e0;border:1.5px solid #FFCC80;border-radius:10px;padding:.7rem}
.exc-type{font-family:"Fredoka",sans-serif;font-size:.78rem;font-weight:600;color:#E65100;margin-bottom:.3rem}
.exc-ex{font-size:.8rem;font-weight:700;color:var(--text);margin-bottom:.2rem}
.exc-es{font-family:"Lora",serif;font-style:italic;font-size:.75rem;color:var(--text-soft)}
/* NO VS NOT ANY */
.no-vs-notany{display:flex;flex-direction:column;gap:.5rem;margin:.8rem 0}
.nva-row{display:grid;grid-template-columns:1fr auto 1fr;gap:.5rem;align-items:center;background:#F8F8F8;border-radius:10px;padding:.6rem .8rem;font-size:.82rem;border:1px solid var(--border)}
.nva-a{font-weight:700;color:var(--err)}
.nva-eq{font-family:"Fredoka",sans-serif;font-size:1rem;color:var(--text-soft);text-align:center;padding:0 .4rem}
.nva-b{color:var(--ok);font-weight:600}
/* SAN MAP */
.san-map{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.6rem;margin:1rem 0}
.san-col{border-radius:12px;overflow:hidden;border:2px solid var(--border)}
.san-header{padding:.55rem .7rem;font-family:"Fredoka",sans-serif;font-size:.82rem;font-weight:600;text-align:center}
.san-s{background:var(--ok-bg);color:var(--ok);border-bottom:2px solid #A5D6A7}
.san-a{background:var(--quest-bg);color:var(--quest);border-bottom:2px solid #CE93D8}
.san-n{background:var(--err-bg);color:var(--err);border-bottom:2px solid #EF9A9A}
.san-item{padding:.4rem .7rem;font-size:.77rem;color:var(--text-soft);border-top:1px solid #f0f0f0}
.san-item:nth-child(even){background:#fafafa}
.san-both{font-style:italic;font-size:.72rem;color:var(--lp);font-weight:700;background:var(--ll) !important;border-top:1px dashed var(--lm)}
@media(max-width:600px){
.context-pills,.exception-grid,.san-map{grid-template-columns:1fr}
.nva-row{grid-template-columns:1fr;text-align:center}
.nva-eq{padding:.2rem 0}
}

.ex-section{margin-top:1.2rem;padding-top:1rem;border-top:2px dashed var(--lm)}
.ex-section h3{font-family:"Fredoka",sans-serif;color:var(--ld);font-size:.9rem;margin-bottom:.8rem}
.exercise{background:#fafafa;border-radius:12px;padding:1rem;margin-bottom:.7rem;border:2px solid #eee;transition:.2s}
.exercise.correct{border-color:var(--ok);background:var(--ok-bg)}
.exercise.incorrect{border-color:var(--err);background:var(--err-bg)}
.exercise-q{font-size:.88rem;margin-bottom:.7rem;line-height:1.4}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:.4rem}
.opt-btn{padding:.65rem .5rem;border:2px solid #e0e0e0;border-radius:10px;background:var(--card);color:var(--text-soft);font-size:.83rem;font-weight:600;cursor:pointer;transition:.15s;font-family:"Nunito",sans-serif;text-align:left}
.opt-btn:hover:not(:disabled){border-color:var(--lp);background:var(--ll)}
.opt-btn:disabled{cursor:not-allowed;opacity:.7}
.opt-btn.sel-ok{background:var(--ok);color:#fff;border-color:var(--ok)}
.opt-btn.sel-bad{background:var(--err);color:#fff;border-color:var(--err)}
.opt-btn.show-ok{background:var(--ok);color:#fff;border-color:var(--ok)}
.fb{margin-top:.7rem;padding:0;border-radius:12px;font-size:.82rem;display:none;line-height:1.6;overflow:hidden}
.fb.show{display:block;animation:fbSlide .35s ease}
@keyframes fbSlide{from{opacity:0;max-height:0;transform:translateY(-8px)}to{opacity:1;max-height:600px;transform:translateY(0)}}
.fb-header{display:flex;align-items:center;gap:.5rem;padding:.7rem 1rem;font-family:"Fredoka",sans-serif;font-size:.85rem;font-weight:600}
.fb.fb-ok .fb-header{background:#C8E6C9;color:var(--ok)}
.fb.fb-bad .fb-header{background:#FFCDD2;color:var(--err)}
.fb-icon{font-size:1.2rem}
.fb-body{padding:.8rem 1rem}
.fb.fb-ok .fb-body{background:var(--ok-bg)}
.fb.fb-bad .fb-body{background:var(--err-bg)}
.fb-row{display:flex;align-items:flex-start;gap:.5rem;margin-bottom:.4rem}
.fb-row:last-child{margin-bottom:0}
.fb-dot{font-size:.9rem;flex-shrink:0;margin-top:1px}
.fb-text{flex:1}
.fb-correct-answer{color:var(--ok);font-weight:700}
.fb-wrong-reason{color:var(--err);font-weight:600}
.fb-example{display:inline-flex;align-items:center;gap:.3rem;margin-top:.4rem;padding:4px 10px;border-radius:6px;font-size:.78rem;font-weight:700}
.fb.fb-ok .fb-example{background:#A5D6A7;color:#1B5E20}
.fb.fb-bad .fb-example{background:#EF9A9A;color:#B71C1C}
.fb-tip{margin-top:.5rem;padding:.5rem .7rem;border-radius:8px;background:var(--note-bg);border:1px solid var(--note-border);font-size:.76rem;color:#33691E}
.fb-tip strong{color:var(--ld)}
.score-bar{text-align:center;padding:.8rem;background:var(--ll);border-radius:10px;margin-top:.8rem;border:1px solid var(--lm)}
.score-bar .num{font-family:"Fredoka",sans-serif;font-size:1.4rem;color:var(--ld)}
.score-bar .lbl{font-size:.7rem;color:var(--lp);font-weight:700;text-transform:uppercase;letter-spacing:1px}
.summary-final{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.6rem;margin-top:1rem;box-shadow:var(--shadow);border-top:3.5px solid var(--ok);display:none}
.summary-final.show{display:block;animation:fadeIn .4s ease}
.summary-final h3{font-family:"Fredoka",sans-serif;color:var(--ok);margin-bottom:.8rem;font-size:1.1rem}
.summary-final ul{list-style:none}
.summary-final li{padding:5px 0 5px 22px;position:relative;font-size:.84rem;color:var(--text-soft);border-bottom:1px solid var(--lm)}
.summary-final li:last-child{border-bottom:none}
.summary-final li:before{content:"&#10003;";position:absolute;left:0;color:var(--lp);font-weight:700}
@media(max-width:600px){
.level-header h1{font-size:1.4rem}
.compare-grid{grid-template-columns:1fr}
.card{padding:1.2rem}
.opts{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="container">
<div class="level-header">
  <div class="level-badge">&#x1F49A; A2 &middot; Grammar Summary</div>
  <h1>&#x1F4DD; Grammar Summary</h1>
  <div class="module-name">&#x1F6CE;&#xFE0F; Services, Support &amp; Problem Solving</div>
  <p class="subtitle">Quantifiers: some / any / no &middot; 5 steps &times; 5 exercises</p>
</div>
<div class="step-tabs" id="stepTabs"></div>
<div id="cardArea"></div>
<div class="summary-final" id="summaryFinal">
  <h3>&#x1F393; Key Points &mdash; some / any / no</h3>
  <ul id="summaryList"></ul>
</div>
</div>
<script>
var STEPS = [{"icon": "\ud83c\uddea\ud83c\uddf8", "title": "Repaso en Espa\u00f1ol", "html": "<div class=\"section-label\">Paso 1</div>\n<div class=\"section-title\">Paso 1: \ud83c\uddea\ud83c\uddf8 Repaso en Espa\u00f1ol</div>\n<div class=\"section-desc\">En espa\u00f1ol usamos \"algo / alg\u00fan / ning\u00fan\" seg\u00fan el contexto. En ingl\u00e9s hay un sistema paralelo con some, any y no.</div>\n<div class=\"compare-grid\">\n  <div class=\"compare-card esp\">\n    <h4>\ud83c\uddea\ud83c\uddf8 Espa\u00f1ol</h4>\n    <ul>\n      <li>Tengo <b>algunas</b> quejas.</li>\n      <li>\u00bfTienes <b>alguna</b> informaci\u00f3n?</li>\n      <li>No tengo <b>ninguna</b> queja.</li>\n      <li>\u00bfQuieres <b>algo</b> de ayuda?</li>\n    </ul>\n  </div>\n  <div class=\"compare-card eng\">\n    <h4>\ud83c\uddec\ud83c\udde7 English</h4>\n    <ul>\n      <li>I have <b>some</b> complaints.</li>\n      <li>Do you have <b>any</b> information?</li>\n      <li>I have <b>no</b> complaint.</li>\n      <li>Would you like <b>some</b> help?</li>\n    </ul>\n  </div>\n</div>\n<div class=\"tip-card\"><strong>\ud83d\udca1 Idea clave:</strong> En espa\u00f1ol el cuantificador cambia de forma seg\u00fan el contexto (algo/alg\u00fan/ning\u00fan/ninguna...). En ingl\u00e9s son palabras fijas: <b>some / any / no</b> \u2014 pero cambian seg\u00fan el tipo de oraci\u00f3n.</div>\n<div class=\"context-pills\">\n  <div class=\"cp-item cp-pos\"><span class=\"cp-icon\">\u2705</span><div><div class=\"cp-label\">Afirmativo</div><div class=\"cp-word\">some</div></div></div>\n  <div class=\"cp-item cp-q\"><span class=\"cp-icon\">\u2753</span><div><div class=\"cp-label\">Pregunta</div><div class=\"cp-word\">any</div></div></div>\n  <div class=\"cp-item cp-neg\"><span class=\"cp-icon\">\u274c</span><div><div class=\"cp-label\">Negaci\u00f3n</div><div class=\"cp-word\">any / no</div></div></div>\n</div>\n<div class=\"ex-row\"><div class=\"icon\">\ud83d\udccb</div><div><div class=\"en\">I have <b>some</b> complaints about the service.</div><div class=\"es\">Tengo algunas quejas sobre el servicio. (afirmativo \u2192 some)</div></div></div>\n<div class=\"ex-row\"><div class=\"icon\">\u2753</div><div><div class=\"en\">Do you have <b>any</b> feedback from the customer?</div><div class=\"es\">\u00bfTienes alg\u00fan feedback del cliente? (pregunta \u2192 any)</div></div></div>\n<div class=\"ex-row\"><div class=\"icon\">\ud83d\udeab</div><div><div class=\"en\">There is <b>no</b> information available yet.</div><div class=\"es\">No hay ninguna informaci\u00f3n disponible a\u00fan. (negaci\u00f3n \u2192 no)</div></div></div>"}, {"icon": "\ud83e\udd1d", "title": "Similitudes", "html": "<div class=\"section-label\">Paso 2</div>\n<div class=\"section-title\">Paso 2: \ud83e\udd1d Similitudes ESP \u2194 ENG</div>\n<div class=\"section-desc\">Both languages change the quantifier depending on the sentence type \u2014 the logic is the same.</div>\n<table class=\"g-table\">\n  <tr><th>Contexto</th><th>\ud83c\uddea\ud83c\uddf8 Espa\u00f1ol</th><th>\ud83c\uddec\ud83c\udde7 English</th></tr>\n  <tr><td>Afirmativo</td><td>tengo <b>algunas</b> formas</td><td>I have <span class=\"g-comp\">some</span> forms</td></tr>\n  <tr><td>Pregunta</td><td>\u00bftienes <b>alg\u00fan</b> problema?</td><td>Do you have <span class=\"g-quest\">any</span> problems?</td></tr>\n  <tr><td>Negaci\u00f3n (no + verbo)</td><td>no tengo <b>ning\u00fan</b> problema</td><td>I don't have <span class=\"g-quest\">any</span> problems</td></tr>\n  <tr><td>Negaci\u00f3n directa</td><td><b>ning\u00fan</b> problema</td><td><span class=\"g-neg\">no</span> problems</td></tr>\n  <tr><td>Oferta / petici\u00f3n</td><td>\u00bfquieres <b>algo</b> de ayuda?</td><td>Would you like <span class=\"g-comp\">some</span> help?</td></tr>\n</table>\n<div class=\"section-label\">Los tres cuantificadores \u2014 con ambos tipos de sustantivo</div>\n<table class=\"g-table\">\n  <tr><th>Cuantificador</th><th>+ Contable (plural)</th><th>+ Incontable</th></tr>\n  <tr><td><span class=\"g-comp\">some</span></td><td>some <b>complaints</b></td><td>some <b>information</b></td></tr>\n  <tr><td><span class=\"g-quest\">any</span></td><td>any <b>forms</b></td><td>any <b>advice</b></td></tr>\n  <tr><td><span class=\"g-neg\">no</span></td><td>no <b>appointments</b></td><td>no <b>support</b></td></tr>\n</table>\n<div class=\"tip-card\"><strong>\ud83d\udca1 Ventaja:</strong> Some, any y no funcionan con <b>AMBOS</b> tipos de sustantivo (contable e incontable). \u00a1Sin excepci\u00f3n!</div>"}, {"icon": "\u26a1", "title": "Diferencias", "html": "<div class=\"section-label\">Paso 3</div>\n<div class=\"section-title\">Paso 3: \u26a1 Diferencias Importantes</div>\n<table class=\"g-table\">\n  <tr><th>\ud83c\uddea\ud83c\uddf8 Espa\u00f1ol</th><th>\ud83c\uddec\ud83c\udde7 Ingl\u00e9s</th><th>\ud83d\udca1 Explicaci\u00f3n</th></tr>\n  <tr><td>Quiero algo de ayuda.</td><td>I'd like <span class=\"g-comp\">some</span> help. <em>(oferta)</em></td><td>some en preguntas de oferta/petici\u00f3n</td></tr>\n  <tr><td>\u00bfHay alg\u00fan problema?</td><td>Is there <span class=\"g-quest\">any</span> problem?</td><td>any en preguntas neutras</td></tr>\n  <tr><td>No tengo ning\u00fan tiempo.</td><td>I have <span class=\"g-neg\">no</span> time. / I don't have <span class=\"g-quest\">any</span> time.</td><td>no = not...any (m\u00e1s formal)</td></tr>\n  <tr><td>Cualquier agente puede ayudar.</td><td><span class=\"g-quest\">Any</span> agent can help.</td><td>any en afirmativo = cualquiera</td></tr>\n  <tr><td>Tengo alg\u00fan consejo.</td><td>I have <span class=\"g-comp\">some</span> advice.</td><td>some sin \"un\": NOT some an advice</td></tr>\n</table>\n<div class=\"alert-card\">\n  <div class=\"atitle\">\u26a0\ufe0f some en preguntas \u2014 la excepci\u00f3n importante</div>\n  <p>Normalmente las preguntas usan <b>any</b>. Pero usamos <b>some</b> cuando:</p>\n  <div class=\"exception-grid\">\n    <div class=\"exc-item\">\n      <div class=\"exc-type\">\ud83c\udf81 Oferta</div>\n      <div class=\"exc-ex\">Would you like <b>some</b> assistance?</div>\n      <div class=\"exc-es\">\u00bfLe gustar\u00eda recibir ayuda? (esperamos que diga s\u00ed)</div>\n    </div>\n    <div class=\"exc-item\">\n      <div class=\"exc-type\">\ud83d\ude4f Petici\u00f3n cort\u00e9s</div>\n      <div class=\"exc-ex\">Can I have <b>some</b> information about the service?</div>\n      <div class=\"exc-es\">\u00bfMe puede dar informaci\u00f3n? (esperamos que diga s\u00ed)</div>\n    </div>\n  </div>\n</div>\n<div class=\"section-label\">No vs Not any \u2014 dos formas de lo mismo</div>\n<div class=\"no-vs-notany\">\n  <div class=\"nva-row\">\n    <div class=\"nva-a\">There is <span class=\"g-neg\">no</span> information.</div>\n    <div class=\"nva-eq\">=</div>\n    <div class=\"nva-b\">There <span class=\"g-neg\">isn't</span> <span class=\"g-quest\">any</span> information.</div>\n  </div>\n  <div class=\"nva-row\">\n    <div class=\"nva-a\">We have <span class=\"g-neg\">no</span> complaints.</div>\n    <div class=\"nva-eq\">=</div>\n    <div class=\"nva-b\">We <span class=\"g-neg\">don't</span> have <span class=\"g-quest\">any</span> complaints.</div>\n  </div>\n  <div class=\"nva-row\">\n    <div class=\"nva-a\"><span class=\"g-neg\">No</span> agent is available.</div>\n    <div class=\"nva-eq\">=</div>\n    <div class=\"nva-b\"><span class=\"g-neg\">None</span> of the agents is available.</div>\n  </div>\n</div>\n<div class=\"ex-row ex-wrong\"><div class=\"icon\">\u274c</div><div><div class=\"en\">I don't have no time. <em>(doble negaci\u00f3n)</em></div><div class=\"es\">Error: no se puede combinar don't con no</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\u2705</div><div><div class=\"en\">I <span class=\"g-neg\">don't</span> have <span class=\"g-quest\">any</span> time. / I have <span class=\"g-neg\">no</span> time.</div><div class=\"es\">No tengo tiempo. (una sola forma negativa)</div></div></div>"}, {"icon": "\ud83d\udca1", "title": "Consejos", "html": "<div class=\"section-label\">Paso 4</div>\n<div class=\"section-title\">Paso 4: \ud83d\udca1 Consejos Pr\u00e1cticos</div>\n<div class=\"tip-card\"><strong>Tip 1 \u2014 La regla base:</strong> Afirmativo \u2192 <b>some</b> \u00b7 Pregunta \u2192 <b>any</b> \u00b7 Negaci\u00f3n \u2192 <b>no</b> o <b>not...any</b>. Esta regla funciona el 90% de las veces.</div>\n<div class=\"tip-card\"><strong>Tip 2 \u2014 Some en preguntas:</strong> Si ofreces algo o pides algo con esperanza de \"s\u00ed\" \u2192 usa <b>some</b>. \"Would you like some help?\" (esperas que acepten). \"Do you have any complaints?\" (pregunta neutra, puede ser s\u00ed o no).</div>\n<div class=\"tip-card\"><strong>Tip 3 \u2014 No vs Not any:</strong> Ambas son correctas. <b>No</b> + sustantivo es m\u00e1s directo/formal. <b>Don't/doesn't/isn't + any</b> es m\u00e1s conversacional. En atenci\u00f3n al cliente: \"There is no record of your complaint.\" (formal) / \"I can't find any record.\" (conversacional).</div>\n<div class=\"tip-card\"><strong>Tip 4 \u2014 Any en afirmativo = cualquiera:</strong> \"Any agent can help you\" \u2260 \"Some agent can help you\". Any = no importa cu\u00e1l, todos sirven. Some = hay uno/s espec\u00edficos que pueden ayudar.</div>\n<div class=\"section-label\">Mapa visual: some / any / no</div>\n<div class=\"san-map\">\n  <div class=\"san-col\">\n    <div class=\"san-header san-s\">SOME \u2705</div>\n    <div class=\"san-item\">Afirmativo: I have <b>some</b> forms</div>\n    <div class=\"san-item\">Oferta: Would you like <b>some</b> help?</div>\n    <div class=\"san-item\">Petici\u00f3n: Can I have <b>some</b> advice?</div>\n    <div class=\"san-item san-both\">\u2192 ambos tipos de sustantivo</div>\n  </div>\n  <div class=\"san-col\">\n    <div class=\"san-header san-a\">ANY \u2753/\u274c</div>\n    <div class=\"san-item\">Pregunta: Is there <b>any</b> feedback?</div>\n    <div class=\"san-item\">Negaci\u00f3n: I don't have <b>any</b> time</div>\n    <div class=\"san-item\">Afirm. (= cualquiera): <b>Any</b> agent can help</div>\n    <div class=\"san-item san-both\">\u2192 ambos tipos de sustantivo</div>\n  </div>\n  <div class=\"san-col\">\n    <div class=\"san-header san-n\">NO \ud83d\udeab</div>\n    <div class=\"san-item\">= not...any (m\u00e1s directo)</div>\n    <div class=\"san-item\">There is <b>no</b> information</div>\n    <div class=\"san-item\">We have <b>no</b> record of this</div>\n    <div class=\"san-item san-both\">\u2192 ambos tipos de sustantivo</div>\n  </div>\n</div>"}, {"icon": "\u2728", "title": "Pr\u00e1ctica Final", "html": "<div class=\"section-label\">Paso 5</div>\n<div class=\"section-title\">Paso 5: \u2728 Pr\u00e1ctica Final</div>\n<div class=\"formula-box\">\n  \u2705 <span class=\"g-comp\">some</span> + noun \u2192 afirmativo / oferta / petici\u00f3n<br>\n  \u2753 <span class=\"g-quest\">any</span> + noun \u2192 pregunta / negaci\u00f3n / cualquiera<br>\n  \ud83d\udeab <span class=\"g-neg\">no</span> + noun = not + <span class=\"g-quest\">any</span> + noun \u2192 negaci\u00f3n directa\n</div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\ud83d\udccb</div><div><div class=\"en\">I'd like to file <span class=\"g-comp\">some</span> <span class=\"g-comp\">complaints</span> about the billing.</div><div class=\"es\">Me gustar\u00eda presentar algunas quejas sobre la facturaci\u00f3n.</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\u2753</div><div><div class=\"en\">Is there <span class=\"g-quest\">any</span> <span class=\"g-comp\">support</span> available on weekends?</div><div class=\"es\">\u00bfHay alg\u00fan soporte disponible los fines de semana?</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\ud83c\udf81</div><div><div class=\"en\">Would you like <span class=\"g-comp\">some</span> <span class=\"g-comp\">assistance</span> with the form?</div><div class=\"es\">\u00bfLe gustar\u00eda ayuda con el formulario? (oferta \u2192 some)</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\ud83d\udeab</div><div><div class=\"en\">There is <span class=\"g-neg\">no</span> <span class=\"g-comp\">record</span> of your appointment in the system.</div><div class=\"es\">No hay ning\u00fan registro de su cita en el sistema.</div></div></div>\n<div class=\"ex-row ex-wrong\"><div class=\"icon\">\u274c</div><div><div class=\"en\">I don't have no information about this case.</div><div class=\"es\">Error: doble negaci\u00f3n \u2014 usar solo una forma negativa</div></div></div>\n<div class=\"alert-card\">\n  <div class=\"atitle\">\u26a0\ufe0f 3 Errores Comunes</div>\n  <p>\u274c \"I don't have <b>no</b> time\" \u2192 \u2705 \"I don't have <b>any</b> time\" / \"I have <b>no</b> time\"<br>\n  \u274c \"Do you have <b>some</b> complaints?\" (pregunta neutra) \u2192 \u2705 \"Do you have <b>any</b> complaints?\"<br>\n  \u274c \"There aren't <b>no</b> appointments\" \u2192 \u2705 \"There <b>aren't any</b> appointments\" / \"There are <b>no</b> appointments\"</p>\n</div>"}];
var EXERCISES = [[{"q": "\"Tengo algunas quejas.\" \u2192 en ingl\u00e9s:", "a": "a", "o": ["I have some complaints.", "I have any complaints."], "fc": "Oraci\u00f3n afirmativa \u2192 some. Some complaints = algunas quejas.", "fi": "Any se usa en preguntas y negaciones, no en afirmativo.", "ex": "I have some complaints about the service.", "tip": "Afirmativo \u2192 some"}, {"q": "\"\u00bfTienes alguna informaci\u00f3n?\" \u2192 en ingl\u00e9s:", "a": "b", "o": ["Do you have some information?", "Do you have any information?"], "fc": "Pregunta neutra \u2192 any. Do you have any information?", "fi": "Some en preguntas solo para ofertas/peticiones corteses.", "ex": "Do you have any information about my case?", "tip": "Pregunta neutra \u2192 any"}, {"q": "\"No hay ning\u00fan registro.\" \u2192 en ingl\u00e9s:", "a": "a", "o": ["There is no record.", "There is any record."], "fc": "Negaci\u00f3n directa \u2192 no + sustantivo. There is no record.", "fi": "Any en afirmativo sin negaci\u00f3n no expresa ausencia.", "ex": "There is no record of your complaint.", "tip": "Negaci\u00f3n directa \u2192 no + noun"}, {"q": "\"\u00bfLe gustar\u00eda algo de ayuda?\" \u2192 en ingl\u00e9s:", "a": "b", "o": ["Would you like any help?", "Would you like some help?"], "fc": "Oferta \u2192 some. Esperamos que acepte \u2192 some help.", "fi": "Any en pregunta es neutro. Para ofertas corteses usamos some.", "ex": "Would you like some assistance with the form?", "tip": "Oferta / petici\u00f3n \u2192 some (en preguntas)"}, {"q": "\u00bfCu\u00e1l es la funci\u00f3n de 'no' en ingl\u00e9s?", "a": "b", "o": ["Solo para preguntas", "Equivale a not + any (negaci\u00f3n directa)"], "fc": "No + sustantivo = not...any. 'There is no time' = 'There isn't any time'.", "fi": "No no se usa en preguntas. Para preguntas: any.", "ex": "There is no support. = There isn't any support.", "tip": "no + noun = not + any + noun"}], [{"q": "\"some\" funciona con...", "a": "b", "o": ["Solo sustantivos contables", "Contables e incontables"], "fc": "Some funciona con ambos: some complaints (contable) / some advice (incontable).", "fi": "Some no tiene restricci\u00f3n de tipo de sustantivo.", "ex": "some forms (contable) / some information (incontable)", "tip": "some/any/no \u2192 funciona con ambos tipos"}, {"q": "\"any\" se usa principalmente en...", "a": "a", "o": ["Preguntas y negaciones", "Solo negaciones"], "fc": "Any aparece en preguntas (\u00bfhay alg\u00fan...?) y negaciones (no hay ning\u00fan...).", "fi": "Any tambi\u00e9n aparece en negaciones, no solo en preguntas.", "ex": "Do you have any forms? / I don't have any time.", "tip": "any \u2192 pregunta + negaci\u00f3n"}, {"q": "We have ___ appointments available. (ninguna)", "a": "b", "o": ["any", "no"], "fc": "Oraci\u00f3n afirmativa con significado negativo \u2192 no. We have no appointments.", "fi": "Any en oraci\u00f3n afirmativa significar\u00eda 'cualquier'. We have any appointments no tiene sentido aqu\u00ed.", "ex": "We have no appointments available today.", "tip": "no + noun \u2192 negaci\u00f3n directa en oraci\u00f3n afirmativa"}, {"q": "\"some\" / \"any\" / \"no\" \u2192 \u00bfcu\u00e1l va directamente antes del sustantivo?", "a": "a", "o": ["Los tres: some help, any help, no help", "Solo some: some help"], "fc": "Los tres preceden directamente al sustantivo sin art\u00edculo: some help, any help, no help.", "fi": "Los tres funcionan igual en su posici\u00f3n gramatical.", "ex": "some time / any time / no time \u2192 todos correctos", "tip": "some/any/no + noun (sin art\u00edculo 'a/an/the')"}, {"q": "There ___ information about your case in our system.", "a": "b", "o": ["aren't any", "is no"], "fc": "Information es incontable \u2192 verbo singular. There is no information.", "fi": "Aren't any implica plural. Information es incontable \u2192 singular.", "ex": "There is no information. / There isn't any information.", "tip": "Incontable \u2192 is no / isn't any (singular)"}], [{"q": "\"Would you like ___ assistance?\" \u2014 \u00bfsome o any?", "a": "a", "o": ["some (oferta)", "any (pregunta neutra)"], "fc": "Oferta cort\u00e9s \u2192 some. Esperamos que el cliente acepte la ayuda.", "fi": "Any en pregunta es neutro, sin implicar que esperamos un s\u00ed.", "ex": "Would you like some help? / Can I get you some information?", "tip": "Oferta \u2192 some \u00b7 Pregunta neutra \u2192 any"}, {"q": "\"___ agent can help you with this.\" (cualquiera)", "a": "b", "o": ["Some", "Any"], "fc": "Any en afirmativo = cualquiera. Any agent = no importa cu\u00e1l, todos pueden.", "fi": "Some agent = hay uno/s espec\u00edficos. Any agent = cualquiera sirve.", "ex": "Any member of staff can help you. (cualquiera)", "tip": "any + afirmativo = cualquiera / no importa cu\u00e1l"}, {"q": "Elige la forma correcta: \"I ___ complaints.\"", "a": "b", "o": ["don't have no", "don't have any"], "fc": "Don't have any \u2192 correcto. No usar dos negaciones juntas en ingl\u00e9s.", "fi": "Don't have no es doble negaci\u00f3n \u2014 gramaticalmente incorrecto en ingl\u00e9s est\u00e1ndar.", "ex": "I don't have any complaints. / I have no complaints.", "tip": "Una sola negaci\u00f3n: don't + any OR have + no"}, {"q": "\"There ___ support available on weekends.\" (no hay)", "a": "a", "o": ["is no", "is any"], "fc": "There is no support = no hay soporte. Negaci\u00f3n directa con no.", "fi": "Is any en afirmativo no expresa negaci\u00f3n.", "ex": "There is no support available. = There isn't any support available.", "tip": "no + noun = not + any + noun"}, {"q": "\"Can I have ___ advice about this situation?\" (petici\u00f3n cort\u00e9s)", "a": "b", "o": ["any", "some"], "fc": "Petici\u00f3n cort\u00e9s \u2192 some. Esperamos que nos den el consejo.", "fi": "Any en petici\u00f3n sonar\u00e1 m\u00e1s brusco o neutro.", "ex": "Can I have some information? / Could I get some advice?", "tip": "Petici\u00f3n cort\u00e9s \u2192 some"}], [{"q": "Formal vs conversacional: \u00bfCu\u00e1l suena m\u00e1s formal?", "a": "a", "o": ["There is no record of your complaint.", "There isn't any record of your complaint."], "fc": "No + sustantivo es m\u00e1s directo y formal. Preferido en comunicaci\u00f3n escrita y profesional.", "fi": "Don't/isn't + any es igualmente correcto pero m\u00e1s conversacional.", "ex": "Formal: There is no record. / Conversacional: There isn't any record.", "tip": "no + noun = m\u00e1s formal \u00b7 isn't/don't + any = m\u00e1s conversacional"}, {"q": "\"Do you have ___ questions before we proceed?\"", "a": "b", "o": ["some", "any"], "fc": "Pregunta neutra \u2192 any. No sabemos si tendr\u00e1n preguntas.", "fi": "Some en pregunta implicar\u00eda que esperamos que s\u00ed tengan preguntas.", "ex": "Do you have any questions? / Is there anything else?", "tip": "Pregunta neutra (no sabes la respuesta) \u2192 any"}, {"q": "\"We have ___ staff available today.\" (ning\u00fan empleado)", "a": "a", "o": ["no", "some"], "fc": "Negaci\u00f3n directa con sustantivo \u2192 no. We have no staff available.", "fi": "Some indica existencia positiva. No indica ausencia.", "ex": "We have no staff available. / We don't have any staff available.", "tip": "Ausencia total \u2192 no + noun"}, {"q": "\"___ form will work for this purpose.\" (cualquier formulario)", "a": "b", "o": ["Some", "Any"], "fc": "Any en afirmativo = cualquiera. Any form = no importa cu\u00e1l sirve.", "fi": "Some form = hay un formulario espec\u00edfico que sirve.", "ex": "Any form of ID will be accepted. (cualquier documento)", "tip": "Cualquiera / no importa cu\u00e1l \u2192 any en afirmativo"}, {"q": "\"I'd like to make ___ changes to my appointment.\" (petici\u00f3n)", "a": "a", "o": ["some", "any"], "fc": "Petici\u00f3n cort\u00e9s \u2192 some. El cliente espera hacer los cambios.", "fi": "Any ser\u00eda m\u00e1s neutro o indiferente. Some expresa la intenci\u00f3n positiva.", "ex": "I'd like to make some changes. / Could I have some more time?", "tip": "Petici\u00f3n con expectativa positiva \u2192 some"}], [{"q": "\"Is there ___ information about the delay?\"", "a": "b", "o": ["some", "any"], "fc": "Pregunta neutra \u2192 any. No sabemos si hay informaci\u00f3n.", "fi": "Some en pregunta implicar\u00eda que esperamos que haya informaci\u00f3n.", "ex": "Is there any information about the delay?", "tip": "Pregunta neutra \u2192 any"}, {"q": "\"There ___ record of your previous complaint.\" (no hay)", "a": "a", "o": ["is no", "has any"], "fc": "Negaci\u00f3n directa \u2192 is no. There is no record.", "fi": "Has any no es la estructura correcta aqu\u00ed.", "ex": "There is no record. = There isn't any record.", "tip": "no + noun \u2192 negaci\u00f3n directa"}, {"q": "\"Would you like ___ more information about our services?\"", "a": "a", "o": ["some", "any"], "fc": "Oferta \u2192 some. El agente ofrece informaci\u00f3n esperando que el cliente diga s\u00ed.", "fi": "Any ser\u00eda una pregunta m\u00e1s neutra, menos cort\u00e9s para una oferta.", "ex": "Would you like some more details? / Can I offer you some assistance?", "tip": "Oferta amable \u2192 some"}, {"q": "\"I don't have ___ record of that transaction.\"", "a": "b", "o": ["no", "any"], "fc": "Con don't/doesn't \u2192 any. Don't have any record es correcto.", "fi": "Don't have no es doble negaci\u00f3n \u2014 incorrecto en ingl\u00e9s est\u00e1ndar.", "ex": "I don't have any record. / I have no record.", "tip": "don't/doesn't + any (no doble negaci\u00f3n)"}, {"q": "\"___ of the agents can assist you right now.\" (cualquiera)", "a": "a", "o": ["Any", "Some"], "fc": "Any en afirmativo = cualquiera. Any of the agents = no importa cu\u00e1l.", "fi": "Some of the agents = agentes espec\u00edficos pueden ayudar.", "ex": "Any of our agents can help you. / Any member of the team is qualified.", "tip": "any of + plural noun = cualquiera de"}]];
var SUMMARY = ["<b>some</b> \u2192 afirmativo (+ y contables/incontables): I have some forms / some information", "<b>any</b> \u2192 preguntas y negaciones: Do you have any complaints? / I don't have any time", "<b>no</b> = not any \u2192 forma directa negativa: There is no information (= There isn't any information)", "<b>some</b> en preguntas \u2192 oferta o petici\u00f3n cort\u00e9s: Would you like some help? / Can I have some advice?", "<b>any</b> en afirmativo \u2192 cualquiera / no importa cu\u00e1l: Any agent can help you with this", "<b>Orden:</b> some/any/no + sustantivo (sin art\u00edculo): some help \u2705 \u00b7 some a help \u274c", "<b>Combinaciones:</b> someone/anyone/no one \u00b7 something/anything/nothing \u00b7 somewhere/anywhere/nowhere"];
var curStep = 0;
var scores = {};
var answered = {};

function renderStepTabs() {
    var c = document.getElementById("stepTabs");
    c.innerHTML = "";
    STEPS.forEach(function(s, i) {
        var k = "s" + i;
        var allDone = [0,1,2,3,4].every(function(j){ return answered[k+"e"+j]; });
        var b = document.createElement("button");
        b.className = "step-tab" + (i === curStep ? " active" : "") + (allDone && i !== curStep ? " done" : "");
        b.textContent = (i + 1) + ". " + s.icon + " " + s.title;
        b.addEventListener("click", (function(idx){ return function(){
            curStep = idx;
            renderStepTabs();
            renderCard();
            document.getElementById("summaryFinal").classList.remove("show");
        };})(i));
        c.appendChild(b);
    });
}

function renderCard() {
    var s = STEPS[curStep];
    var exs = EXERCISES[curStep];
    var k = "s" + curStep;
    if (scores[k] === undefined) scores[k] = 0;
    var h = "<div class=\"card\">" + s.html;
    h += "<div class=\"ex-section\"><h3>&#x270F;&#xFE0F; Exercises &mdash; " + s.title + "</h3>";
    exs.forEach(function(e, i) {
        var eid = k + "e" + i;
        var longOpts = e.o[0].length > 38 || e.o[1].length > 38;
        var gs = longOpts ? " style=\"grid-template-columns:1fr\"" : "";
        h += "<div class=\"exercise\" id=\"" + eid + "\">";
        h += "<div class=\"exercise-q\">" + (i+1) + ". " + e.q + "</div>";
        h += "<div class=\"opts\"" + gs + ">";
        h += "<button class=\"opt-btn\" id=\"" + eid + "ba\">a) " + e.o[0] + "</button>";
        h += "<button class=\"opt-btn\" id=\"" + eid + "bb\">b) " + e.o[1] + "</button>";
        h += "</div>";
        var ct = e.a === "a" ? e.o[0] : e.o[1];
        h += "<div class=\"fb fb-ok\" id=\"fbok-" + eid + "\">";
        h += "<div class=\"fb-header\"><span class=\"fb-icon\">&#x1F389;</span> Correct!</div>";
        h += "<div class=\"fb-body\">";
        h += "<div class=\"fb-row\"><span class=\"fb-dot\">&#x2705;</span><div class=\"fb-text\"><span class=\"fb-correct-answer\">" + ct + "</span> &mdash; " + e.fc + "</div></div>";
        h += "<div class=\"fb-row\"><span class=\"fb-dot\">&#x1F4A1;</span><div class=\"fb-text\">The other option: " + e.fi + "</div></div>";
        if (e.ex) h += "<div class=\"fb-example\">&#x1F4DD; " + e.ex + "</div>";
        if (e.tip) h += "<div class=\"fb-tip\"><strong>&#x1F4A1; Remember:</strong> " + e.tip + "</div>";
        h += "</div></div>";
        h += "<div class=\"fb fb-bad\" id=\"fbbad-" + eid + "\">";
        h += "<div class=\"fb-header\"><span class=\"fb-icon\">&#x1F615;</span> Not quite right</div>";
        h += "<div class=\"fb-body\">";
        h += "<div class=\"fb-row\"><span class=\"fb-dot\">&#x274C;</span><div class=\"fb-text\"><span class=\"fb-wrong-reason\">" + e.fi + "</span></div></div>";
        h += "<div class=\"fb-row\"><span class=\"fb-dot\">&#x2705;</span><div class=\"fb-text\">The correct answer is <span class=\"fb-correct-answer\">" + ct + "</span> &mdash; " + e.fc + "</div></div>";
        if (e.ex) h += "<div class=\"fb-example\">&#x1F4DD; " + e.ex + "</div>";
        if (e.tip) h += "<div class=\"fb-tip\"><strong>&#x1F4A1; Remember:</strong> " + e.tip + "</div>";
        h += "</div></div></div>";
    });
    h += "<div class=\"score-bar\"><div class=\"num\" id=\"sc-" + k + "\">0/5</div><div class=\"lbl\">Score</div></div>";
    h += "</div></div>";
    document.getElementById("cardArea").innerHTML = h;
    exs.forEach(function(e, i) {
        var eid = k + "e" + i;
        document.getElementById(eid + "ba").addEventListener("click", (function(id){ return function(){ chk(id,"a"); }; })(eid));
        document.getElementById(eid + "bb").addEventListener("click", (function(id){ return function(){ chk(id,"b"); }; })(eid));
    });
}

function chk(eid, sel) {
    if (answered[eid]) return;
    answered[eid] = true;
    var parts = eid.match(/s(\d+)e(\d+)/);
    var si = parseInt(parts[1]);
    var ei = parseInt(parts[2]);
    var e = EXERCISES[si][ei];
    var k = "s" + si;
    var ex = document.getElementById(eid);
    var btnA = document.getElementById(eid + "ba");
    var btnB = document.getElementById(eid + "bb");
    btnA.disabled = true;
    btnB.disabled = true;
    if (sel === e.a) {
        ex.classList.add("correct");
        (sel === "a" ? btnA : btnB).classList.add("sel-ok");
        document.getElementById("fbok-" + eid).classList.add("show");
        scores[k]++;
    } else {
        ex.classList.add("incorrect");
        (sel === "a" ? btnA : btnB).classList.add("sel-bad");
        (e.a === "a" ? btnA : btnB).classList.add("show-ok");
        document.getElementById("fbbad-" + eid).classList.add("show");
    }
    document.getElementById("sc-" + k).textContent = scores[k] + "/5";
    var allDone = [0,1,2,3,4].every(function(i){ return answered[k + "e" + i]; });
    if (allDone && curStep === 4) {
        setTimeout(function() {
            var sf = document.getElementById("summaryFinal");
            document.getElementById("summaryList").innerHTML = SUMMARY.map(function(s){ return "<li>" + s + "</li>"; }).join("");
            sf.classList.add("show");
            sf.scrollIntoView({behavior:"smooth"});
        }, 600);
    }
}

renderStepTabs();
renderCard();
</script>
</body>
</html>
