<!-- ═══ PLANTILLA RESUMEN DE GRAMÁTICA (con nota · repaso) — JUCUM English Center ═══
     1) Nivel en <div id="screen" data-level="pre-a1|a1|a2"> (A2 arranca en inglés).
     2) Edita MAT + el bloque CONTENIDO (STEPS / BUILD / SUMMARY / BADGE). Todo es BILINGÜE {es,en}.
        · El botón ES/EN cambia TODO el material (explicación + indicaciones + auto-chequeos).
        · REGLA «el español se queda en español»: cuando el texto MENCIONA una palabra española o da un
          EJEMPLO en español (p. ej. el paso 1 «Repaso en Español»: «Él», «Ella», «Nosotros», «Juan… Él…»),
          en el lado en:'' repite esas palabras/ejemplos TAL CUAL en español; solo traduce la prosa que los rodea.
        · 'tr' (botón 🌐 traducción por pregunta): ponlo SOLO en auto-chequeos donde una oración en inglés
          tenga vocabulario que pueda frenar al alumno Y la traducción NO delate la respuesta. En drills de
          pronombres la pista ya está en la pregunta y se infiere por el verbo be → NO lleva 'tr' (por eso aquí
          no hay ninguno). Sí aplica en temas como To be / There is_are con frases más largas. Sintaxis:
          { q:{...}, opts:{...}, correct:0, fb:{...}, tr:{es:'significado en español',en:'meaning in English'} }

  <div class="helpov" id="helpov"><div class="helpcard"><button class="hx" onclick="closeHelp()">✕</button><h3>🧭 <span id="helpT"></span></h3><div id="helpTips"></div></div></div>

<script>
/* ═══ METADATOS ═══ */
const MAT = { title:{es:'Resumen de Gramática',en:'Grammar Summary'}, subtitle:{es:'Modales de Deducción (must / might / can\'t)',en:'Modals of Deduction (must / might / can\'t)'}, reportId:'sum-modals-deduction' };
const PASS = 75;
const STEPS = [
  { icon:'🇪🇸', title:{es:'Repaso en Español',en:'Spanish Recap'},
    html:{
      es:`<div class="gdesc">Cuando no estás 100% seguro pero <b>deduces</b> algo por las pistas, en español usas frases como «<b>debe de</b> estar», «<b>puede que</b> esté», «<b>no puede</b> estar».</div>
        <div class="art-hero three"><div class="art-box"><div class="word">debe de</div><div class="role">Casi seguro ✅</div><div class="desc">«Las luces están: debe de estar en casa.»</div></div><div class="art-box"><div class="word">puede que</div><div class="role">Posible 🤔</div><div class="desc">«No contesta: puede que esté dormido.»</div></div><div class="art-box"><div class="word">no puede</div><div class="role">Imposible ❌</div><div class="desc">«Su carro no está: no puede estar aquí.»</div></div></div>
        ${ii('🕵️','No es un hecho confirmado: es una <b>conclusión lógica</b> a partir de pistas.')}
        <div class="gnote life">🌎 <b>De tu vida:</b> ves un plato vacío y dices «debe de tener hambre». Nadie te lo confirmó; lo dedujiste.</div>`,
      en:`<div class="gdesc">When you're not 100% sure but you <b>deduce</b> something from clues, Spanish uses phrases like «<b>debe de</b> estar», «<b>puede que</b> esté», «<b>no puede</b> estar».</div>
        <div class="art-hero three"><div class="art-box"><div class="word">debe de</div><div class="role">Almost sure ✅</div><div class="desc">«Las luces están: debe de estar en casa.»</div></div><div class="art-box"><div class="word">puede que</div><div class="role">Possible 🤔</div><div class="desc">«No contesta: puede que esté dormido.»</div></div><div class="art-box"><div class="word">no puede</div><div class="role">Impossible ❌</div><div class="desc">«Su carro no está: no puede estar aquí.»</div></div></div>
        ${ii('🕵️','It's not a confirmed fact: it's a <b>logical conclusion</b> from clues.')}
        <div class="gnote life">🌎 <b>From your life:</b> you see an empty plate and say «debe de tener hambre». Nobody confirmed it; you deduced it.</div>`
    },
    checks:[
      { q:{es:'«Debe de estar en casa» expresa:',en:'«Debe de estar en casa» expresses:'}, opts:{es:['Una deducción casi segura','Una orden'],en:['An almost-sure deduction','An order']}, correct:0, fb:{ why:{es:'Es una conclusión lógica, casi segura.',en:'A logical, almost-sure conclusion.'}, tip:{es:'debe de = deducción',en:'debe de = deduction'}} },
      { q:{es:'«Puede que esté dormido» expresa:',en:'«Puede que esté dormido» expresses:'}, opts:{es:['Posibilidad','Certeza total'],en:['Possibility','Total certainty']}, correct:0, fb:{ why:{es:'Es solo una opción posible.',en:'Just a possible option.'}, tip:{es:'puede que = posible',en:'puede que = possible'}} },
      { q:{es:'«No puede estar aquí» expresa:',en:'«No puede estar aquí» expresses:'}, opts:{es:['Imposibilidad lógica','Permiso'],en:['Logical impossibility','Permission']}, correct:0, fb:{ why:{es:'Concluyes que es imposible.',en:'You conclude it is impossible.'}, tip:{es:'no puede = imposible',en:'no puede = impossible'}} },
      { q:{es:'Una deducción es…',en:'A deduction is…'}, opts:{es:['Una conclusión a partir de pistas','Un hecho confirmado'],en:['A conclusion from clues','A confirmed fact']}, correct:0, fb:{ why:{es:'Razonas con la información que ves.',en:'You reason from the info you see.'}, tip:{es:'pistas → conclusión',en:'clues → conclusion'}} },
      { q:{es:'Ordena de más seguro a imposible:',en:'Order from most sure to impossible:'}, opts:{es:['debe de → puede que → no puede','no puede → debe de → puede que'],en:['debe de → puede que → no puede','no puede → debe de → puede que']}, correct:0, fb:{ why:{es:'Certeza positiva → posibilidad → imposible.',en:'Positive certainty → possibility → impossible.'}, tip:{es:'✅ → 🤔 → ❌',en:'✅ → 🤔 → ❌'}} }
    ] },
  { icon:'🤝', title:{es:'Similitudes',en:'Similarities'},
    html:{
      es:`<div class="gdesc">El inglés tiene un modal para cada nivel de certeza, y todos van con el verbo en <b>forma base</b>.</div>
        <div class="vs-grid">
          <div class="vs-row"><div class="vs-side es"><span class="flag">debe de</span>Debe de estar cansada</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">must</span>She <b>must be</b> tired</div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">puede que</span>Puede que esté en casa</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">might/may/could</span>She <b>might be</b> at home</div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">no puede</span>No puede ser verdad</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">can't</span>It <b>can't be</b> true</div></div>
        </div>
        ${eg('He <span class="tag s">must be</span> rich; look at his car.','Debe de ser rico; mira su carro. (deducción segura)','ok')}
        ${eg('She <span class="tag s">might be</span> at work.','Puede que esté en el trabajo. (posible)','ok')}
        <div class="sec-label">Lo igual en los dos idiomas</div>
        <ul class="simlist"><li>Los dos tienen niveles: casi seguro · posible · imposible.</li><li>Los dos se basan en <b>pistas</b>, no en hechos confirmados.</li><li>Después del modal va el verbo en <b>base</b> (be, know, have): must <b>be</b>, might <b>be</b>.</li></ul>
        <div class="gnote">👍 must = debe de · might/may/could = puede que · can't = no puede. Solo memoriza el reparto.</div>`,
      en:`<div class="gdesc">English has one modal for each certainty level, and they all take the verb in its <b>base form</b>.</div>
        <div class="vs-grid">
          <div class="vs-row"><div class="vs-side es"><span class="flag">debe de</span>Debe de estar cansada</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">must</span>She <b>must be</b> tired</div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">puede que</span>Puede que esté en casa</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">might/may/could</span>She <b>might be</b> at home</div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">no puede</span>No puede ser verdad</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">can't</span>It <b>can't be</b> true</div></div>
        </div>
        ${eg('He <span class="tag s">must be</span> rich; look at his car.','He must be rich; look at his car. (sure deduction)','ok')}
        ${eg('She <span class="tag s">might be</span> at work.','She might be at work. (possible)','ok')}
        <div class="sec-label">What is the same in both languages</div>
        <ul class="simlist"><li>Both have levels: almost sure · possible · impossible.</li><li>Both are based on <b>clues</b>, not confirmed facts.</li><li>After the modal comes the <b>base</b> verb (be, know, have): must <b>be</b>, might <b>be</b>.</li></ul>
        <div class="gnote">👍 must = debe de · might/may/could = puede que · can't = no puede. Just memorize the split.</div>`
    },
    checks:[
      { q:{es:'«Debe de estar cansada» en inglés:',en:'«Debe de estar cansada» in English:'}, opts:{es:['She must be tired','She might be tired'],en:['She must be tired','She might be tired']}, correct:0, fb:{ why:{es:'«must» = deducción casi segura.',en:'«must» = almost-sure deduction.'}, ex:{es:'She must be tired → Debe de estar cansada',en:'She must be tired'}, tip:{es:'debe de → must',en:'debe de → must'}}, tr:{es:'Debe de estar cansada.',en:'She must be tired.'} },
      { q:{es:'«Puede que esté en casa» en inglés:',en:'«Puede que esté en casa» in English:'}, opts:{es:['She might be at home','She must be at home'],en:['She might be at home','She must be at home']}, correct:0, fb:{ why:{es:'«might» = posibilidad.',en:'«might» = possibility.'}, ex:{es:'She might be at home → Puede que esté en casa',en:'She might be at home'}, tip:{es:'puede que → might/may/could',en:'puede que → might/may/could'}}, tr:{es:'Puede que esté en casa.',en:'She might be at home.'} },
      { q:{es:'Después del modal, el verbo va en:',en:'After the modal, the verb is in:'}, opts:{es:['Forma base (be, know)','Pasado (was, knew)'],en:['Base form (be, know)','Past (was, knew)']}, correct:0, fb:{ why:{es:'Modal + base: must be, might know.',en:'Modal + base: must be, might know.'}, ex:{es:'must be, might know',en:'must be, might know'}, tip:{es:'modal + verbo base',en:'modal + base verb'}} },
      { q:{es:'«No puede ser verdad» en inglés:',en:'«No puede ser verdad» in English:'}, opts:{es:['It can\'t be true','It mustn\'t be true'],en:['It can\'t be true','It mustn\'t be true']}, correct:0, fb:{ why:{es:'La deducción negativa usa «can\'t».',en:'Negative deduction uses «can\'t».'}, ex:{es:'It can\'t be true → No puede ser verdad',en:'It can\'t be true'}, tip:{es:'no puede → can\'t',en:'no puede → can\'t'}}, tr:{es:'No puede ser verdad.',en:'It can\'t be true.'} },
      { q:{es:'«might», «may» y «could» (para deducir) significan:',en:'«might», «may» and «could» (for deduction) mean:'}, opts:{es:['Casi lo mismo: posibilidad','Cosas opuestas'],en:['Almost the same: possibility','Opposite things']}, correct:0, fb:{ why:{es:'Los tres expresan posibilidad.',en:'All three express possibility.'}, ex:{es:'might/may/could be → puede que esté',en:'might/may/could be'}, tip:{es:'los 3 = puede que',en:'all 3 = puede que'}} }
    ] },
  { icon:'⚡', title:{es:'Diferencias',en:'Differences'},
    html:{
      es:`<div class="gdesc">El error más peligroso: confundir <b>must de deducción</b> con <b>must de obligación</b>, y usar «mustn't» para negar una deducción.</div>
        <table class="dtab"><tr><th>Inglés</th><th>NO significa</th><th>Sí significa</th></tr>
          <tr><td class="en">She must be sick</td><td>Tiene que (obligación)</td><td>Debe de estar enferma (deducción)</td></tr>
          <tr><td class="en">It can't be true</td><td>No es capaz</td><td>No puede ser (imposible)</td></tr>
        </table>
        <div class="sec-label">⚠️ La negativa de la deducción es «can't», NO «mustn't»</div>
        ${ii('🚫','«mustn\'t» = prohibición (no debes). Para decir «no puede ser» (deducción negativa) se usa <b>can\'t</b>.')}
        <div class="vs-grid">
          <div class="vs-row"><div class="vs-side en"><span class="flag">Deducción ✅</span>He can\'t be at home.</div><div class="vs-mid">≠</div><div class="vs-side es"><span class="flag">Prohibición</span>You mustn\'t smoke here.</div></div>
        </div>
        ${eg('Her car is gone; she <span class="tag s">can\'t be</span> here.','Su carro no está; no puede estar aquí. (imposible)','ok')}
        ${eg('He can\'t be at home... wait, he mustn\'t be home.','«mustn\'t» = prohibición, no deducción.','bad')}
        <div class="gnote">📍 Deducción: <b>must</b> (✅ casi seguro) · <b>might/may/could</b> (🤔 posible) · <b>can\'t</b> (❌ imposible).</div>`,
      en:`<div class="gdesc">The most dangerous error: confusing <b>must of deduction</b> with <b>must of obligation</b>, and using «mustn't» to negate a deduction.</div>
        <table class="dtab"><tr><th>English</th><th>Does NOT mean</th><th>Does mean</th></tr>
          <tr><td class="en">She must be sick</td><td>Tiene que (obligation)</td><td>Debe de estar enferma (deduction)</td></tr>
          <tr><td class="en">It can't be true</td><td>No es capaz</td><td>No puede ser (impossible)</td></tr>
        </table>
        <div class="sec-label">⚠️ The negative of deduction is «can't», NOT «mustn't»</div>
        ${ii('🚫','«mustn\'t» = prohibition (you must not). To say «no puede ser» (negative deduction) use <b>can\'t</b>.')}
        <div class="vs-grid">
          <div class="vs-row"><div class="vs-side en"><span class="flag">Deduction ✅</span>He can\'t be at home.</div><div class="vs-mid">≠</div><div class="vs-side es"><span class="flag">Prohibition</span>You mustn\'t smoke here.</div></div>
        </div>
        ${eg('Her car is gone; she <span class="tag s">can\'t be</span> here.','Her car is gone; she can\'t be here. (impossible)','ok')}
        ${eg('He can\'t be at home... wait, he mustn\'t be home.','«mustn\'t» = prohibition, not deduction.','bad')}
        <div class="gnote">📍 Deduction: <b>must</b> (✅ almost sure) · <b>might/may/could</b> (🤔 possible) · <b>can\'t</b> (❌ impossible).</div>`
    },
    checks:[
      { q:{es:'Para negar una deducción («no puede ser») usas:',en:'To negate a deduction («it can\'t be») you use:'}, opts:{es:['can\'t','mustn\'t'],en:['can\'t','mustn\'t']}, correct:0, fb:{ why:{es:'«mustn\'t» es prohibición, no deducción.',en:'«mustn\'t» is prohibition, not deduction.'}, contrast:{es:'mustn\'t = no debes (prohibido).',en:'mustn\'t = you must not (forbidden).'}, ex:{es:'It can\'t be true → No puede ser',en:'It can\'t be true'}, tip:{es:'deducción negativa → can\'t',en:'negative deduction → can\'t'}} },
      { q:{es:'«She must be sick» (por las pistas) significa:',en:'«She must be sick» (from the clues) means:'}, opts:{es:['Debe de estar enferma','Tiene la obligación de enfermarse'],en:['She is probably sick','She is forced to be sick']}, correct:0, fb:{ why:{es:'Aquí «must» es deducción casi segura.',en:'Here «must» is an almost-sure deduction.'}, ex:{es:'must be sick → debe de estar enferma',en:'must be sick'}, tip:{es:'must (deducción) = debe de',en:'must (deduction) = probably'}}, tr:{es:'Debe de estar enferma.',en:'She must be sick.'} },
      { q:{es:'«You ___ smoke here» (prohibido):',en:'«You ___ smoke here» (forbidden):'}, opts:{es:['mustn\'t','can\'t be'],en:['mustn\'t','can\'t be']}, correct:0, fb:{ why:{es:'Prohibición → mustn\'t.',en:'Prohibition → mustn\'t.'}, ex:{es:'mustn\'t smoke → no debes fumar',en:'mustn\'t smoke'}, tip:{es:'prohibición → mustn\'t',en:'prohibition → mustn\'t'}} },
      { q:{es:'«The lights are on; he ___ be home.» (deducción ✅):',en:'«The lights are on; he ___ be home.» (deduction ✅):'}, opts:{es:['must','can\'t'],en:['must','can\'t']}, correct:0, fb:{ why:{es:'La pista apoya que SÍ está → must.',en:'The clue supports he IS home → must.'}, ex:{es:'must be home → debe de estar en casa',en:'must be home'}, tip:{es:'pista a favor → must',en:'clue in favor → must'}}, tr:{es:'Las luces están encendidas; debe de estar en casa.',en:'The lights are on; he must be home.'} },
      { q:{es:'«His car is gone; he ___ be here.» (imposible ❌):',en:'«His car is gone; he ___ be here.» (impossible ❌):'}, opts:{es:['can\'t','must'],en:['can\'t','must']}, correct:0, fb:{ why:{es:'La pista lo hace imposible → can\'t.',en:'The clue makes it impossible → can\'t.'}, ex:{es:'can\'t be here → no puede estar aquí',en:'can\'t be here'}, tip:{es:'pista en contra → can\'t',en:'clue against → can\'t'}}, tr:{es:'Su carro no está; no puede estar aquí.',en:'His car is gone; he can\'t be here.'} }
    ] },
  { icon:'💡', title:{es:'Tips Prácticos',en:'Practical Tips'},
    html:{
      es:`<div class="gdesc">El termómetro de la certeza, de arriba (seguro) a abajo (imposible):</div>
        <div class="fbox"><div class="frm"><span class="pill s">must</span><span class="plus">✅</span><span class="pill v">might/may/could</span><span class="plus">🤔</span><span class="pill o">can\'t</span><span class="plus">❌</span></div><div class="fex">+ <span class="s">be</span> / <span class="v">know</span> / <span class="o">have</span> (verbo base)</div></div>
        ${ii('🌡️','<b>Tip 1 — El termómetro:</b> ¿estoy casi seguro de que SÍ? → must. ¿quizá? → might/may/could. ¿casi seguro de que NO? → can\'t.')}
        ${ii('🧱','<b>Tip 2 — Estructura fija:</b> sujeto + modal + <b>verbo base</b>. Nunca «must to be» ni «must is».')}
        ${ii('🔁','<b>Tip 3 — La negativa cambia de palabra:</b> must ↔ can\'t (no «mustn\'t»).')}
        <div class="alert-card"><div class="atitle">⚠️ Error típico</div><p>❌ «She must to be tired» → ✅ «She <b>must be</b> tired» (sin «to»).<br>❌ «It mustn\'t be true» → ✅ «It <b>can\'t be</b> true».</p></div>`,
      en:`<div class="gdesc">The certainty thermometer, from top (sure) to bottom (impossible):</div>
        <div class="fbox"><div class="frm"><span class="pill s">must</span><span class="plus">✅</span><span class="pill v">might/may/could</span><span class="plus">🤔</span><span class="pill o">can\'t</span><span class="plus">❌</span></div><div class="fex">+ <span class="s">be</span> / <span class="v">know</span> / <span class="o">have</span> (base verb)</div></div>

  document.getElementById('surprise').style.display= pass? 'block':'none';
  if(pass){ document.getElementById('medalEm').textContent=BADGE.emoji; document.getElementById('surT').textContent=t.surT; document.getElementById('surBadge').textContent=t.surBadge(BADGE.name[info]); document.getElementById('surP').textContent=t.surP; document.getElementById('xpWin').textContent=t.xp(BADGE.xp); }
  try{ window.dispatchEvent(new CustomEvent('jucum:done',{detail:{score:pct, pass:pass, type:'summary', badge:BADGE.name.en, xp:BADGE.xp, mat:MAT.reportId, final:true}})); }catch(e){}
  window.scrollTo({top:0,behavior:'smooth'}); }
function restart(){ render(); }
function openHelp(){document.getElementById('helpov').classList.add('show');} function closeHelp(){document.getElementById('helpov').classList.remove('show');}
function setInfo(l){ info=l; applyLang(); }
function setLevel(lv){ document.getElementById('screen').setAttribute('data-level',lv); info= lv==='a2'?'en':'es'; render(); }
function volver(){ if(document.referrer){ location.href=document.referrer; } else if(history.length>1){ history.back(); } else { toast(info==='es'?'Vuelve a tu práctica en la plataforma':'Go back to your practice'); } }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2600); }
document.addEventListener('contextmenu',e=>{ if(e.target.closest('.mat')){ e.preventDefault(); toast(info==='es'?'Material protegido © JUCUM EC':'Protected material © JUCUM EC'); }});
try{ speechSynthesis.getVoices(); speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices(); }catch(e){}
/* FIN DEL MOTOR */
setLevel(document.getElementById('screen').getAttribute('data-level')||'pre-a1');
