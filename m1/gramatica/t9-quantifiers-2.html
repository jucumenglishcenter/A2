<script>
/* ═══ METADATOS ═══ */
const MAT = { title:{es:'Resumen de Gramática',en:'Grammar Summary'}, subtitle:{es:'Some / Any / No',en:'Some / Any / No'}, reportId:'sum-some-any-no' };
const PASS = 75;
const STEPS = [
  { icon:'🇪🇸', title:{es:'Repaso en Español',en:'Spanish Recap'},
    html:{
      es:`<div class="gdesc">En español hablas de cantidades sin número con «<b>algo de / unos</b>», «<b>nada de / ningún</b>», y preguntas con «<b>algo de / algún</b>».</div>
        <div class="art-hero three"><div class="art-box"><div class="word">algo de</div><div class="role">Afirmas ✅</div><div class="desc">«Tengo algo de dinero.»</div></div><div class="art-box"><div class="word">nada de</div><div class="role">Niegas ❌</div><div class="desc">«No tengo nada de dinero.»</div></div><div class="art-box"><div class="word">¿algo de?</div><div class="role">Preguntas ❓</div><div class="desc">«¿Tienes algo de dinero?»</div></div></div>
        ${ii('💡','La idea cambia según afirmes, niegues o preguntes.')}
        <div class="gnote life">🌎 <b>De tu vida:</b> «Hay algo de pan» (afirmas), «No hay nada de pan» (niegas), «¿Hay algo de pan?» (preguntas). En inglés estas tres ideas son some / any / no.</div>`,
      en:`<div class="gdesc">In Spanish you talk about amounts without a number using «<b>algo de / unos</b>», «<b>nada de / ningún</b>», and questions with «<b>algo de / algún</b>».</div>
        <div class="art-hero three"><div class="art-box"><div class="word">algo de</div><div class="role">You affirm ✅</div><div class="desc">«Tengo algo de dinero.»</div></div><div class="art-box"><div class="word">nada de</div><div class="role">You deny ❌</div><div class="desc">«No tengo nada de dinero.»</div></div><div class="art-box"><div class="word">¿algo de?</div><div class="role">You ask ❓</div><div class="desc">«¿Tienes algo de dinero?»</div></div></div>
        ${ii('💡','The idea changes depending on whether you affirm, deny or ask.')}
        <div class="gnote life">🌎 <b>From your life:</b> «Hay algo de pan» (affirm), «No hay nada de pan» (deny), «¿Hay algo de pan?» (ask). In English these three ideas are some / any / no.</div>`
    },
    checks:[
      { q:{es:'«Tengo algo de dinero» es una frase:',en:'«Tengo algo de dinero» is a sentence:'}, opts:{es:['Afirmativa','Negativa'],en:['Affirmative','Negative']}, correct:0, fb:{ why:{es:'Afirmas que sí hay algo.',en:'You affirm there is some.'}, tip:{es:'algo de → afirmar',en:'algo de → affirm'}} },
      { q:{es:'«No tengo nada de dinero» es:',en:'«No tengo nada de dinero» is:'}, opts:{es:['Negativa','Pregunta'],en:['Negative','Question']}, correct:0, fb:{ why:{es:'Niegas que haya.',en:'You deny there is any.'}, tip:{es:'nada de → negar',en:'nada de → deny'}} },
      { q:{es:'«¿Tienes algo de pan?» es:',en:'«¿Tienes algo de pan?» is:'}, opts:{es:['Pregunta','Afirmación'],en:['Question','Affirmation']}, correct:0, fb:{ why:{es:'Estás preguntando.',en:'You are asking.'}, tip:{es:'¿…? → pregunta',en:'¿…? → question'}} },
      { q:{es:'¿Qué decide la palabra que usas?',en:'What decides the word you use?'}, opts:{es:['Si afirmas, niegas o preguntas','La hora'],en:['Whether you affirm, deny or ask','The time']}, correct:0, fb:{ why:{es:'El tipo de frase manda.',en:'The sentence type decides.'}, tip:{es:'afirmar/negar/preguntar',en:'affirm/deny/ask'}} },
      { q:{es:'«Ningún / nada de» da idea de:',en:'«Ningún / nada de» gives the idea of:'}, opts:{es:['Cero, no hay','Mucho'],en:['Zero, none','A lot']}, correct:0, fb:{ why:{es:'Es ausencia total.',en:'It is total absence.'}, tip:{es:'cero',en:'zero'}} }
    ] },
  { icon:'🤝', title:{es:'Similitudes',en:'Similarities'},
    html:{
      es:`<div class="gdesc">El inglés tiene tres palabras para esto: <b>some</b> (afirmas), <b>any</b> (niegas/preguntas) y <b>no</b> (cero).</div>
        <div class="vs-grid">
          <div class="vs-row"><div class="vs-side es"><span class="flag">algo de</span>Tengo algo de pan</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">some</span>I have <b>some</b> bread</div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">nada de</span>No tengo pan</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">any / no</span>I don't have <b>any</b> bread</div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">¿algo de?</span>¿Tienes pan?</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">any</span>Do you have <b>any</b> bread?</div></div>
        </div>
        ${eg('There is <span class="tag s">some</span> milk in the fridge.','Hay algo de leche en el refri. (afirmas)','ok')}
        ${eg('There isn\'t <span class="tag s">any</span> milk.','No hay nada de leche. (niegas)','ok')}
        <div class="sec-label">Lo igual en los dos idiomas</div>
        <ul class="simlist"><li>Los tres hablan de cantidad <b>sin número</b>.</li><li>Sirven con contables (some apples) e incontables (some water).</li><li>La elección depende de si <b>afirmas, niegas o preguntas</b>.</li></ul>
        <div class="gnote">👍 some = algo de · any = nada de / ¿algo de? · no = ningún. Solo falta el reparto exacto (siguiente paso).</div>`,
      en:`<div class="gdesc">English has three words for this: <b>some</b> (affirm), <b>any</b> (deny/ask) and <b>no</b> (zero).</div>
        <div class="vs-grid">
          <div class="vs-row"><div class="vs-side es"><span class="flag">algo de</span>Tengo algo de pan</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">some</span>I have <b>some</b> bread</div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">nada de</span>No tengo pan</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">any / no</span>I don't have <b>any</b> bread</div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">¿algo de?</span>¿Tienes pan?</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">any</span>Do you have <b>any</b> bread?</div></div>
        </div>
        ${eg('There is <span class="tag s">some</span> milk in the fridge.','There is some milk in the fridge. (affirm)','ok')}
        ${eg('There isn\'t <span class="tag s">any</span> milk.','There isn\'t any milk. (deny)','ok')}
        <div class="sec-label">What is the same in both languages</div>
        <ul class="simlist"><li>All three talk about amount <b>without a number</b>.</li><li>They work with countables (some apples) and uncountables (some water).</li><li>The choice depends on whether you <b>affirm, deny or ask</b>.</li></ul>
        <div class="gnote">👍 some = algo de · any = nada de / ¿algo de? · no = ningún. Just learn the exact split (next step).</div>`
    },
    checks:[
      { q:{es:'«Tengo algo de pan» en inglés:',en:'«Tengo algo de pan» in English:'}, opts:{es:['I have some bread','I have any bread'],en:['I have some bread','I have any bread']}, correct:0, fb:{ why:{es:'Afirmativa → some.',en:'Affirmative → some.'}, ex:{es:'some bread → algo de pan',en:'some bread'}, tip:{es:'afirmar → some',en:'affirm → some'}}, tr:{es:'Tengo algo de pan.',en:'I have some bread.'} },
      { q:{es:'«No hay nada de leche» en inglés:',en:'«No hay nada de leche» in English:'}, opts:{es:['There isn\'t any milk','There isn\'t some milk'],en:['There isn\'t any milk','There isn\'t some milk']}, correct:0, fb:{ why:{es:'Negativa → any.',en:'Negative → any.'}, ex:{es:'any milk → nada de leche',en:'any milk'}, tip:{es:'negar → any',en:'deny → any'}}, tr:{es:'No hay nada de leche.',en:'There isn\'t any milk.'} },
      { q:{es:'«¿Tienes pan?» en inglés:',en:'«¿Tienes pan?» in English:'}, opts:{es:['Do you have any bread?','Do you have some bread?'],en:['Do you have any bread?','Do you have some bread?']}, correct:0, fb:{ why:{es:'Pregunta normal → any.',en:'Normal question → any.'}, ex:{es:'any bread → algo de pan',en:'any bread'}, tip:{es:'preguntar → any',en:'ask → any'}}, tr:{es:'¿Tienes algo de pan?',en:'Do you have any bread?'} },
      { q:{es:'«some» y «any» se usan con:',en:'«some» and «any» are used with:'}, opts:{es:['Contables e incontables','Solo incontables'],en:['Countable and uncountable','Only uncountable']}, correct:0, fb:{ why:{es:'some apples / some water.',en:'some apples / some water.'}, tip:{es:'los dos tipos',en:'both types'}} },
      { q:{es:'La elección some/any depende de:',en:'The some/any choice depends on:'}, opts:{es:['Afirmar, negar o preguntar','El color'],en:['Affirm, deny or ask','The color']}, correct:0, fb:{ why:{es:'El tipo de frase decide.',en:'The sentence type decides.'}, tip:{es:'tipo de frase',en:'sentence type'}} }
    ] },
  { icon:'⚡', title:{es:'Diferencias',en:'Differences'},
    html:{
      es:`<div class="gdesc">La regla central y dos excepciones que el español no marca.</div>
        <table class="dtab"><tr><th>Frase</th><th>Palabra</th><th>Ejemplo</th></tr>
          <tr><td>afirmativa</td><td class="en">some</td><td>I have some money</td></tr>
          <tr><td>negativa</td><td class="en">any</td><td>I don't have any money</td></tr>
          <tr><td>pregunta</td><td class="en">any</td><td>Do you have any money?</td></tr>
        </table>
        <div class="sec-label">⚠️ «no» = «not any»</div>
        ${ii('🟰','«There is <b>no</b> milk» = «There isn\'t <b>any</b> milk». «no» ya lleva la negación, así que el verbo va en afirmativo.')}
        <div class="sec-label">⚠️ «some» en ofertas y peticiones</div>
        ${ii('🤝','En ofrecimientos y pedidos corteses se usa <b>some</b>, aunque sea pregunta: «Would you like <b>some</b> tea?», «Can I have <b>some</b> water?».')}
        ${eg('There is <span class="tag s">no</span> sugar left.','No queda nada de azúcar. (no + verbo afirmativo)','ok')}
        ${eg('I don\'t have no money.','No se usa doble negación: «I don\'t have <b>any</b> money».','bad')}
        <div class="gnote">📍 Resumen: afirmas → some · niegas/preguntas → any · cero con verbo afirmativo → no · ofertas/pedidos → some.</div>`,
      en:`<div class="gdesc">The core rule and two exceptions Spanish doesn't mark.</div>
        <table class="dtab"><tr><th>Sentence</th><th>Word</th><th>Example</th></tr>
          <tr><td>affirmative</td><td class="en">some</td><td>I have some money</td></tr>
          <tr><td>negative</td><td class="en">any</td><td>I don't have any money</td></tr>
          <tr><td>question</td><td class="en">any</td><td>Do you have any money?</td></tr>
        </table>
        <div class="sec-label">⚠️ «no» = «not any»</div>
        ${ii('🟰','«There is <b>no</b> milk» = «There isn\'t <b>any</b> milk». «no» already carries the negation, so the verb stays affirmative.')}
        <div class="sec-label">⚠️ «some» in offers and requests</div>
        ${ii('🤝','In polite offers and requests you use <b>some</b>, even in a question: «Would you like <b>some</b> tea?», «Can I have <b>some</b> water?».')}
        ${eg('There is <span class="tag s">no</span> sugar left.','There is no sugar left. (no + affirmative verb)','ok')}
        ${eg('I don\'t have no money.','No double negative: «I don\'t have <b>any</b> money».','bad')}
        <div class="gnote">📍 Summary: affirm → some · deny/ask → any · zero with affirmative verb → no · offers/requests → some.</div>`
    },
    checks:[
      { q:{es:'Afirmativa: «I have ___ questions.»',en:'Affirmative: «I have ___ questions.»'}, opts:{es:['some','any'],en:['some','any']}, correct:0, fb:{ why:{es:'Afirmativa → some.',en:'Affirmative → some.'}, ex:{es:'some questions → algunas preguntas',en:'some questions'}, tip:{es:'afirmar → some',en:'affirm → some'}} },
      { q:{es:'Negativa: «We don\'t have ___ sugar.»',en:'Negative: «We don\'t have ___ sugar.»'}, opts:{es:['any','some'],en:['any','some']}, correct:0, fb:{ why:{es:'Negativa → any.',en:'Negative → any.'}, ex:{es:'any sugar → nada de azúcar',en:'any sugar'}, tip:{es:'negar → any',en:'deny → any'}}, tr:{es:'No tenemos nada de azúcar.',en:'We don\'t have any sugar.'} },
      { q:{es:'«There is ___ bread.» (= no hay nada de pan):',en:'«There is ___ bread.» (= there isn\'t any bread):'}, opts:{es:['no','any'],en:['no','any']}, correct:0, fb:{ why:{es:'«no» con verbo afirmativo = not any.',en:'«no» with an affirmative verb = not any.'}, contrast:{es:'«is any» necesitaría una negación («isn\'t any»).',en:'«is any» would need a negation («isn\'t any»).'}, ex:{es:'There is no bread → No hay pan',en:'There is no bread'}, tip:{es:'no = not any',en:'no = not any'}}, tr:{es:'No hay pan.',en:'There is no bread.'} },
      { q:{es:'Oferta cortés: «Would you like ___ coffee?»',en:'Polite offer: «Would you like ___ coffee?»'}, opts:{es:['some','any'],en:['some','any']}, correct:0, fb:{ why:{es:'En ofertas se usa «some».',en:'In offers you use «some».'}, ex:{es:'some coffee → algo de café',en:'some coffee'}, tip:{es:'oferta → some',en:'offer → some'}}, tr:{es:'¿Quieres un poco de café?',en:'Would you like some coffee?'} },
      { q:{es:'¿Cuál tiene doble negación (error)?',en:'Which one has a double negative (error)?'}, opts:{es:['I don\'t have no money','I don\'t have any money'],en:['I don\'t have no money','I don\'t have any money']}, correct:0, fb:{ why:{es:'«don\'t … no» es doble negación.',en:'«don\'t … no» is a double negative.'}, ex:{es:'I don\'t have any money → No tengo nada de dinero',en:'I don\'t have any money'}, tip:{es:'don\'t + any (no «no»)',en:'don\'t + any (not «no»)'}} }
    ] },
  { icon:'💡', title:{es:'Tips Prácticos',en:'Practical Tips'},
    html:{
      es:`<div class="gdesc">Las palabras compuestas siguen la misma regla: some- / any- / no-.</div>
        <table class="dtab"><tr><th></th><th>some-</th><th>any-</th><th>no-</th></tr>
          <tr><td>cosas</td><td class="en">something</td><td class="en">anything</td><td class="en">nothing</td></tr>
          <tr><td>personas</td><td class="en">someone</td><td class="en">anyone</td><td class="en">no one</td></tr>
          <tr><td>lugares</td><td class="en">somewhere</td><td class="en">anywhere</td><td class="en">nowhere</td></tr>
        </table>
        ${ii('✅','<b>Tip 1 — Afirmativa:</b> some / something / someone. «I saw something».')}
        ${ii('❓','<b>Tip 2 — Negativa y pregunta:</b> any / anything / anyone. «I don\'t see anything», «Did you see anyone?».')}
        ${ii('0️⃣','<b>Tip 3 — «no-» con verbo afirmativo:</b> «I saw <b>nothing</b>» = «I didn\'t see anything». No mezcles las dos negaciones.')}
        <div class="alert-card"><div class="atitle">⚠️ Error típico</div><p>❌ «I don\'t want nothing» → ✅ «I don\'t want <b>anything</b>» (o «I want nothing»).</p></div>`,
      en:`<div class="gdesc">The compound words follow the same rule: some- / any- / no-.</div>
        <table class="dtab"><tr><th></th><th>some-</th><th>any-</th><th>no-</th></tr>
          <tr><td>things</td><td class="en">something</td><td class="en">anything</td><td class="en">nothing</td></tr>
          <tr><td>people</td><td class="en">someone</td><td class="en">anyone</td><td class="en">no one</td></tr>
          <tr><td>places</td><td class="en">somewhere</td><td class="en">anywhere</td><td class="en">nowhere</td></tr>
        </table>
        ${ii('✅','<b>Tip 1 — Affirmative:</b> some / something / someone. «I saw something».')}
        ${ii('❓','<b>Tip 2 — Negative and question:</b> any / anything / anyone. «I don\'t see anything», «Did you see anyone?».')}
        ${ii('0️⃣','<b>Tip 3 — «no-» with an affirmative verb:</b> «I saw <b>nothing</b>» = «I didn\'t see anything». Don\'t mix the two negatives.')}
        <div class="alert-card"><div class="atitle">⚠️ Common mistake</div><p>❌ «I don\'t want nothing» → ✅ «I don\'t want <b>anything</b>» (or «I want nothing»).</p></div>`
    },
    checks:[
