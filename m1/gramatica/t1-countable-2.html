<script>
/* ═══ METADATOS ═══ */
const MAT = { title:{es:'Resumen de Gramática',en:'Grammar Summary'}, subtitle:{es:'How much / How many',en:'How much / How many'}, reportId:'sum-how-much-many' };
const PASS = 75;
const STEPS = [
  { icon:'🇪🇸', title:{es:'Repaso en Español',en:'Spanish Recap'},
    html:{
      es:`<div class="gdesc">En español preguntas la cantidad con <b>«¿Cuánto?»</b> y cambias la palabra según lo que cuentas.</div>
        <div class="art-hero"><div class="art-box"><div class="word">¿Cuánta?</div><div class="role">No se cuenta</div><div class="desc">«¿Cuánta agua?», «¿Cuánto dinero?»</div></div><div class="art-box"><div class="word">¿Cuántas?</div><div class="role">Se cuenta</div><div class="desc">«¿Cuántas manzanas?», «¿Cuántos libros?»</div></div></div>
        ${ii('🌫️','<b>Incontable:</b> «¿Cuánto / Cuánta…?» → agua, dinero, tiempo.')}
        ${ii('🔢','<b>Contable:</b> «¿Cuántos / Cuántas…?» → manzanas, libros, personas.')}
        <div class="gnote life">🌎 <b>De tu vida:</b> en el mercado preguntas «¿Cuánta carne?» pero «¿Cuántos huevos?». Tu oído ya elige bien.</div>`,
      en:`<div class="gdesc">In Spanish you ask about amount with <b>«¿Cuánto?»</b> and change the word depending on what you count.</div>
        <div class="art-hero"><div class="art-box"><div class="word">¿Cuánta?</div><div class="role">Not counted</div><div class="desc">«¿Cuánta agua?», «¿Cuánto dinero?»</div></div><div class="art-box"><div class="word">¿Cuántas?</div><div class="role">Counted</div><div class="desc">«¿Cuántas manzanas?», «¿Cuántos libros?»</div></div></div>
        ${ii('🌫️','<b>Uncountable:</b> «¿Cuánto / Cuánta…?» → agua, dinero, tiempo.')}
        ${ii('🔢','<b>Countable:</b> «¿Cuántos / Cuántas…?» → manzanas, libros, personas.')}
        <div class="gnote life">🌎 <b>From your life:</b> at the market you ask «¿Cuánta carne?» but «¿Cuántos huevos?». Your ear already picks right.</div>`
    },
    checks:[
      { q:{es:'«¿___ agua?» (no se cuenta):',en:'«¿___ agua?» (not counted):'}, opts:{es:['Cuánta','Cuántas'],en:['Cuánta','Cuántas']}, correct:0, fb:{ why:{es:'«agua» es incontable → ¿Cuánta?',en:'«agua» is uncountable → ¿Cuánta?'}, tip:{es:'Masa → ¿Cuánto/Cuánta?',en:'Mass → ¿Cuánto/Cuánta?'}} },
      { q:{es:'«¿___ manzanas?» (se cuentan):',en:'«¿___ manzanas?» (counted):'}, opts:{es:['Cuántas','Cuánta'],en:['Cuántas','Cuánta']}, correct:0, fb:{ why:{es:'«manzanas» se cuenta → ¿Cuántas?',en:'«manzanas» is countable → ¿Cuántas?'}, tip:{es:'Plural contable → ¿Cuántos/as?',en:'Countable plural → ¿Cuántos/as?'}} },
      { q:{es:'«dinero» se pregunta con:',en:'«dinero» is asked with:'}, opts:{es:['¿Cuánto?','¿Cuántos?'],en:['¿Cuánto?','¿Cuántos?']}, correct:0, fb:{ why:{es:'«dinero» es incontable.',en:'«dinero» is uncountable.'}, tip:{es:'dinero, tiempo, agua → ¿Cuánto?',en:'dinero, tiempo, agua → ¿Cuánto?'}} },
      { q:{es:'¿Qué decide si usas «cuánto» o «cuántos»?',en:'What decides «cuánto» vs «cuántos»?'}, opts:{es:['Si la cosa se cuenta','El día de la semana'],en:['Whether the thing is countable','The day of the week']}, correct:0, fb:{ why:{es:'Lo que mandas es contable o incontable.',en:'It depends on countable vs uncountable.'}, tip:{es:'¿Se cuenta? → cuántos',en:'Countable? → cuántos'}} },
      { q:{es:'«¿___ personas vienen?»',en:'«¿___ personas vienen?»'}, opts:{es:['Cuántas','Cuánta'],en:['Cuántas','Cuánta']}, correct:0, fb:{ why:{es:'«personas» se cuenta → ¿Cuántas?',en:'«personas» is countable → ¿Cuántas?'}, tip:{es:'personas, libros → contable',en:'personas, libros → countable'}} }
    ] },
  { icon:'🤝', title:{es:'Similitudes',en:'Similarities'},
    html:{
      es:`<div class="gdesc">El inglés hace lo mismo, pero con <b>una sola palabra base: «How»</b> + much/many.</div>
        <div class="vs-grid">
          <div class="vs-row"><div class="vs-side es"><span class="flag">Español</span>¿Cuánta agua?</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">English</span>How <b>much</b> water?</div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">Español</span>¿Cuántas manzanas?</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">English</span>How <b>many</b> apples?</div></div>
        </div>
        ${eg('How <span class="tag s">much</span> time do you have?','¿Cuánto tiempo tienes? (time = incontable)','ok')}
        ${eg('How <span class="tag s">many</span> friends do you have?','¿Cuántos amigos tienes? (friends = contable)','ok')}
        <div class="sec-label">Lo igual en los dos idiomas</div>
        <ul class="simlist"><li>Los dos preguntan la <b>cantidad</b> (¿Cuánto? = How much/many).</li><li>Los dos <b>distinguen</b> entre lo que se cuenta y lo que no.</li><li>La palabra de cantidad va <b>al inicio de la pregunta</b>.</li></ul>
        <div class="gnote">👍 Misma lógica que ya tienes: solo cambia «cuánta/cuántas» por «much/many».</div>`,
      en:`<div class="gdesc">English does the same, but with <b>one base word: «How»</b> + much/many.</div>
        <div class="vs-grid">
          <div class="vs-row"><div class="vs-side es"><span class="flag">Español</span>¿Cuánta agua?</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">English</span>How <b>much</b> water?</div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">Español</span>¿Cuántas manzanas?</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">English</span>How <b>many</b> apples?</div></div>
        </div>
        ${eg('How <span class="tag s">much</span> time do you have?','How much time do you have? (time = uncountable)','ok')}
        ${eg('How <span class="tag s">many</span> friends do you have?','How many friends do you have? (friends = countable)','ok')}
        <div class="sec-label">What is the same in both languages</div>
        <ul class="simlist"><li>Both ask about <b>amount</b> (¿Cuánto? = How much/many).</li><li>Both <b>distinguish</b> what is countable from what is not.</li><li>The quantity word goes <b>at the start of the question</b>.</li></ul>
        <div class="gnote">👍 Same logic you already have: just swap «cuánta/cuántas» for «much/many».</div>`
    },
    checks:[
      { q:{es:'«How ___ water?» (agua):',en:'«How ___ water?»'}, opts:{es:['much','many'],en:['much','many']}, correct:0, fb:{ why:{es:'«water» es incontable → much.',en:'«water» is uncountable → much.'}, ex:{es:'How much water? → ¿Cuánta agua?',en:'How much water?'}, tip:{es:'incontable → much',en:'uncountable → much'}} },
      { q:{es:'«How ___ apples?» (manzanas):',en:'«How ___ apples?»'}, opts:{es:['many','much'],en:['many','much']}, correct:0, fb:{ why:{es:'«apples» es contable plural → many.',en:'«apples» is countable plural → many.'}, ex:{es:'How many apples? → ¿Cuántas manzanas?',en:'How many apples?'}, tip:{es:'plural «-s» → many',en:'plural «-s» → many'}} },
      { q:{es:'«much» equivale a:',en:'«much» matches:'}, opts:{es:['¿Cuánto/Cuánta?','¿Cuántos/Cuántas?'],en:['¿Cuánto/Cuánta?','¿Cuántos/Cuántas?']}, correct:0, fb:{ why:{es:'«much» = incontable, como «cuánta».',en:'«much» = uncountable, like «cuánta».'}, tip:{es:'much = masa',en:'much = mass'}} },
      { q:{es:'«How ___ money do you need?» (dinero):',en:'«How ___ money do you need?»'}, opts:{es:['much','many'],en:['much','many']}, correct:0, fb:{ why:{es:'«money» es incontable → much.',en:'«money» is uncountable → much.'}, ex:{es:'How much money? → ¿Cuánto dinero?',en:'How much money?'}, tip:{es:'money, time → much',en:'money, time → much'}}, tr:{es:'¿Cuánto dinero necesitas?',en:'How much money do you need?'} },
      { q:{es:'«How ___ people came?» (personas):',en:'«How ___ people came?»'}, opts:{es:['many','much'],en:['many','much']}, correct:0, fb:{ why:{es:'«people» se cuenta → many.',en:'«people» is countable → many.'}, ex:{es:'How many people? → ¿Cuántas personas?',en:'How many people?'}, tip:{es:'people → many',en:'people → many'}}, tr:{es:'¿Cuántas personas vinieron?',en:'How many people came?'} }
    ] },
  { icon:'⚡', title:{es:'Diferencias',en:'Differences'},
    html:{
      es:`<div class="gdesc">Lo que el español no te avisa sobre «much», «many» y «a lot of»:</div>
        <table class="dtab"><tr><th>Palabra</th><th>Va con</th><th>Típico en…</th></tr>
          <tr><td class="en">much</td><td>incontable (water, time)</td><td>preguntas y negativas</td></tr>
          <tr><td class="en">many</td><td>contable plural (apples)</td><td>preguntas, negativas y afirmativas</td></tr>
          <tr><td class="en">a lot of</td><td>los dos</td><td>sobre todo afirmativas</td></tr>
        </table>
        <div class="sec-label">El detalle clave</div>
        ${ii('🚫','En frases <b>afirmativas</b>, «much» suena raro. Usa <b>a lot of</b>: «I have a lot of money» ✅, no «I have much money».')}
        ${eg('I don\'t have <span class="tag s">much</span> time.','No tengo mucho tiempo. (negativa → much)','ok')}
        ${eg('I have <span class="tag s">a lot of</span> friends.','Tengo muchos amigos. (afirmativa → a lot of)','ok')}
        ${eg('I have much money.','En afirmativa, mejor «a lot of money».','bad')}
        <div class="gnote">📍 Regla de bolsillo: <b>much/many</b> para preguntar y negar · <b>a lot of</b> para afirmar.</div>`,
      en:`<div class="gdesc">What Spanish doesn't warn you about «much», «many» and «a lot of»:</div>
        <table class="dtab"><tr><th>Word</th><th>Goes with</th><th>Typical in…</th></tr>
          <tr><td class="en">much</td><td>uncountable (water, time)</td><td>questions and negatives</td></tr>
          <tr><td class="en">many</td><td>countable plural (apples)</td><td>questions, negatives and affirmatives</td></tr>
          <tr><td class="en">a lot of</td><td>both</td><td>mostly affirmatives</td></tr>
        </table>
        <div class="sec-label">The key detail</div>
        ${ii('🚫','In <b>affirmative</b> sentences, «much» sounds odd. Use <b>a lot of</b>: «I have a lot of money» ✅, not «I have much money».')}
        ${eg('I don\'t have <span class="tag s">much</span> time.','I don\'t have much time. (negative → much)','ok')}
        ${eg('I have <span class="tag s">a lot of</span> friends.','I have a lot of friends. (affirmative → a lot of)','ok')}
        ${eg('I have much money.','In an affirmative, use «a lot of money».','bad')}
        <div class="gnote">📍 Pocket rule: <b>much/many</b> to ask and to negate · <b>a lot of</b> to affirm.</div>`
    },
    checks:[
      { q:{es:'Afirmativa: «I have ___ friends.»',en:'Affirmative: «I have ___ friends.»'}, opts:{es:['a lot of','much'],en:['a lot of','much']}, correct:0, fb:{ why:{es:'En afirmativa con plural → a lot of (o many).',en:'Affirmative with a plural → a lot of (or many).'}, contrast:{es:'«much» no va con plural ni suena bien en afirmativa.',en:'«much» does not go with plurals.'}, ex:{es:'a lot of friends → muchos amigos',en:'a lot of friends'}, tip:{es:'afirmativa → a lot of',en:'affirmative → a lot of'}} },
      { q:{es:'Negativa: «I don\'t have ___ time.»',en:'Negative: «I don\'t have ___ time.»'}, opts:{es:['much','many'],en:['much','many']}, correct:0, fb:{ why:{es:'«time» es incontable y la frase es negativa → much.',en:'«time» is uncountable and the sentence is negative → much.'}, ex:{es:'not much time → poco tiempo',en:'not much time'}, tip:{es:'negativa + incontable → much',en:'negative + uncountable → much'}}, tr:{es:'No tengo mucho tiempo.',en:'I don\'t have much time.'} },
      { q:{es:'«a lot of» puede ir con…',en:'«a lot of» can go with…'}, opts:{es:['contables e incontables','solo incontables'],en:['countable and uncountable','only uncountable']}, correct:0, fb:{ why:{es:'«a lot of» sirve para los dos tipos.',en:'«a lot of» works for both types.'}, ex:{es:'a lot of water / a lot of apples',en:'a lot of water / a lot of apples'}, tip:{es:'a lot of = comodín',en:'a lot of = all-purpose'}} },
      { q:{es:'¿Cuál suena mejor en afirmativa?',en:'Which sounds better in an affirmative?'}, opts:{es:['She has a lot of money','She has much money'],en:['She has a lot of money','She has much money']}, correct:0, fb:{ why:{es:'«much money» en afirmativa suena raro.',en:'«much money» in an affirmative sounds odd.'}, ex:{es:'a lot of money → mucho dinero',en:'a lot of money'}, tip:{es:'afirmativa → a lot of',en:'affirmative → a lot of'}}, tr:{es:'Ella tiene mucho dinero.',en:'She has a lot of money.'} },
      { q:{es:'Pregunta: «How ___ books do you read?»',en:'Question: «How ___ books do you read?»'}, opts:{es:['many','much'],en:['many','much']}, correct:0, fb:{ why:{es:'«books» es contable plural → many.',en:'«books» is countable plural → many.'}, ex:{es:'How many books? → ¿Cuántos libros?',en:'How many books?'}, tip:{es:'-s plural → many',en:'-s plural → many'}}, tr:{es:'¿Cuántos libros lees?',en:'How many books do you read?'} }
    ] },
  { icon:'💡', title:{es:'Tips Prácticos',en:'Practical Tips'},
    html:{
      es:`<div class="gdesc">Cómo elegir rápido y sin dudar:</div>
        <div class="fbox"><div class="frm"><span class="pill o">How much</span><span class="plus">+</span><span class="pill v">incontable</span></div><div class="fex">How much <span class="v">sugar</span>? — ¿Cuánta azúcar?</div></div>
        <div class="fbox"><div class="frm"><span class="pill o">How many</span><span class="plus">+</span><span class="pill s">contable plural</span></div><div class="fex">How many <span class="s">eggs</span>? — ¿Cuántos huevos?</div></div>
        ${ii('🔎','<b>Tip 1 — Mira el sustantivo:</b> ¿termina en «-s» plural? → many. ¿es masa (water, time, money)? → much.')}
        ${ii('✅','<b>Tip 2 — Afirmativas:</b> usa «a lot of» y nunca fallas: a lot of water / a lot of apples.')}
        ${ii('🗣️','<b>Tip 3 — Respuesta corta:</b> «A lot.» / «Not much.» / «A few.» / «Just a little.»')}
        <div class="alert-card"><div class="atitle">⚠️ Error típico</div><p>❌ «How much friends?» → ✅ «How <b>many</b> friends?». Si tiene «-s» plural, va «many».</p></div>`,
      en:`<div class="gdesc">How to choose fast and without hesitating:</div>
        <div class="fbox"><div class="frm"><span class="pill o">How much</span><span class="plus">+</span><span class="pill v">uncountable</span></div><div class="fex">How much <span class="v">sugar</span>? — ¿Cuánta azúcar?</div></div>
        <div class="fbox"><div class="frm"><span class="pill o">How many</span><span class="plus">+</span><span class="pill s">countable plural</span></div><div class="fex">How many <span class="s">eggs</span>? — ¿Cuántos huevos?</div></div>
        ${ii('🔎','<b>Tip 1 — Look at the noun:</b> does it end in plural «-s»? → many. Is it a mass (water, time, money)? → much.')}
        ${ii('✅','<b>Tip 2 — Affirmatives:</b> use «a lot of» and you never fail: a lot of water / a lot of apples.')}
        ${ii('🗣️','<b>Tip 3 — Short answer:</b> «A lot.» / «Not much.» / «A few.» / «Just a little.»')}
        <div class="alert-card"><div class="atitle">⚠️ Common mistake</div><p>❌ «How much friends?» → ✅ «How <b>many</b> friends?». If it has plural «-s», it takes «many».</p></div>`
    },
    checks:[
      { q:{es:'«How ___ sugar?» (azúcar):',en:'«How ___ sugar?»'}, opts:{es:['much','many'],en:['much','many']}, correct:0, fb:{ why:{es:'«sugar» es masa → much.',en:'«sugar» is a mass → much.'}, ex:{es:'How much sugar? → ¿Cuánta azúcar?',en:'How much sugar?'}, tip:{es:'masa → much',en:'mass → much'}}, tr:{es:'¿Cuánta azúcar?',en:'How much sugar?'} },
