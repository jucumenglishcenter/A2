<!-- ═══ PLANTILLA RESUMEN DE GRAMÁTICA (con nota · repaso) — JUCUM English Center ═══
     1) Nivel en <div id="screen" data-level="pre-a1|a1|a2"> (A2 arranca en inglés).

        · El botón ES/EN cambia TODO el material (explicación + indicaciones + auto-chequeos).
        · REGLA «el español se queda en español»: cuando el texto MENCIONA una palabra española o da un
          EJEMPLO en español (p. ej. el paso 1 «Repaso en Español»: «Él», «Ella», «Nosotros», «Juan… Él…»),
          en el lado en:'' repite esas palabras/ejemplos TAL CUAL en español; solo traduce la prosa que los rodea.
        · 'tr' (botón 🌐 traducción por pregunta): ponlo SOLO en auto-chequeos donde una oración en inglés
          tenga vocabulario que pueda frenar al alumno Y la traducción NO delate la respuesta. En drills de
          pronombres la pista ya está en la pregunta y se infiere por el verbo be → NO lleva 'tr' (por eso aquí
          no hay ninguno). Sí aplica en temas como To be / There is_are con frases más largas. Sintaxis:
          { q:{...}, opts:{...}, correct:0, fb:{...}, tr:{es:'significado en español',en:'meaning in English'} }
     3) Deja el conector antes de </body>. catalogo.json → type:"summary".
     El motor (debajo de "FIN DEL MOTOR") no se toca. ═══ -->

<script>
/* ═══ METADATOS ═══ */
const MAT = { title:{es:'Resumen de Gramática',en:'Grammar Summary'}, subtitle:{es:'El Espectro de la Obligación',en:'The Obligation Spectrum'}, reportId:'sum-obligation-spectrum' };
const PASS = 75;
const STEPS = [
  { icon:'🇪🇸', title:{es:'Repaso en Español',en:'Spanish Recap'},
    html:{
      es:`<div class="gdesc">En español tienes una escala según la fuerza de la regla: desde <b>«tienes que»</b> (obligatorio) hasta <b>«no es necesario»</b>, pasando por <b>«deberías»</b> (consejo) y <b>«está prohibido»</b>.</div>
        <div class="art-hero three"><div class="art-box"><div class="word">tienes que</div><div class="role">Obligatorio 🔴</div><div class="desc">«Tienes que pagar el recibo.»</div></div><div class="art-box"><div class="word">deberías</div><div class="role">Consejo 🟡</div><div class="desc">«Deberías llegar temprano.»</div></div><div class="art-box"><div class="word">no es necesario</div><div class="role">Libre 🟢</div><div class="desc">«No es necesario que vengas.»</div></div></div>
        ${ii('🚫','Aparte está la <b>prohibición</b>: «No debes / está prohibido» = NO lo hagas.')}
        <div class="gnote life">🌎 <b>De tu vida:</b> «Tienes que llevar DNI» (obligatorio) ≠ «No es necesario llevar efectivo» (libre) ≠ «No debes fumar aquí» (prohibido). ¡Son tres ideas distintas!</div>`,
      en:`<div class="gdesc">In Spanish you have a scale by how strong the rule is: from <b>«tienes que»</b> (mandatory) to <b>«no es necesario»</b>, passing through <b>«deberías»</b> (advice) and <b>«está prohibido»</b>.</div>
        <div class="art-hero three"><div class="art-box"><div class="word">tienes que</div><div class="role">Mandatory 🔴</div><div class="desc">«Tienes que pagar el recibo.»</div></div><div class="art-box"><div class="word">deberías</div><div class="role">Advice 🟡</div><div class="desc">«Deberías llegar temprano.»</div></div><div class="art-box"><div class="word">no es necesario</div><div class="role">Free 🟢</div><div class="desc">«No es necesario que vengas.»</div></div></div>
        ${ii('🚫','Separately there is <b>prohibition</b>: «No debes / está prohibido» = do NOT do it.')}
        <div class="gnote life">🌎 <b>From your life:</b> «Tienes que llevar DNI» (mandatory) ≠ «No es necesario llevar efectivo» (free) ≠ «No debes fumar aquí» (forbidden). Three different ideas!</div>`
    },
    checks:[
      { q:{es:'«Tienes que pagar» expresa:',en:'«Tienes que pagar» expresses:'}, opts:{es:['Obligación','Consejo'],en:['Obligation','Advice']}, correct:0, fb:{ why:{es:'Es obligatorio.',en:'It is mandatory.'}, tip:{es:'tienes que = obligación',en:'tienes que = obligation'}} },
      { q:{es:'«Deberías descansar» expresa:',en:'«Deberías descansar» expresses:'}, opts:{es:['Consejo','Prohibición'],en:['Advice','Prohibition']}, correct:0, fb:{ why:{es:'Es una recomendación, no una orden.',en:'A recommendation, not an order.'}, tip:{es:'deberías = consejo',en:'deberías = advice'}} },
      { q:{es:'«No debes fumar aquí» expresa:',en:'«No debes fumar aquí» expresses:'}, opts:{es:['Prohibición','Que es opcional'],en:['Prohibition','That it is optional']}, correct:0, fb:{ why:{es:'Está prohibido.',en:'It is forbidden.'}, tip:{es:'no debes = prohibido',en:'no debes = forbidden'}} },
      { q:{es:'«No es necesario venir» expresa:',en:'«No es necesario venir» expresses:'}, opts:{es:['Que es libre/opcional','Que está prohibido'],en:['That it is free/optional','That it is forbidden']}, correct:0, fb:{ why:{es:'Puedes venir o no; no hay obligación.',en:'You may come or not; no obligation.'}, tip:{es:'no necesario ≠ prohibido',en:'not necessary ≠ forbidden'}} },
      { q:{es:'«Prohibido» y «no es necesario»…',en:'«Forbidden» and «not necessary»…'}, opts:{es:['Son ideas distintas','Significan lo mismo'],en:['Are different ideas','Mean the same']}, correct:0, fb:{ why:{es:'Prohibido = no puedes; no necesario = puedes elegir.',en:'Forbidden = you can\'t; not necessary = your choice.'}, tip:{es:'¡no confundir!',en:'don\'t mix them!'}} }
    ] },
  { icon:'🤝', title:{es:'Similitudes',en:'Similarities'},
    html:{
      es:`<div class="gdesc">El inglés tiene un modal para cada punto de la escala, y todos van con el verbo en <b>forma base</b>.</div>
        <div class="vs-grid">
          <div class="vs-row"><div class="vs-side es"><span class="flag">tienes que</span>Tienes que pagar</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">must / have to</span>You <b>must pay</b> / have to pay</div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">deberías</span>Deberías descansar</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">should</span>You <b>should rest</b></div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">no debes</span>No debes fumar</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">mustn't</span>You <b>mustn't smoke</b></div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">no es necesario</span>No es necesario ir</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">don't have to</span>You <b>don't have to</b> go</div></div>
        </div>
        ${eg('You <span class="tag s">should drink</span> more water.','Deberías tomar más agua. (consejo)','ok')}
        ${eg('You <span class="tag s">must wear</span> a seatbelt.','Tienes que usar cinturón. (obligación)','ok')}
        <div class="sec-label">Lo igual en los dos idiomas</div>
        <ul class="simlist"><li>Los dos tienen una escala: obligación · consejo · prohibición · libre.</li><li>Después del modal va el verbo en <b>base</b>: must <b>pay</b>, should <b>rest</b>.</li><li>«should» = «deberías» casi exacto.</li></ul>
        <div class="gnote">👍 must/have to = tienes que · should = deberías · mustn\'t = no debes · don\'t have to = no es necesario.</div>`,
      en:`<div class="gdesc">English has a modal for each point of the scale, and they all take the verb in its <b>base form</b>.</div>
        <div class="vs-grid">
          <div class="vs-row"><div class="vs-side es"><span class="flag">tienes que</span>Tienes que pagar</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">must / have to</span>You <b>must pay</b> / have to pay</div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">deberías</span>Deberías descansar</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">should</span>You <b>should rest</b></div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">no debes</span>No debes fumar</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">mustn't</span>You <b>mustn't smoke</b></div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">no es necesario</span>No es necesario ir</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">don't have to</span>You <b>don't have to</b> go</div></div>
        </div>
        ${eg('You <span class="tag s">should drink</span> more water.','You should drink more water. (advice)','ok')}
        ${eg('You <span class="tag s">must wear</span> a seatbelt.','You must wear a seatbelt. (obligation)','ok')}
        <div class="sec-label">What is the same in both languages</div>
        <ul class="simlist"><li>Both have a scale: obligation · advice · prohibition · free.</li><li>After the modal comes the <b>base</b> verb: must <b>pay</b>, should <b>rest</b>.</li><li>«should» = «deberías» almost exactly.</li></ul>
        <div class="gnote">👍 must/have to = tienes que · should = deberías · mustn\'t = no debes · don\'t have to = no es necesario.</div>`
    },
    checks:[
      { q:{es:'«Deberías descansar» en inglés:',en:'«Deberías descansar» in English:'}, opts:{es:['You should rest','You must rest'],en:['You should rest','You must rest']}, correct:0, fb:{ why:{es:'«should» = consejo, como «deberías».',en:'«should» = advice, like «deberías».'}, ex:{es:'You should rest → Deberías descansar',en:'You should rest'}, tip:{es:'deberías → should',en:'deberías → should'}}, tr:{es:'Deberías descansar.',en:'You should rest.'} },
      { q:{es:'«Tienes que pagar» en inglés:',en:'«Tienes que pagar» in English:'}, opts:{es:['You have to pay','You should pay'],en:['You have to pay','You should pay']}, correct:0, fb:{ why:{es:'Obligación → have to / must.',en:'Obligation → have to / must.'}, ex:{es:'You have to pay → Tienes que pagar',en:'You have to pay'}, tip:{es:'tienes que → have to/must',en:'tienes que → have to/must'}}, tr:{es:'Tienes que pagar.',en:'You have to pay.'} },
      { q:{es:'Después del modal, el verbo va en:',en:'After the modal, the verb is in:'}, opts:{es:['Forma base (pay, rest)','-ing (paying)'],en:['Base form (pay, rest)','-ing (paying)']}, correct:0, fb:{ why:{es:'Modal + base: must pay, should go.',en:'Modal + base: must pay, should go.'}, ex:{es:'should go, must pay',en:'should go, must pay'}, tip:{es:'modal + base',en:'modal + base'}} },
      { q:{es:'«No debes fumar» (prohibido) en inglés:',en:'«No debes fumar» (forbidden) in English:'}, opts:{es:['You mustn\'t smoke','You don\'t have to smoke'],en:['You mustn\'t smoke','You don\'t have to smoke']}, correct:0, fb:{ why:{es:'Prohibición → mustn\'t.',en:'Prohibition → mustn\'t.'}, ex:{es:'mustn\'t smoke → no debes fumar',en:'mustn\'t smoke'}, tip:{es:'prohibido → mustn\'t',en:'forbidden → mustn\'t'}}, tr:{es:'No debes fumar.',en:'You mustn\'t smoke.'} },
      { q:{es:'«No es necesario venir» en inglés:',en:'«No es necesario venir» in English:'}, opts:{es:['You don\'t have to come','You mustn\'t come'],en:['You don\'t have to come','You mustn\'t come']}, correct:0, fb:{ why:{es:'Falta de obligación → don\'t have to.',en:'No obligation → don\'t have to.'}, ex:{es:'don\'t have to come → no es necesario venir',en:'don\'t have to come'}, tip:{es:'opcional → don\'t have to',en:'optional → don\'t have to'}}, tr:{es:'No es necesario que vengas.',en:'You don\'t have to come.'} }
    ] },
  { icon:'⚡', title:{es:'Diferencias',en:'Differences'},
    html:{
      es:`<div class="gdesc">El error que cuesta puntos en todo examen: <b>mustn\'t ≠ don\'t have to</b>. Parecen lo mismo, pero son opuestos.</div>
        <table class="dtab"><tr><th>Inglés</th><th>Significa</th><th>Idea</th></tr>
          <tr><td class="en">You mustn't park here</td><td>No debes / prohibido</td><td>🚫 NO lo hagas</td></tr>
          <tr><td class="en">You don't have to park here</td><td>No es necesario</td><td>🟢 Puedes elegir</td></tr>
        </table>
        <div class="sec-label">⚠️ La negativa cambia el significado por completo</div>
        ${ii('🚫','<b>mustn\'t</b> = está prohibido, hay una regla en contra.')}
        ${ii('🟢','<b>don\'t have to</b> = no hay obligación; si quieres, lo haces; si no, también está bien.')}
        ${eg('You <span class="tag s">mustn\'t</span> be late.','No debes llegar tarde. (prohibido)','ok')}
        ${eg('You <span class="tag s">don\'t have to</span> bring food.','No es necesario traer comida. (opcional)','ok')}
        ${eg('You mustn\'t bring food (= no es necesario).','«mustn\'t» NO es «no es necesario».','bad')}
        <div class="gnote">📍 Otro detalle: <b>have to</b> sí cambia con la persona → he/she <b>has to</b>. Los modales (must, should) NO cambian.</div>`,
      en:`<div class="gdesc">The error that costs points on every exam: <b>mustn\'t ≠ don\'t have to</b>. They look alike, but they're opposites.</div>
        <table class="dtab"><tr><th>English</th><th>Means</th><th>Idea</th></tr>
          <tr><td class="en">You mustn't park here</td><td>No debes / forbidden</td><td>🚫 do NOT do it</td></tr>
          <tr><td class="en">You don't have to park here</td><td>No es necesario</td><td>🟢 your choice</td></tr>
        </table>
        <div class="sec-label">⚠️ The negative flips the meaning completely</div>
        ${ii('🚫','<b>mustn\'t</b> = it is forbidden, there is a rule against it.')}
        ${ii('🟢','<b>don\'t have to</b> = no obligation; do it if you want, or don\'t — both are fine.')}
        ${eg('You <span class="tag s">mustn\'t</span> be late.','You mustn\'t be late. (forbidden)','ok')}
        ${eg('You <span class="tag s">don\'t have to</span> bring food.','You don\'t have to bring food. (optional)','ok')}
        ${eg('You mustn\'t bring food (= not necessary).','«mustn\'t» is NOT «not necessary».','bad')}
        <div class="gnote">📍 Another detail: <b>have to</b> does change with the person → he/she <b>has to</b>. Modals (must, should) do NOT change.</div>`
    },
    checks:[
      { q:{es:'«You mustn\'t park here» significa:',en:'«You mustn\'t park here» means:'}, opts:{es:['Está prohibido estacionar','No es necesario estacionar'],en:['Parking is forbidden','You don\'t need to park']}, correct:0, fb:{ why:{es:'«mustn\'t» = prohibición.',en:'«mustn\'t» = prohibition.'}, contrast:{es:'No es «no es necesario».',en:'Not «not necessary».'}, ex:{es:'mustn\'t park → no debes estacionar',en:'mustn\'t park'}, tip:{es:'mustn\'t = prohibido',en:'mustn\'t = forbidden'}}, tr:{es:'No debes estacionar aquí.',en:'You mustn\'t park here.'} },
      { q:{es:'«You don\'t have to pay» significa:',en:'«You don\'t have to pay» means:'}, opts:{es:['No es necesario pagar','Está prohibido pagar'],en:['You don\'t need to pay','Paying is forbidden']}, correct:0, fb:{ why:{es:'Falta de obligación, no prohibición.',en:'No obligation, not prohibition.'}, ex:{es:'don\'t have to pay → no es necesario pagar',en:'don\'t have to pay'}, tip:{es:'don\'t have to = opcional',en:'don\'t have to = optional'}}, tr:{es:'No es necesario pagar.',en:'You don\'t have to pay.'} },
      { q:{es:'«He ___ wear a uniform.» (obligación, 3.ª persona):',en:'«He ___ wear a uniform.» (obligation, 3rd person):'}, opts:{es:['has to','have to'],en:['has to','have to']}, correct:0, fb:{ why:{es:'«have to» cambia con he/she → has to.',en:'«have to» changes with he/she → has to.'}, ex:{es:'He has to wear → Él tiene que usar',en:'He has to wear'}, tip:{es:'he/she → has to',en:'he/she → has to'}}, tr:{es:'Él tiene que usar uniforme.',en:'He has to wear a uniform.'} },
      { q:{es:'¿Cuál es prohibición?',en:'Which one is a prohibition?'}, opts:{es:['You mustn\'t touch it','You don\'t have to touch it'],en:['You mustn\'t touch it','You don\'t have to touch it']}, correct:0, fb:{ why:{es:'mustn\'t = no lo hagas (prohibido).',en:'mustn\'t = don\'t do it (forbidden).'}, ex:{es:'mustn\'t touch → no debes tocar',en:'mustn\'t touch'}, tip:{es:'prohibido → mustn\'t',en:'forbidden → mustn\'t'}} },
      { q:{es:'«Should» en 3.ª persona (he):',en:'«Should» in 3rd person (he):'}, opts:{es:['He should rest (no cambia)','He shoulds rest'],en:['He should rest (no change)','He shoulds rest']}, correct:0, fb:{ why:{es:'Los modales no llevan «-s».',en:'Modals don\'t take «-s».'}, ex:{es:'He should rest → Él debería descansar',en:'He should rest'}, tip:{es:'modal → sin «-s»',en:'modal → no «-s»'}} }
    ] },
  { icon:'💡', title:{es:'Tips Prácticos',en:'Practical Tips'},
    html:{
      es:`<div class="gdesc">El espectro completo, de la regla más fuerte a la libertad total:</div>
        <div class="fbox"><div class="frm"><span class="pill o">mustn\'t</span><span class="plus">🚫</span><span class="pill s">must/have to</span><span class="plus">🔴</span><span class="pill v">should</span><span class="plus">🟡</span><span class="pill p">don\'t have to</span><span class="plus">🟢</span></div><div class="fex">prohibido · obligatorio · recomendado · libre</div></div>
        ${ii('🧭','<b>Tip 1 — Ubícalo en la escala:</b> ¿hay una regla en contra? mustn\'t. ¿es obligatorio? must/have to. ¿es buen consejo? should. ¿es opcional? don\'t have to.')}
        ${ii('🔁','<b>Tip 2 — Las dos negativas:</b> mustn\'t = prohibido · don\'t have to = no necesario. NO son lo mismo.')}
        ${ii('👤','<b>Tip 3 — have to cambia, los modales no:</b> he <b>has to</b> · he <b>should</b> · he <b>must</b>.')}
        <div class="alert-card"><div class="atitle">⚠️ Error típico</div><p>❌ «You don\'t must come» → ✅ «You <b>don\'t have to</b> come» (must no tiene «don\'t»; usa have to).</p></div>`,
      en:`<div class="gdesc">The full spectrum, from the strongest rule to total freedom:</div>
        <div class="fbox"><div class="frm"><span class="pill o">mustn\'t</span><span class="plus">🚫</span><span class="pill s">must/have to</span><span class="plus">🔴</span><span class="pill v">should</span><span class="plus">🟡</span><span class="pill p">don\'t have to</span><span class="plus">🟢</span></div><div class="fex">forbidden · mandatory · advised · free</div></div>

  if(pass){ document.getElementById('medalEm').textContent=BADGE.emoji; document.getElementById('surT').textContent=t.surT; document.getElementById('surBadge').textContent=t.surBadge(BADGE.name[info]); document.getElementById('surP').textContent=t.surP; document.getElementById('xpWin').textContent=t.xp(BADGE.xp); }
  try{ window.dispatchEvent(new CustomEvent('jucum:done',{detail:{score:pct, pass:pass, type:'summary', badge:BADGE.name.en, xp:BADGE.xp, mat:MAT.reportId, final:true}})); }catch(e){}
  window.scrollTo({top:0,behavior:'smooth'}); }
function restart(){ render(); }
function openHelp(){document.getElementById('helpov').classList.add('show');} function closeHelp(){document.getElementById('helpov').classList.remove('show');}
function setInfo(l){ info=l; applyLang(); }
function setLevel(lv){ document.getElementById('screen').setAttribute('data-level',lv); info= lv==='a2'?'en':'es'; render(); }
function volver(){ if(document.referrer){ location.href=document.referrer; } else if(history.length>1){ history.back(); } else { toast(info==='es'?'Vuelve a tu práctica en la plataforma':'Go back to your practice'); } }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2600); }
document.addEventListener('contextmenu',e=>{ if(e.target.closest('.mat')){ e.preventDefault(); toast(info==='es'?'Material protegido © JUCUM EC':'Protected material © JUCUM EC'); }});
try{ speechSynthesis.getVoices(); speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices(); }catch(e){}
/* FIN DEL MOTOR */
setLevel(document.getElementById('screen').getAttribute('data-level')||'pre-a1');
