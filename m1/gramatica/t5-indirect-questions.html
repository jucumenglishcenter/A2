<script>
/* ═══ METADATOS ═══ */
const MAT = { title:{es:'Resumen de Gramática',en:'Grammar Summary'}, subtitle:{es:'Preguntas Indirectas',en:'Indirect Questions'}, reportId:'sum-indirect-questions' };
const PASS = 75;
const STEPS = [
  { icon:'🇪🇸', title:{es:'Repaso en Español',en:'Spanish Recap'},
    html:{
      es:`<div class="gdesc">Cuando quieres ser <b>más amable</b>, no preguntas directo: envuelves la pregunta dentro de una frase cortés.</div>
        <div class="art-hero"><div class="art-box"><div class="word">Directa</div><div class="role">Más seca</div><div class="desc">«¿Dónde está el banco?»</div></div><div class="art-box"><div class="word">Indirecta</div><div class="role">Más cortés 🙏</div><div class="desc">«¿Me puede decir dónde está el banco?»</div></div></div>
        ${ii('🙏','La pregunta «real» queda <b>dentro</b>: «… dónde está el banco».')}
        ${ii('🚪','Se abre con una fórmula cortés: «¿Me puede decir…?», «¿Sabe usted…?», «Disculpe, ¿sabe…?».')}
        <div class="gnote life">🌎 <b>De tu vida:</b> a un desconocido no le dices «¿Qué hora es?» a secas; dices «Disculpe, ¿sabe qué hora es?». En inglés pasa igual y además cambia el orden.</div>`,
      en:`<div class="gdesc">When you want to be <b>more polite</b>, you don't ask directly: you wrap the question inside a courteous phrase.</div>
        <div class="art-hero"><div class="art-box"><div class="word">Directa</div><div class="role">Blunter</div><div class="desc">«¿Dónde está el banco?»</div></div><div class="art-box"><div class="word">Indirecta</div><div class="role">More polite 🙏</div><div class="desc">«¿Me puede decir dónde está el banco?»</div></div></div>
        ${ii('🙏','The «real» question stays <b>inside</b>: «… dónde está el banco».')}
        ${ii('🚪','It opens with a polite formula: «¿Me puede decir…?», «¿Sabe usted…?», «Disculpe, ¿sabe…?».')}
        <div class="gnote life">🌎 <b>From your life:</b> to a stranger you don't say a blunt «¿Qué hora es?»; you say «Disculpe, ¿sabe qué hora es?». English does the same, and it also changes the word order.</div>`
    },
    checks:[
      { q:{es:'Una pregunta indirecta es:',en:'An indirect question is:'}, opts:{es:['Una pregunta envuelta en una frase cortés','Una orden'],en:['A question wrapped in a polite phrase','An order']}, correct:0, fb:{ why:{es:'La pregunta va dentro de una fórmula amable.',en:'The question goes inside a polite formula.'}, tip:{es:'más cortés',en:'more polite'}} },
      { q:{es:'«¿Me puede decir dónde está el baño?» es:',en:'«¿Me puede decir dónde está el baño?» is:'}, opts:{es:['Indirecta (cortés)','Directa'],en:['Indirect (polite)','Direct']}, correct:0, fb:{ why:{es:'Abre con «¿Me puede decir…?».',en:'It opens with «¿Me puede decir…?».'}, tip:{es:'envoltura cortés',en:'polite wrapper'}} },
      { q:{es:'¿Para qué sirven?',en:'What are they for?'}, opts:{es:['Sonar más amables/formales','Ahorrar palabras'],en:['Sound more polite/formal','Save words']}, correct:0, fb:{ why:{es:'Suavizan la pregunta.',en:'They soften the question.'}, tip:{es:'cortesía',en:'politeness'}} },
      { q:{es:'La pregunta real, en una indirecta, queda:',en:'In an indirect question, the real question is:'}, opts:{es:['Dentro de la frase','Al inicio'],en:['Inside the phrase','At the start']}, correct:0, fb:{ why:{es:'Va incrustada después de la fórmula.',en:'It is embedded after the formula.'}, tip:{es:'dentro',en:'inside'}} },
      { q:{es:'¿Cuál suena más cortés con un desconocido?',en:'Which sounds more polite to a stranger?'}, opts:{es:['¿Sabe dónde está la estación?','¿Dónde está la estación?'],en:['¿Sabe dónde está la estación?','¿Dónde está la estación?']}, correct:0, fb:{ why:{es:'La envoltura «¿Sabe…?» suaviza.',en:'The «¿Sabe…?» wrapper softens it.'}, tip:{es:'envoltura = cortesía',en:'wrapper = politeness'}} }
    ] },
  { icon:'🤝', title:{es:'Similitudes',en:'Similarities'},
    html:{
      es:`<div class="gdesc">El inglés usa las mismas aperturas corteses, y la pregunta real va dentro.</div>
        <div class="viz-grid"><div class="viz-item"><span class="ico">🙏</span><span class="lbl">Could you tell me…</span><span class="es">¿Me puede decir…?</span></div><div class="viz-item"><span class="ico">🤔</span><span class="lbl">Do you know…</span><span class="es">¿Sabe…?</span></div><div class="viz-item"><span class="ico">❓</span><span class="lbl">I wonder…</span><span class="es">Me pregunto…</span></div></div>
        ${eg('<span class="tag s">Could you tell me</span> where the bank is?','¿Me puede decir dónde está el banco?','ok')}
        ${eg('<span class="tag s">Do you know</span> what time it is?','¿Sabe qué hora es?','ok')}
        <div class="sec-label">Lo igual en los dos idiomas</div>
        <ul class="simlist"><li>Los dos abren con una fórmula cortés.</li><li>Los dos meten la pregunta <b>dentro</b> de la frase.</li><li>Los dos se usan con desconocidos o en situaciones formales.</li></ul>
        <div class="gnote">👍 Could you tell me… = ¿Me puede decir… · Do you know… = ¿Sabe… Solo falta cuidar el orden (siguiente paso).</div>`,
      en:`<div class="gdesc">English uses the same polite openers, and the real question goes inside.</div>
        <div class="viz-grid"><div class="viz-item"><span class="ico">🙏</span><span class="lbl">Could you tell me…</span><span class="es">¿Me puede decir…?</span></div><div class="viz-item"><span class="ico">🤔</span><span class="lbl">Do you know…</span><span class="es">¿Sabe…?</span></div><div class="viz-item"><span class="ico">❓</span><span class="lbl">I wonder…</span><span class="es">Me pregunto…</span></div></div>
        ${eg('<span class="tag s">Could you tell me</span> where the bank is?','Could you tell me where the bank is?','ok')}
        ${eg('<span class="tag s">Do you know</span> what time it is?','Do you know what time it is?','ok')}
        <div class="sec-label">What is the same in both languages</div>
        <ul class="simlist"><li>Both open with a polite formula.</li><li>Both put the question <b>inside</b> the phrase.</li><li>Both are used with strangers or in formal situations.</li></ul>
        <div class="gnote">👍 Could you tell me… = ¿Me puede decir… · Do you know… = ¿Sabe… Just mind the word order (next step).</div>`
    },
    checks:[
      { q:{es:'«¿Me puede decir…?» en inglés:',en:'«¿Me puede decir…?» in English:'}, opts:{es:['Could you tell me…','Tell me now'],en:['Could you tell me…','Tell me now']}, correct:0, fb:{ why:{es:'Apertura cortés estándar.',en:'Standard polite opener.'}, ex:{es:'Could you tell me… → ¿Me puede decir…',en:'Could you tell me…'}, tip:{es:'cortés → Could you tell me',en:'polite → Could you tell me'}} },
      { q:{es:'«¿Sabe…?» en inglés:',en:'«¿Sabe…?» in English:'}, opts:{es:['Do you know…','Know you…'],en:['Do you know…','Know you…']}, correct:0, fb:{ why:{es:'«Do you know…» abre la indirecta.',en:'«Do you know…» opens the indirect question.'}, ex:{es:'Do you know where… → ¿Sabe dónde…',en:'Do you know where…'}, tip:{es:'¿Sabe…? → Do you know…',en:'¿Sabe…? → Do you know…'}} },
      { q:{es:'La pregunta real va:',en:'The real question goes:'}, opts:{es:['Dentro de la frase','Antes de la apertura'],en:['Inside the phrase','Before the opener']}, correct:0, fb:{ why:{es:'Se incrusta tras la fórmula cortés.',en:'It embeds after the polite formula.'}, tip:{es:'dentro',en:'inside'}} },
      { q:{es:'«I wonder…» significa:',en:'«I wonder…» means:'}, opts:{es:['Me pregunto…','Me alegro…'],en:['Me pregunto…','Me alegro…']}, correct:0, fb:{ why:{es:'«I wonder» = me pregunto (suave).',en:'«I wonder» = me pregunto (soft).'}, ex:{es:'I wonder where she is → Me pregunto dónde está',en:'I wonder where she is'}, tip:{es:'I wonder = me pregunto',en:'I wonder = I wonder'}}, tr:{es:'Me pregunto dónde está ella.',en:'I wonder where she is.'} },
      { q:{es:'¿Cuándo se usan más?',en:'When are they used most?'}, opts:{es:['Con desconocidos o en situaciones formales','Solo con amigos'],en:['With strangers or formal situations','Only with friends']}, correct:0, fb:{ why:{es:'Suenan más corteses.',en:'They sound more polite.'}, tip:{es:'formal/cortés',en:'formal/polite'}} }
    ] },
  { icon:'⚡', title:{es:'Diferencias',en:'Differences'},
    html:{
      es:`<div class="gdesc">El gran cambio del inglés: dentro de la indirecta, el orden vuelve a ser el de una <b>afirmación</b> (sujeto + verbo) y <b>desaparece el «do/does/did»</b>.</div>
        <table class="dtab"><tr><th>Pregunta directa</th><th>Dentro de la indirecta</th></tr>
          <tr><td class="en">Where is the bank?</td><td>… where the bank <b>is</b></td></tr>
          <tr><td class="en">What time is it?</td><td>… what time <b>it is</b></td></tr>
          <tr><td class="en">Where does he live?</td><td>… where he <b>lives</b></td></tr>
        </table>
        <div class="sec-label">⚠️ Dos cambios clave</div>
        ${ii('🔄','<b>1) Sin inversión:</b> el sujeto va ANTES del verbo, como en una afirmación: «where the bank <b>is</b>», no «where is the bank».')}
        ${ii('🚫','<b>2) Sin do/does/did:</b> «where he <b>lives</b>», no «where does he live».')}
        <div class="sec-label">Preguntas de sí/no → if / whether</div>
        ${ii('❔','Si la pregunta directa es de sí/no, dentro usas <b>if</b> o <b>whether</b>: «Is the shop open?» → «Do you know <b>if</b> the shop is open?».')}
        ${eg('Do you know where he <span class="tag s">lives</span>?','¿Sabe dónde vive? (he lives, sin «does»)','ok')}
        ${eg('Do you know where does he live?','Dentro NO va «does»: «where he lives».','bad')}
        <div class="gnote">📍 Resumen: apertura cortés + (palabra de pregunta / if) + <b>sujeto + verbo</b> (sin do/does/did, sin inversión).</div>`,
      en:`<div class="gdesc">English's big change: inside the indirect question, the order goes back to a <b>statement</b> (subject + verb) and the <b>«do/does/did» disappears</b>.</div>
        <table class="dtab"><tr><th>Direct question</th><th>Inside the indirect</th></tr>
          <tr><td class="en">Where is the bank?</td><td>… where the bank <b>is</b></td></tr>
          <tr><td class="en">What time is it?</td><td>… what time <b>it is</b></td></tr>
          <tr><td class="en">Where does he live?</td><td>… where he <b>lives</b></td></tr>
        </table>
        <div class="sec-label">⚠️ Two key changes</div>
        ${ii('🔄','<b>1) No inversion:</b> the subject goes BEFORE the verb, like a statement: «where the bank <b>is</b>», not «where is the bank».')}
        ${ii('🚫','<b>2) No do/does/did:</b> «where he <b>lives</b>», not «where does he live».')}
        <div class="sec-label">Yes/no questions → if / whether</div>
        ${ii('❔','If the direct question is yes/no, inside you use <b>if</b> or <b>whether</b>: «Is the shop open?» → «Do you know <b>if</b> the shop is open?».')}
        ${eg('Do you know where he <span class="tag s">lives</span>?','Do you know where he lives? (he lives, no «does»)','ok')}
        ${eg('Do you know where does he live?','Inside there is NO «does»: «where he lives».','bad')}
        <div class="gnote">📍 Summary: polite opener + (question word / if) + <b>subject + verb</b> (no do/does/did, no inversion).</div>`
    },
    checks:[
      { q:{es:'«Do you know where he ___?» (vivir):',en:'«Do you know where he ___?» (live):'}, opts:{es:['lives','does live'],en:['lives','does live']}, correct:0, fb:{ why:{es:'Dentro no hay «does»: orden de afirmación.',en:'No «does» inside: statement order.'}, contrast:{es:'No «where does he live» dentro.',en:'Not «where does he live» inside.'}, ex:{es:'where he lives → dónde vive',en:'where he lives'}, tip:{es:'sin do/does/did',en:'no do/does/did'}}, tr:{es:'¿Sabe dónde vive?',en:'Do you know where he lives?'} },
      { q:{es:'«Could you tell me what time ___?»',en:'«Could you tell me what time ___?»'}, opts:{es:['it is','is it'],en:['it is','is it']}, correct:0, fb:{ why:{es:'Sin inversión: «it is».',en:'No inversion: «it is».'}, contrast:{es:'«what time is it» es directa.',en:'«what time is it» is direct.'}, ex:{es:'what time it is → qué hora es',en:'what time it is'}, tip:{es:'sujeto + verbo',en:'subject + verb'}}, tr:{es:'¿Me puede decir qué hora es?',en:'Could you tell me what time it is?'} },
      { q:{es:'Pregunta de sí/no → dentro usas:',en:'Yes/no question → inside you use:'}, opts:{es:['if / whether','that'],en:['if / whether','that']}, correct:0, fb:{ why:{es:'«if/whether» conecta una pregunta de sí/no.',en:'«if/whether» links a yes/no question.'}, ex:{es:'if the shop is open → si la tienda está abierta',en:'if the shop is open'}, tip:{es:'sí/no → if/whether',en:'yes/no → if/whether'}} },
      { q:{es:'«Is the shop open?» → indirecta:',en:'«Is the shop open?» → indirect:'}, opts:{es:['Do you know if the shop is open?','Do you know is the shop open?'],en:['Do you know if the shop is open?','Do you know is the shop open?']}, correct:0, fb:{ why:{es:'if + sujeto + verbo, sin inversión.',en:'if + subject + verb, no inversion.'}, ex:{es:'if the shop is open → si la tienda está abierta',en:'if the shop is open'}, tip:{es:'if + S + V',en:'if + S + V'}}, tr:{es:'¿Sabe si la tienda está abierta?',en:'Do you know if the shop is open?'} },
      { q:{es:'¿Cuál es correcto?',en:'Which one is correct?'}, opts:{es:['I wonder where she works','I wonder where does she work'],en:['I wonder where she works','I wonder where does she work']}, correct:0, fb:{ why:{es:'Dentro: «where she works» (sin does).',en:'Inside: «where she works» (no does).'}, ex:{es:'where she works → dónde trabaja',en:'where she works'}, tip:{es:'sin does',en:'no does'}} }
    ] },
  { icon:'💡', title:{es:'Tips Prácticos',en:'Practical Tips'},
    html:{
      es:`<div class="gdesc">La receta para transformar cualquier pregunta directa en indirecta:</div>
        <div class="fbox"><div class="frm"><span class="pill s">Apertura cortés</span><span class="plus">+</span><span class="pill v">palabra de pregunta / if</span><span class="plus">+</span><span class="pill o">sujeto + verbo</span></div><div class="fex">Could you tell me <span class="v">where</span> <span class="o">the station is</span>?</div></div>
        ${ii('1️⃣','<b>Tip 1 — Elige la apertura:</b> Could you tell me… / Do you know… / I wonder…')}
        ${ii('2️⃣','<b>Tip 2 — Quita la inversión y el «do»:</b> «Where does she live?» → «… where she <b>lives</b>».')}
        ${ii('3️⃣','<b>Tip 3 — ¿Es de sí/no?</b> mete «if»: «Is it far?» → «Do you know <b>if</b> it is far?».')}
        <div class="alert-card"><div class="atitle">⚠️ Error típico</div><p>❌ «Do you know where is the bank?» → ✅ «Do you know where the bank <b>is</b>?» (sujeto antes del verbo).</p></div>`,
      en:`<div class="gdesc">The recipe to turn any direct question into an indirect one:</div>
        <div class="fbox"><div class="frm"><span class="pill s">Polite opener</span><span class="plus">+</span><span class="pill v">question word / if</span><span class="plus">+</span><span class="pill o">subject + verb</span></div><div class="fex">Could you tell me <span class="v">where</span> <span class="o">the station is</span>?</div></div>
        ${ii('1️⃣','<b>Tip 1 — Pick the opener:</b> Could you tell me… / Do you know… / I wonder…')}
        ${ii('2️⃣','<b>Tip 2 — Drop the inversion and the «do»:</b> «Where does she live?» → «… where she <b>lives</b>».')}
        ${ii('3️⃣','<b>Tip 3 — Is it yes/no?</b> add «if»: «Is it far?» → «Do you know <b>if</b> it is far?».')}
        <div class="alert-card"><div class="atitle">⚠️ Common mistake</div><p>❌ «Do you know where is the bank?» → ✅ «Do you know where the bank <b>is</b>?» (subject before the verb).</p></div>`
    },
    checks:[

function setInfo(l){ info=l; applyLang(); }
function setLevel(lv){ document.getElementById('screen').setAttribute('data-level',lv); info= lv==='a2'?'en':'es'; render(); }
function volver(){ if(document.referrer){ location.href=document.referrer; } else if(history.length>1){ history.back(); } else { toast(info==='es'?'Vuelve a tu práctica en la plataforma':'Go back to your practice'); } }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2600); }
document.addEventListener('contextmenu',e=>{ if(e.target.closest('.mat')){ e.preventDefault(); toast(info==='es'?'Material protegido © JUCUM EC':'Protected material © JUCUM EC'); }});
try{ speechSynthesis.getVoices(); speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices(); }catch(e){}
/* FIN DEL MOTOR */
setLevel(document.getElementById('screen').getAttribute('data-level')||'pre-a1');
