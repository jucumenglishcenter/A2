<script>
/* ═══ METADATOS ═══ */
const MAT = { title:{es:'Resumen de Gramática',en:'Grammar Summary'}, subtitle:{es:'Present Perfect (have / has + participio)',en:'Present Perfect (have / has + past participle)'}, reportId:'sum-present-perfect' };
const PASS = 75;
const STEPS = [
  { icon:'🇪🇸', title:{es:'Repaso en Español',en:'Spanish Recap'},
    html:{
      es:`<div class="gdesc">¡Buenas noticias! En español <b>ya usas</b> este tiempo: «<b>he</b> comido», «<b>has</b> visto», «<b>ha</b> llegado». Es el pretérito perfecto.</div>
        <div class="art-hero"><div class="art-box"><div class="word">he visto</div><div class="role">Haber + participio</div><div class="desc">«He visto esa película.» — experiencia de vida.</div></div><div class="art-box"><div class="word">ha llegado</div><div class="role">Resultado ahora</div><div class="desc">«Ha llegado el paquete.» — pasado con efecto presente.</div></div></div>
        ${ii('🔗','Se forma con <b>«haber» + participio</b>: he/has/ha + comido, visto, hecho.')}
        ${ii('⏳','Conecta el <b>pasado con el ahora</b>: no dices cuándo exactamente; lo importante es el resultado o la experiencia.')}
        <div class="gnote life">🌎 <b>De tu vida:</b> «He estado en Cusco» (experiencia, no importa cuándo) o «He perdido las llaves» (y sigo sin ellas ahora).</div>`,
      en:`<div class="gdesc">Good news! In Spanish you <b>already use</b> this tense: «<b>he</b> comido», «<b>has</b> visto», «<b>ha</b> llegado». It's the «pretérito perfecto».</div>
        <div class="art-hero"><div class="art-box"><div class="word">he visto</div><div class="role">Haber + participle</div><div class="desc">«He visto esa película.» — life experience.</div></div><div class="art-box"><div class="word">ha llegado</div><div class="role">Result now</div><div class="desc">«Ha llegado el paquete.» — past with present effect.</div></div></div>
        ${ii('🔗','Formed with <b>«haber» + participle</b>: he/has/ha + comido, visto, hecho.')}
        ${ii('⏳','It links the <b>past with now</b>: you don\'t say exactly when; what matters is the result or the experience.')}
        <div class="gnote life">🌎 <b>From your life:</b> «He estado en Cusco» (experience, when doesn\'t matter) or «He perdido las llaves» (and I still don\'t have them now).</div>`
    },
    checks:[
      { q:{es:'«He comido» se forma con:',en:'«He comido» is formed with:'}, opts:{es:['Haber + participio','Solo el verbo en pasado'],en:['Haber + participle','Just the past verb']}, correct:0, fb:{ why:{es:'«he/has/ha» (haber) + participio.',en:'«he/has/ha» (haber) + participle.'}, tip:{es:'haber + participio',en:'haber + participle'}} },
      { q:{es:'«He estado en Cusco» pone el foco en:',en:'«He estado en Cusco» focuses on:'}, opts:{es:['La experiencia (no el cuándo)','La hora exacta'],en:['The experience (not the when)','The exact time']}, correct:0, fb:{ why:{es:'Importa que pasó, no cuándo.',en:'It matters that it happened, not when.'}, tip:{es:'experiencia de vida',en:'life experience'}} },
      { q:{es:'«Ha llegado el paquete» significa que el paquete…',en:'«Ha llegado el paquete» means the package…'}, opts:{es:['Está aquí ahora','Llegará mañana'],en:['Is here now','Will arrive tomorrow']}, correct:0, fb:{ why:{es:'El pasado tiene un resultado presente.',en:'The past has a present result.'}, tip:{es:'resultado ahora',en:'result now'}} },
      { q:{es:'Este tiempo conecta:',en:'This tense connects:'}, opts:{es:['El pasado con el presente','Dos futuros'],en:['The past with the present','Two futures']}, correct:0, fb:{ why:{es:'Pasado + efecto/relevancia ahora.',en:'Past + effect/relevance now.'}, tip:{es:'pasado ↔ ahora',en:'past ↔ now'}} },
      { q:{es:'«participio» de «comer» es:',en:'«participio» of «comer» is:'}, opts:{es:['comido','comí'],en:['comido','comí']}, correct:0, fb:{ why:{es:'El participio es «comido» (he comido).',en:'The participle is «comido» (he comido).'}, tip:{es:'-ado / -ido',en:'-ado / -ido'}} }
    ] },
  { icon:'🤝', title:{es:'Similitudes',en:'Similarities'},
    html:{
      es:`<div class="gdesc">El inglés lo arma igual: <b>have / has + participio pasado</b>. «haber» = have/has.</div>
        <div class="vs-grid">
          <div class="vs-row"><div class="vs-side es"><span class="flag">Español</span>He visitado Lima</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">English</span>I <b>have visited</b> Lima</div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">Español</span>Ella ha comido</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">English</span>She <b>has eaten</b></div></div>
        </div>
        <div class="sec-label">Participio: regulares vs irregulares</div>
        <table class="dtab"><tr><th>Base</th><th>Participio</th><th>Tipo</th></tr>
          <tr><td>visit</td><td class="en">visited</td><td>regular (+ed)</td></tr>
          <tr><td>work</td><td class="en">worked</td><td>regular (+ed)</td></tr>
          <tr><td>go</td><td class="en">gone</td><td>irregular</td></tr>
          <tr><td>see</td><td class="en">seen</td><td>irregular</td></tr>
          <tr><td>eat</td><td class="en">eaten</td><td>irregular</td></tr>
        </table>
        ${eg('I <span class="tag s">have seen</span> that movie.','He visto esa película. (experiencia)','ok')}
        <div class="sec-label">Lo igual en los dos idiomas</div>
        <ul class="simlist"><li>Mismo armado: «haber/have + participio».</li><li>Sirve para <b>experiencias</b> y para <b>resultados que siguen ahora</b>.</li><li>Con <b>I/you/we/they → have</b>; con <b>he/she/it → has</b> (como «ha»).</li></ul>
        <div class="gnote">👍 Si ya dices «he visto», en inglés es «I have seen». Solo memoriza los participios.</div>`,
      en:`<div class="gdesc">English builds it the same: <b>have / has + past participle</b>. «haber» = have/has.</div>
        <div class="vs-grid">
          <div class="vs-row"><div class="vs-side es"><span class="flag">Español</span>He visitado Lima</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">English</span>I <b>have visited</b> Lima</div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">Español</span>Ella ha comido</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">English</span>She <b>has eaten</b></div></div>
        </div>
        <div class="sec-label">Participle: regular vs irregular</div>
        <table class="dtab"><tr><th>Base</th><th>Participle</th><th>Type</th></tr>
          <tr><td>visit</td><td class="en">visited</td><td>regular (+ed)</td></tr>
          <tr><td>work</td><td class="en">worked</td><td>regular (+ed)</td></tr>
          <tr><td>go</td><td class="en">gone</td><td>irregular</td></tr>
          <tr><td>see</td><td class="en">seen</td><td>irregular</td></tr>
          <tr><td>eat</td><td class="en">eaten</td><td>irregular</td></tr>
        </table>
        ${eg('I <span class="tag s">have seen</span> that movie.','I have seen that movie. (experience)','ok')}
        <div class="sec-label">What is the same in both languages</div>
        <ul class="simlist"><li>Same build: «haber/have + participle».</li><li>It serves for <b>experiences</b> and for <b>results that still hold now</b>.</li><li>With <b>I/you/we/they → have</b>; with <b>he/she/it → has</b> (like «ha»).</li></ul>
        <div class="gnote">👍 If you already say «he visto», in English it's «I have seen». Just memorize the participles.</div>`
    },
    checks:[
      { q:{es:'«He visitado Lima» en inglés:',en:'«He visitado Lima» in English:'}, opts:{es:['I have visited Lima','I visit Lima'],en:['I have visited Lima','I visit Lima']}, correct:0, fb:{ why:{es:'have + participio (visited).',en:'have + participle (visited).'}, ex:{es:'I have visited Lima',en:'I have visited Lima'}, tip:{es:'have + -ed',en:'have + -ed'}}, tr:{es:'He visitado Lima.',en:'I have visited Lima.'} },
      { q:{es:'Con «she» se usa:',en:'With «she» you use:'}, opts:{es:['has','have'],en:['has','have']}, correct:0, fb:{ why:{es:'he/she/it → has (como «ha»).',en:'he/she/it → has (like «ha»).'}, ex:{es:'She has eaten → Ella ha comido',en:'She has eaten'}, tip:{es:'she → has',en:'she → has'}} },
      { q:{es:'El participio de «go» es:',en:'The participle of «go» is:'}, opts:{es:['gone','went'],en:['gone','went']}, correct:0, fb:{ why:{es:'«went» es pasado simple; el participio es «gone».',en:'«went» is past simple; the participle is «gone».'}, contrast:{es:'go – went – gone.',en:'go – went – gone.'}, ex:{es:'I have gone → He ido',en:'I have gone'}, tip:{es:'go-went-gone',en:'go-went-gone'}} },
      { q:{es:'Participio de «work»:',en:'Participle of «work»:'}, opts:{es:['worked','worken'],en:['worked','worken']}, correct:0, fb:{ why:{es:'Regular → + ed.',en:'Regular → + ed.'}, ex:{es:'I have worked → He trabajado',en:'I have worked'}, tip:{es:'regular → -ed',en:'regular → -ed'}} },
      { q:{es:'«We ___ finished the project.»',en:'«We ___ finished the project.»'}, opts:{es:['have','has'],en:['have','has']}, correct:0, fb:{ why:{es:'I/you/we/they → have.',en:'I/you/we/they → have.'}, ex:{es:'We have finished → Hemos terminado',en:'We have finished'}, tip:{es:'we → have',en:'we → have'}} }
    ] },
  { icon:'⚡', title:{es:'Diferencias',en:'Differences'},
    html:{
      es:`<div class="gdesc">El gran cambio: en inglés el present perfect <b>NO se usa con un momento terminado</b> (yesterday, last week, in 2010). Para eso va el pasado simple.</div>
        <table class="dtab"><tr><th>Marcador de tiempo</th><th>Tiempo correcto</th></tr>
          <tr><td>ever, never, just, already, yet, so far</td><td class="en">Present Perfect</td></tr>
          <tr><td>for / since (duración hasta hoy)</td><td class="en">Present Perfect</td></tr>
          <tr><td>yesterday, last week, in 2010, ago</td><td class="en">Past Simple</td></tr>
        </table>
        <div class="sec-label">⚠️ Tiempo terminado → pasado simple</div>
        ${eg('I <span class="tag s">have seen</span> it. (no digo cuándo)','Lo he visto. (experiencia, sin fecha)','ok')}
        ${eg('I <span class="tag o">saw</span> it yesterday.','Lo vi ayer. (momento terminado → pasado)','ok')}
        ${eg('I have seen it yesterday.','Con «yesterday» va el pasado: «I saw it yesterday».','bad')}
        <div class="sec-label">for vs since</div>
        ${ii('⏱️','<b>for</b> = duración (for 3 years, for two hours). <b>since</b> = punto de inicio (since 2020, since Monday).')}
        <div class="gnote">📍 Regla de oro: ¿el momento ya cerró (ayer, en 2010)? → pasado simple. ¿sigue abierto o no importa cuándo? → present perfect.</div>`,
      en:`<div class="gdesc">The big change: in English the present perfect is <b>NOT used with a finished time</b> (yesterday, last week, in 2010). For that you use the past simple.</div>
        <table class="dtab"><tr><th>Time marker</th><th>Correct tense</th></tr>
          <tr><td>ever, never, just, already, yet, so far</td><td class="en">Present Perfect</td></tr>
          <tr><td>for / since (duration up to now)</td><td class="en">Present Perfect</td></tr>
          <tr><td>yesterday, last week, in 2010, ago</td><td class="en">Past Simple</td></tr>
        </table>
        <div class="sec-label">⚠️ Finished time → past simple</div>
        ${eg('I <span class="tag s">have seen</span> it. (I don\'t say when)','I have seen it. (experience, no date)','ok')}
        ${eg('I <span class="tag o">saw</span> it yesterday.','I saw it yesterday. (finished time → past)','ok')}
        ${eg('I have seen it yesterday.','With «yesterday» use the past: «I saw it yesterday».','bad')}
        <div class="sec-label">for vs since</div>
        ${ii('⏱️','<b>for</b> = duration (for 3 years, for two hours). <b>since</b> = starting point (since 2020, since Monday).')}
        <div class="gnote">📍 Golden rule: is the moment closed (yesterday, in 2010)? → past simple. Still open or when doesn\'t matter? → present perfect.</div>`
    },
    checks:[
      { q:{es:'«I ___ it yesterday.» (ayer):',en:'«I ___ it yesterday.» (yesterday):'}, opts:{es:['saw','have seen'],en:['saw','have seen']}, correct:0, fb:{ why:{es:'«yesterday» = momento terminado → pasado simple.',en:'«yesterday» = finished time → past simple.'}, contrast:{es:'No «have seen yesterday».',en:'Not «have seen yesterday».'}, ex:{es:'I saw it yesterday → Lo vi ayer',en:'I saw it yesterday'}, tip:{es:'yesterday → pasado',en:'yesterday → past'}}, tr:{es:'Lo vi ayer.',en:'I saw it yesterday.'} },
      { q:{es:'«I ___ this movie.» (experiencia, sin fecha):',en:'«I ___ this movie.» (experience, no date):'}, opts:{es:['have seen','saw'],en:['have seen','saw']}, correct:0, fb:{ why:{es:'Sin fecha y experiencia → present perfect.',en:'No date, experience → present perfect.'}, ex:{es:'I have seen this movie → He visto esta película',en:'I have seen this movie'}, tip:{es:'experiencia → have + participio',en:'experience → have + participle'}} },
      { q:{es:'«I have lived here ___ 2020.»',en:'«I have lived here ___ 2020.»'}, opts:{es:['since','for'],en:['since','for']}, correct:0, fb:{ why:{es:'«2020» es un punto de inicio → since.',en:'«2020» is a starting point → since.'}, ex:{es:'since 2020 → desde 2020',en:'since 2020'}, tip:{es:'punto de inicio → since',en:'starting point → since'}}, tr:{es:'He vivido aquí desde 2020.',en:'I have lived here since 2020.'} },
      { q:{es:'«I have lived here ___ five years.»',en:'«I have lived here ___ five years.»'}, opts:{es:['for','since'],en:['for','since']}, correct:0, fb:{ why:{es:'«five years» es duración → for.',en:'«five years» is a duration → for.'}, ex:{es:'for five years → por cinco años',en:'for five years'}, tip:{es:'duración → for',en:'duration → for'}}, tr:{es:'He vivido aquí por cinco años.',en:'I have lived here for five years.'} },
      { q:{es:'«We ___ to Japan in 2015.»',en:'«We ___ to Japan in 2015.»'}, opts:{es:['went','have gone'],en:['went','have gone']}, correct:0, fb:{ why:{es:'«in 2015» es momento terminado → pasado.',en:'«in 2015» is finished time → past.'}, contrast:{es:'No «have gone in 2015».',en:'Not «have gone in 2015».'}, ex:{es:'We went in 2015 → Fuimos en 2015',en:'We went in 2015'}, tip:{es:'fecha cerrada → pasado',en:'closed date → past'}}, tr:{es:'Fuimos a Japón en 2015.',en:'We went to Japan in 2015.'} }
    ] },
  { icon:'💡', title:{es:'Tips Prácticos',en:'Practical Tips'},
    html:{
      es:`<div class="gdesc">La estructura y los compañeros del present perfect:</div>
        <div class="fbox"><div class="frm"><span class="pill s">have/has</span><span class="plus">+</span><span class="pill v">participio</span><span class="plus">(+ palabra clave)</span></div><div class="fex"><span class="s">have</span> <span class="v">been</span> · already · yet · ever · for · since</div></div>
        ${ii('🔑','<b>Tip 1 — Palabras señal:</b> ever, never, just, already, yet, so far, for, since → casi siempre present perfect.')}
        ${ii('📍','<b>Tip 2 — yet / already:</b> «already» (ya, afirmativo): I have already eaten. «yet» (todavía/ya, en preguntas y negativas, al final): Have you finished yet? / Not yet.')}
        ${ii('🗣️','<b>Tip 3 — Preguntas de experiencia:</b> «Have you ever + participio?» → Have you ever been to Brazil?')}
        <div class="alert-card"><div class="atitle">⚠️ Error típico</div><p>❌ «I have went» → ✅ «I <b>have gone</b>» (participio, no pasado).<br>❌ «She have eaten» → ✅ «She <b>has</b> eaten».</p></div>`,
      en:`<div class="gdesc">The structure and the companions of the present perfect:</div>
        <div class="fbox"><div class="frm"><span class="pill s">have/has</span><span class="plus">+</span><span class="pill v">participle</span><span class="plus">(+ key word)</span></div><div class="fex"><span class="s">have</span> <span class="v">been</span> · already · yet · ever · for · since</div></div>
        ${ii('🔑','<b>Tip 1 — Signal words:</b> ever, never, just, already, yet, so far, for, since → almost always present perfect.')}
        ${ii('📍','<b>Tip 2 — yet / already:</b> «already» (yes, affirmative): I have already eaten. «yet» (questions and negatives, at the end): Have you finished yet? / Not yet.')}
        ${ii('🗣️','<b>Tip 3 — Experience questions:</b> «Have you ever + participle?» → Have you ever been to Brazil?')}
        <div class="alert-card"><div class="atitle">⚠️ Common mistake</div><p>❌ «I have went» → ✅ «I <b>have gone</b>» (participle, not past).<br>❌ «She have eaten» → ✅ «She <b>has</b> eaten».</p></div>`
    },
