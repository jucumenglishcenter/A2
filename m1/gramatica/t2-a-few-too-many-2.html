<script>
/* ═══ METADATOS ═══ */
const MAT = { title:{es:'Resumen de Gramática',en:'Grammar Summary'}, subtitle:{es:'Too many / Too much',en:'Too many / Too much'}, reportId:'sum-too-many-too-much' };
const PASS = 75;
const STEPS = [
  { icon:'🇪🇸', title:{es:'Repaso en Español',en:'Spanish Recap'},
    html:{
      es:`<div class="gdesc">«<b>Demasiado</b>» no es solo «mucho»: es <b>más de lo bueno</b>, un exceso que molesta o es un problema.</div>
        <div class="art-hero"><div class="art-box"><div class="word">mucho</div><div class="role">Bastante</div><div class="desc">«Hay mucha gente» = está lleno, pero bien.</div></div><div class="art-box"><div class="word">demasiado</div><div class="role">Exceso ⚠️</div><div class="desc">«Hay demasiada gente» = no cabe nadie más.</div></div></div>
        ${ii('⚖️','«Demasiado» siempre tiene un tono <b>negativo</b>: pasa del punto justo.')}
        ${ii('🔀','Cambia con lo que cuentas: «demasiad<b>os</b> carros» (se cuentan) · «demasiad<b>a</b> sal» (masa).')}
        <div class="gnote life">🌎 <b>De tu vida:</b> «Hay demasiado tráfico» o «Comí demasiados dulces». No solo es mucho: es un problema.</div>`,
      en:`<div class="gdesc">«<b>Demasiado</b>» is not just «mucho»: it's <b>more than is good</b>, an excess that bothers or causes a problem.</div>
        <div class="art-hero"><div class="art-box"><div class="word">mucho</div><div class="role">A lot</div><div class="desc">«Hay mucha gente» = full, but fine.</div></div><div class="art-box"><div class="word">demasiado</div><div class="role">Excess ⚠️</div><div class="desc">«Hay demasiada gente» = no room for anyone.</div></div></div>
        ${ii('⚖️','«Demasiado» always has a <b>negative</b> tone: it passes the right point.')}
        ${ii('🔀','It changes with what you count: «demasiad<b>os</b> carros» (countable) · «demasiad<b>a</b> sal» (mass).')}
        <div class="gnote life">🌎 <b>From your life:</b> «Hay demasiado tráfico» or «Comí demasiados dulces». Not just a lot: it's a problem.</div>`
    },
    checks:[
      { q:{es:'«Demasiado» significa:',en:'«Demasiado» means:'}, opts:{es:['Más de lo bueno (exceso)','Solo un poco'],en:['More than is good (excess)','Just a little']}, correct:0, fb:{ why:{es:'Es un exceso, pasa del punto justo.',en:'It is an excess, past the right point.'}, tip:{es:'demasiado = exceso',en:'demasiado = excess'}} },
      { q:{es:'«demasiados carros» — «carros» es:',en:'«demasiados carros» — «carros» is:'}, opts:{es:['Contable','Incontable'],en:['Countable','Uncountable']}, correct:0, fb:{ why:{es:'Se cuenta → demasiad-os.',en:'Countable → demasiad-os.'}, tip:{es:'plural contable',en:'countable plural'}} },
      { q:{es:'«demasiada sal» — «sal» es:',en:'«demasiada sal» — «sal» is:'}, opts:{es:['Incontable','Contable'],en:['Uncountable','Countable']}, correct:0, fb:{ why:{es:'Es masa → demasiad-a.',en:'It is a mass → demasiad-a.'}, tip:{es:'masa',en:'mass'}} },
      { q:{es:'¿Qué tono tiene «demasiado»?',en:'What tone does «demasiado» have?'}, opts:{es:['Negativo (es un problema)','Positivo'],en:['Negative (a problem)','Positive']}, correct:0, fb:{ why:{es:'Marca que algo pasa del límite bueno.',en:'It marks that something goes past the good limit.'}, tip:{es:'exceso = molesto',en:'excess = a bother'}} },
      { q:{es:'«Hay mucha gente» vs «Hay demasiada gente»:',en:'«Hay mucha gente» vs «Hay demasiada gente»:'}, opts:{es:['La 2.ª dice que es un exceso','Significan lo mismo'],en:['The 2nd says it is excess','They mean the same']}, correct:0, fb:{ why:{es:'«demasiada» añade el problema del exceso.',en:'«demasiada» adds the excess problem.'}, tip:{es:'mucho ≠ demasiado',en:'mucho ≠ demasiado'}} }
    ] },
  { icon:'🤝', title:{es:'Similitudes',en:'Similarities'},
    html:{
      es:`<div class="gdesc">El inglés también separa el exceso según se cuente: <b>too many</b> (se cuenta) y <b>too much</b> (masa).</div>
        <div class="vs-grid">
          <div class="vs-row"><div class="vs-side es"><span class="flag">Español</span>demasiada agua</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">English</span><b>too much</b> water</div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">Español</span>demasiados carros</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">English</span><b>too many</b> cars</div></div>
        </div>
        ${eg('There is <span class="tag s">too much</span> salt.','Hay demasiada sal. (masa → too much)','ok')}
        ${eg('There are <span class="tag s">too many</span> people.','Hay demasiada gente. (se cuenta → too many)','ok')}
        <div class="sec-label">Lo igual en los dos idiomas</div>
        <ul class="simlist"><li>Los dos marcan un <b>exceso negativo</b> (más de lo bueno).</li><li>Los dos eligen la palabra según se cuente o no.</li><li>«too» = «demasiado»; la idea de problema está en ambos.</li></ul>
        <div class="gnote">👍 too much = demasiada (masa) · too many = demasiados (se cuentan). Misma división de siempre.</div>`,
      en:`<div class="gdesc">English also splits excess by countability: <b>too many</b> (countable) and <b>too much</b> (mass).</div>
        <div class="vs-grid">
          <div class="vs-row"><div class="vs-side es"><span class="flag">Español</span>demasiada agua</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">English</span><b>too much</b> water</div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">Español</span>demasiados carros</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">English</span><b>too many</b> cars</div></div>
        </div>
        ${eg('There is <span class="tag s">too much</span> salt.','There is too much salt. (mass → too much)','ok')}
        ${eg('There are <span class="tag s">too many</span> people.','There are too many people. (countable → too many)','ok')}
        <div class="sec-label">What is the same in both languages</div>
        <ul class="simlist"><li>Both mark a <b>negative excess</b> (more than is good).</li><li>Both pick the word by countable or not.</li><li>«too» = «demasiado»; the problem idea is in both.</li></ul>
        <div class="gnote">👍 too much = demasiada (mass) · too many = demasiados (countable). Same old split.</div>`
    },
    checks:[
      { q:{es:'«___ water» (demasiada agua):',en:'«___ water» (too much water):'}, opts:{es:['too much','too many'],en:['too much','too many']}, correct:0, fb:{ why:{es:'«water» es masa → too much.',en:'«water» is a mass → too much.'}, ex:{es:'too much water → demasiada agua',en:'too much water'}, tip:{es:'masa → too much',en:'mass → too much'}} },
      { q:{es:'«___ cars» (demasiados carros):',en:'«___ cars» (too many cars):'}, opts:{es:['too many','too much'],en:['too many','too much']}, correct:0, fb:{ why:{es:'«cars» se cuenta → too many.',en:'«cars» is countable → too many.'}, ex:{es:'too many cars → demasiados carros',en:'too many cars'}, tip:{es:'-s plural → too many',en:'-s plural → too many'}} },
      { q:{es:'«too much» equivale a:',en:'«too much» matches:'}, opts:{es:['demasiado/demasiada (masa)','demasiados (se cuentan)'],en:['demasiado/a (mass)','demasiados (countable)']}, correct:0, fb:{ why:{es:'«too much» = masa.',en:'«too much» = mass.'}, tip:{es:'much → masa',en:'much → mass'}} },
      { q:{es:'«There is ___ noise.» (ruido):',en:'«There is ___ noise.» (noise):'}, opts:{es:['too much','too many'],en:['too much','too many']}, correct:0, fb:{ why:{es:'«noise» es incontable → too much.',en:'«noise» is uncountable → too much.'}, ex:{es:'too much noise → demasiado ruido',en:'too much noise'}, tip:{es:'noise → too much',en:'noise → too much'}}, tr:{es:'Hay demasiado ruido.',en:'There is too much noise.'} },
      { q:{es:'«There are ___ mistakes.» (errores):',en:'«There are ___ mistakes.» (mistakes):'}, opts:{es:['too many','too much'],en:['too many','too much']}, correct:0, fb:{ why:{es:'«mistakes» se cuenta → too many.',en:'«mistakes» is countable → too many.'}, ex:{es:'too many mistakes → demasiados errores',en:'too many mistakes'}, tip:{es:'-s plural → too many',en:'-s plural → too many'}}, tr:{es:'Hay demasiados errores.',en:'There are too many mistakes.'} }
    ] },
  { icon:'⚡', title:{es:'Diferencias',en:'Differences'},
    html:{
      es:`<div class="gdesc">El error número uno: confundir <b>too</b> (demasiado, exceso) con <b>very</b> (muy) y con <b>too much</b> vs <b>too + adjetivo</b>.</div>
        <table class="dtab"><tr><th>Estructura</th><th>Ejemplo</th><th>Significado</th></tr>
          <tr><td class="en">too + adjetivo</td><td>too hot</td><td>demasiado caliente</td></tr>
          <tr><td class="en">too much + masa</td><td>too much sugar</td><td>demasiada azúcar</td></tr>
          <tr><td class="en">too many + plural</td><td>too many cars</td><td>demasiados carros</td></tr>
        </table>
        <div class="sec-label">⚠️ too ≠ very</div>
        ${ii('🔥','«very hot» = muy caliente (un hecho). «too hot» = demasiado caliente (un <b>problema</b>: no me lo puedo tomar).')}
        ${eg('The coffee is <span class="tag s">too hot</span> to drink.','El café está demasiado caliente para tomarlo. (problema)','ok')}
        ${eg('I ate too much.','Comí demasiado. (too much también va solo)','ok')}
        ${eg('I have too many work.','«work» es masa → «too much work».','bad')}
        <div class="gnote">📍 <b>too + adjetivo</b> (too hot) · <b>too much/many + sustantivo</b> (too much sugar / too many cars).</div>`,
      en:`<div class="gdesc">The number-one error: confusing <b>too</b> (excess) with <b>very</b>, and <b>too much</b> with <b>too + adjective</b>.</div>
        <table class="dtab"><tr><th>Structure</th><th>Example</th><th>Meaning</th></tr>
          <tr><td class="en">too + adjective</td><td>too hot</td><td>demasiado caliente</td></tr>
          <tr><td class="en">too much + mass</td><td>too much sugar</td><td>demasiada azúcar</td></tr>
          <tr><td class="en">too many + plural</td><td>too many cars</td><td>demasiados carros</td></tr>
        </table>
        <div class="sec-label">⚠️ too ≠ very</div>
        ${ii('🔥','«very hot» = muy caliente (a fact). «too hot» = demasiado caliente (a <b>problem</b>: I can't drink it).')}
        ${eg('The coffee is <span class="tag s">too hot</span> to drink.','The coffee is too hot to drink. (problem)','ok')}
        ${eg('I ate too much.','I ate too much. (too much can stand alone)','ok')}
        ${eg('I have too many work.','«work» is a mass → «too much work».','bad')}
        <div class="gnote">📍 <b>too + adjective</b> (too hot) · <b>too much/many + noun</b> (too much sugar / too many cars).</div>`
    },
    checks:[
      { q:{es:'«The soup is ___ hot.» (demasiado caliente):',en:'«The soup is ___ hot.» (too hot):'}, opts:{es:['too','too much'],en:['too','too much']}, correct:0, fb:{ why:{es:'Antes de un adjetivo solo → «too».',en:'Before a lone adjective → «too».'}, contrast:{es:'«too much» va con sustantivos masa.',en:'«too much» goes with mass nouns.'}, ex:{es:'too hot → demasiado caliente',en:'too hot'}, tip:{es:'too + adjetivo',en:'too + adjective'}}, tr:{es:'La sopa está demasiado caliente.',en:'The soup is too hot.'} },
      { q:{es:'«very hot» vs «too hot»:',en:'«very hot» vs «too hot»:'}, opts:{es:['«too hot» indica un problema','Son iguales'],en:['«too hot» signals a problem','They are the same']}, correct:0, fb:{ why:{es:'«too» = exceso/problema; «very» = solo intensidad.',en:'«too» = excess/problem; «very» = just intensity.'}, tip:{es:'too = demasiado (problema)',en:'too = too much (problem)'}} },
      { q:{es:'«I have ___ work today.» (trabajo):',en:'«I have ___ work today.» (work):'}, opts:{es:['too much','too many'],en:['too much','too many']}, correct:0, fb:{ why:{es:'«work» es masa → too much.',en:'«work» is a mass → too much.'}, ex:{es:'too much work → demasiado trabajo',en:'too much work'}, tip:{es:'work → too much',en:'work → too much'}}, tr:{es:'Tengo demasiado trabajo hoy.',en:'I have too much work today.'} },
      { q:{es:'«There are ___ tourists here.» (turistas):',en:'«There are ___ tourists here.» (tourists):'}, opts:{es:['too many','too much'],en:['too many','too much']}, correct:0, fb:{ why:{es:'«tourists» se cuenta → too many.',en:'«tourists» is countable → too many.'}, ex:{es:'too many tourists → demasiados turistas',en:'too many tourists'}, tip:{es:'-s plural → too many',en:'-s plural → too many'}}, tr:{es:'Hay demasiados turistas aquí.',en:'There are too many tourists here.'} },
      { q:{es:'¿Cuál está mal?',en:'Which one is wrong?'}, opts:{es:['too many work','too much work'],en:['too many work','too much work']}, correct:0, fb:{ why:{es:'«work» es incontable → too much.',en:'«work» is uncountable → too much.'}, ex:{es:'too much work',en:'too much work'}, tip:{es:'masa → too much',en:'mass → too much'}} }
    ] },
  { icon:'💡', title:{es:'Tips Prácticos',en:'Practical Tips'},
    html:{
      es:`<div class="gdesc">Cómo elegir entre too / too much / too many sin dudar:</div>
        <div class="fbox"><div class="frm"><span class="pill s">too</span><span class="plus">+</span><span class="pill o">adjetivo</span></div><div class="fex">too <span class="o">expensive / loud / late</span></div></div>
        <div class="fbox"><div class="frm"><span class="pill v">too much</span><span class="plus">+</span><span class="pill p">masa</span> <span class="plus">/</span> <span class="pill o">too many + plural</span></div><div class="fex">too much <span class="p">traffic</span> · too many <span class="o">cars</span></div></div>
        ${ii('🔎','<b>Tip 1 — ¿Hay sustantivo?</b> Sí → too much/many (mira si se cuenta). ¿Solo adjetivo? → too.')}
        ${ii('⚠️','<b>Tip 2 — too = problema.</b> Si quieres decir solo «muy», usa «very», no «too».')}
        ${ii('🗣️','<b>Tip 3 — Patrón útil:</b> «too + adjetivo + to + verbo»: too tired to study (demasiado cansado para estudiar).')}
        <div class="alert-card"><div class="atitle">⚠️ Error típico</div><p>❌ «I\'m too much tired» → ✅ «I\'m <b>too tired</b>» (tired es adjetivo → solo «too»).</p></div>`,
      en:`<div class="gdesc">How to choose between too / too much / too many with no doubt:</div>
        <div class="fbox"><div class="frm"><span class="pill s">too</span><span class="plus">+</span><span class="pill o">adjective</span></div><div class="fex">too <span class="o">expensive / loud / late</span></div></div>
        <div class="fbox"><div class="frm"><span class="pill v">too much</span><span class="plus">+</span><span class="pill p">mass</span> <span class="plus">/</span> <span class="pill o">too many + plural</span></div><div class="fex">too much <span class="p">traffic</span> · too many <span class="o">cars</span></div></div>
        ${ii('🔎','<b>Tip 1 — Is there a noun?</b> Yes → too much/many (check countable). Only an adjective? → too.')}
        ${ii('⚠️','<b>Tip 2 — too = problem.</b> If you only mean «very», use «very», not «too».')}
        ${ii('🗣️','<b>Tip 3 — Useful pattern:</b> «too + adjective + to + verb»: too tired to study.')}
        <div class="alert-card"><div class="atitle">⚠️ Common mistake</div><p>❌ «I'm too much tired» → ✅ «I'm <b>too tired</b>» (tired is an adjective → just «too»).</p></div>`
    },
    checks:[
      { q:{es:'«This bag is ___ heavy.» (demasiado pesada):',en:'«This bag is ___ heavy.»'}, opts:{es:['too','too much'],en:['too','too much']}, correct:0, fb:{ why:{es:'«heavy» es adjetivo → too.',en:'«heavy» is an adjective → too.'}, ex:{es:'too heavy → demasiado pesada',en:'too heavy'}, tip:{es:'too + adjetivo',en:'too + adjective'}}, tr:{es:'Esta bolsa es demasiado pesada.',en:'This bag is too heavy.'} },
