<script>
/* ═══ METADATOS ═══ */
const MAT = { title:{es:'Resumen de Gramática',en:'Grammar Summary'}, subtitle:{es:'Much / Many / A lot of',en:'Much / Many / A lot of'}, reportId:'sum-much-many-a-lot' };
const PASS = 75;
const STEPS = [
  { icon:'🇪🇸', title:{es:'Repaso en Español',en:'Spanish Recap'},
    html:{
      es:`<div class="gdesc">En español dices «<b>mucho</b>» y cambias la palabra según lo que cuentas: «much<b>os</b> amigos», «much<b>a</b> agua».</div>
        <div class="art-hero"><div class="art-box"><div class="word">muchos</div><div class="role">Se cuenta</div><div class="desc">«muchos amigos», «muchas casas».</div></div><div class="art-box"><div class="word">mucha</div><div class="role">No se cuenta</div><div class="desc">«mucha agua», «mucho dinero».</div></div></div>
        ${ii('🔢','Para cosas que se cuentan: «muchos / muchas».')}
        ${ii('🌫️','Para masas: «mucho / mucha» (agua, dinero, tiempo).')}
        <div class="gnote life">🌎 <b>De tu vida:</b> «Tengo muchos amigos» y «No tengo mucho tiempo». Tu oído ya separa lo que se cuenta de lo que no.</div>`,
      en:`<div class="gdesc">In Spanish you say «<b>mucho</b>» and change the word by what you count: «much<b>os</b> amigos», «much<b>a</b> agua».</div>
        <div class="art-hero"><div class="art-box"><div class="word">muchos</div><div class="role">Counted</div><div class="desc">«muchos amigos», «muchas casas».</div></div><div class="art-box"><div class="word">mucha</div><div class="role">Not counted</div><div class="desc">«mucha agua», «mucho dinero».</div></div></div>
        ${ii('🔢','For things you count: «muchos / muchas».')}
        ${ii('🌫️','For masses: «mucho / mucha» (agua, dinero, tiempo).')}
        <div class="gnote life">🌎 <b>From your life:</b> «Tengo muchos amigos» and «No tengo mucho tiempo». Your ear already separates countable from uncountable.</div>`
    },
    checks:[
      { q:{es:'«muchos amigos» — «amigos» es:',en:'«muchos amigos» — «amigos» is:'}, opts:{es:['Contable','Incontable'],en:['Countable','Uncountable']}, correct:0, fb:{ why:{es:'Se cuenta → muchos.',en:'Countable → muchos.'}, tip:{es:'plural contable',en:'countable plural'}} },
      { q:{es:'«mucha agua» — «agua» es:',en:'«mucha agua» — «agua» is:'}, opts:{es:['Incontable','Contable'],en:['Uncountable','Countable']}, correct:0, fb:{ why:{es:'Es masa → mucha.',en:'It is a mass → mucha.'}, tip:{es:'masa',en:'mass'}} },
      { q:{es:'«mucho dinero» — «dinero» es:',en:'«mucho dinero» — «dinero» is:'}, opts:{es:['Incontable','Contable'],en:['Uncountable','Countable']}, correct:0, fb:{ why:{es:'No se cuenta → mucho.',en:'Uncountable → mucho.'}, tip:{es:'masa',en:'mass'}} },
      { q:{es:'¿Qué decide «muchos» vs «mucha»?',en:'What decides «muchos» vs «mucha»?'}, opts:{es:['Si la cosa se cuenta','El día'],en:['Whether it is countable','The day']}, correct:0, fb:{ why:{es:'Contable o masa.',en:'Countable or mass.'}, tip:{es:'¿se cuenta?',en:'countable?'}} },
      { q:{es:'«No tengo mucho tiempo» — «tiempo» es:',en:'«No tengo mucho tiempo» — «tiempo» is:'}, opts:{es:['Incontable','Contable'],en:['Uncountable','Countable']}, correct:0, fb:{ why:{es:'Es masa → mucho.',en:'It is a mass → mucho.'}, tip:{es:'tiempo → masa',en:'time → mass'}} }
    ] },
  { icon:'🤝', title:{es:'Similitudes',en:'Similarities'},
    html:{
      es:`<div class="gdesc">El inglés reparte igual: <b>many</b> (se cuenta), <b>much</b> (masa), y <b>a lot of</b> (los dos).</div>
        <div class="vs-grid">
          <div class="vs-row"><div class="vs-side es"><span class="flag">muchos</span>muchos amigos</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">many</span><b>many</b> friends</div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">mucha</span>mucha agua</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">much</span><b>much</b> water</div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">un montón de</span>un montón de cosas</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">a lot of</span><b>a lot of</b> things</div></div>
        </div>
        ${eg('I have <span class="tag s">a lot of</span> friends.','Tengo muchos amigos. (afirmativa → a lot of)','ok')}
        ${eg('There isn\'t <span class="tag s">much</span> milk.','No hay mucha leche. (masa, negativa → much)','ok')}
        <div class="sec-label">Lo igual en los dos idiomas</div>
        <ul class="simlist"><li>Los dos separan «se cuenta» (many) de «masa» (much).</li><li>Los dos tienen un comodín para todo: <b>a lot of</b>.</li><li>La palabra va <b>antes del sustantivo</b>: many friends, much water.</li></ul>
        <div class="gnote">👍 many = muchos · much = mucha (masa) · a lot of = un montón de. Solo falta cuándo usar cada uno (siguiente paso).</div>`,
      en:`<div class="gdesc">English splits the same: <b>many</b> (countable), <b>much</b> (mass), and <b>a lot of</b> (both).</div>
        <div class="vs-grid">
          <div class="vs-row"><div class="vs-side es"><span class="flag">muchos</span>muchos amigos</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">many</span><b>many</b> friends</div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">mucha</span>mucha agua</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">much</span><b>much</b> water</div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">un montón de</span>un montón de cosas</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">a lot of</span><b>a lot of</b> things</div></div>
        </div>
        ${eg('I have <span class="tag s">a lot of</span> friends.','I have a lot of friends. (affirmative → a lot of)','ok')}
        ${eg('There isn\'t <span class="tag s">much</span> milk.','There isn\'t much milk. (mass, negative → much)','ok')}
        <div class="sec-label">What is the same in both languages</div>
        <ul class="simlist"><li>Both split «countable» (many) from «mass» (much).</li><li>Both have an all-purpose word: <b>a lot of</b>.</li><li>The word goes <b>before the noun</b>: many friends, much water.</li></ul>
        <div class="gnote">👍 many = muchos · much = mucha (mass) · a lot of = un montón de. Just learn when to use each (next step).</div>`
    },
    checks:[
      { q:{es:'«___ friends» (muchos amigos):',en:'«___ friends» (many friends):'}, opts:{es:['many','much'],en:['many','much']}, correct:0, fb:{ why:{es:'«friends» se cuenta → many.',en:'«friends» is countable → many.'}, ex:{es:'many friends → muchos amigos',en:'many friends'}, tip:{es:'-s plural → many',en:'-s plural → many'}} },
      { q:{es:'«___ water» (mucha agua):',en:'«___ water» (much water):'}, opts:{es:['much','many'],en:['much','many']}, correct:0, fb:{ why:{es:'«water» es masa → much.',en:'«water» is a mass → much.'}, ex:{es:'much water → mucha agua',en:'much water'}, tip:{es:'masa → much',en:'mass → much'}} },
      { q:{es:'Comodín para los dos tipos:',en:'All-purpose word for both:'}, opts:{es:['a lot of','much'],en:['a lot of','much']}, correct:0, fb:{ why:{es:'«a lot of» sirve para todo.',en:'«a lot of» works for everything.'}, ex:{es:'a lot of water / friends',en:'a lot of water / friends'}, tip:{es:'a lot of = comodín',en:'a lot of = all-purpose'}} },
      { q:{es:'«I have ___ books.» (afirmativa):',en:'«I have ___ books.» (affirmative):'}, opts:{es:['a lot of','much'],en:['a lot of','much']}, correct:0, fb:{ why:{es:'Afirmativa con plural → a lot of (o many).',en:'Affirmative with a plural → a lot of (or many).'}, ex:{es:'a lot of books → muchos libros',en:'a lot of books'}, tip:{es:'afirmativa → a lot of',en:'affirmative → a lot of'}}, tr:{es:'Tengo muchos libros.',en:'I have a lot of books.'} },
      { q:{es:'«There isn\'t ___ time.» (masa, negativa):',en:'«There isn\'t ___ time.» (mass, negative):'}, opts:{es:['much','many'],en:['much','many']}, correct:0, fb:{ why:{es:'«time» es masa → much.',en:'«time» is a mass → much.'}, ex:{es:'much time → mucho tiempo',en:'much time'}, tip:{es:'masa → much',en:'mass → much'}}, tr:{es:'No hay mucho tiempo.',en:'There isn\'t much time.'} }
    ] },
  { icon:'⚡', title:{es:'Diferencias',en:'Differences'},
    html:{
      es:`<div class="gdesc">El detalle que el español no marca: <b>much</b> y <b>many</b> brillan en preguntas y negativas; en afirmativas suele ganar <b>a lot of</b>.</div>
        <table class="dtab"><tr><th>Tipo de frase</th><th>Recomendado</th><th>Ejemplo</th></tr>
          <tr><td>afirmativa</td><td class="en">a lot of</td><td>I have a lot of work</td></tr>
          <tr><td>negativa</td><td class="en">much / many</td><td>I don't have much time</td></tr>
          <tr><td>pregunta</td><td class="en">much / many</td><td>Do you have many friends?</td></tr>
        </table>
        <div class="sec-label">⚠️ «much» en afirmativa suena raro</div>
        ${ii('🚫','En afirmativa, «I have much money» suena formal/extraño. Mejor: «I have <b>a lot of</b> money».')}
        ${ii('🔚','<b>a lot</b> (sin «of») va solo, al final: «Thanks a lot», «I study a lot».')}
        ${eg('I don\'t have <span class="tag s">many</span> options.','No tengo muchas opciones. (negativa → many)','ok')}
        ${eg('I have <span class="tag s">a lot of</span> energy.','Tengo mucha energía. (afirmativa → a lot of)','ok')}
        ${eg('I have much energy.','En afirmativa, mejor «a lot of energy».','bad')}
        <div class="gnote">📍 Regla de bolsillo: afirmativa → a lot of · pregunta/negativa → much (masa) / many (se cuenta).</div>`,
      en:`<div class="gdesc">The detail Spanish doesn't mark: <b>much</b> and <b>many</b> shine in questions and negatives; in affirmatives <b>a lot of</b> usually wins.</div>
        <table class="dtab"><tr><th>Sentence type</th><th>Recommended</th><th>Example</th></tr>
          <tr><td>affirmative</td><td class="en">a lot of</td><td>I have a lot of work</td></tr>
          <tr><td>negative</td><td class="en">much / many</td><td>I don't have much time</td></tr>
          <tr><td>question</td><td class="en">much / many</td><td>Do you have many friends?</td></tr>
        </table>
        <div class="sec-label">⚠️ «much» in an affirmative sounds odd</div>
        ${ii('🚫','In an affirmative, «I have much money» sounds formal/odd. Better: «I have <b>a lot of</b> money».')}
        ${ii('🔚','<b>a lot</b> (no «of») stands alone, at the end: «Thanks a lot», «I study a lot».')}
        ${eg('I don\'t have <span class="tag s">many</span> options.','I don\'t have many options. (negative → many)','ok')}
        ${eg('I have <span class="tag s">a lot of</span> energy.','I have a lot of energy. (affirmative → a lot of)','ok')}
        ${eg('I have much energy.','In an affirmative, use «a lot of energy».','bad')}
        <div class="gnote">📍 Pocket rule: affirmative → a lot of · question/negative → much (mass) / many (countable).</div>`
    },
    checks:[
      { q:{es:'Afirmativa: «We have ___ homework.»',en:'Affirmative: «We have ___ homework.»'}, opts:{es:['a lot of','much'],en:['a lot of','much']}, correct:0, fb:{ why:{es:'Afirmativa → a lot of.',en:'Affirmative → a lot of.'}, contrast:{es:'«much homework» en afirmativa suena raro.',en:'«much homework» in an affirmative sounds odd.'}, ex:{es:'a lot of homework → mucha tarea',en:'a lot of homework'}, tip:{es:'afirmativa → a lot of',en:'affirmative → a lot of'}}, tr:{es:'Tenemos mucha tarea.',en:'We have a lot of homework.'} },
      { q:{es:'Negativa: «I don\'t have ___ friends here.»',en:'Negative: «I don\'t have ___ friends here.»'}, opts:{es:['many','much'],en:['many','much']}, correct:0, fb:{ why:{es:'«friends» se cuenta → many.',en:'«friends» is countable → many.'}, ex:{es:'not many friends → no muchos amigos',en:'not many friends'}, tip:{es:'plural → many',en:'plural → many'}}, tr:{es:'No tengo muchos amigos aquí.',en:'I don\'t have many friends here.'} },
      { q:{es:'Pregunta: «Do you drink ___ coffee?»',en:'Question: «Do you drink ___ coffee?»'}, opts:{es:['much','many'],en:['much','many']}, correct:0, fb:{ why:{es:'«coffee» es masa → much.',en:'«coffee» is a mass → much.'}, ex:{es:'much coffee → mucho café',en:'much coffee'}, tip:{es:'masa → much',en:'mass → much'}}, tr:{es:'¿Tomas mucho café?',en:'Do you drink much coffee?'} },
      { q:{es:'«Thanks ___!» (al final, solo):',en:'«Thanks ___!» (alone, at the end):'}, opts:{es:['a lot','a lot of'],en:['a lot','a lot of']}, correct:0, fb:{ why:{es:'Sin sustantivo después → a lot (sin «of»).',en:'No noun after → a lot (no «of»).'}, ex:{es:'Thanks a lot! → ¡Muchas gracias!',en:'Thanks a lot!'}, tip:{es:'solo → a lot',en:'alone → a lot'}} },
      { q:{es:'¿Cuál suena mejor en afirmativa?',en:'Which sounds better in an affirmative?'}, opts:{es:['She has a lot of patience','She has much patience'],en:['She has a lot of patience','She has much patience']}, correct:0, fb:{ why:{es:'«much» en afirmativa suena raro.',en:'«much» in an affirmative sounds odd.'}, ex:{es:'a lot of patience → mucha paciencia',en:'a lot of patience'}, tip:{es:'afirmativa → a lot of',en:'affirmative → a lot of'}}, tr:{es:'Ella tiene mucha paciencia.',en:'She has a lot of patience.'} }
    ] },
  { icon:'💡', title:{es:'Tips Prácticos',en:'Practical Tips'},
    html:{
      es:`<div class="gdesc">Decisión en dos preguntas: ¿se cuenta? y ¿qué tipo de frase es?</div>
        <div class="fbox"><div class="frm"><span class="pill s">many</span><span class="plus">+ plural</span><span class="pill v">much</span><span class="plus">+ masa</span><span class="pill o">a lot of</span><span class="plus">+ los dos</span></div><div class="fex">many books · much water · a lot of everything</div></div>
        ${ii('🔎','<b>Tip 1 — ¿Se cuenta?</b> plural «-s» → many · masa → much.')}
        ${ii('✅','<b>Tip 2 — ¿Afirmativa?</b> usa «a lot of» y nunca fallas: a lot of money / a lot of friends.')}
        ${ii('🔚','<b>Tip 3 — a lot vs a lot of:</b> «a lot of» va con sustantivo (a lot of work); «a lot» va solo (I sleep a lot).')}
        <div class="alert-card"><div class="atitle">⚠️ Error típico</div><p>❌ «much friends» → ✅ «<b>many</b> friends» (plural contable).<br>❌ «I have a lot money» → ✅ «I have a lot <b>of</b> money».</p></div>`,
      en:`<div class="gdesc">Decide with two questions: is it countable? and what kind of sentence is it?</div>
        <div class="fbox"><div class="frm"><span class="pill s">many</span><span class="plus">+ plural</span><span class="pill v">much</span><span class="plus">+ mass</span><span class="pill o">a lot of</span><span class="plus">+ both</span></div><div class="fex">many books · much water · a lot of everything</div></div>
        ${ii('🔎','<b>Tip 1 — Countable?</b> plural «-s» → many · mass → much.')}
        ${ii('✅','<b>Tip 2 — Affirmative?</b> use «a lot of» and you never fail: a lot of money / a lot of friends.')}
        ${ii('🔚','<b>Tip 3 — a lot vs a lot of:</b> «a lot of» goes with a noun (a lot of work); «a lot» stands alone (I sleep a lot).')}
        <div class="alert-card"><div class="atitle">⚠️ Common mistake</div><p>❌ «much friends» → ✅ «<b>many</b> friends» (countable plural).<br>❌ «I have a lot money» → ✅ «I have a lot <b>of</b> money».</p></div>`
    },
    checks:[
      { q:{es:'«How ___ apples did you buy?»',en:'«How ___ apples did you buy?»'}, opts:{es:['many','much'],en:['many','much']}, correct:0, fb:{ why:{es:'«apples» se cuenta → many.',en:'«apples» is countable → many.'}, ex:{es:'many apples → muchas manzanas',en:'many apples'}, tip:{es:'-s plural → many',en:'-s plural → many'}} },
