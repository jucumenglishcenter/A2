    rFormH:'⚠ Report a problem', rOpts:['The marked answer looks wrong','Typo / spelling error','The translation doesn\'t match','The task is confusing','Doesn\'t match the story','Other'], rPlace:'Tell us what you saw (optional)...', rSend:'Send to support', rCancel:'Cancel', rDone:'✓ Report sent to support', rCodeLab:'Code (copy it if your teacher asks):', xpEarned:'XP earned', exitT:'Are you sure you want to leave? 🚪', exitP:x=>'If you leave now, <b>you\'ll lose the '+x+' XP</b> you\'ve earned and your progress here. Finish it to claim them. 💪', exitStay:'Keep practicing', exitLeave:'Leave and lose my XP', helpT:'How do I use this material?', tipsT:'What each button is for:', tips:['<b>How to solve it:</b> tap the word that fits the task.','<b>🌐 Español/English:</b> language of instructions and explanations (the exercise stays in English).','<b>💡 Hint:</b> a context clue, below the sentence.','<b>🔤 Translation:</b> the sentence in Spanish (help, doesn\'t lower your grade).','<b>⚠ Report:</b> tell us if something is wrong in the question.','<b>At the end:</b> you\'ll see your grade, hits, time and topics to review.','<b>≥75% passes</b> and unlocks the next activity.'] }
};
let lang=MAT.langDefault, cur=0, score=0, locked=[], picked=[], usedTr=0, wrongTags=[], sec=0, timer=null;
let xpTotal=0; const XPQ=2;
const fmt=s=>Math.floor(s/60)+':'+String(s%60).padStart(2,'0');
function startTimer(){ if(!timer) timer=setInterval(()=>{sec++; var c=document.getElementById('ct'); if(c)c.textContent=fmt(sec);},1000); }
function render(){ cur=0;score=0;xpTotal=0;usedTr=0;wrongTags=[];sec=0;clearInterval(timer);timer=null;
  locked=new Array(QS.length).fill(false); picked=new Array(QS.length).fill(null); QS.forEach(q=>delete q._tr);
  document.getElementById('tot').textContent=QS.length; document.getElementById('results').classList.remove('show'); document.getElementById('mbody').style.display='block';
  document.getElementById('pfill').style.width='0'; var _ct=document.getElementById('ct'); if(_ct)_ct.textContent='0:00'; document.querySelectorAll('.star').forEach(s=>s.classList.remove('on'));
  document.getElementById('qbox').innerHTML=QS.map(buildId).join(''); applyUiLang(); show(0); }
function buildId(it,i){ const t=T[lang];
  const ws=it.words.map((w,wi)=>{ const tap=it.tap.includes(wi); return `<span class="w${tap?' tap':''}" ${tap?`onclick="tapWord(${i},${wi})"`:''} id="w${i}_${wi}">${w}</span>`; }).join(' ');
  return `<div class="qcard${i!==0?' hidden':''}" id="q${i}">
    <div class="qtop"><div class="qnum">${i+1}</div><span class="qlabel" id="ql${i}">${t.qlabel} ${i+1}</span><button class="qreport" id="qr${i}" onclick="toggleReport(${i})">${t.report}</button></div>
    <div class="consigna" id="cn${i}">👉 ${it.task[lang]}</div>
    <p class="sent" id="sent${i}">${ws}</p>
    <div class="support">${(it.hint&&it.hint[lang])?`<button class="sbtn hint" id="hb${i}" onclick="reveal(${i},'hint')">💡 <span class="sh">${t.hint}</span></button>`:''}<button class="sbtn tr" id="tb${i}" onclick="reveal(${i},'tr')">🔤 <span class="st">${t.tr}</span></button></div>
    ${(it.hint&&it.hint[lang])?`<div class="reveal hintbox" id="hr${i}"><span class="lab hl">${t.hintLab}</span><span class="hv">${it.hint[lang]}</span></div>`:''}
    <div class="reveal trbox" id="trb${i}"><span class="lab tl">${t.trLab}</span>${it.tr}</div>
    <div class="fb" id="fb${i}"></div>
    <div class="rform" id="rf${i}"><h4 id="rfh${i}">${t.rFormH}</h4><select id="rt${i}">${t.rOpts.map(o=>`<option>${o}</option>`).join('')}</select><textarea id="rn${i}" placeholder="${t.rPlace}"></textarea><div class="rrow"><button class="rsend" onclick="sendReport(${i})">${t.rSend}</button><button class="rcancel" onclick="toggleReport(${i})">${t.rCancel}</button></div></div>
    <div class="rdone" id="rd${i}"><div style="font-weight:800;font-size:13px;color:#1B5E20;">${t.rDone}</div><div style="font-size:11.5px;color:#555;margin-top:3px;" id="rcl${i}">${t.rCodeLab}</div><div class="rcode" id="rc${i}" onclick="copyCode(${i})"></div></div>
    <div class="nav"><button class="nb prev" onclick="nav(${i},-1)" ${i===0?'disabled':''}>${t.prev}</button><button class="nb next" id="nx${i}" onclick="nav(${i},1)" disabled>${i===QS.length-1?t.seeRes:t.next}</button></div></div>`;
}
function tapWord(i,wi){ if(locked[i])return; locked[i]=true; startTimer(); const it=QS[i], ok=wi===it.target; picked[i]=ok;
  if(ok){score++;xpTotal+=XPQ;toast('+'+XPQ+' XP ⭐');} else wrongTags.push(it.reinf[lang]); if(it._tr)usedTr++;
  document.getElementById('w'+i+'_'+wi).classList.add(ok?'ok':'no');
  if(!ok) document.getElementById('w'+i+'_'+it.target).classList.add('reveal');
  it.tap.forEach(x=>document.getElementById('w'+i+'_'+x).style.pointerEvents='none');
  renderFb(i,ok,it); document.getElementById('nx'+i).disabled=false; bump(); }
function renderFb(i,ok,it){ const t=T[lang]; const el=document.getElementById('fb'+i); el.className='fb show '+(ok?'ok':'no'); let b='';
  if(it.story) b+=`<div class="fblk story"><b>${t.bStory}</b><span class="qquote">${it.story.q}</span><span class="story-es">${it.story.es}</span></div>`;
  b+=`<div class="fblk sig"><b>${t.bWhy}</b>${it.why[lang]}</div>`;
  if(it.others&&it.others[lang]) b+=`<div class="fblk others"><b>${t.bOthers}</b>${it.others[lang]}</div>`;
  let ex=''; if(it.examples&&it.examples[lang]) ex=`<div class="exrow">${it.examples[lang].map(e=>{const p=e.split(' → ');return `<span class="exchip"><span class="exw">${p[0]}</span>→<span>${p[1]}</span></span>`;}).join('')}</div>`;
  b+=`<div class="fblk rule"><b>${t.bRule}</b>${it.rule[lang]}${ex}</div>`;
  if(it.es&&it.es[lang]) b+=`<div class="fblk es"><b>${t.bEs}</b>${it.es[lang]}</div>`;
  if(it.lit&&it.lit[lang]) b+=`<div class="fblk lit"><b>${t.bLit}</b>${it.lit[lang]}</div>`;
  const sup=it._tr?`<span style="margin-left:auto;font-size:10px;font-weight:800;background:rgba(255,255,255,.25);padding:2px 8px;border-radius:10px;">${t.withSupport}</span>`:'';
  el.innerHTML=`<div class="fbh">${ok?'✅':'❌'} <b>${ok?t.fbOk:t.fbNo}</b>${sup}</div><div class="fbb">${b}</div>`; }
function reveal(i,which){ startTimer(); const it=QS[i];
  if(which==='hint'){ const hr=document.getElementById('hr'+i); if(!hr) return; hr.classList.toggle('show'); document.getElementById('hb'+i).classList.add('used'); }
  else { document.getElementById('trb'+i).classList.toggle('show'); const b=document.getElementById('tb'+i); if(!b.classList.contains('used')){ b.classList.add('used'); it._tr=true; } } }
function bump(){ document.getElementById('pfill').style.width=(picked.filter(x=>x!==null).length/QS.length*100)+'%'; }
function show(i){ document.querySelectorAll('#qbox .qcard').forEach((c,x)=>c.classList.toggle('hidden',x!==i)); document.getElementById('cq').textContent=i+1; cur=i; window.scrollTo({top:0,behavior:'smooth'}); }
function nav(i,d){ if(d<0){ if(i>0) show(i-1); return; } if(i<QS.length-1) show(i+1); else results(); }
function results(){ const t=T[lang]; document.getElementById('mbody').style.display='none'; document.getElementById('results').classList.add('show');
  const pct=Math.round(score/QS.length*100), passed=pct>=PASS;
  const um=document.getElementById('unlockMsg'); um.className='unlock '+(passed?'pass':'fail'); um.textContent=passed?t.pass:t.fail;
  document.getElementById('heroEm').textContent = passed?'🎉':'💪';
  document.getElementById('fscore').textContent=pct; document.getElementById('fhits').textContent=score+'/'+QS.length; document.getElementById('ftime').textContent=fmt(sec); document.getElementById('fxp').textContent='+'+(passed?xpTotal:0);
  const stars=pct>=90?3:pct>=PASS?2:1; document.querySelectorAll('.star').forEach((s,x)=>{ if(x<stars) setTimeout(()=>s.classList.add('on'),x*220); });
  document.getElementById('fphrase').textContent = pct>=90?t.ph[0]:pct>=PASS?t.ph[1]:t.ph[2];
  document.getElementById('supportNote').textContent = usedTr>0 ? t.supp(usedTr) : '';
  const reinf=document.getElementById('reinf'), chips=document.getElementById('rchips'), uniq=[...new Set(wrongTags)];
  if(uniq.length){ reinf.style.display='block'; chips.innerHTML=uniq.map(x=>`<span class="rchip">${x}</span>`).join(''); } else reinf.style.display='none';
  const act=document.getElementById('actionMsg'); if(act){ const u=[...new Set(wrongTags)];
    if(pct>=90) act.textContent = lang==='es'?'Dominas este tema. Continúa con la siguiente actividad en la plataforma.':'You\'ve mastered this. Move on to the next activity in the platform.';
    else if(passed) act.innerHTML = lang==='es'?('Aprobaste. Antes de seguir, repasa: <b>'+u.join(', ')+'</b>.'):('You passed. Before moving on, review: <b>'+u.join(', ')+'</b>.');
    else act.innerHTML = lang==='es'?('Te faltó poco. Enfócate en <b>'+(u.slice(0,2).join(' y ')||'el tema')+'</b>, abre el resumen y vuelve a intentarlo.'):('Almost there. Focus on <b>'+(u.slice(0,2).join(' and ')||'the topic')+'</b>, check the summary and try again.'); }
  document.getElementById('surprise').style.display = passed ? 'flex' : 'none';
  window.scrollTo({top:0,behavior:'smooth'});
  /* Registro en la plataforma */
  window.JUCUM_OWN_PANEL=true; window.dispatchEvent(new CustomEvent('jucum:done',{detail:{score:pct,xp:passed?xpTotal:0,finished:passed}}));
}
function restart(){ render(); }
function toggleReport(i){ document.getElementById('rf'+i).classList.toggle('show'); }
function sendReport(i){ const type=document.getElementById('rt'+i).value, note=document.getElementById('rn'+i).value.trim();
  document.getElementById('rf'+i).classList.remove('show'); const payload={mat:MAT.reportId,q:i+1,issue:type,note:note||'-'};
  document.getElementById('rc'+i).textContent='JEC-RPT · '+JSON.stringify(payload); document.getElementById('rd'+i).classList.add('show');
  try{ window.dispatchEvent(new CustomEvent('jucum:report',{detail:payload})); }catch(e){}
  toast(lang==='es'?'✓ Reporte enviado a soporte':'✓ Report sent to support'); }
function copyCode(i){ const x=document.getElementById('rc'+i).textContent; navigator.clipboard&&navigator.clipboard.writeText(x); toast(lang==='es'?'Código copiado':'Code copied'); }
function applyUiLang(){ const t=T[lang]; var _cn=document.getElementById('chipNote'); if(_cn)_cn.textContent=t.timeNote;
  document.getElementById('lswLab').textContent=t.lswLab; document.getElementById('insT').textContent=t.insT; document.getElementById('insP').innerHTML=t.insP;
  document.getElementById('mhtitle').textContent=MAT.title; document.getElementById('mhsub').textContent=MAT.subtitle;
  document.getElementById('lHits').textContent=t.hits; document.getElementById('lTime').innerHTML=t.time+'<span class="note">'+t.timeNote+'</span>';
  document.getElementById('lReinf').textContent=t.reinf; document.getElementById('lXp').textContent=t.xp; document.getElementById('lXpSub').textContent=t.xpSub;
  document.getElementById('lBack').textContent=t.back; document.getElementById('lRetry').textContent=t.retry; document.getElementById('lXpEarned').textContent=t.xpEarned;
  document.getElementById('helpT').textContent=t.helpT; document.getElementById('helpTips').innerHTML='<div style="font-size:11.5px;color:var(--text-soft);font-weight:700;margin-bottom:6px">'+t.tipsT+'</div>'+t.tips.map(x=>'<div class="helptip">• <span>'+x+'</span></div>').join('');
  QS.forEach((it,i)=>{ const e=id=>document.getElementById(id+i);
    if(e('ql'))e('ql').textContent=t.qlabel+' '+(i+1); if(e('qr'))e('qr').textContent=t.report; if(e('cn'))e('cn').innerHTML='👉 '+it.task[lang];
    const hb=document.querySelector('#hb'+i+' .sh'); if(hb)hb.textContent=t.hint; const tb=document.querySelector('#tb'+i+' .st'); if(tb)tb.textContent=t.tr;
    const hl=document.querySelector('#hr'+i+' .hl'); if(hl)hl.textContent=t.hintLab; const hv=document.querySelector('#hr'+i+' .hv'); if(hv)hv.innerHTML=it.hint[lang];
    const tl=document.querySelector('#trb'+i+' .tl'); if(tl)tl.textContent=t.trLab;
    if(e('nx'))e('nx').textContent=(i===QS.length-1?t.seeRes:t.next); const pv=document.querySelector('#q'+i+' .prev'); if(pv)pv.textContent=t.prev;
    if(e('rfh'))e('rfh').textContent=t.rFormH; if(e('rcl'))e('rcl').textContent=t.rCodeLab;
    if(picked[i]!==null) renderFb(i,picked[i],it); });
  wrongTags=[]; QS.forEach((it,i)=>{ if(picked[i]===false) wrongTags.push(it.reinf[lang]); }); }
function setLang(l){ lang=l; document.getElementById('lswEs').classList.toggle('on',l==='es'); document.getElementById('lswEn').classList.toggle('on',l==='en'); applyUiLang(); if(document.getElementById('results').classList.contains('show')) results(); }
function openHelp(){document.getElementById('helpov').classList.add('show');} function closeHelp(){document.getElementById('helpov').classList.remove('show');}
function exitGuard(){ if(!document.getElementById('results').classList.contains('show') && (sec>0 || locked.some(Boolean))){ openExit(); } else { volver(); } }
function openExit(){ const t=T[lang]; document.getElementById('exitT').textContent=t.exitT; document.getElementById('exitP').innerHTML=t.exitP(xpTotal); document.getElementById('exitStay').textContent=t.exitStay; document.getElementById('exitLeave').textContent=t.exitLeave; document.getElementById('exitov').classList.add('show'); }
function closeExit(){ document.getElementById('exitov').classList.remove('show'); }
function leaveNow(){ document.getElementById('exitov').classList.remove('show'); xpTotal=0; volver(); }
function volver(){ if(document.referrer){ location.href=document.referrer; } else if(history.length>1){ history.back(); } else { toast(lang==='es'?'Vuelve a tu práctica en la plataforma':'Go back to your practice'); } }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2400); }
document.addEventListener('contextmenu',e=>{ if(e.target.closest('.mat')){ e.preventDefault(); toast(lang==='es'?'Material protegido © JUCUM EC':'Protected material © JUCUM EC'); }});
render();
</script>
