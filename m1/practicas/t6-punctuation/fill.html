<style>
  :root{
    --card:#fff; --text:#2A2A2A; --text-soft:#777; --border:#E8E5DC;

  .nav{display:flex;gap:9px;margin-top:14px;}
  .nb{padding:12px 15px;border:none;border-radius:11px;font-family:var(--font-body);font-weight:800;font-size:13.5px;cursor:pointer;transition:.15s;}
  .nb.next{background:var(--lg);color:#fff;flex:1;} .nb.prev{background:#F1F0EA;color:var(--text);} .nb:disabled{opacity:.4;cursor:default;}

  .rform{margin-top:12px;background:#FCF7EF;border:1.5px solid #F0D9B8;border-radius:13px;padding:13px;display:none;} .rform.show{display:block;animation:up .25s ease;}
  .rform h4{margin:0 0 9px;font-family:var(--font-display);font-weight:600;font-size:13.5px;color:#92510F;}
  .rform select,.rform textarea{width:100%;font-family:var(--font-body);font-size:13px;border:1.5px solid #E7D3B4;border-radius:9px;padding:9px 11px;margin-bottom:9px;background:#fff;resize:vertical;} .rform textarea{min-height:54px;}
  .rrow{display:flex;gap:9px;} .rsend{background:#C77D2E;color:#fff;border:none;border-radius:9px;padding:10px 17px;font-weight:800;font-size:13px;cursor:pointer;flex:1;}
  .rcancel{background:#F1E7D6;color:#92510F;border:none;border-radius:9px;padding:10px 15px;font-weight:800;font-size:13px;cursor:pointer;}
  .rdone{background:#EAF7EC;border:1.5px solid var(--correct-bd);border-radius:13px;padding:13px;margin-top:12px;display:none;} .rdone.show{display:block;}
  .rcode{font-family:'Nunito',monospace;font-size:11.5px;background:#fff;border:1px dashed var(--correct-bd);border-radius:8px;padding:9px;margin-top:7px;color:#1B5E20;word-break:break-all;cursor:copy;}

  .results{display:none;padding:20px 16px 40px;text-align:center;} .results.show{display:block;animation:up .45s ease;}
  .unlock{border-radius:13px;padding:11px;display:flex;align-items:center;gap:9px;justify-content:center;font-weight:800;font-size:14px;margin-bottom:15px;} .unlock.pass{background:var(--correct-bg);border:1.5px solid var(--correct-bd);color:var(--correct);} .unlock.fail{background:#FFF7E8;border:1.5px solid #F0C66B;color:#92510F;}
  .hero{background:var(--lg);border-radius:20px;padding:24px 20px;color:#fff;box-shadow:var(--shadow-sm);} .hero .em{font-size:50px;line-height:1;}

  .support-note{font-size:11.5px;color:var(--text-soft);font-weight:700;margin-bottom:14px;}
  .action{background:#fff;border:1.5px solid var(--lm);border-left:4px solid var(--lp);border-radius:13px;padding:13px 15px;text-align:left;font-size:13px;line-height:1.5;font-weight:700;color:var(--text);margin-bottom:15px;box-shadow:var(--shadow-sm);}
  .reinf{background:#FFF7E8;border:1.5px solid #F0C66B;border-radius:13px;padding:13px;text-align:left;margin-bottom:15px;}

  .rchips{display:flex;flex-wrap:wrap;gap:7px;} .rchip{background:#fff;border:1.5px solid #F0C66B;color:#92510F;border-radius:9px;padding:6px 11px;font-size:12.5px;font-weight:800;}
  .surprise{background:linear-gradient(135deg,#FFF3D6,#FFFBF0);border:1.5px dashed var(--lp);border-radius:13px;padding:12px;display:flex;align-items:center;gap:11px;text-align:left;margin-bottom:15px;}
  .surprise .em{font-size:28px;} .surprise b{font-size:13px;color:var(--ld);} .surprise p{margin:1px 0 0;font-size:11.5px;color:var(--text-soft);font-weight:700;line-height:1.4;}
  .rbtns{display:flex;flex-direction:column;gap:10px;}
  .rbtn{padding:14px;border:none;border-radius:13px;font-family:var(--font-body);font-weight:800;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;}
  .rbtn.back{background:var(--lg);color:#fff;} .rbtn.retry{background:#F1F0EA;color:var(--text);}
  .mfoot{display:flex;align-items:center;justify-content:center;gap:8px;font-size:10.5px;color:#B0A99A;padding:16px;font-weight:700;} .mfoot img{height:20px;opacity:.5;}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:#222;color:#fff;padding:12px 22px;border-radius:24px;font-weight:800;font-size:13.5px;box-shadow:var(--shadow);z-index:200;opacity:0;transition:.3s;pointer-events:none;max-width:90vw;text-align:center;} .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}  .helpfab{position:fixed;right:16px;bottom:16px;z-index:120;width:44px;height:44px;border-radius:50%;background:var(--lg);color:#fff;border:none;font-size:22px;font-weight:800;cursor:pointer;box-shadow:var(--shadow);}

  .helptip{display:flex;gap:6px;font-size:12.5px;color:#555;padding:4px 0;line-height:1.45;} .helptip b{color:var(--ld);}

</style>

<script>
/* ╔══════════════════════════════════════════════════════════════════════╗

   ╚══════════════════════════════════════════════════════════════════════╝ */
const MAT = {
  title:'Fill in the Blanks',
  subtitle:"A2 · Módulo 1 · Punctuation",
  langDefault:'es',
  reportId:"A2_M1_t6-fill"
};
const PASS = 75;
const QS = [
 {
  "clue": "contracción",
  "opts": [
   "doesn't",
   "does'nt",
   "doesnt"
  ],
  "correct": "doesn't",
  "reinf": {
   "es": "contracción",
   "en": "contracción"
  },
  "sentence": "She _____ like the new system.",
  "tr": "No le gusta el sistema nuevo.",
  "hint": "",
  "story": "She doesn't like the new system.",
  "storyWhy": {
   "es": "apóstrofo entre n y t: doesn't.",
   "en": "apostrophe between n and t: doesn't."
  },
  "rule": {
   "es": "Contracciones (doesn't, it's) y posesivos (Ana's) con apóstrofo.",
   "en": "Contractions (doesn't, it's) and possessives (Ana's) take an apostrophe."
  },
  "es": {
   "es": "",
   "en": ""

let lang=MAT.langDefault, cur=0, score=0, ans=new Array(QS.length).fill(false), picked=new Array(QS.length).fill(null), wrongTags=[], usedTr=0, sec=0, timer=null;
let xpTotal=0; const XPQ=2;
const fmt=s=>Math.floor(s/60)+':'+String(s%60).padStart(2,'0');
function startTimer(){ if(!timer) timer=setInterval(()=>{ sec++; var c=document.getElementById('ct'); if(c)c.textContent=fmt(sec); },1000); }
function fyShuffle(a){ a=[...a]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function buildQ(q,i){ const t=T[lang]; const shuf=fyShuffle(q.opts);
  const sentence=q.sentence.replace('_____','<span class="blank" id="bl'+i+'">?</span>');
  return `<div class="qcard${i!==0?' hidden':''}" id="q${i}">
    <div class="qtop"><div class="qnum">${i+1}</div><span class="qlabel" id="ql${i}">${t.qlabel} ${i+1}</span><button class="qreport" id="qr${i}" onclick="toggleReport(${i})">${t.report}</button></div>
    <p class="qtext">${sentence}</p>
    <div class="support">${q.hint?`<button class="sbtn hint" id="hb${i}" onclick="reveal(${i},'hint')">💡 <span>${t.hint}</span></button>`:''}<button class="sbtn tr" id="tb${i}" onclick="reveal(${i},'tr')">🔤 <span>${t.tr}</span></button></div>
    ${q.hint?`<div class="reveal hintbox" id="hr${i}"><span class="lab">${t.hintLab}</span>${q.hint}</div>`:''}
    <div class="reveal trbox" id="trb${i}"><span class="lab">${t.trLab}</span>${q.tr}</div>
    <div class="opts" id="op${i}">${shuf.map(o=>`<button class="opt" onclick="pick(${i},this)">${o}</button>`).join('')}</div>
    <div class="fb" id="fb${i}"></div>
    <div class="rform" id="rf${i}"><h4 id="rfh${i}">${t.rFormH}</h4><select id="rt${i}">${t.rOpts.map(o=>`<option>${o}</option>`).join('')}</select><textarea id="rn${i}" placeholder="${t.rPlace}"></textarea><div class="rrow"><button class="rsend" onclick="sendReport(${i})">${t.rSend}</button><button class="rcancel" onclick="toggleReport(${i})">${t.rCancel}</button></div></div>
    <div class="rdone" id="rd${i}"><div style="font-weight:800;font-size:13px;color:#1B5E20;" id="rdt${i}">${t.rDone}</div><div style="font-size:11.5px;color:#555;margin-top:3px;" id="rcl${i}">${t.rCodeLab}</div><div class="rcode" id="rc${i}" onclick="copyCode(${i})"></div></div>
    <div class="nav"><button class="nb prev" onclick="nav(${i},-1)" ${i===0?'disabled':''}>${t.prev}</button><button class="nb next" id="nx${i}" onclick="nav(${i},1)" disabled>${i===QS.length-1?t.seeRes:t.next}</button></div>
  </div>`;
}
function render(){ document.getElementById('qbox').innerHTML=QS.map(buildQ).join(''); document.getElementById('tot').textContent=QS.length; }
function reveal(i,which){ startTimer();
  if(which==='hint'){ const hr=document.getElementById('hr'+i); if(!hr) return; hr.classList.toggle('show'); document.getElementById('hb'+i).classList.add('used'); }
  else { document.getElementById('trb'+i).classList.toggle('show'); const b=document.getElementById('tb'+i); if(!b.classList.contains('used')){ b.classList.add('used'); QS[i]._tr=true; } } }
function feedbackHTML(i){ const q=QS[i], t=T[lang], ok=picked[i]===q.correct;
  let b=`<div class="fblk story"><b>${t.bStory}</b><span class="qquote">${q.story}</span><br>${q.storyWhy[lang]}</div>`;
  b+=`<div class="fblk sig"><b>${t.bSig}</b><span class="tag">${q.clue}</span> ${q.reinf?q.reinf[lang]:''}</div>`;
  b+=`<div class="fblk rule"><b>${t.bRule}</b>${q.rule[lang]}</div>`;
  if(q.es&&q.es[lang]) b+=`<div class="fblk es"><b>${t.bEs}</b>${q.es[lang]}</div>`;
  if(q.lit&&q.lit[lang]) b+=`<div class="fblk lit"><b>${t.bLit}</b>${q.lit[lang]}</div>`;
  const sup=q._tr?`<span style="margin-left:auto;font-size:10px;font-weight:800;background:rgba(255,255,255,.25);padding:2px 8px;border-radius:10px;">${t.withSupport}</span>`:'';
  return `<div class="fbh">${ok?'✅':'❌'} <b>${ok?t.fbOk:t.fbNo}</b>${sup}</div><div class="fbb">${b}</div>`; }
function pick(i,btn){ if(ans[i]) return; ans[i]=true; startTimer();
  const q=QS[i], sel=btn.textContent.trim(), ok=sel===q.correct; picked[i]=sel;
  if(ok){ score++; xpTotal+=XPQ; toast('+'+XPQ+' XP ⭐'); } else wrongTags.push(q.reinf[lang]); if(q._tr) usedTr++;
  const bl=document.getElementById('bl'+i); bl.textContent=sel; bl.className='blank '+(ok?'ok':'no');
  document.querySelectorAll('#op'+i+' .opt').forEach(b=>{ b.disabled=true; const tx=b.textContent.trim(); if(tx===q.correct)b.classList.add('ok'); else if(tx===sel)b.classList.add('no'); });
  const fb=document.getElementById('fb'+i); fb.className='fb show '+(ok?'ok':'no'); fb.innerHTML=feedbackHTML(i);
  document.getElementById('nx'+i).disabled=false; progress(); }
function refreshFeedback(){ ans.forEach((a,i)=>{ if(a){ const fb=document.getElementById('fb'+i); if(fb) fb.innerHTML=feedbackHTML(i); } });
  wrongTags=[]; ans.forEach((a,i)=>{ if(a && picked[i]!==QS[i].correct) wrongTags.push(QS[i].reinf[lang]); }); }
function progress(){ document.getElementById('pfill').style.width=(ans.filter(Boolean).length/QS.length*100)+'%'; }
function show(i){ document.querySelectorAll('.qcard').forEach((c,x)=>c.classList.toggle('hidden',x!==i)); document.getElementById('cq').textContent=i+1; cur=i; window.scrollTo({top:0,behavior:'smooth'}); }
function nav(i,d){ if(d<0){ if(i>0) show(i-1); return; } if(i<QS.length-1) show(i+1); else results(); }
function results(){ const t=T[lang]; document.getElementById('mbody').style.display='none'; document.getElementById('results').classList.add('show');
  const pct=Math.round(score/QS.length*100), passed=pct>=PASS;
  const um=document.getElementById('unlockMsg'); um.className='unlock '+(passed?'pass':'fail'); um.textContent=passed?t.pass:t.fail;
  document.getElementById('heroEm').textContent = passed?'🎉':'💪';
  document.getElementById('fscore').textContent=pct; document.getElementById('fhits').textContent=score+'/'+QS.length; document.getElementById('ftime').textContent=fmt(sec); document.getElementById('fxp').textContent='+'+(passed?xpTotal:0);
  const stars=pct>=90?3:pct>=PASS?2:1; document.querySelectorAll('.star').forEach((s,x)=>{ if(x<stars) setTimeout(()=>s.classList.add('on'),x*250); });
  document.getElementById('fphrase').textContent = pct>=90?t.ph[0]:pct>=PASS?t.ph[1]:t.ph[2];
  document.getElementById('surprise').style.display = passed ? 'flex' : 'none';
  document.getElementById('supportNote').textContent = usedTr>0 ? t.supp(usedTr) : '';
  const reinf=document.getElementById('reinf'), chips=document.getElementById('rchips'); const uniq=[...new Set(wrongTags)];
  if(uniq.length){ reinf.style.display='block'; chips.innerHTML=uniq.map(x=>`<span class="rchip">${x}</span>`).join(''); } else reinf.style.display='none';
  const act=document.getElementById('actionMsg'); if(act){ const u=[...new Set(wrongTags)];
    if(pct>=90) act.textContent = lang==='es'?'Dominas este tema. Continúa con la siguiente actividad en la plataforma.':'You\'ve mastered this. Move on to the next activity in the platform.';
    else if(passed) act.innerHTML = lang==='es'?('Aprobaste. Antes de seguir, repasa: <b>'+u.join(', ')+'</b>.'):('You passed. Before moving on, review: <b>'+u.join(', ')+'</b>.');
    else act.innerHTML = lang==='es'?('Te faltó poco. Enfócate en <b>'+(u.slice(0,2).join(' y ')||'el tema')+'</b>, abre el resumen y vuelve a intentarlo.'):('Almost there. Focus on <b>'+(u.slice(0,2).join(' and ')||'the topic')+'</b>, check the summary and try again.'); }
  window.scrollTo({top:0,behavior:'smooth'});
  /* ► Registro de avance en la plataforma (jucum-connect.js lo escucha) */
  window.JUCUM_OWN_PANEL = true; // el material muestra su propio panel
  window.dispatchEvent(new CustomEvent('jucum:done',{ detail:{ score: pct, xp: passed?xpTotal:0, finished: passed } }));
}
function restart(){ cur=0;score=0;xpTotal=0;ans.fill(false);picked.fill(null);wrongTags=[];usedTr=0;sec=0; clearInterval(timer);timer=null;
  QS.forEach(q=>{delete q._tr;}); document.getElementById('pfill').style.width='0'; var _ct=document.getElementById('ct'); if(_ct)_ct.textContent='0:00';
  document.querySelectorAll('.star').forEach(s=>s.classList.remove('on')); document.getElementById('results').classList.remove('show');
  document.getElementById('mbody').style.display='block'; render(); show(0); }
function toggleReport(i){ document.getElementById('rf'+i).classList.toggle('show'); }
function sendReport(i){ const type=document.getElementById('rt'+i).value, note=document.getElementById('rn'+i).value.trim();
  document.getElementById('rf'+i).classList.remove('show');
  const payload={ mat:MAT.reportId, q:i+1, issue:type, note:note||'-' };
  document.getElementById('rc'+i).textContent='JEC-RPT · '+JSON.stringify(payload);
  document.getElementById('rd'+i).classList.add('show');
  /* Puente con soporte: la plataforma puede escuchar este evento y guardarlo en Supabase */
  try{ window.dispatchEvent(new CustomEvent('jucum:report',{ detail: payload })); }catch(e){}
  toast(lang==='es'?'✓ Reporte enviado a soporte':'✓ Report sent to support'); }
function copyCode(i){ const x=document.getElementById('rc'+i).textContent; navigator.clipboard&&navigator.clipboard.writeText(x); toast(lang==='es'?'Código copiado':'Code copied'); }
function applyUiLang(){ const t=T[lang]; var _cn=document.getElementById('chipNote'); if(_cn)_cn.textContent=t.timeNote;
  document.getElementById('lswLab').textContent=t.lswLab; document.getElementById('instrT').textContent=t.instrT; document.getElementById('instrP').innerHTML=t.instrP;
  document.getElementById('mhtitle').textContent=MAT.title; document.getElementById('mhsub').textContent=MAT.subtitle;
  document.getElementById('lHits').textContent=t.hits;
  document.getElementById('lTime').innerHTML=t.time+'<span class="note">'+t.timeNote+'</span>';
  document.getElementById('lReinf').textContent=t.reinf; document.getElementById('lXp').textContent=t.xp; document.getElementById('lXpSub').textContent=t.xpSub;
  document.getElementById('lBack').textContent=t.back; document.getElementById('lRetry').textContent=t.retry; document.getElementById('lXpEarned').textContent=t.xpEarned;
  document.getElementById('helpT').textContent=t.helpT; document.getElementById('helpTips').innerHTML='<div style="font-size:11.5px;color:var(--text-soft);font-weight:700;margin-bottom:6px">'+t.tipsT+'</div>'+t.tips.map(x=>'<div class="helptip">• <span>'+x+'</span></div>').join('');
  QS.forEach((q,i)=>{ const e=id=>document.getElementById(id+i);
    if(e('ql'))e('ql').textContent=t.qlabel+' '+(i+1); if(e('qr'))e('qr').textContent=t.report;
    if(e('hb'))e('hb').querySelector('span').textContent=t.hint; if(e('tb'))e('tb').querySelector('span').textContent=t.tr;
    const hl=document.querySelector('#hr'+i+' .lab'); if(hl)hl.textContent=t.hintLab; const tl=document.querySelector('#trb'+i+' .lab'); if(tl)tl.textContent=t.trLab;
    if(e('nx'))e('nx').textContent=(i===QS.length-1?t.seeRes:t.next); const pv=document.querySelector('#q'+i+' .prev'); if(pv)pv.textContent=t.prev;
    if(e('rfh'))e('rfh').textContent=t.rFormH; }); }
function setLang(l){ lang=l; document.getElementById('lswEs').classList.toggle('on',l==='es'); document.getElementById('lswEn').classList.toggle('on',l==='en');
  applyUiLang(); refreshFeedback(); if(document.getElementById('results').classList.contains('show')) results(); }
function openHelp(){document.getElementById('helpov').classList.add('show');} function closeHelp(){document.getElementById('helpov').classList.remove('show');}
function exitGuard(){ if(!document.getElementById('results').classList.contains('show') && (sec>0 || ans.some(Boolean))){ openExit(); } else { volver(); } }
function openExit(){ const t=T[lang]; document.getElementById('exitT').textContent=t.exitT; document.getElementById('exitP').innerHTML=t.exitP(xpTotal); document.getElementById('exitStay').textContent=t.exitStay; document.getElementById('exitLeave').textContent=t.exitLeave; document.getElementById('exitov').classList.add('show'); }
function closeExit(){ document.getElementById('exitov').classList.remove('show'); }
function leaveNow(){ document.getElementById('exitov').classList.remove('show'); xpTotal=0; volver(); }
function volver(){ if(document.referrer){ location.href=document.referrer; } else if(history.length>1){ history.back(); } else { toast(lang==='es'?'Vuelve a tu práctica en la plataforma':'Go back to your practice in the platform'); } }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2600); }
document.addEventListener('contextmenu',e=>{ if(e.target.closest('.mat')){ e.preventDefault(); toast(lang==='es'?'Material protegido © JUCUM EC':'Protected material © JUCUM EC'); }});
render(); applyUiLang(); show(0);
</script>
