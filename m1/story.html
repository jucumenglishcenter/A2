<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stories y Diálogos · Services & Support · JUCUM</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:ital,wght@0,400;0,600;0,700;0,800&family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#ECEAE3; --card:#fff; --text:#2A2A2A; --text-soft:#777; --border:#E8E5DC;
    --fd:'Fredoka','Nunito',system-ui,sans-serif; --fb:'Nunito',system-ui,sans-serif; --fs:'Atkinson Hyperlegible',Georgia,serif;
    --rv-bg:#F3E5F5; --rv-text:#7B1FA2; --rv-bd:#CE93D8; --reading:18px;
    --shadow:0 2px 4px rgba(0,0,0,.07),0 10px 30px rgba(0,0,0,.14); --shadow-sm:0 1px 2px rgba(0,0,0,.06),0 3px 10px rgba(0,0,0,.09); }
  [data-level="pre-a1"]{ --lp:#F9A825; --ld:#E65100; --ll:#FFF9C4; --lm:#FFECB3; --lg:linear-gradient(135deg,#F9A825,#FF8F00); --tint:#FAF7EE; }
  [data-level="a1"]{ --lp:#2196F3; --ld:#0D47A1; --ll:#E3F2FD; --lm:#BBDEFB; --lg:linear-gradient(135deg,#1565C0,#2196F3 60%,#64B5F6); --tint:#F1F7FE; }
  [data-level="a2"]{ --lp:#2EA84B; --ld:#1B5E20; --ll:#DFF5E3; --lm:#9FD3A2; --lg:linear-gradient(135deg,#43C062,#1F7A33); --tint:#F0F8F2; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;}
  .bar{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.88);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:11px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .bar-brand{display:flex;align-items:center;gap:9px;} .bar-brand img{width:36px;height:36px;object-fit:contain;}
  .bar-brand b{font-family:var(--fd);font-weight:600;font-size:15px;display:block;line-height:1.05;} .bar-brand span{font-size:10.5px;color:var(--text-soft);font-weight:700;}
  .bar-title{flex:1;min-width:160px;} .bar-title h1{font-family:var(--fd);font-weight:600;font-size:16px;margin:0;} .bar-title p{margin:1px 0 0;font-size:11.5px;color:var(--text-soft);font-weight:700;}
  .ctrl{display:flex;align-items:center;gap:7px;} .ctrl>span{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--text-soft);}
  .seg{display:flex;background:#F0EDE4;border:1px solid var(--border);border-radius:11px;padding:3px;gap:2px;}
  .seg button{border:none;background:transparent;font-family:var(--fb);font-weight:800;font-size:12px;padding:6px 12px;border-radius:8px;cursor:pointer;color:var(--text-soft);}
  #segPre.on{background:linear-gradient(135deg,#F9A825,#FF8F00);color:#fff;} #segA1.on{background:linear-gradient(135deg,#1565C0,#2196F3);color:#fff;} #segA2.on{background:linear-gradient(135deg,#43C062,#1F7A33);color:#fff;}
  .stage{max-width:1200px;margin:0 auto;padding:24px 20px 60px;display:grid;grid-template-columns:minmax(0,420px) minmax(0,1fr);gap:30px;align-items:start;}
  @media(max-width:900px){.stage{grid-template-columns:1fr;}}
  .phone-wrap{position:sticky;top:78px;display:flex;flex-direction:column;align-items:center;gap:12px;}
  .phone-cap{font-size:11.5px;color:var(--text-soft);font-weight:800;text-transform:uppercase;letter-spacing:.08em;display:flex;gap:7px;align-items:center;} .phone-cap b{padding:3px 10px;border-radius:20px;color:#fff;font-size:10.5px;background:var(--lp);}
  .phone{width:408px;max-width:93vw;background:#1c1c22;border-radius:42px;padding:11px;box-shadow:var(--shadow);}
  .screen{background:var(--tint);border-radius:32px;overflow:hidden;position:relative;height:772px;display:flex;flex-direction:column;}
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:130px;height:24px;background:#1c1c22;border-radius:0 0 16px 16px;z-index:30;}
  .scroll{position:relative;z-index:2;flex:1;overflow-y:auto;overflow-x:hidden;} .scroll::-webkit-scrollbar{width:0;}
  .mhead{background:var(--lg);padding:30px 15px 13px;display:flex;align-items:center;gap:10px;color:#fff;}
  .mback{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.22);border:none;color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;}
  .mbadge{width:32px;height:32px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.2);} .mbadge img{width:24px;height:24px;object-fit:contain;}
  .mh-info{flex:1;min-width:0;} .mh-info b{font-family:var(--fd);font-weight:600;font-size:15px;display:block;} .mh-info span{font-size:10.5px;opacity:.9;font-weight:700;}
  .pill{background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.35);color:#fff;font-size:10px;font-weight:800;padding:3px 9px;border-radius:12px;}
  .rtools{position:sticky;top:0;z-index:15;background:rgba(255,255,255,.94);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:8px 10px;display:flex;flex-direction:column;gap:7px;}
  .rrow{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .playall{display:inline-flex;align-items:center;gap:6px;font-weight:800;font-size:12.5px;border:none;border-radius:10px;padding:8px 14px;cursor:pointer;background:var(--lg);color:#fff;box-shadow:var(--shadow-sm);}
  .miniseg{display:flex;background:#F0EDE4;border:1px solid var(--border);border-radius:9px;padding:2px;gap:2px;} .miniseg button{border:none;background:transparent;font-weight:800;font-size:10.5px;padding:4px 8px;border-radius:7px;cursor:pointer;color:var(--text-soft);} .miniseg button.on{background:var(--lg);color:#fff;} .miniseg .lab{font-size:9px;font-weight:800;color:var(--text-soft);align-self:center;padding:0 4px;text-transform:uppercase;}
  .tbtn{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:800;border:1.5px solid var(--lm);background:#fff;color:var(--ld);border-radius:9px;padding:5px 8px;cursor:pointer;} .tbtn.on{background:var(--lg);color:#fff;border-color:transparent;}
  .speed{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:800;color:var(--text-soft);} .speed input{width:70px;accent-color:var(--lp);}
  .ring{margin-left:auto;display:flex;align-items:center;gap:6px;} .ring .t{font-size:10px;font-weight:800;color:var(--ld);line-height:1.1;} .ring .t small{display:block;color:var(--text-soft);font-size:8px;font-weight:700;}
  .mbody{padding:14px 16px 30px;}
  .howto{background:#fff;border:1px solid var(--lm);border-radius:14px;box-shadow:var(--shadow-sm);margin-bottom:14px;overflow:hidden;}
  .howto-h{display:flex;align-items:center;gap:8px;padding:11px 13px;background:var(--ll);cursor:pointer;} .howto-h b{font-family:var(--fd);font-weight:600;font-size:13.5px;color:var(--ld);flex:1;} .howto-h .ar{transition:.2s;font-weight:800;color:var(--ld);} .howto.open .ar{transform:rotate(90deg);}
  .howto-b{display:none;padding:12px 14px;} .howto.open .howto-b{display:block;}
  .stepline{display:flex;gap:9px;padding:5px 0;font-size:12.5px;line-height:1.45;} .stepn{width:21px;height:21px;border-radius:50%;background:var(--lg);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;flex-shrink:0;} .stepnote{margin-top:8px;background:var(--tint);border-radius:9px;padding:8px 10px;font-size:11.5px;color:var(--text-soft);line-height:1.45;}
  .stitle{font-family:var(--fd);font-weight:600;font-size:21px;color:var(--ld);margin:2px 0 2px;} .ssub{font-size:12px;color:var(--text-soft);font-weight:700;margin-bottom:14px;}
  .para{margin-bottom:14px;border-radius:10px;transition:box-shadow .2s;padding:6px;margin-left:-6px;margin-right:-6px;} .para.reading{box-shadow:0 0 0 2px var(--lm);background:rgba(255,255,255,.5);}
  .ptext{font-family:var(--fs);font-size:var(--reading);line-height:1.95;color:#2b2b2b;}
  .sent,.sente{transition:background .15s;border-radius:4px;padding:0 1px;} .sent.read{background:var(--ll);box-shadow:0 0 0 2px var(--ll);} .sente.read{background:#F3E5F5;box-shadow:0 0 0 2px #F3E5F5;}
  .pes{display:none;font-family:var(--fs);font-style:italic;color:#5A2A66;font-size:calc(var(--reading) - 2px);line-height:1.85;margin-top:6px;padding-left:10px;border-left:2px solid var(--rv-bd);}
  .screen[data-text="es"] .ptext{display:none;} .screen[data-text="es"] .pes{display:block;border-left:none;padding-left:0;font-style:normal;color:#2b2b2b;} .screen[data-text="both"] .pes{display:block;}
  .prow{display:flex;gap:7px;margin-top:8px;} .pbtn{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;border-radius:9px;padding:5px 11px;cursor:pointer;border:1.5px solid var(--lm);background:var(--tint);color:var(--ld);} .pbtn.on{background:var(--lg);color:#fff;border-color:transparent;}
  .dato{display:none;margin-top:9px;background:#FFF8E1;border:1px solid #FFE082;border-radius:11px;padding:9px 12px;font-size:12.5px;color:#6B4E00;line-height:1.5;} .screen[data-datos="on"] .dato{display:block;} .dato .hd{display:flex;align-items:center;gap:5px;font-weight:800;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:#92510F;margin-bottom:3px;} .dato b{color:#92510F;}
  .endcard{background:#fff;border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow-sm);padding:18px;text-align:center;margin-top:6px;}
  .endcard .em{font-size:40px;} .endcard h3{font-family:var(--fd);font-weight:600;font-size:18px;color:var(--ld);margin:6px 0 2px;} .endcard p{font-size:12.5px;color:var(--text-soft);margin:0 0 12px;line-height:1.5;}
  .estats{display:flex;gap:9px;margin-bottom:12px;} .estat{flex:1;background:var(--tint);border:1px solid var(--lm);border-radius:12px;padding:10px 6px;} .estat b{font-family:var(--fd);font-weight:600;font-size:18px;color:var(--ld);display:block;} .estat span{font-size:10px;color:var(--text-soft);font-weight:800;text-transform:uppercase;letter-spacing:.03em;}
  .ebtn{width:100%;padding:13px;border:none;border-radius:13px;background:var(--lg);color:#fff;font-weight:800;font-size:13.5px;cursor:pointer;}
  .markdone{width:100%;padding:13px;border:2px solid var(--lm);border-radius:13px;background:#fff;color:var(--ld);font-weight:800;font-size:13.5px;cursor:pointer;margin-top:14px;display:flex;align-items:center;justify-content:center;gap:7px;} .markdone.done{background:var(--lg);color:#fff;border-color:transparent;}
  .mfoot{display:flex;align-items:center;justify-content:center;gap:7px;font-size:10px;color:#B0A99A;padding:12px;font-weight:700;} .mfoot img{height:18px;opacity:.5;}
  .vpanel{position:absolute;left:0;right:0;bottom:0;z-index:60;background:#fff;border-top:1px solid var(--lm);border-radius:20px 20px 0 0;box-shadow:0 -8px 30px rgba(0,0,0,.18);padding:14px 16px 18px;transform:translateY(110%);transition:transform .28s;max-height:62%;display:flex;flex-direction:column;} .vpanel.show{transform:translateY(0);}
  .vpanel h4{font-family:var(--fd);font-weight:600;font-size:15px;color:var(--ld);margin:0 0 2px;display:flex;align-items:center;gap:7px;} .vpanel .sub{font-size:11px;color:var(--text-soft);font-weight:700;margin-bottom:10px;} .vpanel .gx{position:absolute;top:10px;right:12px;border:none;background:none;font-size:19px;color:#bbb;cursor:pointer;}
  .vlist{overflow-y:auto;display:flex;flex-direction:column;gap:7px;} .vrow{display:flex;align-items:center;gap:10px;background:var(--tint);border:1px solid var(--lm);border-radius:11px;padding:9px 11px;} .vrow .vw{font-weight:800;color:var(--ld);font-size:14px;min-width:78px;} .vrow .vm{flex:1;font-size:12.5px;color:#444;} .vrow .vex{display:block;font-family:var(--fs);font-style:italic;color:var(--text-soft);font-size:11px;margin-top:1px;} .vrow .spk{background:#fff;border:1.5px solid var(--lm);border-radius:9px;width:34px;height:34px;font-size:15px;cursor:pointer;color:var(--ld);flex-shrink:0;}
  .helpfab{position:absolute;right:14px;bottom:14px;z-index:55;display:inline-flex;align-items:center;gap:6px;height:40px;padding:0 16px;border-radius:22px;background:var(--lg);color:#fff;border:none;font-family:var(--fd);font-size:13.5px;font-weight:600;cursor:pointer;box-shadow:var(--shadow);}
  .helpov{position:absolute;inset:0;z-index:70;background:rgba(20,20,25,.5);display:none;align-items:center;justify-content:center;padding:18px;} .helpov.show{display:flex;}
  .helpcard{background:#fff;border-radius:18px;max-width:340px;width:100%;max-height:86%;overflow-y:auto;box-shadow:var(--shadow);padding:16px 18px;position:relative;} .helpcard h3{font-family:var(--fd);font-weight:600;font-size:16px;color:var(--ld);margin:0 0 8px;display:flex;align-items:center;gap:7px;} .helpcard .hx{position:absolute;top:10px;right:12px;border:none;background:none;font-size:19px;color:#bbb;cursor:pointer;}
  .helptip{display:flex;gap:6px;font-size:12px;color:#555;padding:4px 0;line-height:1.45;} .helptip b{color:var(--ld);}
  .helpfab.hidden{display:none;}
  .viewseg{display:flex;gap:4px;background:#F0EDE4;border:1px solid var(--border);border-radius:11px;padding:3px;margin-bottom:10px;}
  .viewseg button{flex:1;border:none;background:transparent;font-family:var(--fd);font-weight:600;font-size:12.5px;padding:7px 6px;border-radius:8px;cursor:pointer;color:var(--text-soft);display:flex;align-items:center;justify-content:center;gap:5px;} .viewseg button.on{background:var(--lg);color:#fff;}
  .dsp{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--ld);margin-bottom:2px;}
  .stpick{position:absolute;inset:0;z-index:65;background:var(--tint);overflow-y:auto;padding:20px 16px;}
  .stpick h3{font-family:var(--fd);font-weight:600;font-size:17px;color:var(--ld);margin:0 0 3px;} .stpick .sub{font-size:12px;color:var(--text-soft);font-weight:700;margin-bottom:14px;line-height:1.4;}
  .stcard{display:flex;gap:11px;align-items:center;background:#fff;border:1.5px solid var(--border);border-radius:15px;padding:12px;margin-bottom:10px;cursor:pointer;box-shadow:var(--shadow-sm);}
  .stcard.lock{opacity:.55;cursor:default;} .stcard .nx{width:40px;height:40px;border-radius:12px;background:var(--lg);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
  .stcard .si{flex:1;} .stcard .si b{font-family:var(--fd);font-weight:600;font-size:14px;color:var(--text);display:block;} .stcard .si span{font-size:11px;color:var(--text-soft);font-weight:700;} .stcard .go{color:var(--lp);font-weight:800;font-size:18px;}
  .notes h2{font-family:var(--fd);font-weight:600;font-size:18px;margin:0 0 4px;} .notes .lead{font-size:13px;color:var(--text-soft);margin:0 0 18px;line-height:1.5;}
  .note{background:#fff;border:1px solid var(--border);border-radius:15px;padding:14px 16px;margin-bottom:11px;box-shadow:var(--shadow-sm);} .note-h{display:flex;align-items:center;gap:10px;margin-bottom:6px;} .note-n{width:25px;height:25px;border-radius:8px;background:var(--lg);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-weight:600;font-size:12px;flex-shrink:0;} .note-h b{font-family:var(--fd);font-weight:600;font-size:14px;} .note p{margin:0;font-size:12.5px;color:#555;line-height:1.5;}
  .ask{background:#FFFDF5;border:1.5px solid #F0D98B;border-radius:13px;padding:14px 16px;margin-top:6px;} .ask b{font-family:var(--fd);font-weight:600;font-size:14px;color:#8A5A00;} .ask p{font-size:12.5px;color:#6B5A33;margin:6px 0 0;line-height:1.55;}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:#222;color:#fff;padding:11px 20px;border-radius:24px;font-weight:800;font-size:13px;box-shadow:var(--shadow);z-index:200;opacity:0;transition:.3s;pointer-events:none;} .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* ===== PRODUCCIÓN: pantalla completa (no tocar) ===== */
  .bar{display:none!important}.notes{display:none!important}.phone-cap{display:none!important}.notch{display:none!important}
  .stage{display:block!important;max-width:560px;margin:0 auto;padding:0!important}
  .phone-wrap{position:static!important;display:block!important}
  .phone{width:100%!important;max-width:none!important;background:none!important;border-radius:0!important;padding:0!important;box-shadow:none!important}
  .screen{height:auto!important;min-height:100vh;border-radius:0!important;display:block!important;overflow:visible!important}
  .phone{width:100%!important;max-width:none!important;background:none!important;border-radius:0!important;padding:0!important;box-shadow:none!important;overflow:visible!important}
  .scroll{overflow:visible!important;height:auto!important;flex:none!important}
  .mhead{position:static!important}
  .rtools{position:sticky!important;top:0!important;z-index:30}
  .helpfab{position:fixed!important;right:16px;bottom:16px}
  .vpanel{position:fixed!important;left:50%!important;transform:translateX(-50%) translateY(110%);max-width:680px;}
  .vpanel.show{transform:translateX(-50%) translateY(0)!important;}
  .stpick{position:fixed!important;inset:0;max-width:none;}
  /* Escritorio: experiencia cómoda, no solo móvil */
  @media(min-width:760px){
    .stage{max-width:760px}
    .mbody{padding:20px 32px 48px}
    .ptext{font-size:20px;line-height:2}
    .pes{font-size:18px}
    .rtools{padding:12px 32px}
    .mhead{padding:18px 32px 14px}
    .stpick{padding:28px 32px}
    .stpick #spkList{max-width:620px;margin:0 auto}
  }
  #screen{overflow:visible!important} #screen .scroll{overflow:visible!important}
</style>
</head>
<body>
  
<div class="stage">
    <div class="phone-wrap">
      <div class="phone-cap">Vista del alumno · <b id="capLvl">Pre-A1</b></div>
      <div class="phone"><div class="screen" id="screen" data-level="a2" data-text="both" data-datos="off">
        <div class="notch"></div>
        <div class="scroll" id="scroll">
          <div class="mhead"><button class="mback" onclick="backToPicker()">‹</button>
            <div class="mbadge"><img src="https://jucum-english-center.netlify.app/assets/jucum-figure.png" alt="JUCUM" onerror="this.style.display='none'"></div>
            <div class="mh-info"><b>Stories &amp; Diálogos</b><span id="mhsub">A2 · M1 · Services & Support</span></div>
            <div class="pill">📗 Lectura</div></div>
          <div class="rtools">
            <div class="rrow">
              <button class="playall" id="playAll" onclick="playAll()"><span class="ic">▶</span> <span class="pl"></span></button>
              <div class="miniseg"><span class="lab" id="txtLab">Texto</span><button id="txEn" onclick="setText('en')">EN</button><button id="txEs" onclick="setText('es')">ES</button><button id="txBoth" class="on" onclick="setText('both')">EN+ES</button></div>
              <div class="ring"><svg width="32" height="32" viewBox="0 0 34 34"><circle cx="17" cy="17" r="14" fill="none" stroke="#E5E1D6" stroke-width="4"></circle><circle id="ringFill" cx="17" cy="17" r="14" fill="none" stroke="var(--lp)" stroke-width="4" stroke-linecap="round" stroke-dasharray="88" stroke-dashoffset="88" transform="rotate(-90 17 17)"></circle></svg><div class="t"><span id="ringT">0:00</span><small id="ringNext"></small></div></div>
            </div>
            <div class="rrow">
              <button class="tbtn" id="datosBtn" onclick="toggleDatos()">💡 <span id="datosLab"></span></button>
              <button class="tbtn" onclick="openVocab()">📖 <span id="vocLab"></span></button>
              <button class="tbtn" id="voiceBtn" onclick="toggleVoice()">🔊 US</button>
              <div class="speed">🐢<input type="range" min="0.6" max="1.3" step="0.1" value="1" oninput="setRate(this.value)"/>🐇</div>
              <button class="tbtn" onclick="textSize(-1)">A−</button><button class="tbtn" onclick="textSize(1)">A+</button>
              <div class="miniseg" style="margin-left:auto"><span class="lab">🌐</span><button id="inEs" onclick="setInfo('es')">ES</button><button id="inEn" class="on" onclick="setInfo('en')">EN</button></div>
            </div>
          </div>
          <div class="mbody">
            <div class="howto" id="howto"><div class="howto-h" onclick="document.getElementById('howto').classList.toggle('open')"><span>🧭</span><b id="howtoT"></b><span class="ar">▸</span></div><div class="howto-b" id="howtoB"></div></div>
            <div class="viewseg"><button id="vwStory" class="on" onclick="setView('story')">📖 <span id="vwStoryL">Story</span></button><button id="vwDlg" onclick="setView('dlg')">💬 <span id="vwDlgL">Diálogo</span></button></div>
            <div class="stitle" id="stitle">A Week Without Water</div>
            <div class="ssub" id="ssub">Story 1 · Lucia y el corte de agua del edificio</div>

<script>
const GLOSS = [{"w":"service","es":"servicio","ex":"customer service"},{"w":"outage","es":"corte / interrupción","ex":"a water outage"},{"w":"claim","es":"reclamo","ex":"a claim form"},{"w":"refund","es":"reembolso","ex":"a full refund"},{"w":"credit","es":"crédito / abono","ex":"a credit on your bill"},{"w":"issue","es":"problema","ex":"report an issue"},{"w":"request","es":"solicitar / solicitud","ex":"a maintenance request"},{"w":"complaint","es":"queja / reclamo","ex":"file a complaint"},{"w":"replace","es":"reemplazar","ex":"a replacement"},{"w":"support","es":"soporte / ayuda","ex":"technical support"}];
/* Cada oración alineada EN↔ES (para resaltado por oración en ambos idiomas) */
const STORYDATA = {"1":{"sTitle":"A Week Without Water","sTitleEs":"Una semana sin agua","dTitle":"The Internet Is Down","dTitleEs":"Se cayó el internet","paras":[[["Lucia noticed the problem on a Monday morning.","Lucia notó el problema un lunes por la mañana."],["She turned on the tap and nothing came out.","Abrió la llave y no salió nada."],["The pipes made a strange sound, like something was trying to move through them but couldn't.","Las tuberías hacían un sonido extraño, como si algo intentara pasar por ellas pero no pudiera."],["She waited a few minutes, then tried again.","Esperó unos minutos y volvió a intentarlo."],["Still nothing.","Nada."],["She knocked on her neighbor's door to ask if he had the same issue, and he did.","Tocó a la puerta de su vecino para preguntar si tenía el mismo problema, y sí."],["The whole building was without water.","Todo el edificio estaba sin agua."]],[["She found the management office number on a notice board near the front door and called right away.","Encontró el número de la oficina de administración en un tablón de anuncios cerca de la entrada y llamó de inmediato."],["The person who answered told her to wait — someone would come to look at it.","La persona que contestó le dijo que esperara: alguien vendría a revisarlo."],["She asked when, and he said probably that afternoon.","Ella preguntó cuándo, y él dijo que probablemente esa tarde."],["She made a mental note of the things she needed water for: cooking, cleaning, and a load of laundry she had been planning to do that week.","Mentalmente anotó las cosas para las que necesitaba agua: cocinar, limpiar y una carga de ropa que había planeado hacer esa semana."]],[["Nobody came that afternoon.","Nadie vino esa tarde."],["Lucia called again the next morning and was told the issue was more serious than expected.","Lucia llamó de nuevo a la mañana siguiente y le dijeron que el problema era más grave de lo esperado."],["There was a damaged section of pipe beneath the building, and it would require a specialist to fix it.","Había una sección dañada de tubería debajo del edificio y se necesitaría un especialista para repararla."],["The repair team would arrive within two days.","El equipo de reparación llegaría en dos días."],["She felt a mix of frustration and understanding — she knew these things took time, but it didn't make the situation any easier.","Sintió una mezcla de frustración y comprensión: sabía que estas cosas llevaban tiempo, pero eso no hacía la situación más fácil."]],[["On the third day, the team arrived.","Al tercer día llegó el equipo."],["Lucia watched from her window as they set up their equipment in the courtyard below.","Lucia observó desde su ventana cómo instalaban su equipo en el patio de abajo."],["The process took most of the day.","El proceso tomó la mayor parte del día."],["One of the workers knocked on her door in the late afternoon to inform her that the repair was complete but that the water pressure might be low for a few hours while the system settled back to its usual state.","Uno de los trabajadores tocó a su puerta a última hora de la tarde para informarle que la reparación estaba completa, pero que la presión del agua podría ser baja durante unas horas mientras el sistema volvía a su estado normal."]],[["By evening, the water was running normally again.","Para la tarde, el agua volvía a correr con normalidad."],["Lucia filled a glass, drank it slowly, and felt a quiet sense of relief.","Lucia llenó un vaso, lo bebió despacio y sintió una tranquila sensación de alivio."],["It was only three days, but it had felt much longer.","Solo fueron tres días, pero se sintieron mucho más largos."],["She made a note to keep a small supply of bottled water at home for situations like this.","Se propuso mantener una pequeña reserva de agua embotellada en casa para situaciones como esta."]],[["A few days later, she found a claim form on the building's website and filled it out carefully.","Unos días después, encontró un formulario de reclamo en el sitio web del edificio y lo completó con cuidado."],["She described the issue, the timeline, and the impact it had on her daily routine.","Describió el problema, la cronología y el impacto que tuvo en su rutina diaria."],["She kept her tone calm and focused on facts rather than emotion.","Mantuvo un tono tranquilo y se centró en los hechos más que en las emociones."],["A week later, she received a short email from the management team thanking her for the feedback and promising to review their response process.","Una semana después, recibió un breve correo electrónico del equipo de administración agradeciéndole su retroalimentación y prometiendo revisar su proceso de respuesta."]],[["In the days that followed, Lucia noticed small improvements around the building.","En los días siguientes, Lucía notó pequeñas mejoras en el edificio."],["The management posted a clear notice about who to contact during emergencies, and a new phone line was added for urgent repairs.","La administración publicó un aviso claro sobre a quién contactar durante emergencias, y se agregó una nueva línea telefónica para reparaciones urgentes."],["A few neighbors mentioned that they had also complained, and together their voices seemed to carry more weight than any single message.","Algunos vecinos comentaron que ellos también se habían quejado, y juntas sus voces parecían tener más peso que cualquier mensaje individual."],["Lucia realized that polite persistence, repeated by several people, could push a slow system to move faster.","Lucía se dio cuenta de que la insistencia amable, repetida por varias personas, podía hacer que un sistema lento avanzara más rápido."]],[["The experience taught her something useful.","La experiencia le enseñó algo útil."],["Problems with services are a normal part of life, and the way you handle them matters.","Los problemas con los servicios son una parte normal de la vida, y la forma en que los manejas importa."],["Staying calm, keeping records, and communicating clearly made a real difference.","Mantener la calma, llevar registros y comunicarse con claridad marcó una diferencia real."],["She felt more confident about dealing with similar situations in the future, and she was glad she had spoken up rather than simply waiting for things to improve on their own.","Se sentía más segura para enfrentar situaciones similares en el futuro, y se alegró de haber hablado en lugar de simplemente esperar a que las cosas mejorasen por sí solas."]]],"dlg":[["Customer","Good morning. My internet connection stopped working late last night.","Buenos días. Mi conexión a internet dejó de funcionar anoche."],["Agent","Good morning, I'm sorry to hear that. Can I get your account number and address?","Buenos días, lamento escuchar eso. ¿Me da su número de cuenta y dirección?"],["Customer","Sure. The account is 4471, and the address is 12 Lake View Street.","Claro. La cuenta es 4471, y la dirección es Calle Lake View 12."],["Agent","Thank you. I can see your account, and there's a known outage in your area this week.","Gracias. Veo su cuenta, y hay un corte conocido en su zona esta semana."],["Customer","I see. Do you know when the service will come back on?","Ya veo. ¿Sabe cuándo volverá el servicio?"],["Customer","I work from home, so I really depend on the connection.","Trabajo desde casa, así que dependo mucho de la conexión."],["Agent","We expect it resolved by the end of the week. Our team is already working on it.","Esperamos resolverlo para fin de semana. Nuestro equipo ya está trabajando en ello."],["Customer","That's quite a long wait. Could you offer a credit in the meantime?","Es una espera bastante larga. ¿Podría darme un crédito mientras tanto?"],["Agent","That's fair. Since the outage has lasted over 48 hours, you're entitled to one.","Es justo. Como el corte lleva más de 48 horas, le corresponde uno."],["Customer","I'd appreciate that. How much will the credit be?","Se lo agradecería. ¿De cuánto sería el crédito?"],["Agent","It covers three days of service, about nine dollars, applied to your next bill.","Cubre tres días de servicio, unos nueve dólares, en su próxima factura."],["Customer","That's reasonable. Is there a way to check the status online?","Es razonable. ¿Hay forma de revisar el estado en línea?"],["Agent","Yes. Visit our website and look at the outage map for your area.","Sí. Entre a nuestro sitio web y vea el mapa de cortes de su zona."],["Agent","You can also sign up to get updates by text or email.","También puede suscribirse para recibir avisos por mensaje o correo."],["Customer","Helpful. I have an important video call tomorrow morning, though.","Útil. Aunque tengo una videollamada importante mañana en la mañana."],["Agent","I can't promise an exact time, but I'll flag your account as urgent.","No puedo prometer una hora exacta, pero marcaré su cuenta como urgente."],["Customer","Thank you. Is there anything else I should do while I wait?","Gracias. ¿Hay algo más que deba hacer mientras espero?"],["Agent","Try restarting your router once more tonight. Sometimes it helps when the network returns.","Reinicie su router una vez más esta noche. A veces ayuda cuando la red regresa."],["Customer","I've already done that twice, but I'll give it another try.","Ya lo hice dos veces, pero lo intentaré de nuevo."],["Agent","Good. If nothing changes by tomorrow, please call us back.","Bien. Si nada cambia mañana, por favor vuelva a llamar."],["Agent","And mention the reference number for this case: 8823-B.","Y mencione el número de referencia de este caso: 8823-B."],["Customer","Got it, 8823-B. Could you also send me an email confirmation?","Anotado, 8823-B. ¿También me puede enviar una confirmación por correo?"],["Agent","Of course. I'll email a summary with the credit and the reference number.","Por supuesto. Le enviaré un resumen con el crédito y el número de referencia."],["Customer","Perfect. Thank you for taking the time to sort all this out.","Perfecto. Gracias por tomarse el tiempo de resolver esto."],["Agent","It's my pleasure. We take these situations seriously, especially for people working from home.","Es un placer. Tomamos estos casos en serio, sobre todo con quienes trabajan desde casa."],["Customer","I appreciate that. I'll check the status page tonight and hope for good news.","Se lo agradezco. Revisaré la página de estado esta noche y espero buenas noticias."]],"datos":{"0":"<i>nothing came out</i> = «no salió nada». El inglés pone la negación en <i>nothing</i> y deja el verbo afirmativo; el español usa doble negación («no… nada»)."}},"2":{"sTitle":"The Model That Didn't Arrive","sTitleEs":"El modelo que no llegó","dTitle":"A Damaged Delivery","dTitleEs":"Una entrega dañada","paras":[[["James had a hobby that kept him calm during busy weeks: building model ships.","James tenía un pasatiempo que lo mantenía tranquilo durante las semanas ocupadas: construir barcos en miniatura."],["He had been doing it since he was a teenager, and over the years his collection had grown to fill an entire wall of his apartment.","Lo hacía desde que era adolescente y, con los años, su colección había crecido hasta llenar toda una pared de su apartamento."],["One Saturday morning, he found a new model online that he had never seen before — a detailed replica of an old sailing ship.","Un sábado por la mañana, encontró en línea un modelo nuevo que nunca había visto: una réplica detallada de un antiguo velero."],["The image on the website looked beautiful, and the price seemed reasonable.","La imagen en el sitio web se veía hermosa y el precio parecía razonable."],["He ordered it without much hesitation.","Lo pidió sin pensarlo demasiado."]],[["Two weeks passed and the package hadn't arrived.","Pasaron dos semanas y el paquete no había llegado."],["He checked the tracking page on the website, but the status had not changed since the day he placed the order.","Revisó la página de seguimiento en el sitio web, pero el estado no había cambiado desde el día en que hizo el pedido."],["It simply said 'processing.'","Simplemente decía 'procesando'."],["He sent an email asking for an update, but received no response.","Envió un correo pidiendo una actualización, pero no recibió respuesta."],["He tried again three days later.","Lo intentó de nuevo tres días después."],["Still nothing.","Nada todavía."],["He was starting to feel that something had gone wrong.","Empezaba a sentir que algo había salido mal."]],[["He found a phone number on the site and called.","Encontró un número de teléfono en el sitio y llamó."],["The line rang for a long time before someone answered.","La línea sonó durante mucho tiempo antes de que alguien contestara."],["When they finally did, the connection was poor and the sound was difficult to make out.","Cuando finalmente lo hicieron, la conexión era mala y el sonido era difícil de entender."],["He explained that he had been waiting for his order and that the tracking information hadn't changed.","Explicó que llevaba esperando su pedido y que la información de seguimiento no había cambiado."],["The representative said there had been a delay at the warehouse and that his item would ship soon.","El representante dijo que había habido una demora en el almacén y que su artículo se enviaría pronto."]],[["Another two weeks went by.","Pasaron otras dos semanas."],["The package still hadn't arrived.","El paquete todavía no había llegado."],["James decided to be more direct.","James decidió ser más directo."],["He wrote a detailed email explaining the full timeline of the issue, including dates and the content of his previous conversations.","Escribió un correo electrónico detallado explicando toda la cronología del problema, incluyendo fechas y el contenido de sus conversaciones anteriores."],["He made it clear that he expected either the item to be delivered within seven days or a full refund.","Dejó claro que esperaba que el artículo se entregara en siete días o un reembolso completo."],["He kept a copy of everything he sent.","Guardó una copia de todo lo que envió."]],[["This time, someone responded within 24 hours.","Esta vez, alguien respondió en 24 horas."],["They apologized and explained that the item was out of stock — in fact, the product had been discontinued.","Se disculparon y explicaron que el artículo estaba agotado; de hecho, el producto había sido descontinuado."],["They offered him a credit to use on a future purchase.","Le ofrecieron un crédito para usar en una compra futura."],["James politely declined.","James lo rechazó amablemente."],["He said he preferred a refund to his original payment method, since he had no interest in ordering from that company again.","Dijo que prefería un reembolso a su método de pago original, ya que no tenía interés en volver a pedir a esa empresa."],["The representative agreed and said the refund would be processed within five business days.","El representante aceptó y dijo que el reembolso se procesaría en cinco días hábiles."]],[["The money appeared in his account six days later.","El dinero apareció en su cuenta seis días después."],["James was relieved but still a little frustrated by the whole experience.","James estaba aliviado, pero todavía un poco frustrado por toda la experiencia."],["He had spent nearly a month trying to receive something he had paid for.","Había pasado casi un mes intentando recibir algo por lo que había pagado."],["He wrote a short review on a consumer forum, describing the situation honestly and without exaggeration.","Escribió una breve reseña en un foro de consumidores, describiendo la situación con honestidad y sin exageración."],["He thought it might be useful for someone else thinking about ordering from the same site.","Pensó que podría serle útil a alguien que estuviera pensando en pedir en el mismo sitio."]],[["While he waited for the refund to appear, James wrote a short, honest review of his experience on the website.","Mientras esperaba que apareciera el reembolso, James escribió una reseña breve y honesta sobre su experiencia en el sitio web."],["He did not insult the company, but he described exactly what had happened: the long delays, the unclear tracking, and the difficulty of reaching a real person.","No insultó a la empresa, pero describió exactamente lo que había pasado: las largas demoras, el seguimiento poco claro y la dificultad para hablar con una persona real."],["Several other customers replied that they had faced the same issues.","Varios otros clientes respondieron que habían enfrentado los mismos problemas."],["The review would not bring his ship back, but it might help the next buyer know what to expect.","La reseña no traería de vuelta su barco, pero quizá ayudaría al próximo comprador a saber qué esperar."]],[["A few weeks later, he found the same model at a local hobby shop.","Unas semanas después, encontró el mismo modelo en una tienda de pasatiempos local."],["It was a little more expensive than the online price, but he could hold it in his hands before buying it.","Era un poco más caro que el precio en línea, pero podía tenerlo en las manos antes de comprarlo."],["That felt like a fair trade.","Eso le pareció un intercambio justo."],["He brought it home, set it on his table, and spent a quiet Sunday afternoon sorting the pieces by size.","Lo llevó a casa, lo puso sobre su mesa y pasó una tranquila tarde de domingo clasificando las piezas por tamaño."],["It was exactly the kind of afternoon he had been looking forward to.","Era exactamente el tipo de tarde que había estado esperando."]]],"dlg":[["Customer","Hello. I received a package yesterday, but the item inside was damaged.","Hola. Recibí un paquete ayer, pero el artículo adentro estaba dañado."],["Agent","I'm very sorry to hear that. Can you describe the damage for me?","Lamento mucho escuchar eso. ¿Me puede describir el daño?"],["Customer","It's a small radio. There's a crack along the side, and it won't turn on.","Es una radio pequeña. Tiene una grieta en el costado y no enciende."],["Agent","Do you still have the original box and packaging?","¿Todavía tiene la caja y el empaque original?"],["Customer","Yes, I kept the box. One corner was bent and it looked a bit wet.","Sí, guardé la caja. Una esquina estaba doblada y se veía un poco mojada."],["Agent","Thank you for keeping it. That's important for our claims process.","Gracias por guardarla. Es importante para nuestro proceso de reclamo."],["Customer","I should have taken a photo before opening it, but I didn't.","Debí tomar una foto antes de abrirla, pero no lo hice."],["Agent","That's all right. Could you take photos of the radio and the box now?","No se preocupe. ¿Podría tomar fotos de la radio y la caja ahora?"],["Customer","Sure, I can do that. Where do I send them?","Claro, puedo hacerlo. ¿A dónde las envío?"],["Agent","Attach them to the claim form on our website. It only takes a few minutes.","Adjúntelas al formulario de reclamo en nuestro sitio web. Toma solo unos minutos."],["Customer","What happens after I submit the form?","¿Qué pasa después de enviar el formulario?"],["Agent","Our team reviews the case, usually within three to five business days.","Nuestro equipo revisa el caso, normalmente en tres a cinco días hábiles."],["Customer","Will I get a replacement or a refund?","¿Recibiré un reemplazo o un reembolso?"],["Agent","Normally a replacement first, but a full refund if the item is out of stock.","Por lo general un reemplazo, pero un reembolso completo si no hay stock."],["Customer","I'd prefer a refund, actually. I want to buy it somewhere else.","La verdad, preferiría un reembolso. Quiero comprarla en otro lugar."],["Agent","That's understandable. You can note that preference on the form.","Es comprensible. Puede anotar esa preferencia en el formulario."],["Customer","Will you really honor it, or is the replacement automatic?","¿De verdad la respetarán, o el reemplazo es automático?"],["Agent","We do our best to honor your choice whenever we can.","Hacemos lo posible por respetar su elección cuando podemos."],["Customer","Good. How long until the refund reaches my card?","Bien. ¿Cuánto demora en llegar el reembolso a mi tarjeta?"],["Agent","Once approved, it takes about five business days to appear.","Una vez aprobado, tarda unos cinco días hábiles en aparecer."],["Customer","All right. Is there a reference number for this claim?","De acuerdo. ¿Hay un número de referencia para este reclamo?"],["Agent","Yes. Your claim number is 5530-C. Please keep it for any follow-up.","Sí. Su número de reclamo es 5530-C. Guárdelo para cualquier seguimiento."],["Customer","5530-C, noted. Can I check the status online too?","5530-C, anotado. ¿También puedo ver el estado en línea?"],["Agent","Of course. Log in to your account and open the claims section.","Por supuesto. Ingrese a su cuenta y abra la sección de reclamos."],["Customer","Perfect. Thank you for explaining the whole process so clearly.","Perfecto. Gracias por explicarme todo el proceso con tanta claridad."],["Agent","You're welcome. I hope the rest of your week goes more smoothly.","De nada. Espero que el resto de su semana vaya mejor."]],"datos":{"0":"<i>kept him calm</i> = «lo mantenía tranquilo». Estructura <i>keep + alguien + adjetivo</i> = «mantener a alguien (en cierto estado)»."}},"3":{"sTitle":"The Contract She Didn't Read","sTitleEs":"El contrato que no leyó","dTitle":"The Wrong Charge","dTitleEs":"El cargo equivocado","paras":[[["Nadia had been using the same phone plan for four years.","Nadia había estado usando el mismo plan de teléfono durante cuatro años."],["It was simple and affordable, but she had recently started working from home and was using much more data than before.","Era sencillo y económico, pero recientemente había empezado a trabajar desde casa y usaba mucho más datos que antes."],["A friend recommended a new provider that offered a special rate for the first six months.","Una amiga le recomendó un nuevo proveedor que ofrecía una tarifa especial durante los primeros seis meses."],["The deal seemed good, so she called to find out more.","El trato parecía bueno, así que llamó para obtener más información."]],[["The representative was friendly and enthusiastic.","El representante era amable y entusiasta."],["He explained the benefits quickly and made everything sound easy.","Explicó los beneficios rápidamente e hizo que todo pareciera fácil."],["Nadia asked a few questions about the cost after the promotional period ended, and he gave her a number that sounded reasonable.","Nadia hizo algunas preguntas sobre el costo después de que terminara el período promocional, y él le dio una cifra que sonaba razonable."],["She agreed to sign up.","Ella aceptó inscribirse."],["When the digital contract arrived by email, she glanced at it briefly and clicked accept.","Cuando el contrato digital llegó por correo electrónico, lo hojeó brevemente y hizo clic en aceptar."],["She was in a hurry and trusted that everything matched what she had been told.","Tenía prisa y confió en que todo coincidía con lo que le habían dicho."]],[["The first bill arrived and the amount was correct.","La primera factura llegó y el monto era correcto."],["The second was also fine.","La segunda también estaba bien."],["But when the promotional period ended in month seven, her bill jumped significantly.","Pero cuando el período promocional terminó en el séptimo mes, su factura aumentó significativamente."],["She opened her email and found the original contract.","Abrió su correo y encontró el contrato original."],["She read it carefully this time.","Esta vez lo leyó con cuidado."],["The promotional rate had been clearly defined — and so had the regular rate that would follow.","La tarifa promocional había sido claramente definida, al igual que la tarifa regular que la seguiría."],["The number the representative had given her on the phone had not included certain fees listed at the bottom of the document.","El número que el representante le había dado por teléfono no incluía ciertos cargos indicados al pie del documento."]],[["She felt frustrated — not only with the company, but also with herself.","Se sintió frustrada, no solo con la empresa, sino también consigo misma."],["She called customer service and explained the situation clearly.","Llamó al servicio al cliente y explicó la situación con claridad."],["She said that the representative had not informed her of all the fees when she signed up, and that she felt the total cost had not been presented honestly.","Dijo que el representante no le había informado de todos los cargos cuando se inscribió y que sentía que el costo total no se había presentado honestamente."],["She asked whether anything could be done to resolve it.","Preguntó si se podía hacer algo para resolverlo."]],[["The agent she spoke with listened carefully.","El agente con quien habló escuchó con atención."],["He said he couldn't change the terms of the contract, but he could offer her a credit for one month as a goodwill gesture.","Dijo que no podía cambiar los términos del contrato, pero que podía ofrecerle un crédito por un mes como gesto de buena voluntad."],["He also explained that if she wanted to switch to a different plan within the same company, she could do so without a penalty.","También explicó que si quería cambiarse a un plan diferente dentro de la misma empresa, podía hacerlo sin penalización."],["She asked him to send her a list of the available options by email so she could review them at her own pace.","Ella le pidió que le enviara una lista de las opciones disponibles por correo electrónico para poder revisarlas con calma."]],[["That evening, she sat down with the email and read through each option carefully.","Esa tarde, se sentó con el correo electrónico y leyó cada opción con cuidado."],["She used a small notebook to write down the key numbers for each plan: the monthly cost, the data limit, the contract length, and any additional fees.","Usó un pequeño cuaderno para anotar los números clave de cada plan: el costo mensual, el límite de datos, la duración del contrato y cualquier cargo adicional."],["It took about an hour, but she finished with a clear picture of what each option actually cost.","Tomó aproximadamente una hora, pero terminó con una imagen clara de lo que realmente costaba cada opción."],["She chose the one that suited her best and called the following morning to make the switch.","Eligió la que más le convenía y llamó a la mañana siguiente para hacer el cambio."]],[["Over the next few days, Nadia compared several other phone plans from different companies.","Durante los días siguientes, Nadia comparó varios planes de teléfono de diferentes empresas."],["She made a simple table in her notebook, listing the monthly price, the data limit, and any hidden fees for each one.","Hizo una tabla sencilla en su cuaderno, anotando el precio mensual, el límite de datos y cualquier cargo oculto de cada uno."],["The exercise took time, but it gave her a clear picture for the first time.","El ejercicio tomó tiempo, pero por primera vez le dio una imagen clara."],["In the end, she chose a plan that was slightly more expensive but had no surprises buried in the fine print.","Al final, eligió un plan que era un poco más caro pero que no tenía sorpresas escondidas en la letra pequeña."]],[["Looking back, Nadia admitted to herself that she had learned something valuable.","Mirando hacia atrás, Nadia se admitió a sí misma que había aprendido algo valioso."],["Reading a contract carefully before signing was not just a detail — it was a way of protecting herself.","Leer un contrato con cuidado antes de firmar no era solo un detalle: era una forma de protegerse."],["From that point on, she made it a rule to read everything before clicking accept, no matter how long it took.","A partir de ese momento, se propuso como regla leer todo antes de hacer clic en aceptar, sin importar cuánto tiempo tomara."],["It was a small habit, but it made her feel more in control of her own decisions.","Era un pequeño hábito, pero la hacía sentir más en control de sus propias decisiones."]]],"dlg":[["Customer","Hi. I'm calling about a charge on my bill that I don't understand.","Hola. Llamo por un cargo en mi factura que no entiendo."],["Agent","Of course. Can you tell me which charge it is?","Claro. ¿Me puede decir cuál es el cargo?"],["Customer","There's a data fee of fifteen dollars, but I never use extra data.","Hay un cargo por datos de quince dólares, pero nunca uso datos extra."],["Agent","Let me check your account. Could I have your phone number, please?","Déjeme revisar su cuenta. ¿Me da su número de teléfono, por favor?"],["Customer","It's 998 451 220. The fee appeared on this month's bill.","Es 998 451 220. El cargo apareció en la factura de este mes."],["Agent","Thank you. I can see the charge here. Give me a moment.","Gracias. Veo el cargo aquí. Deme un momento."],["Agent","It looks like your plan went slightly over its data limit.","Parece que su plan pasó un poco el límite de datos."],["Customer","That's strange. I always use Wi-Fi at home and at work.","Qué raro. Siempre uso Wi-Fi en casa y en el trabajo."],["Agent","I understand. Sometimes background apps use data when Wi-Fi drops.","Entiendo. A veces las apps en segundo plano usan datos cuando el Wi-Fi se cae."],["Customer","Maybe, but fifteen dollars seems like a lot for that.","Puede ser, pero quince dólares parece mucho por eso."],["Agent","I agree it's high. Let me look at the daily usage for you.","Coincido en que es alto. Déjeme revisar el consumo diario."],["Agent","There was a large download on the eighth, while you were away from Wi-Fi.","Hubo una descarga grande el día ocho, cuando estaba fuera del Wi-Fi."],["Customer","The eighth? I was travelling that day, now that I think about it.","¿El ocho? Estaba de viaje ese día, ahora que lo pienso."],["Agent","That would explain it. Your phone likely updated apps using mobile data.","Eso lo explica. Su teléfono seguro actualizó apps con datos móviles."],["Customer","I see. So the charge is technically correct, then.","Ya veo. Entonces el cargo es técnicamente correcto."],["Agent","It is, but since this is the first time, I can offer a one-time credit.","Lo es, pero como es la primera vez, puedo ofrecerle un crédito único."],["Customer","I'd really appreciate that. Thank you for checking.","Se lo agradecería mucho. Gracias por revisar."],["Agent","No problem. I'll remove the fifteen dollars from this bill.","Sin problema. Quitaré los quince dólares de esta factura."],["Customer","Is there a way to avoid this in the future?","¿Hay forma de evitar esto en el futuro?"],["Agent","Yes. You can set a data limit alert in the app.","Sí. Puede activar una alerta de límite de datos en la app."],["Agent","It warns you before you go over your monthly data.","Le avisa antes de pasar su límite mensual."],["Customer","That sounds useful. Can you turn it on for me now?","Suena útil. ¿Me la puede activar ahora?"],["Agent","Done. You'll get a text when you reach eighty percent of your limit.","Listo. Recibirá un mensaje cuando llegue al ochenta por ciento del límite."],["Customer","Perfect. Could you send me a confirmation of the credit?","Perfecto. ¿Me puede enviar una confirmación del crédito?"],["Agent","Of course. I'll email it, along with a note about the alert.","Por supuesto. Se la enviaré por correo, con una nota sobre la alerta."],["Customer","Thank you so much. You've made this very easy.","Muchas gracias. Me lo hizo muy fácil."]],"datos":{"7":"<i>Looking back</i> = «mirando atrás / en retrospectiva». Es una expresión para reflexionar sobre el pasado, no mirar físicamente hacia atrás."}},"4":{"sTitle":"When the Heat Stopped Working","sTitleEs":"Cuando se cortó la calefacción","dTitle":"Escalating a Complaint","dTitleEs":"Escalando un reclamo","paras":[[["The weather had been unusually cold for that time of year.","El clima había sido inusualmente frío para esa época del año."],["Carlos woke up one Thursday morning and noticed that his apartment felt different — not just cool, but genuinely cold.","Carlos se despertó un jueves por la mañana y notó que su apartamento se sentía diferente: no solo fresco, sino genuinamente frío."],["He checked the thermostat and the temperature inside was several degrees below its usual setting.","Revisó el termostato y la temperatura interior estaba varios grados por debajo de su configuración habitual."],["He adjusted it and waited, but the heating system didn't respond.","Lo ajustó y esperó, pero el sistema de calefacción no respondió."],["He put on an extra layer and went to make coffee while he thought about what to do.","Se puso una capa adicional y fue a hacer café mientras pensaba qué hacer."]],[["He sent a maintenance request through the online system, describing the issue and noting that the weather outside was wet and cold.","Envió una solicitud de mantenimiento a través del sistema en línea, describiendo el problema y señalando que el clima exterior era húmedo y frío."],["The automated reply said that requests were usually handled within 48 hours.","La respuesta automática indicaba que las solicitudes generalmente se atendían en 48 horas."],["He read that and felt quietly frustrated.","Lo leyó y sintió una callada frustración."],["Forty-eight hours was a long time to wait with no heat.","Cuarenta y ocho horas era mucho tiempo para esperar sin calefacción."],["He sent a second message flagging it as urgent and explaining that he worked from home and needed a functional living space.","Envió un segundo mensaje marcándolo como urgente y explicando que trabajaba desde casa y necesitaba un espacio habitable funcional."]],[["A maintenance worker came the next afternoon.","Un trabajador de mantenimiento llegó a la tarde siguiente."],["He looked at the system and told Carlos that the issue was with a part that controlled the heat distribution to his unit.","Revisó el sistema y le dijo a Carlos que el problema era con una pieza que controlaba la distribución del calor a su unidad."],["It wasn't a simple fix — the part needed to be ordered and would take a few days to arrive.","No era una reparación sencilla: la pieza debía pedirse y tardaría unos días en llegar."],["He apologized and said there was nothing else he could do right now.","Se disculpó y dijo que no podía hacer nada más por el momento."]],[["Carlos thanked him but immediately contacted the building management again.","Carlos le agradeció, pero inmediatamente se comunicó con la administración del edificio de nuevo."],["He pointed out that having no heat was not an ordinary inconvenience — it was a basic living condition, especially given the current weather.","Señaló que no tener calefacción no era un inconveniente ordinario: era una condición básica de vivienda, especialmente dado el clima actual."],["He asked whether the building had a policy for providing temporary solutions, such as a portable heater.","Preguntó si el edificio tenía una política para brindar soluciones temporales, como un calefactor portátil."],["He also mentioned the relevant section of his lease, which stated that the landlord was responsible for maintaining a minimum indoor temperature.","También mencionó la sección relevante de su contrato de arrendamiento, que establecía que el propietario era responsable de mantener una temperatura interior mínima."]],[["The response came within a few hours.","La respuesta llegó en pocas horas."],["The manager apologized and arranged for a portable electric heater to be brought to his apartment that evening.","El administrador se disculpó y coordinó que llevaran un calefactor eléctrico portátil a su apartamento esa tarde."],["It wasn't a perfect solution, but it was enough to keep the space at a reasonable temperature while they waited for the part to arrive.","No era una solución perfecta, pero era suficiente para mantener el espacio a una temperatura razonable mientras esperaban que llegara la pieza."],["Carlos appreciated the gesture and noted it in writing — he wanted a record that the issue had been acknowledged and that a temporary fix had been necessary.","Carlos apreció el gesto y lo registró por escrito: quería tener constancia de que el problema había sido reconocido y de que había sido necesaria una solución temporal."]],[["The part arrived three days later, and the heating system was repaired the following morning.","La pieza llegó tres días después y el sistema de calefacción fue reparado a la mañana siguiente."],["When the warmth finally returned, Carlos felt something unexpected: a quiet sense of accomplishment.","Cuando el calor finalmente regresó, Carlos sintió algo inesperado: una tranquila sensación de logro."],["He had handled the situation calmly, documented everything, and advocated for himself without being aggressive.","Había manejado la situación con calma, documentado todo y defendido sus derechos sin ser agresivo."],["The experience had been uncomfortable, but he had managed it well.","La experiencia había sido incómoda, pero la había manejado bien."]],[["Before closing the matter, Carlos sent one final message to the management.","Antes de cerrar el asunto, Carlos envió un último mensaje a la administración."],["He thanked them for the heater and the quick repair, but he also suggested that the building keep a few spare parts on hand for the coldest months.","Les agradeció por el calefactor y la reparación rápida, pero también sugirió que el edificio tuviera algunas piezas de repuesto para los meses más fríos."],["To his surprise, the manager replied that it was a sensible idea and promised to raise it with the owners.","Para su sorpresa, el administrador respondió que era una idea sensata y prometió plantearla a los dueños."],["It felt good to be heard, and even better to know his comment might help everyone next winter.","Se sintió bien ser escuchado, y mejor aún saber que su comentario podría ayudar a todos el próximo invierno."]],[["He later found out that two other tenants in the building had had the same problem that week but hadn't said anything.","Más tarde se enteró de que otros dos inquilinos del edificio habían tenido el mismo problema esa semana, pero no habían dicho nada."],["They had simply waited and endured the cold.","Simplemente habían esperado y soportado el frío."],["Carlos thought about that for a moment.","Carlos reflexionó sobre eso por un momento."],["There was real value in speaking up — not just for yourself, but sometimes for others as well.","Había un valor real en hacer oír la voz propia, no solo en beneficio propio, sino a veces también en beneficio de los demás."],["The more clearly a problem was described, the more likely it was to be taken seriously and solved.","Cuanto más claramente se describía un problema, más probable era que se tomara en serio y se resolviera."]]],"dlg":[["Ana","Hello. I've been charged twice for the same monthly payment this month.","Hola. Me cobraron dos veces el mismo pago mensual este mes."],["Agent","I'm sorry about that. Let me pull up your account right away.","Lamento eso. Déjeme abrir su cuenta de inmediato."],["Ana","My name is Ana Torres, and my account number is 7290.","Mi nombre es Ana Torres, y mi número de cuenta es 7290."],["Agent","Thank you. I can see two identical charges on the same date.","Gracias. Veo dos cargos idénticos en la misma fecha."],["Ana","Exactly. I'd like one of them refunded as soon as possible.","Exacto. Quisiera que me devuelvan uno lo antes posible."],["Agent","I understand. Unfortunately, I can only authorize refunds up to fifty dollars.","Entiendo. Lamentablemente, solo puedo autorizar reembolsos de hasta cincuenta dólares."],["Ana","But the double charge is eighty dollars, so that doesn't solve it.","Pero el cobro doble es de ochenta dólares, así que eso no lo resuelve."],["Agent","I know, and I'm sorry. This amount is above my limit.","Lo sé, y lo siento. Este monto está por encima de mi límite."],["Ana","So what can you actually do for me right now?","¿Entonces qué puede hacer por mí ahora mismo?"],["Agent","I'd like to escalate this to my supervisor, if that's all right.","Quisiera escalar esto a mi supervisora, si le parece bien."],["Ana","Yes, please. I just want this resolved today if possible.","Sí, por favor. Solo quiero resolverlo hoy de ser posible."],["Agent","Of course. Please hold for a moment while I transfer you.","Por supuesto. Espere un momento mientras la transfiero."],["Supervisor","Hello Ana, this is Marta, the supervisor. I've already read your case.","Hola Ana, habla Marta, la supervisora. Ya leí su caso."],["Ana","Thank you. I was charged eighty dollars twice by mistake.","Gracias. Me cobraron ochenta dólares dos veces por error."],["Supervisor","I can see it clearly. It was a system error on our side.","Lo veo claramente. Fue un error de sistema de nuestro lado."],["Ana","I'm glad you can see it. It worried me all morning.","Me alegra que lo vea. Me preocupó toda la mañana."],["Supervisor","I completely understand. I'll process the full refund for you right now.","La entiendo totalmente. Procesaré el reembolso completo ahora mismo."],["Ana","Thank you. How long will it take to come back to me?","Gracias. ¿Cuánto tardará en regresar a mí?"],["Supervisor","The eighty dollars will return to your card within three business days.","Los ochenta dólares volverán a su tarjeta en tres días hábiles."],["Ana","That's a relief. Will I receive something in writing too?","Qué alivio. ¿Recibiré algo por escrito también?"],["Supervisor","Yes. I'll send a confirmation email with a reference number today.","Sí. Le enviaré un correo de confirmación con un número de referencia hoy."],["Ana","Perfect. And can you make sure this error doesn't happen again?","Perfecto. ¿Y puede asegurarse de que este error no vuelva a pasar?"],["Supervisor","I've reported it so our technical team can review the system.","Ya lo reporté para que nuestro equipo técnico revise el sistema."],["Ana","I appreciate that. Honestly, I was ready to change companies.","Se lo agradezco. La verdad, estaba a punto de cambiarme de empresa."],["Supervisor","I understand, and I'm truly sorry for the stress this caused.","La entiendo, y lamento de verdad el estrés que esto le causó."],["Ana","Thank you for taking it seriously and fixing it so quickly.","Gracias por tomarlo en serio y resolverlo tan rápido."],["Supervisor","It's the least we can do. Is there anything else I can help with?","Es lo mínimo que podemos hacer. ¿Hay algo más en que la pueda ayudar?"],["Ana","No, that's everything. You've been very kind and very clear.","No, eso es todo. Ha sido muy amable y muy clara."],["Supervisor","Thank you, Ana. You'll have the confirmation email within the hour.","Gracias, Ana. Tendrá el correo de confirmación dentro de una hora."],["Ana","Wonderful. Have a good day, and thank you again for everything.","Maravilloso. Que tenga buen día, y gracias de nuevo por todo."]],"datos":{"7":"<i>had had</i>: el primero es auxiliar y el segundo es el verbo «tener». <i>They had had the same problem</i> = «habían tenido el mismo problema»."}}};

  document.getElementById('vwStory').classList.add('on'); document.getElementById('vwDlg').classList.remove('on');
  updateTitles(); render(); window.scrollTo(0,0); }
let ALL=[], gi=0, gEnd=0, gScope='all', gPlaying=false;
function L(){ return UI[info]; }
let DLG = [];
let VIEW = PARAS, curView='story';
function setView(v){ if(v===curView) return; pausePlay(); curView=v; VIEW= v==='dlg'?DLG:PARAS;
  document.getElementById('vwStory').classList.toggle('on',v==='story'); document.getElementById('vwDlg').classList.toggle('on',v==='dlg');
  updateTitles(); render(); }
function render(){
  document.getElementById('paras').innerHTML = VIEW.map((p,pi)=>{
    const sp = p.sp?`<div class="dsp">${p.sp}</div>`:'';
    const en=p.pairs.map((q,si)=>`<span class="sent" id="s${pi}_${si}">${q.en}</span>`).join(' ');
    const es=p.pairs.map((q,si)=>`<span class="sente" id="e${pi}_${si}">${q.es}</span>`).join(' ');
    const dato=p.dato?`<div class="dato"><div class="hd">💡 Dato de traducción</div>${p.dato}</div>`:'';
    return `<div class="para" id="p${pi}">${sp}<div class="ptext">${en}</div><div class="pes" id="pes${pi}">${es}</div>
      <div class="prow"><button class="pbtn play" id="play${pi}" onclick="playPara(${pi})">▶ <span class="pl"></span></button></div>${dato}</div>`;
  }).join('');
  ALL=[]; VIEW.forEach((p,pi)=>p.pairs.forEach((q,si)=>ALL.push({pi,si}))); gi=0; gScope='all'; gEnd=ALL.length;
  applyInfo();
}
function applyInfo(){ const u=L(), st=STEPS[document.getElementById('screen').getAttribute('data-level')][info];
  document.getElementById('vocLab').textContent=u.voc; document.getElementById('datosLab').textContent=u.datos; document.getElementById('txtLab').textContent=u.txt; document.getElementById('ringNext').textContent=u.ringNext;
  document.getElementById('markLab').textContent= marked? u.marked : u.mark;
  document.getElementById('howtoT').textContent=st.t;
  document.getElementById('howtoB').innerHTML = st.s.map((x,k)=>`<div class="stepline"><span class="stepn">${k+1}</span><span>${x}</span></div>`).join('')+`<div class="stepnote">📝 ${st.n}</div>`;
  document.getElementById('helpT').textContent=u.helpT;
  document.getElementById('helpTips').innerHTML = `<div style="font-size:11.5px;color:var(--text-soft);font-weight:700;margin-bottom:6px">${u.tipsT}</div>`+ u.tips.map(t=>`<div class="helptip">• <span>${t}</span></div>`).join('');
  document.getElementById('endT').textContent=u.endT; document.getElementById('endP').textContent=u.endP; document.getElementById('eTimeL').textContent=u.eTimeL; document.getElementById('eXpL').textContent=u.eXpL; document.getElementById('endBack').textContent=u.endBack;
  document.getElementById('vpTitle').textContent=u.vpTitle; document.getElementById('vpSub').textContent=u.vpSub;
  document.getElementById('inEs').classList.toggle('on',info==='es'); document.getElementById('inEn').classList.toggle('on',info==='en');
  setBtns();
}
function toggleDatos(){ const s=document.getElementById('screen'); const on=s.getAttribute('data-datos')==='on'; s.setAttribute('data-datos',on?'off':'on'); document.getElementById('datosBtn').classList.toggle('on',!on); }
function openHelp(){ document.getElementById('helpov').classList.add('show'); } function closeHelp(){ document.getElementById('helpov').classList.remove('show'); }
function openVocab(){ document.getElementById('vlist').innerHTML = GLOSS.map(g=>`<div class="vrow"><span class="vw">${g.w}</span><span class="vm">${g.es}<span class="vex">“${g.ex}”</span></span><button class="spk" onclick="say('${g.w.replace(/'/g,'')}')">🔊</button></div>`).join(''); document.getElementById('vpanel').classList.add('show'); }
function closeVocab(){ document.getElementById('vpanel').classList.remove('show'); }
function pickVoice(){ try{ const vs=speechSynthesis.getVoices()||[]; const want=voice==='US'?'en-US':'en-GB'; return vs.find(v=>v.lang===want)||vs.find(v=>v.lang&&v.lang.indexOf('en')===0)||null; }catch(e){ return null; } }
function say(text,onend){ try{ if(!('speechSynthesis' in window))throw 0; speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text); u.rate=rate; const v=pickVoice(); if(v){u.voice=v;u.lang=v.lang;}else u.lang=voice==='US'?'en-US':'en-GB'; if(onend)u.onend=onend; speechSynthesis.speak(u); }catch(e){ if(onend) setTimeout(onend,Math.max(700,String(text).split(' ').length*330/rate)); } }
/* Reproducción: rango [gi,gEnd) · pausa conserva gi */
function setBtns(){ const all=gPlaying&&gScope==='all'; const pa=document.getElementById('playAll');
  pa.querySelector('.ic').textContent= all?'⏸':'▶'; pa.querySelector('.pl').textContent= all?L().pause:L().play;
  VIEW.forEach((p,pi)=>{ const b=document.getElementById('play'+pi); if(!b)return; const on=gPlaying&&gScope==='p'+pi; b.classList.toggle('on',on); b.querySelector('.pl').textContent= on?L().pPause:L().pPlay; b.firstChild.textContent= on?'⏸ ':'▶ '; }); }
function clearHl(){ document.querySelectorAll('.sent.read,.sente.read').forEach(s=>s.classList.remove('read')); document.querySelectorAll('.para.reading').forEach(p=>p.classList.remove('reading')); }
function startRange(st,end,scope){ if(gScope!==scope || gi<st || gi>=end) gi=st; gEnd=end; gScope=scope; gPlaying=true; setBtns(); step(); }
function playAll(){ if(gPlaying&&gScope==='all'){ pausePlay(); return; } startRange(0,ALL.length,'all'); }
function playPara(pi){ const idxs=ALL.map((a,k)=>a.pi===pi?k:-1).filter(k=>k>=0); if(gPlaying&&gScope==='p'+pi){ pausePlay(); return; } startRange(idxs[0],idxs[idxs.length-1]+1,'p'+pi); }
function pausePlay(){ gPlaying=false; try{speechSynthesis.cancel();}catch(e){} setBtns(); }
function step(){ if(!gPlaying) return;
  if(gi>=gEnd){ gPlaying=false; if(gScope==='all') gi=0; setBtns(); clearHl(); toast(info==='es'?'✓ Fin del audio':'✓ End of audio'); return; }
  const {pi,si}=ALL[gi]; clearHl(); const para=document.getElementById('p'+pi); para.classList.add('reading');
  const se=document.getElementById('s'+pi+'_'+si); if(se)se.classList.add('read');
  const ee=document.getElementById('e'+pi+'_'+si); if(ee)ee.classList.add('read');
  para.scrollIntoView({behavior:'smooth',block:'center'});
  say(VIEW[pi].pairs[si].en, ()=>{ if(!gPlaying)return; gi++; step(); });
}
function setText(m){ document.getElementById('screen').setAttribute('data-text',m); ['txEn','txEs','txBoth'].forEach(id=>document.getElementById(id).classList.remove('on')); document.getElementById(m==='en'?'txEn':m==='es'?'txEs':'txBoth').classList.add('on'); }
function setInfo(l){ info=l; applyInfo(); renderStPick(); if(document.getElementById('stpick').style.display==='none') updateTitles(); }
function toggleVoice(){ voice=voice==='US'?'UK':'US'; document.getElementById('voiceBtn').textContent='🔊 '+voice; }
function setRate(v){ rate=parseFloat(v); }
function textSize(d){ let s=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--reading'))||18; s=Math.max(15,Math.min(24,s+d)); document.documentElement.style.setProperty('--reading',s+'px'); }
function markDone(){ marked=true; const b=document.getElementById('markBtn'); b.classList.add('done'); b.querySelector('.mi').textContent='✅'; document.getElementById('markLab').textContent=L().marked;
  const m=Math.floor(secs/60); document.getElementById('eTime').textContent=m+':'+String(secs%60).padStart(2,'0'); document.getElementById('eXp').textContent='+'+(m>=30?15:m>=20?10:m>=10?5:0);
  try{ window.dispatchEvent(new CustomEvent('jucum:done',{detail:{type:'story', story:storyId, minutes:m, xp:(m>=30?15:m>=20?10:m>=10?5:0), finished:true}})); }catch(e){}
  const ec=document.getElementById('endcard'); ec.style.display='block'; ec.scrollIntoView({behavior:'smooth'}); }
setInterval(()=>{ secs++; const m=Math.floor(secs/60),s=secs%60; document.getElementById('ringT').textContent=m+':'+String(s).padStart(2,'0'); const frac=Math.min(1,secs/600); document.getElementById('ringFill').setAttribute('stroke-dashoffset',(88*(1-frac)).toFixed(1)); [10,20,30].forEach(mm=>{ if(m>=mm&&!milestones[mm]){ milestones[mm]=true; toast(L().xpMsg(mm)); } }); },1000);
function setLevel(lv){ pausePlay(); const s=document.getElementById('screen'); s.setAttribute('data-level',lv); const n={'pre-a1':'Pre-A1','a1':'A1','a2':'A2'}; var _c=document.getElementById('capLvl'); if(_c)_c.textContent=n[lv]; document.getElementById('mhsub').textContent=n[lv]+' · M1 · Personal Identity';
  ['segPre','segA1','segA2'].forEach(id=>{var b=document.getElementById(id);if(b)b.classList.remove('on');}); var _a=document.getElementById(lv==='pre-a1'?'segPre':lv==='a1'?'segA1':'segA2'); if(_a)_a.classList.add('on');
  info= lv==='pre-a1'?'es':'en'; setText(lv==='pre-a1'?'both':'en'); render(); }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2600); }
0&&document.addEventListener('contextmenu',e=>{ if(e.target.closest('.screen')){ e.preventDefault(); toast('Material protegido © JUCUM EC'); }});
try{ speechSynthesis.onvoiceschanged=()=>pickVoice(); }catch(e){}
render(); setLevel('a2'); renderStPick();
</script>
