        · 'tr' (botón 🌐 traducción por pregunta): ponlo SOLO en auto-chequeos donde una oración en inglés

<script>
/* ═══ METADATOS ═══ */
const MAT = { title:{es:'Resumen de Gramática',en:'Grammar Summary'}, subtitle:{es:'Oraciones de Relativo',en:'Relative Clauses'}, reportId:'sum-relative-clauses' };
const PASS = 75;
const STEPS = [
  { icon:'🇪🇸', title:{es:'Repaso en Español',en:'Spanish Recap'},
    html:{
      es:`<div class="gdesc">Para dar más información sobre algo sin repetirlo, en español usas «<b>que</b>», «<b>quien</b>», «<b>donde</b>», «<b>cuyo</b>».</div>
        <div class="art-hero"><div class="art-box"><div class="word">que</div><div class="role">Personas/cosas</div><div class="desc">«El libro que leí.»</div></div><div class="art-box"><div class="word">donde</div><div class="role">Lugares</div><div class="desc">«La ciudad donde nací.»</div></div></div>
        ${ii('🔗','La palabra de relativo une dos ideas y evita repetir el nombre: «el hombre… ese hombre…» → «el hombre <b>que</b>…».')}
        <div class="gnote life">🌎 <b>De tu vida:</b> «La chica que vive al lado» o «El restaurante donde comimos». En inglés son who, which, that, where, whose.</div>`,
      en:`<div class="gdesc">To give more information about something without repeating it, Spanish uses «<b>que</b>», «<b>quien</b>», «<b>donde</b>», «<b>cuyo</b>».</div>
        <div class="art-hero"><div class="art-box"><div class="word">que</div><div class="role">People/things</div><div class="desc">«El libro que leí.»</div></div><div class="art-box"><div class="word">donde</div><div class="role">Places</div><div class="desc">«La ciudad donde nací.»</div></div></div>
        ${ii('🔗','The relative word joins two ideas and avoids repeating the noun: «el hombre… ese hombre…» → «el hombre <b>que</b>…».')}
        <div class="gnote life">🌎 <b>From your life:</b> «La chica que vive al lado» or «El restaurante donde comimos». In English they are who, which, that, where, whose.</div>`
    },
    checks:[
      { q:{es:'La palabra de relativo sirve para:',en:'The relative word is used to:'}, opts:{es:['Dar más info sin repetir','Hacer una pregunta'],en:['Give more info without repeating','Ask a question']}, correct:0, fb:{ why:{es:'Une dos ideas.',en:'It joins two ideas.'}, tip:{es:'unir',en:'join'}} },
      { q:{es:'«El libro que leí» — «que» se refiere a:',en:'«El libro que leí» — «que» refers to:'}, opts:{es:['El libro','Yo'],en:['The book','I']}, correct:0, fb:{ why:{es:'Reemplaza «el libro».',en:'It replaces «the book».'}, tip:{es:'que = el libro',en:'que = the book'}} },
      { q:{es:'«La ciudad donde nací» — «donde» indica:',en:'«La ciudad donde nací» — «donde» indicates:'}, opts:{es:['Lugar','Persona'],en:['Place','Person']}, correct:0, fb:{ why:{es:'donde = lugar.',en:'donde = place.'}, tip:{es:'donde → lugar',en:'donde → place'}} },
      { q:{es:'Evita:',en:'It avoids:'}, opts:{es:['Repetir el nombre','Usar verbos'],en:['Repeating the noun','Using verbs']}, correct:0, fb:{ why:{es:'No repites el sustantivo.',en:'You don\'t repeat the noun.'}, tip:{es:'no repetir',en:'don\'t repeat'}} },
      { q:{es:'«El hombre que vive al lado» — la info extra es:',en:'«El hombre que vive al lado» — the extra info is:'}, opts:{es:['que vive al lado','el hombre'],en:['que vive al lado','el hombre']}, correct:0, fb:{ why:{es:'Describe al hombre.',en:'It describes the man.'}, tip:{es:'info extra',en:'extra info'}} }
    ] },
  { icon:'🤝', title:{es:'Similitudes',en:'Similarities'},
    html:{
      es:`<div class="gdesc">El inglés tiene una palabra para cada tipo, y van justo después del nombre que describen.</div>
        <div class="viz-grid"><div class="viz-item"><span class="ico">👤</span><span class="lbl">who</span><span class="es">que/quien (personas)</span></div><div class="viz-item"><span class="ico">📦</span><span class="lbl">which</span><span class="es">que (cosas)</span></div><div class="viz-item"><span class="ico">🔁</span><span class="lbl">that</span><span class="es">que (ambos)</span></div><div class="viz-item"><span class="ico">📍</span><span class="lbl">where</span><span class="es">donde (lugares)</span></div><div class="viz-item"><span class="ico">🔑</span><span class="lbl">whose</span><span class="es">cuyo (posesión)</span></div></div>
        ${eg('The man <span class="tag s">who</span> lives next door is kind.','El hombre que vive al lado es amable.','ok')}
        ${eg('The book <span class="tag s">that</span> I read was great.','El libro que leí era genial.','ok')}
        <div class="sec-label">Lo igual en los dos idiomas</div>
        <ul class="simlist"><li>Los dos unen dos ideas con una palabra de relativo.</li><li>La cláusula va justo después del nombre que describe.</li><li>who = personas · which = cosas · where = lugares.</li></ul>
        <div class="gnote">👍 who, which, that, where, whose. Lo nuevo: cuándo usar cada uno y cuándo se puede omitir (siguiente paso).</div>`,
      en:`<div class="gdesc">English has a word for each type, and they go right after the noun they describe.</div>
        <div class="viz-grid"><div class="viz-item"><span class="ico">👤</span><span class="lbl">who</span><span class="es">que/quien (personas)</span></div><div class="viz-item"><span class="ico">📦</span><span class="lbl">which</span><span class="es">que (cosas)</span></div><div class="viz-item"><span class="ico">🔁</span><span class="lbl">that</span><span class="es">que (ambos)</span></div><div class="viz-item"><span class="ico">📍</span><span class="lbl">where</span><span class="es">donde (lugares)</span></div><div class="viz-item"><span class="ico">🔑</span><span class="lbl">whose</span><span class="es">cuyo (posesión)</span></div></div>
        ${eg('The man <span class="tag s">who</span> lives next door is kind.','The man who lives next door is kind.','ok')}
        ${eg('The book <span class="tag s">that</span> I read was great.','The book that I read was great.','ok')}
        <div class="sec-label">What is the same in both languages</div>
        <ul class="simlist"><li>Both join two ideas with a relative word.</li><li>The clause goes right after the noun it describes.</li><li>who = people · which = things · where = places.</li></ul>
        <div class="gnote">👍 who, which, that, where, whose. The new part: which to use and when it can be omitted (next step).</div>`
    },
    checks:[
      { q:{es:'«who» se usa para:',en:'«who» is used for:'}, opts:{es:['Personas','Cosas'],en:['People','Things']}, correct:0, fb:{ why:{es:'who = personas.',en:'who = people.'}, tip:{es:'who → personas',en:'who → people'}} },
      { q:{es:'«which» se usa para:',en:'«which» is used for:'}, opts:{es:['Cosas','Personas'],en:['Things','People']}, correct:0, fb:{ why:{es:'which = cosas.',en:'which = things.'}, tip:{es:'which → cosas',en:'which → things'}} },
      { q:{es:'«where» se usa para:',en:'«where» is used for:'}, opts:{es:['Lugares','Personas'],en:['Places','People']}, correct:0, fb:{ why:{es:'where = lugares.',en:'where = places.'}, tip:{es:'where → lugares',en:'where → places'}} },
      { q:{es:'«whose» indica:',en:'«whose» indicates:'}, opts:{es:['Posesión (cuyo)','Lugar'],en:['Possession (whose)','Place']}, correct:0, fb:{ why:{es:'whose = de quién/cuyo.',en:'whose = whose.'}, ex:{es:'the girl whose dog… → la chica cuyo perro…',en:'the girl whose dog…'}, tip:{es:'whose → posesión',en:'whose → possession'}} },
      { q:{es:'La cláusula de relativo va:',en:'The relative clause goes:'}, opts:{es:['Justo después del nombre','Al inicio de todo'],en:['Right after the noun','At the very start']}, correct:0, fb:{ why:{es:'Pegada al nombre que describe.',en:'Next to the noun it describes.'}, tip:{es:'después del nombre',en:'after the noun'}} }
    ] },
  { icon:'⚡', title:{es:'Diferencias',en:'Differences'},
    html:{
      es:`<div class="gdesc">Lo que el español no marca igual: «that» sirve para los dos, y a veces el relativo <b>se puede omitir</b>.</div>
        <table class="dtab"><tr><th>Para…</th><th>Usa…</th></tr>
          <tr><td>personas</td><td class="en">who (o that)</td></tr>
          <tr><td>cosas</td><td class="en">which (o that)</td></tr>
          <tr><td>lugares</td><td class="en">where</td></tr>
          <tr><td>posesión</td><td class="en">whose</td></tr>
        </table>
        <div class="sec-label">⚠️ Cuándo se puede omitir el relativo</div>
        ${ii('✂️','Si el relativo es el <b>objeto</b> (después viene otro sujeto + verbo), puedes quitarlo: «The book (that) I read» = «The book I read».')}
        ${ii('🚫','Si el relativo es el <b>sujeto</b> de su frase, NO se quita: «The man <b>who</b> lives here» (no se omite «who»).')}
        ${eg('The movie (<span class="tag s">that</span>) we saw was funny.','La película que vimos era graciosa. (se puede omitir)','ok')}
        ${eg('The man lives here is kind.','Falta el relativo: «The man <b>who</b> lives here…».','bad')}
        <div class="gnote">📍 who/that (personas) · which/that (cosas) · where (lugares) · whose (posesión). Omitible solo si es objeto.</div>`,
      en:`<div class="gdesc">What Spanish doesn\'t mark the same: «that» works for both, and sometimes the relative <b>can be omitted</b>.</div>
        <table class="dtab"><tr><th>For…</th><th>Use…</th></tr>
          <tr><td>people</td><td class="en">who (or that)</td></tr>
          <tr><td>things</td><td class="en">which (or that)</td></tr>
          <tr><td>places</td><td class="en">where</td></tr>
          <tr><td>possession</td><td class="en">whose</td></tr>
        </table>
        <div class="sec-label">⚠️ When the relative can be omitted</div>
        ${ii('✂️','If the relative is the <b>object</b> (another subject + verb follows), you can drop it: «The book (that) I read» = «The book I read».')}
        ${ii('🚫','If the relative is the <b>subject</b> of its clause, do NOT drop it: «The man <b>who</b> lives here» (don\'t omit «who»).')}
        ${eg('The movie (<span class="tag s">that</span>) we saw was funny.','The movie we saw was funny. (can be omitted)','ok')}
        ${eg('The man lives here is kind.','The relative is missing: «The man <b>who</b> lives here…».','bad')}
        <div class="gnote">📍 who/that (people) · which/that (things) · where (places) · whose (possession). Droppable only if it\'s the object.</div>`
    },
    checks:[
      { q:{es:'«The girl ___ won the prize.» (persona, sujeto):',en:'«The girl ___ won the prize.» (person, subject):'}, opts:{es:['who','which'],en:['who','which']}, correct:0, fb:{ why:{es:'Persona → who.',en:'Person → who.'}, ex:{es:'the girl who won → la chica que ganó',en:'the girl who won'}, tip:{es:'persona → who',en:'person → who'}}, tr:{es:'La chica que ganó el premio.',en:'The girl who won the prize.'} },
      { q:{es:'«The phone ___ I bought is new.» (cosa):',en:'«The phone ___ I bought is new.» (thing):'}, opts:{es:['which','who'],en:['which','who']}, correct:0, fb:{ why:{es:'Cosa → which (o that).',en:'Thing → which (or that).'}, ex:{es:'the phone which I bought → el teléfono que compré',en:'the phone which I bought'}, tip:{es:'cosa → which',en:'thing → which'}}, tr:{es:'El teléfono que compré es nuevo.',en:'The phone which I bought is new.'} },
      { q:{es:'«The town ___ I grew up is small.» (lugar):',en:'«The town ___ I grew up is small.» (place):'}, opts:{es:['where','which'],en:['where','which']}, correct:0, fb:{ why:{es:'Lugar → where.',en:'Place → where.'}, ex:{es:'the town where I grew up → el pueblo donde crecí',en:'the town where I grew up'}, tip:{es:'lugar → where',en:'place → where'}}, tr:{es:'El pueblo donde crecí es pequeño.',en:'The town where I grew up is small.'} },
      { q:{es:'¿En cuál se puede omitir el relativo?',en:'In which one can the relative be omitted?'}, opts:{es:['The book (that) I read','The man who lives here'],en:['The book (that) I read','The man who lives here']}, correct:0, fb:{ why:{es:'Es objeto (sigue I read) → omitible.',en:'It\'s the object (I read follows) → droppable.'}, ex:{es:'The book I read → El libro que leí',en:'The book I read'}, tip:{es:'objeto → omitible',en:'object → droppable'}} },
      { q:{es:'«The woman ___ car is red.» (posesión):',en:'«The woman ___ car is red.» (possession):'}, opts:{es:['whose','who'],en:['whose','who']}, correct:0, fb:{ why:{es:'Posesión → whose.',en:'Possession → whose.'}, ex:{es:'whose car → cuyo carro',en:'whose car'}, tip:{es:'posesión → whose',en:'possession → whose'}}, tr:{es:'La mujer cuyo carro es rojo.',en:'The woman whose car is red.'} }
    ] },
  { icon:'💡', title:{es:'Tips Prácticos',en:'Practical Tips'},
    html:{
      es:`<div class="gdesc">La fórmula:</div>
        <div class="fbox"><div class="frm"><span class="pill s">nombre</span><span class="plus">+</span><span class="pill v">who/which/that/where/whose</span><span class="plus">+</span><span class="pill o">info extra</span></div><div class="fex"><span class="s">the man</span> <span class="v">who</span> <span class="o">lives here</span></div></div>
        ${ii('👤','<b>Tip 1 — Persona o cosa:</b> personas → who · cosas → which · «that» sirve para ambos.')}
        ${ii('📍','<b>Tip 2 — Lugar/posesión:</b> lugar → where · de quién → whose.')}
        ${ii('✂️','<b>Tip 3 — Omitir:</b> si después del relativo viene «sujeto + verbo», puedes quitarlo (the film I saw).')}
        <div class="alert-card"><div class="atitle">⚠️ Error típico</div><p>❌ «The man which lives here» → ✅ «The man <b>who</b> lives here».<br>❌ «The man lives here is kind» → ✅ «The man <b>who</b> lives here is kind».</p></div>`,
      en:`<div class="gdesc">The formula:</div>
        <div class="fbox"><div class="frm"><span class="pill s">noun</span><span class="plus">+</span><span class="pill v">who/which/that/where/whose</span><span class="plus">+</span><span class="pill o">extra info</span></div><div class="fex"><span class="s">the man</span> <span class="v">who</span> <span class="o">lives here</span></div></div>
        ${ii('👤','<b>Tip 1 — Person or thing:</b> people → who · things → which · «that» works for both.')}
        ${ii('📍','<b>Tip 2 — Place/possession:</b> place → where · whose → possession.')}
        ${ii('✂️','<b>Tip 3 — Omit:</b> if «subject + verb» follows the relative, you can drop it (the film I saw).')}
        <div class="alert-card"><div class="atitle">⚠️ Common mistake</div><p>❌ «The man which lives here» → ✅ «The man <b>who</b> lives here».<br>❌ «The man lives here is kind» → ✅ «The man <b>who</b> lives here is kind».</p></div>`
    },
    checks:[
      { q:{es:'«The teacher ___ helped me is nice.» (persona):',en:'«The teacher ___ helped me is nice.» (person):'}, opts:{es:['who','which'],en:['who','which']}, correct:0, fb:{ why:{es:'Persona → who.',en:'Person → who.'}, ex:{es:'the teacher who helped me → el profesor que me ayudó',en:'the teacher who helped me'}, tip:{es:'persona → who',en:'person → who'}}, tr:{es:'El profesor que me ayudó es agradable.',en:'The teacher who helped me is nice.'} },
      { q:{es:'«The car ___ broke down was old.» (cosa):',en:'«The car ___ broke down was old.» (thing):'}, opts:{es:['which','who'],en:['which','who']}, correct:0, fb:{ why:{es:'Cosa → which (o that).',en:'Thing → which (or that).'}, ex:{es:'the car which broke down → el carro que se averió',en:'the car which broke down'}, tip:{es:'cosa → which',en:'thing → which'}}, tr:{es:'El carro que se averió era viejo.',en:'The car which broke down was old.'} },
      { q:{es:'«That\'s the café ___ we met.» (lugar):',en:'«That\'s the café ___ we met.» (place):'}, opts:{es:['where','which'],en:['where','which']}, correct:0, fb:{ why:{es:'Lugar → where.',en:'Place → where.'}, ex:{es:'the café where we met → el café donde nos conocimos',en:'the café where we met'}, tip:{es:'lugar → where',en:'place → where'}}, tr:{es:'Ese es el café donde nos conocimos.',en:'That\'s the café where we met.'} },
      { q:{es:'¿Cuál puede ir sin relativo?',en:'Which can go without a relative?'}, opts:{es:['The song I love','The man who sings'],en:['The song I love','The man who sings']}, correct:0, fb:{ why:{es:'«The song (that) I love» → relativo es objeto.',en:'«The song (that) I love» → relative is the object.'}, ex:{es:'The song I love → La canción que amo',en:'The song I love'}, tip:{es:'objeto → omitible',en:'object → droppable'}} },
      { q:{es:'«I have a friend ___ brother is a pilot.» (posesión):',en:'«I have a friend ___ brother is a pilot.» (possession):'}, opts:{es:['whose','who'],en:['whose','who']}, correct:0, fb:{ why:{es:'Posesión → whose.',en:'Possession → whose.'}, ex:{es:'whose brother → cuyo hermano',en:'whose brother'}, tip:{es:'posesión → whose',en:'possession → whose'}}, tr:{es:'Tengo un amigo cuyo hermano es piloto.',en:'I have a friend whose brother is a pilot.'} }
    ] },
  { icon:'✨', title:{es:'Práctica Final',en:'Final Practice'}, builder:true,
    html:{
      es:`<div class="gdesc">Junta todo: nombre + relativo (who/which/that/where/whose) + info extra. Arma la oración.</div>
        <div class="cboxes"><div class="cbox s"><span class="cl">who / that</span><span class="cv">personas</span></div><div class="cbox o"><span class="cl">which / that</span><span class="cv">cosas</span></div><div class="cbox p"><span class="cl">where · whose</span><span class="cv">lugares · posesión</span></div></div>
        <div class="sec-label">Las reglas en una oración</div>
        ${eg('The man <span class="tag s">who</span> lives here is my uncle.','El hombre que vive aquí es mi tío.','ok')}

function renderStep(){ const t=L(), s=STEPS[cur]; curLab= info==='es'?'EJEMPLO':'EXAMPLE';
