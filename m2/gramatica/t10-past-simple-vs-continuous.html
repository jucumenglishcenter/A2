<script>
/* ═══ METADATOS ═══ */
const MAT = { title:{es:'Resumen de Gramática',en:'Grammar Summary'}, subtitle:{es:'Past Simple vs Past Continuous',en:'Past Simple vs Past Continuous'}, reportId:'sum-past-simple-vs-cont' };
const PASS = 75;
const STEPS = [
  { icon:'🇪🇸', title:{es:'Repaso en Español',en:'Spanish Recap'},
    html:{
      es:`<div class="gdesc">En español ya eliges entre «<b>comí</b>» (acción terminada) y «<b>estaba comiendo</b>» (acción en proceso). Cada una cuenta algo distinto.</div>
        <div class="art-hero"><div class="art-box"><div class="word">comí</div><div class="role">Terminado ✅</div><div class="desc">«Ayer comí a la una.» — pasó y acabó.</div></div><div class="art-box"><div class="word">estaba comiendo</div><div class="role">En proceso 🎬</div><div class="desc">«A la una estaba comiendo.» — en medio.</div></div></div>
        ${ii('🎬','El imperfecto (estaba) describe el fondo; el pretérito (comí) cuenta lo que pasó.')}
        <div class="gnote life">🌎 <b>De tu vida:</b> «Estaba lloviendo (fondo) cuando salí (acción)». Tu oído ya separa lo que estaba pasando de lo que pasó.</div>`,
      en:`<div class="gdesc">In Spanish you already choose between «<b>comí</b>» (finished action) and «<b>estaba comiendo</b>» (action in progress). Each tells something different.</div>
        <div class="art-hero"><div class="art-box"><div class="word">comí</div><div class="role">Finished ✅</div><div class="desc">«Ayer comí a la una.» — happened and ended.</div></div><div class="art-box"><div class="word">estaba comiendo</div><div class="role">In progress 🎬</div><div class="desc">«A la una estaba comiendo.» — in the middle.</div></div></div>
        ${ii('🎬','The imperfect (estaba) describes the background; the preterite (comí) tells what happened.')}
        <div class="gnote life">🌎 <b>From your life:</b> «Estaba lloviendo (background) cuando salí (action)». Your ear already separates what was happening from what happened.</div>`
    },
    checks:[
      { q:{es:'«Comí» indica algo:',en:'«Comí» indicates something:'}, opts:{es:['Terminado','En proceso'],en:['Finished','In progress']}, correct:0, fb:{ why:{es:'Acción completa.',en:'Complete action.'}, tip:{es:'terminado',en:'finished'}} },
      { q:{es:'«Estaba comiendo» indica algo:',en:'«Estaba comiendo» indicates something:'}, opts:{es:['En proceso','Terminado'],en:['In progress','Finished']}, correct:0, fb:{ why:{es:'En medio.',en:'In the middle.'}, tip:{es:'en proceso',en:'in progress'}} },
      { q:{es:'¿Cuál describe el fondo de una escena?',en:'Which describes the background of a scene?'}, opts:{es:['estaba comiendo','comí'],en:['estaba comiendo','comí']}, correct:0, fb:{ why:{es:'El imperfecto pone el ambiente.',en:'The imperfect sets the scene.'}, tip:{es:'fondo → estaba',en:'background → estaba'}} },
      { q:{es:'¿Cuál cuenta lo que pasó (la acción)?',en:'Which tells what happened (the action)?'}, opts:{es:['comí','estaba comiendo'],en:['comí','estaba comiendo']}, correct:0, fb:{ why:{es:'El pretérito cuenta el hecho.',en:'The preterite tells the event.'}, tip:{es:'acción → comí',en:'action → comí'}} },
      { q:{es:'«Estaba lloviendo cuando salí»: ¿cuál es el fondo?',en:'«Estaba lloviendo cuando salí»: which is the background?'}, opts:{es:['estaba lloviendo','salí'],en:['estaba lloviendo','salí']}, correct:0, fb:{ why:{es:'La acción en proceso es el fondo.',en:'The in-progress action is the background.'}, tip:{es:'fondo = en proceso',en:'background = in progress'}} }
    ] },
  { icon:'🤝', title:{es:'Similitudes',en:'Similarities'},
    html:{
      es:`<div class="gdesc">El inglés tiene el mismo par: <b>Past Simple</b> (comí) y <b>Past Continuous</b> (estaba comiendo).</div>
        <div class="vs-grid">
          <div class="vs-row"><div class="vs-side es"><span class="flag">comí</span>Comí a la una</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">Past Simple</span>I <b>ate</b> at one</div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">estaba comiendo</span>Estaba comiendo a la una</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">Past Continuous</span>I <b>was eating</b> at one</div></div>
        </div>
        ${eg('I <span class="tag o">cooked</span> dinner. (terminado)','Cociné la cena. (acción completa)','ok')}
        ${eg('I <span class="tag s">was cooking</span> dinner. (en medio)','Estaba cocinando la cena. (en proceso)','ok')}
        <div class="sec-label">Lo igual en los dos idiomas</div>
        <ul class="simlist"><li>Los dos distinguen «lo que pasó» de «lo que estaba pasando».</li><li>El continuous pone el fondo; el simple cuenta el hecho.</li><li>Se combinan en la misma historia.</li></ul>
        <div class="gnote">👍 ate = comí · was eating = estaba comiendo. Lo nuevo es cuándo elegir cada uno (siguiente paso).</div>`,
      en:`<div class="gdesc">English has the same pair: <b>Past Simple</b> (comí) and <b>Past Continuous</b> (estaba comiendo).</div>
        <div class="vs-grid">
          <div class="vs-row"><div class="vs-side es"><span class="flag">comí</span>Comí a la una</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">Past Simple</span>I <b>ate</b> at one</div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">estaba comiendo</span>Estaba comiendo a la una</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">Past Continuous</span>I <b>was eating</b> at one</div></div>
        </div>
        ${eg('I <span class="tag o">cooked</span> dinner. (finished)','I cooked dinner. (complete action)','ok')}
        ${eg('I <span class="tag s">was cooking</span> dinner. (in the middle)','I was cooking dinner. (in progress)','ok')}
        <div class="sec-label">What is the same in both languages</div>
        <ul class="simlist"><li>Both distinguish «what happened» from «what was happening».</li><li>The continuous sets the background; the simple tells the event.</li><li>They combine in the same story.</li></ul>
        <div class="gnote">👍 ate = comí · was eating = estaba comiendo. The new part is when to pick each (next step).</div>`
    },
    checks:[
      { q:{es:'«I ate» equivale a:',en:'«I ate» matches:'}, opts:{es:['Comí (terminado)','Estaba comiendo'],en:['Comí (finished)','Estaba comiendo']}, correct:0, fb:{ why:{es:'Past simple = acción completa.',en:'Past simple = complete action.'}, tip:{es:'ate = comí',en:'ate = comí'}} },
      { q:{es:'«I was eating» equivale a:',en:'«I was eating» matches:'}, opts:{es:['Estaba comiendo','Comí'],en:['Estaba comiendo','Comí']}, correct:0, fb:{ why:{es:'Past continuous = en proceso.',en:'Past continuous = in progress.'}, tip:{es:'was eating = estaba comiendo',en:'was eating = estaba comiendo'}} },
      { q:{es:'El que pone el fondo es:',en:'The one that sets the background is:'}, opts:{es:['Past Continuous','Past Simple'],en:['Past Continuous','Past Simple']}, correct:0, fb:{ why:{es:'Continuous = fondo.',en:'Continuous = background.'}, tip:{es:'fondo → continuous',en:'background → continuous'}} },
      { q:{es:'El que cuenta el hecho es:',en:'The one that tells the event is:'}, opts:{es:['Past Simple','Past Continuous'],en:['Past Simple','Past Continuous']}, correct:0, fb:{ why:{es:'Simple = hecho.',en:'Simple = event.'}, tip:{es:'hecho → simple',en:'event → simple'}} },
      { q:{es:'Los dos pueden ir:',en:'The two can go:'}, opts:{es:['En la misma historia','Nunca juntos'],en:['In the same story','Never together']}, correct:0, fb:{ why:{es:'Se combinan.',en:'They combine.'}, tip:{es:'juntos',en:'together'}} }
    ] },
  { icon:'⚡', title:{es:'Diferencias',en:'Differences'},
    html:{
      es:`<div class="gdesc">La regla de decisión: ¿la acción estaba <b>en medio</b> o ya <b>pasó y terminó</b>?</div>
        <table class="dtab"><tr><th>Usa…</th><th>Cuando…</th><th>Ejemplo</th></tr>
          <tr><td class="en">Past Simple</td><td>acción terminada o secuencia</td><td>I woke up, ate, and left</td></tr>
          <tr><td class="en">Past Continuous</td><td>acción en proceso / fondo</td><td>At 8, I was sleeping</td></tr>
          <tr><td class="en">Continuous + Simple</td><td>larga interrumpida por corta</td><td>I was sleeping when it rang</td></tr>
        </table>
        <div class="sec-label">⚠️ Secuencia → simple; fondo → continuous</div>
        ${ii('🔢','Una <b>lista de acciones seguidas</b> va en past simple: «I got up, showered, and left».')}
        ${ii('🎬','Una acción que <b>servía de fondo</b> va en continuous: «The sun was shining».')}
        ${eg('When I arrived, they <span class="tag s">were dancing</span>.','Cuando llegué, estaban bailando. (fondo)','ok')}
        ${eg('When I arrived, they danced... I arrived.','Si fue después de llegar, usa simple; si ya estaban, usa continuous.','bad')}
        <div class="gnote">📍 ¿Una foto de un momento? → continuous. ¿Una secuencia de hechos? → simple.</div>`,
      en:`<div class="gdesc">The decision rule: was the action <b>in the middle</b> or did it <b>happen and finish</b>?</div>
        <table class="dtab"><tr><th>Use…</th><th>When…</th><th>Example</th></tr>
          <tr><td class="en">Past Simple</td><td>finished action or sequence</td><td>I woke up, ate, and left</td></tr>
          <tr><td class="en">Past Continuous</td><td>action in progress / background</td><td>At 8, I was sleeping</td></tr>
          <tr><td class="en">Continuous + Simple</td><td>long interrupted by short</td><td>I was sleeping when it rang</td></tr>
        </table>
        <div class="sec-label">⚠️ Sequence → simple; background → continuous</div>
        ${ii('🔢','A <b>list of actions one after another</b> goes in past simple: «I got up, showered, and left».')}
        ${ii('🎬','An action that <b>served as background</b> goes in continuous: «The sun was shining».')}
        ${eg('When I arrived, they <span class="tag s">were dancing</span>.','When I arrived, they were dancing. (background)','ok')}
        ${eg('When I arrived, they danced... I arrived.','If it was after arriving, use simple; if already happening, use continuous.','bad')}
        <div class="gnote">📍 A snapshot of a moment? → continuous. A sequence of events? → simple.</div>`
    },
    checks:[
      { q:{es:'«At 9 p.m., I ___ (watch) a movie.» (en medio):',en:'«At 9 p.m., I ___ (watch) a movie.» (in the middle):'}, opts:{es:['was watching','watched'],en:['was watching','watched']}, correct:0, fb:{ why:{es:'En medio del momento → continuous.',en:'In the middle of the moment → continuous.'}, ex:{es:'I was watching → Estaba viendo',en:'I was watching'}, tip:{es:'en medio → continuous',en:'in the middle → continuous'}}, tr:{es:'A las 9 estaba viendo una película.',en:'At 9 p.m., I was watching a movie.'} },
      { q:{es:'«I got up, ___ (eat), and left.» (secuencia):',en:'«I got up, ___ (eat), and left.» (sequence):'}, opts:{es:['ate','was eating'],en:['ate','was eating']}, correct:0, fb:{ why:{es:'Secuencia → past simple.',en:'Sequence → past simple.'}, ex:{es:'I got up, ate, and left → Me levanté, comí y salí',en:'I got up, ate, and left'}, tip:{es:'secuencia → simple',en:'sequence → simple'}}, tr:{es:'Me levanté, comí y salí.',en:'I got up, ate, and left.'} },
      { q:{es:'«The sun ___ (shine) and birds were singing.» (fondo):',en:'«The sun ___ (shine) and birds were singing.» (background):'}, opts:{es:['was shining','shone'],en:['was shining','shone']}, correct:0, fb:{ why:{es:'Fondo de la escena → continuous.',en:'Background of the scene → continuous.'}, ex:{es:'The sun was shining → El sol brillaba',en:'The sun was shining'}, tip:{es:'fondo → continuous',en:'background → continuous'}}, tr:{es:'El sol brillaba y los pájaros cantaban.',en:'The sun was shining and birds were singing.'} },
      { q:{es:'«I ___ (break) my leg while I was skiing.»',en:'«I ___ (break) my leg while I was skiing.»'}, opts:{es:['broke','was breaking'],en:['broke','was breaking']}, correct:0, fb:{ why:{es:'Acción corta (interrupción) → simple.',en:'Short action (interruption) → simple.'}, ex:{es:'I broke my leg → Me rompí la pierna',en:'I broke my leg'}, tip:{es:'corta → simple',en:'short → simple'}}, tr:{es:'Me rompí la pierna mientras esquiaba.',en:'I broke my leg while I was skiing.'} },
      { q:{es:'¿Foto de un momento o secuencia? «We were having dinner»:',en:'Snapshot or sequence? «We were having dinner»:'}, opts:{es:['Foto de un momento','Secuencia de hechos'],en:['Snapshot of a moment','Sequence of events']}, correct:0, fb:{ why:{es:'Continuous = una foto en proceso.',en:'Continuous = a snapshot in progress.'}, tip:{es:'continuous → foto',en:'continuous → snapshot'}} }
    ] },
  { icon:'💡', title:{es:'Tips Prácticos',en:'Practical Tips'},
    html:{
      es:`<div class="gdesc">El detector rápido:</div>
        <div class="fbox"><div class="frm"><span class="pill o">Past Simple</span><span class="plus">→ hecho / secuencia</span><span class="pill s">Past Continuous</span><span class="plus">→ fondo / en medio</span></div><div class="fex"><span class="o">I cooked</span> · <span class="s">I was cooking</span></div></div>
        ${ii('🔢','<b>Tip 1 — Secuencia de pasos</b> (primero…, luego…) → past simple para todos.')}
        ${ii('🎬','<b>Tip 2 — Describir el momento</b> (qué estaba pasando) → past continuous.')}
        ${ii('✂️','<b>Tip 3 — Interrupción:</b> fondo (was -ing) + when + acción corta (pasado simple).')}
        <div class="alert-card"><div class="atitle">⚠️ Error típico</div><p>❌ «While I cooked, he called» (si era el fondo) → ✅ «While I <b>was cooking</b>, he called».</p></div>`,
      en:`<div class="gdesc">The quick detector:</div>
        <div class="fbox"><div class="frm"><span class="pill o">Past Simple</span><span class="plus">→ event / sequence</span><span class="pill s">Past Continuous</span><span class="plus">→ background / in the middle</span></div><div class="fex"><span class="o">I cooked</span> · <span class="s">I was cooking</span></div></div>
        ${ii('🔢','<b>Tip 1 — Sequence of steps</b> (first…, then…) → past simple for all.')}
        ${ii('🎬','<b>Tip 2 — Describing the moment</b> (what was happening) → past continuous.')}
        ${ii('✂️','<b>Tip 3 — Interruption:</b> background (was -ing) + when + short action (past simple).')}
        <div class="alert-card"><div class="atitle">⚠️ Common mistake</div><p>❌ «While I cooked, he called» (if it was the background) → ✅ «While I <b>was cooking</b>, he called».</p></div>`
    },
    checks:[
      { q:{es:'«First I ___ (finish) my work, then I relaxed.»',en:'«First I ___ (finish) my work, then I relaxed.»'}, opts:{es:['finished','was finishing'],en:['finished','was finishing']}, correct:0, fb:{ why:{es:'Secuencia → simple.',en:'Sequence → simple.'}, ex:{es:'I finished → Terminé',en:'I finished'}, tip:{es:'secuencia → simple',en:'sequence → simple'}}, tr:{es:'Primero terminé mi trabajo, luego descansé.',en:'First I finished my work, then I relaxed.'} },
      { q:{es:'«It was 7 p.m. The kids ___ (play).» (fondo):',en:'«It was 7 p.m. The kids ___ (play).» (background):'}, opts:{es:['were playing','played'],en:['were playing','played']}, correct:0, fb:{ why:{es:'Describes el momento → continuous.',en:'You describe the moment → continuous.'}, ex:{es:'The kids were playing → Los niños jugaban',en:'The kids were playing'}, tip:{es:'fondo → continuous',en:'background → continuous'}}, tr:{es:'Eran las 7. Los niños jugaban.',en:'It was 7 p.m. The kids were playing.'} },
      { q:{es:'«He ___ (call) while I was driving.»',en:'«He ___ (call) while I was driving.»'}, opts:{es:['called','was calling'],en:['called','was calling']}, correct:0, fb:{ why:{es:'Interrupción corta → simple.',en:'Short interruption → simple.'}, ex:{es:'He called → Llamó',en:'He called'}, tip:{es:'corta → simple',en:'short → simple'}}, tr:{es:'Él llamó mientras yo manejaba.',en:'He called while I was driving.'} },
      { q:{es:'«We arrived, sat down, and ___ (order).» (secuencia):',en:'«We arrived, sat down, and ___ (order).» (sequence):'}, opts:{es:['ordered','were ordering'],en:['ordered','were ordering']}, correct:0, fb:{ why:{es:'Secuencia → simple.',en:'Sequence → simple.'}, ex:{es:'we ordered → pedimos',en:'we ordered'}, tip:{es:'secuencia → simple',en:'sequence → simple'}}, tr:{es:'Llegamos, nos sentamos y pedimos.',en:'We arrived, sat down, and ordered.'} },
      { q:{es:'¿Cuál describe lo que estaba pasando?',en:'Which describes what was happening?'}, opts:{es:['She was sleeping','She slept'],en:['She was sleeping','She slept']}, correct:0, fb:{ why:{es:'Continuous = en proceso.',en:'Continuous = in progress.'}, ex:{es:'She was sleeping → Estaba durmiendo',en:'She was sleeping'}, tip:{es:'continuous',en:'continuous'}} }
    ] },
  { icon:'✨', title:{es:'Práctica Final',en:'Final Practice'}, builder:true,
    html:{
      es:`<div class="gdesc">Junta todo: secuencia/hechos → simple; fondo/en medio → continuous. Arma la oración.</div>
        <div class="cboxes"><div class="cbox s"><span class="cl">Past Simple</span><span class="cv">hechos · secuencia (woke up, ate, left)</span></div><div class="cbox o"><span class="cl">Past Continuous</span><span class="cv">fondo · en medio (was sleeping)</span></div><div class="cbox p"><span class="cl">Juntos</span><span class="cv">was -ing + when + pasado simple</span></div></div>
        <div class="sec-label">Las reglas en una oración</div>
        ${eg('I <span class="tag o">woke up</span> and <span class="tag o">made</span> coffee.','Me desperté e hice café. (secuencia)','ok')}
        ${eg('At 6, the sun <span class="tag s">was rising</span>.','A las 6, el sol estaba saliendo. (fondo)','ok')}

let info='es', cur=0, doneSteps=[], answers=[], coreDone=false, bState={order:[],locked:false}, curLab='';
function L(){ return T[info]; }
function say(text,acc){ try{ speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text); u.rate=.82; const vs=speechSynthesis.getVoices()||[]; const want=acc==='US'?'en-US':'en-GB'; const v=vs.find(x=>x.lang===want)||vs.find(x=>x.lang&&x.lang.indexOf('en')===0); if(v){u.voice=v;u.lang=v.lang;}else u.lang=want; speechSynthesis.speak(u); }catch(e){} }
function render(){ cur=0; coreDone=false; doneSteps=new Array(STEPS.length).fill(false); answers=STEPS.map(s=>new Array(s.checks.length).fill(null)); bState={order:[],locked:false};
  document.getElementById('results').classList.remove('show'); document.getElementById('mbody').style.display='block'; document.getElementById('msbanner').style.display='none';
  renderTabs(); applyLang(); showStep(0); }
function renderTabs(){ document.getElementById('steptabs').innerHTML=STEPS.map((s,i)=>`<button class="stab${i===0?' on':''}${doneSteps[i]?' done':''}" id="stab${i}" onclick="goStep(${i})">${s.icon} ${i+1}</button>`).join(''); }
function applyLang(){ const t=L();
  document.getElementById('lsEs').classList.toggle('on',info==='es'); document.getElementById('lsEn').classList.toggle('on',info==='en');
  document.getElementById('mhtitle').textContent=MAT.title[info]; document.getElementById('mhsub').textContent=document.getElementById('screen').getAttribute('data-level').toUpperCase().replace('-',' · ')+' · '+MAT.subtitle[info];
  document.getElementById('unT').textContent=t.unT; document.getElementById('unP').textContent=t.unP;
  document.getElementById('helpT').textContent=t.helpT; document.getElementById('helpTips').innerHTML='<div style="font-size:11.5px;color:var(--text-soft);font-weight:700;margin-bottom:6px">'+t.tipsT+'</div>'+t.tips.map(x=>'<div class="helptip">• <span>'+x+'</span></div>').join('');
  document.getElementById('kpT').textContent=t.kpT; document.getElementById('lBack').textContent=t.back; document.getElementById('lRetry').textContent=t.retry;
  updateMilestone(); renderStep(); }
function renderStep(){ const t=L(), s=STEPS[cur]; curLab= info==='es'?'EJEMPLO':'EXAMPLE';
  let html=`<div class="gcard"><div class="sec-label">${cur+1}. ${s.icon} ${s.title[info]}</div>${s.html[info]}`;
  if(s.builder) html+=builderHtml(); html+=`</div>`;
  const ansd=answers[cur].filter(x=>x!==null).length;
  html+=`<div class="check"><div class="check-h">🧠 ${t.checkH}<span class="cprog">${ansd}/${s.checks.length}</span></div><div class="check-sub">${t.checkSub}</div>`;
  s.checks.forEach((c,ci)=>{ const sel=answers[cur][ci]; const done=sel!==null; const ok=sel===c.correct;
    let fb='';
    if(done){ const f=c.fb; fb=`<div class="cfb show ${ok?'ok':'no'}"><div class="cfbh">${ok?'✅ '+t.cOk:'❌ '+t.cBad}</div><div class="cfbb">`+
      `<div class="fblk why"><b>🔍 ${t.fWhy}</b>${f.why[info]}</div>`+
      (f.contrast?`<div class="fblk contrast"><b>⚠ ${t.fNo}</b>${f.contrast[info]}</div>`:'')+
      (f.ex?`<div class="fblk ex"><b>📝 ${t.fEx}</b>${f.ex[info]}</div>`:'')+
      (f.tip?`<div class="fblk tip"><b>💡 ${t.fTip}</b>${f.tip[info]}</div>`:'')+`</div></div>`; }
    const trBtn = (c.tr && info==='es') ? `<button class="ctransbtn" onclick="this.nextElementSibling.classList.toggle('show')">🌐 ${t.seeTr}</button><div class="ctrans">${c.tr.es}</div>` : '';

      `</div>${fb}</div>`;

function checkAns(ci,k){ if(answers[cur][ci]!==null) return; answers[cur][ci]=k;

function initBuilder(){ bState={order:[],locked:false}; const sh=[...BUILD.answer.keys()].sort(()=>Math.random()-.5);
  document.getElementById('bank').innerHTML=sh.map(idx=>`<button class="tile ${BUILD.answer[idx].c}" id="tile${idx}" onclick="placeTile(${idx})">${BUILD.answer[idx].w}</button>`).join(''); document.getElementById('tray').innerHTML=''; }
function placeTile(idx){ if(bState.locked)return; bState.order.push(idx); document.getElementById('tile'+idx).classList.add('placed'); const tr=document.getElementById('tray'); const b=document.createElement('button'); b.className='tile '+BUILD.answer[idx].c; b.textContent=BUILD.answer[idx].w; b.onclick=()=>removeTile(idx,b); tr.appendChild(b); document.getElementById('bchk').disabled=bState.order.length!==BUILD.answer.length; }
function removeTile(idx,el){ if(bState.locked)return; bState.order=bState.order.filter(x=>x!==idx); el.remove(); document.getElementById('tile'+idx).classList.remove('placed'); document.getElementById('bchk').disabled=bState.order.length!==BUILD.answer.length; }
function checkBuild(){ const t=L(); bState.locked=true; const ok=bState.order.join(',')===BUILD.answer.map((_,i)=>i).join(','); document.querySelectorAll('#tray .tile').forEach(x=>x.style.pointerEvents='none');

function navStep(d){ if(d<0){ if(cur>0) showStep(cur-1); return; } if(cur<STEPS.length-1){ showStep(cur+1); return; } const inc=answers.findIndex(a=>a.some(x=>x===null)); if(inc>=0){ toast(L().finishNeed); showStep(inc); } else finish(); }
function finish(){ const t=L(); document.getElementById('mbody').style.display='none'; document.getElementById('results').classList.add('show');
  let tot=0,corr=0; answers.forEach((arr,si)=>arr.forEach((k,ci)=>{ if(k!==null){tot++; if(k===STEPS[si].checks[ci].correct)corr++;} })); const pct=tot?Math.round(corr/tot*100):0; const pass=pct>=PASS;
  const db=document.getElementById('doneBar'); db.classList.toggle('fail',!pass); db.textContent= pass? t.done : t.failBar; document.getElementById('fscore').textContent=pct; document.getElementById('fphrase').textContent= pass? t.phrase : t.phraseFail;
