  .toast{position:fixed;bottom:74px;left:50%;transform:translateX(-50%) translateY(20px);background:#222;color:#fff;padding:11px 20px;border-radius:24px;font-weight:800;font-size:13px;box-shadow:var(--shadow);z-index:200;opacity:0;transition:.3s;pointer-events:none;max-width:90vw;text-align:center;} .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

<!-- ═══ PLANTILLA RESUMEN DE GRAMÁTICA (con nota · repaso) — JUCUM English Center ═══
     1) Nivel en <div id="screen" data-level="pre-a1|a1|a2"> (A2 arranca en inglés).
     2) Edita MAT + el bloque CONTENIDO (STEPS / BUILD / SUMMARY / BADGE). Todo es BILINGÜE {es,en}.
        · El botón ES/EN cambia TODO el material (explicación + indicaciones + auto-chequeos).
        · REGLA «el español se queda en español»: cuando el texto MENCIONA una palabra española o da un
          EJEMPLO en español (p. ej. el paso 1 «Repaso en Español»: «Él», «Ella», «Nosotros», «Juan… Él…»),
          en el lado en:'' repite esas palabras/ejemplos TAL CUAL en español; solo traduce la prosa que los rodea.
        · 'tr' (botón 🌐 traducción por pregunta): ponlo SOLO en auto-chequeos donde una oración en inglés
          tenga vocabulario que pueda frenar al alumno Y la traducción NO delate la respuesta. En drills de
          pronombres la pista ya está en la pregunta y se infiere por el verbo be → NO lleva 'tr' (por eso aquí
          no hay ninguno). Sí aplica en temas como To be / There is_are con frases más largas. Sintaxis:
          { q:{...}, opts:{...}, correct:0, fb:{...}, tr:{es:'significado en español',en:'meaning in English'} }
     3) Deja el conector antes de </body>. catalogo.json → type:"summary".
     El motor (debajo de "FIN DEL MOTOR") no se toca. ═══ -->
<body>
  <div class="mat screen" id="screen" data-level="a2">

  <button class="helpfab" onclick="openHelp()" title="?">?</button>

<script>
/* ═══ METADATOS ═══ */
const MAT = { title:{es:'Resumen de Gramática',en:'Grammar Summary'}, subtitle:{es:'Conectores (Linkers)',en:'Linkers'}, reportId:'sum-linkers' };
const PASS = 75;
const STEPS = [
  { icon:'🇪🇸', title:{es:'Repaso en Español',en:'Spanish Recap'},
    html:{
      es:`<div class="gdesc">Para unir ideas, en español usas «<b>y</b>», «<b>pero</b>», «<b>porque</b>», «<b>así que</b>», «<b>o</b>». Cada uno crea una relación distinta.</div>
        <div class="art-hero three"><div class="art-box"><div class="word">y</div><div class="role">Suma</div><div class="desc">«Estudio y trabajo.»</div></div><div class="art-box"><div class="word">pero</div><div class="role">Contraste</div><div class="desc">«Es caro pero bueno.»</div></div><div class="art-box"><div class="word">porque</div><div class="role">Razón</div><div class="desc">«Voy porque quiero.»</div></div></div>
        ${ii('🔗','Cada conector dice cómo se relacionan las dos ideas: se suman, se oponen, una explica a la otra…')}
        <div class="gnote life">🌎 <b>De tu vida:</b> «Estaba cansado, así que me dormí». En inglés son and, but, because, so, or.</div>`,
      en:`<div class="gdesc">To join ideas, Spanish uses «<b>y</b>», «<b>pero</b>», «<b>porque</b>», «<b>así que</b>», «<b>o</b>». Each creates a different relationship.</div>
        <div class="art-hero three"><div class="art-box"><div class="word">y</div><div class="role">Addition</div><div class="desc">«Estudio y trabajo.»</div></div><div class="art-box"><div class="word">pero</div><div class="role">Contrast</div><div class="desc">«Es caro pero bueno.»</div></div><div class="art-box"><div class="word">porque</div><div class="role">Reason</div><div class="desc">«Voy porque quiero.»</div></div></div>
        ${ii('🔗','Each connector tells how the two ideas relate: they add up, oppose, one explains the other…')}
        <div class="gnote life">🌎 <b>From your life:</b> «Estaba cansado, así que me dormí». In English they are and, but, because, so, or.</div>`
    },
    checks:[
      { q:{es:'«y» sirve para:',en:'«y» is used for:'}, opts:{es:['Sumar ideas','Contrastar'],en:['Add ideas','Contrast']}, correct:0, fb:{ why:{es:'Une/suma.',en:'Joins/adds.'}, tip:{es:'y → suma',en:'y → addition'}} },
      { q:{es:'«pero» indica:',en:'«pero» indicates:'}, opts:{es:['Contraste','Razón'],en:['Contrast','Reason']}, correct:0, fb:{ why:{es:'Opone dos ideas.',en:'Opposes two ideas.'}, tip:{es:'pero → contraste',en:'pero → contrast'}} },
      { q:{es:'«porque» da:',en:'«porque» gives:'}, opts:{es:['Una razón','Un resultado'],en:['A reason','A result']}, correct:0, fb:{ why:{es:'Explica el motivo.',en:'Explains the reason.'}, tip:{es:'porque → razón',en:'porque → reason'}} },
      { q:{es:'«así que» indica:',en:'«así que» indicates:'}, opts:{es:['Un resultado','Una razón'],en:['A result','A reason']}, correct:0, fb:{ why:{es:'Consecuencia.',en:'Consequence.'}, tip:{es:'así que → resultado',en:'así que → result'}} },
      { q:{es:'«o» sirve para:',en:'«o» is used for:'}, opts:{es:['Dar opciones','Contrastar'],en:['Give options','Contrast']}, correct:0, fb:{ why:{es:'Presenta alternativas.',en:'Presents alternatives.'}, tip:{es:'o → opción',en:'o → choice'}} }
    ] },
  { icon:'🤝', title:{es:'Similitudes',en:'Similarities'},
    html:{
      es:`<div class="gdesc">El inglés tiene un conector para cada relación, uno por uno.</div>
        <div class="viz-grid"><div class="viz-item"><span class="ico">➕</span><span class="lbl">and</span><span class="es">y</span></div><div class="viz-item"><span class="ico">↔️</span><span class="lbl">but</span><span class="es">pero</span></div><div class="viz-item"><span class="ico">💡</span><span class="lbl">because</span><span class="es">porque</span></div><div class="viz-item"><span class="ico">➡️</span><span class="lbl">so</span><span class="es">así que</span></div><div class="viz-item"><span class="ico">🔀</span><span class="lbl">or</span><span class="es">o</span></div><div class="viz-item"><span class="ico">➕</span><span class="lbl">also</span><span class="es">también</span></div></div>
        ${eg('I was tired, <span class="tag s">so</span> I slept.','Estaba cansado, así que dormí.','ok')}
        ${eg('It\'s small <span class="tag s">but</span> comfortable.','Es pequeño pero cómodo.','ok')}
        <div class="sec-label">Lo igual en los dos idiomas</div>
        <ul class="simlist"><li>Los dos unen ideas con conectores.</li><li>and = y · but = pero · because = porque · so = así que · or = o.</li><li>El conector va entre las dos ideas.</li></ul>
        <div class="gnote">👍 and, but, because, so, or. Lo nuevo: no confundir because con so, y la puntuación (siguiente paso).</div>`,
      en:`<div class="gdesc">English has a connector for each relationship, one by one.</div>
        <div class="viz-grid"><div class="viz-item"><span class="ico">➕</span><span class="lbl">and</span><span class="es">y</span></div><div class="viz-item"><span class="ico">↔️</span><span class="lbl">but</span><span class="es">pero</span></div><div class="viz-item"><span class="ico">💡</span><span class="lbl">because</span><span class="es">porque</span></div><div class="viz-item"><span class="ico">➡️</span><span class="lbl">so</span><span class="es">así que</span></div><div class="viz-item"><span class="ico">🔀</span><span class="lbl">or</span><span class="es">o</span></div><div class="viz-item"><span class="ico">➕</span><span class="lbl">also</span><span class="es">también</span></div></div>
        ${eg('I was tired, <span class="tag s">so</span> I slept.','I was tired, so I slept.','ok')}
        ${eg('It\'s small <span class="tag s">but</span> comfortable.','It\'s small but comfortable.','ok')}
        <div class="sec-label">What is the same in both languages</div>
        <ul class="simlist"><li>Both join ideas with connectors.</li><li>and = y · but = pero · because = porque · so = así que · or = o.</li><li>The connector goes between the two ideas.</li></ul>
        <div class="gnote">👍 and, but, because, so, or. The new part: don\'t confuse because with so, and the punctuation (next step).</div>`
    },
    checks:[
      { q:{es:'«and» = ',en:'«and» = '}, opts:{es:['y','pero'],en:['y','pero']}, correct:0, fb:{ why:{es:'and = y.',en:'and = y.'}, tip:{es:'and = y',en:'and = y'}} },
      { q:{es:'«but» = ',en:'«but» = '}, opts:{es:['pero','porque'],en:['pero','porque']}, correct:0, fb:{ why:{es:'but = pero.',en:'but = pero.'}, tip:{es:'but = pero',en:'but = pero'}} },
      { q:{es:'«because» = ',en:'«because» = '}, opts:{es:['porque','así que'],en:['porque','así que']}, correct:0, fb:{ why:{es:'because = porque.',en:'because = porque.'}, tip:{es:'because = porque',en:'because = porque'}} },
      { q:{es:'«so» = ',en:'«so» = '}, opts:{es:['así que','o'],en:['así que','o']}, correct:0, fb:{ why:{es:'so = así que.',en:'so = así que.'}, tip:{es:'so = así que',en:'so = así que'}} },
      { q:{es:'«also» = ',en:'«also» = '}, opts:{es:['también','pero'],en:['también','pero']}, correct:0, fb:{ why:{es:'also = también.',en:'also = también.'}, tip:{es:'also = también',en:'also = también'}} }
    ] },
  { icon:'⚡', title:{es:'Diferencias',en:'Differences'},
    html:{
      es:`<div class="gdesc">El error clásico: confundir <b>because</b> (razón) con <b>so</b> (resultado). Son opuestos en el orden.</div>
        <table class="dtab"><tr><th>Conector</th><th>Da…</th><th>Ejemplo</th></tr>
          <tr><td class="en">because</td><td>la razón (el porqué)</td><td>I slept because I was tired.</td></tr>
          <tr><td class="en">so</td><td>el resultado (la consecuencia)</td><td>I was tired, so I slept.</td></tr>
        </table>
        <div class="sec-label">⚠️ Razón vs resultado</div>
        ${ii('💡','<b>because</b> + la causa: «I stayed home <b>because</b> it rained» (la causa: llovió).')}
        ${ii('➡️','<b>so</b> + la consecuencia: «It rained, <b>so</b> I stayed home» (la consecuencia: me quedé).')}
        ${eg('I was hungry, <span class="tag s">so</span> I ate.','Tenía hambre, así que comí. (resultado)','ok')}
        ${eg('I ate so I was hungry.','El orden está al revés: «I ate because I was hungry».','bad')}
        <div class="gnote">📍 because + razón · so + resultado. «also/too» = también (too va al final).</div>`,
      en:`<div class="gdesc">The classic error: confusing <b>because</b> (reason) with <b>so</b> (result). They are opposite in order.</div>
        <table class="dtab"><tr><th>Connector</th><th>Gives…</th><th>Example</th></tr>
          <tr><td class="en">because</td><td>the reason (the why)</td><td>I slept because I was tired.</td></tr>
          <tr><td class="en">so</td><td>the result (the consequence)</td><td>I was tired, so I slept.</td></tr>
        </table>
        <div class="sec-label">⚠️ Reason vs result</div>
        ${ii('💡','<b>because</b> + the cause: «I stayed home <b>because</b> it rained» (the cause: it rained).')}
        ${ii('➡️','<b>so</b> + the consequence: «It rained, <b>so</b> I stayed home» (the consequence: I stayed).')}
        ${eg('I was hungry, <span class="tag s">so</span> I ate.','I was hungry, so I ate. (result)','ok')}
        ${eg('I ate so I was hungry.','The order is reversed: «I ate because I was hungry».','bad')}
        <div class="gnote">📍 because + reason · so + result. «also/too» = also (too goes at the end).</div>`
    },
    checks:[
      { q:{es:'«I took an umbrella ___ it was raining.» (razón):',en:'«I took an umbrella ___ it was raining.» (reason):'}, opts:{es:['because','so'],en:['because','so']}, correct:0, fb:{ why:{es:'Da la razón → because.',en:'Gives the reason → because.'}, ex:{es:'because it was raining → porque llovía',en:'because it was raining'}, tip:{es:'razón → because',en:'reason → because'}}, tr:{es:'Llevé paraguas porque estaba lloviendo.',en:'I took an umbrella because it was raining.'} },
      { q:{es:'«It was raining, ___ I took an umbrella.» (resultado):',en:'«It was raining, ___ I took an umbrella.» (result):'}, opts:{es:['so','because'],en:['so','because']}, correct:0, fb:{ why:{es:'Da el resultado → so.',en:'Gives the result → so.'}, ex:{es:'so I took an umbrella → así que llevé paraguas',en:'so I took an umbrella'}, tip:{es:'resultado → so',en:'result → so'}}, tr:{es:'Estaba lloviendo, así que llevé paraguas.',en:'It was raining, so I took an umbrella.'} },
      { q:{es:'«I like tea ___ I don\'t like coffee.» (contraste):',en:'«I like tea ___ I don\'t like coffee.» (contrast):'}, opts:{es:['but','and'],en:['but','and']}, correct:0, fb:{ why:{es:'Contraste → but.',en:'Contrast → but.'}, ex:{es:'but I don\'t like coffee → pero no me gusta el café',en:'but I don\'t like coffee'}, tip:{es:'contraste → but',en:'contrast → but'}}, tr:{es:'Me gusta el té pero no me gusta el café.',en:'I like tea but I don\'t like coffee.'} },
      { q:{es:'«Do you want tea ___ coffee?» (opción):',en:'«Do you want tea ___ coffee?» (choice):'}, opts:{es:['or','and'],en:['or','and']}, correct:0, fb:{ why:{es:'Opción → or.',en:'Choice → or.'}, ex:{es:'tea or coffee → té o café',en:'tea or coffee'}, tip:{es:'opción → or',en:'choice → or'}}, tr:{es:'¿Quieres té o café?',en:'Do you want tea or coffee?'} },
      { q:{es:'«I study English ___ I work.» (suma):',en:'«I study English ___ I work.» (addition):'}, opts:{es:['and','but'],en:['and','but']}, correct:0, fb:{ why:{es:'Suma → and.',en:'Addition → and.'}, ex:{es:'and I work → y trabajo',en:'and I work'}, tip:{es:'suma → and',en:'addition → and'}}, tr:{es:'Estudio inglés y trabajo.',en:'I study English and I work.'} }
    ] },
  { icon:'💡', title:{es:'Tips Prácticos',en:'Practical Tips'},
    html:{
      es:`<div class="gdesc">Cada conector en su relación:</div>
        <div class="fbox"><div class="frm"><span class="pill s">and ➕</span><span class="plus">·</span><span class="pill v">but ↔️</span><span class="plus">·</span><span class="pill o">because 💡</span><span class="plus">·</span><span class="pill p">so ➡️</span></div><div class="fex">idea 1 + conector + idea 2</div></div>
        ${ii('💡','<b>Tip 1 — Razón vs resultado:</b> «because + causa» · «so + consecuencia». ¡Son el espejo uno del otro!')}
        ${ii('✍️','<b>Tip 2 — Puntuación:</b> antes de «so» y «but» suele ir coma cuando unen dos frases completas: «I was late, but I caught the bus».')}
        ${ii('➕','<b>Tip 3 — también:</b> «also» va antes del verbo principal; «too» va al final: «I like it too».')}
        <div class="alert-card"><div class="atitle">⚠️ Error típico</div><p>❌ «I was tired because I slept» (si el resultado fue dormir) → ✅ «I was tired, <b>so</b> I slept».</p></div>`,
      en:`<div class="gdesc">Each connector in its relationship:</div>
        <div class="fbox"><div class="frm"><span class="pill s">and ➕</span><span class="plus">·</span><span class="pill v">but ↔️</span><span class="plus">·</span><span class="pill o">because 💡</span><span class="plus">·</span><span class="pill p">so ➡️</span></div><div class="fex">idea 1 + connector + idea 2</div></div>
        ${ii('💡','<b>Tip 1 — Reason vs result:</b> «because + cause» · «so + consequence». They are mirror images!')}
        ${ii('✍️','<b>Tip 2 — Punctuation:</b> a comma usually goes before «so» and «but» when they join two full sentences: «I was late, but I caught the bus».')}
        ${ii('➕','<b>Tip 3 — also/too:</b> «also» goes before the main verb; «too» goes at the end: «I like it too».')}
        <div class="alert-card"><div class="atitle">⚠️ Common mistake</div><p>❌ «I was tired because I slept» (if the result was sleeping) → ✅ «I was tired, <b>so</b> I slept».</p></div>`
    },
    checks:[
      { q:{es:'«She studied hard, ___ she passed.» (resultado):',en:'«She studied hard, ___ she passed.» (result):'}, opts:{es:['so','because'],en:['so','because']}, correct:0, fb:{ why:{es:'Resultado → so.',en:'Result → so.'}, ex:{es:'so she passed → así que aprobó',en:'so she passed'}, tip:{es:'resultado → so',en:'result → so'}}, tr:{es:'Estudió mucho, así que aprobó.',en:'She studied hard, so she passed.'} },
      { q:{es:'«She passed ___ she studied hard.» (razón):',en:'«She passed ___ she studied hard.» (reason):'}, opts:{es:['because','so'],en:['because','so']}, correct:0, fb:{ why:{es:'Razón → because.',en:'Reason → because.'}, ex:{es:'because she studied hard → porque estudió mucho',en:'because she studied hard'}, tip:{es:'razón → because',en:'reason → because'}}, tr:{es:'Aprobó porque estudió mucho.',en:'She passed because she studied hard.'} },
      { q:{es:'«He is rich ___ unhappy.» (contraste):',en:'«He is rich ___ unhappy.» (contrast):'}, opts:{es:['but','and'],en:['but','and']}, correct:0, fb:{ why:{es:'Contraste → but.',en:'Contrast → but.'}, ex:{es:'rich but unhappy → rico pero infeliz',en:'rich but unhappy'}, tip:{es:'contraste → but',en:'contrast → but'}}, tr:{es:'Es rico pero infeliz.',en:'He is rich but unhappy.'} },
      { q:{es:'«I like pizza ___ I like pasta.» (suma):',en:'«I like pizza ___ I like pasta.» (addition):'}, opts:{es:['and','or'],en:['and','or']}, correct:0, fb:{ why:{es:'Suma → and.',en:'Addition → and.'}, ex:{es:'and I like pasta → y me gusta la pasta',en:'and I like pasta'}, tip:{es:'suma → and',en:'addition → and'}} },
      { q:{es:'«I like it ___.» (también, al final):',en:'«I like it ___.» (too, at the end):'}, opts:{es:['too','also'],en:['too','also']}, correct:0, fb:{ why:{es:'«too» va al final.',en:'«too» goes at the end.'}, ex:{es:'I like it too → Me gusta también',en:'I like it too'}, tip:{es:'too → final',en:'too → end'}} }
    ] },
  { icon:'✨', title:{es:'Práctica Final',en:'Final Practice'}, builder:true,
    html:{
      es:`<div class="gdesc">Junta todo: elige el conector según la relación. Arma la oración.</div>
        <div class="cboxes"><div class="cbox s"><span class="cl">and / or</span><span class="cv">suma / opción</span></div><div class="cbox o"><span class="cl">but</span><span class="cv">contraste</span></div><div class="cbox p"><span class="cl">because / so</span><span class="cv">razón / resultado</span></div></div>
        <div class="sec-label">Las reglas en una oración</div>
        ${eg('It was late, <span class="tag s">so</span> we went home.','Era tarde, así que nos fuimos a casa.','ok')}
        ${eg('I stayed in <span class="tag s">because</span> it rained.','Me quedé porque llovió.','ok')}
        ${eg('It\'s cheap <b style="color:#7B1FA2">but</b> good.','Es barato pero bueno.','ok')}
        <div class="alert-card"><div class="atitle">⚠️ Los 3 errores más comunes</div><p>❌ confundir «because» (razón) con «so» (resultado)<br>❌ «but» sin coma entre dos frases → ✅ «…, <b>but</b> …»<br>❌ «I also like it» vs «I like it too» (posición de también)</p></div>`,
      en:`<div class="gdesc">Put it together: pick the connector by the relationship. Build the sentence.</div>

function say(text,acc){ try{ speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text); u.rate=.82; const vs=speechSynthesis.getVoices()||[]; const want=acc==='US'?'en-US':'en-GB'; const v=vs.find(x=>x.lang===want)||vs.find(x=>x.lang&&x.lang.indexOf('en')===0); if(v){u.voice=v;u.lang=v.lang;}else u.lang=want; speechSynthesis.speak(u); }catch(e){} }
function render(){ cur=0; coreDone=false; doneSteps=new Array(STEPS.length).fill(false); answers=STEPS.map(s=>new Array(s.checks.length).fill(null)); bState={order:[],locked:false};
  document.getElementById('results').classList.remove('show'); document.getElementById('mbody').style.display='block'; document.getElementById('msbanner').style.display='none';

function renderTabs(){ document.getElementById('steptabs').innerHTML=STEPS.map((s,i)=>`<button class="stab${i===0?' on':''}${doneSteps[i]?' done':''}" id="stab${i}" onclick="goStep(${i})">${s.icon} ${i+1}</button>`).join(''); }
function applyLang(){ const t=L();
  document.getElementById('lsEs').classList.toggle('on',info==='es'); document.getElementById('lsEn').classList.toggle('on',info==='en');
  document.getElementById('mhtitle').textContent=MAT.title[info]; document.getElementById('mhsub').textContent=document.getElementById('screen').getAttribute('data-level').toUpperCase().replace('-',' · ')+' · '+MAT.subtitle[info];

  document.getElementById('kpT').textContent=t.kpT; document.getElementById('lBack').textContent=t.back; document.getElementById('lRetry').textContent=t.retry;

function renderStep(){ const t=L(), s=STEPS[cur]; curLab= info==='es'?'EJEMPLO':'EXAMPLE';

  const ansd=answers[cur].filter(x=>x!==null).length;
