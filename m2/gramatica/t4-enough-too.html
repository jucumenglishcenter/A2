<script>
/* ═══ METADATOS ═══ */
const MAT = { title:{es:'Resumen de Gramática',en:'Grammar Summary'}, subtitle:{es:'Enough / Too',en:'Enough / Too'}, reportId:'sum-enough-too' };
const PASS = 75;
const STEPS = [
  { icon:'🇪🇸', title:{es:'Repaso en Español',en:'Spanish Recap'},
    html:{
      es:`<div class="gdesc">En español distingues entre «<b>demasiado</b>» (más de lo bueno), «<b>suficiente / lo suficientemente</b>» (la cantidad justa) y «<b>no suficiente</b>» (falta).</div>
        <div class="art-hero three"><div class="art-box"><div class="word">demasiado</div><div class="role">Exceso ⚠️</div><div class="desc">«Está demasiado caliente.»</div></div><div class="art-box"><div class="word">suficiente</div><div class="role">Justo ✅</div><div class="desc">«Es lo suficientemente grande.»</div></div><div class="art-box"><div class="word">no suficiente</div><div class="role">Falta ❌</div><div class="desc">«No es suficiente.»</div></div></div>
        ${ii('⚖️','«Demasiado» pasa del límite; «suficiente» llega justo al punto necesario.')}
        <div class="gnote life">🌎 <b>De tu vida:</b> «El café está demasiado caliente para tomarlo» o «¿Tienes suficiente dinero?». En inglés son too y enough.</div>`,
      en:`<div class="gdesc">In Spanish you tell apart «<b>demasiado</b>» (more than is good), «<b>suficiente / lo suficientemente</b>» (just enough) and «<b>no suficiente</b>» (not enough).</div>
        <div class="art-hero three"><div class="art-box"><div class="word">demasiado</div><div class="role">Excess ⚠️</div><div class="desc">«Está demasiado caliente.»</div></div><div class="art-box"><div class="word">suficiente</div><div class="role">Just right ✅</div><div class="desc">«Es lo suficientemente grande.»</div></div><div class="art-box"><div class="word">no suficiente</div><div class="role">Lacking ❌</div><div class="desc">«No es suficiente.»</div></div></div>
        ${ii('⚖️','«Demasiado» passes the limit; «suficiente» reaches just the needed point.')}
        <div class="gnote life">🌎 <b>From your life:</b> «El café está demasiado caliente para tomarlo» or «¿Tienes suficiente dinero?». In English they are too and enough.</div>`
    },
    checks:[
      { q:{es:'«Demasiado» significa:',en:'«Demasiado» means:'}, opts:{es:['Más de lo bueno','La cantidad justa'],en:['More than is good','Just enough']}, correct:0, fb:{ why:{es:'Es un exceso.',en:'It is an excess.'}, tip:{es:'exceso',en:'excess'}} },
      { q:{es:'«Suficiente» significa:',en:'«Suficiente» means:'}, opts:{es:['La cantidad justa','Demasiado'],en:['Just enough','Too much']}, correct:0, fb:{ why:{es:'Llega al punto necesario.',en:'Reaches the needed point.'}, tip:{es:'justo',en:'just right'}} },
      { q:{es:'«Demasiado caliente» tiene tono:',en:'«Demasiado caliente» has a tone:'}, opts:{es:['De problema','Positivo'],en:['Of a problem','Positive']}, correct:0, fb:{ why:{es:'El exceso molesta.',en:'Excess bothers.'}, tip:{es:'problema',en:'problem'}} },
      { q:{es:'«No es suficiente» indica:',en:'«No es suficiente» indicates:'}, opts:{es:['Falta','Sobra'],en:['It\'s lacking','It\'s plenty']}, correct:0, fb:{ why:{es:'No llega al punto.',en:'Doesn\'t reach the point.'}, tip:{es:'falta',en:'lacking'}} },
      { q:{es:'«Lo suficientemente grande» = el tamaño es:',en:'«Lo suficientemente grande» = the size is:'}, opts:{es:['El necesario','Excesivo'],en:['The needed one','Excessive']}, correct:0, fb:{ why:{es:'Justo lo necesario.',en:'Just what is needed.'}, tip:{es:'suficiente',en:'enough'}} }
    ] },
  { icon:'🤝', title:{es:'Similitudes',en:'Similarities'},
    html:{
      es:`<div class="gdesc">El inglés usa <b>too</b> (demasiado) y <b>enough</b> (suficiente). La idea es la misma que en español.</div>
        <div class="vs-grid">
          <div class="vs-row"><div class="vs-side es"><span class="flag">demasiado</span>demasiado caliente</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">too</span><b>too</b> hot</div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">suficiente</span>lo suficientemente alto</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">enough</span>tall <b>enough</b></div></div>
        </div>
        ${eg('It\'s <span class="tag s">too</span> expensive.','Es demasiado caro.','ok')}
        ${eg('She is tall <span class="tag s">enough</span>.','Ella es lo suficientemente alta.','ok')}
        <div class="sec-label">Lo igual en los dos idiomas</div>
        <ul class="simlist"><li>too = demasiado (exceso) · enough = suficiente (justo).</li><li>Los dos miden si algo pasa o llega al punto necesario.</li><li>Los dos pueden ir con adjetivos.</li></ul>
        <div class="gnote">👍 too = demasiado · enough = suficiente. Lo nuevo es la posición de cada uno (siguiente paso).</div>`,
      en:`<div class="gdesc">English uses <b>too</b> (demasiado) and <b>enough</b> (suficiente). The idea is the same as in Spanish.</div>
        <div class="vs-grid">
          <div class="vs-row"><div class="vs-side es"><span class="flag">demasiado</span>demasiado caliente</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">too</span><b>too</b> hot</div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">suficiente</span>lo suficientemente alto</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">enough</span>tall <b>enough</b></div></div>
        </div>
        ${eg('It\'s <span class="tag s">too</span> expensive.','It\'s too expensive.','ok')}
        ${eg('She is tall <span class="tag s">enough</span>.','She is tall enough.','ok')}
        <div class="sec-label">What is the same in both languages</div>
        <ul class="simlist"><li>too = demasiado (excess) · enough = suficiente (just right).</li><li>Both measure if something passes or reaches the needed point.</li><li>Both can go with adjectives.</li></ul>
        <div class="gnote">👍 too = demasiado · enough = suficiente. The new part is the position of each (next step).</div>`
    },
    checks:[
      { q:{es:'«too» = ',en:'«too» = '}, opts:{es:['demasiado','suficiente'],en:['demasiado','suficiente']}, correct:0, fb:{ why:{es:'too = demasiado.',en:'too = demasiado.'}, tip:{es:'too = demasiado',en:'too = demasiado'}} },
      { q:{es:'«enough» = ',en:'«enough» = '}, opts:{es:['suficiente','demasiado'],en:['suficiente','demasiado']}, correct:0, fb:{ why:{es:'enough = suficiente.',en:'enough = suficiente.'}, tip:{es:'enough = suficiente',en:'enough = suficiente'}} },
      { q:{es:'«too hot» significa:',en:'«too hot» means:'}, opts:{es:['demasiado caliente','suficientemente caliente'],en:['too hot','hot enough']}, correct:0, fb:{ why:{es:'too = exceso.',en:'too = excess.'}, tip:{es:'too → exceso',en:'too → excess'}} },
      { q:{es:'«big enough» significa:',en:'«big enough» means:'}, opts:{es:['suficientemente grande','demasiado grande'],en:['big enough','too big']}, correct:0, fb:{ why:{es:'enough = justo.',en:'enough = just right.'}, tip:{es:'enough → justo',en:'enough → just'}} },
      { q:{es:'«too» indica un:',en:'«too» indicates a:'}, opts:{es:['Problema (exceso)','Punto justo'],en:['Problem (excess)','Just-right point']}, correct:0, fb:{ why:{es:'Pasa del límite.',en:'Past the limit.'}, tip:{es:'too → problema',en:'too → problem'}} }
    ] },
  { icon:'⚡', title:{es:'Diferencias',en:'Differences'},
    html:{
      es:`<div class="gdesc">El truco está en la POSICIÓN: <b>too</b> va ANTES del adjetivo; <b>enough</b> va DESPUÉS del adjetivo (pero ANTES del sustantivo).</div>
        <table class="dtab"><tr><th>Estructura</th><th>Ejemplo</th></tr>
          <tr><td class="en">too + adjetivo</td><td>too small</td></tr>
          <tr><td class="en">adjetivo + enough</td><td>big enough</td></tr>
          <tr><td class="en">enough + sustantivo</td><td>enough money</td></tr>
        </table>
        <div class="sec-label">⚠️ enough cambia de lado</div>
        ${ii('🔄','Con <b>adjetivo</b>: va DESPUÉS (strong enough). Con <b>sustantivo</b>: va ANTES (enough time).')}
        ${ii('🎯','Patrón útil: «too + adjetivo + to + verbo»: too tired to study (demasiado cansado para estudiar).')}
        ${eg('She isn\'t old <span class="tag s">enough</span> to drive.','No tiene la edad suficiente para manejar.','ok')}
        ${eg('She isn\'t enough old.','Con adjetivo, «enough» va después: «old enough».','bad')}
        <div class="gnote">📍 too + adjetivo · adjetivo + enough · enough + sustantivo.</div>`,
      en:`<div class="gdesc">The trick is the POSITION: <b>too</b> goes BEFORE the adjective; <b>enough</b> goes AFTER the adjective (but BEFORE the noun).</div>
        <table class="dtab"><tr><th>Structure</th><th>Example</th></tr>
          <tr><td class="en">too + adjective</td><td>too small</td></tr>
          <tr><td class="en">adjective + enough</td><td>big enough</td></tr>
          <tr><td class="en">enough + noun</td><td>enough money</td></tr>
        </table>
        <div class="sec-label">⚠️ enough switches sides</div>
        ${ii('🔄','With an <b>adjective</b>: AFTER (strong enough). With a <b>noun</b>: BEFORE (enough time).')}
        ${ii('🎯','Useful pattern: «too + adjective + to + verb»: too tired to study.')}
        ${eg('She isn\'t old <span class="tag s">enough</span> to drive.','She isn\'t old enough to drive.','ok')}
        ${eg('She isn\'t enough old.','With an adjective, «enough» goes after: «old enough».','bad')}
        <div class="gnote">📍 too + adjective · adjective + enough · enough + noun.</div>`
    },
    checks:[
      { q:{es:'«This box is ___ heavy.» (demasiado):',en:'«This box is ___ heavy.» (too):'}, opts:{es:['too','enough'],en:['too','enough']}, correct:0, fb:{ why:{es:'too va antes del adjetivo.',en:'too goes before the adjective.'}, ex:{es:'too heavy → demasiado pesada',en:'too heavy'}, tip:{es:'too + adjetivo',en:'too + adjective'}}, tr:{es:'Esta caja es demasiado pesada.',en:'This box is too heavy.'} },
      { q:{es:'«He is strong ___.» (suficientemente):',en:'«He is strong ___.» (enough):'}, opts:{es:['enough','too'],en:['enough','too']}, correct:0, fb:{ why:{es:'enough va después del adjetivo.',en:'enough goes after the adjective.'}, ex:{es:'strong enough → suficientemente fuerte',en:'strong enough'}, tip:{es:'adjetivo + enough',en:'adjective + enough'}}, tr:{es:'Es lo suficientemente fuerte.',en:'He is strong enough.'} },
      { q:{es:'«We don\'t have ___ chairs.» (suficientes sillas):',en:'«We don\'t have ___ chairs.» (enough chairs):'}, opts:{es:['enough','too'],en:['enough','too']}, correct:0, fb:{ why:{es:'enough va antes del sustantivo.',en:'enough goes before the noun.'}, ex:{es:'enough chairs → suficientes sillas',en:'enough chairs'}, tip:{es:'enough + sustantivo',en:'enough + noun'}}, tr:{es:'No tenemos suficientes sillas.',en:'We don\'t have enough chairs.'} },
      { q:{es:'¿Cuál está bien?',en:'Which one is right?'}, opts:{es:['old enough','enough old'],en:['old enough','enough old']}, correct:0, fb:{ why:{es:'Con adjetivo, enough va después.',en:'With an adjective, enough goes after.'}, ex:{es:'old enough → suficientemente mayor',en:'old enough'}, tip:{es:'adjetivo + enough',en:'adjective + enough'}} },
      { q:{es:'«I\'m ___ tired ___ go out.» (demasiado… para):',en:'«I\'m ___ tired ___ go out.» (too… to):'}, opts:{es:['too … to','enough … to'],en:['too … to','enough … to']}, correct:0, fb:{ why:{es:'Patrón too + adjetivo + to + verbo.',en:'Pattern too + adjective + to + verb.'}, ex:{es:'too tired to go out → demasiado cansado para salir',en:'too tired to go out'}, tip:{es:'too + adj + to',en:'too + adj + to'}}, tr:{es:'Estoy demasiado cansado para salir.',en:'I\'m too tired to go out.'} }
    ] },
  { icon:'💡', title:{es:'Tips Prácticos',en:'Practical Tips'},
    html:{
      es:`<div class="gdesc">Las tres estructuras, claras:</div>
        <div class="fbox"><div class="frm"><span class="pill s">too + adjetivo</span><span class="plus">·</span><span class="pill v">adjetivo + enough</span><span class="plus">·</span><span class="pill o">enough + sustantivo</span></div><div class="fex"><span class="s">too small</span> · <span class="v">big enough</span> · <span class="o">enough time</span></div></div>
        ${ii('🔄','<b>Tip 1 — enough:</b> después del adjetivo, antes del sustantivo. too: siempre antes del adjetivo.')}
        ${ii('🎯','<b>Tip 2 — Patrones con «to»:</b> too + adj + to (too hot to drink) · adj + enough + to (warm enough to swim).')}
        ${ii('⚖️','<b>Tip 3 — too ≠ very:</b> «too» = problema/exceso; «very» = solo intensidad.')}
        <div class="alert-card"><div class="atitle">⚠️ Error típico</div><p>❌ «enough big» → ✅ «<b>big enough</b>».<br>❌ «It\'s very hot to drink» (si no puedes) → ✅ «It\'s <b>too</b> hot to drink».</p></div>`,
      en:`<div class="gdesc">The three structures, clear:</div>
        <div class="fbox"><div class="frm"><span class="pill s">too + adjective</span><span class="plus">·</span><span class="pill v">adjective + enough</span><span class="plus">·</span><span class="pill o">enough + noun</span></div><div class="fex"><span class="s">too small</span> · <span class="v">big enough</span> · <span class="o">enough time</span></div></div>
        ${ii('🔄','<b>Tip 1 — enough:</b> after the adjective, before the noun. too: always before the adjective.')}
        ${ii('🎯','<b>Tip 2 — Patterns with «to»:</b> too + adj + to (too hot to drink) · adj + enough + to (warm enough to swim).')}
        ${ii('⚖️','<b>Tip 3 — too ≠ very:</b> «too» = problem/excess; «very» = just intensity.')}
        <div class="alert-card"><div class="atitle">⚠️ Common mistake</div><p>❌ «enough big» → ✅ «<b>big enough</b>».<br>❌ «It\'s very hot to drink» (if you can\'t) → ✅ «It\'s <b>too</b> hot to drink».</p></div>`
    },
    checks:[
      { q:{es:'«The water is ___ warm to swim.» (suficientemente):',en:'«The water is ___ warm to swim.» (warm enough):'}, opts:{es:['warm enough','enough warm'],en:['warm enough','enough warm']}, correct:0, fb:{ why:{es:'adjetivo + enough.',en:'adjective + enough.'}, ex:{es:'warm enough to swim → suficientemente cálida para nadar',en:'warm enough to swim'}, tip:{es:'adjetivo + enough',en:'adjective + enough'}}, tr:{es:'El agua está suficientemente cálida para nadar.',en:'The water is warm enough to swim.'} },
      { q:{es:'«It\'s ___ late to call him.» (demasiado):',en:'«It\'s ___ late to call him.» (too):'}, opts:{es:['too','enough'],en:['too','enough']}, correct:0, fb:{ why:{es:'too + adjetivo.',en:'too + adjective.'}, ex:{es:'too late to call → demasiado tarde para llamar',en:'too late to call'}, tip:{es:'too + adjetivo',en:'too + adjective'}}, tr:{es:'Es demasiado tarde para llamarlo.',en:'It\'s too late to call him.'} },
      { q:{es:'«Do we have ___ food?» (suficiente comida):',en:'«Do we have ___ food?» (enough food):'}, opts:{es:['enough','too'],en:['enough','too']}, correct:0, fb:{ why:{es:'enough + sustantivo.',en:'enough + noun.'}, ex:{es:'enough food → suficiente comida',en:'enough food'}, tip:{es:'enough + sustantivo',en:'enough + noun'}}, tr:{es:'¿Tenemos suficiente comida?',en:'Do we have enough food?'} },
      { q:{es:'¿Cuál está bien?',en:'Which one is right?'}, opts:{es:['strong enough','enough strong'],en:['strong enough','enough strong']}, correct:0, fb:{ why:{es:'Con adjetivo, enough va después.',en:'With an adjective, enough goes after.'}, ex:{es:'strong enough → suficientemente fuerte',en:'strong enough'}, tip:{es:'adjetivo + enough',en:'adjective + enough'}} },
      { q:{es:'Quieres decir solo «muy» (sin problema):',en:'You only mean «very» (no problem):'}, opts:{es:['very','too'],en:['very','too']}, correct:0, fb:{ why:{es:'too añade problema; very solo intensifica.',en:'too adds a problem; very only intensifies.'}, ex:{es:'very nice → muy agradable',en:'very nice'}, tip:{es:'sin problema → very',en:'no problem → very'}} }
    ] },
  { icon:'✨', title:{es:'Práctica Final',en:'Final Practice'}, builder:true,
    html:{
      es:`<div class="gdesc">Junta todo: too antes del adjetivo, enough después del adjetivo o antes del sustantivo. Arma la oración.</div>
        <div class="cboxes"><div class="cbox s"><span class="cl">too + adjetivo</span><span class="cv">too cold · too late</span></div><div class="cbox o"><span class="cl">adjetivo + enough</span><span class="cv">old enough · big enough</span></div><div class="cbox p"><span class="cl">enough + sustantivo</span><span class="cv">enough money · enough time</span></div></div>
        <div class="sec-label">Las reglas en una oración</div>
        ${eg('It is <span class="tag s">too</span> cold today.','Hace demasiado frío hoy.','ok')}
        ${eg('He isn\'t tall <span class="tag s">enough</span>.','No es lo suficientemente alto.','ok')}
        ${eg('We have <b style="color:#7B1FA2">enough</b> chairs.','Tenemos suficientes sillas.','ok')}
