<!-- ═══ PLANTILLA RESUMEN DE GRAMÁTICA (con nota · repaso) — JUCUM English Center ═══
     1) Nivel en <div id="screen" data-level="pre-a1|a1|a2"> (A2 arranca en inglés).
     2) Edita MAT + el bloque CONTENIDO (STEPS / BUILD / SUMMARY / BADGE). Todo es BILINGÜE {es,en}.
        · El botón ES/EN cambia TODO el material (explicación + indicaciones + auto-chequeos).
        · REGLA «el español se queda en español»: cuando el texto MENCIONA una palabra española o da un
          EJEMPLO en español (p. ej. el paso 1 «Repaso en Español»: «Él», «Ella», «Nosotros», «Juan… Él…»),
          en el lado en:'' repite esas palabras/ejemplos TAL CUAL en español; solo traduce la prosa que los rodea.
        · 'tr' (botón 🌐 traducción por pregunta): ponlo SOLO en auto-chequeos donde una oración en inglés
          tenga vocabulario que pueda frenar al alumno Y la traducción NO delate la respuesta. En drills de
          pronombres la pista ya está en la pregunta y se infiere por el verbo be → NO lleva 'tr' (por eso aquí
          no hay ninguno). Sí aplica en temas como To be / There is_are con frases más largas. Sintaxis:
          { q:{...}, opts:{...}, correct:0, fb:{...}, tr:{es:'significado en español',en:'meaning in English'} }

<script>
/* ═══ METADATOS ═══ */
const MAT = { title:{es:'Resumen de Gramática',en:'Grammar Summary'}, subtitle:{es:'Adverbios de Modo',en:'Adverbs of Manner' }, reportId:'sum-adverbs-manner' };
const PASS = 75;
const STEPS = [
  { icon:'🇪🇸', title:{es:'Repaso en Español',en:'Spanish Recap'},
    html:{
      es:`<div class="gdesc">Para decir <b>cómo</b> se hace algo, en español usas palabras terminadas en «<b>-mente</b>»: «rápida<b>mente</b>», «tranquila<b>mente</b>».</div>
        <div class="art-hero"><div class="art-box"><div class="word">rápidamente</div><div class="role">Cómo</div><div class="desc">«Corre rápidamente.»</div></div><div class="art-box"><div class="word">bien</div><div class="role">Irregular</div><div class="desc">«Canta bien.» (no «buenamente»)</div></div></div>
        ${ii('🛠️','El adverbio de modo describe la <b>acción</b> (el verbo): cómo corre, cómo habla, cómo trabaja.')}
        <div class="gnote life">🌎 <b>De tu vida:</b> «Habla claramente» o «Conduce con cuidado». En inglés, casi todos se forman con «-ly».</div>`,
      en:`<div class="gdesc">To say <b>how</b> something is done, Spanish uses words ending in «<b>-mente</b>»: «rápida<b>mente</b>», «tranquila<b>mente</b>».</div>
        <div class="art-hero"><div class="art-box"><div class="word">rápidamente</div><div class="role">How</div><div class="desc">«Corre rápidamente.»</div></div><div class="art-box"><div class="word">bien</div><div class="role">Irregular</div><div class="desc">«Canta bien.» (not «buenamente»)</div></div></div>
        ${ii('🛠️','The adverb of manner describes the <b>action</b> (the verb): how someone runs, speaks, works.')}
        <div class="gnote life">🌎 <b>From your life:</b> «Habla claramente» or «Conduce con cuidado». In English, almost all are formed with «-ly».</div>`
    },
    checks:[
      { q:{es:'El adverbio de modo dice:',en:'The adverb of manner tells:'}, opts:{es:['Cómo se hace algo','Cuándo'],en:['How something is done','When']}, correct:0, fb:{ why:{es:'Describe la acción.',en:'It describes the action.'}, tip:{es:'cómo',en:'how'}} },
      { q:{es:'«rápidamente» termina en:',en:'«rápidamente» ends in:'}, opts:{es:['-mente','-ando'],en:['-mente','-ando']}, correct:0, fb:{ why:{es:'Es la marca del adverbio.',en:'It is the adverb ending.'}, tip:{es:'-mente',en:'-mente'}} },
      { q:{es:'«Canta bien» — «bien» describe:',en:'«Canta bien» — «bien» describes:'}, opts:{es:['Cómo canta','Qué canta'],en:['How she sings','What she sings']}, correct:0, fb:{ why:{es:'Modo de la acción.',en:'Manner of the action.'}, tip:{es:'cómo',en:'how'}} },
      { q:{es:'El adverbio describe principalmente:',en:'The adverb mainly describes:'}, opts:{es:['El verbo (la acción)','El sustantivo'],en:['The verb (the action)','The noun']}, correct:0, fb:{ why:{es:'Modifica al verbo.',en:'It modifies the verb.'}, tip:{es:'verbo',en:'verb'}} },
      { q:{es:'«bien» en lugar de «buenamente» es:',en:'«bien» instead of «buenamente» is:'}, opts:{es:['Irregular','Un error'],en:['Irregular','A mistake']}, correct:0, fb:{ why:{es:'Algunos adverbios son irregulares.',en:'Some adverbs are irregular.'}, tip:{es:'irregular',en:'irregular'}} }
    ] },
  { icon:'🤝', title:{es:'Similitudes',en:'Similarities'},
    html:{
      es:`<div class="gdesc">El inglés también forma adverbios a partir del adjetivo. La regla general: <b>adjetivo + ly</b> (como «-mente»).</div>
        <table class="dtab"><tr><th>Adjetivo</th><th>Adverbio</th></tr>
          <tr><td>quick</td><td class="en">quickly</td></tr>
          <tr><td>slow</td><td class="en">slowly</td></tr>
          <tr><td>careful</td><td class="en">carefully</td></tr>
          <tr><td>happy</td><td class="en">happily (y → ily)</td></tr>
        </table>
        ${eg('She speaks <span class="tag s">clearly</span>.','Ella habla claramente.','ok')}
        ${eg('He drives <span class="tag s">carefully</span>.','Él conduce con cuidado.','ok')}
        <div class="sec-label">Lo igual en los dos idiomas</div>
        <ul class="simlist"><li>Los dos forman adverbios a partir del adjetivo.</li><li>«-ly» en inglés = «-mente» en español.</li><li>Los dos describen cómo se hace la acción.</li></ul>
        <div class="gnote">👍 quick → quickly = rápido → rápidamente. Lo nuevo: la posición y los irregulares (siguiente paso).</div>`,
      en:`<div class="gdesc">English also forms adverbs from the adjective. The general rule: <b>adjective + ly</b> (like «-mente»).</div>
        <table class="dtab"><tr><th>Adjective</th><th>Adverb</th></tr>
          <tr><td>quick</td><td class="en">quickly</td></tr>
          <tr><td>slow</td><td class="en">slowly</td></tr>
          <tr><td>careful</td><td class="en">carefully</td></tr>
          <tr><td>happy</td><td class="en">happily (y → ily)</td></tr>
        </table>
        ${eg('She speaks <span class="tag s">clearly</span>.','She speaks clearly.','ok')}
        ${eg('He drives <span class="tag s">carefully</span>.','He drives carefully.','ok')}
        <div class="sec-label">What is the same in both languages</div>
        <ul class="simlist"><li>Both form adverbs from the adjective.</li><li>«-ly» in English = «-mente» in Spanish.</li><li>Both describe how the action is done.</li></ul>
        <div class="gnote">👍 quick → quickly = rápido → rápidamente. The new part: position and irregulars (next step).</div>`
    },
    checks:[
      { q:{es:'Adverbio de «quick»:',en:'Adverb of «quick»:'}, opts:{es:['quickly','quick'],en:['quickly','quick']}, correct:0, fb:{ why:{es:'+ ly.',en:'+ ly.'}, ex:{es:'quickly → rápidamente',en:'quickly'}, tip:{es:'+ ly',en:'+ ly'}} },
      { q:{es:'«-ly» equivale a:',en:'«-ly» matches:'}, opts:{es:['-mente','-ando'],en:['-mente','-ando']}, correct:0, fb:{ why:{es:'Forma adverbios.',en:'Forms adverbs.'}, tip:{es:'-ly = -mente',en:'-ly = -mente'}} },
      { q:{es:'Adverbio de «careful»:',en:'Adverb of «careful»:'}, opts:{es:['carefully','carefuly'],en:['carefully','carefuly']}, correct:0, fb:{ why:{es:'careful + ly = carefully.',en:'careful + ly = carefully.'}, ex:{es:'carefully → con cuidado',en:'carefully'}, tip:{es:'+ ly',en:'+ ly'}} },
      { q:{es:'Adverbio de «happy»:',en:'Adverb of «happy»:'}, opts:{es:['happily','happyly'],en:['happily','happyly']}, correct:0, fb:{ why:{es:'y → ily.',en:'y → ily.'}, ex:{es:'happily → felizmente',en:'happily'}, tip:{es:'y → ily',en:'y → ily'}} },
      { q:{es:'El adverbio describe:',en:'The adverb describes:'}, opts:{es:['Cómo se hace la acción','El color'],en:['How the action is done','The color']}, correct:0, fb:{ why:{es:'Modo.',en:'Manner.'}, tip:{es:'cómo',en:'how'}} }
    ] },
  { icon:'⚡', title:{es:'Diferencias',en:'Differences'},
    html:{
      es:`<div class="gdesc">Lo que el español no marca igual: la <b>posición</b> (suele ir después del verbo/objeto) y algunos <b>irregulares</b>.</div>
        <table class="dtab"><tr><th>Adjetivo</th><th>Adverbio</th><th>Nota</th></tr>
          <tr><td>good</td><td class="en">well</td><td>¡no «goodly»!</td></tr>
          <tr><td>fast</td><td class="en">fast</td><td>igual (no «fastly»)</td></tr>
          <tr><td>hard</td><td class="en">hard</td><td>igual (hardly = casi no)</td></tr>
        </table>
        <div class="sec-label">⚠️ Adjetivo vs adverbio</div>
        ${ii('🎯','El <b>adjetivo</b> describe un sustantivo (a <b>careful</b> driver); el <b>adverbio</b> describe el verbo (he drives <b>carefully</b>).')}
        ${ii('📍','El adverbio de modo suele ir <b>después del verbo</b> (y de su objeto): «She speaks English <b>well</b>».')}
        ${eg('He plays the guitar <span class="tag s">well</span>.','Toca la guitarra bien. (good → well)','ok')}
        ${eg('He plays the guitar good.','«good» es adjetivo; aquí va «well».','bad')}
        <div class="gnote">📍 Regla: adjetivo + ly · irregulares: good→well, fast→fast, hard→hard. Posición: después del verbo/objeto.</div>`,
      en:`<div class="gdesc">What Spanish doesn\'t mark the same: the <b>position</b> (usually after the verb/object) and some <b>irregulars</b>.</div>
        <table class="dtab"><tr><th>Adjective</th><th>Adverb</th><th>Note</th></tr>
          <tr><td>good</td><td class="en">well</td><td>not «goodly»!</td></tr>
          <tr><td>fast</td><td class="en">fast</td><td>same (not «fastly»)</td></tr>
          <tr><td>hard</td><td class="en">hard</td><td>same (hardly = barely)</td></tr>
        </table>
        <div class="sec-label">⚠️ Adjective vs adverb</div>
        ${ii('🎯','The <b>adjective</b> describes a noun (a <b>careful</b> driver); the <b>adverb</b> describes the verb (he drives <b>carefully</b>).')}
        ${ii('📍','The adverb of manner usually goes <b>after the verb</b> (and its object): «She speaks English <b>well</b>».')}
        ${eg('He plays the guitar <span class="tag s">well</span>.','He plays the guitar well. (good → well)','ok')}
        ${eg('He plays the guitar good.','«good» is an adjective; here it\'s «well».','bad')}
        <div class="gnote">📍 Rule: adjective + ly · irregulars: good→well, fast→fast, hard→hard. Position: after the verb/object.</div>`
    },
    checks:[
      { q:{es:'Adverbio de «good»:',en:'Adverb of «good»:'}, opts:{es:['well','goodly'],en:['well','goodly']}, correct:0, fb:{ why:{es:'Irregular → well.',en:'Irregular → well.'}, ex:{es:'She sings well → Canta bien',en:'She sings well'}, tip:{es:'good → well',en:'good → well'}} },
      { q:{es:'Adverbio de «fast»:',en:'Adverb of «fast»:'}, opts:{es:['fast','fastly'],en:['fast','fastly']}, correct:0, fb:{ why:{es:'No cambia (no «fastly»).',en:'No change (not «fastly»).'}, ex:{es:'He runs fast → Corre rápido',en:'He runs fast'}, tip:{es:'fast → fast',en:'fast → fast'}} },
      { q:{es:'«a ___ driver» (cuidadoso) — ¿adjetivo o adverbio?',en:'«a ___ driver» (careful) — adjective or adverb?'}, opts:{es:['careful (adjetivo)','carefully (adverbio)'],en:['careful (adjective)','carefully (adverb)']}, correct:0, fb:{ why:{es:'Describe «driver» (sustantivo) → adjetivo.',en:'It describes «driver» (noun) → adjective.'}, ex:{es:'a careful driver → un conductor cuidadoso',en:'a careful driver'}, tip:{es:'sustantivo → adjetivo',en:'noun → adjective'}} },
      { q:{es:'«He drives ___» (con cuidado):',en:'«He drives ___» (carefully):'}, opts:{es:['carefully','careful'],en:['carefully','careful']}, correct:0, fb:{ why:{es:'Describe «drives» (verbo) → adverbio.',en:'It describes «drives» (verb) → adverb.'}, ex:{es:'He drives carefully → Conduce con cuidado',en:'He drives carefully'}, tip:{es:'verbo → adverbio',en:'verb → adverb'}} },
      { q:{es:'¿Cuál está bien?',en:'Which one is right?'}, opts:{es:['She sings well','She sings good'],en:['She sings well','She sings good']}, correct:0, fb:{ why:{es:'Verbo → adverbio (well).',en:'Verb → adverb (well).'}, ex:{es:'She sings well → Canta bien',en:'She sings well'}, tip:{es:'good → well',en:'good → well'}} }
    ] },
  { icon:'💡', title:{es:'Tips Prácticos',en:'Practical Tips'},
    html:{
      es:`<div class="gdesc">La fórmula y la posición:</div>
        <div class="fbox"><div class="frm"><span class="pill s">Sujeto</span><span class="plus">+</span><span class="pill v">verbo (+ objeto)</span><span class="plus">+</span><span class="pill o">adverbio</span></div><div class="fex"><span class="s">She</span> <span class="v">speaks English</span> <span class="o">well</span>.</div></div>
        ${ii('🔤','<b>Tip 1 — Formación:</b> adjetivo + ly · y → ily (happy→happily) · le → ly (gentle→gently).')}
        ${ii('⭐','<b>Tip 2 — Irregulares:</b> good→well, fast→fast, hard→hard. ¡Memorízalos!')}
        ${ii('📍','<b>Tip 3 — Posición:</b> después del verbo (y su objeto), no entre el verbo y el objeto.')}
        <div class="alert-card"><div class="atitle">⚠️ Error típico</div><p>❌ «She speaks good English» → ✅ «She speaks English <b>well</b>».<br>❌ «He runs fastly» → ✅ «He runs <b>fast</b>».</p></div>`,
      en:`<div class="gdesc">The formula and the position:</div>
        <div class="fbox"><div class="frm"><span class="pill s">Subject</span><span class="plus">+</span><span class="pill v">verb (+ object)</span><span class="plus">+</span><span class="pill o">adverb</span></div><div class="fex"><span class="s">She</span> <span class="v">speaks English</span> <span class="o">well</span>.</div></div>
        ${ii('🔤','<b>Tip 1 — Formation:</b> adjective + ly · y → ily (happy→happily) · le → ly (gentle→gently).')}
        ${ii('⭐','<b>Tip 2 — Irregulars:</b> good→well, fast→fast, hard→hard. Memorize them!')}
        ${ii('📍','<b>Tip 3 — Position:</b> after the verb (and its object), not between the verb and the object.')}
        <div class="alert-card"><div class="atitle">⚠️ Common mistake</div><p>❌ «She speaks good English» → ✅ «She speaks English <b>well</b>».<br>❌ «He runs fastly» → ✅ «He runs <b>fast</b>».</p></div>`
    },
    checks:[
      { q:{es:'«She dances ___» (hermoso):',en:'«She dances ___» (beautifully):'}, opts:{es:['beautifully','beautiful'],en:['beautifully','beautiful']}, correct:0, fb:{ why:{es:'Describe el verbo → adverbio.',en:'Describes the verb → adverb.'}, ex:{es:'She dances beautifully → Baila hermoso',en:'She dances beautifully'}, tip:{es:'verbo → -ly',en:'verb → -ly'}} },
      { q:{es:'Adverbio de «gentle»:',en:'Adverb of «gentle»:'}, opts:{es:['gently','gentlely'],en:['gently','gentlely']}, correct:0, fb:{ why:{es:'le → ly.',en:'le → ly.'}, ex:{es:'gently → suavemente',en:'gently'}, tip:{es:'le → ly',en:'le → ly'}} },
      { q:{es:'¿Cuál está bien?',en:'Which one is right?'}, opts:{es:['He works hard','He works hardly'],en:['He works hard','He works hardly']}, correct:0, fb:{ why:{es:'«hard» (con esfuerzo) no lleva ly; «hardly» = casi no.',en:'«hard» (with effort) has no ly; «hardly» = barely.'}, ex:{es:'He works hard → Trabaja duro',en:'He works hard'}, tip:{es:'hard ≠ hardly',en:'hard ≠ hardly'}} },
      { q:{es:'¿Cuál está bien?',en:'Which one is right?'}, opts:{es:['She speaks French well','She speaks well French'],en:['She speaks French well','She speaks well French']}, correct:0, fb:{ why:{es:'El adverbio va después del objeto.',en:'The adverb goes after the object.'}, ex:{es:'She speaks French well → Habla francés bien',en:'She speaks French well'}, tip:{es:'verbo + objeto + adverbio',en:'verb + object + adverb'}} },
      { q:{es:'Adverbio de «easy»:',en:'Adverb of «easy»:'}, opts:{es:['easily','easyly'],en:['easily','easyly']}, correct:0, fb:{ why:{es:'y → ily.',en:'y → ily.'}, ex:{es:'easily → fácilmente',en:'easily'}, tip:{es:'y → ily',en:'y → ily'}} }
    ] },
  { icon:'✨', title:{es:'Práctica Final',en:'Final Practice'}, builder:true,
    html:{
      es:`<div class="gdesc">Junta todo: adjetivo + ly (con irregulares), después del verbo/objeto. Arma la oración.</div>
        <div class="cboxes"><div class="cbox s"><span class="cl">+ ly</span><span class="cv">quick→quickly · careful→carefully</span></div><div class="cbox o"><span class="cl">irregular</span><span class="cv">good→well · fast→fast · hard→hard</span></div><div class="cbox p"><span class="cl">posición</span><span class="cv">después del verbo/objeto</span></div></div>
        <div class="sec-label">Las reglas en una oración</div>
        ${eg('He answered <span class="tag s">quickly</span>.','Respondió rápidamente.','ok')}
        ${eg('She plays the piano <span class="tag s">well</span>.','Toca el piano bien.','ok')}
        ${eg('They worked <b style="color:#7B1FA2">hard</b> all day.','Trabajaron duro todo el día.','ok')}
        <div class="alert-card"><div class="atitle">⚠️ Los 3 errores más comunes</div><p>❌ «She sings good» → ✅ «She sings <b>well</b>»<br>❌ «He runs fastly» → ✅ «He runs <b>fast</b>»<br>❌ «She speaks good English» → ✅ «She speaks English <b>well</b>»</p></div>`,
      en:`<div class="gdesc">Put it together: adjective + ly (with irregulars), after the verb/object. Build the sentence.</div>
        <div class="cboxes"><div class="cbox s"><span class="cl">+ ly</span><span class="cv">quick→quickly · careful→carefully</span></div><div class="cbox o"><span class="cl">irregular</span><span class="cv">good→well · fast→fast · hard→hard</span></div><div class="cbox p"><span class="cl">position</span><span class="cv">after the verb/object</span></div></div>
        <div class="sec-label">The rules in one sentence</div>
        ${eg('He answered <span class="tag s">quickly</span>.','He answered quickly.','ok')}

function say(text,acc){ try{ speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text); u.rate=.82; const vs=speechSynthesis.getVoices()||[]; const want=acc==='US'?'en-US':'en-GB'; const v=vs.find(x=>x.lang===want)||vs.find(x=>x.lang&&x.lang.indexOf('en')===0); if(v){u.voice=v;u.lang=v.lang;}else u.lang=want; speechSynthesis.speak(u); }catch(e){} }
function render(){ cur=0; coreDone=false; doneSteps=new Array(STEPS.length).fill(false); answers=STEPS.map(s=>new Array(s.checks.length).fill(null)); bState={order:[],locked:false};

function renderTabs(){ document.getElementById('steptabs').innerHTML=STEPS.map((s,i)=>`<button class="stab${i===0?' on':''}${doneSteps[i]?' done':''}" id="stab${i}" onclick="goStep(${i})">${s.icon} ${i+1}</button>`).join(''); }
function applyLang(){ const t=L();
  document.getElementById('lsEs').classList.toggle('on',info==='es'); document.getElementById('lsEn').classList.toggle('on',info==='en');
  document.getElementById('mhtitle').textContent=MAT.title[info]; document.getElementById('mhsub').textContent=document.getElementById('screen').getAttribute('data-level').toUpperCase().replace('-',' · ')+' · '+MAT.subtitle[info];
  document.getElementById('unT').textContent=t.unT; document.getElementById('unP').textContent=t.unP;
  document.getElementById('helpT').textContent=t.helpT; document.getElementById('helpTips').innerHTML='<div style="font-size:11.5px;color:var(--text-soft);font-weight:700;margin-bottom:6px">'+t.tipsT+'</div>'+t.tips.map(x=>'<div class="helptip">• <span>'+x+'</span></div>').join('');
  document.getElementById('kpT').textContent=t.kpT; document.getElementById('lBack').textContent=t.back; document.getElementById('lRetry').textContent=t.retry;
  updateMilestone(); renderStep(); }
function renderStep(){ const t=L(), s=STEPS[cur]; curLab= info==='es'?'EJEMPLO':'EXAMPLE';
  let html=`<div class="gcard"><div class="sec-label">${cur+1}. ${s.icon} ${s.title[info]}</div>${s.html[info]}`;
  if(s.builder) html+=builderHtml(); html+=`</div>`;
  const ansd=answers[cur].filter(x=>x!==null).length;

function removeTile(idx,el){ if(bState.locked)return; bState.order=bState.order.filter(x=>x!==idx); el.remove(); document.getElementById('tile'+idx).classList.remove('placed'); document.getElementById('bchk').disabled=bState.order.length!==BUILD.answer.length; }
function checkBuild(){ const t=L(); bState.locked=true; const ok=bState.order.join(',')===BUILD.answer.map((_,i)=>i).join(','); document.querySelectorAll('#tray .tile').forEach(x=>x.style.pointerEvents='none');

function finish(){ const t=L(); document.getElementById('mbody').style.display='none'; document.getElementById('results').classList.add('show');
