<script>

const STEPS = [
  { icon:'🇪🇸', title:{es:'Repaso en Español',en:'Spanish Recap'},
    html:{
      es:`<div class="gdesc">En español, una pequeña palabra cambia el ánimo de la frase: «<b>unos pocos</b>» suena positivo (sí hay), pero «<b>pocos</b>» suena negativo (casi ninguno).</div>
        <div class="art-hero"><div class="art-box"><div class="word">unos pocos 🙂</div><div class="role">Positivo</div><div class="desc">«Tengo unos pocos amigos.» = sí tengo.</div></div><div class="art-box"><div class="word">pocos 😕</div><div class="role">Negativo</div><div class="desc">«Tengo pocos amigos.» = casi ninguno.</div></div></div>
        ${ii('🙂','«unos pocos / un poco de» = hay algo, suficiente. Suena optimista.')}
        ${ii('😕','«pocos / poco» (sin «unos/un») = casi nada. Suena a queja o falta.')}
        <div class="gnote life">🌎 <b>De tu vida:</b> «Me queda <b>un poco de</b> batería» (tranquilo) vs «Me queda <b>poca</b> batería» (preocupado). ¡La misma cantidad, distinto ánimo!</div>`,
      en:`<div class="gdesc">In Spanish, a tiny word changes the mood of the sentence: «<b>unos pocos</b>» sounds positive (there IS some), but «<b>pocos</b>» sounds negative (almost none).</div>
        <div class="art-hero"><div class="art-box"><div class="word">unos pocos 🙂</div><div class="role">Positive</div><div class="desc">«Tengo unos pocos amigos.» = I do have some.</div></div><div class="art-box"><div class="word">pocos 😕</div><div class="role">Negative</div><div class="desc">«Tengo pocos amigos.» = almost none.</div></div></div>
        ${ii('🙂','«unos pocos / un poco de» = there is some, enough. Sounds optimistic.')}
        ${ii('😕','«pocos / poco» (without «unos/un») = almost nothing. Sounds like a complaint or a lack.')}
        <div class="gnote life">🌎 <b>From your life:</b> «Me queda <b>un poco de</b> batería» (relaxed) vs «Me queda <b>poca</b> batería» (worried). Same amount, different mood!</div>`
    },
    checks:[
      { q:{es:'«Unos pocos amigos» suena:',en:'«Unos pocos amigos» sounds:'}, opts:{es:['Positivo (sí hay)','Negativo (casi ninguno)'],en:['Positive (there is some)','Negative (almost none)']}, correct:0, fb:{ why:{es:'Con «unos» = hay algunos.',en:'With «unos» = there are some.'}, tip:{es:'unos pocos → positivo',en:'unos pocos → positive'}} },
      { q:{es:'«Pocos amigos» suena:',en:'«Pocos amigos» sounds:'}, opts:{es:['Negativo (casi ninguno)','Positivo'],en:['Negative (almost none)','Positive']}, correct:0, fb:{ why:{es:'Sin «unos» = casi nada.',en:'Without «unos» = almost none.'}, tip:{es:'pocos → negativo',en:'pocos → negative'}} },
      { q:{es:'«Un poco de tiempo» da idea de:',en:'«Un poco de tiempo» gives the idea of:'}, opts:{es:['Sí hay algo','No alcanza'],en:['There is some','Not enough']}, correct:0, fb:{ why:{es:'«un poco de» es positivo.',en:'«un poco de» is positive.'}, tip:{es:'un poco de → positivo',en:'un poco de → positive'}} },
      { q:{es:'«Poco tiempo» da idea de:',en:'«Poco tiempo» gives the idea of:'}, opts:{es:['Casi nada / no alcanza','De sobra'],en:['Almost none / not enough','Plenty']}, correct:0, fb:{ why:{es:'«poco» (sin «un») es negativo.',en:'«poco» (without «un») is negative.'}, tip:{es:'poco → negativo',en:'poco → negative'}} },
      { q:{es:'¿Qué cambia el ánimo de la frase?',en:'What changes the mood of the sentence?'}, opts:{es:['La palabrita «unos/un»','El verbo'],en:['The little word «unos/un»','The verb']}, correct:0, fb:{ why:{es:'Con o sin «unos/un» cambia el tono.',en:'With or without «unos/un» the tone changes.'}, tip:{es:'unos/un = positivo',en:'unos/un = positive'}} }
    ] },
  { icon:'🤝', title:{es:'Similitudes',en:'Similarities'},
    html:{
      es:`<div class="gdesc">El inglés hace exactamente lo mismo con la palabra «<b>a</b>»: con «a» es positivo; sin «a» es negativo.</div>
        <div class="vs-grid">
          <div class="vs-row"><div class="vs-side es"><span class="flag">unos pocos 🙂</span>unos pocos amigos</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">a few</span><b>a few</b> friends</div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">pocos 😕</span>pocos amigos</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">few</span><b>few</b> friends</div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">un poco de 🙂</span>un poco de tiempo</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">a little</span><b>a little</b> time</div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">poco 😕</span>poco tiempo</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">little</span><b>little</b> time</div></div>
        </div>
        ${eg('I have <span class="tag s">a few</span> friends here.','Tengo unos pocos amigos aquí. (positivo)','ok')}
        ${eg('I have <span class="tag o">few</span> friends here.','Tengo pocos amigos aquí. (casi ninguno)','ok')}
        <div class="sec-label">Lo igual en los dos idiomas</div>
        <ul class="simlist"><li>La «a» en inglés = «unos/un» en español: marca lo positivo.</li><li><b>a few / few</b> van con lo que se cuenta · <b>a little / little</b> con masas.</li><li>Quitar la «a» (o «unos/un») le da tono negativo.</li></ul>
        <div class="gnote">👍 a few = unos pocos · few = pocos · a little = un poco de · little = poco. La «a» es la clave (siguiente paso).</div>`,
      en:`<div class="gdesc">English does exactly the same with the word «<b>a</b>»: with «a» it\'s positive; without «a» it\'s negative.</div>
        <div class="vs-grid">
          <div class="vs-row"><div class="vs-side es"><span class="flag">unos pocos 🙂</span>unos pocos amigos</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">a few</span><b>a few</b> friends</div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">pocos 😕</span>pocos amigos</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">few</span><b>few</b> friends</div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">un poco de 🙂</span>un poco de tiempo</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">a little</span><b>a little</b> time</div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">poco 😕</span>poco tiempo</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">little</span><b>little</b> time</div></div>
        </div>
        ${eg('I have <span class="tag s">a few</span> friends here.','I have a few friends here. (positive)','ok')}
        ${eg('I have <span class="tag o">few</span> friends here.','I have few friends here. (almost none)','ok')}
        <div class="sec-label">What is the same in both languages</div>
        <ul class="simlist"><li>The «a» in English = «unos/un» in Spanish: it marks the positive.</li><li><b>a few / few</b> go with countable things · <b>a little / little</b> with masses.</li><li>Dropping the «a» (or «unos/un») gives a negative tone.</li></ul>
        <div class="gnote">👍 a few = unos pocos · few = pocos · a little = un poco de · little = poco. The «a» is the key (next step).</div>`
    },
    checks:[
      { q:{es:'«a few» = ',en:'«a few» = '}, opts:{es:['unos pocos (positivo)','pocos (negativo)'],en:['unos pocos (positive)','pocos (negative)']}, correct:0, fb:{ why:{es:'Con «a» → positivo.',en:'With «a» → positive.'}, tip:{es:'a few → positivo',en:'a few → positive'}} },
      { q:{es:'«few» = ',en:'«few» = '}, opts:{es:['pocos (casi ninguno)','unos pocos'],en:['pocos (almost none)','unos pocos']}, correct:0, fb:{ why:{es:'Sin «a» → negativo.',en:'Without «a» → negative.'}, tip:{es:'few → negativo',en:'few → negative'}} },
      { q:{es:'«a little» = ',en:'«a little» = '}, opts:{es:['un poco de (positivo)','poco (negativo)'],en:['un poco de (positive)','poco (negative)']}, correct:0, fb:{ why:{es:'Con «a» → positivo.',en:'With «a» → positive.'}, tip:{es:'a little → positivo',en:'a little → positive'}} },
      { q:{es:'«little» = ',en:'«little» = '}, opts:{es:['poco (casi nada)','un poco de'],en:['poco (almost none)','un poco de']}, correct:0, fb:{ why:{es:'Sin «a» → negativo.',en:'Without «a» → negative.'}, tip:{es:'little → negativo',en:'little → negative'}} },
      { q:{es:'¿Qué palabra marca lo positivo en inglés?',en:'Which word marks the positive in English?'}, opts:{es:['La «a»','La «s»'],en:['The «a»','The «s»']}, correct:0, fb:{ why:{es:'a few / a little = positivo.',en:'a few / a little = positive.'}, tip:{es:'la «a»',en:'the «a»'}} }
    ] },
  { icon:'⚡', title:{es:'Diferencias',en:'Differences'},
    html:{
      es:`<div class="gdesc">Las dos decisiones que tienes que tomar: <b>1)</b> ¿se cuenta o es masa? · <b>2)</b> ¿positivo (con «a») o negativo (sin «a»)?</div>
        <table class="dtab"><tr><th></th><th>Positivo 🙂 (hay algo)</th><th>Negativo 😕 (casi nada)</th></tr>
          <tr><td>Se cuenta</td><td class="en">a few + plural</td><td class="en">few + plural</td></tr>
          <tr><td>Masa</td><td class="en">a little + incontable</td><td class="en">little + incontable</td></tr>
        </table>
        <div class="sec-label">⚠️ La misma cantidad, distinto mensaje</div>
        ${ii('🙂','«I have <b>a few</b> dollars» = tengo unos pocos (me alcanza para algo).')}
        ${ii('😕','«I have <b>few</b> dollars» = tengo pocos (casi no me alcanza). El mensaje cambia.')}
        ${eg('We still have <span class="tag s">a little</span> milk.','Todavía tenemos un poco de leche. (tranquilo)','ok')}
        ${eg('We have <span class="tag o">little</span> milk left.','Queda poca leche. (preocupado, casi nada)','ok')}
        <div class="gnote">📍 Con «a» = positivo (a few / a little). Sin «a» = negativo (few / little). Y elige few/little según se cuente o no.</div>`,
      en:`<div class="gdesc">The two decisions you must make: <b>1)</b> countable or mass? · <b>2)</b> positive (with «a») or negative (without «a»)?</div>
        <table class="dtab"><tr><th></th><th>Positive 🙂 (there is some)</th><th>Negative 😕 (almost none)</th></tr>
          <tr><td>Countable</td><td class="en">a few + plural</td><td class="en">few + plural</td></tr>
          <tr><td>Mass</td><td class="en">a little + uncountable</td><td class="en">little + uncountable</td></tr>
        </table>
        <div class="sec-label">⚠️ Same amount, different message</div>
        ${ii('🙂','«I have <b>a few</b> dollars» = I have a few (enough for something).')}
        ${ii('😕','«I have <b>few</b> dollars» = I have few (hardly enough). The message changes.')}
        ${eg('We still have <span class="tag s">a little</span> milk.','We still have a little milk. (relaxed)','ok')}
        ${eg('We have <span class="tag o">little</span> milk left.','We have little milk left. (worried, almost none)','ok')}
        <div class="gnote">📍 With «a» = positive (a few / a little). Without «a» = negative (few / little). And pick few/little by countable or not.</div>`
    },

      { q:{es:'«___ people came; the room felt empty.» (negativo):',en:'«___ people came; the room felt empty.» (negative):'}, opts:{es:['Few','A few'],en:['Few','A few']}, correct:0, fb:{ why:{es:'Casi nadie → few (sin «a»).',en:'Almost nobody → few (no «a»).'}, ex:{es:'Few people came → Vino poca gente',en:'Few people came'}, tip:{es:'negativo → few',en:'negative → few'}}, tr:{es:'Vino poca gente; la sala se sentía vacía.',en:'Few people came; the room felt empty.'} },
      { q:{es:'«Add ___ salt, just for taste.» (positivo, masa):',en:'«Add ___ salt, just for taste.» (positive, mass):'}, opts:{es:['a little','little'],en:['a little','little']}, correct:0, fb:{ why:{es:'Positivo + masa → a little.',en:'Positive + mass → a little.'}, ex:{es:'a little salt → un poco de sal',en:'a little salt'}, tip:{es:'positivo → a little',en:'positive → a little'}}, tr:{es:'Agrega un poco de sal, solo para el sabor.',en:'Add a little salt, just for taste.'} },

      { q:{es:'«I have ___ money, let\'s grab a coffee.» (positivo):',en:'«I have ___ money, let\'s grab a coffee.» (positive):'}, opts:{es:['a little','little'],en:['a little','little']}, correct:0, fb:{ why:{es:'Positivo + masa → a little.',en:'Positive + mass → a little.'}, ex:{es:'a little money → algo de dinero',en:'a little money'}, tip:{es:'positivo → a little',en:'positive → a little'}}, tr:{es:'Tengo algo de dinero, vamos por un café.',en:'I have a little money, let\'s grab a coffee.'} }
    ] },
  { icon:'💡', title:{es:'Tips Prácticos',en:'Practical Tips'},
    html:{
      es:`<div class="gdesc">El mapa de las cuatro opciones:</div>
        <div class="fbox"><div class="frm"><span class="pill s">a few 🙂</span><span class="plus">/</span><span class="pill o">few 😕</span><span class="plus">+ plural</span></div><div class="fex"><span class="s">a few</span> friends · <span class="o">few</span> friends</div></div>
        <div class="fbox"><div class="frm"><span class="pill v">a little 🙂</span><span class="plus">/</span><span class="pill p">little 😕</span><span class="plus">+ masa</span></div><div class="fex"><span class="v">a little</span> time · <span class="p">little</span> time</div></div>
        ${ii('🔑','<b>Tip 1 — La «a» es el botón positivo:</b> con «a» = hay algo (bien) · sin «a» = casi nada (mal).')}
        ${ii('🔢','<b>Tip 2 — Se cuenta o no:</b> plural «-s» → (a) few · masa (water, time) → (a) little.')}
        ${ii('🗣️','<b>Tip 3 — Para sonar más natural</b> en lo negativo se usa mucho «not many / not much»: «I don\'t have many friends» ≈ «I have few friends».')}
        <div class="alert-card"><div class="atitle">⚠️ Error típico</div><p>❌ «a few water» → ✅ «a <b>little</b> water» (masa).<br>❌ «little apples» (queriendo decir «algunas») → ✅ «<b>a few</b> apples».</p></div>`,
      en:`<div class="gdesc">The map of the four options:</div>
        <div class="fbox"><div class="frm"><span class="pill s">a few 🙂</span><span class="plus">/</span><span class="pill o">few 😕</span><span class="plus">+ plural</span></div><div class="fex"><span class="s">a few</span> friends · <span class="o">few</span> friends</div></div>
        <div class="fbox"><div class="frm"><span class="pill v">a little 🙂</span><span class="plus">/</span><span class="pill p">little 😕</span><span class="plus">+ mass</span></div><div class="fex"><span class="v">a little</span> time · <span class="p">little</span> time</div></div>
        ${ii('🔑','<b>Tip 1 — The «a» is the positive button:</b> with «a» = there is some (good) · without «a» = almost none (bad).')}
        ${ii('🔢','<b>Tip 2 — Countable or not:</b> plural «-s» → (a) few · mass (water, time) → (a) little.')}
        ${ii('🗣️','<b>Tip 3 — To sound more natural</b> in the negative, «not many / not much» is very common: «I don\'t have many friends» ≈ «I have few friends».')}
        <div class="alert-card"><div class="atitle">⚠️ Common mistake</div><p>❌ «a few water» → ✅ «a <b>little</b> water» (mass).<br>❌ «little apples» (meaning «some») → ✅ «<b>a few</b> apples».</p></div>`

function setInfo(l){ info=l; applyLang(); }
function setLevel(lv){ document.getElementById('screen').setAttribute('data-level',lv); info= lv==='a2'?'en':'es'; render(); }
function volver(){ if(document.referrer){ location.href=document.referrer; } else if(history.length>1){ history.back(); } else { toast(info==='es'?'Vuelve a tu práctica en la plataforma':'Go back to your practice'); } }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2600); }
document.addEventListener('contextmenu',e=>{ if(e.target.closest('.mat')){ e.preventDefault(); toast(info==='es'?'Material protegido © JUCUM EC':'Protected material © JUCUM EC'); }});
try{ speechSynthesis.getVoices(); speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices(); }catch(e){}
/* FIN DEL MOTOR */
setLevel(document.getElementById('screen').getAttribute('data-level')||'pre-a1');
