        · 'tr' (botón 🌐 traducción por pregunta): ponlo SOLO en auto-chequeos donde una oración en inglés

<script>
/* ═══ METADATOS ═══ */
const MAT = { title:{es:'Resumen de Gramática',en:'Grammar Summary'}, subtitle:{es:'Past Continuous',en:'Past Continuous'}, reportId:'sum-past-continuous' };
const PASS = 75;
const STEPS = [
  { icon:'🇪🇸', title:{es:'Repaso en Español',en:'Spanish Recap'},
    html:{
      es:`<div class="gdesc">Para describir lo que <b>estaba pasando</b> en un momento del pasado, en español usas «<b>estaba</b> + <b>-ando/-iendo</b>»: «estaba comiendo», «estaban jugando».</div>
        <div class="art-hero"><div class="art-box"><div class="word">estaba comiendo</div><div class="role">En proceso</div><div class="desc">«A las 8 estaba comiendo.»</div></div><div class="art-box"><div class="word">estaba lloviendo</div><div class="role">De fondo</div><div class="desc">«Cuando salí, estaba lloviendo.»</div></div></div>
        ${ii('🎬','Describe una acción <b>en medio</b>, no terminada, en cierto momento del pasado.')}
        ${ii('✂️','Muchas veces una acción larga (estaba durmiendo) es interrumpida por una corta (sonó el teléfono).')}
        <div class="gnote life">🌎 <b>De tu vida:</b> «Estaba estudiando cuando llegaste». En inglés es «was/were + verbo-ing».</div>`,
      en:`<div class="gdesc">To describe what <b>was happening</b> at a past moment, Spanish uses «<b>estaba</b> + <b>-ando/-iendo</b>»: «estaba comiendo», «estaban jugando».</div>
        <div class="art-hero"><div class="art-box"><div class="word">estaba comiendo</div><div class="role">In progress</div><div class="desc">«A las 8 estaba comiendo.»</div></div><div class="art-box"><div class="word">estaba lloviendo</div><div class="role">Background</div><div class="desc">«Cuando salí, estaba lloviendo.»</div></div></div>
        ${ii('🎬','It describes an action <b>in the middle</b>, not finished, at a certain past moment.')}
        ${ii('✂️','Often a long action (estaba durmiendo) is interrupted by a short one (sonó el teléfono).')}
        <div class="gnote life">🌎 <b>From your life:</b> «Estaba estudiando cuando llegaste». In English it\'s «was/were + verb-ing».</div>`
    },
    checks:[
      { q:{es:'«Estaba comiendo» describe algo:',en:'«Estaba comiendo» describes something:'}, opts:{es:['En proceso en el pasado','Terminado'],en:['In progress in the past','Finished']}, correct:0, fb:{ why:{es:'Acción en medio.',en:'Action in the middle.'}, tip:{es:'en proceso',en:'in progress'}} },
      { q:{es:'Se forma con:',en:'It is formed with:'}, opts:{es:['estaba + gerundio','solo el pasado'],en:['estaba + gerund','just the past']}, correct:0, fb:{ why:{es:'estaba + -ando/-iendo.',en:'estaba + -ando/-iendo.'}, tip:{es:'estaba + gerundio',en:'estaba + gerund'}} },
      { q:{es:'«Estaba durmiendo cuando sonó el teléfono»: ¿cuál es larga?',en:'«Estaba durmiendo cuando sonó el teléfono»: which is long?'}, opts:{es:['Estaba durmiendo','Sonó el teléfono'],en:['Estaba durmiendo','Sonó el teléfono']}, correct:0, fb:{ why:{es:'La acción en proceso es la larga.',en:'The in-progress action is the long one.'}, tip:{es:'larga = en proceso',en:'long = in progress'}} },
      { q:{es:'¿La acción estaba terminada?',en:'Was the action finished?'}, opts:{es:['No, estaba en medio','Sí'],en:['No, it was in the middle','Yes']}, correct:0, fb:{ why:{es:'Estaba ocurriendo.',en:'It was happening.'}, tip:{es:'en medio',en:'in the middle'}} },
      { q:{es:'Sirve para describir:',en:'It is used to describe:'}, opts:{es:['El fondo de una escena','Una lista de pasos'],en:['The background of a scene','A list of steps']}, correct:0, fb:{ why:{es:'Pone el ambiente.',en:'It sets the scene.'}, tip:{es:'fondo',en:'background'}} }
    ] },
  { icon:'🤝', title:{es:'Similitudes',en:'Similarities'},
    html:{
      es:`<div class="gdesc">¡Casi igual! El inglés usa <b>was/were + verbo-ing</b>. «estaba/estaban» = was/were.</div>
        <table class="dtab"><tr><th>Persona</th><th>was/were</th></tr>
          <tr><td>I / He / She / It</td><td class="en">was</td></tr>
          <tr><td>You / We / They</td><td class="en">were</td></tr>
        </table>
        ${eg('I <span class="tag s">was watching</span> TV.','Estaba viendo tele.','ok')}
        ${eg('They <span class="tag s">were playing</span> outside.','Estaban jugando afuera.','ok')}
        <div class="sec-label">Lo igual en los dos idiomas</div>
        <ul class="simlist"><li>Los dos usan «estar (pasado) + gerundio».</li><li>Los dos describen una acción en proceso en el pasado.</li><li>El «-ing» es como «-ando/-iendo».</li></ul>
        <div class="gnote">👍 was/were + verbo-ing = estaba/estaban + -ando. Lo nuevo es combinarlo con «when/while» (siguiente paso).</div>`,
      en:`<div class="gdesc">Almost the same! English uses <b>was/were + verb-ing</b>. «estaba/estaban» = was/were.</div>
        <table class="dtab"><tr><th>Person</th><th>was/were</th></tr>
          <tr><td>I / He / She / It</td><td class="en">was</td></tr>
          <tr><td>You / We / They</td><td class="en">were</td></tr>
        </table>
        ${eg('I <span class="tag s">was watching</span> TV.','I was watching TV.','ok')}
        ${eg('They <span class="tag s">were playing</span> outside.','They were playing outside.','ok')}
        <div class="sec-label">What is the same in both languages</div>
        <ul class="simlist"><li>Both use «estar (past) + gerund».</li><li>Both describe an action in progress in the past.</li><li>The «-ing» is like «-ando/-iendo».</li></ul>
        <div class="gnote">👍 was/were + verb-ing = estaba/estaban + -ando. The new part is combining it with «when/while» (next step).</div>`
    },
    checks:[
      { q:{es:'«Estaba viendo tele» en inglés:',en:'«Estaba viendo tele» in English:'}, opts:{es:['I was watching TV','I watched TV'],en:['I was watching TV','I watched TV']}, correct:0, fb:{ why:{es:'was + verbo-ing.',en:'was + verb-ing.'}, ex:{es:'I was watching TV',en:'I was watching TV'}, tip:{es:'was + -ing',en:'was + -ing'}} },
      { q:{es:'«I / He / She / It» usan:',en:'«I / He / She / It» use:'}, opts:{es:['was','were'],en:['was','were']}, correct:0, fb:{ why:{es:'Singular → was.',en:'Singular → was.'}, ex:{es:'She was reading → Estaba leyendo',en:'She was reading'}, tip:{es:'I/he/she/it → was',en:'I/he/she/it → was'}} },
      { q:{es:'«You / We / They» usan:',en:'«You / We / They» use:'}, opts:{es:['were','was'],en:['were','was']}, correct:0, fb:{ why:{es:'Plural → were.',en:'Plural → were.'}, ex:{es:'They were playing → Estaban jugando',en:'They were playing'}, tip:{es:'you/we/they → were',en:'you/we/they → were'}} },
      { q:{es:'El «-ing» es como:',en:'The «-ing» is like:'}, opts:{es:['-ando/-iendo','-ado/-ido'],en:['-ando/-iendo','-ado/-ido']}, correct:0, fb:{ why:{es:'Es el gerundio.',en:'It is the gerund.'}, tip:{es:'-ing = -ando',en:'-ing = -ando'}} },
      { q:{es:'Describe una acción:',en:'It describes an action:'}, opts:{es:['En proceso en el pasado','Del futuro'],en:['In progress in the past','In the future']}, correct:0, fb:{ why:{es:'En medio, en el pasado.',en:'In the middle, in the past.'}, tip:{es:'en proceso',en:'in progress'}} }
    ] },
  { icon:'⚡', title:{es:'Diferencias',en:'Differences'},
    html:{
      es:`<div class="gdesc">El uso estrella: combinar una acción <b>larga</b> (past continuous) con una <b>corta</b> que la interrumpe (past simple), usando <b>when</b> y <b>while</b>.</div>
        <table class="dtab"><tr><th>Conector</th><th>Va con…</th><th>Ejemplo</th></tr>
          <tr><td class="en">while</td><td>la acción larga (-ing)</td><td>While I <b>was sleeping</b>…</td></tr>
          <tr><td class="en">when</td><td>la acción corta (pasado)</td><td>…when the phone <b>rang</b>.</td></tr>
        </table>
        <div class="sec-label">⚠️ Larga = continuous · Corta = simple</div>
        ${ii('🎬','La acción de fondo (larga) va en continuous; la que la interrumpe (corta) va en pasado simple.')}
        ${eg('I <span class="tag s">was cooking</span> when she <span class="tag o">arrived</span>.','Estaba cocinando cuando llegó.','ok')}
        ${eg('I was cooking when she was arriving.','La acción corta va en pasado simple: «when she arrived».','bad')}
        <div class="gnote">📍 Patrón: <b>was/were + -ing</b> (fondo) + <b>when</b> + <b>pasado simple</b> (interrupción).</div>`,
      en:`<div class="gdesc">The star use: combine a <b>long</b> action (past continuous) with a <b>short</b> one that interrupts it (past simple), using <b>when</b> and <b>while</b>.</div>
        <table class="dtab"><tr><th>Connector</th><th>Goes with…</th><th>Example</th></tr>
          <tr><td class="en">while</td><td>the long action (-ing)</td><td>While I <b>was sleeping</b>…</td></tr>
          <tr><td class="en">when</td><td>the short action (past)</td><td>…when the phone <b>rang</b>.</td></tr>
        </table>
        <div class="sec-label">⚠️ Long = continuous · Short = simple</div>
        ${ii('🎬','The background action (long) is continuous; the one that interrupts (short) is past simple.')}
        ${eg('I <span class="tag s">was cooking</span> when she <span class="tag o">arrived</span>.','I was cooking when she arrived.','ok')}
        ${eg('I was cooking when she was arriving.','The short action is past simple: «when she arrived».','bad')}
        <div class="gnote">📍 Pattern: <b>was/were + -ing</b> (background) + <b>when</b> + <b>past simple</b> (interruption).</div>`
    },
    checks:[
      { q:{es:'«While I ___ (study), the lights went off.»',en:'«While I ___ (study), the lights went off.»'}, opts:{es:['was studying','studied'],en:['was studying','studied']}, correct:0, fb:{ why:{es:'Acción larga → continuous.',en:'Long action → continuous.'}, ex:{es:'While I was studying → Mientras estudiaba',en:'While I was studying'}, tip:{es:'larga → -ing',en:'long → -ing'}}, tr:{es:'Mientras estudiaba, se fue la luz.',en:'While I was studying, the lights went off.'} },
      { q:{es:'«I was sleeping when the alarm ___ (ring).»',en:'«I was sleeping when the alarm ___ (ring).»'}, opts:{es:['rang','was ringing'],en:['rang','was ringing']}, correct:0, fb:{ why:{es:'Acción corta → pasado simple.',en:'Short action → past simple.'}, ex:{es:'when the alarm rang → cuando sonó la alarma',en:'when the alarm rang'}, tip:{es:'corta → pasado simple',en:'short → past simple'}}, tr:{es:'Estaba durmiendo cuando sonó la alarma.',en:'I was sleeping when the alarm rang.'} },
      { q:{es:'«while» suele ir con:',en:'«while» usually goes with:'}, opts:{es:['la acción larga (-ing)','la acción corta'],en:['the long action (-ing)','the short action']}, correct:0, fb:{ why:{es:'while + continuous.',en:'while + continuous.'}, tip:{es:'while → -ing',en:'while → -ing'}} },
      { q:{es:'«when» suele introducir:',en:'«when» usually introduces:'}, opts:{es:['la acción corta (pasado)','la acción larga'],en:['the short action (past)','the long action']}, correct:0, fb:{ why:{es:'when + pasado simple (la interrupción).',en:'when + past simple (the interruption).'}, tip:{es:'when → pasado simple',en:'when → past simple'}} },
      { q:{es:'La acción que interrumpe va en:',en:'The interrupting action goes in:'}, opts:{es:['Pasado simple','Past continuous'],en:['Past simple','Past continuous']}, correct:0, fb:{ why:{es:'La corta → pasado simple.',en:'The short one → past simple.'}, tip:{es:'corta → simple',en:'short → simple'}} }
    ] },
  { icon:'💡', title:{es:'Tips Prácticos',en:'Practical Tips'},
    html:{
      es:`<div class="gdesc">La estructura completa:</div>
        <div class="fbox"><div class="frm"><span class="pill s">Sujeto</span><span class="plus">+</span><span class="pill v">was/were</span><span class="plus">+</span><span class="pill o">verbo-ing</span></div><div class="fex"><span class="s">She</span> <span class="v">was</span> <span class="o">reading</span>. — Ella estaba leyendo.</div></div>
        ${ii('🎬','<b>Tip 1 — Para escenas:</b> el continuous pone el fondo («It was raining and people were running»).')}
        ${ii('✂️','<b>Tip 2 — Interrupción:</b> larga (-ing) + when + corta (pasado simple).')}
        ${ii('🚫','<b>Tip 3 — Verbos de estado</b> (know, want, like) casi no van en -ing también en pasado: «I knew», no «I was knowing».')}
        <div class="alert-card"><div class="atitle">⚠️ Error típico</div><p>❌ «I was study» → ✅ «I was <b>studying</b>».<br>❌ «when she was arriving» → ✅ «when she <b>arrived</b>».</p></div>`,
      en:`<div class="gdesc">The full structure:</div>
        <div class="fbox"><div class="frm"><span class="pill s">Subject</span><span class="plus">+</span><span class="pill v">was/were</span><span class="plus">+</span><span class="pill o">verb-ing</span></div><div class="fex"><span class="s">She</span> <span class="v">was</span> <span class="o">reading</span>. — Ella estaba leyendo.</div></div>
        ${ii('🎬','<b>Tip 1 — For scenes:</b> the continuous sets the background («It was raining and people were running»).')}
        ${ii('✂️','<b>Tip 2 — Interruption:</b> long (-ing) + when + short (past simple).')}
        ${ii('🚫','<b>Tip 3 — State verbs</b> (know, want, like) rarely take -ing in the past either: «I knew», not «I was knowing».')}
        <div class="alert-card"><div class="atitle">⚠️ Common mistake</div><p>❌ «I was study» → ✅ «I was <b>studying</b>».<br>❌ «when she was arriving» → ✅ «when she <b>arrived</b>».</p></div>`
    },
    checks:[
      { q:{es:'¿Cuál está bien?',en:'Which one is right?'}, opts:{es:['I was studying','I was study'],en:['I was studying','I was study']}, correct:0, fb:{ why:{es:'was + verbo-ing.',en:'was + verb-ing.'}, ex:{es:'I was studying → Estaba estudiando',en:'I was studying'}, tip:{es:'was + -ing',en:'was + -ing'}} },
      { q:{es:'«They ___ dancing at the party.»',en:'«They ___ dancing at the party.»'}, opts:{es:['were','was'],en:['were','was']}, correct:0, fb:{ why:{es:'they → were.',en:'they → were.'}, ex:{es:'They were dancing → Estaban bailando',en:'They were dancing'}, tip:{es:'they → were',en:'they → were'}} },
      { q:{es:'«We were eating when he ___ (call).»',en:'«We were eating when he ___ (call).»'}, opts:{es:['called','was calling'],en:['called','was calling']}, correct:0, fb:{ why:{es:'Interrupción → pasado simple.',en:'Interruption → past simple.'}, ex:{es:'when he called → cuando llamó',en:'when he called'}, tip:{es:'corta → simple',en:'short → simple'}}, tr:{es:'Estábamos comiendo cuando él llamó.',en:'We were eating when he called.'} },
      { q:{es:'«It ___ raining all morning.»',en:'«It ___ raining all morning.»'}, opts:{es:['was','were'],en:['was','were']}, correct:0, fb:{ why:{es:'it → was.',en:'it → was.'}, ex:{es:'It was raining → Estaba lloviendo',en:'It was raining'}, tip:{es:'it → was',en:'it → was'}} },
      { q:{es:'¿Cuál es de estado (sin -ing)?',en:'Which is a state verb (no -ing)?'}, opts:{es:['I knew the answer','I was knowing the answer'],en:['I knew the answer','I was knowing the answer']}, correct:0, fb:{ why:{es:'«know» es de estado → I knew.',en:'«know» is a state verb → I knew.'}, ex:{es:'I knew → Sabía',en:'I knew'}, tip:{es:'estado → sin -ing',en:'state → no -ing'}} }
    ] },
  { icon:'✨', title:{es:'Práctica Final',en:'Final Practice'}, builder:true,
    html:{
      es:`<div class="gdesc">Junta todo: was/were + verbo-ing para el fondo; pasado simple para la interrupción. Arma la oración.</div>
        <div class="cboxes"><div class="cbox s"><span class="cl">was</span><span class="cv">I · He · She · It</span></div><div class="cbox o"><span class="cl">were</span><span class="cv">You · We · They</span></div><div class="cbox p"><span class="cl">Patrón</span><span class="cv">while + -ing · when + pasado simple</span></div></div>
        <div class="sec-label">Las reglas en una oración</div>
        ${eg('She <span class="tag s">was reading</span> a book.','Ella estaba leyendo un libro.','ok')}
        ${eg('We <span class="tag s">were walking</span> when it started to rain.','Caminábamos cuando empezó a llover.','ok')}
        ${eg('While they <b style="color:#7B1FA2">were playing</b>, I cooked.','Mientras jugaban, yo cociné.','ok')}
        <div class="alert-card"><div class="atitle">⚠️ Los 3 errores más comunes</div><p>❌ «I was study» → ✅ «I was <b>studying</b>»<br>❌ «They was playing» → ✅ «They <b>were</b> playing»<br>❌ «when she was arriving» → ✅ «when she <b>arrived</b>»</p></div>`,
      en:`<div class="gdesc">Put it together: was/were + verb-ing for the background; past simple for the interruption. Build the sentence.</div>
        <div class="cboxes"><div class="cbox s"><span class="cl">was</span><span class="cv">I · He · She · It</span></div><div class="cbox o"><span class="cl">were</span><span class="cv">You · We · They</span></div><div class="cbox p"><span class="cl">Pattern</span><span class="cv">while + -ing · when + past simple</span></div></div>
        <div class="sec-label">The rules in one sentence</div>
        ${eg('She <span class="tag s">was reading</span> a book.','She was reading a book.','ok')}

function say(text,acc){ try{ speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text); u.rate=.82; const vs=speechSynthesis.getVoices()||[]; const want=acc==='US'?'en-US':'en-GB'; const v=vs.find(x=>x.lang===want)||vs.find(x=>x.lang&&x.lang.indexOf('en')===0); if(v){u.voice=v;u.lang=v.lang;}else u.lang=want; speechSynthesis.speak(u); }catch(e){} }

function applyLang(){ const t=L();

function renderStep(){ const t=L(), s=STEPS[cur]; curLab= info==='es'?'EJEMPLO':'EXAMPLE';

function finish(){ const t=L(); document.getElementById('mbody').style.display='none'; document.getElementById('results').classList.add('show');
