<!-- ═══ PLANTILLA RESUMEN DE GRAMÁTICA (con nota · repaso) — JUCUM English Center ═══
     1) Nivel en <div id="screen" data-level="pre-a1|a1|a2"> (A2 arranca en inglés).
     2) Edita MAT + el bloque CONTENIDO (STEPS / BUILD / SUMMARY / BADGE). Todo es BILINGÜE {es,en}.
        · El botón ES/EN cambia TODO el material (explicación + indicaciones + auto-chequeos).
        · REGLA «el español se queda en español»: cuando el texto MENCIONA una palabra española o da un
          EJEMPLO en español (p. ej. el paso 1 «Repaso en Español»: «Él», «Ella», «Nosotros», «Juan… Él…»),
          en el lado en:'' repite esas palabras/ejemplos TAL CUAL en español; solo traduce la prosa que los rodea.
        · 'tr' (botón 🌐 traducción por pregunta): ponlo SOLO en auto-chequeos donde una oración en inglés
          tenga vocabulario que pueda frenar al alumno Y la traducción NO delate la respuesta. En drills de
          pronombres la pista ya está en la pregunta y se infiere por el verbo be → NO lleva 'tr' (por eso aquí
          no hay ninguno). Sí aplica en temas como To be / There is_are con frases más largas. Sintaxis:
          { q:{...}, opts:{...}, correct:0, fb:{...}, tr:{es:'significado en español',en:'meaning in English'} }
     3) Deja el conector antes de </body>. catalogo.json → type:"summary".
     El motor (debajo de "FIN DEL MOTOR") no se toca. ═══ -->

<script>
/* ═══ METADATOS ═══ */
const MAT = { title:{es:'Resumen de Gramática',en:'Grammar Summary'}, subtitle:{es:'El Artículo Cero (sin the/a)',en:'The Zero Article'}, reportId:'sum-zero-article' };
const PASS = 75;
const STEPS = [
  { icon:'🇪🇸', title:{es:'Repaso en Español',en:'Spanish Recap'},
    html:{
      es:`<div class="gdesc">En español casi siempre pones un artículo: «<b>Los</b> gatos», «<b>el</b> desayuno», «<b>el</b> inglés». Lo usas mucho.</div>
        <div class="art-hero"><div class="art-box"><div class="word">Los gatos</div><div class="role">General</div><div class="desc">«Los gatos son lindos.»</div></div><div class="art-box"><div class="word">El inglés</div><div class="role">Idioma</div><div class="desc">«El inglés es útil.»</div></div></div>
        ${ii('📌','El español pone «el/la/los/las» incluso para hablar en general: «Los niños juegan», «La vida es bella».')}
        <div class="gnote life">🌎 <b>De tu vida:</b> «Los perros ladran», «El desayuno es importante». En inglés, en muchos de estos casos NO se pone artículo.</div>`,
      en:`<div class="gdesc">In Spanish you almost always put an article: «<b>Los</b> gatos», «<b>el</b> desayuno», «<b>el</b> inglés». You use it a lot.</div>
        <div class="art-hero"><div class="art-box"><div class="word">Los gatos</div><div class="role">General</div><div class="desc">«Los gatos son lindos.»</div></div><div class="art-box"><div class="word">El inglés</div><div class="role">Language</div><div class="desc">«El inglés es útil.»</div></div></div>
        ${ii('📌','Spanish puts «el/la/los/las» even to speak in general: «Los niños juegan», «La vida es bella».')}
        <div class="gnote life">🌎 <b>From your life:</b> «Los perros ladran», «El desayuno es importante». In English, in many of these cases you do NOT use an article.</div>`
    },
    checks:[
      { q:{es:'En español, para hablar en general:',en:'In Spanish, to speak in general:'}, opts:{es:['Sueles poner artículo','Nunca pones artículo'],en:['You usually use an article','You never use an article']}, correct:0, fb:{ why:{es:'«Los gatos son…»',en:'«Los gatos son…»'}, tip:{es:'con artículo',en:'with article'}} },
      { q:{es:'«Los gatos son lindos» — «los» es:',en:'«Los gatos son lindos» — «los» is:'}, opts:{es:['Un artículo','Un verbo'],en:['An article','A verb']}, correct:0, fb:{ why:{es:'Acompaña al sustantivo.',en:'It goes with the noun.'}, tip:{es:'artículo',en:'article'}} },
      { q:{es:'«El inglés» se refiere a:',en:'«El inglés» refers to:'}, opts:{es:['El idioma','Una persona'],en:['The language','A person']}, correct:0, fb:{ why:{es:'Es el idioma.',en:'It is the language.'}, tip:{es:'idioma',en:'language'}} },
      { q:{es:'El español usa el artículo:',en:'Spanish uses the article:'}, opts:{es:['Mucho','Casi nunca'],en:['A lot','Almost never']}, correct:0, fb:{ why:{es:'Es muy frecuente.',en:'Very frequent.'}, tip:{es:'mucho',en:'a lot'}} },
      { q:{es:'«El desayuno es importante» — «el» acompaña a:',en:'«El desayuno es importante» — «el» goes with:'}, opts:{es:['desayuno','importante'],en:['desayuno','importante']}, correct:0, fb:{ why:{es:'Es el sustantivo.',en:'It is the noun.'}, tip:{es:'sustantivo',en:'noun'}} }
    ] },
  { icon:'🤝', title:{es:'Similitudes',en:'Similarities'},
    html:{
      es:`<div class="gdesc">El inglés también tiene artículos (<b>a/an</b>, <b>the</b>) y los usa de forma parecida cuando hablas de algo <b>específico</b>.</div>
        <div class="vs-grid">
          <div class="vs-row"><div class="vs-side es"><span class="flag">específico</span>el gato (ese gato)</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">the</span><b>the</b> cat</div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">uno cualquiera</span>un gato</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">a</span><b>a</b> cat</div></div>
        </div>
        ${eg('<span class="tag s">The</span> cat on the sofa is mine.','El gato del sofá es mío. (específico)','ok')}
        ${eg('I have <span class="tag s">a</span> cat.','Tengo un gato. (uno cualquiera)','ok')}
        <div class="sec-label">Lo igual en los dos idiomas</div>
        <ul class="simlist"><li>Los dos usan «the» para algo concreto y conocido.</li><li>Los dos usan «a/an» para uno cualquiera (singular contable).</li><li>La diferencia aparece cuando hablas en GENERAL (siguiente paso).</li></ul>
        <div class="gnote">👍 the = el/la (específico) · a/an = un/una. Lo nuevo: cuándo NO poner artículo (siguiente paso).</div>`,
      en:`<div class="gdesc">English also has articles (<b>a/an</b>, <b>the</b>) and uses them similarly when you talk about something <b>specific</b>.</div>
        <div class="vs-grid">
          <div class="vs-row"><div class="vs-side es"><span class="flag">específico</span>el gato (ese gato)</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">the</span><b>the</b> cat</div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">uno cualquiera</span>un gato</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">a</span><b>a</b> cat</div></div>
        </div>
        ${eg('<span class="tag s">The</span> cat on the sofa is mine.','The cat on the sofa is mine. (specific)','ok')}
        ${eg('I have <span class="tag s">a</span> cat.','I have a cat. (any one)','ok')}
        <div class="sec-label">What is the same in both languages</div>
        <ul class="simlist"><li>Both use «the» for something concrete and known.</li><li>Both use «a/an» for any one (singular countable).</li><li>The difference appears when you speak in GENERAL (next step).</li></ul>
        <div class="gnote">👍 the = el/la (specific) · a/an = un/una. The new part: when NOT to use an article (next step).</div>`
    },
    checks:[
      { q:{es:'«the» = ',en:'«the» = '}, opts:{es:['el/la (específico)','un/una'],en:['el/la (specific)','un/una']}, correct:0, fb:{ why:{es:'the = específico.',en:'the = specific.'}, tip:{es:'the → específico',en:'the → specific'}} },
      { q:{es:'«a/an» = ',en:'«a/an» = '}, opts:{es:['un/una (cualquiera)','el/la'],en:['un/una (any)','el/la']}, correct:0, fb:{ why:{es:'a/an = uno cualquiera.',en:'a/an = any one.'}, tip:{es:'a/an → un/una',en:'a/an → un/una'}} },
      { q:{es:'«The cat on the sofa» es:',en:'«The cat on the sofa» is:'}, opts:{es:['Un gato específico','Cualquier gato'],en:['A specific cat','Any cat']}, correct:0, fb:{ why:{es:'Sabemos cuál es.',en:'We know which one.'}, tip:{es:'específico → the',en:'specific → the'}} },
      { q:{es:'«I have a cat» — ¿qué gato?',en:'«I have a cat» — which cat?'}, opts:{es:['Uno cualquiera','El del sofá'],en:['Any one','The one on the sofa']}, correct:0, fb:{ why:{es:'No es específico → a.',en:'Not specific → a.'}, tip:{es:'cualquiera → a',en:'any → a'}} },
      { q:{es:'La gran diferencia con el español aparece:',en:'The big difference with Spanish appears:'}, opts:{es:['Al hablar en general','Al usar the'],en:['When speaking in general','When using the']}, correct:0, fb:{ why:{es:'En lo general el inglés omite el artículo.',en:'In general English drops the article.'}, tip:{es:'general',en:'general'}} }
    ] },
  { icon:'⚡', title:{es:'Diferencias',en:'Differences'},
    html:{
      es:`<div class="gdesc">La gran diferencia: cuando hablas <b>en general</b> (plurales o incontables), el inglés <b>NO pone artículo</b> (artículo cero).</div>
        <table class="dtab"><tr><th>Caso</th><th>Sin artículo</th><th>Español (con)</th></tr>
          <tr><td>plural general</td><td class="en">Cats are cute</td><td>Los gatos…</td></tr>
          <tr><td>incontable general</td><td class="en">Water is important</td><td>El agua…</td></tr>
          <tr><td>idiomas</td><td class="en">I speak English</td><td>el inglés</td></tr>
          <tr><td>comidas</td><td class="en">have breakfast</td><td>el desayuno</td></tr>
          <tr><td>deportes</td><td class="en">play tennis</td><td>el tenis</td></tr>
        </table>
        <div class="sec-label">⚠️ También sin artículo: días, expresiones de lugar</div>
        ${ii('🚫','Días (on Monday), e ir a sitios en sentido general: go to <b>school</b>, go <b>home</b>, go to <b>bed</b> (sin «the»).')}
        ${eg('I go to <span class="tag s">school</span> by bus.','Voy a la escuela en bus. (sin «the»)','ok')}
        ${eg('The cats are cute (en general).','En general va sin artículo: «Cats are cute».','bad')}
        <div class="gnote">📍 Sin artículo: plurales/incontables en general, idiomas, comidas, deportes, días, school/home/bed.</div>`,
      en:`<div class="gdesc">The big difference: when you speak <b>in general</b> (plurals or uncountables), English uses <b>NO article</b> (zero article).</div>
        <table class="dtab"><tr><th>Case</th><th>No article</th><th>Spanish (with)</th></tr>
          <tr><td>general plural</td><td class="en">Cats are cute</td><td>Los gatos…</td></tr>
          <tr><td>general uncountable</td><td class="en">Water is important</td><td>El agua…</td></tr>
          <tr><td>languages</td><td class="en">I speak English</td><td>el inglés</td></tr>
          <tr><td>meals</td><td class="en">have breakfast</td><td>el desayuno</td></tr>
          <tr><td>sports</td><td class="en">play tennis</td><td>el tenis</td></tr>
        </table>
        <div class="sec-label">⚠️ Also no article: days, place expressions</div>
        ${ii('🚫','Days (on Monday), and going to places in a general sense: go to <b>school</b>, go <b>home</b>, go to <b>bed</b> (no «the»).')}
        ${eg('I go to <span class="tag s">school</span> by bus.','I go to school by bus. (no «the»)','ok')}
        ${eg('The cats are cute (in general).','In general use no article: «Cats are cute».','bad')}
        <div class="gnote">📍 No article: general plurals/uncountables, languages, meals, sports, days, school/home/bed.</div>`
    },
    checks:[
      { q:{es:'«___ are cute.» (gatos en general):',en:'«___ are cute.» (cats in general):'}, opts:{es:['Cats','The cats'],en:['Cats','The cats']}, correct:0, fb:{ why:{es:'General → sin artículo.',en:'General → no article.'}, ex:{es:'Cats are cute → Los gatos son lindos',en:'Cats are cute'}, tip:{es:'general → sin artículo',en:'general → no article'}}, tr:{es:'Los gatos son lindos.',en:'Cats are cute.'} },
      { q:{es:'«I speak ___.» (español):',en:'«I speak ___.» (Spanish):'}, opts:{es:['Spanish','the Spanish'],en:['Spanish','the Spanish']}, correct:0, fb:{ why:{es:'Idiomas → sin artículo.',en:'Languages → no article.'}, ex:{es:'I speak Spanish → Hablo español',en:'I speak Spanish'}, tip:{es:'idioma → sin artículo',en:'language → no article'}} },
      { q:{es:'«I have ___ at 8.» (desayuno):',en:'«I have ___ at 8.» (breakfast):'}, opts:{es:['breakfast','the breakfast'],en:['breakfast','the breakfast']}, correct:0, fb:{ why:{es:'Comidas → sin artículo.',en:'Meals → no article.'}, ex:{es:'have breakfast → desayunar',en:'have breakfast'}, tip:{es:'comida → sin artículo',en:'meal → no article'}} },
      { q:{es:'«They play ___ on Sundays.» (tenis):',en:'«They play ___ on Sundays.» (tennis):'}, opts:{es:['tennis','the tennis'],en:['tennis','the tennis']}, correct:0, fb:{ why:{es:'Deportes → sin artículo.',en:'Sports → no article.'}, ex:{es:'play tennis → jugar tenis',en:'play tennis'}, tip:{es:'deporte → sin artículo',en:'sport → no article'}} },
      { q:{es:'«She goes to ___ by bus.» (escuela, general):',en:'«She goes to ___ by bus.» (school, general):'}, opts:{es:['school','the school'],en:['school','the school']}, correct:0, fb:{ why:{es:'En sentido general → sin «the».',en:'In a general sense → no «the».'}, ex:{es:'go to school → ir a la escuela',en:'go to school'}, tip:{es:'school → sin the',en:'school → no the'}} }
    ] },
  { icon:'💡', title:{es:'Tips Prácticos',en:'Practical Tips'},
    html:{
      es:`<div class="gdesc">¿Específico o general?</div>
        <div class="fbox"><div class="frm"><span class="pill s">específico → the</span><span class="plus">·</span><span class="pill v">general → sin artículo</span></div><div class="fex"><span class="s">the cats next door</span> · <span class="v">cats in general</span></div></div>
        ${ii('🎯','<b>Tip 1 — Pregúntate:</b> ¿hablo de UNOS específicos (the) o de TODOS en general (nada)?')}
        ${ii('🗣️','<b>Tip 2 — Listas sin artículo:</b> idiomas, comidas, deportes, días, school/home/work/bed (en sentido general).')}
        ${ii('📌','<b>Tip 3 — «a/an»</b> solo con contable singular: «a cat», nunca «a water» ni «a cats».')}
        <div class="alert-card"><div class="atitle">⚠️ Error típico</div><p>❌ «The life is hard» (en general) → ✅ «<b>Life</b> is hard».<br>❌ «I study the English» → ✅ «I study <b>English</b>».</p></div>`,
      en:`<div class="gdesc">Specific or general?</div>
        <div class="fbox"><div class="frm"><span class="pill s">specific → the</span><span class="plus">·</span><span class="pill v">general → no article</span></div><div class="fex"><span class="s">the cats next door</span> · <span class="v">cats in general</span></div></div>
        ${ii('🎯','<b>Tip 1 — Ask yourself:</b> am I talking about SOME specific ones (the) or about ALL in general (nothing)?')}
        ${ii('🗣️','<b>Tip 2 — No-article lists:</b> languages, meals, sports, days, school/home/work/bed (in a general sense).')}
        ${ii('📌','<b>Tip 3 — «a/an»</b> only with a singular countable: «a cat», never «a water» or «a cats».')}
        <div class="alert-card"><div class="atitle">⚠️ Common mistake</div><p>❌ «The life is hard» (in general) → ✅ «<b>Life</b> is hard».<br>❌ «I study the English» → ✅ «I study <b>English</b>».</p></div>`
    },
    checks:[
      { q:{es:'«___ is important.» (vida, en general):',en:'«___ is important.» (life, in general):'}, opts:{es:['Life','The life'],en:['Life','The life']}, correct:0, fb:{ why:{es:'General → sin artículo.',en:'General → no article.'}, ex:{es:'Life is important → La vida es importante',en:'Life is important'}, tip:{es:'general → sin artículo',en:'general → no article'}}, tr:{es:'La vida es importante.',en:'Life is important.'} },
      { q:{es:'«___ cat next door is loud.» (específico):',en:'«___ cat next door is loud.» (specific):'}, opts:{es:['The','—'],en:['The','—']}, correct:0, fb:{ why:{es:'Específico → the.',en:'Specific → the.'}, ex:{es:'The cat next door → El gato de al lado',en:'The cat next door'}, tip:{es:'específico → the',en:'specific → the'}} },
      { q:{es:'«We learn ___ at school.» (matemáticas, materia):',en:'«We learn ___ at school.» (maths, subject):'}, opts:{es:['maths','the maths'],en:['maths','the maths']}, correct:0, fb:{ why:{es:'Materias → sin artículo.',en:'Subjects → no article.'}, ex:{es:'learn maths → aprender matemáticas',en:'learn maths'}, tip:{es:'materia → sin artículo',en:'subject → no article'}} },
      { q:{es:'«I go to ___ at 11 p.m.» (cama, expresión):',en:'«I go to ___ at 11 p.m.» (bed, expression):'}, opts:{es:['bed','the bed'],en:['bed','the bed']}, correct:0, fb:{ why:{es:'go to bed → sin «the».',en:'go to bed → no «the».'}, ex:{es:'go to bed → ir a dormir',en:'go to bed'}, tip:{es:'bed → sin the',en:'bed → no the'}} },
      { q:{es:'¿Cuál está bien (uno cualquiera)?',en:'Which is right (any one)?'}, opts:{es:['I saw a dog','I saw dog'],en:['I saw a dog','I saw dog']}, correct:0, fb:{ why:{es:'Contable singular → a.',en:'Singular countable → a.'}, ex:{es:'a dog → un perro',en:'a dog'}, tip:{es:'singular contable → a',en:'singular countable → a'}} }
    ] },
  { icon:'✨', title:{es:'Práctica Final',en:'Final Practice'}, builder:true,
    html:{
      es:`<div class="gdesc">Junta todo: general → sin artículo · específico → the · uno cualquiera → a/an. Arma la oración.</div>
        <div class="cboxes"><div class="cbox s"><span class="cl">Sin artículo</span><span class="cv">plurales/incontables generales · idiomas · comidas · deportes</span></div><div class="cbox o"><span class="cl">the</span><span class="cv">algo específico/conocido</span></div><div class="cbox p"><span class="cl">a/an</span><span class="cv">contable singular cualquiera</span></div></div>
        <div class="sec-label">Las reglas en una oración</div>
        ${eg('<span class="tag s">Cats</span> are independent.','Los gatos son independientes. (general)','ok')}

function say(text,acc){ try{ speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text); u.rate=.82; const vs=speechSynthesis.getVoices()||[]; const want=acc==='US'?'en-US':'en-GB'; const v=vs.find(x=>x.lang===want)||vs.find(x=>x.lang&&x.lang.indexOf('en')===0); if(v){u.voice=v;u.lang=v.lang;}else u.lang=want; speechSynthesis.speak(u); }catch(e){} }
function render(){ cur=0; coreDone=false; doneSteps=new Array(STEPS.length).fill(false); answers=STEPS.map(s=>new Array(s.checks.length).fill(null)); bState={order:[],locked:false};

function renderTabs(){ document.getElementById('steptabs').innerHTML=STEPS.map((s,i)=>`<button class="stab${i===0?' on':''}${doneSteps[i]?' done':''}" id="stab${i}" onclick="goStep(${i})">${s.icon} ${i+1}</button>`).join(''); }
function applyLang(){ const t=L();
  document.getElementById('lsEs').classList.toggle('on',info==='es'); document.getElementById('lsEn').classList.toggle('on',info==='en');
  document.getElementById('mhtitle').textContent=MAT.title[info]; document.getElementById('mhsub').textContent=document.getElementById('screen').getAttribute('data-level').toUpperCase().replace('-',' · ')+' · '+MAT.subtitle[info];

  document.getElementById('helpT').textContent=t.helpT; document.getElementById('helpTips').innerHTML='<div style="font-size:11.5px;color:var(--text-soft);font-weight:700;margin-bottom:6px">'+t.tipsT+'</div>'+t.tips.map(x=>'<div class="helptip">• <span>'+x+'</span></div>').join('');
  document.getElementById('kpT').textContent=t.kpT; document.getElementById('lBack').textContent=t.back; document.getElementById('lRetry').textContent=t.retry;
  updateMilestone(); renderStep(); }
function renderStep(){ const t=L(), s=STEPS[cur]; curLab= info==='es'?'EJEMPLO':'EXAMPLE';

  if(s.builder) html+=builderHtml(); html+=`</div>`;
  const ansd=answers[cur].filter(x=>x!==null).length;

function removeTile(idx,el){ if(bState.locked)return; bState.order=bState.order.filter(x=>x!==idx); el.remove(); document.getElementById('tile'+idx).classList.remove('placed'); document.getElementById('bchk').disabled=bState.order.length!==BUILD.answer.length; }
function checkBuild(){ const t=L(); bState.locked=true; const ok=bState.order.join(',')===BUILD.answer.map((_,i)=>i).join(','); document.querySelectorAll('#tray .tile').forEach(x=>x.style.pointerEvents='none');

function finish(){ const t=L(); document.getElementById('mbody').style.display='none'; document.getElementById('results').classList.add('show');
