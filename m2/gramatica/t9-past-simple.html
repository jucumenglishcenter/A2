<script>
/* ═══ METADATOS ═══ */
const MAT = { title:{es:'Resumen de Gramática',en:'Grammar Summary'}, subtitle:{es:'Past Simple',en:'Past Simple'}, reportId:'sum-past-simple' };
const PASS = 75;
const STEPS = [
  { icon:'🇪🇸', title:{es:'Repaso en Español',en:'Spanish Recap'},
    html:{
      es:`<div class="gdesc">Para contar algo que <b>ya pasó y terminó</b>, en español usas el pasado: «<b>comí</b>», «<b>jugó</b>», «<b>fuimos</b>».</div>
        <div class="art-hero"><div class="art-box"><div class="word">comí</div><div class="role">Yo, ayer</div><div class="desc">«Ayer comí pizza.»</div></div><div class="art-box"><div class="word">jugó</div><div class="role">Él/Ella</div><div class="desc">«Ella jugó fútbol el sábado.»</div></div></div>
        ${ii('📅','Sirve para acciones terminadas en un momento concreto: ayer, el lunes, en 2019.')}
        <div class="gnote life">🌎 <b>De tu vida:</b> «Anoche vi una película y luego dormí». Todo eso es pasado simple. En inglés es la forma «-ed» (o irregular).</div>`,
      en:`<div class="gdesc">To tell something that <b>already happened and finished</b>, Spanish uses the past: «<b>comí</b>», «<b>jugó</b>», «<b>fuimos</b>».</div>
        <div class="art-hero"><div class="art-box"><div class="word">comí</div><div class="role">Yo, ayer</div><div class="desc">«Ayer comí pizza.»</div></div><div class="art-box"><div class="word">jugó</div><div class="role">Él/Ella</div><div class="desc">«Ella jugó fútbol el sábado.»</div></div></div>
        ${ii('📅','It works for finished actions at a concrete time: ayer, el lunes, en 2019.')}
        <div class="gnote life">🌎 <b>From your life:</b> «Anoche vi una película y luego dormí». All of that is past simple. In English it\'s the «-ed» form (or irregular).</div>`
    },
    checks:[
      { q:{es:'El pasado simple habla de:',en:'The past simple talks about:'}, opts:{es:['Algo terminado','Algo de mañana'],en:['Something finished','Something tomorrow']}, correct:0, fb:{ why:{es:'Acciones que ya pasaron.',en:'Actions that already happened.'}, tip:{es:'terminado',en:'finished'}} },
      { q:{es:'«Ayer comí pizza» es:',en:'«Ayer comí pizza» is:'}, opts:{es:['Pasado','Presente'],en:['Past','Present']}, correct:0, fb:{ why:{es:'«Ayer» = momento terminado.',en:'«Ayer» = finished moment.'}, tip:{es:'ayer → pasado',en:'ayer → past'}} },
      { q:{es:'Sirve con marcadores como:',en:'It works with markers like:'}, opts:{es:['ayer, el lunes, en 2019','siempre, normalmente'],en:['ayer, el lunes, en 2019','siempre, normalmente']}, correct:0, fb:{ why:{es:'Momentos terminados.',en:'Finished moments.'}, tip:{es:'fecha cerrada',en:'closed date'}} },
      { q:{es:'«jugó» indica:',en:'«jugó» indicates:'}, opts:{es:['Acción pasada','Acción futura'],en:['Past action','Future action']}, correct:0, fb:{ why:{es:'Es pretérito.',en:'It is past.'}, tip:{es:'pasado',en:'past'}} },
      { q:{es:'¿La acción sigue pasando ahora?',en:'Is the action still happening now?'}, opts:{es:['No, ya terminó','Sí'],en:['No, it ended','Yes']}, correct:0, fb:{ why:{es:'El pasado simple es algo cerrado.',en:'Past simple is something closed.'}, tip:{es:'cerrado',en:'closed'}} }
    ] },
  { icon:'🤝', title:{es:'Similitudes',en:'Similarities'},
    html:{
      es:`<div class="gdesc">El inglés también tiene una forma de pasado para acciones terminadas. La mayoría se forma con <b>-ed</b>.</div>
        <table class="dtab"><tr><th>Base</th><th>Pasado</th><th>Tipo</th></tr>
          <tr><td>work</td><td class="en">worked</td><td>regular (+ed)</td></tr>
          <tr><td>play</td><td class="en">played</td><td>regular (+ed)</td></tr>
          <tr><td>go</td><td class="en">went</td><td>irregular</td></tr>
          <tr><td>eat</td><td class="en">ate</td><td>irregular</td></tr>
        </table>
        ${eg('I <span class="tag s">visited</span> my grandma yesterday.','Ayer visité a mi abuela.','ok')}
        ${eg('She <span class="tag s">went</span> to the market.','Ella fue al mercado.','ok')}
        <div class="sec-label">Lo igual en los dos idiomas</div>
        <ul class="simlist"><li>Los dos tienen un pasado para acciones terminadas.</li><li>Los dos usan marcadores como yesterday, last week, in 2019.</li><li>Los dos tienen verbos irregulares que hay que aprender.</li></ul>
        <div class="gnote">👍 Regular → +ed (worked). Irregular → forma propia (went, ate). Lo nuevo es la negativa y la pregunta con «did» (siguiente paso).</div>`,
      en:`<div class="gdesc">English also has a past form for finished actions. Most are formed with <b>-ed</b>.</div>
        <table class="dtab"><tr><th>Base</th><th>Past</th><th>Type</th></tr>
          <tr><td>work</td><td class="en">worked</td><td>regular (+ed)</td></tr>
          <tr><td>play</td><td class="en">played</td><td>regular (+ed)</td></tr>
          <tr><td>go</td><td class="en">went</td><td>irregular</td></tr>
          <tr><td>eat</td><td class="en">ate</td><td>irregular</td></tr>
        </table>
        ${eg('I <span class="tag s">visited</span> my grandma yesterday.','I visited my grandma yesterday.','ok')}
        ${eg('She <span class="tag s">went</span> to the market.','She went to the market.','ok')}
        <div class="sec-label">What is the same in both languages</div>
        <ul class="simlist"><li>Both have a past for finished actions.</li><li>Both use markers like yesterday, last week, in 2019.</li><li>Both have irregular verbs you must learn.</li></ul>
        <div class="gnote">👍 Regular → +ed (worked). Irregular → own form (went, ate). The new part is the negative and question with «did» (next step).</div>`
    },
    checks:[
      { q:{es:'Pasado de «work»:',en:'Past of «work»:'}, opts:{es:['worked','worken'],en:['worked','worken']}, correct:0, fb:{ why:{es:'Regular → +ed.',en:'Regular → +ed.'}, ex:{es:'I worked → Trabajé',en:'I worked'}, tip:{es:'regular → -ed',en:'regular → -ed'}} },
      { q:{es:'Pasado de «go»:',en:'Past of «go»:'}, opts:{es:['went','goed'],en:['went','goed']}, correct:0, fb:{ why:{es:'Irregular → went.',en:'Irregular → went.'}, ex:{es:'I went → Fui',en:'I went'}, tip:{es:'go → went',en:'go → went'}} },
      { q:{es:'Pasado de «eat»:',en:'Past of «eat»:'}, opts:{es:['ate','eated'],en:['ate','eated']}, correct:0, fb:{ why:{es:'Irregular → ate.',en:'Irregular → ate.'}, ex:{es:'I ate → Comí',en:'I ate'}, tip:{es:'eat → ate',en:'eat → ate'}} },
      { q:{es:'«played» es:',en:'«played» is:'}, opts:{es:['Regular','Irregular'],en:['Regular','Irregular']}, correct:0, fb:{ why:{es:'play + ed.',en:'play + ed.'}, tip:{es:'regular',en:'regular'}} },
      { q:{es:'Marcador de pasado:',en:'Past marker:'}, opts:{es:['yesterday','now'],en:['yesterday','now']}, correct:0, fb:{ why:{es:'«yesterday» → pasado.',en:'«yesterday» → past.'}, tip:{es:'yesterday',en:'yesterday'}} }
    ] },
  { icon:'⚡', title:{es:'Diferencias',en:'Differences'},
    html:{
      es:`<div class="gdesc">El gran cambio: para negar y preguntar se usa <b>did</b>, y el verbo vuelve a la <b>base</b> (pierde el pasado).</div>
        <table class="dtab"><tr><th>Tipo</th><th>Forma</th><th>Ejemplo</th></tr>
          <tr><td>afirmativo</td><td class="en">verbo en pasado</td><td>I went</td></tr>
          <tr><td>negativo</td><td class="en">didn't + base</td><td>I didn't go</td></tr>
          <tr><td>pregunta</td><td class="en">Did + sujeto + base?</td><td>Did you go?</td></tr>
        </table>
        <div class="sec-label">⚠️ El pasado se va al «did»</div>
        ${ii('✂️','«did/didn\'t» ya marca el pasado, así que el verbo vuelve a la base: «Did you <b>go</b>?» (no «Did you went?»).')}
        ${ii('🔤','Ortografía -ed: + ed normal · termina en «e» → +d (live→lived) · consonante+y → ied (study→studied) · dobla (stop→stopped).')}
        ${eg('I <span class="tag s">didn\'t see</span> her.','No la vi. (didn\'t + base)','ok')}
        ${eg('Did you went there?','Con «did» va la base: «Did you <b>go</b> there?».','bad')}
        <div class="gnote">📍 Afirmativo: verbo en pasado. Negativo/pregunta: did/didn\'t + verbo base.</div>`,
      en:`<div class="gdesc">The big change: to negate and ask you use <b>did</b>, and the verb goes back to <b>base</b> (loses the past).</div>
        <table class="dtab"><tr><th>Type</th><th>Form</th><th>Example</th></tr>
          <tr><td>affirmative</td><td class="en">past verb</td><td>I went</td></tr>
          <tr><td>negative</td><td class="en">didn't + base</td><td>I didn't go</td></tr>
          <tr><td>question</td><td class="en">Did + subject + base?</td><td>Did you go?</td></tr>
        </table>
        <div class="sec-label">⚠️ The past moves to «did»</div>
        ${ii('✂️','«did/didn\'t» already marks the past, so the verb goes back to base: «Did you <b>go</b>?» (not «Did you went?»).')}
        ${ii('🔤','-ed spelling: + ed normal · ends in «e» → +d (live→lived) · consonant+y → ied (study→studied) · double (stop→stopped).')}
        ${eg('I <span class="tag s">didn\'t see</span> her.','I didn\'t see her. (didn\'t + base)','ok')}
        ${eg('Did you went there?','With «did» use the base: «Did you <b>go</b> there?».','bad')}
        <div class="gnote">📍 Affirmative: past verb. Negative/question: did/didn\'t + base verb.</div>`
    },
    checks:[
      { q:{es:'Negativo: «I ___ go to the party.»',en:'Negative: «I ___ go to the party.»'}, opts:{es:['didn\'t','don\'t'],en:['didn\'t','don\'t']}, correct:0, fb:{ why:{es:'Pasado negativo → didn\'t + base.',en:'Negative past → didn\'t + base.'}, ex:{es:'I didn\'t go → No fui',en:'I didn\'t go'}, tip:{es:'didn\'t + base',en:'didn\'t + base'}}, tr:{es:'No fui a la fiesta.',en:'I didn\'t go to the party.'} },
      { q:{es:'¿Cuál está bien?',en:'Which one is right?'}, opts:{es:['Did you eat?','Did you ate?'],en:['Did you eat?','Did you ate?']}, correct:0, fb:{ why:{es:'Con «Did» → base (eat).',en:'With «Did» → base (eat).'}, ex:{es:'Did you eat? → ¿Comiste?',en:'Did you eat?'}, tip:{es:'Did + base',en:'Did + base'}} },
      { q:{es:'Pasado de «study» (afirmativo):',en:'Past of «study» (affirmative):'}, opts:{es:['studied','studyed'],en:['studied','studyed']}, correct:0, fb:{ why:{es:'consonante + y → ied.',en:'consonant + y → ied.'}, ex:{es:'I studied → Estudié',en:'I studied'}, tip:{es:'y → ied',en:'y → ied'}} },
      { q:{es:'Pasado de «stop»:',en:'Past of «stop»:'}, opts:{es:['stopped','stoped'],en:['stopped','stoped']}, correct:0, fb:{ why:{es:'Dobla la consonante.',en:'Double the consonant.'}, ex:{es:'It stopped → Se detuvo',en:'It stopped'}, tip:{es:'dobla',en:'double'}} },
      { q:{es:'Pregunta de «She came»:',en:'Question of «She came»:'}, opts:{es:['Did she come?','Did she came?'],en:['Did she come?','Did she came?']}, correct:0, fb:{ why:{es:'Con «Did» → base (come).',en:'With «Did» → base (come).'}, ex:{es:'Did she come? → ¿Vino?',en:'Did she come?'}, tip:{es:'Did + base',en:'Did + base'}} }
    ] },
  { icon:'💡', title:{es:'Tips Prácticos',en:'Practical Tips'},
    html:{
      es:`<div class="gdesc">Las tres formas, claras:</div>
        <div class="fbox"><div class="frm"><span class="pill s">+</span><span class="plus">verbo pasado</span><span class="pill v">−</span><span class="plus">didn't + base</span><span class="pill o">?</span><span class="plus">Did + base</span></div><div class="fex"><span class="s">I went</span> · <span class="v">I didn't go</span> · <span class="o">Did you go?</span></div></div>
        ${ii('🧠','<b>Tip 1 — Aprende los irregulares más comunes:</b> go→went, have→had, do→did, see→saw, make→made, take→took.')}
        ${ii('✂️','<b>Tip 2 — En negativa y pregunta, vuelve a la base:</b> el «did» ya lleva el pasado.')}
        ${ii('✅','<b>Tip 3 — Respuesta corta:</b> «Yes, I did» / «No, I didn\'t».')}
        <div class="alert-card"><div class="atitle">⚠️ Error típico</div><p>❌ «I didn\'t went» → ✅ «I didn\'t <b>go</b>».<br>❌ «Did you saw it?» → ✅ «Did you <b>see</b> it?»</p></div>`,
      en:`<div class="gdesc">The three forms, clear:</div>
        <div class="fbox"><div class="frm"><span class="pill s">+</span><span class="plus">past verb</span><span class="pill v">−</span><span class="plus">didn't + base</span><span class="pill o">?</span><span class="plus">Did + base</span></div><div class="fex"><span class="s">I went</span> · <span class="v">I didn't go</span> · <span class="o">Did you go?</span></div></div>
        ${ii('🧠','<b>Tip 1 — Learn the most common irregulars:</b> go→went, have→had, do→did, see→saw, make→made, take→took.')}
        ${ii('✂️','<b>Tip 2 — In negative and question, go back to base:</b> «did» already carries the past.')}
        ${ii('✅','<b>Tip 3 — Short answer:</b> «Yes, I did» / «No, I didn\'t».')}
        <div class="alert-card"><div class="atitle">⚠️ Common mistake</div><p>❌ «I didn\'t went» → ✅ «I didn\'t <b>go</b>».<br>❌ «Did you saw it?» → ✅ «Did you <b>see</b> it?»</p></div>`
    },
    checks:[
      { q:{es:'¿Cuál está bien?',en:'Which one is right?'}, opts:{es:['I didn\'t go','I didn\'t went'],en:['I didn\'t go','I didn\'t went']}, correct:0, fb:{ why:{es:'didn\'t + base.',en:'didn\'t + base.'}, ex:{es:'I didn\'t go → No fui',en:'I didn\'t go'}, tip:{es:'didn\'t + base',en:'didn\'t + base'}} },
      { q:{es:'Pasado de «have»:',en:'Past of «have»:'}, opts:{es:['had','haved'],en:['had','haved']}, correct:0, fb:{ why:{es:'Irregular → had.',en:'Irregular → had.'}, ex:{es:'I had → Tuve/Tenía',en:'I had'}, tip:{es:'have → had',en:'have → had'}} },
      { q:{es:'«___ they win the game?»',en:'«___ they win the game?»'}, opts:{es:['Did','Do'],en:['Did','Do']}, correct:0, fb:{ why:{es:'Pasado → Did.',en:'Past → Did.'}, ex:{es:'Did they win? → ¿Ganaron?',en:'Did they win?'}, tip:{es:'pregunta pasado → Did',en:'past question → Did'}}, tr:{es:'¿Ganaron el partido?',en:'Did they win the game?'} },
      { q:{es:'Pasado de «see»:',en:'Past of «see»:'}, opts:{es:['saw','seed'],en:['saw','seed']}, correct:0, fb:{ why:{es:'Irregular → saw.',en:'Irregular → saw.'}, ex:{es:'I saw → Vi',en:'I saw'}, tip:{es:'see → saw',en:'see → saw'}} },
      { q:{es:'Respuesta a «Did you call her?» (sí):',en:'Answer to «Did you call her?» (yes):'}, opts:{es:['Yes, I did.','Yes, I do.'],en:['Yes, I did.','Yes, I do.']}, correct:0, fb:{ why:{es:'Pasado → did.',en:'Past → did.'}, ex:{es:'Yes, I did → Sí',en:'Yes, I did'}, tip:{es:'did → did',en:'did → did'}} }
    ] },
  { icon:'✨', title:{es:'Práctica Final',en:'Final Practice'}, builder:true,
    html:{
      es:`<div class="gdesc">Junta todo: afirmativo con verbo en pasado; negativo/pregunta con did/didn\'t + base. Arma la oración.</div>
        <div class="cboxes"><div class="cbox s"><span class="cl">Afirmativo</span><span class="cv">verbo en pasado (worked, went)</span></div><div class="cbox o"><span class="cl">Negativo</span><span class="cv">didn't + base</span></div><div class="cbox p"><span class="cl">Pregunta</span><span class="cv">Did + sujeto + base?</span></div></div>
        <div class="sec-label">Las reglas en una oración</div>
        ${eg('I <span class="tag s">visited</span> my aunt.','Visité a mi tía.','ok')}
        ${eg('We <span class="tag s">didn\'t go</span> out.','No salimos.','ok')}
        ${eg('<b style="color:#7B1FA2">Did</b> you see the show?','¿Viste el show?','ok')}
        <div class="alert-card"><div class="atitle">⚠️ Los 3 errores más comunes</div><p>❌ «I didn\'t went» → ✅ «I didn\'t <b>go</b>»<br>❌ «Did you saw?» → ✅ «Did you <b>see</b>?»<br>❌ «I goed» → ✅ «I <b>went</b>»</p></div>`,
      en:`<div class="gdesc">Put it together: affirmative with past verb; negative/question with did/didn\'t + base. Build the sentence.</div>
        <div class="cboxes"><div class="cbox s"><span class="cl">Affirmative</span><span class="cv">past verb (worked, went)</span></div><div class="cbox o"><span class="cl">Negative</span><span class="cv">didn't + base</span></div><div class="cbox p"><span class="cl">Question</span><span class="cv">Did + subject + base?</span></div></div>
        <div class="sec-label">The rules in one sentence</div>
        ${eg('I <span class="tag s">visited</span> my aunt.','I visited my aunt.','ok')}

function say(text,acc){ try{ speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text); u.rate=.82; const vs=speechSynthesis.getVoices()||[]; const want=acc==='US'?'en-US':'en-GB'; const v=vs.find(x=>x.lang===want)||vs.find(x=>x.lang&&x.lang.indexOf('en')===0); if(v){u.voice=v;u.lang=v.lang;}else u.lang=want; speechSynthesis.speak(u); }catch(e){} }
function render(){ cur=0; coreDone=false; doneSteps=new Array(STEPS.length).fill(false); answers=STEPS.map(s=>new Array(s.checks.length).fill(null)); bState={order:[],locked:false};

function renderTabs(){ document.getElementById('steptabs').innerHTML=STEPS.map((s,i)=>`<button class="stab${i===0?' on':''}${doneSteps[i]?' done':''}" id="stab${i}" onclick="goStep(${i})">${s.icon} ${i+1}</button>`).join(''); }
function applyLang(){ const t=L();
  document.getElementById('lsEs').classList.toggle('on',info==='es'); document.getElementById('lsEn').classList.toggle('on',info==='en');
  document.getElementById('mhtitle').textContent=MAT.title[info]; document.getElementById('mhsub').textContent=document.getElementById('screen').getAttribute('data-level').toUpperCase().replace('-',' · ')+' · '+MAT.subtitle[info];
  document.getElementById('unT').textContent=t.unT; document.getElementById('unP').textContent=t.unP;
  document.getElementById('helpT').textContent=t.helpT; document.getElementById('helpTips').innerHTML='<div style="font-size:11.5px;color:var(--text-soft);font-weight:700;margin-bottom:6px">'+t.tipsT+'</div>'+t.tips.map(x=>'<div class="helptip">• <span>'+x+'</span></div>').join('');
  document.getElementById('kpT').textContent=t.kpT; document.getElementById('lBack').textContent=t.back; document.getElementById('lRetry').textContent=t.retry;
  updateMilestone(); renderStep(); }
function renderStep(){ const t=L(), s=STEPS[cur]; curLab= info==='es'?'EJEMPLO':'EXAMPLE';
  let html=`<div class="gcard"><div class="sec-label">${cur+1}. ${s.icon} ${s.title[info]}</div>${s.html[info]}`;
  if(s.builder) html+=builderHtml(); html+=`</div>`;
  const ansd=answers[cur].filter(x=>x!==null).length;
  html+=`<div class="check"><div class="check-h">🧠 ${t.checkH}<span class="cprog">${ansd}/${s.checks.length}</span></div><div class="check-sub">${t.checkSub}</div>`;

function removeTile(idx,el){ if(bState.locked)return; bState.order=bState.order.filter(x=>x!==idx); el.remove(); document.getElementById('tile'+idx).classList.remove('placed'); document.getElementById('bchk').disabled=bState.order.length!==BUILD.answer.length; }
function checkBuild(){ const t=L(); bState.locked=true; const ok=bState.order.join(',')===BUILD.answer.map((_,i)=>i).join(','); document.querySelectorAll('#tray .tile').forEach(x=>x.style.pointerEvents='none');

function finish(){ const t=L(); document.getElementById('mbody').style.display='none'; document.getElementById('results').classList.add('show');
