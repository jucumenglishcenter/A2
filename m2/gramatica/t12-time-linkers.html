<script>
/* ═══ METADATOS ═══ */
const MAT = { title:{es:'Resumen de Gramática',en:'Grammar Summary'}, subtitle:{es:'Conectores de Tiempo (When / While)',en:'Time Linkers (When / While)'}, reportId:'sum-time-linkers' };
const PASS = 75;
const STEPS = [
  { icon:'🇪🇸', title:{es:'Repaso en Español',en:'Spanish Recap'},
    html:{
      es:`<div class="gdesc">Para unir dos ideas en el tiempo, en español usas «<b>cuando</b>», «<b>mientras</b>», «<b>antes de</b>», «<b>después de</b>», «<b>hasta que</b>».</div>
        <div class="art-hero"><div class="art-box"><div class="word">cuando</div><div class="role">Momento</div><div class="desc">«Llámame cuando llegues.»</div></div><div class="art-box"><div class="word">mientras</div><div class="role">En paralelo</div><div class="desc">«Cocino mientras escucho música.»</div></div></div>
        ${ii('🔗','«Cuando» señala un punto o momento; «mientras» señala algo que pasa al mismo tiempo.')}
        <div class="gnote life">🌎 <b>De tu vida:</b> «Antes de salir, apaga la luz» o «Espera hasta que termine». En inglés son when, while, before, after, until.</div>`,
      en:`<div class="gdesc">To join two ideas in time, Spanish uses «<b>cuando</b>», «<b>mientras</b>», «<b>antes de</b>», «<b>después de</b>», «<b>hasta que</b>».</div>
        <div class="art-hero"><div class="art-box"><div class="word">cuando</div><div class="role">Moment</div><div class="desc">«Llámame cuando llegues.»</div></div><div class="art-box"><div class="word">mientras</div><div class="role">In parallel</div><div class="desc">«Cocino mientras escucho música.»</div></div></div>
        ${ii('🔗','«Cuando» marks a point or moment; «mientras» marks something happening at the same time.')}
        <div class="gnote life">🌎 <b>From your life:</b> «Antes de salir, apaga la luz» or «Espera hasta que termine». In English they are when, while, before, after, until.</div>`
    },
    checks:[
      { q:{es:'«Cuando» señala:',en:'«Cuando» marks:'}, opts:{es:['Un momento','Un lugar'],en:['A moment','A place']}, correct:0, fb:{ why:{es:'Es un conector de tiempo.',en:'It is a time connector.'}, tip:{es:'momento',en:'moment'}} },
      { q:{es:'«Mientras» señala:',en:'«Mientras» marks:'}, opts:{es:['Algo en paralelo','Algo terminado'],en:['Something in parallel','Something finished']}, correct:0, fb:{ why:{es:'Dos acciones a la vez.',en:'Two actions at once.'}, tip:{es:'al mismo tiempo',en:'at the same time'}} },
      { q:{es:'«Antes de salir» indica:',en:'«Antes de salir» indicates:'}, opts:{es:['Orden en el tiempo','Lugar'],en:['Order in time','Place']}, correct:0, fb:{ why:{es:'Una acción antes de otra.',en:'One action before another.'}, tip:{es:'antes',en:'before'}} },
      { q:{es:'«Hasta que termine» indica:',en:'«Hasta que termine» indicates:'}, opts:{es:['Un límite de tiempo','Un lugar'],en:['A time limit','A place']}, correct:0, fb:{ why:{es:'Hasta cierto momento.',en:'Up to a certain moment.'}, tip:{es:'límite',en:'limit'}} },
      { q:{es:'Estos conectores unen:',en:'These connectors join:'}, opts:{es:['Dos ideas en el tiempo','Dos lugares'],en:['Two ideas in time','Two places']}, correct:0, fb:{ why:{es:'Relacionan acciones en el tiempo.',en:'They relate actions in time.'}, tip:{es:'tiempo',en:'time'}} }
    ] },
  { icon:'🤝', title:{es:'Similitudes',en:'Similarities'},
    html:{
      es:`<div class="gdesc">El inglés tiene los mismos conectores, uno por uno.</div>
        <div class="viz-grid"><div class="viz-item"><span class="ico">🕐</span><span class="lbl">when</span><span class="es">cuando</span></div><div class="viz-item"><span class="ico">⏳</span><span class="lbl">while</span><span class="es">mientras</span></div><div class="viz-item"><span class="ico">⬅️</span><span class="lbl">before</span><span class="es">antes de</span></div><div class="viz-item"><span class="ico">➡️</span><span class="lbl">after</span><span class="es">después de</span></div><div class="viz-item"><span class="ico">🛑</span><span class="lbl">until</span><span class="es">hasta que</span></div><div class="viz-item"><span class="ico">⚡</span><span class="lbl">as soon as</span><span class="es">en cuanto</span></div></div>
        ${eg('Call me <span class="tag s">when</span> you arrive.','Llámame cuando llegues.','ok')}
        ${eg('I cook <span class="tag s">while</span> I listen to music.','Cocino mientras escucho música.','ok')}
        <div class="sec-label">Lo igual en los dos idiomas</div>
        <ul class="simlist"><li>Los dos unen dos ideas en el tiempo.</li><li>when = cuando · while = mientras.</li><li>El conector puede ir al inicio o en medio de la frase.</li></ul>
        <div class="gnote">👍 when, while, before, after, until, as soon as. Lo nuevo: cuándo usar when vs while (siguiente paso).</div>`,
      en:`<div class="gdesc">English has the same connectors, one by one.</div>
        <div class="viz-grid"><div class="viz-item"><span class="ico">🕐</span><span class="lbl">when</span><span class="es">cuando</span></div><div class="viz-item"><span class="ico">⏳</span><span class="lbl">while</span><span class="es">mientras</span></div><div class="viz-item"><span class="ico">⬅️</span><span class="lbl">before</span><span class="es">antes de</span></div><div class="viz-item"><span class="ico">➡️</span><span class="lbl">after</span><span class="es">después de</span></div><div class="viz-item"><span class="ico">🛑</span><span class="lbl">until</span><span class="es">hasta que</span></div><div class="viz-item"><span class="ico">⚡</span><span class="lbl">as soon as</span><span class="es">en cuanto</span></div></div>
        ${eg('Call me <span class="tag s">when</span> you arrive.','Call me when you arrive.','ok')}
        ${eg('I cook <span class="tag s">while</span> I listen to music.','I cook while I listen to music.','ok')}
        <div class="sec-label">What is the same in both languages</div>
        <ul class="simlist"><li>Both join two ideas in time.</li><li>when = cuando · while = mientras.</li><li>The connector can go at the start or in the middle of the sentence.</li></ul>
        <div class="gnote">👍 when, while, before, after, until, as soon as. The new part: when to use when vs while (next step).</div>`
    },
    checks:[
      { q:{es:'«when» = ',en:'«when» = '}, opts:{es:['cuando','mientras'],en:['cuando','mientras']}, correct:0, fb:{ why:{es:'when = cuando.',en:'when = cuando.'}, tip:{es:'when = cuando',en:'when = cuando'}} },
      { q:{es:'«while» = ',en:'«while» = '}, opts:{es:['mientras','después'],en:['mientras','después']}, correct:0, fb:{ why:{es:'while = mientras.',en:'while = mientras.'}, tip:{es:'while = mientras',en:'while = mientras'}} },
      { q:{es:'«until» = ',en:'«until» = '}, opts:{es:['hasta que','antes de'],en:['hasta que','antes de']}, correct:0, fb:{ why:{es:'until = hasta que.',en:'until = hasta que.'}, tip:{es:'until = hasta que',en:'until = hasta que'}} },
      { q:{es:'«as soon as» = ',en:'«as soon as» = '}, opts:{es:['en cuanto','mientras'],en:['en cuanto','mientras']}, correct:0, fb:{ why:{es:'as soon as = en cuanto.',en:'as soon as = en cuanto.'}, tip:{es:'as soon as = en cuanto',en:'as soon as = en cuanto'}} },
      { q:{es:'El conector puede ir:',en:'The connector can go:'}, opts:{es:['Al inicio o en medio','Solo al final'],en:['At the start or middle','Only at the end']}, correct:0, fb:{ why:{es:'Tiene dos posiciones.',en:'It has two positions.'}, tip:{es:'inicio o medio',en:'start or middle'}} }
    ] },
  { icon:'⚡', title:{es:'Diferencias',en:'Differences'},
    html:{
      es:`<div class="gdesc">Dos cosas que cuidar: <b>when vs while</b>, y que tras estos conectores <b>NO se usa el futuro</b> (se usa el presente).</div>
        <table class="dtab"><tr><th>Conector</th><th>Va con…</th><th>Ejemplo</th></tr>
          <tr><td class="en">when</td><td>un punto / acción corta</td><td>when the bus arrives</td></tr>
          <tr><td class="en">while</td><td>una acción larga (en paralelo)</td><td>while I was sleeping</td></tr>
        </table>
        <div class="sec-label">⚠️ Después de when/before/after/until → presente, no futuro</div>
        ${ii('🚫','Aunque hables del futuro, tras el conector va el <b>presente</b>: «I\'ll call you when I <b>arrive</b>» (no «when I will arrive»).')}
        ${eg('I\'ll text you <span class="tag s">when</span> I get home.','Te escribo cuando llegue a casa. (presente tras when)','ok')}
        ${eg('I\'ll text you when I will get home.','Tras «when» va presente: «when I get home».','bad')}
        <div class="gnote">📍 when = punto/corta · while = larga/paralela. Tras when/before/after/until → presente (para futuro).</div>`,
      en:`<div class="gdesc">Two things to watch: <b>when vs while</b>, and that after these connectors you do <b>NOT use the future</b> (you use the present).</div>
        <table class="dtab"><tr><th>Connector</th><th>Goes with…</th><th>Example</th></tr>
          <tr><td class="en">when</td><td>a point / short action</td><td>when the bus arrives</td></tr>
          <tr><td class="en">while</td><td>a long action (in parallel)</td><td>while I was sleeping</td></tr>
        </table>
        <div class="sec-label">⚠️ After when/before/after/until → present, not future</div>
        ${ii('🚫','Even when talking about the future, after the connector use the <b>present</b>: «I\'ll call you when I <b>arrive</b>» (not «when I will arrive»).')}
        ${eg('I\'ll text you <span class="tag s">when</span> I get home.','I\'ll text you when I get home. (present after when)','ok')}
        ${eg('I\'ll text you when I will get home.','After «when» use the present: «when I get home».','bad')}
        <div class="gnote">📍 when = point/short · while = long/parallel. After when/before/after/until → present (for the future).</div>`
    },
    checks:[
      { q:{es:'«___ I was cooking, the phone rang.» (acción larga):',en:'«___ I was cooking, the phone rang.» (long action):'}, opts:{es:['While','When'],en:['While','When']}, correct:0, fb:{ why:{es:'Acción larga en paralelo → while.',en:'Long parallel action → while.'}, ex:{es:'While I was cooking → Mientras cocinaba',en:'While I was cooking'}, tip:{es:'larga → while',en:'long → while'}}, tr:{es:'Mientras cocinaba, sonó el teléfono.',en:'While I was cooking, the phone rang.'} },
      { q:{es:'«Call me ___ you finish.» (punto):',en:'«Call me ___ you finish.» (point):'}, opts:{es:['when','while'],en:['when','while']}, correct:0, fb:{ why:{es:'Un momento puntual → when.',en:'A specific moment → when.'}, ex:{es:'when you finish → cuando termines',en:'when you finish'}, tip:{es:'punto → when',en:'point → when'}}, tr:{es:'Llámame cuando termines.',en:'Call me when you finish.'} },
      { q:{es:'«I\'ll wait ___ you come.» (hasta):',en:'«I\'ll wait ___ you come.» (until):'}, opts:{es:['until','while'],en:['until','while']}, correct:0, fb:{ why:{es:'Hasta cierto momento → until.',en:'Up to a moment → until.'}, ex:{es:'until you come → hasta que vengas',en:'until you come'}, tip:{es:'hasta → until',en:'until → until'}}, tr:{es:'Esperaré hasta que vengas.',en:'I\'ll wait until you come.'} },
      { q:{es:'«I\'ll call you when I ___ there.» (futuro):',en:'«I\'ll call you when I ___ there.» (future):'}, opts:{es:['get','will get'],en:['get','will get']}, correct:0, fb:{ why:{es:'Tras «when» → presente, no futuro.',en:'After «when» → present, not future.'}, contrast:{es:'No «when I will get».',en:'Not «when I will get».'}, ex:{es:'when I get there → cuando llegue',en:'when I get there'}, tip:{es:'when + presente',en:'when + present'}}, tr:{es:'Te llamo cuando llegue allí.',en:'I\'ll call you when I get there.'} },
      { q:{es:'¿Cuál suele ir con una acción corta/puntual?',en:'Which usually goes with a short/specific action?'}, opts:{es:['when','while'],en:['when','while']}, correct:0, fb:{ why:{es:'when = punto.',en:'when = point.'}, tip:{es:'when → punto',en:'when → point'}} }
    ] },
  { icon:'💡', title:{es:'Tips Prácticos',en:'Practical Tips'},
    html:{
      es:`<div class="gdesc">Cómo encajar las dos ideas:</div>
        <div class="fbox"><div class="frm"><span class="pill s">Conector</span><span class="plus">+</span><span class="pill v">idea 1</span><span class="plus">,</span><span class="pill o">idea 2</span></div><div class="fex"><span class="s">When</span> <span class="v">it rains</span>, <span class="o">I stay home</span>.</div></div>
        ${ii('🔁','<b>Tip 1 — Dos posiciones:</b> «When it rains, I stay home» = «I stay home when it rains». Si va al inicio, lleva coma.')}
        ${ii('⏳','<b>Tip 2 — when vs while:</b> acción corta/puntual → when · acción larga/en paralelo → while.')}
        ${ii('🚫','<b>Tip 3 — Para el futuro:</b> tras when/before/after/until usa el presente, no «will».')}
        <div class="alert-card"><div class="atitle">⚠️ Error típico</div><p>❌ «I\'ll go out when the rain will stop» → ✅ «… when the rain <b>stops</b>».</p></div>`,
      en:`<div class="gdesc">How to fit the two ideas:</div>
        <div class="fbox"><div class="frm"><span class="pill s">Connector</span><span class="plus">+</span><span class="pill v">idea 1</span><span class="plus">,</span><span class="pill o">idea 2</span></div><div class="fex"><span class="s">When</span> <span class="v">it rains</span>, <span class="o">I stay home</span>.</div></div>
        ${ii('🔁','<b>Tip 1 — Two positions:</b> «When it rains, I stay home» = «I stay home when it rains». If it starts the sentence, add a comma.')}
        ${ii('⏳','<b>Tip 2 — when vs while:</b> short/specific action → when · long/parallel action → while.')}
        ${ii('🚫','<b>Tip 3 — For the future:</b> after when/before/after/until use the present, not «will».')}
        <div class="alert-card"><div class="atitle">⚠️ Common mistake</div><p>❌ «I\'ll go out when the rain will stop» → ✅ «… when the rain <b>stops</b>».</p></div>`
    },
    checks:[
      { q:{es:'«___ you cook, I\'ll set the table.» (en paralelo):',en:'«___ you cook, I\'ll set the table.» (in parallel):'}, opts:{es:['While','Until'],en:['While','Until']}, correct:0, fb:{ why:{es:'Acción en paralelo → while.',en:'Parallel action → while.'}, ex:{es:'While you cook → Mientras cocinas',en:'While you cook'}, tip:{es:'paralelo → while',en:'parallel → while'}}, tr:{es:'Mientras cocinas, pongo la mesa.',en:'While you cook, I\'ll set the table.'} },
      { q:{es:'«Turn off the lights ___ you leave.»',en:'«Turn off the lights ___ you leave.»'}, opts:{es:['before','until'],en:['before','until']}, correct:0, fb:{ why:{es:'Una acción antes de otra → before.',en:'One action before another → before.'}, ex:{es:'before you leave → antes de salir',en:'before you leave'}, tip:{es:'antes → before',en:'before → before'}}, tr:{es:'Apaga las luces antes de salir.',en:'Turn off the lights before you leave.'} },
      { q:{es:'«We\'ll start ___ everyone arrives.» (en cuanto):',en:'«We\'ll start ___ everyone arrives.» (as soon as):'}, opts:{es:['as soon as','while'],en:['as soon as','while']}, correct:0, fb:{ why:{es:'En cuanto → as soon as.',en:'As soon as → as soon as.'}, ex:{es:'as soon as everyone arrives → en cuanto llegue todos',en:'as soon as everyone arrives'}, tip:{es:'en cuanto → as soon as',en:'as soon as'}}, tr:{es:'Empezamos en cuanto llegue todos.',en:'We\'ll start as soon as everyone arrives.'} },
      { q:{es:'¿Lleva coma al inicio? «When it rains ___ I stay home.»',en:'Comma when it starts? «When it rains ___ I stay home.»'}, opts:{es:['Sí, coma','No lleva coma'],en:['Yes, a comma','No comma']}, correct:0, fb:{ why:{es:'Si el conector abre la frase, va coma.',en:'If the connector opens the sentence, add a comma.'}, ex:{es:'When it rains, I stay home',en:'When it rains, I stay home'}, tip:{es:'inicio → coma',en:'start → comma'}} },
      { q:{es:'«I\'ll text you after I ___ (arrive).» (futuro):',en:'«I\'ll text you after I ___ (arrive).» (future):'}, opts:{es:['arrive','will arrive'],en:['arrive','will arrive']}, correct:0, fb:{ why:{es:'Tras «after» → presente.',en:'After «after» → present.'}, ex:{es:'after I arrive → después de llegar',en:'after I arrive'}, tip:{es:'after + presente',en:'after + present'}}, tr:{es:'Te escribo después de llegar.',en:'I\'ll text you after I arrive.'} }
    ] },
  { icon:'✨', title:{es:'Práctica Final',en:'Final Practice'}, builder:true,
    html:{
      es:`<div class="gdesc">Junta todo: elige el conector y recuerda usar presente para el futuro. Arma la oración.</div>
        <div class="cboxes"><div class="cbox s"><span class="cl">when</span><span class="cv">punto / acción corta</span></div><div class="cbox o"><span class="cl">while</span><span class="cv">acción larga / en paralelo</span></div><div class="cbox p"><span class="cl">otros</span><span class="cv">before · after · until · as soon as</span></div></div>
        <div class="sec-label">Las reglas en una oración</div>
        ${eg('Call me <span class="tag s">when</span> you arrive.','Llámame cuando llegues.','ok')}
        ${eg('She read <span class="tag s">while</span> the baby slept.','Leyó mientras el bebé dormía.','ok')}

function render(){ cur=0; coreDone=false; doneSteps=new Array(STEPS.length).fill(false); answers=STEPS.map(s=>new Array(s.checks.length).fill(null)); bState={order:[],locked:false};

function renderStep(){ const t=L(), s=STEPS[cur]; curLab= info==='es'?'EJEMPLO':'EXAMPLE';
