<script>
const GLOSS = [{"w":"bank account","es":"cuenta bancaria","ex":"open a bank account"},{"w":"savings","es":"ahorros","ex":"a savings account"},{"w":"charge","es":"cargo / cobro","ex":"a strange charge"},{"w":"bill","es":"factura / recibo","ex":"on your next bill"},{"w":"card","es":"tarjeta","ex":"a debit card"},{"w":"PIN","es":"clave / PIN","ex":"set a new PIN"},{"w":"budget","es":"presupuesto","ex":"a monthly budget"},{"w":"fee","es":"comisión / cargo","ex":"a hidden fee"},{"w":"refund","es":"reembolso","ex":"process a refund"},{"w":"dispute","es":"disputa / reclamar","ex":"a dispute file"}];
/* Cada oración alineada EN↔ES (para resaltado por oración en ambos idiomas) */
const STORYDATA = {"1":{"sTitle":"Sofía's First Bank Account","sTitleEs":"La primera cuenta de Sofía","dTitle":"Opening a New Account","dTitleEs":"Opening a New Account","paras":[[["Sofía had been saving money at home for many years.","Sofía había estado ahorrando dinero en casa durante muchos años."],["She kept her bills hidden inside a small box under her bed.","Guardaba sus billetes escondidos dentro de una pequeña caja debajo de su cama."],["Her grandmother used to follow the same pattern in her old house on the hill.","Su abuela solía seguir el mismo patrón en su vieja casa en la colina."],["The concept of a bank felt strange and far away to Sofía before now.","El concepto de un banco se sentía extraño y lejano para Sofía antes de ahora."],["But modern life required a real account to pay rent, water, and many other bills.","Pero la vida moderna requería una cuenta real para pagar alquiler, agua, y muchas otras cuentas."]],[["One cold morning, she walked to the bank office near the main park.","Una mañana fría, caminó al banco cerca del parque principal."],["She was a little nervous because everything felt new and complex.","Estaba un poco nerviosa porque todo se sentía nuevo y complejo."],["The guard greeted her in a friendly voice and opened the door.","El guardia la saludó con voz amable y le abrió la puerta."],["She sat down and waited for a clerk to call her.","Ella se sentó y esperó a que un empleado la llamara."],["The waiting room was clean, warm, and very quiet.","La sala de espera estaba limpia, cálida, y muy silenciosa."]],[["A kind woman called her number and invited her to approach the counter.","Una mujer amable llamó su número y la invitó a acercarse al mostrador."],["Sofía explained that she wanted to open a basic savings account.","Sofía explicó que quería abrir una cuenta de ahorros básica."],["The clerk asked for her ID and a recent utility bill.","La empleada pidió su documento de identidad y una factura reciente de servicios."],["Sofía had brought both documents with her, just in case.","Sofía había traído ambos documentos con ella, por si acaso."],["She was proud of being ready for the process.","Estaba orgullosa de estar lista para el proceso."]],[["The clerk began to organize the paperwork with quick, practiced hands.","La empleada comenzó a organizar el papeleo con manos rápidas y practicadas."],["She showed Sofía a clear chart with the different types of accounts.","Le mostró a Sofía un gráfico claro con los diferentes tipos de cuentas."],["Each one had its own fees, its own limits, and its own small rules.","Cada una tenía sus propias comisiones, sus propios límites, y sus propias pequeñas reglas."],["The clerk continued to speak calmly about every basic detail of the process.","La empleada continuó hablando con calma sobre cada detalle básico del proceso."],["Sofía asked many questions, and the clerk answered without making her feel slow.","Sofía hizo muchas preguntas, y la empleada respondió sin hacerla sentir lenta."]],[["The whole process took about twenty minutes from start to finish.","Todo el proceso tomó unos veinte minutos de principio a fin."],["Sofía deposited her first fifty soles into her brand new account.","Sofía depositó sus primeros cincuenta soles en su nueva cuenta."],["She created a simple PIN that she could remember but nobody could guess.","Creó un PIN simple que podía recordar pero que nadie podía adivinar."],["The clerk warned her never to share it with any family member.","La empleada le advirtió que nunca lo compartiera con ningún miembro de la familia."],["Safety was the most important thing when dealing with real money.","La seguridad era lo más importante al tratar con dinero real."]],[["Before she left, the clerk helped her connect the account to her phone.","Antes de irse, la empleada la ayudó a conectar la cuenta con su teléfono."],["A small green app appeared on her screen in a few seconds.","Una pequeña aplicación verde apareció en su pantalla en pocos segundos."],["She could now check her balance, pay bills, and move money quickly.","Ahora podía ver su saldo, pagar cuentas, y mover dinero rápidamente."],["Sofía assumed it would be much harder, but the clerk made it easy.","Sofía suponía que sería mucho más difícil, pero la empleada lo hizo fácil."],["She felt a real sense of pride growing inside her chest.","Sintió una verdadera sensación de orgullo creciendo dentro de su pecho."]],[["Before stepping outside, Sofía took a moment to review what she had learned.","Antes de salir, Sofía se tomó un momento para repasar lo que había aprendido."],["The clerk reminded her never to share her PIN or her passwords with anyone, not even with people who claimed to work at the bank.","La cajera le recordó que nunca compartiera su PIN ni sus contraseñas con nadie, ni siquiera con personas que dijeran trabajar en el banco."],["She also explained how to check the official app for any movement on the account.","También le explicó cómo revisar la aplicación oficial para ver cualquier movimiento de la cuenta."],["Sofía wrote the main points in her phone so she would not forget them.","Sofía anotó los puntos principales en su teléfono para no olvidarlos."],["She felt prepared and surprisingly confident.","Se sintió preparada y sorprendentemente segura."],["The clerk wished her good luck with a warm smile.","La cajera le deseó buena suerte con una sonrisa cálida."]],[["Sofía walked out of the bank with her new debit card in her pocket.","Sofía salió del banco con su nueva tarjeta de débito en el bolsillo."],["The morning sun felt warmer than it had just an hour ago.","El sol de la mañana se sentía más cálido que hacía solo una hora."],["She was no longer just a girl with a box of bills under her bed.","Ya no era solo una chica con una caja de billetes debajo de su cama."],["She was now a real client of a modern bank with a real account.","Ahora era una cliente real de un banco moderno con una cuenta real."],["Today was the first step of a much longer financial journey ahead.","Hoy era el primer paso de un viaje financiero mucho más largo por delante."]]],"dlg":[["Sofía","Good morning. I would like to open a basic savings account today.","Buenos días. Me gustaría abrir una cuenta de ahorros básica hoy."],["Clerk","Welcome to our bank! I can help you with that. Please sit down.","¡Bienvenida a nuestro banco! Puedo ayudarla con eso. Por favor siéntese."],["Sofía","Thank you. This is my first time opening an account anywhere.","Gracias. Es mi primera vez abriendo una cuenta en cualquier lugar."],["Clerk","No problem at all. I will walk you through each step carefully.","No hay problema. Le explicaré cada paso con cuidado."],["Sofía","What documents do I need to bring for this process?","¿Qué documentos necesito traer para este proceso?"],["Clerk","I need to see your ID and a recent utility bill with your address.","Necesito ver su documento de identidad y una factura reciente con su dirección."],["Sofía","I have both right here. I brought them just in case you asked.","Tengo ambos aquí mismo. Los traje por si acaso los pedía."],["Clerk","Perfect. Let me quickly check the date on this electricity bill.","Perfecto. Déjeme revisar rápidamente la fecha de esta factura de electricidad."],["Sofía","It is from last month. I paid it three weeks ago at the office.","Es del mes pasado. La pagué hace tres semanas en la oficina."],["Clerk","That is fresh enough for our purpose. It proves you live at that address.","Es bastante reciente para nuestro propósito. Demuestra que usted vive en esa dirección."],["Sofía","Good. What is the minimum amount to open a basic account?","Bien. ¿Cuál es el monto mínimo para abrir una cuenta básica?"],["Clerk","For this type of account, the minimum is fifty soles to start.","Para este tipo de cuenta, el mínimo es cincuenta soles para empezar."],["Sofía","That sounds reasonable. Are there any monthly fees I should know about?","Suena razonable. ¿Hay alguna comisión mensual que deba conocer?"],["Clerk","We offer a small maintenance fee waiver if you make a monthly deposit.","Ofrecemos una exención de la pequeña comisión si hace un depósito mensual."],["Sofía","I plan to deposit my salary here every month without fail.","Planeo depositar mi sueldo aquí cada mes sin falta."],["Clerk","Then the system will allow the waiver automatically each month.","Entonces el sistema permitirá la exención automáticamente cada mes."],["Sofía","How long does the whole opening process usually take?","¿Cuánto tiempo toma normalmente todo el proceso de apertura?"],["Clerk","About twenty minutes. First I will assess your documents and then print the contract.","Unos veinte minutos. Primero evaluaré sus documentos y luego imprimiré el contrato."],["Sofía","In this context, what is the full range of services I will have?","En este contexto, ¿cuál es la gama completa de servicios que tendré?"],["Clerk","You will have savings, transfers, a debit card, and basic online access.","Tendrá ahorros, transferencias, una tarjeta de débito, y acceso básico en línea."],["Sofía","Will I get a debit card today, or does it come later by mail?","¿Recibiré una tarjeta de débito hoy, o llega después por correo?"],["Clerk","We produce the card here in the office. You will leave with it today.","Producimos la tarjeta aquí en la oficina. Saldrá con ella hoy."],["Sofía","That is very convenient. I was worried about waiting for weeks.","Es muy conveniente. Me preocupaba esperar semanas."],["Clerk","Modern banking is much faster than it used to be a few years ago.","La banca moderna es mucho más rápida que hace algunos años."],["Sofía","Do I choose my own PIN, or does the system assign one automatically?","¿Elijo mi propio PIN, o el sistema asigna uno automáticamente?"],["Clerk","You will create your own PIN at the machine over there in a moment.","Usted creará su propio PIN en la máquina de allá en un momento."],["Sofía","Good. I want something I can remember easily but nobody can guess.","Bien. Quiero algo que pueda recordar fácilmente pero que nadie pueda adivinar."],["Clerk","Please avoid your birthday or simple patterns. Those are too easy to guess.","Por favor evite su cumpleaños o patrones simples. Son demasiado fáciles de adivinar."],["Sofía","That makes sense. What is the daily limit for withdrawals from ATMs?","Tiene sentido. ¿Cuál es el límite diario para retiros de cajeros automáticos?"],["Clerk","The standard limit is one thousand soles per day from any ATM.","El límite estándar es mil soles por día desde cualquier cajero."],["Sofía","And if I need to take out more for a real emergency one day?","¿Y si necesito sacar más por una emergencia real un día?"],["Clerk","You can visit any branch with your ID and request a higher amount in person.","Puede visitar cualquier sucursal con su documento y solicitar un monto mayor en persona."],["Sofía","Perfect. Can I also connect this account to my phone for online banking?","Perfecto. ¿También puedo conectar esta cuenta con mi teléfono para banca en línea?"],["Clerk","Yes. After we finish here, I will help you set up the mobile app.","Sí. Después de terminar aquí, la ayudaré a configurar la aplicación móvil."],["Sofía","Thank you so much for being so patient and friendly with me today.","Muchas gracias por ser tan paciente y amable conmigo hoy."],["Clerk","It is my pleasure. Welcome to the bank, and congratulations on your first account.","Es un placer. Bienvenida al banco, y felicidades por su primera cuenta."]],"datos":{"0":"<i>had been saving</i> = «llevaba ahorrando / había estado ahorrando»: una acción larga que venía desde antes hasta cierto punto del pasado."}},"2":{"sTitle":"The Strange Charge","sTitleEs":"El cargo extraño","dTitle":"A Strange Charge","dTitleEs":"A Strange Charge","paras":[[["Carlos had a simple habit every month on the last day.","Carlos tenía un hábito simple cada mes el último día."],["He would sit at his kitchen table with a hot cup of coffee.","Se sentaba en la mesa de su cocina con una taza de café caliente."],["He would open his bank statement and count every charge carefully.","Abría su estado de cuenta bancario y contaba cada cargo con cuidado."],["This small activity helped him understand where his money really went.","Esta pequeña actividad le ayudaba a entender a dónde iba realmente su dinero."],["Most months, everything made sense, and he would close the file quickly.","La mayoría de los meses, todo tenía sentido, y cerraba el archivo rápidamente."]],[["But this time, he found something truly strange on the second page.","Pero esta vez, encontró algo verdaderamente extraño en la segunda página."],["A charge of two hundred soles appeared under the date of October fifteenth.","Un cargo de doscientos soles apareció bajo la fecha del quince de octubre."],["The store was called North Market, a name Carlos did not know.","La tienda se llamaba North Market, un nombre que Carlos no conocía."],["He had never been to that shop in his entire life before.","Nunca había estado en esa tienda en toda su vida."],["His heart started to beat a little faster at that moment.","Su corazón empezó a latir un poco más rápido en ese momento."]],[["He remembered that day very clearly because it was a test day at the office.","Recordaba ese día muy claramente porque era un día de examen en la oficina."],["He had been at his desk from early morning until late in the afternoon.","Había estado en su escritorio desde temprano en la mañana hasta tarde en la tarde."],["His card had been in his wallet, which lay inside his bag the whole time.","Su tarjeta había estado en su billetera, que yacía dentro de su bolso todo el tiempo."],["There was no real way somebody could have used his card in person.","No había manera real de que alguien hubiera usado su tarjeta en persona."],["The dead silence of his empty kitchen felt strange as he rubbed his nose in confusion.","El silencio muerto de su cocina vacía se sentía extraño mientras se frotaba la nariz en confusión."]],[["Carlos called the bank immediately and waited for an agent to pick up the phone.","Carlos llamó al banco inmediatamente y esperó a que un agente contestara el teléfono."],["A calm voice on the other end listened to his whole story carefully.","Una voz calmada al otro lado escuchó toda su historia con cuidado."],["The agent did not assume he was lying, which made Carlos feel much better.","La agente no supuso que estaba mintiendo, lo que hizo sentir a Carlos mucho mejor."],["She explained that thieves sometimes copy card numbers through the internet.","Ella explicó que los ladrones a veces copian los números de tarjetas a través de internet."],["Carlos did not understand every technical term, but he understood the basic idea.","Carlos no entendió cada término técnico, pero entendió la idea básica."]],[["The agent blocked his card right away and opened a formal dispute file.","La agente bloqueó su tarjeta enseguida y abrió un expediente formal de disputa."],["She told him to stay calm because the law protected customers in cases like his.","Le dijo que mantuviera la calma porque la ley protegía a los clientes en casos como el suyo."],["A temporary credit would appear in his account within five business days.","Un crédito temporal aparecería en su cuenta dentro de cinco días hábiles."],["That gave Carlos a real sense of relief he had not expected.","Eso le dio a Carlos una verdadera sensación de alivio que no esperaba."],["He had assumed he would have to fight for weeks to get his money back.","Había supuesto que tendría que luchar durante semanas para recuperar su dinero."]],[["The full investigation would take about thirty days on average.","La investigación completa tomaría unos treinta días en promedio."],["During that time, Carlos would receive updates by email every week.","Durante ese tiempo, Carlos recibiría actualizaciones por correo cada semana."],["If the bank proved the charge was fraud, the credit became permanent automatically.","Si el banco demostraba que el cargo era fraude, el crédito se volvía permanente automáticamente."],["He would not lose a single sol of his hard-earned money.","No perdería ni un sol de su dinero ganado con esfuerzo."],["The whole process was much more organized than he had ever imagined.","Todo el proceso era mucho más organizado de lo que había imaginado."]],[["Over the following weeks, Carlos kept a close eye on his email and the bank app.","Durante las semanas siguientes, Carlos vigiló de cerca su correo y la aplicación del banco."],["Each update was short but reassuring, explaining which step the investigation had reached.","Cada actualización era corta pero tranquilizadora, explicando en qué paso estaba la investigación."],["He learned that staying patient was just as important as acting quickly at the start.","Aprendió que tener paciencia era tan importante como actuar rápido al principio."],["He also made a habit of reviewing his statement more carefully every single month.","También tomó la costumbre de revisar su estado de cuenta con más cuidado cada mes."],["A small problem caught early, he realized, was far easier to solve than a large one ignored.","Un problema pequeño detectado a tiempo, se dio cuenta, era mucho más fácil de resolver que uno grande ignorado."]],[["A new card arrived at his home three days later, exactly as promised.","Una tarjeta nueva llegó a su casa tres días después, exactamente como prometieron."],["Carlos set a new PIN, avoiding common patterns like birthdays and phone numbers.","Carlos estableció un nuevo PIN, evitando patrones comunes como cumpleaños y números de teléfono."],["He also activated text alerts for every single purchase on the card.","También activó alertas de texto para cada compra en la tarjeta."],["Now he would know about any movement within seconds, day or night.","Ahora sabría sobre cualquier movimiento en segundos, de día o de noche."],["This experience taught him a real lesson about staying alert in modern times.","Esta experiencia le enseñó una verdadera lección sobre mantenerse alerta en tiempos modernos."]]],"dlg":[["Carlos","Hello, I am calling because I saw a charge on my last bill that I do not recognize.","Hola, llamo porque vi un cargo en mi última cuenta que no reconozco."],["Agent","I understand your concern. Can you tell me the exact date and amount?","Entiendo su preocupación. ¿Puede decirme la fecha y el monto exacto?"],["Carlos","The date is October fifteenth, and the amount is two hundred soles.","La fecha es quince de octubre, y el monto es doscientos soles."],["Agent","Let me look at your account history quickly. One moment, please.","Déjeme revisar el historial de su cuenta rápidamente. Un momento, por favor."],["Carlos","Of course. I want to understand what this charge is about.","Por supuesto. Quiero entender de qué se trata este cargo."],["Agent","I can see the charge here. It was made at a store called North Market.","Veo el cargo aquí. Se hizo en una tienda llamada North Market."],["Carlos","I have never been to that store. I have never even heard of it before.","Nunca he estado en esa tienda. Ni siquiera había oído hablar de ella antes."],["Agent","Do you remember where your card was on that day in the afternoon?","¿Recuerda dónde estuvo su tarjeta ese día en la tarde?"],["Carlos","I was at my office the whole day. My card was in my wallet at my desk.","Estuve en mi oficina todo el día. Mi tarjeta estaba en mi billetera en mi escritorio."],["Agent","That is concerning. Someone may have used your card number without permission.","Eso es preocupante. Alguien pudo haber usado su número de tarjeta sin permiso."],["Carlos","How is that possible if the physical card never left my bag?","¿Cómo es eso posible si la tarjeta física nunca salió de mi bolso?"],["Agent","Sometimes thieves copy card data from websites or ATMs without you noticing.","A veces los ladrones copian los datos de la tarjeta de sitios web o cajeros sin que usted lo note."],["Carlos","That is scary. It is a deep concern for anyone who uses cards online.","Da miedo. Es una preocupación profunda para cualquiera que use tarjetas en línea."],["Agent","We warn our clients often about safe websites and secure connections.","Advertimos a nuestros clientes a menudo sobre sitios web seguros y conexiones seguras."],["Carlos","How do I deal with this situation now? What is the process to dispute?","¿Cómo manejo esta situación ahora? ¿Cuál es el proceso para disputar?"],["Agent","I will open a formal complaint and block your current card immediately.","Voy a abrir una queja formal y bloquear su tarjeta actual inmediatamente."],["Carlos","Will I lose that money, or does the bank return it while you investigate?","¿Perderé ese dinero, o el banco lo devuelve mientras investigan?"],["Agent","We return the amount as a temporary credit within five business days.","Devolvemos el monto como crédito temporal dentro de cinco días hábiles."],["Carlos","That is a real relief. I was worried I would have to fight for months.","Es un verdadero alivio. Me preocupaba tener que luchar durante meses."],["Agent","Our policy is clear concerning fraud. The bank has the authority to return the money quickly.","Nuestra política es clara con respecto al fraude. El banco tiene la autoridad para devolver el dinero rápidamente."],["Carlos","That is great. I have heard from friends that the process is mostly fast.","Eso es genial. He escuchado de amigos que el proceso es mayormente rápido."],["Agent","Yes. Cases like ours with clear evidence usually close without any problem.","Sí. Casos como el nuestro con evidencia clara normalmente cierran sin ningún problema."],["Carlos","How long does the full investigation usually take in cases like mine?","¿Cuánto tiempo toma normalmente la investigación completa en casos como el mío?"],["Agent","About thirty days on average. Sometimes we close them more quickly.","Unos treinta días en promedio. A veces los cerramos más rápidamente."],["Carlos","And what happens if the investigation proves that the charge was truly fraud?","¿Y qué pasa si la investigación demuestra que el cargo fue realmente un fraude?"],["Agent","The temporary credit becomes permanent, and you keep the money without any issue.","El crédito temporal se vuelve permanente, y usted se queda con el dinero sin ningún problema."],["Carlos","That is good to hear. Do I need to sign anything or send a document?","Es bueno saberlo. ¿Necesito firmar algo o enviar un documento?"],["Agent","I will send a form to your email. Please sign it and send it back today if possible.","Le enviaré un formulario a su correo. Por favor fírmelo y envíelo de vuelta hoy si es posible."],["Carlos","I will do it right away. What about my new card and its arrival?","Lo haré de inmediato. ¿Qué pasa con mi nueva tarjeta y su llegada?"],["Agent","It will arrive at your home in three to five business days by courier.","Llegará a su casa en tres a cinco días hábiles por mensajería."],["Carlos","Can I still pay my regular bills while I wait for the new card?","¿Puedo seguir pagando mis cuentas regulares mientras espero la nueva tarjeta?"],["Agent","Yes. You can use online transfers or our mobile app without any problem.","Sí. Puede usar transferencias en línea o nuestra aplicación móvil sin ningún problema."],["Carlos","Good. I do not want to be late with my rent or my electricity payment.","Bien. No quiero llegar tarde con mi alquiler o mi pago de electricidad."],["Agent","You will have full access to your account the entire time. Only the card is blocked.","Tendrá acceso completo a su cuenta todo el tiempo. Solo la tarjeta está bloqueada."],["Carlos","I really appreciate how quickly you handled this for me today.","Realmente aprecio qué tan rápido manejó esto por mí hoy."],["Agent","Take care, Carlos. We will call you as soon as the investigation ends.","Cuídese, Carlos. Lo llamaremos tan pronto como termine la investigación."]],"datos":{"0":"<i>would sit</i> aquí = costumbre del pasado: «se sentaba». No es el condicional «se sentaría»; el contexto (cada mes) lo indica."}},"3":{"sTitle":"A Month of Smart Saving","sTitleEs":"Un mes de ahorro inteligente","dTitle":"Planning the Monthly Budget","dTitleEs":"Planning the Monthly Budget","paras":[[["Diana had a stable job, but her money seemed to disappear every single month.","Diana tenía un trabajo estable, pero su dinero parecía desaparecer cada mes."],["She worked hard, and yet her bank balance was always low by the end.","Trabajaba duro, y aún así su saldo bancario siempre estaba bajo al final."],["She never really understood what her real problem was until recently.","Nunca entendió realmente cuál era su problema real hasta hace poco."],["A friend at the office told her about a simple monthly planning method.","Una amiga en la oficina le contó sobre un método simple de planificación mensual."],["Diana decided to try it for one full month, with no excuses allowed.","Diana decidió probarlo por un mes completo, sin excusas permitidas."]],[["The first step was to look at her last three months of statements carefully.","El primer paso fue mirar sus últimos tres meses de estados de cuenta con cuidado."],["She made a simple chart with every expense grouped into basic categories.","Hizo un gráfico simple con cada gasto agrupado en categorías básicas."],["Rent, food, transport, and utilities were the biggest, fixed items each month.","Alquiler, comida, transporte, y servicios eran los rubros más grandes y fijos cada mes."],["The real surprise was how much she spent on small daily purchases.","La verdadera sorpresa fue cuánto gastaba en pequeñas compras diarias."],["Coffee, snacks, and little treats added up to a shocking amount every month.","El café, los bocadillos, y pequeños gustos sumaban un monto impactante cada mes."]],[["She also discovered that she was paying for four different subscriptions.","También descubrió que estaba pagando por cuatro suscripciones diferentes."],["She only used one of them regularly for her weekly entertainment.","Solo usaba una de ellas regularmente para su entretenimiento semanal."],["The other three, including a french recipe app she never opened, were a weak reason to waste money.","Las otras tres, incluyendo una aplicación francesa de recetas que nunca abría, eran una razón débil para malgastar dinero."],["She canceled all three on the same day, without feeling any real loss.","Canceló las tres el mismo día, sin sentir ninguna pérdida real."],["That small step saved her almost eighty soles per month without any effort.","Ese pequeño paso le ahorró casi ochenta soles al mes sin ningún esfuerzo."]],[["Next, Diana set a monthly budget for every category on her chart.","Luego, Diana fijó un presupuesto mensual para cada categoría en su gráfico."],["She gave herself a reasonable amount for fun, food, and small treats.","Se dio a sí misma un monto razonable para diversión, comida, y pequeños gustos."],["She put a hard limit on eating out, no more than six times per month.","Puso un límite firme en comer fuera, no más de seis veces al mes."],["She started cooking fresh meals at home on weekends in large batches.","Empezó a cocinar comidas frescas en casa los fines de semana en grandes cantidades."],["Those home meals tasted better and cost a fraction of restaurant food.","Esas comidas caseras sabían mejor y costaban una fracción de la comida del restaurante."]],[["The most important step was setting up an automatic transfer every payday.","El paso más importante fue configurar una transferencia automática cada día de pago."],["Ten percent of her salary moved into a separate savings account immediately.","El diez por ciento de su salario se movía a una cuenta de ahorros separada inmediatamente."],["This became her iron rule, one she refused to break for any small excuse.","Esta se convirtió en su regla de hierro, una que se negaba a romper por cualquier pequeña excusa."],["She could not see that money in her main account, so she could not spend it.","No podía ver ese dinero en su cuenta principal, así que no podía gastarlo."],["After a few weeks, she did not even miss the amount she was saving.","Después de unas semanas, ni siquiera extrañaba el monto que estaba ahorrando."]],[["Diana also started to track every purchase in a small notebook every night.","Diana también empezó a rastrear cada compra en un pequeño cuaderno cada noche."],["It took only five minutes, but the patterns it showed her were priceless.","Tomaba solo cinco minutos, pero los patrones que le mostraba no tenían precio."],["She noticed that she spent the most money when she was tired or upset.","Notó que gastaba más dinero cuando estaba cansada o molesta."],["Understanding that weakness helped her avoid the same trap again and again.","Entender esa debilidad le ayudó a evitar la misma trampa una y otra vez."],["The notebook slowly taught her to make better choices step by step.","El cuaderno lentamente le enseñó a tomar mejores decisiones paso a paso."]],[["Halfway through the month, Diana faced her first real test.","A mitad del mes, Diana enfrentó su primera prueba real."],["A clothing store near her office had a big sale, and the discounts were tempting.","Una tienda de ropa cerca de su oficina tenía una gran oferta, y los descuentos eran tentadores."],["In the past, she would have bought several items without thinking twice.","En el pasado, habría comprado varias cosas sin pensarlo dos veces."],["This time, she checked her budget app before deciding.","Esta vez, revisó su aplicación de presupuesto antes de decidir."],["There was no room left in her shopping category, so she walked away with only the one shirt she truly needed.","No quedaba espacio en su categoría de compras, así que se fue solo con la camisa que de verdad necesitaba."],["It was a small victory, but it felt enormous.","Fue una pequeña victoria, pero se sintió enorme."]],[["By the end of the month, her savings account had a real balance for once.","Al final del mes, su cuenta de ahorros tenía un saldo real por una vez."],["It was not a huge amount, but it was a true stepping stone toward something solid.","No era un monto enorme, pero era un verdadero trampolín hacia algo sólido."],["She felt stronger, more in control, and proud of what she had built.","Se sentía más fuerte, más en control, y orgullosa de lo que había construido."],["Diana assumed this was just the start of a much better financial life.","Diana suponía que esto era solo el comienzo de una vida financiera mucho mejor."],["Next month, she would aim to save a little more, one small step at a time.","El próximo mes, apuntaría a ahorrar un poco más, un pequeño paso a la vez."]]],"dlg":[["Diana","Luis, we really need to sit down and arrange our spending for the month.","Luis, realmente necesitamos sentarnos y organizar nuestros gastos del mes."],["Luis","I know. Our last statement was a shock. We spent too much in many areas.","Lo sé. Nuestro último estado de cuenta fue un susto. Gastamos demasiado en muchas áreas."],["Diana","Let me show you this simple chart I made to track our real costs.","Déjame mostrarte este gráfico simple que hice para rastrear nuestros costos reales."],["Luis","Good idea. I want to understand where our money actually goes every month.","Buena idea. Quiero entender a dónde va realmente nuestro dinero cada mes."],["Diana","Rent is our biggest expense, followed by food and basic utilities.","El alquiler es nuestro mayor gasto, seguido de comida y servicios básicos."],["Luis","That is normal for most families. What worries me is the rest of the list.","Es normal para la mayoría de las familias. Lo que me preocupa es el resto de la lista."],["Diana","We are paying for five subscriptions, and we rarely use three of them.","Estamos pagando por cinco suscripciones, y rara vez usamos tres de ellas."],["Luis","That is money we are throwing away every single month without a clear purpose.","Es dinero que estamos botando cada mes sin un propósito claro."],["Diana","Exactly. I think we should cancel the ones we have not opened in weeks.","Exactamente. Creo que deberíamos cancelar las que no hemos abierto en semanas."],["Luis","I agree. Let me count how many hours I actually spent on each one last month.","Estoy de acuerdo. Déjame contar cuántas horas realmente pasé en cada una el mes pasado."],["Diana","Food is another big area where we can save without suffering at all.","La comida es otra gran área donde podemos ahorrar sin sufrir en absoluto."],["Luis","We eat out too often, and those small meals add up to a surprising amount.","Comemos fuera con demasiada frecuencia, y esas pequeñas comidas suman un monto sorprendente."],["Diana","If we cook at home four nights a week, we save around two hundred soles.","Si cocinamos en casa cuatro noches a la semana, ahorramos alrededor de doscientos soles."],["Luis","Plus home food is healthier, and we can prepare it on weekends quickly.","Además la comida casera es más saludable, y podemos prepararla los fines de semana rápidamente."],["Diana","Let me advise you on something concerning our phone plans, too.","Déjame aconsejarte sobre algo con respecto a nuestros planes de teléfono, también."],["Luis","What about them? I thought our current plan was already the cheapest option.","¿Qué pasa con ellos? Pensé que nuestro plan actual ya era la opción más barata."],["Diana","I compared plans last week. A prepaid option would save us fifty soles monthly.","Comparé planes la semana pasada. Una opción prepagada nos ahorraría cincuenta soles mensuales."],["Luis","But with prepaid, we have to pay attention to how much data we use each day.","Pero con prepagado, tenemos que prestar atención a cuántos datos usamos cada día."],["Diana","That is a small trade-off for the money we keep at the end of the month.","Es un pequeño intercambio por el dinero que guardamos al final del mes."],["Luis","Fair point. We can switch after our current contract ends in a few weeks.","Buen punto. Podemos cambiar después de que nuestro contrato actual termine en unas semanas."],["Diana","Now, the most important step is to save something every single month.","Ahora, el paso más importante es ahorrar algo cada mes."],["Luis","Is there a good ratio between saving and spending for people like us?","¿Hay una buena proporción entre ahorrar y gastar para gente como nosotros?"],["Diana","Ten percent of our income. That is a healthy average for most families.","El diez por ciento de nuestros ingresos. Es un promedio saludable para la mayoría de las familias."],["Luis","Even a tiny amount of saving is better than nothing every month.","Incluso un monto minúsculo de ahorro es mejor que nada cada mes."],["Luis","That sounds like a lot at first, but I trust you because you have been studying this.","Suena como mucho al principio, pero confío en ti porque has estado estudiando esto."],["Diana","The trick is to move that money immediately after we get paid each month.","El truco es mover ese dinero inmediatamente después de que nos paguen cada mes."],["Luis","Otherwise, we will spend it on small things without even noticing.","De lo contrario, lo gastaremos en pequeñas cosas sin siquiera darnos cuenta."],["Diana","Exactly. I set up an automatic transfer to a separate savings account.","Exactamente. Configuré una transferencia automática a una cuenta de ahorros separada."],["Luis","That is smart. Out of sight, out of mind, as the common saying goes.","Es inteligente. Lejos de la vista, lejos de la mente, como dice el dicho común."],["Diana","I also want to start tracking every purchase in a small pair of notebooks this month.","También quiero empezar a rastrear cada compra en un par de pequeños cuadernos este mes."],["Luis","I will do the same. It will teach us to understand our own patterns and weaknesses.","Haré lo mismo. Nos enseñará a entender nuestros propios patrones y debilidades."],["Diana","If we both follow this plan, we could save a real amount by December.","Si ambos seguimos este plan, podríamos ahorrar un monto real para diciembre."],["Luis","I want to travel next year, so this is a good reason to stay disciplined.","Quiero viajar el próximo año, así que esta es una buena razón para mantenerme disciplinado."],["Diana","We can do this together. Let me set a date to review our progress in a month.","Podemos hacerlo juntos. Déjame fijar una fecha para revisar nuestro progreso en un mes."],["Luis","Sounds good. I will prepare my own notes before we meet again, I promise.","Suena bien. Prepararé mis propias notas antes de reunirnos de nuevo, lo prometo."]],"datos":{"0":"<i>seem to + verbo</i> = «parecer que…»: <i>her money seemed to disappear</i> = «su dinero parecía desaparecer»."}},"4":{"sTitle":"Marcos and the Frozen Card","sTitleEs":"Marcos y la tarjeta congelada","dTitle":"A Lost Card and a Blocked Account","dTitleEs":"A Lost Card and a Blocked Account","paras":[[["Marcos felt for his wallet on the bus and his heart sank.","Marcos buscó su billetera en el autobús y se le encogió el corazón."],["The small leather wallet was simply not in any of his pockets.","La pequeña billetera de cuero simplemente no estaba en ninguno de sus bolsillos."],["He had used his card barely an hour ago at a corner shop.","Había usado su tarjeta apenas una hora antes en una tienda de la esquina."],["Now, somewhere between that shop and the bus, it had vanished.","Ahora, en algún punto entre esa tienda y el autobús, había desaparecido."],["A cold weight settled in his stomach as the bus rolled on.","Un peso frío se asentó en su estómago mientras el autobús seguía avanzando."]],[["He could not run back and search every dark street tonight.","No podía volver corriendo y buscar en cada calle oscura esta noche."],["Instead, he forced himself to stay calm and think one step at a time.","En cambio, se obligó a sí mismo a mantener la calma y pensar paso a paso."],["The first priority was the card, not the wallet or the cash.","La primera prioridad era la tarjeta, no la billetera ni el efectivo."],["A lost card itself is not a disaster if you act fast.","Una tarjeta perdida en sí misma no es un desastre si actúas rápido."],["The real danger is the time between losing it and locking it.","El verdadero peligro es el tiempo entre perderla y bloquearla."]],[["Marcos opened the bank app on his phone right there on the bus.","Marcos abrió la aplicación del banco en su teléfono allí mismo en el autobús."],["The modern app had a bright button that said freeze card.","La aplicación moderna tenía un botón brillante que decía congelar tarjeta."],["He tapped it, and the card was frozen before anyone could use it.","Lo tocó, y la tarjeta quedó congelada antes de que alguien pudiera usarla."],["No phone call, no waiting in line, no long form to fill.","Sin llamada, sin esperar en fila, sin un largo formulario que llenar."],["He let out a long breath as the small lock icon appeared.","Soltó un largo suspiro cuando apareció el pequeño ícono de candado."]],[["Freezing the card was only the first half of getting access back.","Congelar la tarjeta era solo la primera mitad de recuperar el acceso."],["The app asked him to confirm his identity before doing anything more.","La aplicación le pidió confirmar su identidad antes de hacer cualquier otra cosa."],["He entered his ID number, his date of birth, and a one-time code.","Ingresó su número de documento, su fecha de nacimiento, y un código de un solo uso."],["A message buzzed on his phone within seconds with six digits.","Un mensaje vibró en su teléfono en segundos con seis dígitos."],["He typed them in and watched the screen unlock his account again.","Los escribió y observó cómo la pantalla desbloqueaba su cuenta de nuevo."]],[["With his access restored, Marcos could finally check his recent activity.","Con su acceso restaurado, Marcos por fin pudo revisar su actividad reciente."],["He scrolled through the list and, to his relief, found nothing strange.","Recorrió la lista y, para su alivio, no encontró nada extraño."],["There were no purchases at a gas station or a shop like Ion Volt.","No había compras en una gasolinera ni en una tienda como Ion Volt."],["The freeze had worked exactly as the bank had promised it would.","El congelamiento había funcionado exactamente como el banco había prometido."],["His money was safe, sitting quietly in his account where it belonged.","Su dinero estaba a salvo, descansando tranquilo en su cuenta donde pertenecía."]],[["The next morning, Marcos walked into his local branch for a new card.","A la mañana siguiente, Marcos entró a su sucursal local por una tarjeta nueva."],["A friendly clerk verified his identity and printed a fresh card on the spot.","Un empleado amable verificó su identidad e imprimió una tarjeta fresca en el momento."],["She advised him to keep the digital card in his app as backup.","Le aconsejó guardar la tarjeta digital en su aplicación como respaldo."],["That way, he could pay with his phone while the plastic arrived.","De esa manera, podía pagar con su teléfono mientras llegaba el plástico."],["Marcos thanked her and promised himself he would watch his wallet closely.","Marcos le agradeció y se prometió a sí mismo que vigilaría su billetera de cerca."]],[["That night, before going to sleep, Marcos changed a few settings in the bank app.","Esa noche, antes de dormir, Marcos cambió algunos ajustes en la aplicación del banco."],["He turned on instant alerts so he would get a message for every purchase, no matter how small.","Activó las alertas instantáneas para recibir un mensaje por cada compra, por pequeña que fuera."],["He also wrote down the bank emergency number and saved it in his contacts.","También anotó el número de emergencia del banco y lo guardó en sus contactos."],["Losing his wallet had been stressful, but the freeze button had saved him from something far worse.","Perder la billetera había sido estresante, pero el botón de congelar lo había salvado de algo mucho peor."],["He understood now that the right tool, used calmly, could turn a disaster into a minor problem.","Ahora entendía que la herramienta correcta, usada con calma, podía convertir un desastre en un problema menor."]],[["On the walk home, Marcos passed the small park near the hospital.","En el camino a casa, Marcos pasó por el pequeño parque cerca del hospital."],["He noticed a tiny mole digging quietly beside the path.","Notó un topo diminuto cavando tranquilamente junto al sendero."],["He smiled, because his own small panic now felt distant and silly.","Sonrió, porque su propio pequeño pánico ahora se sentía distante y tonto."],["A lost card, he realized, was only a problem if you waited.","Una tarjeta perdida, se dio cuenta, solo era un problema si esperabas."],["Knowing how to freeze and recover his access had turned fear into one calm step.","Saber cómo congelar y recuperar su acceso había convertido el miedo en un paso tranquilo."]]],"dlg":[["Marcos","Hello, I need urgent help. I lost my card while traveling last night.","Hola, necesito ayuda urgente. Perdí mi tarjeta mientras viajaba anoche."],["Teller","I am sorry to hear that. Let me help you block it immediately.","Lamento escuchar eso. Déjeme ayudarlo a bloquearla inmediatamente."],["Marcos","Thank you. I have been worried sick since I noticed it was gone this morning.","Gracias. He estado muy preocupado desde que noté que no estaba esta mañana."],["Teller","Please give me your ID and tell me your full name and date of birth.","Por favor deme su documento y dígame su nombre completo y fecha de nacimiento."],["Marcos","My name is Marcos Delgado. My birthday is March second, nineteen ninety.","Mi nombre es Marcos Delgado. Mi cumpleaños es dos de marzo, mil novecientos noventa."],["Teller","Thank you. I can see your account here. Let me check recent activity quickly.","Gracias. Veo su cuenta aquí. Déjeme revisar la actividad reciente rápidamente."],["Marcos","Is there anything strange? I am afraid someone used my card already.","¿Hay algo extraño? Tengo miedo de que alguien ya haya usado mi tarjeta."],["Teller","Oh, I see two charges last night. One at a gas station and one at a shop.","Oh, veo dos cargos anoche. Uno en una gasolinera y uno en una tienda."],["Marcos","Those are not mine. I was already at the hospital visiting my aunt last night.","Esos no son míos. Ya estaba en el hospital visitando a mi tía anoche."],["Teller","Neither the gas station nor the shop is anywhere near the hospital here.","Ni la gasolinera ni la tienda están cerca del hospital aquí."],["Marcos","Exactly. I will stick to the truth. Someone else made those charges without me.","Exactamente. Me atendré a la verdad. Otra persona hizo esos cargos sin mí."],["Teller","This is a more complex case. Let me call my manager to help us right away.","Es un caso más complejo. Déjeme llamar a mi gerente para que nos ayude enseguida."],["Manager","Good morning. I am the branch manager. My colleague explained your situation briefly.","Buenos días. Soy el gerente de la sucursal. Mi colega explicó su situación brevemente."],["Marcos","Good morning. I really need this solved today, if at all possible.","Buenos días. Realmente necesito esto resuelto hoy, si es posible."],["Manager","I understand. Please stay calm. We will handle this step by step together.","Entiendo. Por favor mantenga la calma. Manejaremos esto paso a paso juntos."],["Teller","I already blocked the card in the system while we wait for instructions.","Ya bloqueé la tarjeta en el sistema mientras esperamos instrucciones."],["Manager","Very good. Now let us review the two fraudulent charges on his account closely.","Muy bien. Ahora revisemos los dos cargos fraudulentos en su cuenta de cerca."],["Marcos","The total is over four hundred soles. That is a lot of money for me.","El total es más de cuatrocientos soles. Es mucho dinero para mí."],["Manager","We will open a formal dispute today. The law protects you in cases like this.","Abriremos una disputa formal hoy. La ley lo protege en casos como este."],["Teller","Should I prepare the dispute form or do you want to handle it directly?","¿Debo preparar el formulario de disputa o quiere manejarlo directamente?"],["Manager","Please prepare it. Marcos, we will also give you a temporary credit very quickly.","Por favor prepárelo. Marcos, también le daremos un crédito temporal muy rápidamente."],["Marcos","How quickly, exactly? I have bills to pay at the end of this week.","¿Qué tan rápidamente, exactamente? Tengo cuentas que pagar al final de esta semana."],["Manager","Within twenty-four hours. The money will appear in your account tomorrow morning.","Dentro de veinticuatro horas. El dinero aparecerá en su cuenta mañana en la mañana."],["Teller","I have the form ready. Marcos, please read it and sign at the bottom.","Tengo el formulario listo. Marcos, por favor léalo y firme al final."],["Marcos","Let me read it carefully first. I want to understand the terms well.","Déjeme leerlo con cuidado primero. Quiero entender los términos bien."],["Manager","That is very wise. Take your time. Ask us anything that is not clear.","Eso es muy sabio. Tómese su tiempo. Pregúntenos cualquier cosa que no esté clara."],["Marcos","This section here mentions a thirty-day investigation. What does it mean for me?","Esta sección aquí menciona una investigación de treinta días. ¿Qué significa para mí?"],["Manager","It is the time we need to prove that the charges were not made by you.","Es el tiempo que necesitamos para demostrar que los cargos no fueron hechos por usted."],["Teller","During that month, the temporary credit stays in your account without any problem.","Durante ese mes, el crédito temporal se queda en su cuenta sin ningún problema."],["Marcos","And if the bank proves I was not the one who made them?","¿Y si el banco demuestra que no fui yo quien los hizo?"],["Manager","Then the credit becomes permanent, and the case closes in your favor automatically.","Entonces el crédito se vuelve permanente, y el caso cierra a su favor automáticamente."],["Marcos","Good. I will sign now. What about my new card? When does it arrive?","Bien. Firmaré ahora. ¿Qué pasa con mi nueva tarjeta? ¿Cuándo llega?"],["Teller","I can produce a new card right here at this office in about fifteen minutes.","Puedo producir una nueva tarjeta aquí mismo en esta oficina en unos quince minutos."],["Manager","That is the fastest option. You will leave today with a fully working card.","Es la opción más rápida. Saldrá hoy con una tarjeta completamente funcional."],["Marcos","That is a huge relief. I really thought this would take days to fix.","Es un alivio enorme. Realmente pensé que esto tomaría días para arreglarse."],["Manager","Our purpose is to protect our clients quickly. We do not want you to suffer.","Nuestro propósito es proteger a nuestros clientes rápidamente. No queremos que usted sufra."],["Teller","I will also help you set a new PIN that you can remember but nobody can guess.","También lo ayudaré a establecer un nuevo PIN que pueda recordar pero que nadie pueda adivinar."],["Marcos","Please help me choose a good one. I do not want this trouble to happen again.","Por favor ayúdeme a elegir uno bueno. No quiero que este problema vuelva a ocurrir."],["Manager","A good tip is to avoid your birthday, your phone, or simple number patterns.","Un buen consejo es evitar su cumpleaños, su teléfono, o patrones simples de números."],["Teller","Also, never share the number with anyone, not even with a family member.","Además, nunca comparta el número con nadie, ni siquiera con un miembro de la familia."],["Marcos","I will be much more careful from now on. This has been a real lesson.","Seré mucho más cuidadoso de ahora en adelante. Esto ha sido una verdadera lección."],["Manager","It is a common situation. Many of our customers learn the same lesson the hard way.","Es una situación común. Muchos de nuestros clientes aprenden la misma lección por las malas."],["Marcos","Is there anything else I should do to protect myself in the future?","¿Hay algo más que deba hacer para protegerme en el futuro?"],["Teller","You can set a lower daily limit on the card for extra safety each day.","Puede establecer un límite diario más bajo en la tarjeta para mayor seguridad cada día."],["Manager","I also advise you to activate text alerts for every single purchase you make.","También le aconsejo que active alertas de texto para cada compra que haga."],["Marcos","I like that idea. I can react quickly if something strange happens next time.","Me gusta esa idea. Puedo reaccionar rápidamente si algo extraño sucede la próxima vez."],["Teller","Your new card is ready. Please come to this window and set your PIN now.","Su nueva tarjeta está lista. Por favor venga a esta ventanilla y establezca su PIN ahora."],["Marcos","Thank you both so much. You have been incredibly friendly and efficient.","Muchas gracias a ambos. Han sido increíblemente amables y eficientes."],["Manager","It was our pleasure. Please call us directly if you have any more concerns.","Fue nuestro placer. Por favor llámenos directamente si tiene más preocupaciones."],["Teller","Take care, Marcos. Stay safe, and enjoy the rest of your week.","Cuídese, Marcos. Manténgase seguro, y disfrute el resto de su semana."]],"datos":{"0":"<i>his heart sank</i> = «se le cayó el alma a los pies». Es una expresión: traducida literal suena rara, pero en inglés es común para el susto o desánimo."}}};
let PARAS = [];
const STEPS = {
  'pre-a1':{ es:{t:'Cómo leer (Pre-A1 · 5 pasos)', s:['Lee la traducción en español.','Escucha el audio siguiendo el texto en español, sincronizando ambos en tu mente.','Escucha el audio siguiendo el texto ahora en inglés.','Escucha y lee en voz alta (mejora la pronunciación).','Responde (según la actividad).'], n:'La 1ª vez lee con el español visible. Las siguientes veces, intenta sin él (actívalo solo si lo necesitas). En los pasos 2 y 3, fíjate en las palabras que ya entiendes.'},
             en:{t:'How to read (Pre-A1 · 5 steps)', s:['Read the Spanish translation.','Listen to the audio while following the text in Spanish, syncing both in your mind.','Listen to the audio while following the text now in English.','Listen and read aloud (to improve pronunciation).','Answer (depending on the activity).'], n:'The 1st time, read with the Spanish visible. Next times, try without it (turn it on only if you need it). In steps 2 and 3, notice the words you already understand.'} },
  'a1':{ es:{t:'Cómo leer (A1 · 4 pasos)', s:['Escucha el audio y sigue el texto en español, sincronizando ambos.','Escucha el audio siguiendo el texto en inglés.','Escucha / lee en voz alta.','Responde.'], n:'En los pasos de escucha, fíjate en las palabras que ya entiendes (puedes anotarlas).'},
         en:{t:'How to read (A1 · 4 steps)', s:['Listen to the audio and follow the text in Spanish, syncing both.','Listen to the audio while following the text in English.','Listen / read aloud.','Answer.'], n:'During the listening steps, notice the words you already understand (you can write them down).'} },
  'a2':{ es:{t:'Cómo leer (A2 · 2 pasos)', s:['Escucha y luego lee en voz alta (mejora la pronunciación).','Responde.'], n:'Usa la traducción solo para confirmar tu comprensión.'},
         en:{t:'How to read (A2 · 2 steps)', s:['Listen, then read aloud (to improve pronunciation).','Answer.'], n:'Use the translation only to confirm your comprehension.'} }
};
const UI = {
  es:{ back:'↩ Vuelve a la práctica en la plataforma', voc:'Vocabulario', datos:'Datos', txt:'Texto', play:'Escuchar todo', pause:'Pausar', pPlay:'Escuchar', pPause:'Pausar', mark:'Marcar que terminé de leer', marked:'¡Lectura marcada! ✓',
       vpTitle:'Vocabulario del módulo', vpSub:'Palabras clave · toca 🔊 para escuchar', ringNext:'10 min → +5 XP', helpT:'¿Cómo uso este material?', tipsT:'Para qué sirve cada botón:', tips:['<b>🧭 Pasos:</b> el método para leer esta historia, paso a paso.','<b>▶ Escuchar todo</b> o el ▶ de cada párrafo: audio en inglés, con pausa.','<b>Texto EN/ES/EN+ES:</b> muestra inglés, español o ambos.','<b>💡 Datos:</b> activa las notas de traducción (lo que no se traduce literal).','<b>📖 Vocabulario:</b> palabras clave con significado y 🔊.','<b>🔊 US/UK</b> y la barra 🐢—🐇: acento y velocidad del audio.','<b>A− / A+:</b> tamaño de letra.','<b>⏱ Medidor:</b> cuenta tu tiempo de lectura; leer suma XP (sin nota).','<b>🌐 ES/EN:</b> idioma de las instrucciones (no del texto de la historia).','<b>✓ Terminar:</b> marca tu lectura como hecha.'],
        endT:'¡Terminaste la lectura!', endP:'Sin nota: leer suma XP por tiempo. Mientras más lees con calma, más ganas.', eTimeL:'Tiempo leído', eXpL:'XP de lectura', endBack:'↩ Volver a la plataforma', xpMsg:m=>'🎉 +'+(m>=30?15:m>=20?10:5)+' XP por '+m+' min de lectura' },
  en:{ back:'↩ Back to your practice in the platform', voc:'Vocabulary', datos:'Tips', txt:'Text', play:'Listen to all', pause:'Pause', pPlay:'Listen', pPause:'Pause', mark:'Mark that I finished reading', marked:'Reading marked! ✓',
       vpTitle:'Module vocabulary', vpSub:'Key words · tap 🔊 to listen', ringNext:'10 min → +5 XP', helpT:'How do I use this material?', tipsT:'What each button is for:', tips:['<b>🧭 Steps:</b> the method to read this story, step by step.','<b>▶ Listen to all</b> or each paragraph’s ▶: English audio, with pause.','<b>Text EN/ES/EN+ES:</b> show English, Spanish or both.','<b>💡 Tips:</b> turn on the translation notes (what isn’t literal).','<b>📖 Vocabulary:</b> key words with meaning and 🔊.','<b>🔊 US/UK</b> and the 🐢—🐇 slider: audio accent and speed.','<b>A− / A+:</b> text size.','<b>⏱ Meter:</b> counts your reading time; reading earns XP (no grade).','<b>🌐 ES/EN:</b> language of the instructions (not the story text).','<b>✓ Finish:</b> mark your reading as done.'],
       endT:'You finished the reading!', endP:'No grade: reading earns XP by time. The more you read calmly, the more you earn.', eTimeL:'Time read', eXpL:'Reading XP', endBack:'↩ Back to the platform', xpMsg:m=>'🎉 +'+(m>=30?15:m>=20?10:5)+' XP for '+m+' min of reading' }
};
let info='en', voice='US', rate=1, secs=0, marked=false, milestones={10:false,20:false,30:false};
let storyId=1; const ST_TITLES={1:{es:STORYDATA[1].sTitleEs,en:STORYDATA[1].sTitle},2:{es:STORYDATA[2].sTitleEs,en:STORYDATA[2].sTitle},3:{es:STORYDATA[3].sTitleEs,en:STORYDATA[3].sTitle},4:{es:STORYDATA[4].sTitleEs,en:STORYDATA[4].sTitle}};
function renderStPick(){ const es=info!=='en'; document.getElementById('spkH').textContent= es?'Elige tu lectura':'Choose your reading'; document.getElementById('spkS').textContent= es?'¿Qué Story + Diálogo vas a leer? Tu elección se registra para tu seguimiento.':'Which Story + Dialogue will you read? Your choice is logged for your tracking.';
  document.getElementById('spkList').innerHTML=[1,2,3,4].map(n=>{ const has=true; const t=ST_TITLES[n][es?'es':'en']; return `<div class="stcard ${has?'':'lock'}" onclick="${has?`pickStory(${n})`:`toast('${es?'Demo: usa la Story 1':'Demo: use Story 1'}')`}"><div class="nx">${has?'📖':'🔒'}</div><div class="si"><b>Story ${n} · Diálogo ${n}</b><span>${t}</span></div><div class="go">${has?'›':'🔒'}</div></div>`; }).join(''); }
function backToPicker(){ try{pausePlay();}catch(e){} document.getElementById('stpick').style.display='block'; window.scrollTo(0,0); }
function updateTitles(){ const d=STORYDATA[storyId], es=info!=='en'; document.getElementById('stitle').textContent= curView==='dlg'?(es?d.dTitleEs:d.dTitle):(es?d.sTitleEs:d.sTitle); document.getElementById('ssub').textContent=(curView==='dlg'?(es?'Diálogo ':'Dialogue '):'Story ')+storyId; }
function pickStory(n){ storyId=n; const d=STORYDATA[n];
  PARAS = d.paras.map((p,i)=>({pairs:p.map(x=>({en:x[0],es:x[1]})), dato:(d.datos&&d.datos[i])||null}));
  DLG = d.dlg.map(t=>({sp:t[0], pairs:[{en:t[1],es:t[2]}]}));
  curView='story'; VIEW=PARAS;
  document.getElementById('stpick').style.display='none'; document.getElementById('helpfab').classList.remove('hidden');
  const lv=document.getElementById('screen').getAttribute('data-level'); const nm={'pre-a1':'Pre-A1','a1':'A1','a2':'A2'}[lv]||'Pre-A1';
  document.getElementById('mhsub').textContent= nm+' · M2 · Banking, Money & Admin';
  document.getElementById('vwStory').classList.add('on'); document.getElementById('vwDlg').classList.remove('on');
  updateTitles(); render(); window.scrollTo(0,0); }
let ALL=[], gi=0, gEnd=0, gScope='all', gPlaying=false;
function L(){ return UI[info]; }
let DLG = [];
let VIEW = PARAS, curView='story';
function setView(v){ if(v===curView) return; pausePlay(); curView=v; VIEW= v==='dlg'?DLG:PARAS;
  document.getElementById('vwStory').classList.toggle('on',v==='story'); document.getElementById('vwDlg').classList.toggle('on',v==='dlg');
  updateTitles(); render(); }
function render(){
  document.getElementById('paras').innerHTML = VIEW.map((p,pi)=>{
    const sp = p.sp?`<div class="dsp">${p.sp}</div>`:'';
    const en=p.pairs.map((q,si)=>`<span class="sent" id="s${pi}_${si}">${q.en}</span>`).join(' ');
    const es=p.pairs.map((q,si)=>`<span class="sente" id="e${pi}_${si}">${q.es}</span>`).join(' ');
    const dato=p.dato?`<div class="dato"><div class="hd">💡 Dato de traducción</div>${p.dato}</div>`:'';
    return `<div class="para" id="p${pi}">${sp}<div class="ptext">${en}</div><div class="pes" id="pes${pi}">${es}</div>
      <div class="prow"><button class="pbtn play" id="play${pi}" onclick="playPara(${pi})">▶ <span class="pl"></span></button></div>${dato}</div>`;
  }).join('');
  ALL=[]; VIEW.forEach((p,pi)=>p.pairs.forEach((q,si)=>ALL.push({pi,si}))); gi=0; gScope='all'; gEnd=ALL.length;
  applyInfo();
}
function applyInfo(){ const u=L(), st=STEPS[document.getElementById('screen').getAttribute('data-level')][info];
  document.getElementById('vocLab').textContent=u.voc; document.getElementById('datosLab').textContent=u.datos; document.getElementById('txtLab').textContent=u.txt; document.getElementById('ringNext').textContent=u.ringNext;
  document.getElementById('markLab').textContent= marked? u.marked : u.mark;
  document.getElementById('howtoT').textContent=st.t;
  document.getElementById('howtoB').innerHTML = st.s.map((x,k)=>`<div class="stepline"><span class="stepn">${k+1}</span><span>${x}</span></div>`).join('')+`<div class="stepnote">📝 ${st.n}</div>`;
  document.getElementById('helpT').textContent=u.helpT;
  document.getElementById('helpTips').innerHTML = `<div style="font-size:11.5px;color:var(--text-soft);font-weight:700;margin-bottom:6px">${u.tipsT}</div>`+ u.tips.map(t=>`<div class="helptip">• <span>${t}</span></div>`).join('');
  document.getElementById('endT').textContent=u.endT; document.getElementById('endP').textContent=u.endP; document.getElementById('eTimeL').textContent=u.eTimeL; document.getElementById('eXpL').textContent=u.eXpL; document.getElementById('endBack').textContent=u.endBack;
  document.getElementById('vpTitle').textContent=u.vpTitle; document.getElementById('vpSub').textContent=u.vpSub;
  document.getElementById('inEs').classList.toggle('on',info==='es'); document.getElementById('inEn').classList.toggle('on',info==='en');
  setBtns();
}
function toggleDatos(){ const s=document.getElementById('screen'); const on=s.getAttribute('data-datos')==='on'; s.setAttribute('data-datos',on?'off':'on'); document.getElementById('datosBtn').classList.toggle('on',!on); }
function openHelp(){ document.getElementById('helpov').classList.add('show'); } function closeHelp(){ document.getElementById('helpov').classList.remove('show'); }
function openVocab(){ document.getElementById('vlist').innerHTML = GLOSS.map(g=>`<div class="vrow"><span class="vw">${g.w}</span><span class="vm">${g.es}<span class="vex">“${g.ex}”</span></span><button class="spk" onclick="say('${g.w.replace(/'/g,'')}')">🔊</button></div>`).join(''); document.getElementById('vpanel').classList.add('show'); }
function closeVocab(){ document.getElementById('vpanel').classList.remove('show'); }
function pickVoice(){ try{ const vs=speechSynthesis.getVoices()||[]; const want=voice==='US'?'en-US':'en-GB'; return vs.find(v=>v.lang===want)||vs.find(v=>v.lang&&v.lang.indexOf('en')===0)||null; }catch(e){ return null; } }
function say(text,onend){ try{ if(!('speechSynthesis' in window))throw 0; speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text); u.rate=rate; const v=pickVoice(); if(v){u.voice=v;u.lang=v.lang;}else u.lang=voice==='US'?'en-US':'en-GB'; if(onend)u.onend=onend; speechSynthesis.speak(u); }catch(e){ if(onend) setTimeout(onend,Math.max(700,String(text).split(' ').length*330/rate)); } }
/* Reproducción: rango [gi,gEnd) · pausa conserva gi */
function setBtns(){ const all=gPlaying&&gScope==='all'; const pa=document.getElementById('playAll');
  pa.querySelector('.ic').textContent= all?'⏸':'▶'; pa.querySelector('.pl').textContent= all?L().pause:L().play;
  VIEW.forEach((p,pi)=>{ const b=document.getElementById('play'+pi); if(!b)return; const on=gPlaying&&gScope==='p'+pi; b.classList.toggle('on',on); b.querySelector('.pl').textContent= on?L().pPause:L().pPlay; b.firstChild.textContent= on?'⏸ ':'▶ '; }); }
function clearHl(){ document.querySelectorAll('.sent.read,.sente.read').forEach(s=>s.classList.remove('read')); document.querySelectorAll('.para.reading').forEach(p=>p.classList.remove('reading')); }
function startRange(st,end,scope){ if(gScope!==scope || gi<st || gi>=end) gi=st; gEnd=end; gScope=scope; gPlaying=true; setBtns(); step(); }
function playAll(){ if(gPlaying&&gScope==='all'){ pausePlay(); return; } startRange(0,ALL.length,'all'); }
function playPara(pi){ const idxs=ALL.map((a,k)=>a.pi===pi?k:-1).filter(k=>k>=0); if(gPlaying&&gScope==='p'+pi){ pausePlay(); return; } startRange(idxs[0],idxs[idxs.length-1]+1,'p'+pi); }
function pausePlay(){ gPlaying=false; try{speechSynthesis.cancel();}catch(e){} setBtns(); }
function step(){ if(!gPlaying) return;
  if(gi>=gEnd){ gPlaying=false; if(gScope==='all') gi=0; setBtns(); clearHl(); toast(info==='es'?'✓ Fin del audio':'✓ End of audio'); return; }
  const {pi,si}=ALL[gi]; clearHl(); const para=document.getElementById('p'+pi); para.classList.add('reading');
  const se=document.getElementById('s'+pi+'_'+si); if(se)se.classList.add('read');
  const ee=document.getElementById('e'+pi+'_'+si); if(ee)ee.classList.add('read');
  para.scrollIntoView({behavior:'smooth',block:'center'});
  say(VIEW[pi].pairs[si].en, ()=>{ if(!gPlaying)return; gi++; step(); });
}
function setText(m){ document.getElementById('screen').setAttribute('data-text',m); ['txEn','txEs','txBoth'].forEach(id=>document.getElementById(id).classList.remove('on')); document.getElementById(m==='en'?'txEn':m==='es'?'txEs':'txBoth').classList.add('on'); }
function setInfo(l){ info=l; applyInfo(); renderStPick(); if(document.getElementById('stpick').style.display==='none') updateTitles(); }
function toggleVoice(){ voice=voice==='US'?'UK':'US'; document.getElementById('voiceBtn').textContent='🔊 '+voice; }
function setRate(v){ rate=parseFloat(v); }
function textSize(d){ let s=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--reading'))||18; s=Math.max(15,Math.min(24,s+d)); document.documentElement.style.setProperty('--reading',s+'px'); }
function markDone(){ marked=true; const b=document.getElementById('markBtn'); b.classList.add('done'); b.querySelector('.mi').textContent='✅'; document.getElementById('markLab').textContent=L().marked;
  const m=Math.floor(secs/60); document.getElementById('eTime').textContent=m+':'+String(secs%60).padStart(2,'0'); document.getElementById('eXp').textContent='+'+(m>=30?15:m>=20?10:m>=10?5:0);
  try{ window.dispatchEvent(new CustomEvent('jucum:done',{detail:{type:'story', story:storyId, minutes:m, xp:(m>=30?15:m>=20?10:m>=10?5:0), finished:true}})); }catch(e){}
  const ec=document.getElementById('endcard'); ec.style.display='block'; ec.scrollIntoView({behavior:'smooth'}); }
setInterval(()=>{ secs++; const m=Math.floor(secs/60),s=secs%60; document.getElementById('ringT').textContent=m+':'+String(s).padStart(2,'0'); const frac=Math.min(1,secs/600); document.getElementById('ringFill').setAttribute('stroke-dashoffset',(88*(1-frac)).toFixed(1)); [10,20,30].forEach(mm=>{ if(m>=mm&&!milestones[mm]){ milestones[mm]=true; toast(L().xpMsg(mm)); } }); },1000);
function setLevel(lv){ pausePlay(); const s=document.getElementById('screen'); s.setAttribute('data-level',lv); const n={'pre-a1':'Pre-A1','a1':'A1','a2':'A2'}; var _c=document.getElementById('capLvl'); if(_c)_c.textContent=n[lv]; document.getElementById('mhsub').textContent=n[lv]+' · M1 · Personal Identity';
  ['segPre','segA1','segA2'].forEach(id=>{var b=document.getElementById(id);if(b)b.classList.remove('on');}); var _a=document.getElementById(lv==='pre-a1'?'segPre':lv==='a1'?'segA1':'segA2'); if(_a)_a.classList.add('on');
  info= lv==='pre-a1'?'es':'en'; setText(lv==='pre-a1'?'both':'en'); render(); }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2600); }
0&&document.addEventListener('contextmenu',e=>{ if(e.target.closest('.screen')){ e.preventDefault(); toast('Material protegido © JUCUM EC'); }});
try{ speechSynthesis.onvoiceschanged=()=>pickVoice(); }catch(e){}
render(); setLevel('a2'); renderStPick();
</script>
