<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Identification - A2 M1 | JUCUM English</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10B981; --primary-light: #6EE7B7; --primary-dark: #059669;
            --accent: #34D399; --bg-gradient-start: #ECFDF5; --bg-gradient-end: #D1FAE5;
            --text-dark: #064E3B; --text-medium: #065F46; --text-light: #047857;
            --success: #10B981; --success-light: #D1FAE5; --success-dark: #059669;
            --error: #EF4444; --error-light: #FEE2E2; --error-dark: #DC2626;
            --info: #3B82F6; --info-light: #DBEAFE; --info-dark: #1D4ED8;
            --purple: #8B5CF6; --purple-light: #EDE9FE; --purple-dark: #6D28D9;
            --shadow-soft: 0 4px 20px rgba(16,185,129,0.15);
            --border-radius: 20px;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:'Nunito',sans-serif; background:linear-gradient(135deg,var(--bg-gradient-start),var(--bg-gradient-end)); min-height:100vh; color:var(--text-dark); }
        .header { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); padding:1rem 1.5rem; display:flex; align-items:center; gap:1rem; position:sticky; top:0; z-index:100; box-shadow:var(--shadow-soft); }
        .back-btn { padding:0.4rem 0.9rem; border-radius:20px; background:rgba(255,255,255,0.3); border:none; display:flex; align-items:center; gap:0.4rem; cursor:pointer; font-size:0.9rem; font-weight:700; text-decoration:none; color:white; transition:all .2s; flex-shrink:0; }
        .back-btn:hover { background:rgba(255,255,255,0.5); }
        .header-info { flex:1; }
        .header-title { font-family:'Fredoka',sans-serif; font-size:1.1rem; font-weight:600; color:white; }
        .header-subtitle { font-size:0.8rem; color:rgba(255,255,255,0.85); margin-top:2px; }
        .progress-indicator { background:rgba(255,255,255,0.3); padding:0.4rem 0.9rem; border-radius:20px; font-weight:700; color:white; font-size:0.9rem; }
        .progress-container { height:6px; background:rgba(255,255,255,0.3); }
        .progress-fill { height:100%; background:white; transition:width .5s ease; width:0%; }
        main { padding:1.5rem; max-width:650px; margin:0 auto; }
        .instructions { background:white; border-radius:16px; padding:1rem 1.25rem; margin-bottom:1.25rem; box-shadow:var(--shadow-soft); border-left:5px solid var(--primary); display:flex; gap:0.75rem; align-items:flex-start; }
        .instructions-icon { font-size:1.6rem; flex-shrink:0; }
        .instructions-title { font-family:'Fredoka',sans-serif; font-size:1rem; font-weight:600; color:var(--text-dark); margin-bottom:0.2rem; }
        .instructions-text { font-size:0.85rem; color:var(--text-medium); line-height:1.5; }
        .question-card { background:white; border-radius:var(--border-radius); box-shadow:var(--shadow-soft); padding:1.5rem; margin-bottom:1rem; animation:slideIn .4s ease; }
        .question-card.hidden { display:none; }
        @keyframes slideIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
        .q-header { display:flex; align-items:center; gap:0.75rem; margin-bottom:1rem; }
        .question-number { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; display:flex; align-items:center; justify-content:center; font-family:'Fredoka',sans-serif; font-weight:700; font-size:0.95rem; flex-shrink:0; }
        .qtopic-badge { display:inline-flex; align-items:center; gap:0.3rem; padding:0.2rem 0.7rem; border-radius:20px; font-size:0.72rem; font-weight:700; }
        .qtopic-badge.some-any { background:#D1FAE5; color:#065F46; }
        .qtopic-badge.much-many { background:#DBEAFE; color:#1D4ED8; }
        .sentence-options { display:flex; flex-direction:column; gap:0.7rem; margin-bottom:0.5rem; }
        .sent-option { border:2.5px solid #E5E7EB; border-radius:14px; padding:1rem 1.1rem; cursor:pointer; transition:all .2s; background:white; text-align:left; font-family:'Nunito',sans-serif; display:flex; gap:0.75rem; align-items:flex-start; width:100%; }
        .sent-option:hover:not(.disabled) { border-color:var(--primary); background:var(--bg-gradient-start); transform:translateX(4px); }
        .sent-option.disabled { cursor:default; }
        .sent-option.selected-correct { border-color:var(--success); background:var(--success-light); }
        .sent-option.selected-incorrect { border-color:var(--error); background:var(--error-light); }
        .option-letter { width:26px; height:26px; border-radius:50%; background:var(--primary-light); color:var(--primary-dark); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:0.8rem; flex-shrink:0; margin-top:1px; font-family:'Fredoka',sans-serif; }
        .sent-option.selected-correct .option-letter { background:var(--success); color:white; }
        .sent-option.selected-incorrect .option-letter { background:var(--error); color:white; }
        .option-text { font-size:0.98rem; color:var(--text-dark); line-height:1.55; font-weight:600; flex:1; }
        .sent-option.selected-correct .option-text { color:var(--success-dark); }
        .sent-option.selected-incorrect .option-text { color:var(--error-dark); }
        .option-status { font-size:1.1rem; margin-left:auto; flex-shrink:0; opacity:0; transition:opacity .2s; }
        .sent-option.selected-correct .option-status, .sent-option.selected-incorrect .option-status { opacity:1; }
        .error-highlight { color:var(--error); font-weight:800; text-decoration:underline wavy var(--error); }
        .correct-highlight { color:var(--success-dark); font-weight:800; }
        .feedback { margin-top:1.25rem; border-radius:16px; overflow:hidden; display:none; box-shadow:0 4px 16px rgba(0,0,0,0.1); }
        .feedback.show { display:block; animation:fadeUp .35s ease; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        .fb-header { padding:0.9rem 1.25rem; display:flex; align-items:center; gap:0.75rem; }
        .feedback.correct .fb-header { background:linear-gradient(135deg,var(--success),var(--success-dark)); }
        .feedback.incorrect .fb-header { background:linear-gradient(135deg,var(--error),var(--error-dark)); }
        .fb-icon { font-size:1.6rem; }
        .fb-title { font-family:'Fredoka',sans-serif; font-size:1.1rem; color:white; font-weight:600; }
        .fb-subtitle { font-size:0.8rem; color:rgba(255,255,255,0.85); margin-top:1px; }
        .fb-body { background:white; border:2px solid; border-top:none; border-radius:0 0 16px 16px; padding:1.25rem; display:flex; flex-direction:column; gap:0.9rem; }
        .feedback.correct .fb-body { border-color:var(--success); }
        .feedback.incorrect .fb-body { border-color:var(--error); }
        .fb-block { border-radius:12px; padding:0.9rem 1rem; }
        .fb-block-title { font-weight:800; font-size:0.78rem; text-transform:uppercase; letter-spacing:.6px; margin-bottom:0.5rem; display:flex; align-items:center; gap:0.4rem; flex-wrap:wrap; }
        .error-badge { display:inline-block; background:var(--error); color:white; padding:0.15rem 0.55rem; border-radius:6px; font-size:0.72rem; font-weight:700; margin-left:4px; }
        .fb-signal { background:#F0FDF4; border:1px solid #BBF7D0; }
        .fb-signal.wrong { background:#FFF1F2; border-color:#FECDD3; }
        .fb-signal .fb-block-title { color:var(--success-dark); }
        .fb-signal.wrong .fb-block-title { color:var(--error-dark); }
        .signal-tag { display:inline-block; background:var(--success); color:white; border-radius:6px; padding:0.1rem 0.5rem; font-size:0.82rem; font-weight:700; margin:0 2px; }
        .signal-tag.red { background:var(--error); }
        .fb-compare { background:#F8FAFC; border:1px solid #E2E8F0; }
        .fb-compare .fb-block-title { color:#475569; }
        .compare-row { display:flex; align-items:flex-start; gap:0.6rem; padding:0.4rem 0; border-bottom:1px dashed #E2E8F0; }
        .compare-row:last-child { border-bottom:none; }
        .compare-label { font-size:0.72rem; font-weight:800; text-transform:uppercase; white-space:nowrap; padding:0.15rem 0.5rem; border-radius:6px; flex-shrink:0; margin-top:2px; }
        .compare-label.wrong { background:var(--error-light); color:var(--error-dark); }
        .compare-label.right { background:var(--success-light); color:var(--success-dark); }
        .compare-text { font-size:0.95rem; color:var(--text-dark); line-height:1.55; }
        .fb-error { background:var(--error-light); border:1px solid #FECACA; }
        .fb-error .fb-block-title { color:var(--error-dark); }
        .word-swap { display:flex; align-items:center; justify-content:center; gap:0.75rem; margin:0.6rem 0; }
        .ws-box { padding:0.4rem 1rem; border-radius:8px; font-weight:700; font-size:1rem; }
        .ws-wrong { background:white; color:var(--error); border:2px solid var(--error); text-decoration:line-through; }
        .ws-arrow { font-size:1.3rem; color:#94A3B8; }
        .ws-right { background:var(--success); color:white; }
        .error-text { font-size:0.9rem; color:var(--text-dark); line-height:1.55; }
        .fb-rule { background:var(--info-light); border:1px solid #BFDBFE; }
        .fb-rule .fb-block-title { color:var(--info-dark); }
        .rule-formula { background:white; border-radius:8px; padding:0.5rem 0.9rem; font-family:'Fredoka',sans-serif; font-size:0.95rem; color:var(--info-dark); font-weight:600; margin-bottom:0.6rem; text-align:center; border:1px solid #BFDBFE; }
        .rule-examples { display:flex; flex-wrap:wrap; gap:0.4rem; }
        .rule-ex { font-size:0.82rem; background:white; border:1px solid #BFDBFE; border-radius:6px; padding:0.2rem 0.6rem; color:var(--info-dark); font-weight:600; }
        .fb-why { background:#F0FDF4; border:1px solid #BBF7D0; }
        .fb-why .fb-block-title { color:var(--success-dark); }
        .fb-why-text { font-size:0.92rem; color:var(--text-dark); line-height:1.55; }
        .nav-buttons { display:flex; gap:0.75rem; margin-top:1.25rem; }
        .nav-btn { padding:0.8rem 1.2rem; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-size:0.95rem; font-weight:700; cursor:pointer; transition:all .2s; }
        .nav-btn.next { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; flex:1; }
        .nav-btn.prev { background:#F1F5F9; color:var(--text-dark); }
        .nav-btn:disabled { opacity:.4; cursor:default; }
        .nav-btn:not(:disabled):hover { transform:translateY(-2px); box-shadow:var(--shadow-soft); }
        .results-screen { display:none; text-align:center; padding:2rem 1.5rem; }
        .results-screen.show { display:block; animation:fadeUp .5s ease; }
        .results-emoji { font-size:4rem; margin-bottom:1rem; }
        .results-title { font-family:'Fredoka',sans-serif; font-size:2rem; margin-bottom:0.5rem; }
        .results-score { font-size:3rem; font-weight:800; color:var(--purple); margin:1rem 0; }
        .results-message { font-size:1.05rem; color:var(--text-medium); margin-bottom:1.5rem; }
        .stars-container { display:flex; justify-content:center; gap:0.5rem; margin:1.5rem 0; }
        .star { font-size:2.5rem; opacity:.3; transition:all .5s ease; }
        .star.earned { opacity:1; animation:starPop .5s ease; }
        @keyframes starPop { 0%{transform:scale(0)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }
        .results-buttons { display:flex; flex-direction:column; gap:1rem; margin-top:2rem; }
        .result-btn { padding:1rem 2rem; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; text-decoration:none; display:flex; align-items:center; justify-content:center; gap:0.5rem; transition:all .2s; }
        .result-btn.primary { background:linear-gradient(135deg,var(--purple),var(--purple-dark)); color:white; }
        .result-btn.secondary { background:#F1F5F9; color:var(--text-dark); }
        .result-btn:hover { transform:translateY(-2px); box-shadow:var(--shadow-soft); }
    </style>
</head>
<body>
    <header class="header">
        <a href="a2-m1-index.html" class="back-btn">← Módulo</a>
        <div class="header-info">
            <div class="header-title">🔍 Identification</div>
            <div class="header-subtitle">💚 A2 · Módulo 1 · Quantifiers</div>
        </div>
        <div class="progress-indicator"><span id="currentQ">1</span>/10</div>
    </header>
    <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>

    <main>
        <div class="instructions">
            <div class="instructions-icon">🔍</div>
            <div>
                <div class="instructions-title">Identifica la oración correcta</div>
                <div class="instructions-text">Lee las tres oraciones y elige la que use el cuantificador correcto: <strong>some, any, no, much, many</strong> o <strong>a lot of</strong>.</div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="results-screen" id="resultsScreen">
            <div class="results-emoji">🎉</div>
            <div class="results-title">¡Completado!</div>
            <div class="results-score" id="finalScore">0/10</div>
            <div class="stars-container">
                <span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span>
            </div>
            <div class="results-message" id="resultsMessage"></div>
            <div class="results-buttons">
                <button class="result-btn primary" onclick="location.reload()">🔄 Intentar de Nuevo</button>
                <a href="a2-m1-index.html" class="result-btn secondary">← Volver al Módulo</a>
            </div>
        </div>
    </main>

    <script>
    const quizData = [
        // ── Q1–Q5: some / any / no ───────────────────────────────────
        {
            id: 1, topic: "some-any",
            options: [
                { text: "The customer didn't receive some confirmation email after submitting the claim form.", correct: false,
                  errorWord: "some", correctWord: "any",
                  errorType: "Some en oración negativa",
                  explanation: "'Some' se usa en afirmativas. 'Didn't receive' es negativa — necesita 'any': 'didn't receive any confirmation email'." },
                { text: "The customer didn't receive any confirmation email after submitting the claim form.", correct: true },
                { text: "The customer didn't receive no confirmation email after submitting the claim form.", correct: false,
                  errorWord: "no", correctWord: "any",
                  errorType: "Doble negación",
                  explanation: "'Didn't receive no email' crea una doble negación incorrecta en inglés. 'No' se combina con verbos afirmativos, no negativos." }
            ],
            correctForm: "any",
            clue: "didn't receive (negativa)",
            clueExplain: "El verbo negativo 'didn't receive' exige 'any'. 'Some' es para afirmativas y 'no' no puede combinarse con 'didn't'.",
            rule: "verbo negativo + any / verbo afirmativo + no",
            examples: ["She didn't get any reply", "He didn't find any solution", "They didn't send any update"],
            correctReason: "'Didn't receive' es negativa — el cuantificador correcto es 'any'. La estructura 'didn't receive any' es la forma estándar en inglés."
        },
        {
            id: 2, topic: "some-any",
            options: [
                { text: "Do you have some information about the current outage in this area?", correct: false,
                  errorWord: "some", correctWord: "any",
                  errorType: "Some en pregunta de información",
                  explanation: "'Some' en preguntas es para ofrecimientos ('Would you like some help?'). Esta es una pregunta de información — usa 'any'." },
                { text: "Do you have any information about the current outage in this area?", correct: true },
                { text: "Do you have no information about the current outage in this area?", correct: false,
                  errorWord: "no", correctWord: "any",
                  errorType: "No en pregunta",
                  explanation: "'Do you have no information?' afirma que no hay información, no hace una pregunta abierta. Para preguntar usamos 'any'." }
            ],
            correctForm: "any",
            clue: "Do you have...? (pregunta de información)",
            clueExplain: "En preguntas para obtener información usamos 'any'. 'Some' es para ofrecimientos y 'no' convierte la pregunta en una afirmación negativa.",
            rule: "Do you have / Is there + any...? (pregunta de información)",
            examples: ["Do you have any updates?", "Is there any news?", "Do you have any options?"],
            correctReason: "La pregunta busca información — 'Do you have any information?' es la forma correcta. 'Any' es el cuantificador estándar en preguntas de información."
        },
        {
            id: 3, topic: "some-any",
            options: [
                { text: "The supervisor offered Ana any compensation for the billing error.", correct: false,
                  errorWord: "any", correctWord: "some",
                  errorType: "Any en oración afirmativa",
                  explanation: "'Any' se usa en negativas y preguntas. La oración es afirmativa — el supervisor SÍ ofreció compensación. Necesitas 'some'." },
                { text: "The supervisor offered Ana some compensation for the billing error.", correct: true },
                { text: "The supervisor offered Ana no compensation for the billing error.", correct: false,
                  errorWord: "no", correctWord: "some",
                  errorType: "No contradice el contexto",
                  explanation: "'No compensation' significaría que no ofreció nada. Pero el supervisor sí ofreció compensación — 'no' contradice el sentido." }
            ],
            correctForm: "some",
            clue: "offered (afirmativa, acción positiva)",
            clueExplain: "La oración afirma que el supervisor SÍ ofreció algo. En afirmativas con cantidad positiva, usamos 'some'.",
            rule: "Oración afirmativa + some (cantidad positiva)",
            examples: ["He offered some compensation", "She provided some credit", "They gave some refund"],
            correctReason: "El supervisor SÍ ofreció compensación — la oración es afirmativa. En afirmativas el cuantificador correcto es 'some'."
        },
        {
            id: 4, topic: "some-any",
            options: [
                { text: "There were any Wi-Fi signals strong enough to keep the phone connected.", correct: false,
                  errorWord: "any", correctWord: "no",
                  errorType: "Any con verbo afirmativo",
                  explanation: "'There were any' es incorrecto — 'any' necesita verbo negativo ('there weren't any'). Con 'were' afirmativo y sentido de ausencia, usamos 'no'." },
                { text: "There were no Wi-Fi signals strong enough to keep the phone connected.", correct: true },
                { text: "There were some Wi-Fi signals strong enough to keep the phone connected.", correct: false,
                  errorWord: "some", correctWord: "no",
                  errorType: "Some contradice el contexto",
                  explanation: "'There were some signals' significaría que sí había señales fuertes. Pero el contexto describe ausencia total de señal — 'some' contradice el sentido." }
            ],
            correctForm: "no",
            clue: "there were + (ausencia total)",
            clueExplain: "'No' con verbo afirmativo ('were') expresa ausencia total. Equivale a 'there weren't any' pero con estructura más directa.",
            rule: "There were no + sustantivo (ausencia total, verbo afirmativo)",
            examples: ["There were no signals", "There was no connection", "There were no options available"],
            correctReason: "'No' con 'were' expresa que no había ninguna señal — ausencia total. Es la estructura correcta cuando el verbo es afirmativo pero el sentido es negativo."
        },
        {
            id: 5, topic: "some-any",
            options: [
                { text: "Would you like any assistance completing the claim form online?", correct: false,
                  errorWord: "any", correctWord: "some",
                  errorType: "Any en ofrecimiento",
                  explanation: "'Would you like any...?' suena raro en inglés. En ofrecimientos corteses usamos 'some': 'Would you like some assistance?'" },
                { text: "Would you like no assistance completing the claim form online?", correct: false,
                  errorWord: "no", correctWord: "some",
                  errorType: "No en ofrecimiento",
                  explanation: "'Would you like no assistance?' no tiene sentido como ofrecimiento — 'no' niega la cantidad. El agente ofrece ayuda real — usa 'some'." },
                { text: "Would you like some assistance completing the claim form online?", correct: true }
            ],
            correctForm: "some",
            clue: "Would you like...? (ofrecimiento cortés)",
            clueExplain: "En ofrecimientos corteses usamos 'some', incluso en preguntas. Es diferente a preguntar si algo existe.",
            rule: "Would you like some...? (ofrecimiento cortés, siempre 'some')",
            examples: ["Would you like some help?", "Can I offer you some information?", "Shall I send you some details?"],
            correctReason: "'Would you like some assistance?' es la forma correcta para ofrecimientos. En ofrecimientos corteses siempre se usa 'some'."
        },
        // ── Q6–Q10: much / many / a lot of ──────────────────────────
        {
            id: 6, topic: "much-many",
            options: [
                { text: "The customer had much complaints about the service, so the supervisor got involved.", correct: false,
                  errorWord: "much", correctWord: "a lot of",
                  errorType: "Much con sustantivo contable",
                  explanation: "'Much' solo va con incontables. 'Complaints' es contable en plural — puedes contar una queja, dos quejas. En afirmativas con contables usa 'a lot of' o 'many'." },
                { text: "The customer had many complaints about the service, so the supervisor got involved.", correct: false,
                  errorWord: "many", correctWord: "a lot of",
                  errorType: "Many en afirmativa (muy formal)",
                  explanation: "'Many complaints' en afirmativa es gramaticalmente posible pero suena formal. En conversación cotidiana y afirmativas, 'a lot of' es lo natural." },
                { text: "The customer had a lot of complaints about the service, so the supervisor got involved.", correct: true }
            ],
            correctForm: "a lot of",
            clue: "complaints (contable plural, afirmativa)",
            clueExplain: "'Complaints' es contable. En oraciones afirmativas con contables, 'a lot of' es la forma más natural y estándar.",
            rule: "a lot of + contable plural (afirmativa, estándar)",
            examples: ["She had a lot of complaints", "He made a lot of calls", "They sent a lot of emails"],
            correctReason: "'Complaints' es contable. En afirmativas, 'a lot of' es la forma más natural. 'Many' en afirmativas suena formal; 'much' nunca va con contables."
        },
        {
            id: 7, topic: "much-many",
            options: [
                { text: "The agent said there wasn't many information available about the damaged delivery.", correct: false,
                  errorWord: "many", correctWord: "much",
                  errorType: "Many con sustantivo incontable",
                  explanation: "'Information' es incontable — no puedes decir 'one information, two informations'. 'Many' es solo para contables en plural. Usa 'much'." },
                { text: "The agent said there wasn't much information available about the damaged delivery.", correct: true },
                { text: "The agent said there wasn't a lot of information available about the damaged delivery.", correct: false,
                  errorWord: "a lot of", correctWord: "much",
                  errorType: "A lot of en oración negativa",
                  explanation: "'A lot of' funciona mejor en afirmativas. En negativas con incontables, 'much' es la forma estándar y más natural." }
            ],
            correctForm: "much",
            clue: "wasn't (negativa) + information (incontable)",
            clueExplain: "'Information' es incontable y la oración es negativa. La combinación correcta es 'wasn't much'.",
            rule: "wasn't / isn't / didn't + much + incontable (negativa)",
            examples: ["There wasn't much information", "She didn't have much patience", "There wasn't much progress"],
            correctReason: "'Information' es incontable + oración negativa ('wasn't') = 'much'. 'Many' es para contables y 'a lot of' es más natural en afirmativas."
        },
        {
            id: 8, topic: "much-many",
            options: [
                { text: "How much calls did the customer make before reaching a supervisor?", correct: false,
                  errorWord: "much", correctWord: "many",
                  errorType: "Much con sustantivo contable",
                  explanation: "'How much calls?' es incorrecto. 'Calls' es contable — puedes contar una llamada, dos llamadas. Para preguntar cantidad de contables usa 'How many'." },
                { text: "How many calls did the customer make before reaching a supervisor?", correct: true },
                { text: "How a lot of calls did the customer make before reaching a supervisor?", correct: false,
                  errorWord: "a lot of", correctWord: "many",
                  errorType: "A lot of en pregunta con How",
                  explanation: "'How a lot of calls?' no es una estructura válida en inglés. Con 'how' para preguntar cantidad usamos 'many' (contables) o 'much' (incontables)." }
            ],
            correctForm: "many",
            clue: "How...? + calls (contable plural)",
            clueExplain: "'Calls' es contable en plural. Para preguntar cantidad de cosas contables usamos 'How many', nunca 'How much' ni 'How a lot of'.",
            rule: "How many + contable plural? (pregunta de cantidad)",
            examples: ["How many calls?", "How many emails did she send?", "How many attempts were made?"],
            correctReason: "'Calls' es contable. Para preguntar cantidad usamos 'How many'. 'Much' es para incontables y 'a lot of' no se usa con 'how'."
        },
        {
            id: 9, topic: "much-many",
            options: [
                { text: "The repair took a lot of days because the pipe damage was extensive.", correct: false,
                  errorWord: "a lot of", correctWord: "many",
                  errorType: "A lot of en afirmativa formal con contable",
                  explanation: "Aunque 'a lot of days' no es incorrecto, cuando el número de días es el foco de la oración y el contexto es formal, 'many days' es más preciso y natural." },
                { text: "The repair took much days because the pipe damage was extensive.", correct: false,
                  errorWord: "much", correctWord: "many",
                  errorType: "Much con sustantivo contable",
                  explanation: "'Much days' es incorrecto. 'Days' es contable en plural — no puedes usar 'much' con contables. La forma correcta es 'many days'." },
                { text: "The repair took many days because the pipe damage was extensive.", correct: true }
            ],
            correctForm: "many",
            clue: "took many days (contable, duración)",
            clueExplain: "'Days' es contable en plural. 'Many' es el cuantificador correcto para indicar una cantidad grande de días.",
            rule: "many + contable plural (cantidad grande de unidades contables)",
            examples: ["It took many days", "She waited many hours", "They made many attempts"],
            correctReason: "'Days' es contable — puedes contar uno, dos, tres días. 'Many' es el cuantificador correcto para una cantidad grande de unidades contables."
        },
        {
            id: 10, topic: "much-many",
            options: [
                { text: "The agent explained that the fiber plan offers many speed compared to the current plan.", correct: false,
                  errorWord: "many", correctWord: "much more",
                  errorType: "Many con sustantivo incontable",
                  explanation: "'Speed' como rendimiento general es incontable — no puedes contar 'one speed, two speeds' en ese sentido. 'Many' es para contables en plural." },
                { text: "The agent explained that the fiber plan offers much more speed compared to the current plan.", correct: true },
                { text: "The agent explained that the fiber plan offers a lot of more speed compared to the current plan.", correct: false,
                  errorWord: "a lot of more", correctWord: "much more",
                  errorType: "A lot of more (estructura incorrecta)",
                  explanation: "'A lot of more' no es una estructura válida en inglés. Para comparar cantidades con incontables usamos 'much more': 'much more speed', 'much more data'." }
            ],
            correctForm: "much more",
            clue: "speed (incontable) + comparación",
            clueExplain: "'Speed' como rendimiento es incontable. En comparaciones con incontables usamos 'much more', nunca 'many' ni 'a lot of more'.",
            rule: "much more + incontable (comparación de cantidad)",
            examples: ["much more speed", "much more data", "much more storage"],
            correctReason: "'Speed' es incontable en este contexto. 'Much more' es la forma correcta para comparar cantidades con incontables. 'Many' es para contables y 'a lot of more' no existe."
        }
    ];

    let currentQuestion = 0, score = 0;
    let answered = new Array(quizData.length).fill(false);

    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    function initQuiz() {
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';
        quizData.forEach((q, i) => {
            q.shuffled = shuffle(q.options);
            container.appendChild(createCard(q, i));
        });
        showQuestion(0);
        updateProgress();
    }

    function createCard(q, index) {
        const card = document.createElement('div');
        card.className = 'question-card' + (index !== 0 ? ' hidden' : '');
        card.id = 'question-' + index;
        const badgeClass = q.topic === 'some-any' ? 'some-any' : 'much-many';
        const badgeLabel = q.topic === 'some-any' ? '🟢 some / any / no' : '🔵 much / many / a lot of';
        const letters = ['A', 'B', 'C'];
        const optsHTML = q.shuffled.map((opt, i) => `
            <button class="sent-option" onclick="selectOption(${index}, ${i})">
                <span class="option-letter">${letters[i]}</span>
                <span class="option-text">${opt.text}</span>
                <span class="option-status"></span>
            </button>`).join('');
        card.innerHTML = `
            <div class="q-header">
                <div class="question-number">${index + 1}</div>
                <span class="qtopic-badge ${badgeClass}">${badgeLabel}</span>
            </div>
            <div class="sentence-options" id="options-${index}">${optsHTML}</div>
            <div class="feedback" id="feedback-${index}"></div>
            <div class="nav-buttons">
                <button class="nav-btn prev" onclick="prevQuestion()" ${index === 0 ? 'disabled' : ''}>← Anterior</button>
                <button class="nav-btn next" id="next-${index}" onclick="nextQuestion(${index})" disabled>
                    ${index === quizData.length - 1 ? 'Ver Resultados 🎉' : 'Siguiente →'}
                </button>
            </div>`;
        return card;
    }

    function selectOption(qi, optIdx) {
        if (answered[qi]) return;
        answered[qi] = true;
        const q = quizData[qi];
        const selected = q.shuffled[optIdx];
        const isCorrect = selected.correct;
        const correctOpt = q.shuffled.find(o => o.correct);
        if (isCorrect) score++;

        document.querySelectorAll(`#options-${qi} .sent-option`).forEach((btn, i) => {
            btn.classList.add('disabled');
            if (i === optIdx && isCorrect) {
                btn.classList.add('selected-correct');
                btn.querySelector('.option-status').textContent = '✅';
            } else if (i === optIdx && !isCorrect) {
                btn.classList.add('selected-incorrect');
                btn.querySelector('.option-status').textContent = '❌';
            }
        });

        buildFeedback(qi, selected, isCorrect, correctOpt, q);
        document.getElementById(`next-${qi}`).disabled = false;
        updateProgress();
    }

    function buildFeedback(qi, selected, isCorrect, correctOpt, q) {
        const el = document.getElementById(`feedback-${qi}`);
        el.className = `feedback show ${isCorrect ? 'correct' : 'incorrect'}`;

        function markError(text, word) {
            if (!word) return text;
            return text.replace(word, `<span class="error-highlight">${word}</span>`);
        }
        function markCorrect(text, word) {
            if (!word) return text;
            return text.replace(word, `<span class="correct-highlight">${word}</span>`);
        }

        const exHTML = q.examples.map(e => `<span class="rule-ex">${e}</span>`).join('');

        if (isCorrect) {
            const errBlocks = q.shuffled.filter(o => !o.correct).map(err => `
                <div class="fb-block fb-error">
                    <div class="fb-block-title">⚠️ Error en una opción: <span class="error-badge">${err.errorType}</span></div>
                    <div class="word-swap">
                        <span class="ws-box ws-wrong">${err.errorWord}</span>
                        <span class="ws-arrow">→</span>
                        <span class="ws-box ws-right">${err.correctWord}</span>
                    </div>
                    <div class="error-text">${err.explanation}</div>
                </div>`).join('');
            el.innerHTML = `
                <div class="fb-header"><span class="fb-icon">✅</span><div>
                    <div class="fb-title">¡Correcto! Identificaste bien la oración</div>
                    <div class="fb-subtitle">Veamos por qué las otras estaban mal</div>
                </div></div>
                <div class="fb-body">
                    <div class="fb-block fb-signal">
                        <div class="fb-block-title">🔍 Señal clave en las oraciones</div>
                        <div style="font-size:0.92rem;color:var(--text-dark);line-height:1.55;">
                            La señal <span class="signal-tag">${q.clue}</span> ${q.clueExplain}
                        </div>
                    </div>
                    ${errBlocks}
                    <div class="fb-block fb-rule">
                        <div class="fb-block-title">📐 Regla aplicada</div>
                        <div class="rule-formula">${q.rule}</div>
                        <div class="rule-examples">${exHTML}</div>
                    </div>
                    <div class="fb-block fb-why">
                        <div class="fb-block-title">💡 ¿Por qué la oración correcta ES correcta?</div>
                        <div class="fb-why-text">${q.correctReason}</div>
                    </div>
                </div>`;
        } else {
            el.innerHTML = `
                <div class="fb-header"><span class="fb-icon">❌</span><div>
                    <div class="fb-title">Incorrecto — revisemos juntos</div>
                    <div class="fb-subtitle">Identifica la diferencia entre las oraciones</div>
                </div></div>
                <div class="fb-body">
                    <div class="fb-block fb-signal wrong">
                        <div class="fb-block-title">🔍 Señal clave que debías identificar</div>
                        <div style="font-size:0.92rem;color:var(--text-dark);line-height:1.55;">
                            La señal <span class="signal-tag red">${q.clue}</span> ${q.clueExplain}
                        </div>
                    </div>
                    <div class="fb-block fb-compare">
                        <div class="fb-block-title">🔄 Tu elección vs. la correcta</div>
                        <div class="compare-row">
                            <span class="compare-label wrong">Elegiste</span>
                            <span class="compare-text">${markError(selected.text, selected.errorWord)}</span>
                        </div>
                        <div class="compare-row">
                            <span class="compare-label right">Correcta</span>
                            <span class="compare-text">${markCorrect(correctOpt.text, q.correctForm)}</span>
                        </div>
                    </div>
                    <div class="fb-block fb-error">
                        <div class="fb-block-title">⚠️ El error: <span class="error-badge">${selected.errorType}</span></div>
                        <div class="word-swap">
                            <span class="ws-box ws-wrong">${selected.errorWord}</span>
                            <span class="ws-arrow">→</span>
                            <span class="ws-box ws-right">${selected.correctWord}</span>
                        </div>
                        <div class="error-text">${selected.explanation}</div>
                    </div>
                    <div class="fb-block fb-rule">
                        <div class="fb-block-title">📐 La regla correcta</div>
                        <div class="rule-formula">${q.rule}</div>
                        <div class="rule-examples">${exHTML}</div>
                    </div>
                    <div class="fb-block fb-why">
                        <div class="fb-block-title">💡 ¿Por qué la oración correcta ES correcta?</div>
                        <div class="fb-why-text">${q.correctReason}</div>
                    </div>
                </div>`;
        }
    }

    function showQuestion(i) {
        document.querySelectorAll('.question-card').forEach((c, idx) => c.classList.toggle('hidden', idx !== i));
        document.getElementById('currentQ').textContent = i + 1;
        currentQuestion = i;
    }
    function nextQuestion(i) { i < quizData.length - 1 ? showQuestion(i + 1) : showResults(); }
    function prevQuestion() { if (currentQuestion > 0) showQuestion(currentQuestion - 1); }
    function updateProgress() {
        const done = answered.filter(Boolean).length;
        document.getElementById('progressFill').style.width = (done / quizData.length * 100) + '%';
    }
    function showResults() {
        document.querySelectorAll('.question-card').forEach(c => c.classList.add('hidden'));
        document.getElementById('resultsScreen').classList.add('show');
        const pct = score / quizData.length * 100;
        document.getElementById('finalScore').textContent = `${score}/${quizData.length}`;
        const stars = pct >= 90 ? 3 : pct >= 70 ? 2 : 1;
        document.getElementById('resultsMessage').textContent = pct >= 90
            ? '¡Excelente! Identificas los cuantificadores perfectamente. 🏆'
            : pct >= 70 ? '¡Muy bien! Sigue practicando. 💪'
            : 'Buen esfuerzo. Repasa some/any/no y much/many/a lot of e inténtalo de nuevo. 📚';
        document.querySelectorAll('.star').forEach((s, i) => {
            if (i < stars) setTimeout(() => s.classList.add('earned'), i * 300);
        });
    }
    document.addEventListener('DOMContentLoaded', initQuiz);
    </script>
</body>
</html>
