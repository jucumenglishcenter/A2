<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fill in the Blanks - A2 M1 | JUCUM English</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10B981; --primary-light: #6EE7B7; --primary-dark: #059669;
            --accent: #34D399; --bg-gradient-start: #ECFDF5; --bg-gradient-end: #D1FAE5;
            --text-dark: #064E3B; --text-medium: #065F46; --text-light: #047857;
            --success: #10B981; --success-light: #D1FAE5; --success-dark: #059669;
            --error: #EF4444; --error-light: #FEE2E2; --error-dark: #DC2626;
            --info: #3B82F6; --info-light: #DBEAFE; --info-dark: #1D4ED8;
            --purple: #8B5CF6; --purple-light: #EDE9FE; --purple-dark: #6D28D9;
            --white: #FFFFFF;
            --shadow-soft: 0 4px 20px rgba(16,185,129,0.15);
            --shadow-strong: 0 8px 30px rgba(16,185,129,0.25);
            --border-radius: 20px;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:'Nunito',sans-serif; background:linear-gradient(135deg,var(--bg-gradient-start) 0%,var(--bg-gradient-end) 100%); min-height:100vh; color:var(--text-dark); }
        .header { background:linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%); padding:1rem 1.5rem; display:flex; align-items:center; gap:1rem; position:sticky; top:0; z-index:100; box-shadow:var(--shadow-soft); }
        .back-btn { padding:0.4rem 0.9rem; border-radius:20px; background:rgba(255,255,255,0.3); border:none; display:flex; align-items:center; gap:0.4rem; cursor:pointer; font-size:0.9rem; font-weight:700; text-decoration:none; color:white; transition:all .2s; flex-shrink:0; }
        .back-btn:hover { background:rgba(255,255,255,0.5); }
        .header-info { flex:1; }
        .header-title { font-family:'Fredoka',sans-serif; font-size:1.1rem; font-weight:600; color:white; }
        .header-subtitle { font-size:0.8rem; color:rgba(255,255,255,0.85); margin-top:2px; }
        .progress-indicator { background:rgba(255,255,255,0.3); padding:0.4rem 0.9rem; border-radius:20px; font-weight:700; color:white; font-size:0.9rem; white-space:nowrap; }
        .progress-container { padding:0; height:6px; background:rgba(255,255,255,0.3); }
        .progress-fill { height:100%; background:white; border-radius:0 3px 3px 0; transition:width .5s ease; width:0%; }
        main { padding:1.5rem; max-width:650px; margin:0 auto; }
        .instructions { background:white; border-radius:16px; padding:1rem 1.25rem; margin-bottom:1.25rem; box-shadow:var(--shadow-soft); border-left:5px solid var(--primary); display:flex; gap:0.75rem; align-items:flex-start; }
        .instructions-icon { font-size:1.6rem; flex-shrink:0; }
        .instructions-title { font-family:'Fredoka',sans-serif; font-size:1rem; font-weight:600; color:var(--text-dark); margin-bottom:0.2rem; }
        .instructions-text { font-size:0.85rem; color:var(--text-medium); line-height:1.5; }
        .question-card { background:white; border-radius:var(--border-radius); box-shadow:var(--shadow-soft); padding:1.5rem; margin-bottom:1rem; animation:slideIn .4s ease; }
        .question-card.hidden { display:none; }
        @keyframes slideIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
        .q-header { display:flex; align-items:center; gap:0.75rem; margin-bottom:1rem; }
        .question-number { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; display:flex; align-items:center; justify-content:center; font-family:'Fredoka',sans-serif; font-weight:700; font-size:0.95rem; flex-shrink:0; }
        .qtopic-badge { display:inline-flex; align-items:center; gap:0.3rem; padding:0.2rem 0.7rem; border-radius:20px; font-size:0.72rem; font-weight:700; }
        .qtopic-badge.some-any { background:#D1FAE5; color:#065F46; }
        .qtopic-badge.much-many { background:#DBEAFE; color:#1D4ED8; }
        .hint-box { background:#F0FDF4; border-left:4px solid var(--primary); padding:0.7rem 1rem; border-radius:0 10px 10px 0; margin-bottom:1rem; font-size:0.88rem; color:var(--text-dark); line-height:1.5; }
        .hint-label { font-weight:700; color:var(--primary-dark); display:flex; align-items:center; gap:0.4rem; margin-bottom:0.2rem; font-size:0.82rem; text-transform:uppercase; letter-spacing:.5px; }
        .question-text { font-size:1.1rem; line-height:1.7; margin-bottom:0.4rem; font-weight:600; }
        .blank { display:inline-block; min-width:90px; padding:0.2rem 0.6rem; background:var(--primary-light); border:2px dashed var(--primary-dark); border-radius:8px; text-align:center; font-weight:700; color:var(--primary-dark); transition:all .3s; }
        .blank.correct { background:var(--success-light); border:2px solid var(--success); color:var(--success-dark); }
        .blank.incorrect { background:var(--error-light); border:2px solid var(--error); color:var(--error-dark); }
        .translation { color:var(--text-light); font-style:italic; font-size:0.85rem; margin-bottom:1rem; }
        .options-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:0.7rem; margin-top:0.5rem; }
        .option-btn { padding:0.9rem 0.5rem; border:2.5px solid #E5E7EB; border-radius:12px; background:white; font-family:'Nunito',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; transition:all .2s; color:var(--text-dark); }
        .option-btn:hover:not(:disabled) { border-color:var(--primary); background:var(--primary-light); transform:translateY(-2px); }
        .option-btn:disabled { cursor:default; }
        .option-btn.correct { border-color:var(--success); background:var(--success-light); color:var(--success-dark); }
        .option-btn.incorrect { border-color:var(--error); background:var(--error-light); color:var(--error-dark); }
        .feedback { margin-top:1.25rem; border-radius:16px; overflow:hidden; display:none; box-shadow:0 4px 16px rgba(0,0,0,0.1); }
        .feedback.show { display:block; animation:fadeUp .35s ease; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        .fb-header { padding:0.9rem 1.25rem; display:flex; align-items:center; gap:0.75rem; }
        .feedback.correct .fb-header { background:linear-gradient(135deg,var(--success),var(--success-dark)); }
        .feedback.incorrect .fb-header { background:linear-gradient(135deg,var(--error),var(--error-dark)); }
        .fb-icon { font-size:1.6rem; }
        .fb-title { font-family:'Fredoka',sans-serif; font-size:1.1rem; color:white; font-weight:600; }
        .fb-subtitle { font-size:0.8rem; color:rgba(255,255,255,0.85); margin-top:1px; }
        .fb-body { background:white; border:2px solid; border-top:none; border-radius:0 0 16px 16px; padding:1.25rem; display:flex; flex-direction:column; gap:0.9rem; }
        .feedback.correct .fb-body { border-color:var(--success); }
        .feedback.incorrect .fb-body { border-color:var(--error); }
        .fb-signal { background:#F0FDF4; border:1px solid #BBF7D0; border-radius:12px; padding:0.9rem 1rem; }
        .fb-signal.wrong { background:#FFF1F2; border-color:#FECDD3; }
        .fb-block-title { font-weight:800; font-size:0.78rem; text-transform:uppercase; letter-spacing:.6px; margin-bottom:0.5rem; display:flex; align-items:center; gap:0.4rem; }
        .fb-signal .fb-block-title { color:var(--success-dark); }
        .fb-signal.wrong .fb-block-title { color:var(--error-dark); }
        .fb-signal-text { font-size:0.92rem; color:var(--text-dark); line-height:1.55; }
        .signal-tag { display:inline-block; background:var(--success); color:white; border-radius:6px; padding:0.1rem 0.5rem; font-size:0.8rem; font-weight:700; margin:0 2px; }
        .signal-tag.red { background:var(--error); }
        .fb-compare { background:#F8FAFC; border:1px solid #E2E8F0; border-radius:12px; padding:0.9rem 1rem; }
        .fb-compare-row { display:flex; align-items:baseline; gap:0.6rem; padding:0.35rem 0; border-bottom:1px dashed #E2E8F0; }
        .fb-compare-row:last-child { border-bottom:none; }
        .compare-label { font-size:0.72rem; font-weight:800; text-transform:uppercase; letter-spacing:.5px; white-space:nowrap; padding:0.15rem 0.5rem; border-radius:6px; flex-shrink:0; }
        .compare-label.wrong { background:var(--error-light); color:var(--error-dark); }
        .compare-label.right { background:var(--success-light); color:var(--success-dark); }
        .compare-text { font-size:0.95rem; color:var(--text-dark); line-height:1.5; }
        .word-wrong { color:var(--error); font-weight:700; text-decoration:line-through; }
        .word-right { color:var(--success-dark); font-weight:700; }
        .fb-error { background:var(--error-light); border-radius:12px; padding:0.9rem 1rem; }
        .error-badge { display:inline-block; background:var(--error); color:white; padding:0.2rem 0.6rem; border-radius:6px; font-size:0.75rem; font-weight:700; margin-left:auto; }
        .error-word-row { display:flex; align-items:center; justify-content:center; gap:0.75rem; margin:0.6rem 0; }
        .ew-box { padding:0.4rem 1rem; border-radius:8px; font-weight:700; font-size:1rem; }
        .ew-wrong { background:white; color:var(--error); border:2px solid var(--error); text-decoration:line-through; }
        .ew-arrow { font-size:1.3rem; color:var(--text-medium); }
        .ew-right { background:var(--success); color:white; }
        .error-rule { font-size:0.88rem; color:var(--error-dark); line-height:1.5; }
        .fb-rule { background:var(--info-light); border:1px solid #BFDBFE; border-radius:12px; padding:0.9rem 1rem; }
        .fb-rule .fb-block-title { color:var(--info-dark); }
        .rule-formula { background:white; border-radius:8px; padding:0.5rem 0.9rem; font-family:'Fredoka',sans-serif; font-size:0.95rem; color:var(--info-dark); font-weight:600; margin-bottom:0.6rem; text-align:center; border:1px solid #BFDBFE; }
        .rule-examples { display:flex; flex-wrap:wrap; gap:0.4rem; }
        .rule-ex { font-size:0.82rem; background:white; border:1px solid #BFDBFE; border-radius:6px; padding:0.2rem 0.6rem; color:var(--info-dark); font-weight:600; }
        .fb-why { background:#F0FDF4; border:1px solid #BBF7D0; border-radius:12px; padding:0.9rem 1rem; }
        .fb-why .fb-block-title { color:var(--success-dark); }
        .fb-why-text { font-size:0.92rem; color:var(--text-dark); line-height:1.55; }
        .nav-buttons { display:flex; gap:0.75rem; margin-top:1.25rem; }
        .nav-btn { padding:0.8rem 1.2rem; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-size:0.95rem; font-weight:700; cursor:pointer; transition:all .2s; }
        .nav-btn.next { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; flex:1; }
        .nav-btn.prev { background:#F1F5F9; color:var(--text-dark); }
        .nav-btn:disabled { opacity:.4; cursor:default; }
        .nav-btn:not(:disabled):hover { transform:translateY(-2px); box-shadow:var(--shadow-soft); }
        .results-screen { display:none; text-align:center; padding:2rem 1.5rem; }
        .results-screen.show { display:block; animation:fadeUp .5s ease; }
        .results-emoji { font-size:4rem; margin-bottom:1rem; }
        .results-title { font-family:'Fredoka',sans-serif; font-size:2rem; margin-bottom:0.5rem; }
        .results-score { font-size:3rem; font-weight:800; color:var(--purple); margin:1rem 0; }
        .results-message { font-size:1.05rem; color:var(--text-medium); margin-bottom:1.5rem; }
        .stars-container { display:flex; justify-content:center; gap:0.5rem; margin:1.5rem 0; }
        .star { font-size:2.5rem; opacity:.3; transition:all .5s ease; }
        .star.earned { opacity:1; animation:starPop .5s ease; }
        @keyframes starPop { 0%{transform:scale(0)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }
        .results-buttons { display:flex; flex-direction:column; gap:1rem; margin-top:2rem; }
        .result-btn { padding:1rem 2rem; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; text-decoration:none; display:flex; align-items:center; justify-content:center; gap:0.5rem; transition:all .2s; }
        .result-btn.primary { background:linear-gradient(135deg,var(--purple),var(--purple-dark)); color:white; }
        .result-btn.secondary { background:#F1F5F9; color:var(--text-dark); }
        .result-btn:hover { transform:translateY(-2px); box-shadow:var(--shadow-soft); }
    </style>
</head>
<body>
    <header class="header">
        <a href="a2-m1-index.html" class="back-btn">← Módulo</a>
        <div class="header-info">
            <div class="header-title">📝 Fill in the Blanks</div>
            <div class="header-subtitle">💚 A2 · Módulo 1 · Quantifiers</div>
        </div>
        <div class="progress-indicator"><span id="currentQ">1</span>/10</div>
    </header>
    <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>

    <main>
        <div class="instructions">
            <div class="instructions-icon">📖</div>
            <div>
                <div class="instructions-title">Completa el espacio en blanco</div>
                <div class="instructions-text">Elige el cuantificador correcto: <strong>some, any, no, much, many</strong> o <strong>a lot of</strong>. Usa la pista para guiarte.</div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="results-screen" id="resultsScreen">
            <div class="results-emoji">🎉</div>
            <div class="results-title">¡Completado!</div>
            <div class="results-score" id="finalScore">0/10</div>
            <div class="stars-container">
                <span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span>
            </div>
            <div class="results-message" id="resultsMessage"></div>
            <div class="results-buttons">
                <button class="result-btn primary" onclick="location.reload()">🔄 Intentar de Nuevo</button>
                <a href="a2-m1-index.html" class="result-btn secondary">← Volver al Módulo</a>
            </div>
        </div>
    </main>

    <script>
    const quizData = [
        // ── Q1–Q5: some / any / no ───────────────────────────────────
        {
            id: 1, topic: "some-any",
            sentence: "The agent told Lucia there wasn't _____ water available in the building due to a damaged pipe.",
            translation: "El agente le dijo a Lucia que no había _________ agua disponible en el edificio debido a una tubería dañada.",
            hint: "El agente le comunica que el agua no está. La oración ya tiene una negación.",
            clue: "wasn't (negativa)",
            clueExplain: "'Wasn't' hace la oración negativa. En oraciones negativas con 'be', usamos 'any', nunca 'some'.",
            options: ["any", "some", "no"],
            correct: "any",
            feedback: {
                "some": { errorType: "Some en oración negativa", explanation: "'Some' se usa en oraciones afirmativas ('There was some water'). Con 'wasn't' la oración ya es negativa — el cuantificador correcto es 'any'.", rule: "Afirmativa → some / Negativa → any" },
                "no": { errorType: "Doble negación", explanation: "'No' hace negativa la oración por sí solo ('There was no water'). Combinarlo con 'wasn't' crea una doble negación incorrecta en inglés.", rule: "'No' + verbo afirmativo / 'any' + verbo negativo" }
            },
            rule: "wasn't / didn't / isn't + any (oración negativa)",
            examples: ["There isn't any water", "She didn't find any help", "We don't have any news"],
            correctReason: "La oración es negativa ('wasn't'), así que el cuantificador correcto es 'any'. 'Some' es para afirmativas; 'no' no puede combinarse con 'wasn't'."
        },
        {
            id: 2, topic: "some-any",
            sentence: "The customer asked: \"Is there _____ way to check the outage status online?\"",
            translation: "El cliente preguntó: \"¿Hay _________ forma de verificar el estado del corte en línea?\"",
            hint: "El cliente busca información — quiere saber si existe una opción.",
            clue: "Is there...? (pregunta de información)",
            clueExplain: "En preguntas para obtener información usamos 'any'. 'Some' en preguntas se reserva para ofrecimientos corteses.",
            options: ["any", "some", "no"],
            correct: "any",
            feedback: {
                "some": { errorType: "Some en pregunta de información", explanation: "'Some' en preguntas funciona para ofrecer cosas ('Would you like some help?'). El cliente está pidiendo información — usa 'any'.", rule: "Pregunta de información → any / Ofrecimiento → some" },
                "no": { errorType: "No en pregunta", explanation: "'Is there no way?' convierte la pregunta en una afirmación negativa. El cliente pregunta abiertamente si existe una opción.", rule: "Pregunta abierta → any / Ausencia total afirmada → no" }
            },
            rule: "Is there / Are there + any...? (pregunta de información)",
            examples: ["Is there any update?", "Are there any options?", "Do you have any questions?"],
            correctReason: "El cliente busca información: 'Is there any way?' pregunta si existe o no esa posibilidad. En preguntas de información siempre usamos 'any'."
        },
        {
            id: 3, topic: "some-any",
            sentence: "The agent gave the customer _____ useful advice about enabling data usage alerts on his phone.",
            translation: "El agente le dio al cliente _________ consejo útil sobre cómo activar las alertas de uso de datos en su teléfono.",
            hint: "El agente sí proporcionó consejos — la acción ocurrió y fue positiva.",
            clue: "gave (afirmativa, acción completada)",
            clueExplain: "La oración afirma que el agente sí dio consejos. En oraciones afirmativas usamos 'some'.",
            options: ["some", "any", "no"],
            correct: "some",
            feedback: {
                "any": { errorType: "Any en oración afirmativa", explanation: "'Any' se usa en negativas y preguntas. La oración dice que el agente SÍ dio consejos — es afirmativa, así que necesitas 'some'.", rule: "Afirmativa → some / Negativa o pregunta → any" },
                "no": { errorType: "No contradice el contexto", explanation: "'No useful advice' significaría que el agente no dio ningún consejo. Pero la oración afirma que sí lo hizo — 'no' contradice el sentido.", rule: "'No' = cero cantidad. Aquí hubo consejos → 'some'" }
            },
            rule: "Oración afirmativa + some (cantidad positiva)",
            examples: ["She provided some information", "He sent some updates", "They offered some options"],
            correctReason: "La oración es afirmativa — el agente SÍ dio consejos. En oraciones afirmativas el cuantificador correcto es 'some'."
        },
        {
            id: 4, topic: "some-any",
            sentence: "Ana checked her account online but there were _____ corrections applied to her bill yet.",
            translation: "Ana revisó su cuenta en línea pero todavía no había _________ correcciones aplicadas a su factura.",
            hint: "Ana buscó correcciones pero no encontró ninguna. El verbo 'were' está en forma afirmativa.",
            clue: "there were + but (contraste, ausencia total)",
            clueExplain: "'But' introduce un contraste negativo. Con 'were' (verbo afirmativo) y sentido de ausencia, usamos 'no' para expresar que no había ninguna.",
            options: ["no", "any", "some"],
            correct: "no",
            feedback: {
                "any": { errorType: "Any con verbo afirmativo", explanation: "'There were any corrections' es incorrecto — 'any' necesita verbo negativo ('there weren't any'). Con 'were' afirmativo y sentido negativo, usamos 'no'.", rule: "verbo afirmativo + no / verbo negativo + any" },
                "some": { errorType: "Some contradice el contexto", explanation: "'There were some corrections' significaría que sí había correcciones. Pero Ana no encontró ninguna — 'some' contradice el sentido.", rule: "'Some' = hay cantidad. 'No' = hay cero cantidad." }
            },
            rule: "There were no + sustantivo (ausencia total, verbo afirmativo)",
            examples: ["There was no response", "There were no changes yet", "There is no credit applied"],
            correctReason: "'No' con verbo afirmativo ('were') expresa ausencia total. Equivale a 'there weren't any' pero más directo. Ana no encontró ninguna corrección en su cuenta."
        },
        {
            id: 5, topic: "some-any",
            sentence: "The supervisor asked Ana: \"Would you like _____ time to review the new agreement before signing?\"",
            translation: "El supervisor le preguntó a Ana: \"¿Le gustaría _________ tiempo para revisar el nuevo acuerdo antes de firmar?\"",
            hint: "El supervisor le ofrece algo de manera cortés a Ana.",
            clue: "Would you like...? (ofrecimiento cortés)",
            clueExplain: "Cuando se ofrece algo cortésmente usamos 'some', incluso en preguntas. Es diferente a preguntar si algo existe.",
            options: ["some", "any", "no"],
            correct: "some",
            feedback: {
                "any": { errorType: "Any en ofrecimiento", explanation: "'Would you like any time?' suena raro en inglés. En ofrecimientos corteses se usa 'some': 'Would you like some time?', 'Would you like some coffee?'", rule: "Ofrecimiento cortés → some (incluso en preguntas)" },
                "no": { errorType: "No en ofrecimiento", explanation: "'Would you like no time?' no tiene sentido como ofrecimiento — 'no' niega la cantidad. El supervisor ofrece tiempo real — usa 'some'.", rule: "'No' = negación / 'Some' = cantidad ofrecida" }
            },
            rule: "Would you like some...? / Can I offer you some...? (ofrecimiento cortés)",
            examples: ["Would you like some time?", "Can I offer you some assistance?", "Shall I send you some information?"],
            correctReason: "'Would you like some...?' es la forma estándar para ofrecimientos corteses. En ofrecimientos usamos 'some' aunque la oración sea una pregunta."
        },
        // ── Q6–Q10: much / many / a lot of ──────────────────────────
        {
            id: 6, topic: "much-many",
            sentence: "The customer used _____ mobile data during his trip because he was streaming videos in the hotel room.",
            translation: "El cliente usó _________ datos móviles durante su viaje porque estaba viendo videos en streaming en la habitación del hotel.",
            hint: "La oración es afirmativa y habla de una cantidad grande de datos. Los datos no se cuentan en unidades individuales.",
            clue: "mobile data (incontable, afirmativa)",
            clueExplain: "'Mobile data' es incontable — no se dice 'one data, two datas'. En oraciones afirmativas con incontables, 'a lot of' es la opción más natural.",
            options: ["a lot of", "much", "many"],
            correct: "a lot of",
            feedback: {
                "much": { errorType: "Much en oración afirmativa", explanation: "'Much' en afirmativas suena muy formal o anticuado ('He used much data'). En oraciones afirmativas con incontables, 'a lot of' es la forma natural y estándar.", rule: "Afirmativa + incontable → a lot of (natural) / much (muy formal)" },
                "many": { errorType: "Many con sustantivo incontable", explanation: "'Data' como concepto general es incontable — no puedes contar 'one data, two datas'. 'Many' es solo para contables en plural.", rule: "many + contable plural / a lot of + incontable (afirmativa)" }
            },
            rule: "a lot of + incontable (afirmativa, estándar)",

            },

            },

        {

    let currentQuestion = 0, score = 0;
    let answered = new Array(quizData.length).fill(false);

    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    function initQuiz() {
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';
        quizData.forEach((q, index) => container.appendChild(createCard(q, index)));
        showQuestion(0);
        updateProgress();
    }

    function createCard(q, index) {
        const card = document.createElement('div');
        card.className = 'question-card' + (index !== 0 ? ' hidden' : '');
        card.id = 'question-' + index;
        const shuffledOpts = shuffle(q.options);
        const badgeClass = q.topic === 'some-any' ? 'some-any' : 'much-many';
        const badgeLabel = q.topic === 'some-any' ? '🟢 some / any / no' : '🔵 much / many / a lot of';
        const btnHTML = shuffledOpts.map(opt =>
            `<button class="option-btn" onclick="selectAnswer(${index}, this)">${opt}</button>`
        ).join('');
        card.innerHTML = `
            <div class="q-header">
                <div class="question-number">${index + 1}</div>
                <span class="qtopic-badge ${badgeClass}">${badgeLabel}</span>
            </div>
            <div class="hint-box"><div class="hint-label">💡 Pista</div>${q.hint}</div>
            <p class="question-text">${q.sentence.replace('_____', `<span class="blank" id="blank-${index}">?</span>`)}</p>
            <p class="translation">${q.translation}</p>
            <div class="options-grid" id="options-${index}">${btnHTML}</div>
            <div class="feedback" id="feedback-${index}"></div>
            <div class="nav-buttons">
                <button class="nav-btn prev" onclick="prevQuestion()" ${index === 0 ? 'disabled' : ''}>← Anterior</button>
                <button class="nav-btn next" id="next-${index}" onclick="nextQuestion(${index})" disabled>
                    ${index === quizData.length - 1 ? 'Ver Resultados 🎉' : 'Siguiente →'}
                </button>
            </div>`;
        return card;
    }

    function selectAnswer(qi, btn) {
        if (answered[qi]) return;
        answered[qi] = true;
        const selected = btn.textContent.trim();
        const q = quizData[qi];
        const isCorrect = selected === q.correct;
        if (isCorrect) score++;
        const blank = document.getElementById('blank-' + qi);
        blank.textContent = selected;
        blank.className = 'blank ' + (isCorrect ? 'correct' : 'incorrect');
        document.querySelectorAll(`#options-${qi} .option-btn`).forEach(b => {
            b.disabled = true;
            if (b.textContent.trim() === q.correct) b.classList.add('correct');
            else if (b.textContent.trim() === selected) b.classList.add('incorrect');
        });
        buildFeedback(qi, selected, isCorrect, q);
        document.getElementById('next-' + qi).disabled = false;
        updateProgress();
    }

    function buildFeedback(qi, selected, isCorrect, q) {
        const el = document.getElementById('feedback-' + qi);
        el.className = 'feedback show ' + (isCorrect ? 'correct' : 'incorrect');
        const exHTML = q.examples.map(e => `<span class="rule-ex">${e}</span>`).join('');
        if (isCorrect) {
            el.innerHTML = `
                <div class="fb-header"><span class="fb-icon">✅</span><div>
                    <div class="fb-title">¡Correcto!</div>
                    <div class="fb-subtitle">Elegiste el cuantificador correcto</div>
                </div></div>
                <div class="fb-body">
                    <div class="fb-signal"><div class="fb-block-title">🔍 La señal clave que debías identificar</div>
                        <div class="fb-signal-text">La señal <span class="signal-tag">${q.clue}</span> en la oración te indicaba qué cuantificador usar. ${q.clueExplain}</div>
                    </div>
                    <div class="fb-rule"><div class="fb-block-title">📐 Regla aplicada</div>
                        <div class="rule-formula">${q.rule}</div>
                        <div class="rule-examples">${exHTML}</div>
                    </div>
                    <div class="fb-why"><div class="fb-block-title">💡 ¿Por qué es correcta?</div>
                        <div class="fb-why-text">${q.correctReason}</div>
                    </div>
                </div>`;
        } else {
            const err = q.feedback[selected] || { errorType: 'Error', explanation: 'Respuesta incorrecta.', rule: '' };
            el.innerHTML = `
                <div class="fb-header"><span class="fb-icon">❌</span><div>
                    <div class="fb-title">Incorrecto</div>
                    <div class="fb-subtitle">Revisemos juntos qué pasó</div>
                </div></div>
                <div class="fb-body">
                    <div class="fb-signal wrong"><div class="fb-block-title">🔍 La señal clave que debías identificar</div>
                        <div class="fb-signal-text">La señal <span class="signal-tag red">${q.clue}</span> te indicaba qué cuantificador usar. ${q.clueExplain}</div>
                    </div>
                    <div class="fb-compare"><div class="fb-block-title" style="color:#64748B;">🔄 Tu respuesta vs. la correcta</div>
                        <div class="fb-compare-row"><span class="compare-label wrong">Tú elegiste</span><span class="compare-text"><span class="word-wrong">${selected}</span></span></div>
                        <div class="fb-compare-row"><span class="compare-label right">Correcto</span><span class="compare-text"><span class="word-right">${q.correct}</span></span></div>
                    </div>
                    <div class="fb-error"><div class="fb-block-title">⚠️ Tipo de error: <span class="error-badge">${err.errorType}</span></div>
                        <div class="error-word-row"><span class="ew-box ew-wrong">${selected}</span><span class="ew-arrow">→</span><span class="ew-box ew-right">${q.correct}</span></div>
                        <div class="error-rule">${err.explanation}</div>
                        ${err.rule ? `<div style="margin-top:0.5rem;font-size:0.82rem;color:var(--error-dark);font-weight:700;">📌 ${err.rule}</div>` : ''}
                    </div>
                    <div class="fb-rule"><div class="fb-block-title">📐 La regla correcta</div>
                        <div class="rule-formula">${q.rule}</div>
                        <div class="rule-examples">${exHTML}</div>
                    </div>
                    <div class="fb-why"><div class="fb-block-title">💡 ¿Por qué es correcta la respuesta?</div>
                        <div class="fb-why-text">${q.correctReason}</div>
                    </div>
                </div>`;
        }
    }

    function showQuestion(i) {
        document.querySelectorAll('.question-card').forEach((c, idx) => c.classList.toggle('hidden', idx !== i));
        document.getElementById('currentQ').textContent = i + 1;
        currentQuestion = i;
    }
    function nextQuestion(i) { if (i < quizData.length - 1) showQuestion(i + 1); else showResults(); }
    function prevQuestion() { if (currentQuestion > 0) showQuestion(currentQuestion - 1); }
    function updateProgress() {
        const done = answered.filter(Boolean).length;
        document.getElementById('progressFill').style.width = (done / quizData.length * 100) + '%';
    }
    function showResults() {
        document.querySelectorAll('.question-card').forEach(c => c.classList.add('hidden'));
        const rs = document.getElementById('resultsScreen');
        rs.classList.add('show');
        const pct = score / quizData.length * 100;
        document.getElementById('finalScore').textContent = `${score}/${quizData.length}`;
        const stars = pct >= 90 ? 3 : pct >= 70 ? 2 : 1;
        document.getElementById('resultsMessage').textContent = pct >= 90
            ? '¡Excelente! Dominas los cuantificadores. 🏆'
            : pct >= 70 ? '¡Muy bien! Sigue practicando. 💪'
            : 'Buen esfuerzo. Repasa some/any/no y much/many/a lot of e inténtalo de nuevo. 📚';
        document.querySelectorAll('.star').forEach((s, i) => {
            if (i < stars) setTimeout(() => s.classList.add('earned'), i * 300);
        });
    }
    document.addEventListener('DOMContentLoaded', initQuiz);
    </script>
