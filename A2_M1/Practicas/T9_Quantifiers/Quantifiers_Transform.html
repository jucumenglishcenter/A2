<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Transform - A2 M1 | JUCUM English</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10B981; --primary-light: #6EE7B7; --primary-dark: #059669;
            --accent: #34D399; --bg-gradient-start: #ECFDF5; --bg-gradient-end: #D1FAE5;
            --text-dark: #064E3B; --text-medium: #065F46; --text-light: #047857;
            --success: #10B981; --success-light: #D1FAE5; --success-dark: #059669;
            --error: #EF4444; --error-light: #FEE2E2; --error-dark: #DC2626;
            --info: #3B82F6; --info-light: #DBEAFE; --info-dark: #1D4ED8;
            --orange: #F97316; --orange-light: #FFF7ED; --orange-dark: #C2410C;
            --purple: #8B5CF6; --purple-light: #EDE9FE; --purple-dark: #6D28D9;
            --shadow-soft: 0 4px 20px rgba(16,185,129,0.15);
            --border-radius: 20px;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:'Nunito',sans-serif; background:linear-gradient(135deg,var(--bg-gradient-start),var(--bg-gradient-end)); min-height:100vh; color:var(--text-dark); }
        .header { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); padding:1rem 1.5rem; display:flex; align-items:center; gap:1rem; position:sticky; top:0; z-index:100; box-shadow:var(--shadow-soft); }
        .back-btn { padding:0.4rem 0.9rem; border-radius:20px; background:rgba(255,255,255,0.3); border:none; display:flex; align-items:center; gap:0.4rem; cursor:pointer; font-size:0.9rem; font-weight:700; text-decoration:none; color:white; transition:all .2s; flex-shrink:0; }
        .back-btn:hover { background:rgba(255,255,255,0.5); }
        .header-info { flex:1; }
        .header-title { font-family:'Fredoka',sans-serif; font-size:1.1rem; font-weight:600; color:white; }
        .header-subtitle { font-size:0.8rem; color:rgba(255,255,255,0.85); margin-top:2px; }
        .progress-indicator { background:rgba(255,255,255,0.3); padding:0.4rem 0.9rem; border-radius:20px; font-weight:700; color:white; font-size:0.9rem; }
        .progress-container { height:6px; background:rgba(255,255,255,0.3); }
        .progress-fill { height:100%; background:white; transition:width .5s ease; width:0%; }
        main { padding:1.5rem; max-width:650px; margin:0 auto; }
        .instructions { background:white; border-radius:16px; padding:1rem 1.25rem; margin-bottom:1.25rem; box-shadow:var(--shadow-soft); border-left:5px solid var(--primary); display:flex; gap:0.75rem; align-items:flex-start; }
        .instructions-icon { font-size:1.6rem; flex-shrink:0; }
        .instructions-title { font-family:'Fredoka',sans-serif; font-size:1rem; font-weight:600; color:var(--text-dark); margin-bottom:0.2rem; }
        .instructions-text { font-size:0.85rem; color:var(--text-medium); line-height:1.5; }
        .question-card { background:white; border-radius:var(--border-radius); box-shadow:var(--shadow-soft); padding:1.5rem; margin-bottom:1rem; animation:slideIn .4s ease; }
        .question-card.hidden { display:none; }
        @keyframes slideIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
        .q-header { display:flex; align-items:center; gap:0.75rem; margin-bottom:1rem; }
        .question-number { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; display:flex; align-items:center; justify-content:center; font-family:'Fredoka',sans-serif; font-weight:700; font-size:0.95rem; flex-shrink:0; }
        .qtopic-badge { display:inline-flex; align-items:center; gap:0.3rem; padding:0.2rem 0.7rem; border-radius:20px; font-size:0.72rem; font-weight:700; }
        .qtopic-badge.some-any { background:#D1FAE5; color:#065F46; }
        .qtopic-badge.much-many { background:#DBEAFE; color:#1D4ED8; }
        .transform-visual { background:var(--bg-gradient-start); border:1px solid var(--primary-light); border-radius:14px; padding:1rem; margin-bottom:1rem; }
        .transform-box { padding:0.7rem 0.9rem; border-radius:10px; }
        .transform-box.base { background:var(--orange-light); border:1px solid #FED7AA; margin-bottom:0.5rem; }
        .transform-box.goal { background:#F0F9FF; border:1px solid #BAE6FD; }
        .transform-label { font-size:0.72rem; font-weight:800; text-transform:uppercase; letter-spacing:.5px; display:block; margin-bottom:0.3rem; }
        .transform-box.base .transform-label { color:var(--orange-dark); }
        .transform-box.goal .transform-label { color:var(--info-dark); }
        .transform-sentence { font-size:0.98rem; font-weight:600; color:var(--text-dark); line-height:1.5; }
        .word-error { color:var(--error); font-weight:800; background:#FEE2E2; padding:0 4px; border-radius:3px; text-decoration:line-through; }
        .transform-arrow { text-align:center; font-size:1rem; color:var(--text-light); margin:0.2rem 0; }
        .options-container { display:flex; flex-direction:column; gap:0.65rem; margin-bottom:0.5rem; }
        .option-btn { border:2.5px solid #E5E7EB; border-radius:13px; padding:0.85rem 1rem; cursor:pointer; transition:all .2s; background:white; text-align:left; font-family:'Nunito',sans-serif; display:flex; gap:0.75rem; align-items:center; width:100%; }
        .option-btn:hover:not(.disabled) { border-color:var(--primary); background:var(--bg-gradient-start); transform:translateX(4px); }
        .option-btn.disabled { cursor:default; }
        .option-btn.selected-correct { border-color:var(--success); background:var(--success-light); }
        .option-btn.selected-incorrect { border-color:var(--error); background:var(--error-light); }
        .option-letter { width:26px; height:26px; border-radius:50%; background:var(--primary-light); color:var(--primary-dark); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:0.8rem; flex-shrink:0; font-family:'Fredoka',sans-serif; }
        .option-btn.selected-correct .option-letter { background:var(--success); color:white; }
        .option-btn.selected-incorrect .option-letter { background:var(--error); color:white; }
        .option-text { font-size:0.97rem; color:var(--text-dark); line-height:1.5; font-weight:600; flex:1; }
        .option-btn.selected-correct .option-text { color:var(--success-dark); }
        .option-btn.selected-incorrect .option-text { color:var(--error-dark); }
        .feedback { margin-top:1.25rem; border-radius:16px; overflow:hidden; display:none; box-shadow:0 4px 16px rgba(0,0,0,0.1); }
        .feedback.show { display:block; animation:fadeUp .35s ease; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        .fb-header { padding:0.9rem 1.25rem; display:flex; align-items:center; gap:0.75rem; }
        .feedback.correct .fb-header { background:linear-gradient(135deg,var(--success),var(--success-dark)); }
        .feedback.incorrect .fb-header { background:linear-gradient(135deg,var(--error),var(--error-dark)); }
        .fb-icon { font-size:1.6rem; }
        .fb-title { font-family:'Fredoka',sans-serif; font-size:1.1rem; color:white; font-weight:600; }
        .fb-subtitle { font-size:0.8rem; color:rgba(255,255,255,0.85); margin-top:1px; }
        .fb-body { background:white; border:2px solid; border-top:none; border-radius:0 0 16px 16px; padding:1.25rem; display:flex; flex-direction:column; gap:0.9rem; }
        .feedback.correct .fb-body { border-color:var(--success); }
        .feedback.incorrect .fb-body { border-color:var(--error); }
        .fb-block { border-radius:12px; padding:0.9rem 1rem; }
        .fb-block-title { font-weight:800; font-size:0.78rem; text-transform:uppercase; letter-spacing:.6px; margin-bottom:0.5rem; display:flex; align-items:center; gap:0.4rem; flex-wrap:wrap; }
        .error-badge { display:inline-block; background:var(--error); color:white; padding:0.15rem 0.55rem; border-radius:6px; font-size:0.72rem; font-weight:700; margin-left:4px; }
        .fb-transform { background:#F8FAFC; border:1px solid #E2E8F0; }
        .fb-transform .fb-block-title { color:#475569; }
        .transform-flow { display:flex; flex-direction:column; gap:0.4rem; }
        .tf-step { padding:0.5rem 0.8rem; border-radius:9px; font-size:0.93rem; font-weight:600; line-height:1.5; }
        .tf-step.original { background:var(--orange-light); color:var(--orange-dark); border:1px solid #FED7AA; }
        .tf-step.tf-wrong { background:var(--error-light); color:var(--error-dark); border:1px solid #FECACA; text-decoration:line-through; }
        .tf-step.tf-correct { background:var(--success-light); color:var(--success-dark); border:1px solid #BBF7D0; }
        .tf-label { font-size:0.7rem; font-weight:800; text-transform:uppercase; margin-right:6px; opacity:.7; }
        .tf-arrow { text-align:center; color:#94A3B8; font-size:0.9rem; }
        .vb-hl { font-weight:800; text-decoration:underline; }
        .fb-signal { background:#F0FDF4; border:1px solid #BBF7D0; }
        .fb-signal.wrong { background:#FFF1F2; border-color:#FECDD3; }
        .fb-signal .fb-block-title { color:var(--success-dark); }
        .fb-signal.wrong .fb-block-title { color:var(--error-dark); }
        .signal-tag { display:inline-block; background:var(--success); color:white; border-radius:6px; padding:0.1rem 0.5rem; font-size:0.82rem; font-weight:700; margin:0 2px; }
        .signal-tag.red { background:var(--error); }
        .fb-error { background:var(--error-light); border:1px solid #FECACA; }
        .fb-error .fb-block-title { color:var(--error-dark); }
        .word-swap { display:flex; align-items:center; justify-content:center; gap:0.75rem; margin:0.6rem 0; }
        .ws-box { padding:0.4rem 1rem; border-radius:8px; font-weight:700; font-size:1rem; }
        .ws-wrong { background:white; color:var(--error); border:2px solid var(--error); text-decoration:line-through; }
        .ws-arrow { font-size:1.3rem; color:#94A3B8; }
        .ws-right { background:var(--success); color:white; }
        .error-text { font-size:0.9rem; color:var(--text-dark); line-height:1.55; }
        .fb-rule { background:var(--info-light); border:1px solid #BFDBFE; }
        .fb-rule .fb-block-title { color:var(--info-dark); }
        .rule-formula { background:white; border-radius:8px; padding:0.5rem 0.9rem; font-family:'Fredoka',sans-serif; font-size:0.95rem; color:var(--info-dark); font-weight:600; margin-bottom:0.6rem; text-align:center; border:1px solid #BFDBFE; }
        .rule-examples { display:flex; flex-wrap:wrap; gap:0.4rem; }
        .rule-ex { font-size:0.82rem; background:white; border:1px solid #BFDBFE; border-radius:6px; padding:0.2rem 0.6rem; color:var(--info-dark); font-weight:600; }
        .fb-why { background:#F0FDF4; border:1px solid #BBF7D0; }
        .fb-why .fb-block-title { color:var(--success-dark); }
        .fb-why-text { font-size:0.92rem; color:var(--text-dark); line-height:1.55; }
        .nav-buttons { display:flex; gap:0.75rem; margin-top:1.25rem; }
        .nav-btn { padding:0.8rem 1.2rem; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-size:0.95rem; font-weight:700; cursor:pointer; transition:all .2s; }
        .nav-btn.next { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; flex:1; }
        .nav-btn.prev { background:#F1F5F9; color:var(--text-dark); }
        .nav-btn:disabled { opacity:.4; cursor:default; }
        .nav-btn:not(:disabled):hover { transform:translateY(-2px); box-shadow:var(--shadow-soft); }
        .results-screen { display:none; text-align:center; padding:2rem 1.5rem; }
        .results-screen.show { display:block; animation:fadeUp .5s ease; }
        .results-emoji { font-size:4rem; margin-bottom:1rem; }
        .results-title { font-family:'Fredoka',sans-serif; font-size:2rem; margin-bottom:0.5rem; }
        .results-score { font-size:3rem; font-weight:800; color:var(--purple); margin:1rem 0; }
        .results-message { font-size:1.05rem; color:var(--text-medium); margin-bottom:1.5rem; }
        .stars-container { display:flex; justify-content:center; gap:0.5rem; margin:1.5rem 0; }
        .star { font-size:2.5rem; opacity:.3; transition:all .5s ease; }
        .star.earned { opacity:1; animation:starPop .5s ease; }
        @keyframes starPop { 0%{transform:scale(0)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }
        .results-buttons { display:flex; flex-direction:column; gap:1rem; margin-top:2rem; }
        .result-btn { padding:1rem 2rem; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; text-decoration:none; display:flex; align-items:center; justify-content:center; gap:0.5rem; transition:all .2s; }
        .result-btn.primary { background:linear-gradient(135deg,var(--purple),var(--purple-dark)); color:white; }
        .result-btn.secondary { background:#F1F5F9; color:var(--text-dark); }
        .result-btn:hover { transform:translateY(-2px); box-shadow:var(--shadow-soft); }
    </style>
</head>
<body>
    <header class="header">
        <a href="a2-m1-index.html" class="back-btn">← Módulo</a>
        <div class="header-info">
            <div class="header-title">🔄 Transform</div>
            <div class="header-subtitle">💚 A2 · Módulo 1 · Quantifiers</div>
        </div>
        <div class="progress-indicator"><span id="currentQ">1</span>/10</div>
    </header>
    <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>

    <main>
        <div class="instructions">
            <div class="instructions-icon">🔄</div>
            <div>
                <div class="instructions-title">Corrige el cuantificador</div>
                <div class="instructions-text">La oración tiene un cuantificador incorrecto (marcado en rojo). Elige la versión corregida.</div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="results-screen" id="resultsScreen">
            <div class="results-emoji">🎉</div>
            <div class="results-title">¡Completado!</div>
            <div class="results-score" id="finalScore">0/10</div>
            <div class="stars-container">
                <span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span>
            </div>
            <div class="results-message" id="resultsMessage"></div>
            <div class="results-buttons">
                <button class="result-btn primary" onclick="location.reload()">🔄 Intentar de Nuevo</button>
                <a href="a2-m1-index.html" class="result-btn secondary">← Volver al Módulo</a>
            </div>
        </div>
    </main>

    <script>
    const quizData = [
        // ── Q1–Q5: some / any / no ───────────────────────────────────
        {
            id: 1, topic: "some-any",
            base: "Lucia asked the building manager: \"Is there <ERR>some</ERR> news about the pipe repair?\"",
            errorWord: "some", correctWord: "any",
            goal: "Corrige el cuantificador",
            clue: "Is there...? (pregunta de información)",
            clueExplain: "En preguntas de información usamos 'any', no 'some'. 'Some' en preguntas es solo para ofrecimientos.",
            options: [
                { text: "Lucia asked the building manager: \"Is there any news about the pipe repair?\"", correct: true, keyWord: "any" },
                { text: "Lucia asked the building manager: \"Is there no news about the pipe repair?\"", correct: false, keyWord: "no",
                  errorType: "No en pregunta", explanation: "'No news' afirma que no hay noticias — convierte la pregunta en una afirmación negativa. Para preguntar usamos 'any'." },
                { text: "Lucia asked the building manager: \"Is there some news about the pipe repair?\"", correct: false, keyWord: "some",
                  errorType: "Sin corrección", explanation: "La oración original ya tiene 'some' — no se corrigió nada. El cuantificador correcto para preguntas de información es 'any'." }
            ],
            rule: "Is there / Are there + any...? (pregunta de información)",
            examples: ["Is there any update?", "Are there any workers available?", "Is there any solution?"],
            correctReason: "La pregunta busca información — 'Is there any news?' es la forma correcta. 'Any' es el cuantificador estándar en preguntas de información."
        },
        {
            id: 2, topic: "some-any",
            base: "The agent confirmed there was <ERR>any</ERR> credit applied to the customer's account.",
            errorWord: "any", correctWord: "some",
            goal: "Corrige el cuantificador",
            clue: "confirmed (afirmativa, acción positiva)",
            clueExplain: "La oración es afirmativa — el agente confirma que SÍ había un crédito. En afirmativas con cantidad positiva usamos 'some'.",
            options: [
                { text: "The agent confirmed there was no credit applied to the customer's account.", correct: false, keyWord: "no",
                  errorType: "No contradice el contexto", explanation: "'No credit' significaría que no había ningún crédito. Pero el agente confirma que sí lo hay — 'no' contradice el sentido." },
                { text: "The agent confirmed there was some credit applied to the customer's account.", correct: true, keyWord: "some" },
                { text: "The agent confirmed there was any credit applied to the customer's account.", correct: false, keyWord: "any",
                  errorType: "Sin corrección", explanation: "La oración original ya tiene 'any' — no se corrigió nada. 'Any' en afirmativas es incorrecto; necesitas 'some'." }
            ],
            rule: "Oración afirmativa + some (cantidad positiva)",
            examples: ["There was some credit", "She received some compensation", "He got some information"],
            correctReason: "La oración es afirmativa — el crédito SÍ existe. En afirmativas el cuantificador correcto es 'some'. 'Any' es para negativas y preguntas."
        },
        {
            id: 3, topic: "some-any",
            base: "Ana checked her account and found there were <ERR>any</ERR> unauthorized charges.",
            errorWord: "any", correctWord: "no",
            goal: "Corrige el cuantificador",
            clue: "there were + (ausencia confirmada)",
            clueExplain: "Ana encontró ausencia total de cargos. Con verbo afirmativo ('were') y sentido de ausencia total, usamos 'no'.",
            options: [
                { text: "Ana checked her account and found there were no unauthorized charges.", correct: true, keyWord: "no" },
                { text: "Ana checked her account and found there were some unauthorized charges.", correct: false, keyWord: "some",
                  errorType: "Some contradice el contexto", explanation: "'Some unauthorized charges' significaría que sí había cargos no autorizados. Pero Ana encontró que no había ninguno — 'some' contradice el sentido." },
                { text: "Ana checked her account and found there were any unauthorized charges.", correct: false, keyWord: "any",
                  errorType: "Sin corrección", explanation: "La oración original ya tiene 'any' con 'were' afirmativo — eso es incorrecto. La forma correcta es 'there were no unauthorized charges'." }
            ],
            rule: "There were no + sustantivo (ausencia total, verbo afirmativo)",
            examples: ["There were no errors", "There was no overcharge", "There were no issues found"],
            correctReason: "'No' con verbo afirmativo ('were') expresa ausencia total. Ana confirmó que no había ningún cargo no autorizado — 'no unauthorized charges' es la forma correcta."
        },
        {
            id: 4, topic: "some-any",
            base: "The supervisor said: \"I can offer you <ERR>any</ERR> compensation for the inconvenience.\"",
            errorWord: "any", correctWord: "some",
            goal: "Corrige el cuantificador",
            clue: "I can offer you...? (ofrecimiento cortés)",
            clueExplain: "El supervisor ofrece compensación de manera cortés. En ofrecimientos usamos 'some', no 'any'.",
            options: [
                { text: "The supervisor said: \"I can offer you some compensation for the inconvenience.\"", correct: true, keyWord: "some" },
                { text: "The supervisor said: \"I can offer you no compensation for the inconvenience.\"", correct: false, keyWord: "no",
                  errorType: "No en ofrecimiento", explanation: "'No compensation' significaría que no ofrece nada. Pero el supervisor ofrece compensación real — usa 'some'." },
                { text: "The supervisor said: \"I can offer you any compensation for the inconvenience.\"", correct: false, keyWord: "any",
                  errorType: "Sin corrección", explanation: "La oración original ya tiene 'any' — no se corrigió nada. En ofrecimientos siempre usamos 'some'." }
            ],
            rule: "I can offer you some / Would you like some...? (ofrecimiento → some)",
            examples: ["I can offer you some credit", "Would you like some time?", "Can I give you some information?"],
            correctReason: "El supervisor hace un ofrecimiento cortés — 'I can offer you some compensation' es la forma correcta. En ofrecimientos siempre se usa 'some'."
        },
        {
            id: 5, topic: "some-any",
            base: "The customer didn't find <ERR>no</ERR> solution on the company's website.",
            errorWord: "no", correctWord: "any",
            goal: "Corrige el cuantificador",
            clue: "didn't find (negativa con auxiliar)",
            clueExplain: "'Didn't find' ya hace la oración negativa. 'No' crea una doble negación incorrecta — necesitas 'any'.",
            options: [
                { text: "The customer didn't find some solution on the company's website.", correct: false, keyWord: "some",
                  errorType: "Some en oración negativa", explanation: "'Some' se usa en afirmativas. 'Didn't find' es negativa — necesitas 'any', no 'some'." },
                { text: "The customer didn't find any solution on the company's website.", correct: true, keyWord: "any" },
                { text: "The customer didn't find no solution on the company's website.", correct: false, keyWord: "no",
                  errorType: "Sin corrección", explanation: "La oración original ya tiene 'no' con 'didn't' — esa es la doble negación incorrecta que debes corregir." }
            ],
            rule: "didn't / wasn't / isn't + any (verbo negativo + any)",
            examples: ["didn't find any solution", "didn't receive any reply", "wasn't any progress"],
            correctReason: "'Didn't find' ya es negativa — 'any' es el cuantificador correcto. 'No' con 'didn't' crea una doble negación incorrecta en inglés."
        },
        // ── Q6–Q10: much / many / a lot of ──────────────────────────
        {
            id: 6, topic: "much-many",
            base: "The outage affected <ERR>much</ERR> households in the area, causing widespread frustration.",
            errorWord: "much", correctWord: "many",
            goal: "Corrige el cuantificador",
            clue: "households (contable plural)",
            clueExplain: "'Households' es contable en plural — puedes contar un hogar, dos hogares. 'Much' solo va con incontables.",
            options: [
                { text: "The outage affected many households in the area, causing widespread frustration.", correct: true, keyWord: "many" },
                { text: "The outage affected a lot of households in the area, causing widespread frustration.", correct: false, keyWord: "a lot of",
                  errorType: "A lot of (posible pero menos preciso aquí)", explanation: "Aunque 'a lot of households' es posible en afirmativas, en este contexto formal y estadístico 'many' es más preciso y apropiado." },
                { text: "The outage affected much households in the area, causing widespread frustration.", correct: false, keyWord: "much",
                  errorType: "Sin corrección", explanation: "La oración original ya tiene 'much' con un contable — ese es el error que debes corregir. 'Much' nunca va con sustantivos contables en plural." }
            ],
            rule: "many + contable plural (cantidad grande de unidades contables)",
            examples: ["many households", "many customers", "many complaints"],

    let currentQuestion = 0, score = 0;
    let answered = new Array(quizData.length).fill(false);

    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    function initQuiz() {
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';
        quizData.forEach((q, i) => {
            q.shuffled = shuffle(q.options);
            container.appendChild(createCard(q, i));
        });
        showQuestion(0);
        updateProgress();
    }

    function hl(text, word, cls) {
        if (!word || !text.includes(word)) return text;
        return text.replace(word, `<span class="${cls}">${word}</span>`);
    }

    function createCard(q, index) {
        const card = document.createElement('div');
        card.className = 'question-card' + (index !== 0 ? ' hidden' : '');
        card.id = 'question-' + index;

        const badgeClass = q.topic === 'some-any' ? 'some-any' : 'much-many';
        const badgeLabel = q.topic === 'some-any' ? '🟢 some / any / no' : '🔵 much / many / a lot of';
        const baseHTML = q.base.replace('<ERR>', '<span class="word-error">').replace('</ERR>', '</span>');
        const letters = ['A', 'B', 'C'];

        const optsHTML = q.shuffled.map((opt, i) =>
            `<button class="option-btn" onclick="selectOption(${index}, ${i})">
                <span class="option-letter">${letters[i]}</span>
                <span class="option-text">${opt.text}</span>
            </button>`
        ).join('');

        card.innerHTML = `
            <div class="q-header">
                <div class="question-number">${index + 1}</div>
                <span class="qtopic-badge ${badgeClass}">${badgeLabel}</span>
            </div>
            <div class="transform-visual">
                <div class="transform-box base">
                    <span class="transform-label">⚠️ Oración con error</span>
                    <div class="transform-sentence">${baseHTML}</div>
                </div>
                <div class="transform-arrow">↓ Corrige el cuantificador</div>
                <div class="transform-box goal">
                    <span class="transform-label">🎯 Goal</span>
                    <div class="transform-sentence" style="color:var(--info-dark);">Corrige el cuantificador</div>
                </div>
            </div>
            <div class="options-container" id="options-${index}">${optsHTML}</div>
            <div class="feedback" id="feedback-${index}"></div>
            <div class="nav-buttons">
                <button class="nav-btn prev" onclick="prevQuestion()" ${index === 0 ? 'disabled' : ''}>← Anterior</button>
                <button class="nav-btn next" id="next-${index}" onclick="nextQuestion(${index})" disabled>
                    ${index === quizData.length - 1 ? 'Ver Resultados 🎉' : 'Siguiente →'}
                </button>
            </div>`;
        return card;
    }

    function selectOption(qi, optIdx) {
        if (answered[qi]) return;
        answered[qi] = true;
        const q = quizData[qi];
        const selected = q.shuffled[optIdx];
        const isCorrect = selected.correct;
        const correctOpt = q.shuffled.find(o => o.correct);
        if (isCorrect) score++;

        document.querySelectorAll(`#options-${qi} .option-btn`).forEach((btn, i) => {
            btn.classList.add('disabled');
            if (i === optIdx && isCorrect) btn.classList.add('selected-correct');
            else if (i === optIdx && !isCorrect) btn.classList.add('selected-incorrect');
        });

        buildFeedback(qi, selected, isCorrect, correctOpt, q);
        document.getElementById(`next-${qi}`).disabled = false;
        updateProgress();
    }

    function buildFeedback(qi, selected, isCorrect, correctOpt, q) {
        const el = document.getElementById(`feedback-${qi}`);
        el.className = `feedback show ${isCorrect ? 'correct' : 'incorrect'}`;
        const exHTML = q.examples.map(e => `<span class="rule-ex">${e}</span>`).join('');

        const baseDisplay = q.base.replace('<ERR>', '<span class="vb-hl" style="color:var(--error);">').replace('</ERR>', '</span>');
        const correctDisplay = correctOpt.text.replace(q.correctWord, `<span class="vb-hl" style="color:var(--success-dark);">${q.correctWord}</span>`);

        if (isCorrect) {
            el.innerHTML = `
                <div class="fb-header"><span class="fb-icon">✅</span><div>
                    <div class="fb-title">¡Correcto!</div>
                    <div class="fb-subtitle">Corregiste el cuantificador correctamente</div>
                </div></div>
                <div class="fb-body">
                    <div class="fb-block fb-transform">
                        <div class="fb-block-title">🔄 Corrección realizada</div>
                        <div class="transform-flow">
                            <div class="tf-step original"><span class="tf-label">Error:</span>${baseDisplay}</div>
                            <div class="tf-arrow">↓</div>
                            <div class="tf-step tf-correct"><span class="tf-label">Correcto:</span>${correctDisplay}</div>
                        </div>
                    </div>
                    <div class="fb-block fb-signal">
                        <div class="fb-block-title">🔍 La señal clave que debías identificar</div>
                        <div style="font-size:0.92rem;color:var(--text-dark);line-height:1.55;">
                            La señal <span class="signal-tag">${q.clue}</span> ${q.clueExplain}
                        </div>
                    </div>
                    <div class="fb-block fb-rule">
                        <div class="fb-block-title">📐 Regla aplicada</div>
                        <div class="rule-formula">${q.rule}</div>
                        <div class="rule-examples">${exHTML}</div>
                    </div>
                    <div class="fb-block fb-why">
                        <div class="fb-block-title">💡 ¿Por qué es correcta?</div>
                        <div class="fb-why-text">${q.correctReason}</div>
                    </div>
                </div>`;
        } else {
            const wrongDisplay = selected.text.replace(selected.keyWord, `<span class="vb-hl" style="color:var(--error);text-decoration:line-through;">${selected.keyWord}</span>`);
            el.innerHTML = `
                <div class="fb-header"><span class="fb-icon">❌</span><div>
                    <div class="fb-title">Incorrecto</div>
                    <div class="fb-subtitle">Revisemos juntos qué pasó</div>
                </div></div>
                <div class="fb-body">
                    <div class="fb-block fb-transform">
                        <div class="fb-block-title">🔄 Tu corrección vs. la correcta</div>
                        <div class="transform-flow">
                            <div class="tf-step original"><span class="tf-label">Error original:</span>${baseDisplay}</div>
                            <div class="tf-arrow">↓</div>
                            <div class="tf-step tf-wrong"><span class="tf-label">Tu resp.:</span>${wrongDisplay}</div>
                            <div class="tf-arrow">↕</div>
                            <div class="tf-step tf-correct"><span class="tf-label">Correcto:</span>${correctDisplay}</div>
                        </div>
                    </div>
                    <div class="fb-block fb-signal wrong">
                        <div class="fb-block-title">🔍 La señal clave que debías identificar</div>
                        <div style="font-size:0.92rem;color:var(--text-dark);line-height:1.55;">
                            La señal <span class="signal-tag red">${q.clue}</span> ${q.clueExplain}
                        </div>
                    </div>
                    <div class="fb-block fb-error">
                        <div class="fb-block-title">⚠️ Tipo de error: <span class="error-badge">${selected.errorType}</span></div>
                        <div class="word-swap">
                            <span class="ws-box ws-wrong">${selected.keyWord}</span>
                            <span class="ws-arrow">→</span>
                            <span class="ws-box ws-right">${q.correctWord}</span>
                        </div>
                        <div class="error-text">${selected.explanation}</div>
                    </div>
                    <div class="fb-block fb-rule">
                        <div class="fb-block-title">📐 La regla correcta</div>
                        <div class="rule-formula">${q.rule}</div>
                        <div class="rule-examples">${exHTML}</div>
                    </div>
                    <div class="fb-block fb-why">
                        <div class="fb-block-title">💡 ¿Por qué es correcta la respuesta?</div>
                        <div class="fb-why-text">${q.correctReason}</div>
                    </div>
                </div>`;
        }
    }

    function showQuestion(i) {
        document.querySelectorAll('.question-card').forEach((c, idx) => c.classList.toggle('hidden', idx !== i));
        document.getElementById('currentQ').textContent = i + 1;
        currentQuestion = i;
    }
    function nextQuestion(i) { i < quizData.length - 1 ? showQuestion(i + 1) : showResults(); }
    function prevQuestion() { if (currentQuestion > 0) showQuestion(currentQuestion - 1); }
    function updateProgress() {
        const done = answered.filter(Boolean).length;
        document.getElementById('progressFill').style.width = (done / quizData.length * 100) + '%';
    }
    function showResults() {
        document.querySelectorAll('.question-card').forEach(c => c.classList.add('hidden'));
        document.getElementById('resultsScreen').classList.add('show');
        const pct = score / quizData.length * 100;
        document.getElementById('finalScore').textContent = `${score}/${quizData.length}`;
        const stars = pct >= 90 ? 3 : pct >= 70 ? 2 : 1;
        document.getElementById('resultsMessage').textContent = pct >= 90
            ? '¡Excelente! Corriges los cuantificadores perfectamente. 🏆'
            : pct >= 70 ? '¡Muy bien! Sigue practicando. 💪'
            : 'Buen esfuerzo. Repasa some/any/no y much/many/a lot of e inténtalo de nuevo. 📚';
        document.querySelectorAll('.star').forEach((s, i) => {
            if (i < stars) setTimeout(() => s.classList.add('earned'), i * 300);
        });
    }
    document.addEventListener('DOMContentLoaded', initQuiz);
    </script>
</body>
</html>
