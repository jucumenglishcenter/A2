<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Identification - A2 M1 | JUCUM English</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10B981; --primary-light: #6EE7B7; --primary-dark: #059669;
            --accent: #34D399; --bg-gradient-start: #ECFDF5; --bg-gradient-end: #D1FAE5;
            --text-dark: #064E3B; --text-medium: #065F46; --text-light: #047857;
            --success: #10B981; --success-light: #D1FAE5; --success-dark: #059669;
            --error: #EF4444; --error-light: #FEE2E2; --error-dark: #DC2626;
            --info: #3B82F6; --info-light: #DBEAFE; --info-dark: #1D4ED8;
            --purple: #8B5CF6; --purple-light: #EDE9FE; --purple-dark: #6D28D9;
            --white: #FFFFFF;
            --shadow-soft: 0 4px 20px rgba(16,185,129,0.15);
            --border-radius: 20px;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:'Nunito',sans-serif; background:linear-gradient(135deg,var(--bg-gradient-start),var(--bg-gradient-end)); min-height:100vh; color:var(--text-dark); }

        .header { background:linear-gradient(135deg,#2E7D32 0%,#66BB6A 60%,#A5D6A7 100%); padding:1rem 1.5rem; display:flex; align-items:center; gap:1rem; position:sticky; top:0; z-index:100; box-shadow:var(--shadow-soft); }
        .back-btn { width:40px; height:40px; border-radius:50%; background:rgba(255,255,255,0.3); border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1.4rem; text-decoration:none; color:var(--text-dark); transition:all .2s; flex-shrink:0; }
        .back-btn:hover { background:rgba(255,255,255,0.5); transform:scale(1.1); }
        .header-info { flex:1; }
        .header-title { font-family:'Fredoka',sans-serif; font-size:1.1rem; font-weight:600; color:white; }
        .header-subtitle { font-size:0.8rem; color:rgba(255,255,255,0.85); margin-top:2px; }
        .progress-indicator { background:rgba(255,255,255,0.3); padding:0.4rem 0.9rem; border-radius:20px; font-weight:700; color:white; font-size:0.9rem; }
        .progress-container { height:6px; background:rgba(255,255,255,0.3); }
        .progress-fill { height:100%; background:white; transition:width .5s ease; width:0%; }

        main { padding:1.5rem; max-width:650px; margin:0 auto; }
        .instructions { background:white; border-radius:16px; padding:1rem 1.25rem; margin-bottom:1.25rem; box-shadow:var(--shadow-soft); border-left:5px solid var(--primary); display:flex; gap:0.75rem; align-items:flex-start; }
        .instructions-icon { font-size:1.6rem; flex-shrink:0; }
        .instructions-title { font-family:'Fredoka',sans-serif; font-size:1rem; font-weight:600; color:var(--text-dark); margin-bottom:0.2rem; }
        .instructions-text { font-size:0.85rem; color:var(--text-medium); line-height:1.5; }

        .question-card { background:white; border-radius:var(--border-radius); box-shadow:var(--shadow-soft); padding:1.5rem; margin-bottom:1rem; animation:slideIn .4s ease; }
        .question-card.hidden { display:none; }
        @keyframes slideIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }

        .q-header { display:flex; align-items:center; gap:0.75rem; margin-bottom:1rem; flex-wrap:wrap; }
        .question-number { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; display:flex; align-items:center; justify-content:center; font-family:'Fredoka',sans-serif; font-weight:700; font-size:0.95rem; flex-shrink:0; }
        .q-label { font-size:0.88rem; color:var(--text-medium); font-weight:600; }
        .noun-type-badge { display:inline-flex; align-items:center; gap:0.3rem; padding:0.2rem 0.7rem; border-radius:20px; font-size:0.72rem; font-weight:700; margin-left:auto; }
        .noun-type-badge.countable { background:#D1FAE5; color:#059669; }
        .noun-type-badge.uncountable { background:#EDE9FE; color:#7C3AED; }

        .sentence-options { display:flex; flex-direction:column; gap:0.7rem; margin-bottom:0.5rem; }
        .sent-option { border:2.5px solid #E5E7EB; border-radius:14px; padding:1rem 1.1rem; cursor:pointer; transition:all .2s; background:white; text-align:left; font-family:'Nunito',sans-serif; display:flex; gap:0.75rem; align-items:flex-start; width:100%; }
        .sent-option:hover:not(.disabled) { border-color:var(--primary); background:var(--bg-gradient-start); transform:translateX(4px); }
        .sent-option.disabled { cursor:default; }
        .sent-option.correct { border-color:var(--success); background:var(--success-light); }
        .sent-option.incorrect { border-color:var(--error); background:var(--error-light); }
        .option-letter { width:26px; height:26px; border-radius:50%; background:#D1FAE5; color:var(--primary-dark); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:0.8rem; flex-shrink:0; margin-top:1px; font-family:'Fredoka',sans-serif; }
        .sent-option.correct .option-letter { background:var(--success); color:white; }
        .sent-option.incorrect .option-letter { background:var(--error); color:white; }
        .option-text { font-size:0.98rem; color:var(--text-dark); line-height:1.55; font-weight:600; flex:1; }
        .sent-option.correct .option-text { color:var(--success-dark); }
        .sent-option.incorrect .option-text { color:var(--error-dark); }
        .option-status { font-size:1.1rem; margin-left:auto; flex-shrink:0; opacity:0; transition:opacity .2s; }
        .sent-option.correct .option-status, .sent-option.incorrect .option-status { opacity:1; }

        .error-highlight { color:var(--error); font-weight:800; text-decoration:underline wavy var(--error); }
        .correct-highlight { color:var(--success-dark); font-weight:800; }

        .feedback { margin-top:1.25rem; border-radius:16px; overflow:hidden; display:none; box-shadow:0 4px 16px rgba(0,0,0,0.1); }
        .feedback.show { display:block; animation:fadeUp .35s ease; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

        .fb-header { padding:0.9rem 1.25rem; display:flex; align-items:center; gap:0.75rem; }
        .feedback.correct .fb-header { background:linear-gradient(135deg,var(--success),var(--success-dark)); }
        .feedback.incorrect .fb-header { background:linear-gradient(135deg,var(--error),var(--error-dark)); }
        .fb-icon { font-size:1.6rem; }
        .fb-title { font-family:'Fredoka',sans-serif; font-size:1.1rem; color:white; font-weight:600; }
        .fb-subtitle { font-size:0.8rem; color:rgba(255,255,255,0.85); margin-top:1px; }

        .fb-body { background:white; border:2px solid; border-top:none; border-radius:0 0 16px 16px; padding:1.25rem; display:flex; flex-direction:column; gap:0.9rem; }
        .feedback.correct .fb-body { border-color:var(--success); }
        .feedback.incorrect .fb-body { border-color:var(--error); }

        .fb-block { border-radius:12px; padding:0.9rem 1rem; }
        .fb-block-title { font-weight:800; font-size:0.78rem; text-transform:uppercase; letter-spacing:.6px; margin-bottom:0.5rem; display:flex; align-items:center; gap:0.4rem; flex-wrap:wrap; }
        .error-badge { display:inline-block; background:var(--error); color:white; padding:0.15rem 0.55rem; border-radius:6px; font-size:0.72rem; font-weight:700; margin-left:4px; }

        .fb-signal { background:#F0FDF4; border:1px solid #BBF7D0; }
        .fb-signal.wrong { background:#FFF1F2; border-color:#FECDD3; }
        .fb-signal .fb-block-title { color:var(--success-dark); }
        .fb-signal.wrong .fb-block-title { color:var(--error-dark); }
        .signal-tag { display:inline-block; background:var(--success); color:white; border-radius:6px; padding:0.1rem 0.5rem; font-size:0.82rem; font-weight:700; margin:0 2px; }
        .signal-tag.red { background:var(--error); }

        .fb-compare { background:#F8FAFC; border:1px solid #E2E8F0; }
        .fb-compare .fb-block-title { color:#475569; }
        .compare-row { display:flex; align-items:flex-start; gap:0.6rem; padding:0.4rem 0; border-bottom:1px dashed #E2E8F0; }
        .compare-row:last-child { border-bottom:none; }
        .compare-label { font-size:0.72rem; font-weight:800; text-transform:uppercase; white-space:nowrap; padding:0.15rem 0.5rem; border-radius:6px; flex-shrink:0; margin-top:2px; }
        .compare-label.wrong { background:var(--error-light); color:var(--error-dark); }
        .compare-label.right { background:var(--success-light); color:var(--success-dark); }
        .compare-text { font-size:0.95rem; color:var(--text-dark); line-height:1.55; }

        .fb-error { background:var(--error-light); border:1px solid #FECACA; }
        .fb-error .fb-block-title { color:var(--error-dark); }
        .word-swap { display:flex; align-items:center; justify-content:center; gap:0.75rem; margin:0.6rem 0; }
        .ws-box { padding:0.4rem 1rem; border-radius:8px; font-weight:700; font-size:1rem; }
        .ws-wrong { background:white; color:var(--error); border:2px solid var(--error); text-decoration:line-through; }
        .ws-arrow { font-size:1.3rem; color:#94A3B8; }
        .ws-right { background:var(--success); color:white; }
        .error-text { font-size:0.9rem; color:var(--text-dark); line-height:1.55; }

        .fb-rule { background:var(--info-light); border:1px solid #BFDBFE; }
        .fb-rule .fb-block-title { color:var(--info-dark); }
        .rule-formula { background:white; border-radius:8px; padding:0.5rem 0.9rem; font-family:'Fredoka',sans-serif; font-size:0.95rem; color:var(--info-dark); font-weight:600; margin-bottom:0.6rem; text-align:center; border:1px solid #BFDBFE; }
        .rule-examples { display:flex; flex-wrap:wrap; gap:0.4rem; }
        .rule-ex { display:flex; align-items:center; gap:0.3rem; font-size:0.82rem; background:white; border:1px solid #BFDBFE; border-radius:6px; padding:0.2rem 0.5rem; }
        .rule-ex .base { color:var(--info-dark); font-weight:600; }
        .rule-ex .arrow { color:#94A3B8; }
        .rule-ex .past { color:var(--success-dark); font-weight:700; }

        .fb-why { background:#F0FDF4; border:1px solid #BBF7D0; }
        .fb-why .fb-block-title { color:var(--success-dark); }
        .fb-why-text { font-size:0.92rem; color:var(--text-dark); line-height:1.55; }

        .nav-buttons { display:flex; gap:0.75rem; margin-top:1.25rem; }
        .nav-btn { padding:0.8rem 1.2rem; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-size:0.95rem; font-weight:700; cursor:pointer; transition:all .2s; }
        .nav-btn.next { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; flex:1; }
        .nav-btn.prev { background:#F1F5F9; color:var(--text-dark); }
        .nav-btn:disabled { opacity:.4; cursor:default; }
        .nav-btn:not(:disabled):hover { transform:translateY(-2px); box-shadow:var(--shadow-soft); }

        .results-screen { display:none; text-align:center; padding:2rem 1.5rem; }
        .results-screen.show { display:block; animation:fadeUp .5s ease; }
        .results-emoji { font-size:4rem; margin-bottom:1rem; }
        .results-title { font-family:'Fredoka',sans-serif; font-size:2rem; margin-bottom:0.5rem; }
        .results-score { font-size:3rem; font-weight:800; color:var(--purple); margin:1rem 0; }
        .results-message { font-size:1.05rem; color:var(--text-medium); margin-bottom:1.5rem; }
        .stars-container { display:flex; justify-content:center; gap:0.5rem; margin:1.5rem 0; }
        .star { font-size:2.5rem; opacity:.3; transition:all .5s ease; }
        .star.earned { opacity:1; animation:starPop .5s ease; }
        @keyframes starPop { 0%{transform:scale(0)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }
        .results-buttons { display:flex; flex-direction:column; gap:1rem; margin-top:2rem; }
        .result-btn { padding:1rem 2rem; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; text-decoration:none; display:flex; align-items:center; justify-content:center; gap:0.5rem; transition:all .2s; }
        .result-btn.primary { background:linear-gradient(135deg,var(--purple),var(--purple-dark)); color:white; }
        .result-btn.secondary { background:#F1F5F9; color:var(--text-dark); }
        .result-btn:hover { transform:translateY(-2px); box-shadow:var(--shadow-soft); }
    </style>
</head>
<body>
    <header class="header">
        <a href="a2-m1-index.html" class="back-btn">&#8592;</a>
        <div class="header-info">
            <div class="header-title">&#128269; Identification</div>
            <div class="header-subtitle">&#128154; A2 &middot; M&oacute;dulo 1 &middot; Countable &amp; Uncountable Nouns</div>
        </div>
        <div class="progress-indicator"><span id="currentQ">1</span>/15</div>
    </header>
    <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>

    <main>
        <div class="instructions">
            <div class="instructions-icon">&#128269;</div>
            <div>
                <div class="instructions-title">Identifica la oración correcta</div>
                <div class="instructions-text">Lee las tres oraciones y elige la que use correctamente los sustantivos contables e incontables con <strong>How much</strong>, <strong>How many</strong> y sus cuantificadores.</div>
            </div>
        </div>

        <div id="questionsContainer"></div>

        <div class="results-screen" id="resultsScreen">
            <div class="results-emoji">&#127881;</div>
            <div class="results-title">&#161;Completado!</div>
            <div class="results-score" id="finalScore">0/15</div>
            <div class="stars-container">
                <span class="star">&#11088;</span><span class="star">&#11088;</span><span class="star">&#11088;</span>
            </div>
            <div class="results-message" id="resultsMessage"></div>
            <div class="results-buttons">
                <button class="result-btn primary" onclick="location.reload()">&#128260; Intentar de Nuevo</button>
                <a href="a2-m1-index.html" class="result-btn secondary">&#8592; Volver al M&oacute;dulo</a>
            </div>
        </div>
    </main>

    <script>
    // ============================================================
    // IDENTIFY — A2 M1
    // Tema: Countable vs Uncountable Nouns + How much / How many
    // 15 preguntas | 3 oraciones por pregunta | 1 sola correcta
    // Sustantivos distintos a los usados en Fill
    // Personajes: Lucia, James, Nadia, Carlos
    // ============================================================
    const quizData = [
        {
            id: 1,
            nounType: "uncountable",
            options: [
                { text: "How much information did the agent give Nadia about the contract?", correct: true },
                { text: "How many information did the agent give Nadia about the contract?", correct: false,
                  errorWord: "How many", correctWord: "How much",
                  errorType: "Cuantificador incorrecto \u2014 Incontable",
                  explanation: "'Information' es incontable \u2014 nunca tiene plural. No puedes decir 'one information, two informations'. Los incontables necesitan 'How much', no 'How many'." },
                { text: "How much informations did the agent give Nadia about the contract?", correct: false,
                  errorWord: "informations", correctWord: "information",
                  errorType: "Plural incorrecto de Incontable",
                  explanation: "'Informations' no existe en ingl\u00e9s. 'Information' es incontable y nunca lleva -s. La forma correcta es siempre 'information' (sin plural)." }
            ],
            clue: "information",
            clueExplain: "es incontable \u2014 no tiene forma plural en ingl\u00e9s y siempre necesita 'How much'.",
            rule: "How much + incontable (sin -s)",
            examples: ["information \u2192 How much", "advice \u2192 How much", "news \u2192 How much"],
            correctReason: "'Information' es incontable: no tiene plural y no se puede numerar directamente. La pregunta correcta es 'How much information'. Compara con contables: 'How many documents', 'How many emails'."
        },
        {
            id: 2,
            nounType: "countable",
            options: [
                { text: "How much problems did Carlos report to the building manager?", correct: false,
                  errorWord: "How much", correctWord: "How many",
                  errorType: "Cuantificador de Incontable con Contable",
                  explanation: "'Problems' tiene -s de plural \u2014 es contable. Puedes contar: one problem, two problems. Los contables en plural necesitan 'How many', no 'How much'." },
                { text: "How many problems did Carlos report to the building manager?", correct: true },
                { text: "How few problems did Carlos report to the building manager?", correct: false,
                  errorWord: "How few", correctWord: "How many",
                  errorType: "Estructura no interrogativa de cantidad",
                  explanation: "'How few' no hace preguntas de cantidad \u2014 describe escasez. Para preguntar el n\u00famero de problemas contables, usamos 'How many problems'." }
            ],
            clue: "problems",
            clueExplain: "tiene -s de plural, lo que confirma que es un sustantivo contable. Los contables en plural usan 'How many'.",
            rule: "How many + contable plural (con -s)",
            examples: ["problems \u2192 How many", "requests \u2192 How many", "issues \u2192 How many"],
            correctReason: "'Problems' es contable \u2014 puedes numerarlos: one problem, two problems, three problems. Para preguntar su n\u00famero siempre usamos 'How many problems'."
        },
        {
            id: 3,
            nounType: "uncountable",
            options: [
                { text: "James didn't make a few progress with the online store for weeks.", correct: false,
                  errorWord: "a few", correctWord: "much",
                  errorType: "Cuantificador de Contable con Incontable",
                  explanation: "'A few' se usa con contables en plural ('a few emails'). 'Progress' es incontable \u2014 no tiene plural. El cuantificador correcto para incontables en negativo es 'much': 'didn't make much progress'." },
                { text: "James didn't make many progress with the online store for weeks.", correct: false,
                  errorWord: "many", correctWord: "much",
                  errorType: "Cuantificador de Contable con Incontable",
                  explanation: "'Many' se usa con contables en plural ('many emails'). 'Progress' es incontable \u2014 no tiene plural ni acepta 'many'. La forma correcta es 'much progress'." },
                { text: "James didn't make much progress with the online store for weeks.", correct: true }
            ],
            clue: "progress",
            clueExplain: "es incontable en ingl\u00e9s \u2014 nunca tiene plural y no acepta 'many' ni 'a few'. Usa 'much' o 'a lot of'.",
            rule: "much + incontable / many + contable plural",
            examples: ["progress \u2192 much", "damage \u2192 much", "information \u2192 much"],
            correctReason: "'Progress' es incontable \u2014 no existe 'progresses' en este sentido. La frase correcta es 'much progress' (o 'a lot of progress' en registro informal). 'Many progress' y 'a few progress' son agramaticales."
        },
        {
            id: 4,
            nounType: "countable",
            options: [
                { text: "How many days did Lucia wait for the pipe to be fixed?", correct: true },
                { text: "How much days did Lucia wait for the pipe to be fixed?", correct: false,
                  errorWord: "How much", correctWord: "How many",
                  errorType: "Cuantificador de Incontable con Contable",
                  explanation: "'Days' tiene -s de plural \u2014 es claramente contable. Puedes contar: one day, two days, three days. Los contables en plural necesitan 'How many', no 'How much'." },
                { text: "How little days did Lucia wait for the pipe to be fixed?", correct: false,
                  errorWord: "How little", correctWord: "How many",
                  errorType: "Cuantificador de Incontable con Contable",
                  explanation: "'How little' se usa con incontables ('How little time'). 'Days' es contable \u2014 la pregunta correcta es 'How many days', no 'How little days'." }
            ],
            clue: "days",
            clueExplain: "tiene -s de plural \u2014 es un sustantivo contable. Para preguntar el n\u00famero de d\u00edas usamos 'How many'.",
            rule: "How many + contable plural",
            examples: ["days \u2192 How many", "weeks \u2192 How many", "hours \u2192 How many"],
            correctReason: "'Days' es contable: one day, two days, three days. Para preguntar cu\u00e1ntos d\u00edas esperó Lucia, la estructura correcta es 'How many days'."
        },
        {
            id: 5,
            nounType: "uncountable",
            options: [
                { text: "James packed his luggages and prepared to travel to the hobby shop.", correct: false,
                  errorWord: "luggages", correctWord: "luggage",
                  errorType: "Plural incorrecto de Incontable",
                  explanation: "'Luggages' no existe. 'Luggage' es incontable \u2014 nunca tiene plural en ingl\u00e9s. Para hablar de una pieza espec\u00edfica dices 'a piece of luggage'. Para uso general: solo 'luggage'." },
                { text: "James packed his luggage and prepared to travel to the hobby shop.", correct: true },
                { text: "James packed his a luggage and prepared to travel to the hobby shop.", correct: false,
                  errorWord: "a luggage", correctWord: "luggage",
                  errorType: "Art\u00edculo indefinido con Incontable",
                  explanation: "'A luggage' es incorrecto. Los incontables no llevan 'a/an' porque ese art\u00edculo implica que puedes contar uno. Para una maleta espec\u00edfica dices 'a piece of luggage' o simplemente 'his luggage'." }
            ],
            clue: "luggage",
            clueExplain: "es incontable en ingl\u00e9s \u2014 no tiene plural y no acepta 'a/an'. Siempre se usa como 'luggage' o 'some luggage'.",
            rule: "luggage = incontable \u2192 sin plural, sin a/an",
            examples: ["luggage \u2192 sin plural", "furniture \u2192 sin plural", "equipment \u2192 sin plural"],
            correctReason: "'Luggage' es incontable: no tiene plural en ingl\u00e9s y no acepta 'a/an'. La forma correcta es simplemente 'his luggage'. Para hablar de piezas individuales: 'a piece of luggage'."
        },
        {
            id: 6,
            nounType: "uncountable",
            options: [
                { text: "Carlos received much support from the building manager during the heating problem.", correct: true },
                { text: "Carlos received many support from the building manager during the heating problem.", correct: false,
                  errorWord: "many", correctWord: "much",
                  errorType: "Cuantificador de Contable con Incontable",
                  explanation: "'Many' se usa con contables en plural (many workers, many emails). 'Support' es incontable \u2014 no tiene plural. El cuantificador correcto es 'much support'." },
                { text: "Carlos received a few support from the building manager during the heating problem.", correct: false,
                  errorWord: "a few", correctWord: "much",
                  errorType: "Cuantificador de Contable con Incontable",
                  explanation: "'A few' se usa SOLO con contables en plural ('a few workers'). 'Support' es incontable \u2014 para expresar poca cantidad de un incontable usamos 'a little support'. En contexto afirmativo general: 'much support'." }
            ],
            clue: "support",
            clueExplain: "es incontable \u2014 no tiene plural y no acepta 'many' ni 'a few'. Con incontables en afirmaciones usamos 'much' o 'a lot of'.",

    // ── STATE ──
    let currentQuestion = 0, score = 0;
    let answered = new Array(quizData.length).fill(false);

    // ── FISHER-YATES SHUFFLE ──
    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    function initQuiz() {
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';
        quizData.forEach((q, i) => {
            q.shuffled = shuffle(q.options);
            container.appendChild(createCard(q, i));
        });
        showQuestion(0);
        updateProgress();
    }

    function createCard(q, index) {
        const card = document.createElement('div');
        card.className = 'question-card' + (index !== 0 ? ' hidden' : '');
        card.id = 'question-' + index;
        const letters = ['A', 'B', 'C'];
        const badge = q.nounType === 'countable'
            ? '<span class="noun-type-badge countable">&#128230; Contable</span>'
            : '<span class="noun-type-badge uncountable">&#128167; Incontable</span>';

        const optsHTML = q.shuffled.map(function(opt, i) {
            return '<button class="sent-option" onclick="selectOption(' + index + ',' + i + ')">' +
                '<div class="option-letter">' + letters[i] + '</div>' +
                '<div class="option-text">' + opt.text + '</div>' +
                '<div class="option-status">' + (opt.correct ? '&#9989;' : '&#10060;') + '</div>' +
                '</button>';
        }).join('');

        card.innerHTML =
            '<div class="q-header">' +
                '<div class="question-number">' + (index + 1) + '</div>' +
                '<span class="q-label">Elige la oraci\u00f3n gramaticalmente correcta:</span>' +
                badge +
            '</div>' +
            '<div class="sentence-options" id="options-' + index + '">' + optsHTML + '</div>' +
            '<div class="feedback" id="feedback-' + index + '"></div>' +
            '<div class="nav-buttons">' +
                '<button class="nav-btn prev" onclick="prevQuestion()"' + (index === 0 ? ' disabled' : '') + '>\u2190 Anterior</button>' +
                '<button class="nav-btn next" id="next-' + index + '" onclick="nextQuestion(' + index + ')" disabled>' +
                    (index === quizData.length - 1 ? 'Ver Resultados &#127881;' : 'Siguiente \u2192') +
                '</button>' +
            '</div>';
        return card;
    }

    function selectOption(qi, optIdx) {
        if (answered[qi]) return;
        answered[qi] = true;
        const q = quizData[qi];
        const selected = q.shuffled[optIdx];
        const isCorrect = selected.correct;
        const correctOpt = q.shuffled.find(function(o) { return o.correct; });
        if (isCorrect) score++;

        document.querySelectorAll('#options-' + qi + ' .sent-option').forEach(function(btn, i) {
            btn.classList.add('disabled');
            const opt = q.shuffled[i];
            if (opt.correct) btn.classList.add('correct');
            else if (i === optIdx) btn.classList.add('incorrect');
        });

        buildFeedback(qi, selected, isCorrect, correctOpt, q);
        document.getElementById('next-' + qi).disabled = false;
        updateProgress();
    }

    function markError(text, word) {
        if (!word) return text;
        return text.replace(word, '<span class="error-highlight">' + word + '</span>');
    }
    function markCorrect(text, word) {
        if (!word) return text;
        return text.replace(word, '<span class="correct-highlight">' + word + '</span>');
    }

    function buildFeedback(qi, selected, isCorrect, correctOpt, q) {
        const el = document.getElementById('feedback-' + qi);
        el.className = 'feedback show ' + (isCorrect ? 'correct' : 'incorrect');

        const ruleExamples = q.examples.map(function(e) {
            const p = e.split(' \u2192 ');
            return '<span class="rule-ex"><span class="base">' + p[0] + '</span><span class="arrow">\u2192</span><span class="past">' + p[p.length-1] + '</span></span>';
        }).join('');

        if (isCorrect) {
            const errBlocks = q.shuffled.filter(function(o) { return !o.correct; }).map(function(err) {
                return '<div class="fb-block fb-error">' +
                    '<div class="fb-block-title">&#9888;&#65039; Error en una de las opciones: <span class="error-badge">' + err.errorType + '</span></div>' +
                    '<div class="word-swap"><span class="ws-box ws-wrong">' + err.errorWord + '</span><span class="ws-arrow">\u2192</span><span class="ws-box ws-right">' + err.correctWord + '</span></div>' +
                    '<div class="error-text">' + err.explanation + '</div>' +
                    '</div>';
            }).join('');

            el.innerHTML =
                '<div class="fb-header"><span class="fb-icon">&#9989;</span><div>' +
                '<div class="fb-title">&#161;Correcto! Identificaste bien la oraci\u00f3n</div>' +
                '<div class="fb-subtitle">Veamos por qu\u00e9 las otras estaban mal</div>' +
                '</div></div>' +
                '<div class="fb-body">' +
                '<div class="fb-block fb-signal">' +
                '<div class="fb-block-title">&#128269; Se\u00f1al clave en las oraciones</div>' +
                '<div style="font-size:0.92rem;color:var(--text-dark);line-height:1.55;">El sustantivo <span class="signal-tag">' + q.clue + '</span> ' + q.clueExplain + '</div>' +
                '</div>' +
                errBlocks +
                '<div class="fb-block fb-rule"><div class="fb-block-title">&#128208; Regla aplicada</div>' +
                '<div class="rule-formula">' + q.rule + '</div>' +
                '<div class="rule-examples">' + ruleExamples + '</div></div>' +
                '<div class="fb-block fb-why"><div class="fb-block-title">&#128161; \u00bfPor qu\u00e9 la oraci\u00f3n correcta ES correcta?</div>' +
                '<div class="fb-why-text">' + q.correctReason + '</div></div>' +
                '</div>';
        } else {
            el.innerHTML =
                '<div class="fb-header"><span class="fb-icon">&#10060;</span><div>' +
                '<div class="fb-title">Incorrecto \u2014 revisemos juntos</div>' +
                '<div class="fb-subtitle">Identifica la diferencia entre las oraciones</div>' +
                '</div></div>' +
                '<div class="fb-body">' +
                '<div class="fb-block fb-signal wrong">' +
                '<div class="fb-block-title">&#128269; Se\u00f1al clave que deb\u00edas identificar</div>' +
                '<div style="font-size:0.92rem;color:var(--text-dark);line-height:1.55;">El sustantivo <span class="signal-tag red">' + q.clue + '</span> ' + q.clueExplain + '</div>' +
                '</div>' +
                '<div class="fb-block fb-compare">' +
                '<div class="fb-block-title">&#128260; Tu elecci\u00f3n vs. la correcta</div>' +
                '<div class="compare-row"><span class="compare-label wrong">Elegiste</span><span class="compare-text">' + markError(selected.text, selected.errorWord) + '</span></div>' +
                '<div class="compare-row"><span class="compare-label right">Correcta</span><span class="compare-text">' + markCorrect(correctOpt.text, q.clue) + '</span></div>' +
                '</div>' +
                '<div class="fb-block fb-error">' +
                '<div class="fb-block-title">&#9888;&#65039; El error: <span class="error-badge">' + selected.errorType + '</span></div>' +
                '<div class="word-swap"><span class="ws-box ws-wrong">' + selected.errorWord + '</span><span class="ws-arrow">\u2192</span><span class="ws-box ws-right">' + selected.correctWord + '</span></div>' +
                '<div class="error-text">' + selected.explanation + '</div>' +
                '</div>' +
                '<div class="fb-block fb-rule"><div class="fb-block-title">&#128208; La regla correcta</div>' +
                '<div class="rule-formula">' + q.rule + '</div>' +
                '<div class="rule-examples">' + ruleExamples + '</div></div>' +
                '<div class="fb-block fb-why"><div class="fb-block-title">&#128161; \u00bfPor qu\u00e9 la oraci\u00f3n correcta ES correcta?</div>' +
                '<div class="fb-why-text">' + q.correctReason + '</div></div>' +
                '</div>';
        }
    }

    function showQuestion(i) {
        document.querySelectorAll('.question-card').forEach(function(c, idx) { c.classList.toggle('hidden', idx !== i); });
        document.getElementById('currentQ').textContent = i + 1;
        currentQuestion = i;
    }
    function nextQuestion(i) { i < quizData.length - 1 ? showQuestion(i + 1) : showResults(); }
    function prevQuestion() { if (currentQuestion > 0) showQuestion(currentQuestion - 1); }
    function updateProgress() {
        const done = answered.filter(Boolean).length;
        document.getElementById('progressFill').style.width = (done / quizData.length * 100) + '%';
    }
    function showResults() {
        document.querySelectorAll('.question-card').forEach(function(c) { c.classList.add('hidden'); });
        document.getElementById('resultsScreen').classList.add('show');
        const pct = score / quizData.length * 100;
        document.getElementById('finalScore').textContent = score + '/' + quizData.length;
        const stars = pct >= 90 ? 3 : pct >= 70 ? 2 : 1;
        document.getElementById('resultsMessage').textContent = pct >= 90
            ? '\u00a1Excelente! Identificas perfectamente los contables e incontables. \uD83C\uDFC6'
            : pct >= 70 ? '\u00a1Muy bien! Sigue practicando con How much / How many. \uD83D\uDCAA'
            : 'Buen esfuerzo. Repasa los errores y vuelve a intentarlo. \uD83D\uDCDA';
        document.querySelectorAll('.star').forEach(function(s, i) {
            if (i < stars) setTimeout(function() { s.classList.add('earned'); }, i * 300);
        });
    }
    document.addEventListener('DOMContentLoaded', initQuiz);
