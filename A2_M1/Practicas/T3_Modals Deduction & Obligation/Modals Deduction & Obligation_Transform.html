<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Transform - A2 M1 T3 | JUCUM English</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10B981; --primary-light: #6EE7B7; --primary-dark: #059669;
            --accent: #34D399; --bg-gradient-start: #ECFDF5; --bg-gradient-end: #D1FAE5;
            --text-dark: #064E3B; --text-medium: #065F46; --text-light: #047857;
            --success: #10B981; --success-light: #D1FAE5; --success-dark: #059669;
            --error: #EF4444; --error-light: #FEE2E2; --error-dark: #DC2626;
            --info: #3B82F6; --info-light: #DBEAFE; --info-dark: #1D4ED8;
            --orange: #F97316; --orange-light: #FFF7ED; --orange-dark: #C2410C;
            --purple: #8B5CF6; --purple-light: #EDE9FE; --purple-dark: #6D28D9;
            --shadow-soft: 0 4px 20px rgba(16,185,129,0.15);
            --border-radius: 20px;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:'Nunito',sans-serif; background:linear-gradient(135deg,var(--bg-gradient-start),var(--bg-gradient-end)); min-height:100vh; color:var(--text-dark); }
        .header { background:linear-gradient(135deg,#2E7D32 0%,#66BB6A 60%,#A5D6A7 100%); padding:1rem 1.5rem; display:flex; align-items:center; gap:1rem; position:sticky; top:0; z-index:100; box-shadow:var(--shadow-soft); }
        .back-btn { width:40px; height:40px; border-radius:50%; background:rgba(255,255,255,0.3); border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1.4rem; text-decoration:none; color:var(--text-dark); transition:all .2s; flex-shrink:0; }
        .back-btn:hover { background:rgba(255,255,255,0.5); transform:scale(1.1); }
        .header-info { flex:1; }
        .header-title { font-family:'Fredoka',sans-serif; font-size:1.1rem; font-weight:600; color:white; }
        .header-subtitle { font-size:0.8rem; color:rgba(255,255,255,0.85); margin-top:2px; }
        .progress-indicator { background:rgba(255,255,255,0.3); padding:0.4rem 0.9rem; border-radius:20px; font-weight:700; color:white; font-size:0.9rem; }
        .progress-container { height:6px; background:rgba(255,255,255,0.3); }
        .progress-fill { height:100%; background:white; transition:width .5s ease; width:0%; }
        main { padding:1.5rem; max-width:650px; margin:0 auto; }
        .instructions { background:white; border-radius:16px; padding:1rem 1.25rem; margin-bottom:1.25rem; box-shadow:var(--shadow-soft); border-left:5px solid var(--primary); display:flex; gap:0.75rem; align-items:flex-start; }
        .instructions-icon { font-size:1.6rem; flex-shrink:0; }
        .instructions-title { font-family:'Fredoka',sans-serif; font-size:1rem; font-weight:600; color:var(--text-dark); margin-bottom:0.2rem; }
        .instructions-text { font-size:0.85rem; color:var(--text-medium); line-height:1.5; }
        .question-card { background:white; border-radius:var(--border-radius); box-shadow:var(--shadow-soft); padding:1.5rem; margin-bottom:1rem; animation:slideIn .4s ease; }
        .question-card.hidden { display:none; }
        @keyframes slideIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
        .q-header { display:flex; align-items:center; gap:0.75rem; margin-bottom:1rem; flex-wrap:wrap; }
        .question-number { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; display:flex; align-items:center; justify-content:center; font-family:'Fredoka',sans-serif; font-weight:700; font-size:0.95rem; flex-shrink:0; }
        .modal-type-badge { display:inline-flex; align-items:center; gap:0.3rem; padding:0.2rem 0.7rem; border-radius:20px; font-size:0.72rem; font-weight:700; margin-left:auto; }
        .modal-type-badge.deduction { background:#EDE9FE; color:#6D28D9; }
        .modal-type-badge.obligation { background:#DBEAFE; color:#1D4ED8; }
        .transform-visual { background:var(--bg-gradient-start); border:1px solid var(--primary-light); border-radius:14px; padding:1rem; margin-bottom:1rem; }
        .transform-box { padding:0.7rem 0.9rem; border-radius:10px; }
        .transform-box.base { background:var(--orange-light); border:1px solid #FED7AA; margin-bottom:0.5rem; }
        .transform-box.goal { background:#F0F9FF; border:1px solid #BAE6FD; }
        .transform-label { font-size:0.72rem; font-weight:800; text-transform:uppercase; letter-spacing:.5px; display:block; margin-bottom:0.3rem; }
        .transform-box.base .transform-label { color:var(--orange-dark); }
        .transform-box.goal .transform-label { color:var(--info-dark); }
        .transform-sentence { font-size:0.98rem; font-weight:600; color:var(--text-dark); line-height:1.5; }
        .word-error { color:var(--error); font-weight:800; background:#FEE2E2; padding:0 4px; border-radius:4px; text-decoration:underline wavy var(--error); }
        .transform-arrow { text-align:center; font-size:1rem; color:var(--text-light); margin:0.25rem 0; }
        .options-container { display:flex; flex-direction:column; gap:0.65rem; margin-bottom:0.5rem; }
        .option-btn { border:2.5px solid #E5E7EB; border-radius:13px; padding:0.85rem 1rem; cursor:pointer; transition:all .2s; background:white; text-align:left; font-family:'Nunito',sans-serif; display:flex; gap:0.75rem; align-items:center; width:100%; }
        .option-btn:hover:not(.disabled) { border-color:var(--primary); background:var(--bg-gradient-start); transform:translateX(4px); }
        .option-btn.disabled { cursor:default; }
        .option-btn.correct { border-color:var(--success); background:var(--success-light); }
        .option-btn.incorrect { border-color:var(--error); background:var(--error-light); }
        .option-letter { width:26px; height:26px; border-radius:50%; background:#D1FAE5; color:var(--primary-dark); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:0.8rem; flex-shrink:0; font-family:'Fredoka',sans-serif; }
        .option-btn.correct .option-letter { background:var(--success); color:white; }
        .option-btn.incorrect .option-letter { background:var(--error); color:white; }
        .option-text { font-size:0.97rem; color:var(--text-dark); line-height:1.5; font-weight:600; flex:1; }
        .option-btn.correct .option-text { color:var(--success-dark); }
        .option-btn.incorrect .option-text { color:var(--error-dark); }
        .key-word { font-weight:800; }
        .option-btn.correct .key-word { color:var(--success-dark); }
        .option-btn.incorrect .key-word { color:var(--error-dark); text-decoration:underline wavy; }
        .feedback { margin-top:1.25rem; border-radius:16px; overflow:hidden; display:none; box-shadow:0 4px 16px rgba(0,0,0,0.1); }
        .feedback.show { display:block; animation:fadeUp .35s ease; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        .fb-header { padding:0.9rem 1.25rem; display:flex; align-items:center; gap:0.75rem; }
        .feedback.correct .fb-header { background:linear-gradient(135deg,var(--success),var(--success-dark)); }
        .feedback.incorrect .fb-header { background:linear-gradient(135deg,var(--error),var(--error-dark)); }
        .fb-icon { font-size:1.6rem; }
        .fb-title { font-family:'Fredoka',sans-serif; font-size:1.1rem; color:white; font-weight:600; }
        .fb-subtitle { font-size:0.8rem; color:rgba(255,255,255,0.85); margin-top:1px; }
        .fb-body { background:white; border:2px solid; border-top:none; border-radius:0 0 16px 16px; padding:1.25rem; display:flex; flex-direction:column; gap:0.9rem; }
        .feedback.correct .fb-body { border-color:var(--success); }
        .feedback.incorrect .fb-body { border-color:var(--error); }
        .fb-block { border-radius:12px; padding:0.9rem 1rem; }
        .fb-block-title { font-weight:800; font-size:0.78rem; text-transform:uppercase; letter-spacing:.6px; margin-bottom:0.5rem; display:flex; align-items:center; gap:0.4rem; flex-wrap:wrap; }
        .error-badge { display:inline-block; background:var(--error); color:white; padding:0.15rem 0.55rem; border-radius:6px; font-size:0.72rem; font-weight:700; margin-left:4px; }
        .fb-transform { background:#F8FAFC; border:1px solid #E2E8F0; }
        .fb-transform .fb-block-title { color:#475569; }
        .transform-flow { display:flex; flex-direction:column; gap:0.4rem; }
        .tf-step { padding:0.5rem 0.8rem; border-radius:9px; font-size:0.93rem; font-weight:600; line-height:1.5; }
        .tf-step.original { background:var(--orange-light); color:var(--orange-dark); border:1px solid #FED7AA; }
        .tf-step.tf-correct { background:var(--success-light); color:var(--success-dark); border:1px solid #BBF7D0; }
        .tf-step.tf-wrong { background:var(--error-light); color:var(--error-dark); border:1px solid #FECACA; text-decoration:line-through; }
        .tf-label { font-size:0.7rem; font-weight:800; text-transform:uppercase; margin-right:6px; opacity:.7; }
        .tf-arrow { text-align:center; color:#94A3B8; font-size:0.9rem; }
        .vb-hl { font-weight:800; text-decoration:underline; }
        .fb-signal { background:#F0FDF4; border:1px solid #BBF7D0; }
        .fb-signal.wrong { background:#FFF1F2; border-color:#FECDD3; }
        .fb-signal .fb-block-title { color:var(--success-dark); }
        .fb-signal.wrong .fb-block-title { color:var(--error-dark); }
        .signal-tag { display:inline-block; background:var(--success); color:white; border-radius:6px; padding:0.1rem 0.5rem; font-size:0.82rem; font-weight:700; margin:0 2px; }
        .signal-tag.red { background:var(--error); }
        .fb-error { background:var(--error-light); border:1px solid #FECACA; }
        .fb-error .fb-block-title { color:var(--error-dark); }
        .word-swap { display:flex; align-items:center; justify-content:center; gap:0.75rem; margin:0.6rem 0; }
        .ws-box { padding:0.4rem 1rem; border-radius:8px; font-weight:700; font-size:1rem; }
        .ws-wrong { background:white; color:var(--error); border:2px solid var(--error); text-decoration:line-through; }
        .ws-arrow { font-size:1.3rem; color:#94A3B8; }
        .ws-right { background:var(--success); color:white; }
        .error-text { font-size:0.9rem; color:var(--text-dark); line-height:1.55; }
        .fb-rule { background:var(--info-light); border:1px solid #BFDBFE; }
        .fb-rule .fb-block-title { color:var(--info-dark); }
        .rule-formula { background:white; border-radius:8px; padding:0.5rem 0.9rem; font-family:'Fredoka',sans-serif; font-size:0.92rem; color:var(--info-dark); font-weight:600; margin-bottom:0.6rem; text-align:center; border:1px solid #BFDBFE; }
        .rule-examples { display:flex; flex-wrap:wrap; gap:0.4rem; }
        .rule-ex { font-size:0.82rem; background:white; border:1px solid #BFDBFE; border-radius:6px; padding:0.2rem 0.6rem; color:var(--info-dark); font-weight:600; }
        .fb-why { background:#F0FDF4; border:1px solid #BBF7D0; }
        .fb-why .fb-block-title { color:var(--success-dark); }
        .fb-why-text { font-size:0.92rem; color:var(--text-dark); line-height:1.55; }
        .nav-buttons { display:flex; gap:0.75rem; margin-top:1.25rem; }
        .nav-btn { padding:0.8rem 1.2rem; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-size:0.95rem; font-weight:700; cursor:pointer; transition:all .2s; }
        .nav-btn.next { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; flex:1; }
        .nav-btn.prev { background:#F1F5F9; color:var(--text-dark); }
        .nav-btn:disabled { opacity:.4; cursor:default; }
        .nav-btn:not(:disabled):hover { transform:translateY(-2px); box-shadow:var(--shadow-soft); }
        .results-screen { display:none; text-align:center; padding:2rem 1.5rem; }
        .results-screen.show { display:block; animation:fadeUp .5s ease; }
        .results-emoji { font-size:4rem; margin-bottom:1rem; }
        .results-title { font-family:'Fredoka',sans-serif; font-size:2rem; margin-bottom:0.5rem; }
        .results-score { font-size:3rem; font-weight:800; color:var(--purple); margin:1rem 0; }
        .results-message { font-size:1.05rem; color:var(--text-medium); margin-bottom:1.5rem; }
        .stars-container { display:flex; justify-content:center; gap:0.5rem; margin:1.5rem 0; }
        .star { font-size:2.5rem; opacity:.3; transition:all .5s ease; }
        .star.earned { opacity:1; animation:starPop .5s ease; }
        @keyframes starPop { 0%{transform:scale(0)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }
        .results-buttons { display:flex; flex-direction:column; gap:1rem; margin-top:2rem; }
        .result-btn { padding:1rem 2rem; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; text-decoration:none; display:flex; align-items:center; justify-content:center; gap:0.5rem; transition:all .2s; }
        .result-btn.primary { background:linear-gradient(135deg,var(--purple),var(--purple-dark)); color:white; }
        .result-btn.secondary { background:#F1F5F9; color:var(--text-dark); }
        .result-btn:hover { transform:translateY(-2px); box-shadow:var(--shadow-soft); }
    </style>
</head>
<body>
    <header class="header">
        <a href="a2-m1-index.html" class="back-btn">&#8592;</a>
        <div class="header-info">
            <div class="header-title">&#128260; Transform</div>
            <div class="header-subtitle">&#128154; A2 &middot; M&oacute;dulo 1 &middot; Modales de deducci&oacute;n &amp; Obligaci&oacute;n</div>
        </div>
        <div class="progress-indicator"><span id="currentQ">1</span>/15</div>
    </header>
    <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>

    <main>
        <div class="instructions">
            <div class="instructions-icon">&#128260;</div>
            <div>
                <div class="instructions-title">Corrige el modal</div>
                <div class="instructions-text">La oraci&oacute;n tiene un modal incorrecto (marcado en rojo). Elige la versi&oacute;n corregida seg&uacute;n el contexto.</div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="results-screen" id="resultsScreen">
            <div class="results-emoji">&#127881;</div>
            <div class="results-title">&#161;Completado!</div>
            <div class="results-score" id="finalScore">0/15</div>
            <div class="stars-container">
                <span class="star">&#11088;</span><span class="star">&#11088;</span><span class="star">&#11088;</span>
            </div>
            <div class="results-message" id="resultsMessage"></div>
            <div class="results-buttons">
                <button class="result-btn primary" onclick="location.reload()">&#128260; Intentar de Nuevo</button>
                <a href="a2-m1-index.html" class="result-btn secondary">&#8592; Volver al M&oacute;dulo</a>
            </div>
        </div>
    </main>

    <script>
    // ============================================================
    // TRANSFORM — A2 M1 Tema 3
    // Modals of deduction + Obligation spectrum
    // 15 preguntas | base con modal incorrecto marcado en rojo
    // DOBLE ALEATORIZACIÓN:
    //   1. Posición correcta pre-variada: 2,0,1,0,2,1,0,2,1,0,2,1,0,2,1 → dist. 5-5-5
    //   2. Fisher-Yates en runtime
    // Q1-Q8 deduction | Q9-Q15 obligation
    // ============================================================
    const quizData = [
        // Q1 — deduction | wrong: might → correct: must | pos 2
        {
            id:1, topic:"deduction",
            base:"The report is finished and on his desk. Carlos might have completed it before the meeting.",
            errorWord:"might", correctWord:"must",
            goal:"Corrige el modal",
            clue:"finished and on his desk",
            clueExplain:"El reporte terminado sobre su escritorio es evidencia f\u00edsica directa. Con prueba s\u00f3lida de algo positivo, usamos 'must', no 'might'.",
            options:[
                { text:"The report is finished and on his desk. Carlos can't have completed it before the meeting.", correct:false, keyWord:"can't",
                  errorType:"Certeza negativa vs. Positiva",
                  explanation:"'Can't have completed' expresar\u00eda que es imposible que lo haya terminado. Pero el reporte ya est\u00e1 hecho y sobre su escritorio \u2014 evidencia que confirma que S\u00cd lo termin\u00f3. Usamos 'must'." },
                { text:"The report is finished and on his desk. Carlos may have completed it before the meeting.", correct:false, keyWord:"may",
                  explanation:"'May have completed' indicar\u00eda posibilidad razonada. Pero el reporte terminado y visible es evidencia directa, no solo posibilidad. Con prueba s\u00f3lida usamos 'must have completed'.",
                  errorType:"Posibilidad razonada vs. Certeza con evidencia directa" },
                { text:"The report is finished and on his desk. Carlos must have completed it before the meeting.", correct:true, keyWord:"must" }
            ],
            rule:"must have + past participle = certeza positiva sobre el pasado (evidencia directa)",
            examples:["He must have completed it \u2014 it's on his desk","She must have left \u2014 the lights are off"],
            correctReason:"El reporte terminado y sobre el escritorio es evidencia f\u00edsica directa. 'Must have completed' expresa la deducci\u00f3n casi segura. 'Might' habr\u00eda sido correcto solo sin evidencia directa."
        },
        // Q2 — deduction | wrong: must → correct: can't | pos 0
        {
            id:2, topic:"deduction",
            base:"James has been waiting for his refund for two months. The process must be quick and simple.",
            errorWord:"must", correctWord:"can't",
            goal:"Corrige el modal",
            clue:"waiting for two months",
            clueExplain:"Esperar dos meses hace imposible concluir que el proceso es r\u00e1pido y simple. La evidencia lo descarta \u2014 usamos 'can't'.",
            options:[
                { text:"James has been waiting for his refund for two months. The process can't be quick and simple.", correct:true, keyWord:"can't" },
                { text:"James has been waiting for his refund for two months. The process might be quick and simple.", correct:false, keyWord:"might",
                  errorType:"Posibilidad vs. Imposibilidad l\u00f3gica",
                  explanation:"'Might be quick' sugeriría posibilidad. Pero dos meses de espera hace esa conclusi\u00f3n l\u00f3gicamente imposible \u2014 no solo improbable. Usamos 'can't' para imposibilidad basada en evidencia." },
                { text:"James has been waiting for his refund for two months. The process may be quick and simple.", correct:false, keyWord:"may",
                  errorType:"Posibilidad razonada vs. Imposibilidad l\u00f3gica",
                  explanation:"'May be quick' indicar\u00eda posibilidad razonada. Pero dos meses de espera hace esa idea l\u00f3gicamente imposible. Con evidencia que descarta algo, usamos 'can't'." }
            ],
            rule:"can't + inf. = imposibilidad l\u00f3gica basada en evidencia",
            examples:["It can't be quick \u2014 two months waiting","The system can't be working \u2014 it's been down all day"],
            correctReason:"Dos meses esperando hace imposible concluir que el proceso es r\u00e1pido. 'Can't be quick and simple' expresa esa imposibilidad l\u00f3gica. 'Must be quick' contradice directamente la evidencia."
        },
        // Q3 — deduction | wrong: must → correct: might | pos 1
        {
            id:3, topic:"deduction",
            base:"Lucia heard a noise from the pipes. There must be a minor blockage somewhere.",
            errorWord:"must", correctWord:"might",
            goal:"Corrige el modal",
            clue:"heard a noise from the pipes",
            clueExplain:"Un ruido de las tuber\u00edas es una pista ambigua: puede indicar presi\u00f3n, bloqueo, temperatura u otras causas. Sin prueba directa, usamos 'might'.",
            options:[
                { text:"Lucia heard a noise from the pipes. There can't be a minor blockage somewhere.", correct:false, keyWord:"can't",
                  errorType:"Imposibilidad vs. Posibilidad",
                  explanation:"'Can't be a blockage' descartaría esa causa. Pero un bloqueo menor s\u00ed es una posibilidad real ante un ruido en las tuber\u00edas. Usamos 'might' para algo posible pero incierto." },
                { text:"Lucia heard a noise from the pipes. There might be a minor blockage somewhere.", correct:true, keyWord:"might" },
                { text:"Lucia heard a noise from the pipes. There may be a minor blockage somewhere.", correct:false, keyWord:"may",
                  errorType:"Posibilidad razonada vs. Posibilidad incierta",
                  explanation:"'May be a blockage' tambi\u00e9n expresar\u00eda posibilidad y ser\u00eda gramaticalmente aceptable. Sin embargo, en este contexto 'might' es preferible porque la evidencia (un ruido) es muy d\u00e9bil e incierta \u2014 'might' enfatiza m\u00e1s esa incertidumbre." }
            ],
            rule:"might + inf. = posibilidad incierta (evidencia ambigua o d\u00e9bil)",
            examples:["There might be a blockage \u2014 she heard a noise","It might be the pressure \u2014 we're not sure"],
            correctReason:"Un ruido de las tuber\u00edas es una pista ambigua con m\u00faltiples causas posibles. 'Might be a blockage' expresa posibilidad incierta. 'Must' habr\u00eda sido correcto solo con evidencia directa y s\u00f3lida."
        },
        // Q4 — deduction | wrong: can't → correct: may | pos 0
        {
            id:4, topic:"deduction",
            base:"Nadia's phone plan shows an unexpected charge. The company can't have made an error.",
            errorWord:"can't", correctWord:"may",
            goal:"Corrige el modal",
            clue:"unexpected charge",
            clueExplain:"Un cargo inesperado es exactamente la situaci\u00f3n donde los errores de facturaci\u00f3n son posibles. 'Can't' los descarta sin base. Usamos 'may' para posibilidad razonada.",
            options:[
                { text:"Nadia's phone plan shows an unexpected charge. The company may have made an error.", correct:true, keyWord:"may" },
                { text:"Nadia's phone plan shows an unexpected charge. The company must have made an error.", correct:false, keyWord:"must",
                  errorType:"Certeza vs. Posibilidad razonada",
                  explanation:"'Must have made an error' expresar\u00eda casi certeza de que fue un error. Pero el cargo inesperado puede tener otras causas (cargo contractual no notado, servicio adicional). 'May' expresa posibilidad razonada sin certeza." },
                { text:"Nadia's phone plan shows an unexpected charge. The company might have made an error.", correct:false, keyWord:"might",
                  errorType:"Posibilidad incierta vs. Posibilidad razonada",
                  explanation:"'Might have made an error' tambi\u00e9n es posibilidad, pero 'may' es m\u00e1s apropiado aqu\u00ed porque la causa del cargo inesperado es razonablemente plausible \u2014 no solo una especulaci\u00f3n vaga. 'May' y 'might' son muy cercanos, pero 'may' tiene m\u00e1s peso de razonamiento." }

    let currentQuestion = 0, score = 0;
    let answered = new Array(quizData.length).fill(false);

    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    function initQuiz() {
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';
        quizData.forEach(function(q, i) {
            q.shuffled = shuffle(q.options);
            container.appendChild(createCard(q, i));
        });
        showQuestion(0);
        updateProgress();
    }

    function createCard(q, index) {
        const card = document.createElement('div');
        card.className = 'question-card' + (index !== 0 ? ' hidden' : '');
        card.id = 'question-' + index;
        const letters = ['A','B','C'];
        const badge = q.topic === 'deduction'
            ? '<span class="modal-type-badge deduction">&#129302; Deducci\u00f3n</span>'
            : '<span class="modal-type-badge obligation">&#128203; Obligaci\u00f3n</span>';
        const baseHL = q.base.replace(q.errorWord, '<span class="word-error">' + q.errorWord + '</span>');
        const optsHTML = q.shuffled.map(function(opt, i) {
            const txt = opt.text.replace(opt.keyWord, '<span class="key-word">' + opt.keyWord + '</span>');
            return '<button class="option-btn" onclick="selectOption(' + index + ',' + i + ')">' +
                '<div class="option-letter">' + letters[i] + '</div>' +
                '<div class="option-text">' + txt + '</div></button>';
        }).join('');
        card.innerHTML =
            '<div class="q-header"><div class="question-number">' + (index+1) + '</div>' +

            '<div class="transform-box base"><span class="transform-label">&#128226; Oraci\u00f3n con modal incorrecto</span>' +

            '<div class="feedback" id="feedback-' + index + '"></div>' +
            '<div class="nav-buttons">' +
            '<button class="nav-btn prev" onclick="prevQuestion()"' + (index===0?' disabled':'') + '>\u2190 Anterior</button>' +
            '<button class="nav-btn next" id="next-' + index + '" onclick="nextQuestion(' + index + ')" disabled>' +
            (index===quizData.length-1?'Ver Resultados &#127881;':'Siguiente \u2192') +
            '</button></div>';
        return card;
    }

    function selectOption(qi, optIdx) {
        if (answered[qi]) return;
        answered[qi] = true;
        const q = quizData[qi];
        const selected = q.shuffled[optIdx];
        const isCorrect = selected.correct;
        const correctOpt = q.shuffled.find(function(o){ return o.correct; });
        if (isCorrect) score++;
        document.querySelectorAll('#options-' + qi + ' .option-btn').forEach(function(btn, i) {
            btn.classList.add('disabled');
            if (q.shuffled[i].correct) btn.classList.add('correct');
            else if (i === optIdx) btn.classList.add('incorrect');
        });
        buildFeedback(qi, selected, isCorrect, correctOpt, q);
        document.getElementById('next-' + qi).disabled = false;
        updateProgress();
    }

    function hl(text, word, cls) {
        if (!word) return text;
        return text.replace(word, '<span class="' + cls + '">' + word + '</span>');
    }

    function buildFeedback(qi, selected, isCorrect, correctOpt, q) {
        const el = document.getElementById('feedback-' + qi);
        el.className = 'feedback show ' + (isCorrect ? 'correct' : 'incorrect');
        const exHTML = q.examples.map(function(e){ return '<span class="rule-ex">' + e + '</span>'; }).join('');
        const baseHLed = hl(q.base, q.errorWord, 'vb-hl');
        const correctHLed = hl(correctOpt.text, correctOpt.keyWord, 'vb-hl');
        const wrongHLed = !isCorrect ? hl(selected.text, selected.keyWord, 'vb-hl') : null;
        const flowHTML =
            '<div class="transform-flow">' +
            '<div class="tf-step original"><span class="tf-label">Error:</span>' + baseHLed + '</div>' +
            '<div class="tf-arrow">\u2b07</div>' +
            (wrongHLed ? '<div class="tf-step tf-wrong"><span class="tf-label">Tu resp.:</span>' + wrongHLed + '</div><div class="tf-arrow">\u2195</div>' : '') +
            '<div class="tf-step tf-correct"><span class="tf-label">Correcto:</span>' + correctHLed + '</div></div>';

        if (isCorrect) {
            el.innerHTML =
                '<div class="fb-header"><span class="fb-icon">&#9989;</span><div>' +
                '<div class="fb-title">&#161;Correcci\u00f3n correcta!</div>' +
                '<div class="fb-subtitle">Identificaste el modal incorrecto y aplicaste la regla</div></div></div>' +
                '<div class="fb-body">' +
                '<div class="fb-block fb-transform"><div class="fb-block-title">&#128260; Correcci\u00f3n realizada</div>' + flowHTML + '</div>' +
                '<div class="fb-block fb-signal"><div class="fb-block-title">&#128269; La clave que deb\u00edas identificar</div>' +
                '<div style="font-size:0.92rem;color:var(--text-dark);line-height:1.55;">La expresi\u00f3n <span class="signal-tag">' + q.clue + '</span> ' + q.clueExplain + '</div></div>' +
                '<div class="fb-block fb-rule"><div class="fb-block-title">&#128208; Regla aplicada</div>' +
                '<div class="rule-formula">' + q.rule + '</div>' +
                '<div class="rule-examples">' + exHTML + '</div></div>' +
                '<div class="fb-block fb-why"><div class="fb-block-title">&#128161; \u00bfPor qu\u00e9 es correcta la correcci\u00f3n?</div>' +
                '<div class="fb-why-text">' + q.correctReason + '</div></div></div>';
        } else {
            el.innerHTML =
                '<div class="fb-header"><span class="fb-icon">&#10060;</span><div>' +
                '<div class="fb-title">Correcci\u00f3n incorrecta</div>' +
                '<div class="fb-subtitle">Revisemos qu\u00e9 fall\u00f3</div></div></div>' +
                '<div class="fb-body">' +
                '<div class="fb-block fb-transform"><div class="fb-block-title">&#128260; Tu correcci\u00f3n vs. la correcta</div>' + flowHTML + '</div>' +
                '<div class="fb-block fb-signal wrong"><div class="fb-block-title">&#128269; La clave que deb\u00edas identificar</div>' +
                '<div style="font-size:0.92rem;color:var(--text-dark);line-height:1.55;">La expresi\u00f3n <span class="signal-tag red">' + q.clue + '</span> ' + q.clueExplain + '</div></div>' +
                '<div class="fb-block fb-error"><div class="fb-block-title">&#9888;&#65039; El error: <span class="error-badge">' + selected.errorType + '</span></div>' +
                '<div class="word-swap"><span class="ws-box ws-wrong">' + selected.keyWord + '</span><span class="ws-arrow">\u2192</span><span class="ws-box ws-right">' + correctOpt.keyWord + '</span></div>' +
                '<div class="error-text">' + selected.explanation + '</div></div>' +
                '<div class="fb-block fb-rule"><div class="fb-block-title">&#128208; La regla correcta</div>' +
                '<div class="rule-formula">' + q.rule + '</div>' +
                '<div class="rule-examples">' + exHTML + '</div></div>' +
                '<div class="fb-block fb-why"><div class="fb-block-title">&#128161; \u00bfC\u00f3mo deb\u00eda hacerse la correcci\u00f3n?</div>' +
                '<div class="fb-why-text">' + q.correctReason + '</div></div></div>';
        }
    }

    function showQuestion(i) {
        document.querySelectorAll('.question-card').forEach(function(c,idx){ c.classList.toggle('hidden',idx!==i); });
        document.getElementById('currentQ').textContent = i+1;
        currentQuestion = i;
    }
    function nextQuestion(i) { i < quizData.length-1 ? showQuestion(i+1) : showResults(); }
    function prevQuestion() { if (currentQuestion > 0) showQuestion(currentQuestion-1); }
    function updateProgress() {
        document.getElementById('progressFill').style.width = (answered.filter(Boolean).length / quizData.length * 100) + '%';
    }
    function showResults() {
        document.querySelectorAll('.question-card').forEach(function(c){ c.classList.add('hidden'); });
        document.getElementById('resultsScreen').classList.add('show');
        const pct = score / quizData.length * 100;
        document.getElementById('finalScore').textContent = score + '/15';
        const stars = pct >= 90 ? 3 : pct >= 70 ? 2 : 1;
        document.getElementById('resultsMessage').textContent = pct >= 90
            ? '\u00a1Excelente! Corriges modales perfectamente. \uD83C\uDFC6'
            : pct >= 70 ? '\u00a1Muy bien! Sigue practicando los matices de los modales. \uD83D\uDCAA'
            : 'Buen esfuerzo. Repasa los errores y vuelve a intentarlo. \uD83D\uDCDA';
        document.querySelectorAll('.star').forEach(function(s,i){
            if (i < stars) setTimeout(function(){ s.classList.add('earned'); }, i*300);
        });
    }
    document.addEventListener('DOMContentLoaded', initQuiz);
    </script>
</body>
</html>
