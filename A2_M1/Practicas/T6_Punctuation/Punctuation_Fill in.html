<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fill in the Blanks - A2 M1 T6 | JUCUM English</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10B981; --primary-light: #6EE7B7; --primary-dark: #059669;
            --accent: #34D399; --bg-gradient-start: #ECFDF5; --bg-gradient-end: #D1FAE5;
            --text-dark: #064E3B; --text-medium: #065F46; --text-light: #047857;
            --success: #10B981; --success-light: #D1FAE5; --success-dark: #059669;
            --error: #EF4444; --error-light: #FEE2E2; --error-dark: #DC2626;
            --info: #3B82F6; --info-light: #DBEAFE; --info-dark: #1D4ED8;
            --purple: #8B5CF6; --purple-light: #EDE9FE; --purple-dark: #6D28D9;
            --shadow-soft: 0 4px 20px rgba(16,185,129,0.15);
            --border-radius: 20px;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:'Nunito',sans-serif; background:linear-gradient(135deg,var(--bg-gradient-start),var(--bg-gradient-end)); min-height:100vh; color:var(--text-dark); }
        .header { background:linear-gradient(135deg,#2E7D32 0%,#66BB6A 60%,#A5D6A7 100%); padding:1rem 1.5rem; display:flex; align-items:center; gap:1rem; position:sticky; top:0; z-index:100; box-shadow:var(--shadow-soft); }
        .back-btn { padding:0.4rem 0.9rem; border-radius:20px; background:rgba(255,255,255,0.3); border:none; display:flex; align-items:center; gap:0.4rem; cursor:pointer; font-size:0.9rem; font-weight:700; text-decoration:none; color:white; transition:all .2s; flex-shrink:0; }
        .back-btn:hover { background:rgba(255,255,255,0.5); }
        .header-info { flex:1; }
        .header-title { font-family:'Fredoka',sans-serif; font-size:1.1rem; font-weight:600; color:white; }
        .header-subtitle { font-size:0.8rem; color:rgba(255,255,255,0.85); margin-top:2px; }
        .progress-indicator { background:rgba(255,255,255,0.3); padding:0.4rem 0.9rem; border-radius:20px; font-weight:700; color:white; font-size:0.9rem; white-space:nowrap; }
        .progress-container { height:6px; background:rgba(255,255,255,0.3); }
        .progress-fill { height:100%; background:white; border-radius:0 3px 3px 0; transition:width .5s ease; width:0%; }
        main { padding:1.5rem; max-width:650px; margin:0 auto; }
        .instructions { background:white; border-radius:16px; padding:1rem 1.25rem; margin-bottom:1.25rem; box-shadow:var(--shadow-soft); border-left:5px solid var(--primary); display:flex; gap:0.75rem; align-items:flex-start; }
        .instructions-icon { font-size:1.6rem; flex-shrink:0; }
        .instructions-title { font-family:'Fredoka',sans-serif; font-size:1rem; font-weight:600; color:var(--text-dark); margin-bottom:0.2rem; }
        .instructions-text { font-size:0.85rem; color:var(--text-medium); line-height:1.5; }
        .question-card { background:white; border-radius:var(--border-radius); box-shadow:var(--shadow-soft); padding:1.5rem; margin-bottom:1rem; animation:slideIn .4s ease; }
        .question-card.hidden { display:none; }
        @keyframes slideIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
        .q-header { display:flex; align-items:center; gap:0.75rem; margin-bottom:1rem; }
        .question-number { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; display:flex; align-items:center; justify-content:center; font-family:'Fredoka',sans-serif; font-weight:700; font-size:0.95rem; flex-shrink:0; }
        .topic-badge { display:inline-flex; align-items:center; gap:0.3rem; padding:0.2rem 0.7rem; border-radius:20px; font-size:0.72rem; font-weight:700; }
        .topic-badge.commas { background:#EDE9FE; color:#6D28D9; }
        .topic-badge.endpunct { background:#DBEAFE; color:#1D4ED8; }
        .topic-badge.apostrophe { background:#D1FAE5; color:#065F46; }
        .hint-box { background:#F0FDF4; border-left:4px solid var(--primary); padding:0.7rem 1rem; border-radius:0 10px 10px 0; margin-bottom:1rem; font-size:0.88rem; color:var(--text-dark); line-height:1.5; }
        .hint-label { font-weight:700; color:var(--primary-dark); display:flex; align-items:center; gap:0.4rem; margin-bottom:0.2rem; font-size:0.82rem; text-transform:uppercase; letter-spacing:.5px; }
        .question-text { font-size:1.05rem; line-height:1.8; margin-bottom:0.4rem; font-weight:600; font-family:'Courier New', monospace; background:#F8FAFC; padding:0.75rem 1rem; border-radius:10px; border:1px solid #E2E8F0; }
        .blank { display:inline-block; min-width:80px; padding:0.15rem 0.5rem; background:#D1FAE5; border:2px dashed var(--primary-dark); border-radius:6px; text-align:center; font-weight:700; color:var(--primary-dark); transition:all .3s; font-family:'Nunito',sans-serif; }
        .blank.correct { background:var(--success-light); border:2px solid var(--success); color:var(--success-dark); }
        .blank.incorrect { background:var(--error-light); border:2px solid var(--error); color:var(--error-dark); }
        .context-note { color:var(--text-light); font-size:0.83rem; margin-bottom:1rem; font-style:italic; }
        .options-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:0.7rem; margin-top:0.5rem; }
        .option-btn { padding:0.85rem 0.4rem; border:2.5px solid #E5E7EB; border-radius:12px; background:white; font-family:'Courier New',monospace; font-size:1rem; font-weight:700; cursor:pointer; transition:all .2s; color:var(--text-dark); }
        .option-btn:hover:not(:disabled) { border-color:var(--primary); background:var(--bg-gradient-start); transform:translateY(-2px); }
        .option-btn:disabled { cursor:default; }
        .option-btn.correct { border-color:var(--success); background:var(--success-light); color:var(--success-dark); }
        .option-btn.incorrect { border-color:var(--error); background:var(--error-light); color:var(--error-dark); }
        .feedback { margin-top:1.25rem; border-radius:16px; overflow:hidden; display:none; box-shadow:0 4px 16px rgba(0,0,0,0.1); }
        .feedback.show { display:block; animation:fadeUp .35s ease; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        .fb-header { padding:0.9rem 1.25rem; display:flex; align-items:center; gap:0.75rem; }
        .feedback.correct .fb-header { background:linear-gradient(135deg,var(--success),var(--success-dark)); }
        .feedback.incorrect .fb-header { background:linear-gradient(135deg,var(--error),var(--error-dark)); }
        .fb-icon { font-size:1.6rem; }
        .fb-title { font-family:'Fredoka',sans-serif; font-size:1.1rem; color:white; font-weight:600; }
        .fb-subtitle { font-size:0.8rem; color:rgba(255,255,255,0.85); margin-top:1px; }
        .fb-body { background:white; border:2px solid; border-top:none; border-radius:0 0 16px 16px; padding:1.25rem; display:flex; flex-direction:column; gap:0.9rem; }
        .feedback.correct .fb-body { border-color:var(--success); }
        .feedback.incorrect .fb-body { border-color:var(--error); }
        .fb-block { border-radius:12px; padding:0.9rem 1rem; }
        .fb-block-title { font-weight:800; font-size:0.78rem; text-transform:uppercase; letter-spacing:.6px; margin-bottom:0.5rem; display:flex; align-items:center; gap:0.4rem; flex-wrap:wrap; }
        .fb-signal { background:#F0FDF4; border:1px solid #BBF7D0; }
        .fb-signal.wrong { background:#FFF1F2; border-color:#FECDD3; }
        .fb-signal .fb-block-title { color:var(--success-dark); }
        .fb-signal.wrong .fb-block-title { color:var(--error-dark); }
        .signal-tag { display:inline-block; background:var(--success); color:white; border-radius:6px; padding:0.1rem 0.5rem; font-size:0.82rem; font-weight:700; margin:0 2px; }
        .signal-tag.red { background:var(--error); }
        .punct-compare { background:#F8FAFC; border:1px solid #E2E8F0; border-radius:10px; padding:0.8rem 1rem; margin-top:0.4rem; }
        .punct-row { display:flex; align-items:flex-start; gap:0.6rem; padding:0.35rem 0; border-bottom:1px dashed #E2E8F0; font-size:0.9rem; }
        .punct-row:last-child { border-bottom:none; }
        .punct-label { font-size:0.7rem; font-weight:800; text-transform:uppercase; padding:0.15rem 0.5rem; border-radius:6px; flex-shrink:0; white-space:nowrap; }
        .punct-label.wrong { background:var(--error-light); color:var(--error-dark); }
        .punct-label.right { background:var(--success-light); color:var(--success-dark); }
        .punct-text { font-family:'Courier New',monospace; font-size:0.93rem; color:var(--text-dark); line-height:1.5; font-weight:600; }
        .hl-wrong { color:var(--error); font-weight:800; text-decoration:underline wavy var(--error); }
        .hl-right { color:var(--success-dark); font-weight:800; }
        .fb-error { background:var(--error-light); border:1px solid #FECACA; }
        .fb-error .fb-block-title { color:var(--error-dark); }
        .error-badge { display:inline-block; background:var(--error); color:white; padding:0.2rem 0.6rem; border-radius:6px; font-size:0.75rem; font-weight:700; margin-left:4px; }
        .word-swap { display:flex; align-items:center; justify-content:center; gap:0.75rem; margin:0.5rem 0; flex-wrap:wrap; }
        .ws-box { padding:0.4rem 1rem; border-radius:8px; font-weight:700; font-size:1rem; font-family:'Courier New',monospace; }
        .ws-wrong { background:white; color:var(--error); border:2px solid var(--error); text-decoration:line-through; }
        .ws-arrow { font-size:1.3rem; color:#94A3B8; }
        .ws-right { background:var(--success); color:white; }
        .error-text { font-size:0.88rem; color:var(--error-dark); line-height:1.5; }
        .fb-rule { background:var(--info-light); border:1px solid #BFDBFE; }
        .fb-rule .fb-block-title { color:var(--info-dark); }
        .rule-formula { background:white; border-radius:8px; padding:0.5rem 0.9rem; font-family:'Fredoka',sans-serif; font-size:0.9rem; color:var(--info-dark); font-weight:600; margin-bottom:0.6rem; text-align:center; border:1px solid #BFDBFE; }
        .rule-examples { display:flex; flex-direction:column; gap:0.3rem; }
        .rule-ex { font-size:0.82rem; background:white; border:1px solid #BFDBFE; border-radius:6px; padding:0.25rem 0.7rem; color:var(--info-dark); font-weight:600; font-family:'Courier New',monospace; }
        .fb-why { background:#F0FDF4; border:1px solid #BBF7D0; }
        .fb-why .fb-block-title { color:var(--success-dark); }
        .fb-why-text { font-size:0.92rem; color:var(--text-dark); line-height:1.55; }
        .nav-buttons { display:flex; gap:0.75rem; margin-top:1.25rem; }
        .nav-btn { padding:0.8rem 1.2rem; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-size:0.95rem; font-weight:700; cursor:pointer; transition:all .2s; }
        .nav-btn.next { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; flex:1; }
        .nav-btn.prev { background:#F1F5F9; color:var(--text-dark); }
        .nav-btn:disabled { opacity:.4; cursor:default; }
        .nav-btn:not(:disabled):hover { transform:translateY(-2px); box-shadow:var(--shadow-soft); }
        .results-screen { display:none; text-align:center; padding:2rem 1.5rem; }
        .results-screen.show { display:block; animation:fadeUp .5s ease; }
        .results-emoji { font-size:4rem; margin-bottom:1rem; }
        .results-title { font-family:'Fredoka',sans-serif; font-size:2rem; margin-bottom:0.5rem; }
        .results-score { font-size:3rem; font-weight:800; color:var(--purple); margin:1rem 0; }
        .results-message { font-size:1.05rem; color:var(--text-medium); margin-bottom:1.5rem; }
        .stars-container { display:flex; justify-content:center; gap:0.5rem; margin:1.5rem 0; }
        .star { font-size:2.5rem; opacity:.3; transition:all .5s ease; }
        .star.earned { opacity:1; animation:starPop .5s ease; }
        @keyframes starPop { 0%{transform:scale(0)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }
        .results-buttons { display:flex; flex-direction:column; gap:1rem; margin-top:2rem; }
        .result-btn { padding:1rem 2rem; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; text-decoration:none; display:flex; align-items:center; justify-content:center; gap:0.5rem; transition:all .2s; }
        .result-btn.primary { background:linear-gradient(135deg,var(--purple),var(--purple-dark)); color:white; }
        .result-btn.secondary { background:#F1F5F9; color:var(--text-dark); }
        .result-btn:hover { transform:translateY(-2px); box-shadow:var(--shadow-soft); }
    </style>
</head>
<body>
    <header class="header">
        <a href="a2-m1-index.html" class="back-btn">&#8592; M&oacute;dulo</a>
        <div class="header-info">
            <div class="header-title">&#128221; Fill in the Blanks</div>
            <div class="header-subtitle">&#128154; A2 &middot; Module 1 &middot; Punctuation</div>
        </div>
        <div class="progress-indicator"><span id="currentQ">1</span>/15</div>
    </header>
    <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>

    <main>
        <div class="instructions">
            <div class="instructions-icon">&#9999;&#65039;</div>
            <div>
                <div class="instructions-title">Choose the correct punctuation</div>
                <div class="instructions-text">Select the punctuation mark or word form that correctly completes the sentence. Topics: <strong>commas in lists</strong>, <strong>end punctuation</strong>, <strong>apostrophes</strong>.</div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="results-screen" id="resultsScreen">
            <div class="results-emoji">&#127881;</div>
            <div class="results-title">Completed!</div>
            <div class="results-score" id="finalScore">0/15</div>
            <div class="stars-container">
                <span class="star">&#11088;</span><span class="star">&#11088;</span><span class="star">&#11088;</span>
            </div>
            <div class="results-message" id="resultsMessage"></div>
            <div class="results-buttons">
                <button class="result-btn primary" onclick="location.reload()">&#128260; Try Again</button>
                <a href="a2-m1-index.html" class="result-btn secondary">&#8592; Back to Module</a>
            </div>
        </div>
    </main>

    <script>
    const quizData = [
        {
            id:1, topic:"commas",
            sentence:"Lucia contacted the building manager, the plumber___ and the electrician about the problem.",
            context:"Three items in a list — what goes in the blank before 'and'?",
            hint:"Lucia reporta el problema a tres personas diferentes.",
            clue:"three-item list", clueExplain:"With three or more items, place a comma after each item except the last. The comma before 'and' is called the Oxford (or serial) comma.",
            options:[",", "", ";"], correct:",",
            feedback:{
                "":{ errorType:"Missing comma in list", explanation:"With three or more items in a list, you need a comma after each item before the conjunction. '...the plumber___ and the electrician' needs a comma: '...the plumber, and the electrician.'" },
                ";":{ errorType:"Semicolon instead of comma in simple list", explanation:"Semicolons are used to separate list items only when the items themselves contain commas. For a simple list of nouns, commas are correct: '...the plumber, and the electrician.'" }
            },
            rule:"item 1, item 2, and item 3 (comma after each item in a 3+ list)",
            examples:["Lucia, James, and Nadia attended the meeting.","The report covered costs, timelines, and outcomes."],
            correctReason:"A comma is needed after 'plumber' because this is a three-item list. Each item gets a comma: 'the building manager, the plumber, and the electrician.' The comma before 'and' is the Oxford comma."
        },
        {
            id:2, topic:"endpunct",
            sentence:"James received a refund from the online store after three months___",
            context:"This is a statement of fact — what end punctuation does it need?",
            hint:"James describe algo que ocurrió. No es una pregunta.",
            clue:"declarative statement", clueExplain:"A declarative sentence (a statement of fact) always ends with a period (full stop).",
            options:[".", "?", "!"], correct:".",
            feedback:{
                "?":{ errorType:"Question mark on a statement", explanation:"A question mark is only for direct questions ('Did James receive a refund?'). This sentence states a fact — it needs a period." },
                "!":{ errorType:"Exclamation mark on a neutral statement", explanation:"An exclamation mark expresses strong emotion or urgency. This sentence is a neutral statement of fact — it needs a period, not an exclamation mark." }
            },
            rule:"Declarative sentence (statement of fact) → ends with a period (.)",
            examples:["James received a refund after three months.", "The plumber fixed the pipe this morning."],
            correctReason:"This is a declarative sentence — it states a fact with no question or strong emotion. Declarative sentences always end with a period."
        },
        {
            id:3, topic:"apostrophe",
            sentence:"Carlos told the manager: \"___ important to fix the heating before winter.\"",
            context:"The blank means 'it is' — which form is correct?",
            hint:"El espacio en blanco es una contracción de dos palabras.",
            clue:"contraction: it + is = ___", clueExplain:"'It's' = 'it is' (contraction). 'Its' = belonging to it (possessive pronoun, no apostrophe).",
            options:["Its", "It's", "ITS"], correct:"It's",
            feedback:{
                "Its":{ errorType:"Possessive 'its' vs. contraction 'it's'", explanation:"'Its' (no apostrophe) is a possessive pronoun meaning 'belonging to it': 'The building has its own maintenance team.' Here we need the contraction 'it is' = 'It\u2019s'." },
                "ITS":{ errorType:"All caps and missing apostrophe", explanation:"Capitalising the whole word is incorrect here, and 'ITS' (no apostrophe) is possessive, not the contraction. The correct form is 'It\u2019s' (= 'it is')." }
            },
            rule:"it + is = it's (apostrophe replaces the missing letter i) | its = possessive (no apostrophe)",
            examples:["It's important to call the plumber. (= It is)", "The pipe has lost its pressure. (= belonging to it)"],
            correctReason:"'It's' = 'it is'. The apostrophe replaces the missing letter 'i'. This is the contraction form. Compare: 'It's cold today' (it is) vs. 'The building lost its heating' (belonging to it)."
        },
        {
            id:4, topic:"commas",
            sentence:"The complaint form asked for the customer's name___ account number, and issue description.",
            context:"Three items in a list — what goes in the first blank after 'name'?",
            hint:"El formulario pide tres datos diferentes.",
            clue:"name is the first item in a 3-item list", clueExplain:"In a list of three items, a comma follows each item (including after the first): name, account number, and issue description.",
            options:[",", "", " and"], correct:",",
            feedback:{
                "":{ errorType:"Missing comma after first list item", explanation:"When listing three or more items, a comma must follow each item. After 'name' (the first item), a comma is required: 'the customer's name, account number, and issue description.'" },
                " and":{ errorType:"'And' before middle item (only one 'and' in a list)", explanation:"In a standard list, 'and' appears only before the last item. The correct structure: 'name, account number, and issue description' — one comma after each item, one 'and' before the last." }
            },
            rule:"item 1, item 2, and item 3 — comma after item 1, comma after item 2",
            examples:["Enter your name, account number, and issue description.", "Nadia listed the date, the charge, and the reference number."],
            correctReason:"A comma is needed after 'name' because it is the first item in a three-item list. The structure is: name[,] account number[,] and issue description."
        },
        {
            id:5, topic:"endpunct",
            sentence:"Nadia called the phone company and asked, \"Have you reviewed my complaint___\"",
            context:"This is a direct question inside quotation marks — what end punctuation goes inside the quotes?",
            hint:"Nadia hace una pregunta directa al agente.",
            clue:"direct question in dialogue", clueExplain:"A direct question always ends with a question mark — even when embedded in a larger sentence. The question mark goes inside the closing quotation mark.",
            options:[".", "!", "?"], correct:"?",
            feedback:{
                ".":{ errorType:"Period on a direct question", explanation:"'Have you reviewed my complaint' is a direct question — it must end with a question mark, not a period. The period would signal a statement, but this is clearly a question." },
                "!":{ errorType:"Exclamation mark on a neutral question", explanation:"An exclamation mark would express strong emotion (surprise, urgency, anger). Nadia is calmly asking about her complaint — a question mark is the correct choice." }
            },
            rule:"Direct question → ends with ? (question mark goes inside closing quotes in dialogue)",
            examples:["She asked, \"Have you reviewed my complaint?\"", "\"When will the repair be done?\" Carlos asked."],
            correctReason:"'Have you reviewed my complaint' is a direct question, so it ends with a question mark. The question mark goes inside the closing quotation mark when it belongs to the quoted speech."
        },
        {
            id:6, topic:"apostrophe",
            sentence:"The ___ decision to delay the repair frustrated all the tenants.",
            context:"One manager owns the decision — how do you show singular possession?",
            hint:"La decisión pertenece a un solo administrador.",
            clue:"singular possessive: one manager owns the decision", clueExplain:"For singular nouns, add apostrophe + s ('s) to show possession: manager's = belonging to one manager.",
            options:["managers", "manager's", "managers'"], correct:"manager's",
            feedback:{
                "managers":{ errorType:"Plural noun instead of possessive", explanation:"'Managers' is just the plural form — it means 'more than one manager' with no possession. To show that one manager owns the decision: manager's (apostrophe + s)." },
                "managers'":{ errorType:"Plural possessive instead of singular possessive", explanation:"'Managers'' is the possessive of plural 'managers' (more than one manager). Here there is only one manager, so we need the singular possessive: manager's." }
            },
            rule:"Singular possessive: noun + 's \u2192 manager's, tenant's, company's",
            examples:["The manager's decision was final.", "The tenant's complaint was valid.", "Carlos's report was detailed."],
            correctReason:"'Manager's' shows that one manager owns/made the decision. Rule: singular noun + apostrophe + s. Compare: 'manager's' (one) vs. 'managers'' (more than one)."
        },
        {
            id:7, topic:"commas",
            sentence:"James contacted the store___ and asked for a full refund.",
            context:"There are only two elements joined by 'and' — do you need a comma?",
            hint:"James hizo dos cosas, unidas con 'and'.",
            clue:"only two items joined by 'and'", clueExplain:"When only two items or clauses are joined by 'and', no comma is needed before 'and'. Commas in lists are for three or more items.",
            options:["", ",", ";"], correct:"",
            feedback:{
                ",":{ errorType:"Unnecessary comma before 'and' with two items", explanation:"A comma before 'and' is needed only in lists of three or more items. With just two elements ('contacted the store' and 'asked for a refund'), no comma is used before 'and'." },
                ";":{ errorType:"Semicolon instead of nothing", explanation:"A semicolon joins two independent clauses without a conjunction ('James contacted the store; he asked for a refund'). When 'and' is used to join two items, no additional punctuation is needed." }
            },
            rule:"Two items: no comma before 'and' | Three+ items: comma before 'and'",
            examples:["James contacted the store and asked for a refund. (2 items \u2014 no comma)", "James called, emailed, and visited the store. (3 items \u2014 commas)"],
            correctReason:"There are only two elements here: 'contacted the store' and 'asked for a full refund'. With exactly two items joined by 'and', no comma is used. Commas in lists apply to three or more items."
        },
        {
            id:8, topic:"endpunct",
            sentence:"After waiting three months, Lucia finally shouted, \"This is completely unacceptable___\"",
            context:"Lucia is shouting in frustration — what end punctuation fits?",
            hint:"Lucia expresa una emoción fuerte: está muy frustrada.",
            clue:"strong emotion / exclamation in dialogue", clueExplain:"An exclamation mark is used when the speaker expresses strong emotion — anger, excitement, urgency, or emphasis. It goes inside the quotes when it belongs to the quoted speech.",
            options:[".", "?", "!"], correct:"!",
            feedback:{
                ".":{ errorType:"Period instead of exclamation on emotional outburst", explanation:"A period signals a neutral statement. But Lucia is shouting in frustration — 'This is completely unacceptable' expresses strong emotion. An exclamation mark is the correct choice." },
                "?":{ errorType:"Question mark on a statement", explanation:"'This is completely unacceptable' is not a question — it is an angry declaration. A question mark would signal a question. Use an exclamation mark for strong emotional statements." }
            },
            rule:"Strong emotion (anger, excitement, urgency) \u2192 exclamation mark (!)",
            examples:["\"This is completely unacceptable!\" Lucia shouted.", "\"The pipe burst again!\" Carlos called out."],
            correctReason:"Lucia is shouting in frustration — this is a clear emotional outburst. An exclamation mark expresses that strong emotion. It goes inside the closing quotation mark because it belongs to the quoted speech."
        },
        {
            id:9, topic:"apostrophe",
            sentence:"___ reviewing the complaint right now, so please wait on the line.",
            context:"The blank means 'they are' — which contraction is correct?",
            hint:"El espacio en blanco es una contracción de 'they are'.",
            clue:"contraction: they + are = ___", clueExplain:"'They're' = 'they are'. 'Their' = belonging to them (possessive). 'There' = a place or existence.",
            options:["They're", "Their", "There"], correct:"They're",
            feedback:{
                "Their":{ errorType:"Possessive 'their' vs. contraction 'they're'", explanation:"'Their' is a possessive pronoun meaning 'belonging to them': 'The tenants submitted their complaints.' Here we need the contraction 'they are' = 'They\u2019re'." },
                "There":{ errorType:"'There' (place/existence) vs. contraction 'they're'", explanation:"'There' refers to a place ('over there') or existence ('There is a problem'). Here we need the contraction 'they are' = 'They\u2019re reviewing the complaint'." }
            },
            rule:"they + are = they're (apostrophe replaces 'a') | their = possessive | there = place/existence",
            examples:["They're reviewing the complaint now. (= They are)", "Their office is on the third floor. (possessive)", "There is a problem with the invoice. (existence)"],
            correctReason:"'They're' = 'they are'. The apostrophe replaces the missing letter 'a'. This is the only contraction among the three options. 'Their' is possessive; 'there' indicates place or existence."
        },
        {
            id:10, topic:"commas",
            sentence:"The building inspection covered the roof, the pipes___ the heating system, and the electrical wiring.",
            context:"This is a four-item list — what goes in the blank after 'pipes'?",
            hint:"La inspección cubre cuatro partes del edificio.",
            clue:"four-item list — comma after each item", clueExplain:"In a list of four items, a comma follows each item except the last. The comma before 'and' separates the third item from the fourth.",
            options:[".", ",", ";"], correct:",",
            feedback:{
                ".":{ errorType:"Period in the middle of a sentence", explanation:"A period ends a sentence — it cannot appear in the middle. 'The pipes' is the second item in a four-item list and needs a comma after it to continue the list." },
                ";":{ errorType:"Semicolon instead of comma in simple list", explanation:"Semicolons separate list items only when the items themselves contain internal commas. This is a simple noun list — use commas: 'the roof, the pipes, the heating system, and the electrical wiring.'" }
            },
            rule:"item 1, item 2, item 3, and item 4 — comma after each item",
            examples:["The inspection covered the roof, the pipes, the heating system, and the wiring.", "Nadia reported the charge, the date, the amount, and the reference number."],
            correctReason:"In a four-item list, a comma follows each item (except the last). After 'pipes' (the second item), a comma is needed to separate it from 'the heating system' (the third item)."
        },
        {
            id:11, topic:"endpunct",
            sentence:"Please send us the completed form within 30 days___",
            context:"This is a polite instruction or command — what end punctuation does it use?",
            hint:"El agente da una instrucción cortés al cliente.",
            clue:"polite command / instruction", clueExplain:"Imperative sentences (commands and instructions) typically end with a period. An exclamation mark is used only for urgent or very strong commands.",
            options:[".", "?", "!"], correct:".",
            feedback:{
                "?":{ errorType:"Question mark on a command", explanation:"'Please send us the form' is a command, not a question. Commands do not end with question marks. A period is the standard ending for polite instructions." },
                "!":{ errorType:"Exclamation on a routine instruction", explanation:"An exclamation mark is used for urgent or emotional commands ('Call 911!'). 'Please send us the form within 30 days' is a routine polite instruction — a period is appropriate." }
            },
            rule:"Polite command / instruction \u2192 ends with a period (.)",
            examples:["Please send the form within 30 days.", "Contact customer service with your reference number.", "Submit your complaint in writing."],
            correctReason:"This is a polite imperative sentence. Routine commands and instructions end with a period. An exclamation mark would only be appropriate for urgent or emotional commands."
        },
        {
            id:12, topic:"apostrophe",
            sentence:"The building manager addressed all the ___ concerns at the meeting.",
            context:"More than one tenant has concerns — how do you show plural possession?",
            hint:"Las preocupaciones pertenecen a varios inquilinos.",
            clue:"plural possessive: multiple tenants own the concerns", clueExplain:"For regular plurals ending in -s, add only an apostrophe after the s: tenants' (not tenants's). This shows possession belonging to multiple people.",
            options:["tenants", "tenant's", "tenants'"], correct:"tenants'",
            feedback:{
                "tenants":{ errorType:"Plural noun without possessive", explanation:"'Tenants' is simply the plural form (more than one tenant) with no possession. To show that the concerns belong to multiple tenants, add an apostrophe after the s: tenants'." },
                "tenant's":{ errorType:"Singular possessive instead of plural possessive", explanation:"'Tenant's' shows possession by ONE tenant. But there are multiple tenants here. For plural nouns ending in -s, the possessive is formed by adding only an apostrophe after the s: tenants'." }
            },
            rule:"Regular plural ending in -s + ' (apostrophe only) \u2192 tenants', managers', companies'",
            examples:["The tenants' concerns were noted. (multiple tenants)", "The managers' decision was unanimous. (multiple managers)"],
            correctReason:"'Tenants'' is the plural possessive. Since 'tenants' already ends in -s (regular plural), we add only an apostrophe after the s. Compare: 'tenant's' (one tenant) vs. 'tenants'' (multiple tenants)."
        },
        {
            id:13, topic:"commas",
            sentence:"Carlos brought the invoice___ the contract, and the repair report to the meeting.",
            context:"Three items in a list — what goes after the first item 'invoice'?",
            hint:"Carlos lleva tres documentos a la reunión.",
            clue:"comma after first item in three-item list", clueExplain:"In a three-item list, a comma follows each item except the last. The first item 'invoice' needs a comma before moving to the second item 'contract'.",
            options:["and", ",", ""], correct:",",
            feedback:{
                "and":{ errorType:"'And' connecting every item (only one 'and' in standard list)", explanation:"In standard English lists, 'and' appears only before the last item. Between the first and second items you use a comma: 'the invoice, the contract, and the repair report.'" },
                "":{ errorType:"Missing comma between list items", explanation:"Without a comma after 'invoice', the sentence runs the items together without clear separation. Each item in a three-item list needs a comma: 'the invoice, the contract, and the repair report.'" }
            },
            rule:"item 1, item 2, and item 3 — comma separates every item except after the last",
            examples:["Carlos brought the invoice, the contract, and the report.", "Lucia contacted the manager, the plumber, and the electrician."],
            correctReason:"A comma is needed after 'invoice' (the first item) to separate it from 'the contract' (the second item). Rule: in a three-item list, a comma follows each item except the last."
        },
        {
            id:14, topic:"endpunct",
            sentence:"Nadia asked the agent whether the refund had been processed___",
            context:"This looks like a question, but is it a direct or indirect question?",
            hint:"Nadia reporta lo que preguntó — no hace la pregunta directamente al lector.",
            clue:"indirect question = statement \u2192 period", clueExplain:"An indirect question reports that someone asked something. It is grammatically a statement, not a direct question, so it ends with a period, not a question mark.",
            options:["!", ".", "?"], correct:".",
            feedback:{
                "?":{ errorType:"Question mark on an indirect question (statement)", explanation:"'Nadia asked the agent whether...' is an indirect question — it reports a question without asking the reader directly. Indirect questions are statements and end with a period, not a question mark." },
                "!":{ errorType:"Exclamation mark on a neutral statement", explanation:"There is no strong emotion here. 'Nadia asked the agent whether the refund had been processed' is a neutral statement reporting an action — it ends with a period." }
            },
            rule:"Indirect question (reporting a question) = statement \u2192 ends with a period (.)",
            examples:["Nadia asked whether the refund had been processed.", "James wondered if the package had been shipped.", "She asked who was responsible."],
            correctReason:"This is an indirect question — it reports what Nadia asked, using 'whether'. Indirect questions are grammatically statements (not direct questions), so they end with a period. Compare: 'Has the refund been processed?' (direct, ?) vs. 'She asked whether the refund had been processed.' (indirect, .)"
        },
        {
            id:15, topic:"apostrophe",
            sentence:"\"We ___ accept verbal complaints — please submit everything in writing,\" the manager said.",
            context:"The blank is a contraction of 'do not' — which spelling is correct?",
            hint:"El espacio en blanco es una contracción de 'do not'.",
            clue:"contraction: do + not = ___", clueExplain:"'Don't' = 'do not'. The apostrophe replaces the letters 'o' from 'not'. No apostrophe or wrong placement makes the contraction incorrect.",
            options:["don't", "dont", "do'nt"], correct:"don't",
            feedback:{
                "dont":{ errorType:"Missing apostrophe in contraction", explanation:"'Dont' has no apostrophe. In contractions, an apostrophe is always required to mark the missing letter(s). The correct form is 'don't' (apostrophe between 'n' and 't')." },
                "do'nt":{ errorType:"Apostrophe in the wrong position", explanation:"The apostrophe must go where the letters are removed. In 'do not', the 'o' from 'not' is removed, so the apostrophe goes between 'n' and 't': don't. Not between 'o' and 'n'." }
            },
            rule:"do + not = don't (apostrophe replaces 'o' from 'not', placed between n and t)",
            examples:["We don't accept verbal complaints. (= do not)", "They don't process refunds by phone.", "Please don't submit without a reference number."],
            correctReason:"'Don't' = 'do not'. The apostrophe replaces the letter 'o' from 'not' and is placed between 'n' and 't'. This is a standard contraction — the apostrophe is always required and must be in the correct position."
        }
    ];

    let currentQuestion = 0, score = 0;
    let answered = new Array(quizData.length).fill(false);

    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    function initQuiz() {
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';
        quizData.forEach(function(q, index) { container.appendChild(createCard(q, index)); });
        showQuestion(0);
        updateProgress();
    }

    function createCard(q, index) {
        const card = document.createElement('div');
        card.className = 'question-card' + (index !== 0 ? ' hidden' : '');
        card.id = 'question-' + index;
        const shuffled = shuffle(q.options);
        const badgeClass = q.topic === 'commas' ? 'commas' : q.topic === 'endpunct' ? 'endpunct' : 'apostrophe';
        const badgeLabel = q.topic === 'commas' ? '&#128394; Commas in Lists'
            : q.topic === 'endpunct' ? '&#9679; End Punctuation'
            : '&#8217; Apostrophes';
        const badge = '<span class="topic-badge ' + badgeClass + '">' + badgeLabel + '</span>';
        const sentenceHL = q.sentence.replace('___', '<span class="blank" id="blank-' + index + '">___</span>');
        const btnHTML = shuffled.map(function(opt) {
            const display = opt === '' ? '(none)' : opt;
            return '<button class="option-btn" onclick="selectAnswer(' + index + ', this)" data-val="' + opt + '">' + display + '</button>';
        }).join('');
        card.innerHTML =
            '<div class="q-header"><div class="question-number">' + (index+1) + '</div>' + badge + '</div>' +
            '<div class="hint-box"><div class="hint-label">&#128161; Hint</div>' + q.hint + '</div>' +
            '<p class="question-text">' + sentenceHL + '</p>' +
            '<p class="context-note">&#128196; ' + q.context + '</p>' +
            '<div class="options-grid" id="options-' + index + '">' + btnHTML + '</div>' +
            '<div class="feedback" id="feedback-' + index + '"></div>' +
            '<div class="nav-buttons">' +
            '<button class="nav-btn prev" onclick="prevQuestion()"' + (index===0?' disabled':'') + '>&#8592; Previous</button>' +
            '<button class="nav-btn next" id="next-' + index + '" onclick="nextQuestion(' + index + ')" disabled>' +
            (index===quizData.length-1?'See Results &#127881;':'Next &#8594;') +
            '</button></div>';
        return card;
    }

    function selectAnswer(qi, btn) {
        if (answered[qi]) return;
        answered[qi] = true;
        const selected = btn.getAttribute('data-val');
        const q = quizData[qi];
        const isCorrect = selected === q.correct;
        if (isCorrect) score++;
        const blank = document.getElementById('blank-' + qi);
        blank.textContent = selected === '' ? '(none)' : selected;
        blank.className = 'blank ' + (isCorrect ? 'correct' : 'incorrect');
        document.querySelectorAll('#options-' + qi + ' .option-btn').forEach(function(b) {
            b.disabled = true;
            if (b.getAttribute('data-val') === q.correct) b.classList.add('correct');
            else if (b.getAttribute('data-val') === selected) b.classList.add('incorrect');
        });
        buildFeedback(qi, selected, isCorrect, q);
        document.getElementById('next-' + qi).disabled = false;
        updateProgress();
    }

    function buildFeedback(qi, selected, isCorrect, q) {
        const el = document.getElementById('feedback-' + qi);
        el.className = 'feedback show ' + (isCorrect ? 'correct' : 'incorrect');
        const exHTML = q.examples.map(function(e){ return '<div class="rule-ex">' + e + '</div>'; }).join('');
        const selectedDisplay = selected === '' ? '(none)' : selected;
        const correctDisplay = q.correct === '' ? '(none)' : q.correct;

        if (isCorrect) {
            el.innerHTML =
                '<div class="fb-header"><span class="fb-icon">&#9989;</span><div>' +
                '<div class="fb-title">Correct!</div>' +
                '<div class="fb-subtitle">You applied the punctuation rule correctly</div></div></div>' +
                '<div class="fb-body">' +
                '<div class="fb-block fb-signal"><div class="fb-block-title">&#128269; Key signal identified</div>' +
                '<div style="font-size:0.92rem;color:var(--text-dark);line-height:1.55;"><span class="signal-tag">' + q.clue + '</span> \u2014 ' + q.clueExplain + '</div></div>' +
                '<div class="fb-block fb-rule"><div class="fb-block-title">&#128208; Rule applied</div>' +
                '<div class="rule-formula">' + q.rule + '</div>' +
                '<div class="rule-examples">' + exHTML + '</div></div>' +
                '<div class="fb-block fb-why"><div class="fb-block-title">&#128161; Why is this correct?</div>' +
                '<div class="fb-why-text">' + q.correctReason + '</div></div></div>';
        } else {
            const err = q.feedback[selected] || { errorType:'Incorrect', explanation:'Review the punctuation rule for this sentence type.' };
            el.innerHTML =
                '<div class="fb-header"><span class="fb-icon">&#10060;</span><div>' +
                '<div class="fb-title">Incorrect</div>' +
                '<div class="fb-subtitle">Let\'s review this punctuation rule</div></div></div>' +
                '<div class="fb-body">' +
                '<div class="fb-block fb-signal wrong"><div class="fb-block-title">&#128269; Key signal you needed to spot</div>' +
                '<div style="font-size:0.92rem;color:var(--text-dark);line-height:1.55;"><span class="signal-tag red">' + q.clue + '</span> \u2014 ' + q.clueExplain + '</div></div>' +
                '<div class="fb-block" style="background:#F8FAFC;border:1px solid #E2E8F0;"><div class="fb-block-title" style="color:#475569;">&#128260; Your answer vs. correct</div>' +
                '<div class="punct-compare">' +
                '<div class="punct-row"><span class="punct-label wrong">You chose</span><span class="punct-text"><span class="hl-wrong">' + selectedDisplay + '</span></span></div>' +
                '<div class="punct-row"><span class="punct-label right">Correct</span><span class="punct-text"><span class="hl-right">' + correctDisplay + '</span></span></div>' +
                '</div></div>' +
                '<div class="fb-block fb-error"><div class="fb-block-title">&#9888;&#65039; Error type: <span class="error-badge">' + err.errorType + '</span></div>' +
                '<div class="word-swap"><span class="ws-box ws-wrong">' + selectedDisplay + '</span><span class="ws-arrow">\u2192</span><span class="ws-box ws-right">' + correctDisplay + '</span></div>' +
                '<div class="error-text">' + err.explanation + '</div></div>' +
                '<div class="fb-block fb-rule"><div class="fb-block-title">&#128208; The correct rule</div>' +
                '<div class="rule-formula">' + q.rule + '</div>' +
                '<div class="rule-examples">' + exHTML + '</div></div>' +
                '<div class="fb-block fb-why"><div class="fb-block-title">&#128161; Why is the correct answer right?</div>' +
                '<div class="fb-why-text">' + q.correctReason + '</div></div></div>';
        }
    }

    function showQuestion(i) {
        document.querySelectorAll('.question-card').forEach(function(c,idx){ c.classList.toggle('hidden',idx!==i); });
        document.getElementById('currentQ').textContent = i+1;
        currentQuestion = i;
    }
    function nextQuestion(i) { i < quizData.length-1 ? showQuestion(i+1) : showResults(); }
    function prevQuestion() { if (currentQuestion > 0) showQuestion(currentQuestion-1); }
    function updateProgress() {
        document.getElementById('progressFill').style.width = (answered.filter(Boolean).length / quizData.length * 100) + '%';
    }
    function showResults() {
        document.querySelectorAll('.question-card').forEach(function(c){ c.classList.add('hidden'); });
        document.getElementById('resultsScreen').classList.add('show');
        const pct = score / quizData.length * 100;
        document.getElementById('finalScore').textContent = score + '/15';
        const stars = pct >= 90 ? 3 : pct >= 70 ? 2 : 1;
        document.getElementById('resultsMessage').textContent = pct >= 90
            ? 'Excellent! You have mastered commas, end punctuation, and apostrophes. \uD83C\uDFC6'
            : pct >= 70 ? 'Well done! Keep practising the punctuation rules. \uD83D\uDCAA'
            : 'Good effort. Review the key rules and try again. \uD83D\uDCDA';
        document.querySelectorAll('.star').forEach(function(s,i){
            if (i < stars) setTimeout(function(){ s.classList.add('earned'); }, i*300);
        });
    }
    document.addEventListener('DOMContentLoaded', initQuiz);
    </script>
</body>
</html>
