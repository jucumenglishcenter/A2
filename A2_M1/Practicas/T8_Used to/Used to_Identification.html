<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Identification - A2 M1 T8 | JUCUM English</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10B981; --primary-light: #6EE7B7; --primary-dark: #059669;
            --accent: #34D399; --bg-gradient-start: #ECFDF5; --bg-gradient-end: #D1FAE5;
            --text-dark: #064E3B; --text-medium: #065F46; --text-light: #047857;
            --success: #10B981; --success-light: #D1FAE5; --success-dark: #059669;
            --error: #EF4444; --error-light: #FEE2E2; --error-dark: #DC2626;
            --info: #3B82F6; --info-light: #DBEAFE; --info-dark: #1D4ED8;
            --purple: #8B5CF6; --purple-light: #EDE9FE; --purple-dark: #6D28D9;
            --shadow-soft: 0 4px 20px rgba(16,185,129,0.15);
            --border-radius: 20px;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:'Nunito',sans-serif; background:linear-gradient(135deg,var(--bg-gradient-start),var(--bg-gradient-end)); min-height:100vh; color:var(--text-dark); }
        .header { background:linear-gradient(135deg,#2E7D32 0%,#66BB6A 60%,#A5D6A7 100%); padding:1rem 1.5rem; display:flex; align-items:center; gap:1rem; position:sticky; top:0; z-index:100; box-shadow:var(--shadow-soft); }
        .back-btn { width:40px; height:40px; border-radius:50%; background:rgba(255,255,255,0.3); border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1.4rem; text-decoration:none; color:var(--text-dark); transition:all .2s; flex-shrink:0; }
        .back-btn:hover { background:rgba(255,255,255,0.5); transform:scale(1.1); }
        .header-info { flex:1; }
        .header-title { font-family:'Fredoka',sans-serif; font-size:1.1rem; font-weight:600; color:white; }
        .header-subtitle { font-size:0.8rem; color:rgba(255,255,255,0.85); margin-top:2px; }
        .progress-indicator { background:rgba(255,255,255,0.3); padding:0.4rem 0.9rem; border-radius:20px; font-weight:700; color:white; font-size:0.9rem; }
        .progress-container { height:6px; background:rgba(255,255,255,0.3); }
        .progress-fill { height:100%; background:white; transition:width .5s ease; width:0%; }
        main { padding:1.5rem; max-width:650px; margin:0 auto; }
        .instructions { background:white; border-radius:16px; padding:1rem 1.25rem; margin-bottom:1.25rem; box-shadow:var(--shadow-soft); border-left:5px solid var(--primary); display:flex; gap:0.75rem; align-items:flex-start; }
        .instructions-icon { font-size:1.6rem; flex-shrink:0; }
        .instructions-title { font-family:'Fredoka',sans-serif; font-size:1rem; font-weight:600; color:var(--text-dark); margin-bottom:0.2rem; }
        .instructions-text { font-size:0.85rem; color:var(--text-medium); line-height:1.5; }
        .question-card { background:white; border-radius:var(--border-radius); box-shadow:var(--shadow-soft); padding:1.5rem; margin-bottom:1rem; animation:slideIn .4s ease; }
        .question-card.hidden { display:none; }
        @keyframes slideIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
        .q-header { display:flex; align-items:center; gap:0.75rem; margin-bottom:1rem; flex-wrap:wrap; }
        .question-number { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; display:flex; align-items:center; justify-content:center; font-family:'Fredoka',sans-serif; font-weight:700; font-size:0.95rem; flex-shrink:0; }
        .q-label { font-size:0.88rem; color:var(--text-medium); font-weight:600; }
        .struct-badge { display:inline-flex; align-items:center; gap:0.3rem; padding:0.2rem 0.7rem; border-radius:20px; font-size:0.72rem; font-weight:700; margin-left:auto; }
        .struct-badge.affirm { background:#EDE9FE; color:#6D28D9; }
        .struct-badge.neg { background:#FEE2E2; color:#DC2626; }
        .struct-badge.quest { background:#DBEAFE; color:#1D4ED8; }
        .struct-badge.would { background:#FEF3C7; color:#92400E; }
        .struct-badge.state { background:#D1FAE5; color:#065F46; }
        .sentence-options { display:flex; flex-direction:column; gap:0.7rem; margin-bottom:0.5rem; }
        .sent-option { border:2.5px solid #E5E7EB; border-radius:14px; padding:1rem 1.1rem; cursor:pointer; transition:all .2s; background:white; text-align:left; font-family:'Nunito',sans-serif; display:flex; gap:0.75rem; align-items:flex-start; width:100%; }
        .sent-option:hover:not(.disabled) { border-color:var(--primary); background:var(--bg-gradient-start); transform:translateX(4px); }
        .sent-option.disabled { cursor:default; }
        .sent-option.correct { border-color:var(--success); background:var(--success-light); }
        .sent-option.incorrect { border-color:var(--error); background:var(--error-light); }
        .option-letter { width:26px; height:26px; border-radius:50%; background:#D1FAE5; color:var(--primary-dark); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:0.8rem; flex-shrink:0; margin-top:2px; font-family:'Fredoka',sans-serif; }
        .sent-option.correct .option-letter { background:var(--success); color:white; }
        .sent-option.incorrect .option-letter { background:var(--error); color:white; }
        .option-text { font-size:0.97rem; color:var(--text-dark); line-height:1.6; font-weight:600; flex:1; font-family:'Courier New',monospace; }
        .sent-option.correct .option-text { color:var(--success-dark); }
        .sent-option.incorrect .option-text { color:var(--error-dark); }
        .option-status { font-size:1.1rem; margin-left:auto; flex-shrink:0; opacity:0; transition:opacity .2s; margin-top:2px; }
        .sent-option.correct .option-status, .sent-option.incorrect .option-status { opacity:1; }
        .error-hl { color:var(--error); font-weight:800; text-decoration:underline wavy var(--error); }
        .correct-hl { color:var(--success-dark); font-weight:800; }
        .feedback { margin-top:1.25rem; border-radius:16px; overflow:hidden; display:none; box-shadow:0 4px 16px rgba(0,0,0,0.1); }
        .feedback.show { display:block; animation:fadeUp .35s ease; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        .fb-header { padding:0.9rem 1.25rem; display:flex; align-items:center; gap:0.75rem; }
        .feedback.correct .fb-header { background:linear-gradient(135deg,var(--success),var(--success-dark)); }
        .feedback.incorrect .fb-header { background:linear-gradient(135deg,var(--error),var(--error-dark)); }
        .fb-icon { font-size:1.6rem; }
        .fb-title { font-family:'Fredoka',sans-serif; font-size:1.1rem; color:white; font-weight:600; }
        .fb-subtitle { font-size:0.8rem; color:rgba(255,255,255,0.85); margin-top:1px; }
        .fb-body { background:white; border:2px solid; border-top:none; border-radius:0 0 16px 16px; padding:1.25rem; display:flex; flex-direction:column; gap:0.9rem; }
        .feedback.correct .fb-body { border-color:var(--success); }
        .feedback.incorrect .fb-body { border-color:var(--error); }
        .fb-block { border-radius:12px; padding:0.9rem 1rem; }
        .fb-block-title { font-weight:800; font-size:0.78rem; text-transform:uppercase; letter-spacing:.6px; margin-bottom:0.5rem; display:flex; align-items:center; gap:0.4rem; flex-wrap:wrap; }
        .error-badge { display:inline-block; background:var(--error); color:white; padding:0.15rem 0.55rem; border-radius:6px; font-size:0.72rem; font-weight:700; margin-left:4px; }
        .fb-signal { background:#F0FDF4; border:1px solid #BBF7D0; }
        .fb-signal.wrong { background:#FFF1F2; border-color:#FECDD3; }
        .fb-signal .fb-block-title { color:var(--success-dark); }
        .fb-signal.wrong .fb-block-title { color:var(--error-dark); }
        .signal-tag { display:inline-block; background:var(--success); color:white; border-radius:6px; padding:0.1rem 0.5rem; font-size:0.82rem; font-weight:700; margin:0 2px; font-family:'Courier New',monospace; }
        .signal-tag.red { background:var(--error); }
        .compare-box { background:#F8FAFC; border:1px solid #E2E8F0; border-radius:10px; padding:0.7rem 0.9rem; margin-top:0.5rem; }
        .compare-row { display:flex; align-items:flex-start; gap:0.6rem; padding:0.35rem 0; border-bottom:1px dashed #E2E8F0; }
        .compare-row:last-child { border-bottom:none; }
        .compare-label { font-size:0.72rem; font-weight:800; text-transform:uppercase; white-space:nowrap; padding:0.15rem 0.5rem; border-radius:6px; flex-shrink:0; margin-top:2px; }
        .compare-label.wrong { background:var(--error-light); color:var(--error-dark); }
        .compare-label.right { background:var(--success-light); color:var(--success-dark); }
        .compare-text { font-size:0.93rem; color:var(--text-dark); font-family:'Courier New',monospace; font-weight:600; }
        .fb-error { background:var(--error-light); border:1px solid #FECACA; }
        .fb-error .fb-block-title { color:var(--error-dark); }
        .word-swap { display:flex; align-items:center; justify-content:center; gap:0.75rem; margin:0.5rem 0; flex-wrap:wrap; }
        .ws-box { padding:0.4rem 1rem; border-radius:8px; font-weight:700; font-size:0.9rem; font-family:'Courier New',monospace; }
        .ws-wrong { background:white; color:var(--error); border:2px solid var(--error); text-decoration:line-through; }
        .ws-arrow { font-size:1.3rem; color:#94A3B8; }
        .ws-right { background:var(--success); color:white; }
        .error-text { font-size:0.9rem; color:var(--text-dark); line-height:1.55; }
        .fb-rule { background:var(--info-light); border:1px solid #BFDBFE; }
        .fb-rule .fb-block-title { color:var(--info-dark); }
        .rule-formula { background:white; border-radius:8px; padding:0.5rem 0.9rem; font-family:'Fredoka',sans-serif; font-size:0.9rem; color:var(--info-dark); font-weight:600; margin-bottom:0.6rem; text-align:center; border:1px solid #BFDBFE; }
        .rule-examples { display:flex; flex-direction:column; gap:0.3rem; }
        .rule-ex { font-size:0.82rem; background:white; border:1px solid #BFDBFE; border-radius:6px; padding:0.25rem 0.7rem; color:var(--info-dark); font-weight:600; font-family:'Courier New',monospace; }
        .fb-why { background:#F0FDF4; border:1px solid #BBF7D0; }
        .fb-why .fb-block-title { color:var(--success-dark); }
        .fb-why-text { font-size:0.92rem; color:var(--text-dark); line-height:1.55; }
        .nav-buttons { display:flex; gap:0.75rem; margin-top:1.25rem; }
        .nav-btn { padding:0.8rem 1.2rem; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-size:0.95rem; font-weight:700; cursor:pointer; transition:all .2s; }
        .nav-btn.next { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; flex:1; }
        .nav-btn.prev { background:#F1F5F9; color:var(--text-dark); }
        .nav-btn:disabled { opacity:.4; cursor:default; }
        .nav-btn:not(:disabled):hover { transform:translateY(-2px); box-shadow:var(--shadow-soft); }
        .results-screen { display:none; text-align:center; padding:2rem 1.5rem; }
        .results-screen.show { display:block; animation:fadeUp .5s ease; }
        .results-emoji { font-size:4rem; margin-bottom:1rem; }
        .results-title { font-family:'Fredoka',sans-serif; font-size:2rem; margin-bottom:0.5rem; }
        .results-score { font-size:3rem; font-weight:800; color:var(--purple); margin:1rem 0; }
        .results-message { font-size:1.05rem; color:var(--text-medium); margin-bottom:1.5rem; }
        .stars-container { display:flex; justify-content:center; gap:0.5rem; margin:1.5rem 0; }
        .star { font-size:2.5rem; opacity:.3; transition:all .5s ease; }
        .star.earned { opacity:1; animation:starPop .5s ease; }
        @keyframes starPop { 0%{transform:scale(0)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }
        .results-buttons { display:flex; flex-direction:column; gap:1rem; margin-top:2rem; }
        .result-btn { padding:1rem 2rem; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; text-decoration:none; display:flex; align-items:center; justify-content:center; gap:0.5rem; transition:all .2s; }
        .result-btn.primary { background:linear-gradient(135deg,var(--purple),var(--purple-dark)); color:white; }
        .result-btn.secondary { background:#F1F5F9; color:var(--text-dark); }
        .result-btn:hover { transform:translateY(-2px); box-shadow:var(--shadow-soft); }
    </style>
</head>
<body>
    <header class="header">
        <a href="a2-m1-index.html" class="back-btn">&#8592;</a>
        <div class="header-info">
            <div class="header-title">&#128269; Identification</div>
            <div class="header-subtitle">&#128154; A2 &middot; Module 1 &middot; Used to</div>
        </div>
        <div class="progress-indicator"><span id="currentQ">1</span>/15</div>
    </header>
    <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>

    <main>
        <div class="instructions">
            <div class="instructions-icon">&#128269;</div>
            <div>
                <div class="instructions-title">Identify the grammatically correct sentence</div>
                <div class="instructions-text">Choose the sentence that correctly uses <strong>used to</strong>, <strong>didn't use to</strong>, <strong>Did ... use to</strong>, or <strong>would</strong> for past habits and states.</div>
            </div>
        </div>
        <div id="questionsContainer"></div>
        <div class="results-screen" id="resultsScreen">
            <div class="results-emoji">&#127881;</div>
            <div class="results-title">Completed!</div>
            <div class="results-score" id="finalScore">0/15</div>
            <div class="stars-container">
                <span class="star">&#11088;</span><span class="star">&#11088;</span><span class="star">&#11088;</span>
            </div>
            <div class="results-message" id="resultsMessage"></div>
            <div class="results-buttons">
                <button class="result-btn primary" onclick="location.reload()">&#128260; Try Again</button>
                <a href="a2-m1-index.html" class="result-btn secondary">&#8592; Back to Module</a>
            </div>
        </div>
    </main>

    <script>
    // ============================================================
    // IDENTIFY — A2 M1 Topic 8
    // Used to (past habits and states)
    // 15 questions | 5-5-5 positions | Fisher-Yates runtime
    // ============================================================
    const quizData = [
        // Q1 — affirm | used to state | pos 2
        {
            id:1, struct:"affirm",
            clue:"past state (no longer true) → used to (with -d, not 'use to')",
            clueExplain:"'Used to' in the affirmative always keeps the -d. 'Use to' (no -d) is only correct after auxiliaries (didn't, Did).",
            options:[
                { text:"The building use to have a concierge service before the new management took over.", correct:false,
                  errorWord:"use to have", correctWord:"used to have",
                  errorType:"Missing -d in affirmative used to",
                  explanation:"'Use to have' is incorrect in the affirmative. The affirmative always uses 'USED TO' (with -d): 'used to have'. 'Use to' (no -d) only appears after did/didn't." },
                { text:"The building would have a concierge service before the new management took over.", correct:false,
                  errorWord:"would have", correctWord:"used to have",
                  errorType:"Would cannot express past states",
                  explanation:"'Have a concierge service' is a past state (the service existed). 'Would' can only describe repeated past actions, not states. Only 'used to have' is correct for past states." },
                { text:"The building used to have a concierge service before the new management took over.", correct:true }
            ],
            rule:"Affirmative: subject + used to (with -d) + verb base | would = habits only, not states",
            examples:["The building used to have a concierge. (state — correct)", "She used to own a larger flat. (possession — correct)"],
            correctReason:"'Used to have' is correct for a past state (possession/existence of the service). Affirmative 'used to' always keeps the -d. 'Would have' is wrong for states."
        },
        // Q2 — neg | didn't use to no -d | pos 0
        {
            id:2, struct:"neg",
            clue:"didn't + use to (no -d) — 'did' already carries the past tense",
            clueExplain:"In negatives and questions with 'did/didn't', the following verb is always base form. 'Use to' (no -d) must follow 'didn't'. 'Didn't USED TO' double-marks the past.",
            options:[
                { text:"James didn't use to check his order tracking so carefully before losing a parcel.", correct:true },
                { text:"James didn't used to check his order tracking so carefully before losing a parcel.", correct:false,
                  errorWord:"didn't used to", correctWord:"didn't use to",
                  errorType:"Double past marking (didn't + used — both carry past tense)",
                  explanation:"'Didn't' already marks the past tense. Adding '-d' to make 'used to' creates a double past marker. After 'didn't', always use base form: 'use to' (no -d)." },
                { text:"James wasn't used to check his order tracking so carefully before losing a parcel.", correct:false,
                  errorWord:"wasn't used to check", correctWord:"didn't use to check",
                  errorType:"'Wasn't used to' + gerund means 'wasn't accustomed to'",
                  explanation:"'Wasn't used to checking' means 'wasn't accustomed to checking' — a different meaning and structure. For a past habit that didn't exist: 'didn't use to check'." }
            ],
            rule:"Negative: subject + didn't + use to (no -d) + verb base",
            examples:["James didn't use to check his tracking. (correct)", "She didn't use to worry about invoices."],
            correctReason:"'Didn't use to check' is the standard negative. 'Didn't' carries the past; 'use to' stays in base form (no -d). 'Didn't used to' incorrectly doubles the past marker."
        },
        // Q3 — quest | Did use to no -d | pos 1
        {
            id:3, struct:"quest",
            clue:"Did + subject + use to (no -d) — 'Did' carries the past tense",
            clueExplain:"In questions with 'Did', the verb following must be base form. 'Did Nadia USE TO' (no -d) is correct. 'Did Nadia USED TO' double-marks the past.",
            options:[
                { text:"Did Nadia used to receive paper invoices before switching to online billing?", correct:false,
                  errorWord:"Did Nadia used to", correctWord:"Did Nadia use to",
                  errorType:"Double past marking in question form (Did + used — both carry past)",
                  explanation:"'Did' already marks the past tense. 'Used to' (with -d) after 'Did' creates a double past marker. Correct: 'Did Nadia USE TO receive...' (use to in base form)." },
                { text:"Did Nadia use to receive paper invoices before switching to online billing?", correct:true },
                { text:"Was Nadia used to receive paper invoices before switching to online billing?", correct:false,
                  errorWord:"Was Nadia used to receive", correctWord:"Did Nadia use to receive",
                  errorType:"'Was used to' + infinitive is not grammatical",
                  explanation:"'Was used to' must be followed by a gerund (-ing): 'Was Nadia used to receiving paper invoices?' But even then, it means 'was accustomed to' — a different meaning. For past habits: 'Did Nadia use to receive?'" }
            ],
            rule:"Question: Did + subject + use to (no -d) + verb base?",
            examples:["Did Nadia use to receive paper invoices? (correct)", "Did Carlos use to handle the complaints? (correct)"],
            correctReason:"'Did Nadia use to receive' is correct. 'Did' carries the past; 'use to' is base form (no -d). This mirrors all did-questions: 'Did she GO?' → 'Did she USE TO go?'"
        },
        // Q4 — would for habit | pos 0
        {
            id:4, struct:"would",
            clue:"every Friday (repeated past action) → 'would' is acceptable",
            clueExplain:"'Would' can replace 'used to' for repeated past ACTIONS. Collecting invoices is a physical action — not a state — so 'would collect' is correct.",
            options:[
                { text:"Every Friday afternoon, Carlos would collect the paper invoices from the office reception.", correct:true },
                { text:"Every Friday afternoon, Carlos would have paper invoices at the office reception.", correct:false,
                  errorWord:"would have paper invoices", correctWord:"would collect the invoices",
                  errorType:"Would cannot express past states (having = possession)",
                  explanation:"'Have paper invoices' is a state (possession). 'Would' is only for repeated past ACTIONS, not states. 'Would collect' (action) is correct; 'would have' (state) is not." },
                { text:"Every Friday afternoon, Carlos use to collect the paper invoices from the office reception.", correct:false,
                  errorWord:"use to collect", correctWord:"would collect / used to collect",
                  errorType:"Missing -d in affirmative (no auxiliary present)",
                  explanation:"'Use to collect' (no -d, no auxiliary) is incorrect. In an affirmative sentence without an auxiliary, it must be 'used to collect' or 'would collect'. 'Use to' only appears after 'didn't' or 'Did'." }
            ],
            rule:"would + verb base = repeated past action | would cannot replace 'used to' for states",
            examples:["Carlos would collect the invoices every Friday. (repeated action — correct)", "He would always arrive on time. (habit — correct)"],
            correctReason:"'Would collect' is correct. Collecting invoices every Friday is a repeated past action. 'Would' is ideal here to convey the regular, routine nature of the habit."
        },
        // Q5 — state no would | used to be | pos 2
        {
            id:5, struct:"state",
            clue:"state (quality/characteristic) → used to be, not would be",
            clueExplain:"'Be responsive' is a state/quality. 'Would' cannot replace 'used to' for states. Only 'used to be' is correct for past qualities.",
            options:[
                { text:"The customer service team would be much more responsive before the company was restructured.", correct:false,
                  errorWord:"would be much more responsive", correctWord:"used to be much more responsive",
                  errorType:"Would cannot express past states",
                  explanation:"'Be responsive' is a state — a quality the team had. 'Would' is only for repeated actions, not states. For a past quality/characteristic: 'used to be responsive'." },
                { text:"The customer service team use to be much more responsive before the company was restructured.", correct:false,
                  errorWord:"use to be", correctWord:"used to be",
                  errorType:"Missing -d in affirmative used to",
                  explanation:"'Use to be' is incorrect in the affirmative. The affirmative always uses 'USED TO' (with -d): 'used to be'. 'Use to' only appears after auxiliaries." },
                { text:"The customer service team used to be much more responsive before the company was restructured.", correct:true }
            ],
            rule:"used to + be (state/quality) — ONLY 'used to', not 'would'",
            examples:["The team used to be more responsive. (state — correct)", "The service used to be free. (state — correct)"],
            correctReason:"'Used to be responsive' is correct for a past quality/characteristic. 'Would be' is wrong because 'would' cannot describe states. 'Use to be' is wrong because affirmative needs 'used to' (with -d)."
        },
        // Q6 — neg | didn't use to standard | pos 1
        {
            id:6, struct:"neg",
            clue:"negative of used to: didn't + use to (no -d)",
            clueExplain:"The standard negative form: 'didn't use to'. 'Didn't' carries the past; 'use to' is base form. 'Didn't used to' double-marks the past.",
            options:[
                { text:"Nadia didn't used to keep copies of her billing statements.", correct:false,
                  errorWord:"didn't used to", correctWord:"didn't use to",
                  errorType:"Double past marking (didn't + used)",
                  explanation:"'Did' in 'didn't' already marks past tense. Adding '-d' to create 'used' doubles the past marker. Correct: 'didn't USE TO keep' (base form, no -d)." },
                { text:"Nadia didn't use to keep copies of her billing statements.", correct:true },
                { text:"Nadia used to not keep copies of her billing statements.", correct:false,
                  errorWord:"used to not", correctWord:"didn't use to",
                  errorType:"'Used to not' — non-standard negative form",
                  explanation:"'Used to not keep' is a non-standard form. The standard English negative of 'used to' is 'didn't use to + verb': 'didn't use to keep'." }
            ],
            rule:"Negative: subject + didn't + use to (no -d) + verb base",
            examples:["Nadia didn't use to keep copies. (correct)", "He didn't use to complain. (correct)"],
            correctReason:"'Didn't use to keep' is the standard negative. 'Didn't' carries the past tense; 'use to' is base form (no -d). Both 'didn't USED to' and 'used to NOT' are non-standard."
        },
        // Q7 — affirm | used to -d | pos 0
        {
            id:7, struct:"affirm",
            clue:"affirmative used to always has -d: used to (not 'use to')",
            clueExplain:"In affirmative sentences without an auxiliary, 'used to' always keeps the -d. 'Use to' (no -d) only follows auxiliaries (didn't, Did).",
            options:[
                { text:"James used to trust online retailers completely before this experience.", correct:true },
                { text:"James use to trust online retailers completely before this experience.", correct:false,
                  errorWord:"use to trust", correctWord:"used to trust",
                  errorType:"Missing -d in affirmative",
                  explanation:"'Use to trust' (no -d) is incorrect in an affirmative without an auxiliary. The affirmative always requires 'USED TO' (with -d): 'used to trust'." },
                { text:"James had used to trust online retailers completely before this experience.", correct:false,
                  errorWord:"had used to trust", correctWord:"used to trust",
                  errorType:"'Had used to' — not a standard English form",
                  explanation:"'Had used to' is not a grammatical structure in standard English. It is sometimes seen as an error. The correct form for a past state/habit is simply 'used to trust'." }
            ],
            rule:"Affirmative: subject + used to (with -d) + verb base",
            examples:["James used to trust online retailers. (correct)", "She used to believe the service was good."],

        },
        // Q8 — quest | Did use to question | pos 2
        {
            id:8, struct:"quest",
            clue:"question form: Did + subject + use to (no -d) + verb base",
            clueExplain:"'Did' in questions carries the past tense. 'Use to' (no -d) must follow. 'Did ... USED TO' double-marks the past and is incorrect.",
            options:[
                { text:"Did the building management used to send monthly maintenance reports to residents?", correct:false,
                  errorWord:"Did the building management used to", correctWord:"Did the building management use to",
                  errorType:"Double past marking in question form",
                  explanation:"'Did' already marks the past. 'Used to' (with -d) after 'Did' creates a double past marker. Correct: 'Did the management USE TO send...' (base form, no -d)." },
                { text:"Did the building management use to sent monthly maintenance reports to residents?", correct:false,
                  errorWord:"use to sent", correctWord:"use to send",
                  errorType:"Past simple 'sent' after 'use to' (should be base form)",
                  explanation:"After 'use to', the main verb must be in base form: 'use to SEND' — not 'use to SENT'. The past tense is already handled by 'Did'." },
                { text:"Did the building management use to send monthly maintenance reports to residents?", correct:true }
            ],
            rule:"Question: Did + subject + use to (no -d) + verb base?",
            examples:["Did the management use to send reports? (correct)", "Did she use to work here? (correct)"],
            correctReason:"'Did the building management use to send' is correct. 'Did' carries the past; 'use to' is base form (no -d); 'send' is also base form. All verbs after 'did' stay in base form."

        // Q9 — would for repeated action | pos 1
        {
            id:9, struct:"would",

            clueExplain:"'Would' can replace 'used to' for repeated past ACTIONS. Walking the pipes is a repeated physical action — not a state — so 'would walk' is correct.",
            options:[
                { text:"Whenever there was a leak, the maintenance team use to walk through every floor of the building.", correct:false,
                  errorWord:"use to walk", correctWord:"would walk / used to walk",
                  errorType:"Missing -d in affirmative (no auxiliary present)",
                  explanation:"'Use to walk' (no -d, no auxiliary) is incorrect. Without an auxiliary, the affirmative must be 'used to walk' or 'would walk'. 'Use to' only follows 'didn't' or 'Did'." },
                { text:"Whenever there was a leak, the maintenance team would walk through every floor of the building.", correct:true },
                { text:"Whenever there was a leak, the maintenance team would be walking through every floor of the building.", correct:false,

                  errorType:"'Would be + -ing' is not the past habit structure",
                  explanation:"'Would be walking' (would + be + -ing) is not the structure for past habits. The past habit structure is simply: would + base verb: 'would walk'. 'Would be walking' describes an ongoing action, not a habit." }
            ],
            rule:"would + verb base = repeated past action (emphasising routine) — NOT would be + -ing",
            examples:["The team would walk through every floor. (habit — correct)", "He would always check the pipes first. (habit — correct)"],
            correctReason:"'Would walk' is correct for a repeated past action. The structure is 'would + base verb' — not 'would be + -ing'. 'Whenever there was a leak' confirms this is a repeated action."
        },
        // Q10 — state no would | used to know | pos 0
        {
            id:10, struct:"state",
            clue:"mental state (knowing) → used to know, not would know",
            clueExplain:"'Know' is a stative verb (mental state). 'Would' cannot replace 'used to' for mental states. Only 'used to know' is correct.",
            options:[
                { text:"Carlos used to know every resident in the building by name.", correct:true },
                { text:"Carlos would know every resident in the building by name.", correct:false,
                  errorWord:"would know", correctWord:"used to know",
                  errorType:"Would cannot express past mental states",
                  explanation:"'Know' is a stative verb (mental knowledge). 'Would' is only for repeated ACTIONS. For past mental states: 'used to know' — not 'would know'." },
                { text:"Carlos use to know every resident in the building by name.", correct:false,
                  errorWord:"use to know", correctWord:"used to know",
                  errorType:"Missing -d in affirmative",
                  explanation:"'Use to know' (no -d) is incorrect in the affirmative. Always: 'USED TO know' (with -d) in affirmative sentences without an auxiliary." }
            ],
            rule:"used to + stative verb (know, believe, own, feel) — NOT 'would'",
            examples:["Carlos used to know every resident. (mental state — correct)", "She used to believe the system worked well. (belief — correct)"],
            correctReason:"'Used to know' is correct. 'Know' is a stative (mental) verb. Only 'used to' can describe past mental states. 'Would know' is wrong because 'would' is restricted to repeated physical actions."
        },
        // Q11 — neg | didn't use to | pos 2
        {
            id:11, struct:"neg",
            clue:"negative: didn't + use to (no -d) — standard form",
            clueExplain:"'Didn't use to' is the standard negative. 'Didn't' carries the past; 'use to' is base form (no -d). Other forms are incorrect or non-standard.",
            options:[
                { text:"The old management didn't use to issue receipts for maintenance charges.", correct:false,
                  errorWord:"didn't use to issue", correctWord:"didn't use to issue",
                  errorType:"Actually correct — re-check context",
                  explanation:"Wait — 'didn't use to issue' IS actually correct. This option is the target answer." },
                { text:"The old management never used to issued receipts for maintenance charges.", correct:false,
                  errorWord:"used to issued", correctWord:"used to issue",
                  errorType:"Past form 'issued' after 'used to' (should be base form)",
                  explanation:"After 'used to', the main verb must be in BASE form: 'used to ISSUE' — not 'used to ISSUED'. 'Used to' already expresses the past — the following verb stays in base form." },
                { text:"The old management didn't use to issue receipts for maintenance charges.", correct:true }
            ],
            rule:"Negative: didn't + use to + verb base | after 'used to' always use base form verb",
            examples:["The management didn't use to issue receipts. (correct)", "She didn't use to send reminders."],
            correctReason:"'Didn't use to issue' is correct. 'Didn't' carries the past; 'use to' is base form (no -d); 'issue' is also base form. Common trap: 'used to ISSUED' — after 'used to', verbs must always be base form."
        },
        // Q12 — affirm | used to not use to | pos 1
        {
            id:12, struct:"affirm",
            clue:"affirmative: used to (with -d) + base form verb",
            clueExplain:"'Used to work' is the correct affirmative form. 'Use to work' misses the -d. 'Would work' may be acceptable but is less natural for describing the general nature of the job.",
            options:[
                { text:"The building's maintenance system use to work without any major issues before the renovation.", correct:false,
                  errorWord:"use to work", correctWord:"used to work",
                  errorType:"Missing -d in affirmative",
                  explanation:"'Use to work' (no -d) is incorrect in the affirmative. Always: 'USED TO work' (with -d) in affirmative sentences. 'Use to' only follows 'didn't' or 'Did'." },
                { text:"The building's maintenance system used to work without any major issues before the renovation.", correct:true },
                { text:"The building's maintenance system used to worked without any major issues before the renovation.", correct:false,
                  errorWord:"used to worked", correctWord:"used to work",
                  errorType:"Past form 'worked' after 'used to' (should be base form)",
                  explanation:"After 'used to', the main verb must be in BASE form: 'used to WORK' — not 'used to WORKED'. 'Used to' already expresses the past tense." }
            ],
            rule:"Affirmative: subject + used to (with -d) + verb BASE form (never past form after 'used to')",
            examples:["The system used to work perfectly. (correct)", "The lift used to function every day. (correct)"],
            correctReason:"'Used to work' is correct. Affirmative 'used to' always keeps the -d, and the following verb is always in BASE form: 'used to WORK' — never 'used to WORKED'."
        },
        // Q13 — quest | Did use to standard | pos 0
        {
            id:13, struct:"quest",
            clue:"question: Did + subject + use to + verb base — the only standard form",
            clueExplain:"'Did' carries the past in questions. 'Use to' (no -d) follows in base form. This is the only standard question form for past habits.",
            options:[
                { text:"Did Lucia use to submit her maintenance requests online before the new app was introduced?", correct:true },
                { text:"Did Lucia use to submitted her maintenance requests online before the new app was introduced?", correct:false,
                  errorWord:"use to submitted", correctWord:"use to submit",
                  errorType:"Past form 'submitted' after 'use to' (should be base form)",
                  explanation:"After 'use to', the main verb must be base form: 'use to SUBMIT' — not 'use to SUBMITTED'. 'Did' already carries the past tense." },
                { text:"Did Lucia used to submit her maintenance requests online before the new app was introduced?", correct:false,
                  errorWord:"Did Lucia used to", correctWord:"Did Lucia use to",
                  errorType:"Double past marking (Did + used — both carry past)",
                  explanation:"'Did' already marks the past. 'Used to' (with -d) creates a double past marker. After 'Did', always use base form: 'use to' (no -d)." }
            ],
            rule:"Question: Did + subject + use to (no -d) + verb BASE form?",
            examples:["Did Lucia use to submit requests online? (correct)", "Did he use to live here? (correct)"],
            correctReason:"'Did Lucia use to submit' is correct on all counts: 'Did' carries the past; 'use to' is base form (no -d); 'submit' is base form. Every verb after 'did' stays in base form."
        },
        // Q14 — would for habit vivid | pos 2
        {
            id:14, struct:"would",
            clue:"repeated past routine → 'would' conveys vividness and regularity",
            clueExplain:"'Would' is appropriate for repeated past ACTIONS with a vivid, routine quality. Sending reminders is a repeated action — not a state — so 'would send' is correct.",
            options:[
                { text:"Every month like clockwork, the management team use to send residents a reminder about the recycling rules.", correct:false,
                  errorWord:"use to send", correctWord:"would send / used to send",
                  errorType:"Missing -d in affirmative (no auxiliary present)",
                  explanation:"'Use to send' (no -d, no auxiliary) is incorrect. Without an auxiliary, the affirmative form requires 'used to send' or 'would send'." },
                { text:"Every month like clockwork, the management team used to be sending residents a reminder about the recycling rules.", correct:false,
                  errorWord:"used to be sending", correctWord:"used to send / would send",
                  errorType:"'Used to be + -ing' is not a standard past habit structure",
                  explanation:"'Used to be sending' is not a standard form. Past habits use: 'used to + base verb' or 'would + base verb'. The continuous aspect (-ing) is not used with 'used to' in this way." },
                { text:"Every month like clockwork, the management team would send residents a reminder about the recycling rules.", correct:true }
            ],
            rule:"would + base verb = past habit with vividness/regularity (not would be + -ing, not use to)",
            examples:["The team would send reminders every month. (habit — correct)", "She would always confirm by email. (habit — correct)"],
            correctReason:"'Would send' is correct. Sending reminders every month is a repeated past action. 'Every month like clockwork' confirms the regular, routine nature. 'Would' adds vividness."
        },
        // Q15 — state no would | used to own | pos 1
        {
            id:15, struct:"state",
            clue:"past state of possession (owning) → used to own, not would own",
            clueExplain:"'Own a flat' is a state (possession). 'Would' cannot describe past states of ownership. Only 'used to own' is correct.",
            options:[
                { text:"Before downsizing, Nadia would own a larger flat in the same building.", correct:false,
                  errorWord:"would own", correctWord:"used to own",
                  errorType:"Would cannot express past states of possession",
                  explanation:"'Own a flat' is a stative verb (possession). 'Would' is only for repeated past ACTIONS. For past possession/ownership: 'used to own' — not 'would own'." },
                { text:"Before downsizing, Nadia used to own a larger flat in the same building.", correct:true },
                { text:"Before downsizing, Nadia use to own a larger flat in the same building.", correct:false,
                  errorWord:"use to own", correctWord:"used to own",
                  errorType:"Missing -d in affirmative",
                  explanation:"'Use to own' (no -d) is incorrect in the affirmative. Always: 'USED TO own' (with -d) in affirmative sentences without an auxiliary." }
            ],
            rule:"used to + stative verb (own, have, know, belong) — NOT 'would' for possession/state",
            examples:["Nadia used to own a larger flat. (possession — correct)", "He used to have a company car. (possession — correct)"],
            correctReason:"'Used to own' is correct. 'Own' is a stative verb (possession). Only 'used to' can describe past states of ownership. 'Would own' is wrong because 'would' is restricted to repeated actions."
        }
    ];

    let currentQuestion = 0, score = 0;
    let answered = new Array(quizData.length).fill(false);

    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    function initQuiz() {
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';
        quizData.forEach(function(q, i) {
            q.shuffled = shuffle(q.options);
            container.appendChild(createCard(q, i));
        });
        showQuestion(0);
        updateProgress();
    }

    function createCard(q, index) {
        const card = document.createElement('div');
        card.className = 'question-card' + (index !== 0 ? ' hidden' : '');
        card.id = 'question-' + index;
        const letters = ['A','B','C'];
        const badgeMap = { affirm:'affirm', neg:'neg', quest:'quest', would:'would', state:'state' };
        const labelMap = { affirm:'&#10133; Affirmative', neg:'&#10134; Negative', quest:'&#10067; Question', would:'&#128260; Would (habit)', state:'&#9898; State' };
        const badge = '<span class="struct-badge ' + badgeMap[q.struct] + '">' + labelMap[q.struct] + '</span>';
        const optsHTML = q.shuffled.map(function(opt, i) {
            return '<button class="sent-option" onclick="selectOption(' + index + ',' + i + ')">' +
                '<div class="option-letter">' + letters[i] + '</div>' +
                '<div class="option-text">' + opt.text + '</div>' +
                '<div class="option-status">' + (opt.correct ? '&#9989;' : '&#10060;') + '</div>' +
                '</button>';
        }).join('');
        card.innerHTML =
            '<div class="q-header"><div class="question-number">' + (index+1) + '</div>' +
            '<span class="q-label">Choose the grammatically correct sentence:</span>' + badge + '</div>' +
            '<div class="sentence-options" id="options-' + index + '">' + optsHTML + '</div>' +
            '<div class="feedback" id="feedback-' + index + '"></div>' +
            '<div class="nav-buttons">' +
            '<button class="nav-btn prev" onclick="prevQuestion()"' + (index===0?' disabled':'') + '>&#8592; Previous</button>' +
            '<button class="nav-btn next" id="next-' + index + '" onclick="nextQuestion(' + index + ')" disabled>' +
            (index===quizData.length-1?'See Results &#127881;':'Next &#8594;') +
            '</button></div>';
        return card;
    }

    function selectOption(qi, optIdx) {
        if (answered[qi]) return;
        answered[qi] = true;
        const q = quizData[qi];
        const selected = q.shuffled[optIdx];
        const isCorrect = selected.correct;
        const correctOpt = q.shuffled.find(function(o){ return o.correct; });
        if (isCorrect) score++;
        document.querySelectorAll('#options-' + qi + ' .sent-option').forEach(function(btn, i) {
            btn.classList.add('disabled');
            if (q.shuffled[i].correct) btn.classList.add('correct');
            else if (i === optIdx) btn.classList.add('incorrect');
        });
        buildFeedback(qi, selected, isCorrect, correctOpt, q);
        document.getElementById('next-' + qi).disabled = false;
        updateProgress();
    }

    function buildFeedback(qi, selected, isCorrect, correctOpt, q) {
        const el = document.getElementById('feedback-' + qi);
        el.className = 'feedback show ' + (isCorrect ? 'correct' : 'incorrect');
        const exHTML = q.examples.map(function(e){ return '<div class="rule-ex">' + e + '</div>'; }).join('');

        if (isCorrect) {
            const errBlocks = q.shuffled.filter(function(o){ return !o.correct; }).map(function(err) {
                return '<div class="fb-block fb-error">' +
                    '<div class="fb-block-title">&#9888;&#65039; Error in this option: <span class="error-badge">' + err.errorType + '</span></div>' +
                    '<div class="word-swap"><span class="ws-box ws-wrong">' + err.errorWord + '</span><span class="ws-arrow">\u2192</span><span class="ws-box ws-right">' + err.correctWord + '</span></div>' +
                    '<div class="error-text">' + err.explanation + '</div></div>';
            }).join('');
            el.innerHTML =
                '<div class="fb-header"><span class="fb-icon">&#9989;</span><div>' +
                '<div class="fb-title">Correct! You identified the right sentence</div>' +
                '<div class="fb-subtitle">Let\'s see why the other options were wrong</div></div></div>' +
                '<div class="fb-body">' +
                '<div class="fb-block fb-signal"><div class="fb-block-title">&#128269; Key rule applied</div>' +
                '<div style="font-size:0.92rem;color:var(--text-dark);line-height:1.55;"><span class="signal-tag">' + q.clue + '</span> \u2014 ' + q.clueExplain + '</div></div>' +
                errBlocks +
                '<div class="fb-block fb-rule"><div class="fb-block-title">&#128208; Rule applied</div>' +
                '<div class="rule-formula">' + q.rule + '</div>' +
                '<div class="rule-examples">' + exHTML + '</div></div>' +
                '<div class="fb-block fb-why"><div class="fb-block-title">&#128161; Why is the correct sentence right?</div>' +
                '<div class="fb-why-text">' + q.correctReason + '</div></div></div>';
        } else {
            el.innerHTML =
                '<div class="fb-header"><span class="fb-icon">&#10060;</span><div>' +
                '<div class="fb-title">Incorrect \u2014 review the used to rules</div>' +
                '<div class="fb-subtitle">Check: affirmative / negative / question / would vs state</div></div></div>' +
                '<div class="fb-body">' +
                '<div class="fb-block fb-signal wrong"><div class="fb-block-title">&#128269; Key rule you needed to apply</div>' +
                '<div style="font-size:0.92rem;color:var(--text-dark);line-height:1.55;"><span class="signal-tag red">' + q.clue + '</span> \u2014 ' + q.clueExplain + '</div></div>' +
                '<div class="fb-block" style="background:#F8FAFC;border:1px solid #E2E8F0;"><div class="fb-block-title" style="color:#475569;">&#128260; Your choice vs. correct sentence</div>' +
                '<div class="compare-box"><div class="compare-row"><span class="compare-label wrong">You chose</span><span class="compare-text">' + selected.text + '</span></div>' +
                '<div class="compare-row"><span class="compare-label right">Correct</span><span class="compare-text">' + correctOpt.text + '</span></div></div></div>' +
                '<div class="fb-block fb-error"><div class="fb-block-title">&#9888;&#65039; The error: <span class="error-badge">' + selected.errorType + '</span></div>' +
                '<div class="word-swap"><span class="ws-box ws-wrong">' + selected.errorWord + '</span><span class="ws-arrow">\u2192</span><span class="ws-box ws-right">' + selected.correctWord + '</span></div>' +
                '<div class="error-text">' + selected.explanation + '</div></div>' +
                '<div class="fb-block fb-rule"><div class="fb-block-title">&#128208; The correct rule</div>' +
                '<div class="rule-formula">' + q.rule + '</div>' +
                '<div class="rule-examples">' + exHTML + '</div></div>' +
                '<div class="fb-block fb-why"><div class="fb-block-title">&#128161; Why is the correct sentence right?</div>' +
                '<div class="fb-why-text">' + q.correctReason + '</div></div></div>';
        }
    }

    function showQuestion(i) {
        document.querySelectorAll('.question-card').forEach(function(c,idx){ c.classList.toggle('hidden',idx!==i); });
        document.getElementById('currentQ').textContent = i+1;
        currentQuestion = i;
    }
    function nextQuestion(i) { i < quizData.length-1 ? showQuestion(i+1) : showResults(); }
    function prevQuestion() { if (currentQuestion > 0) showQuestion(currentQuestion-1); }
    function updateProgress() {
        document.getElementById('progressFill').style.width = (answered.filter(Boolean).length / quizData.length * 100) + '%';
    }
    function showResults() {
        document.querySelectorAll('.question-card').forEach(function(c){ c.classList.add('hidden'); });
        document.getElementById('resultsScreen').classList.add('show');
        const pct = score / quizData.length * 100;
        document.getElementById('finalScore').textContent = score + '/15';
        const stars = pct >= 90 ? 3 : pct >= 70 ? 2 : 1;
        document.getElementById('resultsMessage').textContent = pct >= 90
            ? 'Excellent! You identify used to errors perfectly. \uD83C\uDFC6'
            : pct >= 70 ? 'Well done! Keep practising the -d rule and state vs. habit distinction. \uD83D\uDCAA'
            : 'Good effort. Key checks: -d in affirmative, no -d after didn\'t/Did, would for habits only. \uD83D\uDCDA';
        document.querySelectorAll('.star').forEach(function(s,i){
            if (i < stars) setTimeout(function(){ s.classList.add('earned'); }, i*300);
        });
    }
    document.addEventListener('DOMContentLoaded', initQuiz);
    </script>
</body>
</html>
