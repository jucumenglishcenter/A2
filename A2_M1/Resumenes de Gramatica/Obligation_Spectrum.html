<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grammar Summary — Obligation Spectrum | A2 | JUCUM</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Fredoka:wght@400;500;600;700&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
:root{
--bg:#FAFAF6;--card:#fff;--text:#2A2A2A;--text-soft:#777;--border:#E8E5DC;
--shadow:0 3px 16px rgba(0,0,0,.06);--radius:14px;
--lp:#4CAF50;--ld:#1B5E20;--ll:#E8F5E9;--lm:#C8E6C9;
--lg:linear-gradient(135deg,#388E3C,#4CAF50);--lglow:rgba(76,175,80,.15);
--badge-text:#1A3D1C;
--subj:#1565C0;--subj-bg:#E3F2FD;
--verb:#E53935;--verb-bg:#FFEBEE;
--comp:#00897B;--comp-bg:#E0F2F1;
--neg:#AD1457;--neg-bg:#FCE4EC;
--quest:#7B1FA2;--quest-bg:#F3E5F5;
--ok:#2E7D32;--ok-bg:#E8F5E9;
--err:#C62828;--err-bg:#FFEBEE;
--note-bg:#F1F8E9;--note-border:#AED581;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Nunito",sans-serif;background:var(--bg);color:var(--text);line-height:1.7;padding:1.5rem 1rem;-webkit-font-smoothing:antialiased}
.container{max-width:800px;margin:0 auto}
.level-header{text-align:center;padding:2rem;border-radius:20px;color:#fff;position:relative;overflow:hidden;margin-bottom:1.2rem;background:var(--lg)}
.level-header::before{content:"";position:absolute;top:-40%;right:-15%;width:250px;height:250px;background:rgba(255,255,255,.1);border-radius:50%}
.level-header h1{font-family:"Fredoka",sans-serif;font-size:1.8rem;font-weight:600;position:relative;z-index:1}
.level-header .module-name{font-family:"Fredoka",sans-serif;font-size:1.05rem;opacity:.95;position:relative;z-index:1;margin-top:.2rem}
.level-header .subtitle{opacity:.8;font-size:.83rem;position:relative;z-index:1;margin-top:.15rem}
.level-badge{display:inline-flex;align-items:center;gap:6px;font-size:.7rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;background:var(--ll);color:var(--badge-text);padding:4px 12px;border-radius:20px;border:1.5px solid var(--lm);margin-bottom:.8rem}
.step-tabs{display:flex;gap:.35rem;margin-bottom:1rem;flex-wrap:wrap}
.step-tab{padding:.45rem .85rem;border-radius:8px;font-size:.78rem;font-weight:700;cursor:pointer;border:2px solid var(--border);background:var(--card);transition:.2s;font-family:"Nunito",sans-serif}
.step-tab:hover{background:var(--ll)}
.step-tab.active{background:var(--ll);border-color:var(--lp);color:var(--ld)}
.step-tab.done{background:var(--ok-bg);border-color:var(--ok);color:var(--ok)}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.6rem;margin-bottom:1.2rem;box-shadow:var(--shadow);border-top:3.5px solid var(--lp);animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.section-label{display:flex;align-items:center;gap:.5rem;font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--ld);margin-bottom:.3rem;margin-top:1.1rem}
.section-label::before{content:"";width:20px;height:3px;background:var(--lp);border-radius:2px}
.section-label:first-child{margin-top:0}
.section-title{font-family:"Fredoka",sans-serif;font-size:1.25rem;font-weight:600;margin-bottom:.1rem}
.section-desc{font-size:.85rem;color:var(--text-soft);margin-bottom:1rem}
.g-subj{background:var(--subj-bg);color:var(--subj);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--subj)}
.g-verb{background:var(--verb-bg);color:var(--verb);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--verb)}
.g-comp{background:var(--comp-bg);color:var(--comp);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--comp)}
.g-neg{background:var(--neg-bg);color:var(--neg);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--neg)}
.g-quest{background:var(--quest-bg);color:var(--quest);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--quest)}
.g-table{width:100%;border-collapse:separate;border-spacing:0;margin:.8rem 0;border-radius:10px;overflow:hidden;font-size:.83rem;border:1px solid var(--border)}
.g-table th{background:var(--lg);color:#fff;padding:.65rem .6rem;font-size:.7rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
.g-table td{padding:.6rem;border-bottom:1px solid #f0f0f0;vertical-align:middle}
.g-table tr:nth-child(even) td{background:var(--ll)}
.g-table tr:last-child td{border-bottom:none}
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin:.8rem 0}
.compare-card{padding:1rem;border-radius:12px;text-align:center}
.compare-card.esp{background:var(--ll);border:2px solid var(--lm)}
.compare-card.eng{background:var(--subj-bg);border:2px solid #90CAF9}
.compare-card h4{font-family:"Fredoka",sans-serif;font-size:.85rem;margin-bottom:.5rem}
.compare-card.esp h4{color:var(--ld)}
.compare-card.eng h4{color:var(--subj)}
.compare-card ul{list-style:none;font-size:.82rem;color:var(--text-soft)}
.compare-card li{padding:3px 0}
.formula-box{background:var(--note-bg);border:2px solid var(--note-border);border-radius:12px;padding:1rem;margin:.8rem 0;text-align:center;font-family:"Fredoka",sans-serif;font-size:.9rem;color:var(--ld);line-height:2.3}
.tip-card{background:var(--ll);border-radius:10px;padding:.8rem 1rem;margin:.5rem 0;font-size:.83rem;border-left:3px solid var(--lp)}
.tip-card strong{color:var(--ld)}
.alert-card{background:var(--err-bg);border:2px solid #EF5350;border-radius:10px;padding:.8rem 1rem;margin:.8rem 0}
.alert-card .atitle{font-family:"Fredoka",sans-serif;color:var(--err);font-size:.82rem;margin-bottom:.3rem;font-weight:700}
.alert-card p{font-size:.82rem;color:#555;line-height:1.7}
.ex-row{display:flex;align-items:flex-start;gap:.6rem;padding:.6rem .8rem;border-radius:10px;margin:.4rem 0;font-size:.88rem}
.ex-row .icon{font-size:1.2rem;flex-shrink:0;margin-top:2px}
.ex-row .en{font-weight:700;color:var(--text)}
.ex-row .es{font-family:"Lora",serif;font-style:italic;font-size:.82rem;color:var(--text-soft);margin-top:1px}
.ex-right{border-left:3px solid var(--ok);background:var(--ok-bg)}
.ex-wrong{border-left:3px solid var(--err);background:var(--err-bg)}

/* OBLIGATION SPECTRUM */
.obligation-spectrum{margin:1rem 0}
.os-label{font-family:"Fredoka",sans-serif;font-size:.78rem;font-weight:600;color:var(--text-soft);text-align:center;margin-bottom:.7rem;text-transform:uppercase;letter-spacing:.07em}
.os-track{display:grid;grid-template-columns:repeat(4,1fr);gap:.4rem}
.os-item{text-align:center;padding:.65rem .5rem;border-radius:12px}
.os-must{background:var(--err-bg);border:2px solid #EF9A9A}
.os-should{background:#FFF3E0;border:2px solid #FFB74D}
.os-neednt{background:var(--ok-bg);border:2px solid #A5D6A7}
.os-mustnt{background:var(--neg-bg);border:2px solid #F48FB1}
.os-modal{font-family:"Fredoka",sans-serif;font-size:.83rem;font-weight:700;margin-bottom:.2rem}
.os-must .os-modal{color:var(--err)}
.os-should .os-modal{color:#E65100}
.os-neednt .os-modal{color:var(--ok)}
.os-mustnt .os-modal{color:var(--neg)}
.os-desc{font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em}
.os-must .os-desc{color:var(--err)}
.os-should .os-desc{color:#BF360C}
.os-neednt .os-desc{color:var(--ok)}
.os-mustnt .os-desc{color:var(--neg)}
/* MUST HAVE TO COMPARE */
.must-haveto-compare{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin:.9rem 0}
.mhc-col{border-radius:12px;overflow:hidden;border:2px solid var(--border)}
.mhc-must{border-color:#EF9A9A}
.mhc-haveto{border-color:#90CAF9}
.mhc-header{padding:.55rem .8rem;font-family:"Fredoka",sans-serif;font-size:.9rem;font-weight:700;text-align:center}
.mhc-must .mhc-header{background:var(--err-bg);color:var(--err)}
.mhc-haveto .mhc-header{background:var(--subj-bg);color:var(--subj)}
.mhc-sub{font-size:.71rem;text-align:center;padding:.25rem .8rem;color:var(--text-soft);background:#FAFAFA;border-bottom:1px dashed #e0e0e0;font-style:italic}
.mhc-items{padding:.5rem .8rem}
.mhc-item{font-size:.79rem;padding:3px 0;color:var(--text-soft)}
/* NEEDNT MUSTNT */
.neednt-mustnt{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-top:.6rem}
.nm-item{border-radius:10px;padding:.8rem}
.nm-neednt{background:var(--ok-bg);border:2px solid #A5D6A7}
.nm-mustnt{background:var(--neg-bg);border:2px solid #F48FB1}
.nm-modal{font-family:"Fredoka",sans-serif;font-size:.88rem;font-weight:700;margin-bottom:.3rem}
.nm-neednt .nm-modal{color:var(--ok)}
.nm-mustnt .nm-modal{color:var(--neg)}
.nm-meaning{font-size:.76rem;font-weight:600;color:var(--text);margin-bottom:.3rem;line-height:1.4}
.nm-ex{font-size:.76rem;color:var(--text-soft);margin-bottom:.3rem;font-style:italic}
.nm-es{font-family:"Lora",serif;font-size:.72rem;color:var(--text-soft);margin-bottom:.3rem}
.nm-tag{font-size:.72rem;font-weight:800;display:inline-block;padding:2px 8px;border-radius:10px}
.nm-neednt .nm-tag{background:var(--ok);color:#fff}
.nm-mustnt .nm-tag{background:var(--neg);color:#fff}
/* MODAL CHOICE GUIDE */
.modal-choice-guide{border-radius:12px;overflow:hidden;border:1px solid var(--border);margin:1rem 0}
.mcg-row{display:grid;grid-template-columns:1.5fr 1fr 2fr;border-bottom:1px solid #f0f0f0;font-size:.8rem}
.mcg-row:last-child{border-bottom:none}
.mcg-header{background:var(--lg);color:#fff;font-weight:800;font-size:.72rem;text-transform:uppercase;letter-spacing:.05em}
.mcg-header .mcg-q,.mcg-header .mcg-m,.mcg-header .mcg-ex{padding:.5rem .7rem}
.mcg-q,.mcg-m,.mcg-ex{padding:.45rem .7rem;display:flex;align-items:center;border-right:1px solid #eee}
.mcg-ex{border-right:none;font-style:italic;font-size:.77rem;color:var(--text-soft)}
.mcg-must{background:#FFF5F5}
.mcg-must .mcg-m{color:var(--err);font-weight:700}
.mcg-should{background:#FFFDE7}
.mcg-should .mcg-m{color:#E65100;font-weight:700}
.mcg-need{background:#E8F4FD}
.mcg-need .mcg-m{color:var(--subj);font-weight:700}
.mcg-neednt{background:var(--ll)}
.mcg-neednt .mcg-m{color:var(--ok);font-weight:700}
.mcg-mustnt{background:var(--neg-bg)}
.mcg-mustnt .mcg-m{color:var(--neg);font-weight:700}
@media(max-width:600px){
.os-track{grid-template-columns:1fr 1fr}
.must-haveto-compare,.neednt-mustnt{grid-template-columns:1fr}
.mcg-row{grid-template-columns:1fr 1fr}
.mcg-ex{display:none}
}

.ex-section{margin-top:1.2rem;padding-top:1rem;border-top:2px dashed var(--lm)}
.ex-section h3{font-family:"Fredoka",sans-serif;color:var(--ld);font-size:.9rem;margin-bottom:.8rem}
.exercise{background:#fafafa;border-radius:12px;padding:1rem;margin-bottom:.7rem;border:2px solid #eee;transition:.2s}
.exercise.correct{border-color:var(--ok);background:var(--ok-bg)}
.exercise.incorrect{border-color:var(--err);background:var(--err-bg)}
.exercise-q{font-size:.88rem;margin-bottom:.7rem;line-height:1.4}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:.4rem}
.opt-btn{padding:.65rem .5rem;border:2px solid #e0e0e0;border-radius:10px;background:var(--card);color:var(--text-soft);font-size:.83rem;font-weight:600;cursor:pointer;transition:.15s;font-family:"Nunito",sans-serif;text-align:left}
.opt-btn:hover:not(:disabled){border-color:var(--lp);background:var(--ll)}
.opt-btn:disabled{cursor:not-allowed;opacity:.7}
.opt-btn.sel-ok{background:var(--ok);color:#fff;border-color:var(--ok)}
.opt-btn.sel-bad{background:var(--err);color:#fff;border-color:var(--err)}
.opt-btn.show-ok{background:var(--ok);color:#fff;border-color:var(--ok)}
.fb{margin-top:.7rem;padding:0;border-radius:12px;font-size:.82rem;display:none;line-height:1.6;overflow:hidden}
.fb.show{display:block;animation:fbSlide .35s ease}
@keyframes fbSlide{from{opacity:0;max-height:0;transform:translateY(-8px)}to{opacity:1;max-height:600px;transform:translateY(0)}}
.fb-header{display:flex;align-items:center;gap:.5rem;padding:.7rem 1rem;font-family:"Fredoka",sans-serif;font-size:.85rem;font-weight:600}
.fb.fb-ok .fb-header{background:#C8E6C9;color:var(--ok)}
.fb.fb-bad .fb-header{background:#FFCDD2;color:var(--err)}
.fb-icon{font-size:1.2rem}
.fb-body{padding:.8rem 1rem}
.fb.fb-ok .fb-body{background:var(--ok-bg)}
.fb.fb-bad .fb-body{background:var(--err-bg)}
.fb-row{display:flex;align-items:flex-start;gap:.5rem;margin-bottom:.4rem}
.fb-row:last-child{margin-bottom:0}
.fb-dot{font-size:.9rem;flex-shrink:0;margin-top:1px}
.fb-text{flex:1}
.fb-correct-answer{color:var(--ok);font-weight:700}
.fb-wrong-reason{color:var(--err);font-weight:600}
.fb-example{display:inline-flex;align-items:center;gap:.3rem;margin-top:.4rem;padding:4px 10px;border-radius:6px;font-size:.78rem;font-weight:700}
.fb.fb-ok .fb-example{background:#A5D6A7;color:#1B5E20}
.fb.fb-bad .fb-example{background:#EF9A9A;color:#B71C1C}
.fb-tip{margin-top:.5rem;padding:.5rem .7rem;border-radius:8px;background:var(--note-bg);border:1px solid var(--note-border);font-size:.76rem;color:#33691E}
.fb-tip strong{color:var(--ld)}
.score-bar{text-align:center;padding:.8rem;background:var(--ll);border-radius:10px;margin-top:.8rem;border:1px solid var(--lm)}
.score-bar .num{font-family:"Fredoka",sans-serif;font-size:1.4rem;color:var(--ld)}
.score-bar .lbl{font-size:.7rem;color:var(--lp);font-weight:700;text-transform:uppercase;letter-spacing:1px}
.summary-final{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.6rem;margin-top:1rem;box-shadow:var(--shadow);border-top:3.5px solid var(--ok);display:none}
.summary-final.show{display:block;animation:fadeIn .4s ease}
.summary-final h3{font-family:"Fredoka",sans-serif;color:var(--ok);margin-bottom:.8rem;font-size:1.1rem}
.summary-final ul{list-style:none}
.summary-final li{padding:5px 0 5px 22px;position:relative;font-size:.84rem;color:var(--text-soft);border-bottom:1px solid var(--lm)}
.summary-final li:last-child{border-bottom:none}
.summary-final li:before{content:"\2713";position:absolute;left:0;color:var(--lp);font-weight:700}
@media(max-width:600px){
.level-header h1{font-size:1.4rem}
.compare-grid{grid-template-columns:1fr}
.card{padding:1.2rem}
.opts{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="container">
<div class="level-header">
  <div class="level-badge">&#x1F49A; A2 &middot; Grammar Summary</div>
  <h1>&#x1F4DD; Grammar Summary</h1>
  <div class="module-name">&#x1F6CE;&#xFE0F; Services, Support &amp; Problem Solving</div>
  <p class="subtitle">Obligation Spectrum: must / have to / should / need to / needn't &middot; 5 steps &times; 5 exercises</p>
</div>
<div class="step-tabs" id="stepTabs"></div>
<div id="cardArea"></div>
<div class="summary-final" id="summaryFinal">
  <h3>&#x1F393; Key Points &mdash; Obligation Spectrum</h3>
  <ul id="summaryList"></ul>
</div>
</div>
<script>
var STEPS = [{"icon": "\ud83c\uddea\ud83c\uddf8", "title": "Repaso en Espa\u00f1ol", "html": "<div class=\"section-label\">Paso 1</div>\n<div class=\"section-title\">Paso 1: \ud83c\uddea\ud83c\uddf8 Repaso en Espa\u00f1ol</div>\n<div class=\"section-desc\">En espa\u00f1ol usamos \"deber\", \"tener que\", \"deber\u00eda\", \"necesitar\" para expresar distintos grados de obligaci\u00f3n. En ingl\u00e9s existe un espectro similar con palabras espec\u00edficas para cada grado.</div>\n<div class=\"compare-grid\">\n  <div class=\"compare-card esp\">\n    <h4>\ud83c\uddea\ud83c\uddf8 Espa\u00f1ol</h4>\n    <ul>\n      <li><b>Debes</b> rellenar este formulario.</li>\n      <li><b>Tienes que</b> enviarlo antes del viernes.</li>\n      <li><b>Deber\u00edas</b> contactar con soporte.</li>\n      <li>No <b>necesitas</b> llamar de nuevo.</li>\n      <li><b>No debes</b> compartir tu contrase\u00f1a.</li>\n    </ul>\n  </div>\n  <div class=\"compare-card eng\">\n    <h4>\ud83c\uddec\ud83c\udde7 English</h4>\n    <ul>\n      <li>You <b>must</b> fill in this form.</li>\n      <li>You <b>have to</b> send it by Friday.</li>\n      <li>You <b>should</b> contact support.</li>\n      <li>You <b>needn't</b> call again.</li>\n      <li>You <b>mustn't</b> share your password.</li>\n    </ul>\n  </div>\n</div>\n<div class=\"tip-card\"><strong>\ud83d\udca1 Idea clave:</strong> No todos los \"debes\" son iguales. En ingl\u00e9s hay una palabra espec\u00edfica para cada <b>grado</b> de obligaci\u00f3n \u2014 desde lo obligatorio hasta lo prohibido.</div>\n<div class=\"obligation-spectrum\">\n  <div class=\"os-label\">El espectro de obligaci\u00f3n</div>\n  <div class=\"os-track\">\n    <div class=\"os-item os-must\">\n      <div class=\"os-modal\">must / have to</div>\n      <div class=\"os-desc\">OBLIGATORIO</div>\n    </div>\n    <div class=\"os-item os-should\">\n      <div class=\"os-modal\">should / need to</div>\n      <div class=\"os-desc\">RECOMENDADO</div>\n    </div>\n    <div class=\"os-item os-neednt\">\n      <div class=\"os-modal\">needn't</div>\n      <div class=\"os-desc\">NO NECESARIO</div>\n    </div>\n    <div class=\"os-item os-mustnt\">\n      <div class=\"os-modal\">mustn't</div>\n      <div class=\"os-desc\">PROHIBIDO</div>\n    </div>\n  </div>\n</div>"}, {"icon": "\ud83e\udd1d", "title": "Similitudes", "html": "<div class=\"section-label\">Paso 2</div>\n<div class=\"section-title\">Paso 2: \ud83e\udd1d Similitudes ESP \u2194 ENG</div>\n<div class=\"section-desc\">Both languages use different words to express different strengths of obligation. The concept is the same \u2014 you just need to match the right word to the right level.</div>\n<table class=\"g-table\">\n  <tr><th>Grado</th><th>\ud83c\uddea\ud83c\uddf8 Espa\u00f1ol</th><th>\ud83c\uddec\ud83c\udde7 English</th></tr>\n  <tr><td>Obligaci\u00f3n fuerte</td><td>debes / tienes que</td><td><span class=\"g-comp\">must</span> / <span class=\"g-comp\">have to</span></td></tr>\n  <tr><td>Recomendaci\u00f3n</td><td>deber\u00edas</td><td><span class=\"g-quest\">should</span></td></tr>\n  <tr><td>Necesidad pr\u00e1ctica</td><td>necesitas</td><td><span class=\"g-quest\">need to</span></td></tr>\n  <tr><td>No necesario</td><td>no necesitas / no hace falta</td><td><span class=\"g-neg\">needn't</span> / <span class=\"g-neg\">don't need to</span></td></tr>\n  <tr><td>Prohibici\u00f3n</td><td>no debes / est\u00e1 prohibido</td><td><span class=\"g-neg\">mustn't</span></td></tr>\n</table>\n<div class=\"section-label\">Must vs Have to \u2014 \u00bfcu\u00e1l elegir?</div>\n<div class=\"must-haveto-compare\">\n  <div class=\"mhc-col mhc-must\">\n    <div class=\"mhc-header\">must</div>\n    <div class=\"mhc-sub\">Obligaci\u00f3n interna / fuerte \u00e9nfasis</div>\n    <div class=\"mhc-items\">\n      <div class=\"mhc-item\">Regla importante que YO impongo</div>\n      <div class=\"mhc-item\">\u00c9nfasis personal o urgencia</div>\n      <div class=\"mhc-item\">\"You <b>must</b> complete this today.\"</div>\n      <div class=\"mhc-item\">M\u00e1s formal y directo</div>\n    </div>\n  </div>\n  <div class=\"mhc-col mhc-haveto\">\n    <div class=\"mhc-header\">have to</div>\n    <div class=\"mhc-sub\">Obligaci\u00f3n externa / regla del sistema</div>\n    <div class=\"mhc-items\">\n      <div class=\"mhc-item\">Regla de la empresa / ley / sistema</div>\n      <div class=\"mhc-item\">El hablante no decide la regla</div>\n      <div class=\"mhc-item\">\"I <b>have to</b> follow the process.\"</div>\n      <div class=\"mhc-item\">M\u00e1s conversacional</div>\n    </div>\n  </div>\n</div>\n<div class=\"tip-card\"><strong>\ud83d\udca1 Truco r\u00e1pido:</strong> \"I <b>must</b> call them\" = yo decido que es importante. \"I <b>have to</b> call them\" = hay una raz\u00f3n externa por la que debo llamar (pol\u00edtica, procedimiento, etc.)</div>"}, {"icon": "\u26a1", "title": "Diferencias", "html": "<div class=\"section-label\">Paso 3</div>\n<div class=\"section-title\">Paso 3: \u26a1 Diferencias Importantes</div>\n<table class=\"g-table\">\n  <tr><th>Modal</th><th>Ejemplo</th><th>\ud83d\udca1 Significado</th></tr>\n  <tr><td><span class=\"g-comp\">must</span></td><td>You must submit the form.</td><td>Obligaci\u00f3n fuerte \u2014 sin opci\u00f3n</td></tr>\n  <tr><td><span class=\"g-comp\">have to</span></td><td>I have to follow the policy.</td><td>Regla externa \u2014 no es mi decisi\u00f3n</td></tr>\n  <tr><td><span class=\"g-quest\">should</span></td><td>You should call them today.</td><td>Recomendaci\u00f3n \u2014 consejo \u00fatil</td></tr>\n  <tr><td><span class=\"g-quest\">need to</span></td><td>You need to provide your ID.</td><td>Necesidad pr\u00e1ctica \u2014 es necesario</td></tr>\n  <tr><td><span class=\"g-neg\">needn't</span></td><td>You needn't call again.</td><td>No es necesario \u2014 pero puedes</td></tr>\n  <tr><td><span class=\"g-neg\">mustn't</span></td><td>You mustn't share this data.</td><td>Prohibici\u00f3n absoluta \u2014 no est\u00e1 permitido</td></tr>\n</table>\n<div class=\"alert-card\">\n  <div class=\"atitle\">\u26a0\ufe0f La trampa m\u00e1s importante: needn't vs mustn't</div>\n  <div class=\"neednt-mustnt\">\n    <div class=\"nm-item nm-neednt\">\n      <div class=\"nm-modal\">needn't / don't need to</div>\n      <div class=\"nm-meaning\">NO es necesario \u2014 pero PUEDES si quieres</div>\n      <div class=\"nm-ex\">\"You <b>needn't</b> call \u2014 you can email instead.\"</div>\n      <div class=\"nm-es\">No necesitas llamar \u2014 puedes enviar un email.</div>\n      <div class=\"nm-tag\">\u2705 Opcional</div>\n    </div>\n    <div class=\"nm-item nm-mustnt\">\n      <div class=\"nm-modal\">mustn't</div>\n      <div class=\"nm-meaning\">Est\u00e1 PROHIBIDO \u2014 no puedes hacerlo</div>\n      <div class=\"nm-ex\">\"You <b>mustn't</b> share your login details.\"</div>\n      <div class=\"nm-es\">No debes compartir tus datos de acceso.</div>\n      <div class=\"nm-tag\">\ud83d\udeab Prohibido</div>\n    </div>\n  </div>\n</div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\ud83d\udccb</div><div><div class=\"en\">You <span class=\"g-comp\">must</span> submit the complaint form within 30 days.</div><div class=\"es\">Debes enviar el formulario de queja en un plazo de 30 d\u00edas. (obligatorio)</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\ud83d\udca1</div><div><div class=\"en\">You <span class=\"g-quest\">should</span> keep a copy of all correspondence.</div><div class=\"es\">Deber\u00edas guardar una copia de toda la correspondencia. (recomendado)</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\u2705</div><div><div class=\"en\">You <span class=\"g-neg\">needn't</span> come in person \u2014 we can handle it online.</div><div class=\"es\">No necesitas venir en persona \u2014 podemos gestionarlo online. (no necesario)</div></div></div>"}, {"icon": "\ud83d\udca1", "title": "Consejos", "html": "<div class=\"section-label\">Paso 4</div>\n<div class=\"section-title\">Paso 4: \ud83d\udca1 Consejos Pr\u00e1cticos</div>\n<div class=\"tip-card\"><strong>Tip 1 \u2014 Elige el grado correcto:</strong> Antes de hablar, preg\u00fantate: \u00bfes obligatorio, recomendado, opcional o prohibido? Usa must/have to para obligatorio, should para recomendado, needn't para opcional, mustn't para prohibido.</div>\n<div class=\"tip-card\"><strong>Tip 2 \u2014 Should en atenci\u00f3n al cliente:</strong> Should es tu mejor amigo en servicios. \"You <b>should</b> contact your bank\" suena profesional y \u00fatil sin imponer. Es el tono perfecto para dar consejos sin sonar autoritario.</div>\n<div class=\"tip-card\"><strong>Tip 3 \u2014 Need to para procesos:</strong> Need to es ideal para explicar pasos necesarios de un proceso: \"You <b>need to</b> verify your identity, then <b>need to</b> fill in the form, and then <b>need to</b> submit it online.\" Claro y pr\u00e1ctico.</div>\n<div class=\"tip-card\"><strong>Tip 4 \u2014 Cuidado con mustn't:</strong> Mustn't es fuerte \u2014 implica consecuencias serias. \u00dasalo para prohibiciones reales: \"You <b>mustn't</b> share your PIN.\" Para cosas simplemente no necesarias, usa <b>needn't</b>: \"You <b>needn't</b> bring all the documents.\"</div>\n<div class=\"section-label\">Gu\u00eda pr\u00e1ctica \u2014 \u00bfcu\u00e1l modal uso?</div>\n<div class=\"modal-choice-guide\">\n  <div class=\"mcg-row mcg-header\">\n    <div class=\"mcg-q\">Situaci\u00f3n</div>\n    <div class=\"mcg-m\">Modal</div>\n    <div class=\"mcg-ex\">Ejemplo</div>\n  </div>\n  <div class=\"mcg-row mcg-must\">\n    <div class=\"mcg-q\">Regla importante, sin opci\u00f3n</div>\n    <div class=\"mcg-m\">must / have to</div>\n    <div class=\"mcg-ex\">You must sign the form.</div>\n  </div>\n  <div class=\"mcg-row mcg-should\">\n    <div class=\"mcg-q\">Consejo \u00fatil, buena idea</div>\n    <div class=\"mcg-m\">should</div>\n    <div class=\"mcg-ex\">You should keep the receipt.</div>\n  </div>\n  <div class=\"mcg-row mcg-need\">\n    <div class=\"mcg-q\">Paso necesario del proceso</div>\n    <div class=\"mcg-m\">need to</div>\n    <div class=\"mcg-ex\">You need to verify your ID.</div>\n  </div>\n  <div class=\"mcg-row mcg-neednt\">\n    <div class=\"mcg-q\">No es necesario, opcional</div>\n    <div class=\"mcg-m\">needn't / don't need to</div>\n    <div class=\"mcg-ex\">You needn't call us again.</div>\n  </div>\n  <div class=\"mcg-row mcg-mustnt\">\n    <div class=\"mcg-q\">Prohibici\u00f3n, consecuencias</div>\n    <div class=\"mcg-m\">mustn't</div>\n    <div class=\"mcg-ex\">You mustn't share your PIN.</div>\n  </div>\n</div>"}, {"icon": "\u2728", "title": "Pr\u00e1ctica Final", "html": "<div class=\"section-label\">Paso 5</div>\n<div class=\"section-title\">Paso 5: \u2728 Pr\u00e1ctica Final</div>\n<div class=\"formula-box\">\n  <span class=\"g-comp\">must / have to</span> \u2192 obligatorio (sin opci\u00f3n) \u26a0\ufe0f<br>\n  <span class=\"g-quest\">should / need to</span> \u2192 recomendado / necesario \ud83d\udca1<br>\n  <span class=\"g-neg\">needn't</span> \u2192 no necesario (puedes si quieres) \u2705<br>\n  <span class=\"g-neg\">mustn't</span> \u2192 prohibido (consecuencias) \ud83d\udeab\n</div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\ud83d\udccb</div><div><div class=\"en\">All customers <span class=\"g-comp\">must</span> complete the verification process before accessing their accounts.</div><div class=\"es\">Todos los clientes deben completar el proceso de verificaci\u00f3n antes de acceder a sus cuentas.</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\ud83d\udca1</div><div><div class=\"en\">You <span class=\"g-quest\">should</span> keep your reference number \u2014 you may need it later.</div><div class=\"es\">Deber\u00edas guardar tu n\u00famero de referencia \u2014 puede que lo necesites m\u00e1s tarde.</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\u2705</div><div><div class=\"en\">You <span class=\"g-neg\">needn't</span> visit us in person \u2014 everything can be done online.</div><div class=\"es\">No necesitas visitarnos en persona \u2014 todo puede hacerse online.</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\ud83d\udeab</div><div><div class=\"en\">You <span class=\"g-neg\">mustn't</span> share your account password with anyone, including our staff.</div><div class=\"es\">No debes compartir tu contrase\u00f1a con nadie, incluido nuestro personal.</div></div></div>\n<div class=\"ex-row ex-wrong\"><div class=\"icon\">\u274c</div><div><div class=\"en\">You mustn't bring all the documents \u2014 just one is fine.</div><div class=\"es\">Error: mustn't = prohibido. Si no es necesario pero puedes \u2192 needn't / don't need to</div></div></div>\n<div class=\"alert-card\">\n  <div class=\"atitle\">\u26a0\ufe0f 3 Errores Comunes</div>\n  <p>\u274c \"You <b>mustn't</b> bring all the docs\" (si no es prohibido, solo opcional) \u2192 \u2705 \"You <b>needn't</b> bring all the docs\"<br>\n  \u274c \"You <b>should</b> submit the form by law\" (ley = obligaci\u00f3n) \u2192 \u2705 \"You <b>must / have to</b> submit the form\"<br>\n  \u274c \"I <b>must</b> follow their rules\" (regla externa) \u2192 \u2705 \"I <b>have to</b> follow their rules\" (pol\u00edtica de empresa)</p>\n</div>"}];
var EXERCISES = [[{"q": "\"You ___ fill in this form.\" \u2014 Regla obligatoria del sistema.", "a": "a", "o": ["must / have to", "should"], "fc": "Must / have to = obligaci\u00f3n fuerte. El cliente no tiene opci\u00f3n \u2014 es una regla.", "fi": "Should = recomendaci\u00f3n. Para obligaciones reales se usa must o have to.", "ex": "You must fill in this form before proceeding. (obligatorio)", "tip": "Obligaci\u00f3n sin opci\u00f3n \u2192 must / have to"}, {"q": "\"You ___ contact support \u2014 they can help you faster.\" \u2014 Consejo \u00fatil.", "a": "b", "o": ["must", "should"], "fc": "Should = recomendaci\u00f3n. El agente da un consejo \u00fatil, no una obligaci\u00f3n.", "fi": "Must implica que no hay opci\u00f3n. Aqu\u00ed es un consejo \u2192 should.", "ex": "You should contact the billing department directly.", "tip": "Consejo / recomendaci\u00f3n \u2192 should"}, {"q": "\"You ___ come in person \u2014 we can process it online.\" \u2014 No es necesario.", "a": "b", "o": ["mustn't", "needn't"], "fc": "Needn't = no es necesario pero puedes si quieres. No hay prohibici\u00f3n aqu\u00ed.", "fi": "Mustn't = prohibido absolutamente. Aqu\u00ed no est\u00e1 prohibido, simplemente no hace falta.", "ex": "You needn't come in person \u2014 we can handle it online.", "tip": "No necesario (pero puedes) \u2192 needn't / don't need to"}, {"q": "\"You ___ share your account details with anyone.\" \u2014 Regla de seguridad.", "a": "a", "o": ["mustn't", "needn't"], "fc": "Mustn't = prohibici\u00f3n absoluta. Compartir datos de cuenta est\u00e1 totalmente prohibido.", "fi": "Needn't = no necesario. Compartir datos de cuenta no es solo 'innecesario' \u2014 est\u00e1 prohibido.", "ex": "You mustn't share your account details \u2014 security policy.", "tip": "Prohibici\u00f3n real con consecuencias \u2192 mustn't"}, {"q": "\"I ___ follow the company's refund policy.\" \u2014 Regla externa de la empresa.", "a": "b", "o": ["must", "have to"], "fc": "Have to = obligaci\u00f3n externa. El agente no invent\u00f3 la pol\u00edtica \u2014 viene de la empresa.", "fi": "Must = obligaci\u00f3n interna/personal. Have to es m\u00e1s natural para reglas externas.", "ex": "I have to follow the company's refund policy. (regla externa)", "tip": "Regla externa (empresa/ley) \u2192 have to"}], [{"q": "\"You ___ verify your identity before we can proceed.\" \u2014 Paso necesario del proceso.", "a": "b", "o": ["should", "need to"], "fc": "Need to = necesidad pr\u00e1ctica. Es un paso necesario del proceso, no solo un consejo.", "fi": "Should = recomendaci\u00f3n. Aqu\u00ed no es opcional \u2014 es un requisito del proceso \u2192 need to.", "ex": "You need to verify your identity to access your account.", "tip": "Paso necesario del proceso \u2192 need to"}, {"q": "Diferencia clave entre must y have to:", "a": "a", "o": ["Must = obligaci\u00f3n interna/\u00e9nfasis \u00b7 Have to = obligaci\u00f3n externa/regla", "Son exactamente sin\u00f3nimos, sin diferencia"], "fc": "Must = yo decido que es importante. Have to = la obligaci\u00f3n viene de fuera (empresa, ley, sistema).", "fi": "Hay una diferencia sutil pero importante. Must = personal/\u00e9nfasis. Have to = externo.", "ex": "I must call them today! (yo decido) / I have to call by law. (obligaci\u00f3n externa)", "tip": "must = interno/\u00e9nfasis \u00b7 have to = externo/regla"}, {"q": "\"You ___ wait for our response \u2014 we'll email you automatically.\" \u2014 No es necesario.", "a": "a", "o": ["don't need to", "mustn't"], "fc": "Don't need to = no es necesario esperar. Equivalente a needn't.", "fi": "Mustn't = prohibici\u00f3n. Esperar no est\u00e1 prohibido \u2014 simplemente no es necesario.", "ex": "You don't need to wait \u2014 we'll contact you within 24 hours.", "tip": "don't need to = needn't = no es necesario (sin prohibici\u00f3n)"}, {"q": "Should expresa:", "a": "b", "o": ["Obligaci\u00f3n fuerte \u2014 sin opci\u00f3n", "Recomendaci\u00f3n \u2014 consejo \u00fatil (~70%)"], "fc": "Should = consejo o recomendaci\u00f3n. El hablante cree que es buena idea, pero no hay obligaci\u00f3n.", "fi": "Obligaci\u00f3n fuerte sin opci\u00f3n es must o have to. Should es m\u00e1s suave.", "ex": "You should keep a copy of your complaint. (consejo)", "tip": "should = recomendaci\u00f3n, no obligaci\u00f3n"}, {"q": "\"All visitors ___ sign in at reception.\" \u2014 Regla de seguridad del edificio.", "a": "b", "o": ["should", "must"], "fc": "Must = obligaci\u00f3n fuerte. Es una regla del edificio \u2014 todos deben cumplirla sin opci\u00f3n.", "fi": "Should = solo recomendaci\u00f3n. Una regla de seguridad del edificio es obligatoria \u2192 must.", "ex": "All visitors must sign in at reception. (obligaci\u00f3n fuerte)", "tip": "Regla sin excepci\u00f3n \u2192 must"}], [{"q": "\"You ___ bring your passport \u2014 a driving licence is enough.\" \u00bfCu\u00e1l es correcto?", "a": "b", "o": ["mustn't bring", "needn't bring"], "fc": "Needn't bring = no es necesario traer el pasaporte, pero puedes si quieres. No est\u00e1 prohibido.", "fi": "Mustn't bring = est\u00e1 prohibido traer el pasaporte \u2014 incorrecto. Solo no es necesario.", "ex": "You needn't bring your passport \u2014 a driving licence will do.", "tip": "No necesario (puedes si quieres) \u2192 needn't, NOT mustn't"}, {"q": "Un agente da un consejo a un cliente dif\u00edcil. \u00bfCu\u00e1l tono es m\u00e1s apropiado?", "a": "b", "o": ["You must contact your bank immediately.", "You should contact your bank to resolve this faster."], "fc": "Should = consejo profesional y cort\u00e9s. Menos confrontacional y m\u00e1s \u00fatil para el cliente.", "fi": "Must en un consejo suena autoritario. Should da la misma informaci\u00f3n con mejor tono.", "ex": "You should contact your bank \u2014 they can help resolve this faster.", "tip": "Consejo a clientes \u2192 should (profesional y cort\u00e9s)"}, {"q": "\"Employees ___ access customer data without authorization.\" \u2014 Pol\u00edtica de privacidad.", "a": "a", "o": ["mustn't", "needn't"], "fc": "Mustn't = prohibici\u00f3n absoluta. Acceder a datos sin autorizaci\u00f3n est\u00e1 totalmente prohibido.", "fi": "Needn't = no necesario. Pero aqu\u00ed no se trata de necesidad \u2014 est\u00e1 prohibido \u2192 mustn't.", "ex": "Employees mustn't access customer data without authorization.", "tip": "Prohibici\u00f3n con consecuencias serias \u2192 mustn't"}, {"q": "\"You ___ send the form \u2014 it was already processed.\" \u2014 Ya est\u00e1 hecho.", "a": "b", "o": ["mustn't send", "don't need to send"], "fc": "Don't need to send = no es necesario enviarlo porque ya est\u00e1 procesado. Opcional.", "fi": "Mustn't send = est\u00e1 prohibido enviarlo \u2014 incorrecto. Solo no hace falta.", "ex": "You don't need to send the form \u2014 we already received it.", "tip": "Ya hecho / no necesario (sin prohibici\u00f3n) \u2192 don't need to / needn't"}, {"q": "\"I ___ submit this report by 5pm \u2014 it's the company deadline.\" \u00bfCu\u00e1l suena m\u00e1s natural?", "a": "b", "o": ["must", "have to"], "fc": "Have to = obligaci\u00f3n externa. La fecha l\u00edmite viene de la empresa, no es decisi\u00f3n personal.", "fi": "Must = \u00e9nfasis personal. Para plazos de empresa, have to suena m\u00e1s natural.", "ex": "I have to submit the report by 5pm \u2014 company deadline.", "tip": "Plazo/regla de empresa \u2192 have to (m\u00e1s natural que must)"}], [{"q": "El agente explica los pasos del proceso: \"First, you ___ verify your email. Then you ___ create a password.\"", "a": "a", "o": ["need to / need to", "should / should"], "fc": "Need to = necesidad pr\u00e1ctica para pasos del proceso. Son pasos necesarios, no solo recomendaciones.", "fi": "Should = consejo. Pasos obligatorios del proceso requieren need to.", "ex": "First, you need to verify your email. Then you need to create a password.", "tip": "Pasos necesarios del proceso \u2192 need to"}, {"q": "Un nuevo empleado pregunta: \u00bfPuedo saltarme el formulario de inc mendaci\u00f3n cort\u00e9s.", "fi": "Must = obligatorio. Una encuesta de satisfacci\u00f3n voluntaria nunca debe presentarse como obligatoria.", "ex": "You should complete the satisfaction survey \u2014 it helps us improve.", "tip": "Invitaci\u00f3n voluntaria / recomendaci\u00f3n \u2192 should o petici\u00f3n cort\u00e9s"}, {"q": "Elige la oraci\u00f3n completamente correcta:", "a": "b", "o": ["You mustn't bring all your documents \u2014 just one is fine.", "You needn't bring all your documents \u2014 just one is fine."], "fc": "Needn't = no es necesario traer todos los documentos. No est\u00e1 prohibido \u2014 solo no hace falta.", "fi": "Mustn't = prohibido traer todos los documentos \u2014 incorrecto. Solo no es necesario.", "ex": "You needn't bring all the documents \u2014 just your ID is enough.", "tip": "No necesario (sin prohibici\u00f3n) \u2192 needn't \u00b7 Prohibido \u2192 mustn't"}]];
var SUMMARY = ["<b>must</b> \u2192 obligaci\u00f3n fuerte interna (yo decido): You must fill in this form \u2014 regla importante", "<b>have to</b> \u2192 obligaci\u00f3n externa (regla del sistema/empresa): I have to submit it by Friday", "<b>should</b> \u2192 consejo/recomendaci\u00f3n (~70%): You should contact support \u2014 te lo recomiendo", "<b>need to</b> \u2192 necesidad pr\u00e1ctica: You need to provide your ID \u2014 es necesario para el proceso", "<b>needn't / don't need to</b> \u2192 no es necesario (pero puedes si quieres): You needn't call again", "<b>mustn't</b> \u2192 prohibici\u00f3n absoluta: You mustn't share your password \u2014 est\u00e1 completamente prohibido", "<b>El espectro:</b> must = obligatorio \u00b7 should = recomendado \u00b7 needn't = opcional \u00b7 mustn't = prohibido"];
var curStep = 0;
var scores = {};
var answered = {};

function renderStepTabs() {
    var c = document.getElementById("stepTabs");
    c.innerHTML = "";
    STEPS.forEach(function(s, i) {
        var k = "s" + i;
        var allDone = [0,1,2,3,4].every(function(j){ return answered[k+"e"+j]; });
        var b = document.createElement("button");
        b.className = "step-tab" + (i === curStep ? " active" : "") + (allDone && i !== curStep ? " done" : "");
        b.textContent = (i + 1) + ". " + s.icon + " " + s.title;
        b.addEventListener("click", (function(idx){ return function(){
            curStep = idx;
            renderStepTabs();
            renderCard();
            document.getElementById("summaryFinal").classList.remove("show");
        };})(i));
        c.appendChild(b);
    });
}

function renderCard() {
    var s = STEPS[curStep];
    var exs = EXERCISES[curStep];
    var k = "s" + curStep;
    if (scores[k] === undefined) scores[k] = 0;
    var h = "<div class=\"card\">" + s.html;
    h += "<div class=\"ex-section\"><h3>&#x270F;&#xFE0F; Exercises &mdash; " + s.title + "</h3>";
    exs.forEach(function(e, i) {
        var eid = k + "e" + i;
        var longOpts = e.o[0].length > 44 || e.o[1].length > 44;
        var gs = longOpts ? " style=\"grid-template-columns:1fr\"" : "";
        h += "<div class=\"exercise\" id=\"" + eid + "\">";
        h += "<div class=\"exercise-q\">" + (i+1) + ". " + e.q + "</div>";
        h += "<div class=\"opts\"" + gs + ">";
        h += "<button class=\"opt-btn\" id=\"" + eid + "ba\">a) " + e.o[0] + "</button>";
        h += "<button class=\"opt-btn\" id=\"" + eid + "bb\">b) " + e.o[1] + "</button>";
        h += "</div>";
        var ct = e.a === "a" ? e.o[0] : e.o[1];
        h += "<div class=\"fb fb-ok\" id=\"fbok-" + eid + "\">";
        h += "<div class=\"fb-header\"><span class=\"fb-icon\">&#x1F389;</span> Correct!</div>";
        h += "<div class=\"fb-body\">";
        h += "<div class=\"fb-row\"><span class=\"fb-dot\">&#x2705;</span><div class=\"fb-text\"><span class=\"fb-correct-answer\">" + ct + "</span> &mdash; " + e.fc + "</div></div>";
        h += "<div class=\"fb-row\"><span class=\"fb-dot\">&#x1F4A1;</span><div class=\"fb-text\">The other option: " + e.fi + "</div></div>";
        if (e.ex) h += "<div class=\"fb-example\">&#x1F4DD; " + e.ex + "</div>";
        if (e.tip) h += "<div class=\"fb-tip\"><strong>&#x1F4A1; Remember:</strong> " + e.tip + "</div>";
        h += "</div></div>";
        h += "<div class=\"fb fb-bad\" id=\"fbbad-" + eid + "\">";
        h += "<div class=\"fb-header\"><span class=\"fb-icon\">&#x1F615;</span> Not quite right</div>";
        h += "<div class=\"fb-body\">";
        h += "<div class=\"fb-row\"><span class=\"fb-dot\">&#x274C;</span><div class=\"fb-text\"><span class=\"fb-wrong-reason\">" + e.fi + "</span></div></div>";
        h += "<div class=\"fb-row\"><span class=\"fb-dot\">&#x2705;</span><div class=\"fb-text\">The correct answer is <span class=\"fb-correct-answer\">" + ct + "</span> &mdash; " + e.fc + "</div></div>";
        if (e.ex) h += "<div class=\"fb-example\">&#x1F4DD; " + e.ex + "</div>";
        if (e.tip) h += "<div class=\"fb-tip\"><strong>&#x1F4A1; Remember:</strong> " + e.tip + "</div>";
        h += "</div></div></div>";
    });
    h += "<div class=\"score-bar\"><div class=\"num\" id=\"sc-" + k + "\">0/5</div><div class=\"lbl\">Score</div></div>";
    h += "</div></div>";
    document.getElementById("cardArea").innerHTML = h;
    exs.forEach(function(e, i) {
        var eid = k + "e" + i;
        document.getElementById(eid + "ba").addEventListener("click", (function(id){ return function(){ chk(id,"a"); }; })(eid));
        document.getElementById(eid + "bb").addEventListener("click", (function(id){ return function(){ chk(id,"b"); }; })(eid));
    });
}

function chk(eid, sel) {
    if (answered[eid]) return;
    answered[eid] = true;
    var parts = eid.match(/s(\d+)e(\d+)/);
    var si = parseInt(parts[1]);
    var ei = parseInt(parts[2]);
    var e = EXERCISES[si][ei];
    var k = "s" + si;
    var ex = document.getElementById(eid);
    var btnA = document.getElementById(eid + "ba");
    var btnB = document.getElementById(eid + "bb");
    btnA.disabled = true;
    btnB.disabled = true;
    if (sel === e.a) {
        ex.classList.add("correct");
        (sel === "a" ? btnA : btnB).classList.add("sel-ok");
        document.getElementById("fbok-" + eid).classList.add("show");
        scores[k]++;
    } else {
        ex.classList.add("incorrect");
        (sel === "a" ? btnA : btnB).classList.add("sel-bad");
        (e.a === "a" ? btnA : btnB).classList.add("show-ok");
        document.getElementById("fbbad-" + eid).classList.add("show");
    }
    document.getElementById("sc-" + k).textContent = scores[k] + "/5";
    var allDone = [0,1,2,3,4].every(function(i){ return answered[k + "e" + i]; });
    if (allDone && curStep === 4) {
        setTimeout(function() {
            var sf = document.getElementById("summaryFinal");
            document.getElementById("summaryList").innerHTML = SUMMARY.map(function(s){ return "<li>" + s + "</li>"; }).join("");
            sf.classList.add("show");
            sf.scrollIntoView({behavior:"smooth"});
        }, 600);
    }
}

renderStepTabs();
renderCard();
</script>
