<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grammar Summary — a few / a little | A2 | JUCUM</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Fredoka:wght@400;500;600;700&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
:root{
--bg:#FAFAF6;--card:#fff;--text:#2A2A2A;--text-soft:#777;--border:#E8E5DC;
--shadow:0 3px 16px rgba(0,0,0,.06);--radius:14px;
--lp:#4CAF50;--ld:#1B5E20;--ll:#E8F5E9;--lm:#C8E6C9;
--lg:linear-gradient(135deg,#388E3C,#4CAF50);--lglow:rgba(76,175,80,.15);
--badge-text:#1A3D1C;
--subj:#1565C0;--subj-bg:#E3F2FD;
--verb:#E53935;--verb-bg:#FFEBEE;
--comp:#00897B;--comp-bg:#E0F2F1;
--neg:#AD1457;--neg-bg:#FCE4EC;
--quest:#7B1FA2;--quest-bg:#F3E5F5;
--ok:#2E7D32;--ok-bg:#E8F5E9;
--err:#C62828;--err-bg:#FFEBEE;
--note-bg:#F1F8E9;--note-border:#AED581;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Nunito",sans-serif;background:var(--bg);color:var(--text);line-height:1.7;padding:1.5rem 1rem;-webkit-font-smoothing:antialiased}
.container{max-width:800px;margin:0 auto}
.level-header{text-align:center;padding:2rem;border-radius:20px;color:#fff;position:relative;overflow:hidden;margin-bottom:1.2rem;background:var(--lg)}
.level-header::before{content:"";position:absolute;top:-40%;right:-15%;width:250px;height:250px;background:rgba(255,255,255,.1);border-radius:50%}
.level-header h1{font-family:"Fredoka",sans-serif;font-size:1.8rem;font-weight:600;position:relative;z-index:1}
.level-header .module-name{font-family:"Fredoka",sans-serif;font-size:1.05rem;opacity:.95;position:relative;z-index:1;margin-top:.2rem}
.level-header .subtitle{opacity:.8;font-size:.83rem;position:relative;z-index:1;margin-top:.15rem}
.level-badge{display:inline-flex;align-items:center;gap:6px;font-size:.7rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;background:var(--ll);color:var(--badge-text);padding:4px 12px;border-radius:20px;border:1.5px solid var(--lm);margin-bottom:.8rem}
.step-tabs{display:flex;gap:.35rem;margin-bottom:1rem;flex-wrap:wrap}
.step-tab{padding:.45rem .85rem;border-radius:8px;font-size:.78rem;font-weight:700;cursor:pointer;border:2px solid var(--border);background:var(--card);transition:.2s;font-family:"Nunito",sans-serif}
.step-tab:hover{background:var(--ll)}
.step-tab.active{background:var(--ll);border-color:var(--lp);color:var(--ld)}
.step-tab.done{background:var(--ok-bg);border-color:var(--ok);color:var(--ok)}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.6rem;margin-bottom:1.2rem;box-shadow:var(--shadow);border-top:3.5px solid var(--lp);animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.section-label{display:flex;align-items:center;gap:.5rem;font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--ld);margin-bottom:.3rem;margin-top:1.1rem}
.section-label::before{content:"";width:20px;height:3px;background:var(--lp);border-radius:2px}
.section-label:first-child{margin-top:0}
.section-title{font-family:"Fredoka",sans-serif;font-size:1.25rem;font-weight:600;margin-bottom:.1rem}
.section-desc{font-size:.85rem;color:var(--text-soft);margin-bottom:1rem}
.g-subj{background:var(--subj-bg);color:var(--subj);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--subj)}
.g-verb{background:var(--verb-bg);color:var(--verb);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--verb)}
.g-comp{background:var(--comp-bg);color:var(--comp);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--comp)}
.g-neg{background:var(--neg-bg);color:var(--neg);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--neg)}
.g-quest{background:var(--quest-bg);color:var(--quest);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--quest)}
.g-table{width:100%;border-collapse:separate;border-spacing:0;margin:.8rem 0;border-radius:10px;overflow:hidden;font-size:.83rem;border:1px solid var(--border)}
.g-table th{background:var(--lg);color:#fff;padding:.65rem .6rem;font-size:.7rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
.g-table td{padding:.6rem;border-bottom:1px solid #f0f0f0;vertical-align:middle}
.g-table tr:nth-child(even) td{background:var(--ll)}
.g-table tr:last-child td{border-bottom:none}
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin:.8rem 0}
.compare-card{padding:1rem;border-radius:12px;text-align:center}
.compare-card.esp{background:var(--ll);border:2px solid var(--lm)}
.compare-card.eng{background:var(--subj-bg);border:2px solid #90CAF9}
.compare-card h4{font-family:"Fredoka",sans-serif;font-size:.85rem;margin-bottom:.5rem}
.compare-card.esp h4{color:var(--ld)}
.compare-card.eng h4{color:var(--subj)}
.compare-card ul{list-style:none;font-size:.82rem;color:var(--text-soft)}
.compare-card li{padding:3px 0}
.formula-box{background:var(--note-bg);border:2px solid var(--note-border);border-radius:12px;padding:1rem;margin:.8rem 0;text-align:center;font-family:"Fredoka",sans-serif;font-size:.93rem;color:var(--ld);line-height:2.2}
.tip-card{background:var(--ll);border-radius:10px;padding:.8rem 1rem;margin:.5rem 0;font-size:.83rem;border-left:3px solid var(--lp)}
.tip-card strong{color:var(--ld)}
.alert-card{background:var(--err-bg);border:2px solid #EF5350;border-radius:10px;padding:.8rem 1rem;margin:.8rem 0}
.alert-card .atitle{font-family:"Fredoka",sans-serif;color:var(--err);font-size:.82rem;margin-bottom:.3rem;font-weight:700}
.alert-card p{font-size:.82rem;color:#555;line-height:1.7}
.ex-row{display:flex;align-items:flex-start;gap:.6rem;padding:.6rem .8rem;border-radius:10px;margin:.4rem 0;font-size:.88rem}
.ex-row .icon{font-size:1.2rem;flex-shrink:0;margin-top:2px}
.ex-row .en{font-weight:700;color:var(--text)}
.ex-row .es{font-family:"Lora",serif;font-style:italic;font-size:.82rem;color:var(--text-soft);margin-top:1px}
.ex-right{border-left:3px solid var(--ok);background:var(--ok-bg)}
.ex-wrong{border-left:3px solid var(--err);background:var(--err-bg)}

/* A MAKES THE DIFFERENCE */
.a-makes-diff{margin:1rem 0}
.amd-row{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
.amd-with{background:var(--ok-bg);border:2px solid #A5D6A7;border-radius:12px;padding:.9rem}
.amd-without{background:#FFF8E1;border:2px solid #FFD54F;border-radius:12px;padding:.9rem}
.amd-label{font-family:"Fredoka",sans-serif;font-size:.8rem;font-weight:600;margin-bottom:.6rem;padding-bottom:.4rem;border-bottom:1px dashed rgba(0,0,0,.1)}
.amd-with .amd-label{color:var(--ok)}
.amd-without .amd-label{color:#E65100}
.amd-pair{display:flex;align-items:center;gap:.5rem;margin:.35rem 0}
.amd-word{font-family:"Fredoka",sans-serif;font-size:1.1rem;font-weight:600;padding:.2rem .7rem;border-radius:8px;min-width:70px;text-align:center}
.amd-word.pos{background:var(--ok);color:#fff}
.amd-word.neg{background:#F57F17;color:#fff}
.amd-meaning{font-size:.77rem;color:var(--text-soft)}
/* PAIRING VISUAL */
.pairing-visual{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin:.9rem 0}
.pv-left,.pv-right{border-radius:12px;overflow:hidden;border:2px solid var(--border)}
.pv-left{border-color:#90CAF9}
.pv-right{border-color:#EF9A9A}
.pv-header{padding:.55rem .8rem;font-family:"Fredoka",sans-serif;font-size:.8rem;font-weight:600}
.cnt-h{background:var(--subj-bg);color:var(--subj)}
.unc-h{background:var(--verb-bg);color:var(--err)}
.pv-examples{padding:.5rem .8rem}
.pv-ex{font-size:.8rem;padding:3px 0;color:var(--text-soft)}
.pos-w{color:var(--ok);font-weight:700}
.neg-w{color:#E65100;font-weight:700}
.neg-ex{color:#E65100}
/* CONTRAST PAIRS */
.contrast-pairs{display:flex;flex-direction:column;gap:.6rem;margin-top:.6rem}
.cp-pair{border-radius:10px;overflow:hidden}
.cp-pos-row{background:var(--ok-bg);padding:.5rem .8rem;font-size:.82rem;border-bottom:1px solid rgba(0,0,0,.05)}
.cp-neg-row{background:#FFF8E1;padding:.5rem .8rem;font-size:.82rem}
.cp-badge{display:inline-block;font-size:.68rem;font-weight:800;padding:1px 7px;border-radius:10px;margin-right:.4rem}
.pos-b{background:var(--ok);color:#fff}
.neg-b{background:#F57F17;color:#fff}
/* POS NEG GUIDE */
.pos-neg-guide{border-radius:12px;overflow:hidden;border:1px solid var(--border);margin:1rem 0}
.png-row{display:grid;grid-template-columns:1.2fr 1.3fr 1.3fr 1fr;border-bottom:1px solid #f0f0f0}
.png-row:last-child{border-bottom:none}
.png-header{background:var(--lg);color:#fff}
.png-header .png-cell{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em}
.png-cell{padding:.55rem .6rem;font-size:.81rem;display:flex;align-items:center}
.png-label{font-weight:700;font-size:.78rem;flex-direction:column;align-items:flex-start}
.png-label small{font-weight:400;color:var(--text-soft)}
.png-pos{background:var(--ok-bg)}
.png-pos .png-cell{color:var(--ok)}
.png-neg{background:#FFF8E1}
.png-neg .png-cell{color:#E65100}
.png-meaning{font-style:italic;font-size:.77rem;flex-direction:column;align-items:flex-start}
@media(max-width:600px){
.amd-row,.pairing-visual{grid-template-columns:1fr}
.png-row{grid-template-columns:1fr 1fr}
.png-meaning{display:none}
}

.ex-section{margin-top:1.2rem;padding-top:1rem;border-top:2px dashed var(--lm)}
.ex-section h3{font-family:"Fredoka",sans-serif;color:var(--ld);font-size:.9rem;margin-bottom:.8rem}
.exercise{background:#fafafa;border-radius:12px;padding:1rem;margin-bottom:.7rem;border:2px solid #eee;transition:.2s}
.exercise.correct{border-color:var(--ok);background:var(--ok-bg)}
.exercise.incorrect{border-color:var(--err);background:var(--err-bg)}
.exercise-q{font-size:.88rem;margin-bottom:.7rem;line-height:1.4}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:.4rem}
.opt-btn{padding:.65rem .5rem;border:2px solid #e0e0e0;border-radius:10px;background:var(--card);color:var(--text-soft);font-size:.83rem;font-weight:600;cursor:pointer;transition:.15s;font-family:"Nunito",sans-serif;text-align:left}
.opt-btn:hover:not(:disabled){border-color:var(--lp);background:var(--ll)}
.opt-btn:disabled{cursor:not-allowed;opacity:.7}
.opt-btn.sel-ok{background:var(--ok);color:#fff;border-color:var(--ok)}
.opt-btn.sel-bad{background:var(--err);color:#fff;border-color:var(--err)}
.opt-btn.show-ok{background:var(--ok);color:#fff;border-color:var(--ok)}
.fb{margin-top:.7rem;padding:0;border-radius:12px;font-size:.82rem;display:none;line-height:1.6;overflow:hidden}
.fb.show{display:block;animation:fbSlide .35s ease}
@keyframes fbSlide{from{opacity:0;max-height:0;transform:translateY(-8px)}to{opacity:1;max-height:600px;transform:translateY(0)}}
.fb-header{display:flex;align-items:center;gap:.5rem;padding:.7rem 1rem;font-family:"Fredoka",sans-serif;font-size:.85rem;font-weight:600}
.fb.fb-ok .fb-header{background:#C8E6C9;color:var(--ok)}
.fb.fb-bad .fb-header{background:#FFCDD2;color:var(--err)}
.fb-icon{font-size:1.2rem}
.fb-body{padding:.8rem 1rem}
.fb.fb-ok .fb-body{background:var(--ok-bg)}
.fb.fb-bad .fb-body{background:var(--err-bg)}
.fb-row{display:flex;align-items:flex-start;gap:.5rem;margin-bottom:.4rem}
.fb-row:last-child{margin-bottom:0}
.fb-dot{font-size:.9rem;flex-shrink:0;margin-top:1px}
.fb-text{flex:1}
.fb-correct-answer{color:var(--ok);font-weight:700}
.fb-wrong-reason{color:var(--err);font-weight:600}
.fb-example{display:inline-flex;align-items:center;gap:.3rem;margin-top:.4rem;padding:4px 10px;border-radius:6px;font-size:.78rem;font-weight:700}
.fb.fb-ok .fb-example{background:#A5D6A7;color:#1B5E20}
.fb.fb-bad .fb-example{background:#EF9A9A;color:#B71C1C}
.fb-tip{margin-top:.5rem;padding:.5rem .7rem;border-radius:8px;background:var(--note-bg);border:1px solid var(--note-border);font-size:.76rem;color:#33691E}
.fb-tip strong{color:var(--ld)}
.score-bar{text-align:center;padding:.8rem;background:var(--ll);border-radius:10px;margin-top:.8rem;border:1px solid var(--lm)}
.score-bar .num{font-family:"Fredoka",sans-serif;font-size:1.4rem;color:var(--ld)}
.score-bar .lbl{font-size:.7rem;color:var(--lp);font-weight:700;text-transform:uppercase;letter-spacing:1px}
.summary-final{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.6rem;margin-top:1rem;box-shadow:var(--shadow);border-top:3.5px solid var(--ok);display:none}
.summary-final.show{display:block;animation:fadeIn .4s ease}
.summary-final h3{font-family:"Fredoka",sans-serif;color:var(--ok);margin-bottom:.8rem;font-size:1.1rem}
.summary-final ul{list-style:none}
.summary-final li{padding:5px 0 5px 22px;position:relative;font-size:.84rem;color:var(--text-soft);border-bottom:1px solid var(--lm)}
.summary-final li:last-child{border-bottom:none}
.summary-final li:before{content:"\2713";position:absolute;left:0;color:var(--lp);font-weight:700}
@media(max-width:600px){
.level-header h1{font-size:1.4rem}
.compare-grid{grid-template-columns:1fr}
.card{padding:1.2rem}
.opts{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="container">
<div class="level-header">
  <div class="level-badge">&#x1F49A; A2 &middot; Grammar Summary</div>
  <h1>&#x1F4DD; Grammar Summary</h1>
  <div class="module-name">&#x1F6CE;&#xFE0F; Services, Support &amp; Problem Solving</div>
  <p class="subtitle">Quantifiers: a few / a little (few / little) &middot; 5 steps &times; 5 exercises</p>
</div>
<div class="step-tabs" id="stepTabs"></div>
<div id="cardArea"></div>
<div class="summary-final" id="summaryFinal">
  <h3>&#x1F393; Key Points &mdash; a few / a little</h3>
  <ul id="summaryList"></ul>
</div>
</div>
<script>
var STEPS = [{"icon": "\ud83c\uddea\ud83c\uddf8", "title": "Repaso en Espa\u00f1ol", "html": "<div class=\"section-label\">Paso 1</div>\n<div class=\"section-title\">Paso 1: \ud83c\uddea\ud83c\uddf8 Repaso en Espa\u00f1ol</div>\n<div class=\"section-desc\">En espa\u00f1ol \"poco/a/os/as\" puede ser positivo o negativo seg\u00fan el contexto. En ingl\u00e9s la peque\u00f1a letra \"a\" cambia completamente el significado.</div>\n<div class=\"compare-grid\">\n  <div class=\"compare-card esp\">\n    <h4>\ud83c\uddea\ud83c\uddf8 Espa\u00f1ol \u2014 ambiguo</h4>\n    <ul>\n      <li>Hay <b>pocas</b> quejas. <em>(\u00bfbueno o malo?)</em></li>\n      <li>Tengo <b>poco</b> tiempo. <em>(\u00bfbueno o malo?)</em></li>\n      <li>Hay <b>algunos</b> problemas.</li>\n      <li>Hay <b>un poco de</b> ayuda.</li>\n    </ul>\n  </div>\n  <div class=\"compare-card eng\">\n    <h4>\ud83c\uddec\ud83c\udde7 English \u2014 preciso</h4>\n    <ul>\n      <li><b>A few</b> complaints. \u2705 <em>(algunas)</em></li>\n      <li><b>A little</b> time. \u2705 <em>(un poco, hay)</em></li>\n      <li><b>Few</b> options. \u26a0\ufe0f <em>(casi ninguna)</em></li>\n      <li><b>Little</b> support. \u26a0\ufe0f <em>(casi nada)</em></li>\n    </ul>\n  </div>\n</div>\n<div class=\"tip-card\"><strong>\ud83d\udca1 La diferencia clave:</strong> En espa\u00f1ol \"poco/pocas\" es neutro. En ingl\u00e9s la letra <b>\"a\"</b> es la que cambia todo: con \"a\" = positivo (hay algo) \u00b7 sin \"a\" = negativo (casi nada).</div>\n<div class=\"a-makes-diff\">\n  <div class=\"amd-row\">\n    <div class=\"amd-with\">\n      <div class=\"amd-label\">Con \"a\" \u2192 \u2705 positivo</div>\n      <div class=\"amd-pair\">\n        <div class=\"amd-word pos\">a few</div>\n        <div class=\"amd-meaning\">= algunos \u00b7 hay algunos</div>\n      </div>\n      <div class=\"amd-pair\">\n        <div class=\"amd-word pos\">a little</div>\n        <div class=\"amd-meaning\">= un poco \u00b7 hay algo</div>\n      </div>\n    </div>\n    <div class=\"amd-without\">\n      <div class=\"amd-label\">Sin \"a\" \u2192 \u26a0\ufe0f negativo</div>\n      <div class=\"amd-pair\">\n        <div class=\"amd-word neg\">few</div>\n        <div class=\"amd-meaning\">= apenas ninguno \u00b7 casi nada</div>\n      </div>\n      <div class=\"amd-pair\">\n        <div class=\"amd-word neg\">little</div>\n        <div class=\"amd-meaning\">= muy poco \u00b7 preocupante</div>\n      </div>\n    </div>\n  </div>\n</div>"}, {"icon": "\ud83e\udd1d", "title": "Similitudes", "html": "<div class=\"section-label\">Paso 2</div>\n<div class=\"section-title\">Paso 2: \ud83e\udd1d Similitudes ESP \u2194 ENG</div>\n<div class=\"section-desc\">Both languages express \"small quantity\" \u2014 English just adds a positive/negative distinction with the article \"a\".</div>\n<table class=\"g-table\">\n  <tr><th>Similitud</th><th>\ud83c\uddea\ud83c\uddf8 Espa\u00f1ol</th><th>\ud83c\uddec\ud83c\udde7 English</th></tr>\n  <tr><td>Peque\u00f1a cantidad (contable)</td><td>algunas / pocas quejas</td><td><span class=\"g-comp\">a few</span> / <span class=\"g-neg\">few</span> complaints</td></tr>\n  <tr><td>Peque\u00f1a cantidad (incontable)</td><td>un poco / poco tiempo</td><td><span class=\"g-comp\">a little</span> / <span class=\"g-neg\">little</span> time</td></tr>\n  <tr><td>Posici\u00f3n en la oraci\u00f3n</td><td>pocas + sustantivo</td><td>a few/few + noun</td></tr>\n  <tr><td>Respuesta corta</td><td>Algunas. / Un poco.</td><td>A few. / A little.</td></tr>\n  <tr><td>Con \"of\" para especificar</td><td>algunos de los formularios</td><td>a few <b>of the</b> forms</td></tr>\n</table>\n<div class=\"section-label\">\u00bfCu\u00e1l va con cu\u00e1l?</div>\n<div class=\"pairing-visual\">\n  <div class=\"pv-left\">\n    <div class=\"pv-header cnt-h\">\ud83d\udd22 Contable (plural)</div>\n    <div class=\"pv-examples\">\n      <div class=\"pv-ex\">a <span class=\"pv-few pos-w\">few</span> complaints</div>\n      <div class=\"pv-ex\">a <span class=\"pv-few pos-w\">few</span> forms</div>\n      <div class=\"pv-ex\">a <span class=\"pv-few pos-w\">few</span> appointments</div>\n      <div class=\"pv-ex neg-ex\"><span class=\"pv-few neg-w\">few</span> options \u26a0\ufe0f</div>\n      <div class=\"pv-ex neg-ex\"><span class=\"pv-few neg-w\">few</span> agents available \u26a0\ufe0f</div>\n    </div>\n  </div>\n  <div class=\"pv-right\">\n    <div class=\"pv-header unc-h\">\ud83d\udca7 Incontable (singular)</div>\n    <div class=\"pv-examples\">\n      <div class=\"pv-ex\">a <span class=\"pv-few pos-w\">little</span> time</div>\n      <div class=\"pv-ex\">a <span class=\"pv-few pos-w\">little</span> help</div>\n      <div class=\"pv-ex\">a <span class=\"pv-few pos-w\">little</span> information</div>\n      <div class=\"pv-ex neg-ex\"><span class=\"pv-few neg-w\">little</span> support \u26a0\ufe0f</div>\n      <div class=\"pv-ex neg-ex\"><span class=\"pv-few neg-w\">little</span> time left \u26a0\ufe0f</div>\n    </div>\n  </div>\n</div>\n<div class=\"tip-card\"><strong>\ud83d\udca1 Regla base:</strong> <b>a few</b> = a few complaints (contable plural) \u00b7 <b>a little</b> = a little help (incontable). Igual que many/much pero para cantidades peque\u00f1as.</div>"}, {"icon": "\u26a1", "title": "Diferencias", "html": "<div class=\"section-label\">Paso 3</div>\n<div class=\"section-title\">Paso 3: \u26a1 Diferencias Importantes</div>\n<table class=\"g-table\">\n  <tr><th>\ud83c\uddea\ud83c\uddf8 Espa\u00f1ol</th><th>\ud83c\uddec\ud83c\udde7 Ingl\u00e9s</th><th>\ud83d\udca1 Significado</th></tr>\n  <tr><td>Hay algunas quejas.</td><td>There are <span class=\"g-comp\">a few</span> complaints.</td><td>Positivo: hay algunas, no es problema</td></tr>\n  <tr><td>Hay pocas opciones. \u26a0\ufe0f</td><td>There are <span class=\"g-neg\">few</span> options.</td><td>Negativo: casi ninguna, preocupante</td></tr>\n  <tr><td>Tengo un poco de tiempo.</td><td>I have <span class=\"g-comp\">a little</span> time.</td><td>Positivo: algo de tiempo, suficiente</td></tr>\n  <tr><td>Hay poco apoyo. \u26a0\ufe0f</td><td>There is <span class=\"g-neg\">little</span> support.</td><td>Negativo: casi nada, insuficiente</td></tr>\n  <tr><td>Solo unos pocos de ellos.</td><td>Only <span class=\"g-neg\">a few</span> <b>of them</b>.</td><td>a few of + the/pronombre</td></tr>\n</table>\n<div class=\"alert-card\">\n  <div class=\"atitle\">\u26a0\ufe0f El art\u00edculo \"a\" cambia el mensaje completamente</div>\n  <p>Dos oraciones casi id\u00e9nticas, mensajes opuestos:</p>\n  <div class=\"contrast-pairs\">\n    <div class=\"cp-pair\">\n      <div class=\"cp-pos-row\"><span class=\"cp-badge pos-b\">\u2705 positivo</span> We have <b>a few</b> options. <em>= Tenemos algunas opciones. (bien)</em></div>\n      <div class=\"cp-neg-row\"><span class=\"cp-badge neg-b\">\u26a0\ufe0f negativo</span> We have <b>few</b> options. <em>= Tenemos pocas opciones. (preocupante)</em></div>\n    </div>\n    <div class=\"cp-pair\">\n      <div class=\"cp-pos-row\"><span class=\"cp-badge pos-b\">\u2705 positivo</span> There is <b>a little</b> time left. <em>= Queda un poco de tiempo. (suficiente)</em></div>\n      <div class=\"cp-neg-row\"><span class=\"cp-badge neg-b\">\u26a0\ufe0f negativo</span> There is <b>little</b> time left. <em>= Queda muy poco tiempo. (urgente)</em></div>\n    </div>\n  </div>\n</div>\n<div class=\"section-label\">Con \"of\" \u2014 para grupos espec\u00edficos</div>\n<table class=\"g-table\">\n  <tr><th>Sin \"of\" (general)</th><th>Con \"of\" (espec\u00edfico)</th></tr>\n  <tr><td>a few <b>complaints</b> (algunas quejas en general)</td><td>a few <b>of the</b> complaints (algunas de las quejas espec\u00edficas)</td></tr>\n  <tr><td>a little <b>help</b> (un poco de ayuda en general)</td><td>a little <b>of the</b> help offered (un poco de la ayuda ofrecida)</td></tr>\n  <tr><td>few <b>agents</b> (pocos agentes)</td><td>few <b>of the</b> agents (pocos de los agentes)</td></tr>\n</table>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\ud83d\udccb</div><div><div class=\"en\">I received <span class=\"g-comp\">a few</span> complaints this morning \u2014 nothing serious.</div><div class=\"es\">Recib\u00ed algunas quejas esta ma\u00f1ana \u2014 nada grave. (positivo, manejable)</div></div></div>\n<div class=\"ex-row ex-wrong\"><div class=\"icon\">\u26a0\ufe0f</div><div><div class=\"en\">We have <span class=\"g-neg\">few</span> options left \u2014 this is serious.</div><div class=\"es\">Nos quedan pocas opciones \u2014 esto es grave. (negativo, alarmante)</div></div></div>"}, {"icon": "\ud83d\udca1", "title": "Consejos", "html": "<div class=\"section-label\">Paso 4</div>\n<div class=\"section-title\">Paso 4: \ud83d\udca1 Consejos Pr\u00e1cticos</div>\n<div class=\"tip-card\"><strong>Tip 1 \u2014 El truco del \"a\":</strong> Cuando veas <b>a few / a little</b> piensa en \"some\" \u2014 hay algo, es positivo. Cuando veas <b>few / little</b> (sin \"a\") piensa en \"hardly any\" \u2014 casi nada, es negativo o preocupante.</div>\n<div class=\"tip-card\"><strong>Tip 2 \u2014 few vs a few en el trabajo:</strong> En atenci\u00f3n al cliente la diferencia importa: <em>\"There are <b>a few</b> options available\"</em> (hay opciones, tranquilizador) vs <em>\"There are <b>few</b> options available\"</em> (casi no hay opciones, preocupante). \u00a1Una palabra cambia el tono!</div>\n<div class=\"tip-card\"><strong>Tip 3 \u2014 a little of vs a little:</strong> <b>a little help</b> (ayuda en general) \u00b7 <b>a little of the help</b> (parte de esa ayuda espec\u00edfica). Usa \"of the\" cuando te refieres a algo concreto ya mencionado.</div>\n<div class=\"tip-card\"><strong>Tip 4 \u2014 Solo como sustantivo:</strong> Puedes usar \"a few\" y \"a little\" solos como respuesta: \"How many complaints?\" \u2192 \"<b>A few.</b>\" / \"How much time?\" \u2192 \"<b>A little.</b>\"</div>\n<div class=\"section-label\">Gu\u00eda r\u00e1pida: positivo vs negativo</div>\n<div class=\"pos-neg-guide\">\n  <div class=\"png-row png-header\">\n    <div class=\"png-cell\"></div>\n    <div class=\"png-cell\">Contable (plural)</div>\n    <div class=\"png-cell\">Incontable (singular)</div>\n    <div class=\"png-cell\">Significado</div>\n  </div>\n  <div class=\"png-row png-pos\">\n    <div class=\"png-cell png-label\">\u2705 Positivo<br><small>hay algo</small></div>\n    <div class=\"png-cell\"><b>a few</b> complaints</div>\n    <div class=\"png-cell\"><b>a little</b> time</div>\n    <div class=\"png-cell png-meaning\">\u2248 some<br>es suficiente</div>\n  </div>\n  <div class=\"png-row png-neg\">\n    <div class=\"png-cell png-label\">\u26a0\ufe0f Negativo<br><small>casi nada</small></div>\n    <div class=\"png-cell\"><b>few</b> options</div>\n    <div class=\"png-cell\"><b>little</b> support</div>\n    <div class=\"png-cell png-meaning\">\u2248 hardly any<br>preocupante</div>\n  </div>\n</div>"}, {"icon": "\u2728", "title": "Pr\u00e1ctica Final", "html": "<div class=\"section-label\">Paso 5</div>\n<div class=\"section-title\">Paso 5: \u2728 Pr\u00e1ctica Final</div>\n<div class=\"formula-box\">\n  <span class=\"g-comp\">a few</span> + countable plural \u2192 positivo (= some) \u2705<br>\n  <span class=\"g-comp\">a little</span> + uncountable \u2192 positivo (= some) \u2705<br>\n  <span class=\"g-neg\">few</span> + countable plural \u2192 negativo (= hardly any) \u26a0\ufe0f<br>\n  <span class=\"g-neg\">little</span> + uncountable \u2192 negativo (= hardly any) \u26a0\ufe0f\n</div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\ud83d\udccb</div><div><div class=\"en\">We have <span class=\"g-comp\">a few</span> <span class=\"g-comp\">appointments</span> available this afternoon.</div><div class=\"es\">Tenemos algunas citas disponibles esta tarde. (positivo)</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\u23f1\ufe0f</div><div><div class=\"en\">Give me <span class=\"g-comp\">a little</span> <span class=\"g-comp\">time</span> to look into your complaint.</div><div class=\"es\">Dame un poco de tiempo para investigar tu queja. (positivo)</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\u26a0\ufe0f</div><div><div class=\"en\">There is <span class=\"g-neg\">little</span> <span class=\"g-comp\">information</span> available about this case.</div><div class=\"es\">Hay muy poca informaci\u00f3n disponible sobre este caso. (negativo)</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\u26a0\ufe0f</div><div><div class=\"en\"><span class=\"g-neg\">Few</span> <span class=\"g-comp\">agents</span> are trained to handle this type of complaint.</div><div class=\"es\">Pocos agentes est\u00e1n capacitados para manejar este tipo de queja. (negativo)</div></div></div>\n<div class=\"ex-row ex-wrong\"><div class=\"icon\">\u274c</div><div><div class=\"en\">I need a little advices before I proceed.</div><div class=\"es\">Error doble: advice es incontable (sin plural) + a little advice (sin 's')</div></div></div>\n<div class=\"alert-card\">\n  <div class=\"atitle\">\u26a0\ufe0f 3 Errores Comunes</div>\n  <p>\u274c \"I have <b>a little</b> complaints\" \u2192 \u2705 \"I have <b>a few</b> complaints\" (contable \u2192 a few)<br>\n  \u274c \"There is <b>a few</b> information\" \u2192 \u2705 \"There is <b>a little</b> information\" (incontable \u2192 a little)<br>\n  \u274c \"Few time is left\" \u2192 \u2705 \"<b>Little</b> time is left\" (incontable \u2192 little, not few)</p>\n</div>"}];
var EXERCISES = [[{"q": "\"A few complaints\" significa:", "a": "a", "o": ["Algunas quejas (positivo \u2014 hay algunas)", "Pocas quejas (negativo \u2014 casi ninguna)"], "fc": "A few = positivo. Hay algunas quejas, no es preocupante.", "fi": "Sin 'a': few complaints = casi ninguna (negativo). Con 'a': hay algunas.", "ex": "We received a few complaints \u2014 nothing serious.", "tip": "a few = positivo \u2248 some / a few = hay algunas"}, {"q": "\"Little support\" (sin \"a\") significa:", "a": "b", "o": ["Un poco de apoyo (hay algo)", "Muy poco apoyo (casi nada \u2014 preocupante)"], "fc": "Little sin 'a' = negativo. Casi no hay apoyo. Es una se\u00f1al de alerta.", "fi": "A little support = hay algo de apoyo (positivo). Little = casi nada (negativo).", "ex": "There is little support available \u2014 we need more resources.", "tip": "little (sin a) = negativo \u2248 hardly any"}, {"q": "\u00bfCu\u00e1l expresa algo positivo?", "a": "a", "o": ["a little time", "little time"], "fc": "A little time = hay un poco de tiempo, suficiente. Positivo.", "fi": "Little time (sin a) = queda muy poco tiempo. Negativo, urgente.", "ex": "We have a little time to discuss this. (positivo)", "tip": "Con 'a' \u2192 positivo \u00b7 Sin 'a' \u2192 negativo"}, {"q": "\"A few\" se usa con:", "a": "b", "o": ["Sustantivos incontables", "Sustantivos contables en plural"], "fc": "A few + contable plural: a few complaints, a few forms, a few agents.", "fi": "Incontable \u2192 a little: a little time, a little help. A few no funciona con incontables.", "ex": "a few complaints / a few appointments / a few forms", "tip": "a few = contable plural \u00b7 a little = incontable"}, {"q": "\"A little\" se usa con:", "a": "a", "o": ["Sustantivos incontables", "Sustantivos contables en plural"], "fc": "A little + incontable: a little time, a little help, a little information.", "fi": "Contable plural \u2192 a few: a few complaints, a few forms.", "ex": "a little time / a little help / a little advice", "tip": "a little = incontable \u00b7 a few = contable plural"}], [{"q": "\"A few\" es similar en significado a:", "a": "b", "o": ["Hardly any (casi ninguno)", "Some (algunos)"], "fc": "A few \u2248 some. Positivo: hay algunos. 'I have a few options' = 'I have some options'.", "fi": "Hardly any es el equivalente de 'few' sin 'a' (negativo).", "ex": "a few options \u2248 some options (positivo)", "tip": "a few \u2248 some (positivo) \u00b7 few \u2248 hardly any (negativo)"}, {"q": "\"Few options\" (sin \"a\") es similar a:", "a": "a", "o": ["Hardly any options", "Some options"], "fc": "Few (sin a) \u2248 hardly any. Negativo: casi no hay opciones.", "fi": "Some / a few son positivos. Few sin 'a' es negativo.", "ex": "few options \u2248 hardly any options (negativo, preocupante)", "tip": "few (sin a) \u2248 hardly any \u2014 negativo"}, {"q": "How many complaints? \u2192 respuesta corta:", "a": "b", "o": ["A little.", "A few."], "fc": "Complaints es contable \u2192 A few. Se puede usar solo como respuesta.", "fi": "A little es para incontables: How much time? \u2014 A little.", "ex": "How many complaints? \u2014 A few. (= some, not many)", "tip": "A few = respuesta para contables / A little = para incontables"}, {"q": "\"A few of the forms\" \u2014 \u00bfqu\u00e9 implica \"of the\"?", "a": "a", "o": ["Habla de formas espec\u00edficas ya mencionadas", "Es un error \u2014 sobra el 'of the'"], "fc": "A few of the forms = algunas de esas formas espec\u00edficas (ya conocidas). 'Of the' hace referencia espec\u00edfica.", "fi": "Of the no es un error. Se usa cuando el sustantivo es espec\u00edfico o ya fue mencionado.", "ex": "a few forms (en general) / a few of the forms we discussed (espec\u00edfico)", "tip": "a few + noun (general) \u00b7 a few of the + noun (espec\u00edfico)"}, {"q": "\"A little help\" equivale en espa\u00f1ol a:", "a": "b", "o": ["Poca ayuda (casi nada)", "Un poco de ayuda (hay algo)"], "fc": "A little = hay un poco, positivo. 'Un poco de ayuda' implica que algo de ayuda est\u00e1 disponible.", "fi": "Poca ayuda (casi nada) ser\u00eda 'little help' sin 'a' \u2014 negativo.", "ex": "I need a little help with this. (positivo, hay algo de ayuda)", "tip": "a little = un poco de (hay) \u00b7 little = muy poco (casi nada)"}], [{"q": "Elige la opci\u00f3n que transmite tranquilidad al cliente:", "a": "a", "o": ["There are a few options available.", "There are few options available."], "fc": "A few options = hay algunas opciones. Tranquilizador para el cliente.", "fi": "Few options (sin a) = casi no hay opciones. Preocupante, no tranquilizador.", "ex": "There are a few options available for you. (positivo)", "tip": "a few = tranquilizador \u00b7 few = alarmante"}, {"q": "\"We have little time to resolve this\" implica:", "a": "b", "o": ["Hay suficiente tiempo", "Urgencia \u2014 queda muy poco tiempo"], "fc": "Little time (sin a) = urgencia. Casi no queda tiempo. Negativo.", "fi": "A little time = hay algo de tiempo. Little time = urgente, casi nada.", "ex": "Little time left \u2014 we need to act now! (urgente)", "tip": "little (sin a) = urgente \u00b7 a little = hay algo de tiempo"}, {"q": "\"Only a few of the agents are available\" significa:", "a": "a", "o": ["Algunos de los agentes (de un grupo espec\u00edfico) est\u00e1n disponibles", "Todos los agentes est\u00e1n disponibles"], "fc": "A few of the agents = algunos de esos agentes espec\u00edficos. Positivo pero limitado.", "fi": "Todos los agentes ser\u00eda 'all the agents' o 'all agents'.", "ex": "A few of the agents are trained for this. (algunos de ellos)", "tip": "a few of the + noun = algunos de (grupo espec\u00edfico)"}, {"q": "\"There is a little information about your case\" \u2014 \u00bfqu\u00e9 tono tiene?", "a": "b", "o": ["Negativo \u2014 casi no hay informaci\u00f3n", "Positivo o neutro \u2014 hay algo de informaci\u00f3n"], "fc": "A little information = hay algo de informaci\u00f3n. Positivo. El caso tiene alguna informaci\u00f3n.", "fi": "Little information (sin a) ser\u00eda negativo: casi no hay informaci\u00f3n.", "ex": "There is a little information we can share with you.", "tip": "a little = hay algo (positivo) \u00b7 little = casi nada (negativo)"}, {"q": "La empresa tiene muy pocos recursos para este proyecto. \u00bfC\u00f3mo lo dices?", "a": "b", "o": ["We have a few resources for this project.", "We have few resources for this project."], "fc": "Few resources (sin a) = muy pocos, casi ninguno. Negativo, preocupante.", "fi": "A few resources = hay algunos recursos. Positivo \u2014 no expresa la escasez grave.", "ex": "We have few resources available. (negativo, preocupante)", "tip": "few (sin a) = negativo \u2248 hardly any"}], [{"q": "\"Give me a little time\" \u2014 el agente quiere decir:", "a": "a", "o": ["Dame un momento (hay tiempo, es manejable)", "El tiempo se acaba (urgencia)"], "fc": "A little time = dame un momento. Positivo, hay tiempo suficiente para buscar la soluci\u00f3n.", "fi": "Little time sin 'a' expresar\u00eda urgencia. A little time es una petici\u00f3n cort\u00e9s.", "ex": "Give me a little time to check your file. (cort\u00e9s, manejable)", "tip": "a little time = petici\u00f3n cort\u00e9s \u00b7 little time = urgencia"}, {"q": "\"Few customers complained this week\" implica:", "a": "b", "o": ["Muchos clientes se quejaron", "Casi ning\u00fan cliente se quej\u00f3 (buena se\u00f1al o preocupante seg\u00fan contexto)"], "fc": "Few customers = casi ning\u00fan cliente se quej\u00f3. Puede ser buena se\u00f1al (pocos problemas).", "fi": "Muchos clientes ser\u00eda 'many customers'. Few = casi ninguno.", "ex": "Few customers complained \u2014 the new system is working well.", "tip": "few + contable = casi ninguno (negativo o sorprendentemente positivo)"}, {"q": "How much help do you need? \u2192 respuesta cort\u00e9s:", "a": "b", "o": ["A few, please.", "A little, please."], "fc": "Help es incontable \u2192 A little. 'A little' es la respuesta para incontables.", "fi": "A few es para contables: How many forms? \u2014 A few.", "ex": "How much help? \u2014 Just a little, thank you.", "tip": "A little = respuesta para incontables \u00b7 A few = para contables"}, {"q": "\"A little of the information is missing\" \u2014 \u00bfqu\u00e9 significa \"of the\"?", "a": "a", "o": ["Parte de esa informaci\u00f3n espec\u00edfica ya mencionada falta", "Es un error \u2014 deber\u00eda ser 'a little information is missing'"], "fc": "A little of the information = parte de esa informaci\u00f3n espec\u00edfica (ya conocida). Of the = referencia espec\u00edfica.", "fi": "Ambas formas son correctas pero con matiz diferente: a little information (general) vs a little of the information (espec\u00edfica).", "ex": "A little of the information we received was incorrect.", "tip": "of the + noun = referencia a algo espec\u00edfico ya mencionado"}, {"q": "El gerente dice: \"We have ___ staff trained for this \u2014 it's a real problem.\"", "a": "b", "o": ["a few", "few"], "fc": "Few staff (sin a) = casi ning\u00fan empleado capacitado. Negativo, es un problema. Coherente con el contexto.", "fi": "A few staff = algunos empleados capacitados. Positivo, no un problema.", "ex": "We have few trained staff \u2014 this is a serious issue.", "tip": "Contexto negativo ('it's a problem') \u2192 few sin 'a'"}], [{"q": "There are ___ forms left to process. (algunas \u2014 positivo)", "a": "a", "o": ["a few", "few"], "fc": "A few forms = algunas formas. Positivo, hay formas, no es problema.", "fi": "Few forms (sin a) = casi ninguna forma. Negativo.", "ex": "There are a few forms left \u2014 we can finish soon.", "tip": "Positivo + contable \u2192 a few"}, {"q": "We have ___ time before the deadline. (muy poco \u2014 urgente)", "a": "b", "o": ["a little", "little"], "fc": "Little time (sin a) = urgencia. Muy poco tiempo. Negativo, preocupante.", "fi": "A little time = hay un poco de tiempo. Positivo, manejable.", "ex": "We have little time \u2014 please hurry! (urgente)", "tip": "Negativo + incontable \u2192 little (sin a)"}, {"q": "\"I need ___ help with this complaint form.\"", "a": "a", "o": ["a little", "a few"], "fc": "Help es incontable \u2192 a little help. Positivo: pido un poco de ayuda.", "fi": "A few es para contables: a few forms, a few questions.", "ex": "I need a little help filling out this form.", "tip": "Incontable \u2192 a little \u00b7 Contable \u2192 a few"}, {"q": "\"___ agents handled this type of case before \u2014 we need training.\"", "a": "b", "o": ["A few", "Few"], "fc": "Few agents (sin a) = casi ning\u00fan agente. Negativo, justifica la necesidad de entrenamiento.", "fi": "A few agents = algunos agentes (positivo). No justificar\u00eda decir que necesitamos entrenamiento urgente.", "ex": "Few agents have experience with this. We need to train more staff.", "tip": "Contexto negativo/problema \u2192 few (sin a)"}, {"q": "\"How much information do you have?\" \u2014 \"___\"", "a": "a", "o": ["A little. Let me check the system.", "A few. Let me check the system."], "fc": "Information es incontable \u2192 A little. Respuesta corta correcta.", "fi": "A few es respuesta para contables: How many complaints? \u2014 A few.", "ex": "How much information? \u2014 A little. / How many forms? \u2014 A few.", "tip": "A little = respuesta corta para incontables"}]];
var SUMMARY = ["<b>a few</b> \u2192 contables en plural, significado positivo: a few complaints = algunas quejas (hay, no muchas)", "<b>a little</b> \u2192 incontables, significado positivo: a little time = un poco de tiempo (hay, no mucho)", "<b>few</b> (sin 'a') \u2192 contables, significado negativo/preocupante: few options = pocas opciones (casi ninguna)", "<b>little</b> (sin 'a') \u2192 incontables, significado negativo: little support = poco apoyo (casi nada)", "<b>La 'a' hace la diferencia:</b> a few = algunos \u2705 positivo \u00b7 few = apenas ninguno \u26a0\ufe0f negativo", "<b>Posici\u00f3n:</b> a few / a little + noun: a few forms / a little help (nunca con art\u00edculo 'the')", "<b>Truco:</b> a few \u2248 some (positivo) \u00b7 few \u2248 hardly any (negativo)"];
var curStep = 0;
var scores = {};
var answered = {};

function renderStepTabs() {
    var c = document.getElementById("stepTabs");
    c.innerHTML = "";
    STEPS.forEach(function(s, i) {
        var k = "s" + i;
        var allDone = [0,1,2,3,4].every(function(j){ return answered[k+"e"+j]; });
        var b = document.createElement("button");
        b.className = "step-tab" + (i === curStep ? " active" : "") + (allDone && i !== curStep ? " done" : "");
        b.textContent = (i + 1) + ". " + s.icon + " " + s.title;
        b.addEventListener("click", (function(idx){ return function(){
            curStep = idx;
            renderStepTabs();
            renderCard();
            document.getElementById("summaryFinal").classList.remove("show");
        };})(i));
        c.appendChild(b);
    });
}

function renderCard() {
    var s = STEPS[curStep];
    var exs = EXERCISES[curStep];
    var k = "s" + curStep;
    if (scores[k] === undefined) scores[k] = 0;
    var h = "<div class=\"card\">" + s.html;
    h += "<div class=\"ex-section\"><h3>&#x270F;&#xFE0F; Exercises &mdash; " + s.title + "</h3>";
    exs.forEach(function(e, i) {
        var eid = k + "e" + i;
        var longOpts = e.o[0].length > 40 || e.o[1].length > 40;
        var gs = longOpts ? " style=\"grid-template-columns:1fr\"" : "";
        h += "<div class=\"exercise\" id=\"" + eid + "\">";
        h += "<div class=\"exercise-q\">" + (i+1) + ". " + e.q + "</div>";
        h += "<div class=\"opts\"" + gs + ">";
        h += "<button class=\"opt-btn\" id=\"" + eid + "ba\">a) " + e.o[0] + "</button>";
        h += "<button class=\"opt-btn\" id=\"" + eid + "bb\">b) " + e.o[1] + "</button>";
        h += "</div>";
        var ct = e.a === "a" ? e.o[0] : e.o[1];
        h += "<div class=\"fb fb-ok\" id=\"fbok-" + eid + "\">";
        h += "<div class=\"fb-header\"><span class=\"fb-icon\">&#x1F389;</span> Correct!</div>";
        h += "<div class=\"fb-body\">";
        h += "<div class=\"fb-row\"><span class=\"fb-dot\">&#x2705;</span><div class=\"fb-text\"><span class=\"fb-correct-answer\">" + ct + "</span> &mdash; " + e.fc + "</div></div>";
        h += "<div class=\"fb-row\"><span class=\"fb-dot\">&#x1F4A1;</span><div class=\"fb-text\">The other option: " + e.fi + "</div></div>";
        if (e.ex) h += "<div class=\"fb-example\">&#x1F4DD; " + e.ex + "</div>";
        if (e.tip) h += "<div class=\"fb-tip\"><strong>&#x1F4A1; Remember:</strong> " + e.tip + "</div>";
        h += "</div></div>";
        h += "<div class=\"fb fb-bad\" id=\"fbbad-" + eid + "\">";
        h += "<div class=\"fb-header\"><span class=\"fb-icon\">&#x1F615;</span> Not quite right</div>";
        h += "<div class=\"fb-body\">";
        h += "<div class=\"fb-row\"><span class=\"fb-dot\">&#x274C;</span><div class=\"fb-text\"><span class=\"fb-wrong-reason\">" + e.fi + "</span></div></div>";
        h += "<div class=\"fb-row\"><span class=\"fb-dot\">&#x2705;</span><div class=\"fb-text\">The correct answer is <span class=\"fb-correct-answer\">" + ct + "</span> &mdash; " + e.fc + "</div></div>";
        if (e.ex) h += "<div class=\"fb-example\">&#x1F4DD; " + e.ex + "</div>";
        if (e.tip) h += "<div class=\"fb-tip\"><strong>&#x1F4A1; Remember:</strong> " + e.tip + "</div>";
        h += "</div></div></div>";
    });
    h += "<div class=\"score-bar\"><div class=\"num\" id=\"sc-" + k + "\">0/5</div><div class=\"lbl\">Score</div></div>";
    h += "</div></div>";
    document.getElementById("cardArea").innerHTML = h;
    exs.forEach(function(e, i) {
        var eid = k + "e" + i;
        document.getElementById(eid + "ba").addEventListener("click", (function(id){ return function(){ chk(id,"a"); }; })(eid));
        document.getElementById(eid + "bb").addEventListener("click", (function(id){ return function(){ chk(id,"b"); }; })(eid));
    });
}

function chk(eid, sel) {
    if (answered[eid]) return;
    answered[eid] = true;
    var parts = eid.match(/s(\d+)e(\d+)/);
    var si = parseInt(parts[1]);
    var ei = parseInt(parts[2]);
    var e = EXERCISES[si][ei];
    var k = "s" + si;
    var ex = document.getElementById(eid);
    var btnA = document.getElementById(eid + "ba");
    var btnB = document.getElementById(eid + "bb");
    btnA.disabled = true;
    btnB.disabled = true;
    if (sel === e.a) {
        ex.classList.add("correct");
        (sel === "a" ? btnA : btnB).classList.add("sel-ok");
        document.getElementById("fbok-" + eid).classList.add("show");
        scores[k]++;
    } else {
        ex.classList.add("incorrect");
        (sel === "a" ? btnA : btnB).classList.add("sel-bad");
        (e.a === "a" ? btnA : btnB).classList.add("show-ok");
        document.getElementById("fbbad-" + eid).classList.add("show");
    }
    document.getElementById("sc-" + k).textContent = scores[k] + "/5";
    var allDone = [0,1,2,3,4].every(function(i){ return answered[k + "e" + i]; });
    if (allDone && curStep === 4) {
        setTimeout(function() {
            var sf = document.getElementById("summaryFinal");
            document.getElementById("summaryList").innerHTML = SUMMARY.map(function(s){ return "<li>" + s + "</li>"; }).join("");
            sf.classList.add("show");
            sf.scrollIntoView({behavior:"smooth"});
        }, 600);
    }
}

renderStepTabs();
renderCard();
</script>
</body>
</html>
