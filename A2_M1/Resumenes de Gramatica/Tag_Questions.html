<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grammar Summary — Tag Questions | A2 | JUCUM</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Fredoka:wght@400;500;600;700&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
:root{
--bg:#FAFAF6;--card:#fff;--text:#2A2A2A;--text-soft:#777;--border:#E8E5DC;
--shadow:0 3px 16px rgba(0,0,0,.06);--radius:14px;
--lp:#4CAF50;--ld:#1B5E20;--ll:#E8F5E9;--lm:#C8E6C9;
--lg:linear-gradient(135deg,#388E3C,#4CAF50);--lglow:rgba(76,175,80,.15);
--badge-text:#1A3D1C;
--subj:#1565C0;--subj-bg:#E3F2FD;
--verb:#E53935;--verb-bg:#FFEBEE;
--comp:#00897B;--comp-bg:#E0F2F1;
--neg:#AD1457;--neg-bg:#FCE4EC;
--quest:#7B1FA2;--quest-bg:#F3E5F5;
--ok:#2E7D32;--ok-bg:#E8F5E9;
--err:#C62828;--err-bg:#FFEBEE;
--note-bg:#F1F8E9;--note-border:#AED581;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Nunito",sans-serif;background:var(--bg);color:var(--text);line-height:1.7;padding:1.5rem 1rem;-webkit-font-smoothing:antialiased}
.container{max-width:800px;margin:0 auto}
.level-header{text-align:center;padding:2rem;border-radius:20px;color:#fff;position:relative;overflow:hidden;margin-bottom:1.2rem;background:var(--lg)}
.level-header::before{content:"";position:absolute;top:-40%;right:-15%;width:250px;height:250px;background:rgba(255,255,255,.1);border-radius:50%}
.level-header h1{font-family:"Fredoka",sans-serif;font-size:1.8rem;font-weight:600;position:relative;z-index:1}
.level-header .module-name{font-family:"Fredoka",sans-serif;font-size:1.05rem;opacity:.95;position:relative;z-index:1;margin-top:.2rem}
.level-header .subtitle{opacity:.8;font-size:.83rem;position:relative;z-index:1;margin-top:.15rem}
.level-badge{display:inline-flex;align-items:center;gap:6px;font-size:.7rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;background:var(--ll);color:var(--badge-text);padding:4px 12px;border-radius:20px;border:1.5px solid var(--lm);margin-bottom:.8rem}
.step-tabs{display:flex;gap:.35rem;margin-bottom:1rem;flex-wrap:wrap}
.step-tab{padding:.45rem .85rem;border-radius:8px;font-size:.78rem;font-weight:700;cursor:pointer;border:2px solid var(--border);background:var(--card);transition:.2s;font-family:"Nunito",sans-serif}
.step-tab:hover{background:var(--ll)}
.step-tab.active{background:var(--ll);border-color:var(--lp);color:var(--ld)}
.step-tab.done{background:var(--ok-bg);border-color:var(--ok);color:var(--ok)}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.6rem;margin-bottom:1.2rem;box-shadow:var(--shadow);border-top:3.5px solid var(--lp);animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.section-label{display:flex;align-items:center;gap:.5rem;font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--ld);margin-bottom:.3rem;margin-top:1.1rem}
.section-label::before{content:"";width:20px;height:3px;background:var(--lp);border-radius:2px}
.section-label:first-child{margin-top:0}
.section-title{font-family:"Fredoka",sans-serif;font-size:1.25rem;font-weight:600;margin-bottom:.1rem}
.section-desc{font-size:.85rem;color:var(--text-soft);margin-bottom:1rem}
.g-subj{background:var(--subj-bg);color:var(--subj);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--subj)}
.g-verb{background:var(--verb-bg);color:var(--verb);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--verb)}
.g-comp{background:var(--comp-bg);color:var(--comp);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--comp)}
.g-neg{background:var(--neg-bg);color:var(--neg);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--neg)}
.g-quest{background:var(--quest-bg);color:var(--quest);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--quest)}
.g-table{width:100%;border-collapse:separate;border-spacing:0;margin:.8rem 0;border-radius:10px;overflow:hidden;font-size:.83rem;border:1px solid var(--border)}
.g-table th{background:var(--lg);color:#fff;padding:.65rem .6rem;font-size:.7rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
.g-table td{padding:.6rem;border-bottom:1px solid #f0f0f0;vertical-align:middle}
.g-table tr:nth-child(even) td{background:var(--ll)}
.g-table tr:last-child td{border-bottom:none}
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin:.8rem 0}
.compare-card{padding:1rem;border-radius:12px;text-align:center}
.compare-card.esp{background:var(--ll);border:2px solid var(--lm)}
.compare-card.eng{background:var(--subj-bg);border:2px solid #90CAF9}
.compare-card h4{font-family:"Fredoka",sans-serif;font-size:.85rem;margin-bottom:.5rem}
.compare-card.esp h4{color:var(--ld)}
.compare-card.eng h4{color:var(--subj)}
.compare-card ul{list-style:none;font-size:.82rem;color:var(--text-soft)}
.compare-card li{padding:3px 0}
.formula-box{background:var(--note-bg);border:2px solid var(--note-border);border-radius:12px;padding:1rem;margin:.8rem 0;text-align:center;font-family:"Fredoka",sans-serif;font-size:.9rem;color:var(--ld);line-height:2.2}
.tip-card{background:var(--ll);border-radius:10px;padding:.8rem 1rem;margin:.5rem 0;font-size:.83rem;border-left:3px solid var(--lp)}
.tip-card strong{color:var(--ld)}
.alert-card{background:var(--err-bg);border:2px solid #EF5350;border-radius:10px;padding:.8rem 1rem;margin:.8rem 0}
.alert-card .atitle{font-family:"Fredoka",sans-serif;color:var(--err);font-size:.82rem;margin-bottom:.3rem;font-weight:700}
.alert-card p{font-size:.82rem;color:#555;line-height:1.7}
.ex-row{display:flex;align-items:flex-start;gap:.6rem;padding:.6rem .8rem;border-radius:10px;margin:.4rem 0;font-size:.88rem}
.ex-row .icon{font-size:1.2rem;flex-shrink:0;margin-top:2px}
.ex-row .en{font-weight:700;color:var(--text)}
.ex-row .es{font-family:"Lora",serif;font-style:italic;font-size:.82rem;color:var(--text-soft);margin-top:1px}
.ex-right{border-left:3px solid var(--ok);background:var(--ok-bg)}
.ex-wrong{border-left:3px solid var(--err);background:var(--err-bg)}

/* TAG ANATOMY */
.tag-anatomy{background:#F8F9FA;border-radius:14px;padding:1.2rem;margin:1rem 0;border:1px solid var(--border)}
.ta-title{font-family:"Fredoka",sans-serif;font-size:.82rem;font-weight:600;color:var(--text-soft);text-align:center;margin-bottom:.8rem;text-transform:uppercase;letter-spacing:.08em}
.ta-sentence{display:flex;align-items:center;justify-content:center;gap:.3rem;flex-wrap:wrap;font-size:1rem;font-weight:700;margin-bottom:.6rem}
.ta-main{background:var(--ok-bg);border:2px solid #A5D6A7;border-radius:8px;padding:.3rem .7rem;color:var(--ld)}
.ta-aux{color:var(--verb);font-weight:800}
.ta-comma{font-size:1.2rem;color:var(--text-soft)}
.ta-tag{background:var(--quest-bg);border:2px solid #CE93D8;border-radius:8px;padding:.3rem .7rem;color:var(--quest)}
.ta-aux-tag{font-weight:800}
.ta-pro{font-weight:800}
.ta-q{font-weight:800}
.ta-labels{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:.6rem;text-align:center}
.ta-label-main{font-size:.7rem;color:var(--ok);font-weight:700}
.ta-label-tag{font-size:.7rem;color:var(--quest);font-weight:700}
.ta-rules{display:flex;flex-wrap:wrap;gap:.4rem;justify-content:center}
.rule-badge{display:inline-block;font-size:.68rem;font-weight:800;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.06em}
.rb-aux{background:var(--verb-bg);color:var(--verb)}
.rb-opp{background:var(--quest-bg);color:var(--quest)}
.rb-pro{background:var(--ok-bg);color:var(--ok)}
.ta-rule{font-size:.75rem;color:var(--text-soft);display:flex;align-items:center;gap:.4rem}
/* AUX TAGS GRID */
.aux-tags-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin:.9rem 0}
.atg-item{border-radius:10px;padding:.7rem .8rem;background:#FAFAFA;border:1.5px solid var(--border)}
.atg-main{font-weight:700;font-size:.8rem;color:var(--subj);margin-bottom:.2rem}
.atg-tag{font-size:.78rem;color:var(--quest);font-weight:700;margin-bottom:.25rem}
.atg-ex{font-family:"Lora",serif;font-style:italic;font-size:.74rem;color:var(--text-soft)}
/* THREE TAG RULES */
.three-tag-rules{display:flex;flex-direction:column;gap:.5rem;margin-top:.6rem}
.ttr-item{display:flex;align-items:flex-start;gap:.7rem;background:#fff;border-radius:10px;padding:.7rem .9rem;border:1px solid var(--border)}
.ttr-num{font-family:"Fredoka",sans-serif;font-size:1.2rem;font-weight:700;color:#fff;background:var(--err);border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.ttr-title{font-weight:700;font-size:.82rem;color:var(--text);margin-bottom:.3rem}
.ttr-ex{font-size:.79rem;padding:2px 0}
.ok-ex{color:var(--ok)}
.bad-ex{color:var(--err)}
/* QUICK TAG GUIDE */
.quick-tag-guide{border-radius:12px;overflow:hidden;border:1px solid var(--border);margin:1rem 0}
.qtg-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;border-bottom:1px solid #f0f0f0;font-size:.78rem}
.qtg-row:last-child{border-bottom:none}
.qtg-header{background:var(--lg);color:#fff;font-weight:800;font-size:.7rem;text-transform:uppercase}
.qtg-header .qtg-cell{padding:.5rem .6rem}
.qtg-cell{padding:.45rem .6rem;display:flex;align-items:center}
.qtg-row:nth-child(even) .qtg-cell{background:#fafafa}
.tag-neg{color:var(--quest);font-weight:700}
.tag-pos{color:var(--ok);font-weight:700}
@media(max-width:600px){
.aux-tags-grid{grid-template-columns:1fr}
.qtg-row{grid-template-columns:1fr 1fr}
.ta-sentence{font-size:.88rem}
}

.ex-section{margin-top:1.2rem;padding-top:1rem;border-top:2px dashed var(--lm)}
.ex-section h3{font-family:"Fredoka",sans-serif;color:var(--ld);font-size:.9rem;margin-bottom:.8rem}
.exercise{background:#fafafa;border-radius:12px;padding:1rem;margin-bottom:.7rem;border:2px solid #eee;transition:.2s}
.exercise.correct{border-color:var(--ok);background:var(--ok-bg)}
.exercise.incorrect{border-color:var(--err);background:var(--err-bg)}
.exercise-q{font-size:.88rem;margin-bottom:.7rem;line-height:1.4}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:.4rem}
.opt-btn{padding:.65rem .5rem;border:2px solid #e0e0e0;border-radius:10px;background:var(--card);color:var(--text-soft);font-size:.83rem;font-weight:600;cursor:pointer;transition:.15s;font-family:"Nunito",sans-serif;text-align:left}
.opt-btn:hover:not(:disabled){border-color:var(--lp);background:var(--ll)}
.opt-btn:disabled{cursor:not-allowed;opacity:.7}
.opt-btn.sel-ok{background:var(--ok);color:#fff;border-color:var(--ok)}
.opt-btn.sel-bad{background:var(--err);color:#fff;border-color:var(--err)}
.opt-btn.show-ok{background:var(--ok);color:#fff;border-color:var(--ok)}
.fb{margin-top:.7rem;padding:0;border-radius:12px;font-size:.82rem;display:none;line-height:1.6;overflow:hidden}
.fb.show{display:block;animation:fbSlide .35s ease}
@keyframes fbSlide{from{opacity:0;max-height:0;transform:translateY(-8px)}to{opacity:1;max-height:600px;transform:translateY(0)}}
.fb-header{display:flex;align-items:center;gap:.5rem;padding:.7rem 1rem;font-family:"Fredoka",sans-serif;font-size:.85rem;font-weight:600}
.fb.fb-ok .fb-header{background:#C8E6C9;color:var(--ok)}
.fb.fb-bad .fb-header{background:#FFCDD2;color:var(--err)}
.fb-icon{font-size:1.2rem}
.fb-body{padding:.8rem 1rem}
.fb.fb-ok .fb-body{background:var(--ok-bg)}
.fb.fb-bad .fb-body{background:var(--err-bg)}
.fb-row{display:flex;align-items:flex-start;gap:.5rem;margin-bottom:.4rem}
.fb-row:last-child{margin-bottom:0}
.fb-dot{font-size:.9rem;flex-shrink:0;margin-top:1px}
.fb-text{flex:1}
.fb-correct-answer{color:var(--ok);font-weight:700}
.fb-wrong-reason{color:var(--err);font-weight:600}
.fb-example{display:inline-flex;align-items:center;gap:.3rem;margin-top:.4rem;padding:4px 10px;border-radius:6px;font-size:.78rem;font-weight:700}
.fb.fb-ok .fb-example{background:#A5D6A7;color:#1B5E20}
.fb.fb-bad .fb-example{background:#EF9A9A;color:#B71C1C}
.fb-tip{margin-top:.5rem;padding:.5rem .7rem;border-radius:8px;background:var(--note-bg);border:1px solid var(--note-border);font-size:.76rem;color:#33691E}
.fb-tip strong{color:var(--ld)}
.score-bar{text-align:center;padding:.8rem;background:var(--ll);border-radius:10px;margin-top:.8rem;border:1px solid var(--lm)}
.score-bar .num{font-family:"Fredoka",sans-serif;font-size:1.4rem;color:var(--ld)}
.score-bar .lbl{font-size:.7rem;color:var(--lp);font-weight:700;text-transform:uppercase;letter-spacing:1px}
.summary-final{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.6rem;margin-top:1rem;box-shadow:var(--shadow);border-top:3.5px solid var(--ok);display:none}
.summary-final.show{display:block;animation:fadeIn .4s ease}
.summary-final h3{font-family:"Fredoka",sans-serif;color:var(--ok);margin-bottom:.8rem;font-size:1.1rem}
.summary-final ul{list-style:none}
.summary-final li{padding:5px 0 5px 22px;position:relative;font-size:.84rem;color:var(--text-soft);border-bottom:1px solid var(--lm)}
.summary-final li:last-child{border-bottom:none}
.summary-final li:before{content:"\2713";position:absolute;left:0;color:var(--lp);font-weight:700}
@media(max-width:600px){
.level-header h1{font-size:1.4rem}
.compare-grid{grid-template-columns:1fr}
.card{padding:1.2rem}
.opts{grid-template-columns:1fr}
}
</style>
</head>

<div class="container">
<div class="level-header">

  <h1>&#x1F4DD; Grammar Summary</h1>
  <div class="module-name">&#x1F6CE;&#xFE0F; Services, Support &amp; Problem Solving</div>
  <p class="subtitle">Tag Questions (Common Auxiliaries) &middot; 5 steps &times; 5 exercises</p>
</div>

  <h3>&#x1F393; Key Points &mdash; Tag Questions</h3>
  <ul id="summaryList"></ul>
</div>
</div>
<script>
var STEPS = [{"icon": "\ud83c\uddea\ud83c\uddf8", "title": "Repaso en Espa\u00f1ol", "html": "<div class=\"section-label\">Paso 1</div>\n<div class=\"section-title\">Paso 1: \ud83c\uddea\ud83c\uddf8 Repaso en Espa\u00f1ol</div>\n<div class=\"section-desc\">En espa\u00f1ol usamos expresiones como \"\u00bfverdad?\", \"\u00bfno?\", \"\u00bfcierto?\" al final de una oraci\u00f3n para pedir confirmaci\u00f3n. En ingl\u00e9s el sistema es m\u00e1s preciso: el tag cambia seg\u00fan el auxiliar.</div>\n<div class=\"compare-grid\">\n  <div class=\"compare-card esp\">\n    <h4>\ud83c\uddea\ud83c\uddf8 Espa\u00f1ol \u2014 fijo</h4>\n    <ul>\n      <li>Est\u00e1 abierto, <b>\u00bfverdad?</b></li>\n      <li>No est\u00e1 abierto, <b>\u00bfverdad?</b></li>\n      <li>Puedes ayudarme, <b>\u00bfno?</b></li>\n      <li>Llamaste ayer, <b>\u00bfcierto?</b></li>\n    </ul>\n  </div>\n  <div class=\"compare-card eng\">\n    <h4>\ud83c\uddec\ud83c\udde7 English \u2014 cambia con el auxiliar</h4>\n    <ul>\n      <li>It <b>is</b> open, <b>isn't it?</b></li>\n      <li>It <b>isn't</b> open, <b>is it?</b></li>\n      <li>You <b>can</b> help me, <b>can't you?</b></li>\n      <li>You <b>called</b> yesterday, <b>didn't you?</b></li>\n    </ul>\n  </div>\n</div>\n<div class=\"tip-card\"><strong>\ud83d\udca1 Idea clave:</strong> En espa\u00f1ol siempre decimos \"\u00bfverdad?\" o \"\u00bfno?\". En ingl\u00e9s el tag debe <b>coincidir con el auxiliar</b> de la oraci\u00f3n y siempre ser la forma <b>opuesta</b> (positivo \u2194 negativo).</div>\n<div class=\"tag-anatomy\">\n  <div class=\"ta-title\">Anatom\u00eda de una tag question</div>\n  <div class=\"ta-sentence\">\n    <span class=\"ta-main\">The manager <span class=\"ta-aux\">is</span> available</span>\n    <span class=\"ta-comma\">,</span>\n    <span class=\"ta-tag\"><span class=\"ta-aux-tag\">isn't</span> <span class=\"ta-pro\">he</span><span class=\"ta-q\">?</span></span>\n  </div>\n  <div class=\"ta-labels\">\n    <div class=\"ta-label-main\">Oraci\u00f3n principal<br>(positiva)</div>\n    <div class=\"ta-label-tag\">Tag<br>(negativo)</div>\n  </div>\n  <div class=\"ta-rules\">\n    <div class=\"ta-rule\"><span class=\"rule-badge rb-aux\">mismo auxiliar</span> is \u2192 isn't</div>\n    <div class=\"ta-rule\"><span class=\"rule-badge rb-opp\">opuesto</span> positivo \u2192 negativo</div>\n    <div class=\"ta-rule\"><span class=\"rule-badge rb-pro\">mismo sujeto</span> the manager \u2192 he</div>\n  </div>\n</div>"}, {"icon": "\ud83e\udd1d", "title": "Similitudes", "html": "<div class=\"section-label\">Paso 2</div>\n<div class=\"section-title\">Paso 2: \ud83e\udd1d Similitudes ESP \u2194 ENG</div>\n<div class=\"section-desc\">Both languages add a short question at the end to seek confirmation. The purpose is identical \u2014 the mechanics differ.</div>\n<table class=\"g-table\">\n  <tr><th>Similitud</th><th>\ud83c\uddea\ud83c\uddf8 Espa\u00f1ol</th><th>\ud83c\uddec\ud83c\udde7 English</th></tr>\n  <tr><td>Funci\u00f3n: pedir confirmaci\u00f3n</td><td>...\u00bfverdad? / \u00bfno?</td><td>...<span class=\"g-quest\">isn't it?</span> / <span class=\"g-quest\">can't you?</span></td></tr>\n  <tr><td>Al final de la oraci\u00f3n</td><td>Es cort\u00e9s, \u00bfverdad?</td><td>It is polite, <span class=\"g-quest\">isn't it?</span></td></tr>\n  <tr><td>Positivo + negativo (t\u00edpico)</td><td>Est\u00e1 abierto, \u00bfno?</td><td>It's open, <span class=\"g-quest\">isn't it?</span></td></tr>\n  <tr><td>Negativo + positivo (t\u00edpico)</td><td>No est\u00e1 abierto, \u00bfverdad?</td><td>It isn't open, <span class=\"g-quest\">is it?</span></td></tr>\n  <tr><td>Entonaci\u00f3n descendente = confirmar</td><td>...\u00bfverdad? \u2198</td><td>...isn't it? \u2198</td></tr>\n</table>\n<div class=\"section-label\">Los auxiliares m\u00e1s comunes en tags</div>\n<div class=\"aux-tags-grid\">\n  <div class=\"atg-item\">\n    <div class=\"atg-main\">is / are / was / were</div>\n    <div class=\"atg-tag\">isn't / aren't / wasn't / weren't</div>\n    <div class=\"atg-ex\">She is here, <b>isn't she?</b></div>\n  </div>\n  <div class=\"atg-item\">\n    <div class=\"atg-main\">can / could</div>\n    <div class=\"atg-tag\">can't / couldn't</div>\n    <div class=\"atg-ex\">You can help, <b>can't you?</b></div>\n  </div>\n  <div class=\"atg-item\">\n    <div class=\"atg-main\">will / would</div>\n    <div class=\"atg-tag\">won't / wouldn't</div>\n    <div class=\"atg-ex\">It will work, <b>won't it?</b></div>\n  </div>\n  <div class=\"atg-item\">\n    <div class=\"atg-main\">have / has / had</div>\n    <div class=\"atg-tag\">haven't / hasn't / hadn't</div>\n    <div class=\"atg-ex\">You have signed, <b>haven't you?</b></div>\n  </div>\n  <div class=\"atg-item\">\n    <div class=\"atg-main\">do / does (presente)</div>\n    <div class=\"atg-tag\">don't / doesn't</div>\n    <div class=\"atg-ex\">She works here, <b>doesn't she?</b></div>\n  </div>\n  <div class=\"atg-item\">\n    <div class=\"atg-main\">did (pasado)</div>\n    <div class=\"atg-tag\">didn't</div>\n    <div class=\"atg-ex\">You called, <b>didn't you?</b></div>\n  </div>\n</div>"}, {"icon": "\u26a1", "title": "Diferencias", "html": "<div class=\"section-label\">Paso 3</div>\n<div class=\"section-title\">Paso 3: \u26a1 Diferencias Importantes</div>\n<table class=\"g-table\">\n  <tr><th>Situaci\u00f3n</th><th>Oraci\u00f3n principal</th><th>Tag correcto</th></tr>\n  <tr><td>Presente \"be\" (+)</td><td>The office <span class=\"g-verb\">is</span> open</td><td><span class=\"g-quest\">isn't it?</span></td></tr>\n  <tr><td>Presente \"be\" (\u2212)</td><td>The office <span class=\"g-neg\">isn't</span> open</td><td><span class=\"g-quest\">is it?</span></td></tr>\n  <tr><td>Presente simple (+) 3\u00aa p.</td><td>She <span class=\"g-verb\">works</span> here</td><td><span class=\"g-quest\">doesn't she?</span></td></tr>\n  <tr><td>Pasado simple (+)</td><td>You <span class=\"g-verb\">called</span> yesterday</td><td><span class=\"g-quest\">didn't you?</span></td></tr>\n  <tr><td>Modal \"can\" (+)</td><td>You <span class=\"g-verb\">can</span> help me</td><td><span class=\"g-quest\">can't you?</span></td></tr>\n  <tr><td>Modal \"will\" (+)</td><td>She <span class=\"g-verb\">will</span> send the form</td><td><span class=\"g-quest\">won't she?</span></td></tr>\n</table>\n<div class=\"alert-card\">\n  <div class=\"atitle\">\u26a0\ufe0f Las 3 reglas que no se pueden olvidar</div>\n  <div class=\"three-tag-rules\">\n    <div class=\"ttr-item\">\n      <div class=\"ttr-num\">1</div>\n      <div class=\"ttr-content\">\n        <div class=\"ttr-title\">Positivo \u2192 tag negativo</div>\n        <div class=\"ttr-ex ok-ex\">She <b>is</b> here, <b>isn't she?</b> \u2705</div>\n        <div class=\"ttr-ex bad-ex\">She <b>is</b> here, <b>is she?</b> \u274c</div>\n      </div>\n    </div>\n    <div class=\"ttr-item\">\n      <div class=\"ttr-num\">2</div>\n      <div class=\"ttr-content\">\n        <div class=\"ttr-title\">Usa el auxiliar de la oraci\u00f3n \u2014 no otro</div>\n        <div class=\"ttr-ex ok-ex\">She <b>works</b> here, <b>doesn't she?</b> \u2705</div>\n        <div class=\"ttr-ex bad-ex\">She <b>works</b> here, <b>isn't she?</b> \u274c</div>\n      </div>\n    </div>\n    <div class=\"ttr-item\">\n      <div class=\"ttr-num\">3</div>\n      <div class=\"ttr-content\">\n        <div class=\"ttr-title\">Pronombre = sustituto del sujeto</div>\n        <div class=\"ttr-ex ok-ex\">The manager <b>is</b> here, isn't <b>he?</b> \u2705</div>\n        <div class=\"ttr-ex bad-ex\">The manager <b>is</b> here, isn't <b>the manager?</b> \u274c</div>\n      </div>\n    </div>\n  </div>\n</div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\ud83d\udccb</div><div><div class=\"en\">You <span class=\"g-verb\">have</span> filled in the form, <span class=\"g-quest\">haven't you?</span></div><div class=\"es\">Has rellenado el formulario, \u00bfverdad?</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\ud83d\udcde</div><div><div class=\"en\">The manager <span class=\"g-verb\">called</span> this morning, <span class=\"g-quest\">didn't he?</span></div><div class=\"es\">El gerente llam\u00f3 esta ma\u00f1ana, \u00bfverdad?</div></div></div>\n<div class=\"ex-row ex-wrong\"><div class=\"icon\">\u274c</div><div><div class=\"en\">She works here, <b>isn't she?</b></div><div class=\"es\">Error: works = presente simple \u2192 tag con does: <b>doesn't she?</b></div></div></div>"}, {"icon": "\ud83d\udca1", "title": "Consejos", "html": "<div class=\"section-label\">Paso 4</div>\n<div class=\"section-title\">Paso 4: \ud83d\udca1 Consejos Pr\u00e1cticos</div>\n<div class=\"tip-card\"><strong>Tip 1 \u2014 El truco del \"opuesto\":</strong> Antes de escribir el tag, preg\u00fantate: \u00bfla oraci\u00f3n es positiva o negativa? Si es positiva \u2192 tag negativo. Si es negativa \u2192 tag positivo. Es siempre lo contrario.</div>\n<div class=\"tip-card\"><strong>Tip 2 \u2014 Presente simple sin auxiliar:</strong> Si la oraci\u00f3n usa un verbo sin auxiliar visible (he works / she calls / it opens), el tag usa <b>do / does / don't / doesn't</b>. \"She works here, <b>doesn't she?</b>\" \u2014 el does representa al verbo works.</div>\n<div class=\"tip-card\"><strong>Tip 3 \u2014 Pronombres en el tag:</strong> Nunca repitas el sustantivo completo en el tag. The manager \u2192 he/she \u00b7 The team \u2192 they \u00b7 The form \u2192 it \u00b7 You and I \u2192 we. \"The complaint form is ready, <b>isn't it?</b>\"</div>\n<div class=\"tip-card\"><strong>Tip 4 \u2014 En atenci\u00f3n al cliente:</strong> Los tags son muy \u00fatiles para confirmar sin confrontar. \"You've already received the refund, <b>haven't you?</b>\" / \"This is your signature, <b>isn't it?</b>\"</div>\n<div class=\"section-label\">Gu\u00eda r\u00e1pida de tags por auxiliar</div>\n<div class=\"quick-tag-guide\">\n  <div class=\"qtg-row qtg-header\">\n    <div class=\"qtg-cell\">Oraci\u00f3n (+)</div>\n    <div class=\"qtg-cell\">Tag (\u2212)</div>\n    <div class=\"qtg-cell\">Oraci\u00f3n (\u2212)</div>\n    <div class=\"qtg-cell\">Tag (+)</div>\n  </div>\n  <div class=\"qtg-row\">\n    <div class=\"qtg-cell\">...is/are...</div>\n    <div class=\"qtg-cell tag-neg\">isn't/aren't?</div>\n    <div class=\"qtg-cell\">...isn't/aren't...</div>\n    <div class=\"qtg-cell tag-pos\">is/are?</div>\n  </div>\n  <div class=\"qtg-row\">\n    <div class=\"qtg-cell\">...was/were...</div>\n    <div class=\"qtg-cell tag-neg\">wasn't/weren't?</div>\n    <div class=\"qtg-cell\">...wasn't/weren't...</div>\n    <div class=\"qtg-cell tag-pos\">was/were?</div>\n  </div>\n  <div class=\"qtg-row\">\n    <div class=\"qtg-cell\">...can/could...</div>\n    <div class=\"qtg-cell tag-neg\">can't/couldn't?</div>\n    <div class=\"qtg-cell\">...can't/couldn't...</div>\n    <div class=\"qtg-cell tag-pos\">can/could?</div>\n  </div>\n  <div class=\"qtg-row\">\n    <div class=\"qtg-cell\">...will/would...</div>\n    <div class=\"qtg-cell tag-neg\">won't/wouldn't?</div>\n    <div class=\"qtg-cell\">...won't/wouldn't...</div>\n    <div class=\"qtg-cell tag-pos\">will/would?</div>\n  </div>\n  <div class=\"qtg-row\">\n    <div class=\"qtg-cell\">...have/has...</div>\n    <div class=\"qtg-cell tag-neg\">haven't/hasn't?</div>\n    <div class=\"qtg-cell\">...haven't/hasn't...</div>\n    <div class=\"qtg-cell tag-pos\">have/has?</div>\n  </div>\n  <div class=\"qtg-row\">\n    <div class=\"qtg-cell\">...works/opens...</div>\n    <div class=\"qtg-cell tag-neg\">doesn't?</div>\n    <div class=\"qtg-cell\">...called/sent...</div>\n    <div class=\"qtg-cell tag-neg\">didn't?</div>\n  </div>\n</div>"}, {"icon": "\u2728", "title": "Pr\u00e1ctica Final", "html": "<div class=\"section-label\">Paso 5</div>\n<div class=\"section-title\">Paso 5: \u2728 Pr\u00e1ctica Final</div>\n<div class=\"formula-box\">\n  <span class=\"g-subj\">Subject</span> + <span class=\"g-verb\">auxiliary (+)</span> + ... , <span class=\"g-quest\">auxiliary (-)</span> + <span class=\"g-subj\">pronoun</span>?<br>\n  <span class=\"g-subj\">Subject</span> + <span class=\"g-neg\">auxiliary (\u2212)</span> + ... , <span class=\"g-quest\">auxiliary (+)</span> + <span class=\"g-subj\">pronoun</span>?<br>\n  <em style=\"font-size:.8rem\">No auxiliary visible \u2192 use do/does (present) or did (past)</em>\n</div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\ud83d\udc64</div><div><div class=\"en\">The agent <span class=\"g-verb\">is</span> processing your refund, <span class=\"g-quest\">isn't he?</span></div><div class=\"es\">El agente est\u00e1 procesando su reembolso, \u00bfverdad?</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\ud83d\udccb</div><div><div class=\"en\">You <span class=\"g-verb\">have</span> already submitted the complaint form, <span class=\"g-quest\">haven't you?</span></div><div class=\"es\">Ya enviaste el formulario de queja, \u00bfverdad?</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\ud83d\udcde</div><div><div class=\"en\">The customer <span class=\"g-verb\">called</span> about the billing error, <span class=\"g-quest\">didn't they?</span></div><div class=\"es\">El cliente llam\u00f3 sobre el error de facturaci\u00f3n, \u00bfverdad?</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\ud83d\udd12</div><div><div class=\"en\">The office <span class=\"g-neg\">isn't</span> open on weekends, <span class=\"g-quest\">is it?</span></div><div class=\"es\">La oficina no abre los fines de semana, \u00bfverdad?</div></div></div>\n<div class=\"ex-row ex-wrong\"><div class=\"icon\">\u274c</div><div><div class=\"en\">The manager approved it, <b>isn't he?</b></div><div class=\"es\">Error: approved = pasado simple \u2192 tag con did: <b>didn't he?</b></div></div></div>\n<div class=\"alert-card\">\n  <div class=\"atitle\">\u26a0\ufe0f 3 Errores Comunes</div>\n  <p>\u274c \"She works here, <b>isn't she?</b>\" \u2192 \u2705 \"She works here, <b>doesn't she?</b>\" (presente simple \u2192 does)<br>\n  \u274c \"He called, <b>didn't the manager?</b>\" \u2192 \u2705 \"He called, <b>didn't he?</b>\" (pronombre, no sustantivo)<br>\n  \u274c \"It is open, <b>is it?</b>\" \u2192 \u2705 \"It is open, <b>isn't it?</b>\" (positivo \u2192 tag negativo)</p>\n</div>"}];
var EXERCISES = [[{"q": "\u00bfPara qu\u00e9 sirve una tag question?", "a": "b", "o": ["Para hacer una pregunta completamente nueva", "Para pedir confirmaci\u00f3n de algo que ya crees saber"], "fc": "Las tag questions piden confirmaci\u00f3n. Son como decir '\u00bfverdad?' o '\u00bfno?' en espa\u00f1ol.", "fi": "Para preguntas completamente nuevas usamos preguntas directas o indirectas.", "ex": "It is open, isn't it? (pide confirmar que est\u00e1 abierto)", "tip": "Tag question = \u00bfverdad? / \u00bfno? \u2014 pide confirmaci\u00f3n"}, {"q": "\"The office is closed, ___\"", "a": "a", "o": ["is it?", "isn't it?"], "fc": "Oraci\u00f3n negativa (is closed \u2192 isn't) \u2192 tag positivo: is it?", "fi": "Isn't it es tag negativo. Lo usamos cuando la oraci\u00f3n es positiva. Aqu\u00ed es negativa \u2192 tag positivo.", "ex": "The office isn't open, is it? (negativo \u2192 tag positivo)", "tip": "Negativo \u2192 tag positivo \u00b7 Positivo \u2192 tag negativo"}, {"q": "\"The manager is available, ___\"", "a": "b", "o": ["is he?", "isn't he?"], "fc": "Oraci\u00f3n positiva (is available) \u2192 tag negativo: isn't he. The manager \u2192 he.", "fi": "Is he? es tag positivo. Se usa cuando la oraci\u00f3n es negativa.", "ex": "The manager is available, isn't he?", "tip": "Positivo \u2192 tag negativo (isn't/doesn't/can't...)"}, {"q": "En el tag, el sujeto 'the complaint form' se convierte en:", "a": "b", "o": ["the complaint form", "it"], "fc": "En el tag siempre usamos pronombre, no el sustantivo completo. The complaint form \u2192 it.", "fi": "Nunca se repite el sustantivo completo en el tag. Siempre pronombre.", "ex": "The form is ready, isn't it? (the form \u2192 it)", "tip": "Sustantivo \u2192 pronombre en el tag: the manager \u2192 he/she \u00b7 the form \u2192 it"}, {"q": "La regla principal de las tag questions es:", "a": "a", "o": ["Oraci\u00f3n positiva \u2192 tag negativo / Oraci\u00f3n negativa \u2192 tag positivo", "El tag siempre es negativo"], "fc": "La regla fundamental: siempre el opuesto. Positivo \u2192 negativo. Negativo \u2192 positivo.", "fi": "El tag no siempre es negativo. Si la oraci\u00f3n es negativa, el tag es positivo.", "ex": "It is open, isn't it? / It isn't open, is it?", "tip": "Siempre el opuesto: + \u2192 \u2212 / \u2212 \u2192 +"}], [{"q": "\"You can help me, ___\"", "a": "b", "o": ["can you?", "can't you?"], "fc": "Oraci\u00f3n positiva (can) \u2192 tag negativo: can't you.", "fi": "Can you? es positivo. Se usa cuando la oraci\u00f3n principal es negativa: You can't help, can you?", "ex": "You can help me, can't you?", "tip": "can (+) \u2192 can't? / can't (\u2212) \u2192 can?"}, {"q": "\"She will send the report, ___\"", "a": "a", "o": ["won't she?", "will she?"], "fc": "Oraci\u00f3n positiva (will) \u2192 tag negativo: won't she. Will \u2192 won't (forma contra\u00edda especial).", "fi": "Will she? es positivo \u2014 solo si la oraci\u00f3n principal es negativa: She won't send it, will she?", "ex": "She will send the report, won't she?", "tip": "will (+) \u2192 won't? (contracci\u00f3n especial)"}, {"q": "\"They have processed your refund, ___\"", "a": "b", "o": ["have they?", "haven't they?"], "fc": "Oraci\u00f3n positiva (have processed) \u2192 tag negativo: haven't they. They \u2192 they.", "fi": "Have they? es positivo \u2014 se usa cuando la oraci\u00f3n es negativa.", "ex": "They have processed your refund, haven't they?", "tip": "have/has (+) \u2192 haven't/hasn't?"}, {"q": "\"You were at the office yesterday, ___\"", "a": "a", "o": ["weren't you?", "wasn't you?"], "fc": "Were \u2192 weren't. You \u2192 you (no cambia). Oraci\u00f3n positiva \u2192 tag negativo.", "fi": "Wasn't you es incorrecto. El pronombre you siempre usa were/weren't.", "ex": "You were there, weren't you?", "tip": "were \u2192 weren't (you/they/we) \u00b7 was \u2192 wasn't (I/he/she/it)"}, {"q": "\"The customer couldn't reach us, ___\"", "a": "b", "o": ["couldn't they?", "could they?"], "fc": "Oraci\u00f3n negativa (couldn't) \u2192 tag positivo: could they. The customer \u2192 they.", "fi": "Couldn't they? ser\u00eda negativo \u2014 pero la oraci\u00f3n ya es negativa, as\u00ed que el tag debe ser positivo.", "ex": "The customer couldn't reach us, could they?", "tip": "Negativo (couldn't) \u2192 tag positivo (could?)"}], [{"q": "\"She works in customer service, ___\"", "a": "b", "o": ["isn't she?", "doesn't she?"], "fc": "Works = presente simple sin auxiliar \u2192 tag con does/doesn't. Oraci\u00f3n positiva \u2192 doesn't she.", "fi": "Isn't she usa el auxiliar be. Pero works es un verbo com\u00fan, no be \u2192 usa does/doesn't.", "ex": "She works in customer service, doesn't she?", "tip": "Verbo com\u00fan presente (+) \u2192 doesn't/don't? (no isn't)"}, {"q": "\"The agent sent the email, ___\"", "a": "a", "o": ["didn't he?", "doesn't he?"], "fc": "Sent = pasado simple \u2192 tag con did/didn't. Oraci\u00f3n positiva \u2192 didn't he. Agent \u2192 he.", "fi": "Doesn't he es para presente simple. Sent es pasado simple \u2192 usa didn't.", "ex": "The agent sent the email, didn't he?", "tip": "Verbo pasado simple (+) \u2192 didn't? (no doesn't)"}, {"q": "\"The forms don't include the signature, ___\"", "a": "b", "o": ["don't they?", "do they?"], "fc": "Oraci\u00f3n negativa (don't) \u2192 tag positivo: do they. The forms \u2192 they.", "fi": "Don't they? es negativo. La oraci\u00f3n ya es negativa \u2192 tag positivo.", "ex": "The forms don't include the signature, do they?", "tip": "don't/doesn't (\u2212) \u2192 do/does? (positivo)"}, {"q": "\"The refund will be processed tomorrow, ___\"", "a": "a", "o": ["won't it?", "will it?"], "fc": "Oraci\u00f3n positiva (will be) \u2192 tag negativo: won't it. The refund \u2192 it.", "fi": "Will it? es positivo. Solo para oraciones negativas: The refund won't arrive, will it?", "ex": "The refund will be processed tomorrow, won't it?", "tip": "will (+) \u2192 won't it?"}, {"q": "\"The manager hasn't approved the request yet, ___\"", "a": "b", "o": ["hasn't he?", "has he?"], "fc": "Oraci\u00f3n negativa (hasn't) \u2192 tag positivo: has he. Manager \u2192 he.", "fi": "Hasn't he? es negativo. La oraci\u00f3n es negativa \u2192 el tag debe ser positivo.", "ex": "The manager hasn't approved it yet, has he?", "tip": "hasn't/haven't (\u2212) \u2192 has/have? (positivo)"}], [{"q": "\"This is your signature on the form, ___\"", "a": "a", "o": ["isn't it?", "is it?"], "fc": "Oraci\u00f3n positiva (is) \u2192 tag negativo: isn't it. This \u2192 it.", "fi": "Is it? es positivo. La oraci\u00f3n es positiva \u2192 el tag debe ser negativo.", "ex": "This is your signature, isn't it? (confirming)", "tip": "is (+) \u2192 isn't it?"}, {"q": "\"You haven't received the invoice yet, ___\"", "a": "b", "o": ["haven't you?", "have you?"], "fc": "Oraci\u00f3n negativa (haven't) \u2192 tag positivo: have you.", "fi": "Haven't you? es negativo. La oraci\u00f3n es negativa \u2192 tag positivo.", "ex": "You haven't received the invoice yet, have you?", "tip": "haven't/hasn't (\u2212) \u2192 have/has? (+)"}, {"q": "\"The customer service team didn't respond in time, ___\"", "a": "a", "o": ["did they?", "didn't they?"], "fc": "Oraci\u00f3n negativa (didn't) \u2192 tag positivo: did they. Team \u2192 they.", "fi": "Didn't they? es negativo. La oraci\u00f3n ya es negativa \u2192 tag positivo.", "ex": "The team didn't respond in time, did they?", "tip": "didn't (\u2212) \u2192 did? (+)"}, {"q": "\"The new policy will affect all customers, ___\"", "a": "b", "o": ["will it?", "won't it?"], "fc": "Oraci\u00f3n positiva (will) \u2192 tag negativo: won't it. Policy \u2192 it.", "fi": "Will it? es positivo. La oraci\u00f3n es positiva \u2192 tag negativo.", "ex": "The new policy will affect all customers, won't it?", "tip": "will (+) \u2192 won't? (\u2212)"}, {"q": "\"You could speak to the supervisor if needed, ___\"", "a": "a", "o": ["couldn't you?", "could you?"], "fc": "Oraci\u00f3n positiva (could) \u2192 tag negativo: couldn't you.", "fi": "Could you? es positivo. La oraci\u00f3n es positiva \u2192 tag negativo.", "ex": "You could speak to the supervisor, couldn't you?", "tip": "could (+) \u2192 couldn't? (\u2212)"}], [{"q": "\"The complaint has been registered, ___\"", "a": "b", "o": ["has it?", "hasn't it?"], "fc": "Oraci\u00f3n positiva (has been) \u2192 tag negativo: hasn't it. Complaint \u2192 it.", "fi": "Has it? es positivo. La oraci\u00f3n es positiva \u2192 tag negativo.", "ex": "The complaint has been registered, hasn't it?", "tip": "has/have (+) \u2192 hasn't/haven't? (\u2212)"}, {"q": "\"The agent wasn't aware of the issue, ___\"", "a": "a", "o": ["was he?", "wasn't he?"], "fc": "Oraci\u00f3n negativa (wasn't) \u2192 tag positivo: was he. Agent \u2192 he.", "fi": "Wasn't he? es negativo. La oraci\u00f3n es negativa \u2192 tag positivo.", "ex": "The agent wasn't aware of the issue, was he?", "tip": "wasn't/weren't (\u2212) \u2192 was/were? (+)"}, {"q": "\"Customers usually wait a long time, ___\"", "a": "b", "o": ["isn't it?", "don't they?"], "fc": "Wait = presente simple sin auxiliar be \u2192 tag con do/don't. Oraci\u00f3n positiva \u2192 don't they.", "fi": "Isn't it usa be. Pero wait es verbo com\u00fan \u2192 tag con don't/doesn't.", "ex": "Customers usually wait a long time, don't they?", "tip": "Verbo com\u00fan presente (+) \u2192 don't/doesn't? (no isn't/aren't)"}, {"q": "\"You wouldn't mind waiting a moment, ___\"", "a": "a", "o": ["would you?", "wouldn't you?"], "fc": "Oraci\u00f3n negativa (wouldn't) \u2192 tag positivo: would you. Educada y cort\u00e9s.", "fi": "Wouldn't you? es negativo. La oraci\u00f3n es negativa \u2192 tag positivo.", "ex": "You wouldn't mind waiting, would you? (muy cort\u00e9s)", "tip": "wouldn't (\u2212) \u2192 would? (+) \u2014 forma muy cort\u00e9s"}, {"q": "\"Everything is in order with the account, ___\"", "a": "b", "o": ["is it?", "isn't it?"], "fc": "Oraci\u00f3n positiva (is) \u2192 tag negativo: isn't it. Everything \u2192 it.", "fi": "Is it? es positivo. La oraci\u00f3n es positiva \u2192 tag negativo.", "ex": "Everything is in order, isn't it? (confirming)", "tip": "is (+) \u2192 isn't it? (\u2212)"}]];
var SUMMARY = ["<b>Tag question</b> = mini-pregunta al final: 'It is open, <b>isn't it?</b>' \u2014 pide confirmaci\u00f3n", "<b>Regla de oro:</b> oraci\u00f3n positiva \u2192 tag negativo \u00b7 oraci\u00f3n negativa \u2192 tag positivo", "<b>El tag repite el auxiliar</b> de la oraci\u00f3n principal: is \u2192 isn't / can \u2192 can't / will \u2192 won't", "<b>Sin auxiliar (presente simple):</b> do/does: 'She works here, <b>doesn't she?</b>'", "<b>Pasado simple:</b> did: 'You called yesterday, <b>didn't you?</b>'", "<b>El pronombre del tag</b> repite el sujeto: the manager \u2192 he/she \u00b7 the forms \u2192 they", "<b>Entonaci\u00f3n:</b> \u2198 bajando = confirmar algo que ya sabes \u00b7 \u2197 subiendo = pregunta real"];
var curStep = 0;
var scores = {};
var answered = {};

function renderStepTabs() {
    var c = document.getElementById("stepTabs");
    c.innerHTML = "";
    STEPS.forEach(function(s, i) {
        var k = "s" + i;
        var allDone = [0,1,2,3,4].every(function(j){ return answered[k+"e"+j]; });
        var b = document.createElement("button");
        b.className = "step-tab" + (i === curStep ? " active" : "") + (allDone && i !== curStep ? " done" : "");
        b.textContent = (i + 1) + ". " + s.icon + " " + s.title;
        b.addEventListener("click", (function(idx){ return function(){
            curStep = idx;
            renderStepTabs();
            renderCard();
            document.getElementById("summaryFinal").classList.remove("show");
        };})(i));
        c.appendChild(b);
    });
}

function renderCard() {
    var s = STEPS[curStep];
    var exs = EXERCISES[curStep];
    var k = "s" + curStep;
    if (scores[k] === undefined) scores[k] = 0;
    var h = "<div class=\"card\">" + s.html;
    h += "<div class=\"ex-section\"><h3>&#x270F;&#xFE0F; Exercises &mdash; " + s.title + "</h3>";
    exs.forEach(function(e, i) {
        var eid = k + "e" + i;
        var longOpts = e.o[0].length > 42 || e.o[1].length > 42;
        var gs = longOpts ? " style=\"grid-template-columns:1fr\"" : "";
        h += "<div class=\"exercise\" id=\"" + eid + "\">";
        h += "<div class=\"exercise-q\">" + (i+1) + ". " + e.q + "</div>";
        h += "<div class=\"opts\"" + gs + ">";
        h += "<button class=\"opt-btn\" id=\"" + eid + "ba\">a) " + e.o[0] + "</button>";
        h += "<button class=\"opt-btn\" id=\"" + eid + "bb\">b) " + e.o[1] + "</button>";
        h += "</div>";
        var ct = e.a === "a" ? e.o[0] : e.o[1];
        h += "<div class=\"fb fb-ok\" id=\"fbok-" + eid + "\">";
        h += "<div class=\"fb-header\"><span class=\"fb-icon\">&#x1F389;</span> Correct!</div>";
        h += "<div class=\"fb-body\">";
        h += "<div class=\"fb-row\"><span class=\"fb-dot\">&#x2705;</span><div class=\"fb-text\"><span class=\"fb-correct-answer\">" + ct + "</span> &mdash; " + e.fc + "</div></div>";
        h += "<div class=\"fb-row\"><span class=\"fb-dot\">&#x1F4A1;</span><div class=\"fb-text\">The other option: " + e.fi + "</div></div>";
        if (e.ex) h += "<div class=\"fb-example\">&#x1F4DD; " + e.ex + "</div>";
        if (e.tip) h += "<div class=\"fb-tip\"><strong>&#x1F4A1; Remember:</strong> " + e.tip + "</div>";
        h += "</div></div>";
        h += "<div class=\"fb fb-bad\" id=\"fbbad-" + eid + "\">";
        h += "<div class=\"fb-header\"><span class=\"fb-icon\">&#x1F615;</span> Not quite right</div>";
        h += "<div class=\"fb-body\">";
        h += "<div class=\"fb-row\"><span class=\"fb-dot\">&#x274C;</span><div class=\"fb-text\"><span class=\"fb-wrong-reason\">" + e.fi + "</span></div></div>";
        h += "<div class=\"fb-row\"><span class=\"fb-dot\">&#x2705;</span><div class=\"fb-text\">The correct answer is <span class=\"fb-correct-answer\">" + ct + "</span> &mdash; " + e.fc + "</div></div>";
        if (e.ex) h += "<div class=\"fb-example\">&#x1F4DD; " + e.ex + "</div>";
        if (e.tip) h += "<div class=\"fb-tip\"><strong>&#x1F4A1; Remember:</strong> " + e.tip + "</div>";
        h += "</div></div></div>";
    });
    h += "<div class=\"score-bar\"><div class=\"num\" id=\"sc-" + k + "\">0/5</div><div class=\"lbl\">Score</div></div>";
    h += "</div></div>";
    document.getElementById("cardArea").innerHTML = h;
    exs.forEach(function(e, i) {
        var eid = k + "e" + i;
        document.getElementById(eid + "ba").addEventListener("click", (function(id){ return function(){ chk(id,"a"); }; })(eid));
        document.getElementById(eid + "bb").addEventListener("click", (function(id){ return function(){ chk(id,"b"); }; })(eid));
    });
}

function chk(eid, sel) {
    if (answered[eid]) return;
    answered[eid] = true;
    var parts = eid.match(/s(\d+)e(\d+)/);
    var si = parseInt(parts[1]);
    var ei = parseInt(parts[2]);
    var e = EXERCISES[si][ei];
    var k = "s" + si;
    var ex = document.getElementById(eid);
    var btnA = document.getElementById(eid + "ba");
    var btnB = document.getElementById(eid + "bb");
    btnA.disabled = true;
    btnB.disabled = true;
    if (sel === e.a) {
        ex.classList.add("correct");
        (sel === "a" ? btnA : btnB).classList.add("sel-ok");
        document.getElementById("fbok-" + eid).classList.add("show");
        scores[k]++;
    } else {
        ex.classList.add("incorrect");
        (sel === "a" ? btnA : btnB).classList.add("sel-bad");
        (e.a === "a" ? btnA : btnB).classList.add("show-ok");
        document.getElementById("fbbad-" + eid).classList.add("show");
    }
    document.getElementById("sc-" + k).textContent = scores[k] + "/5";
    var allDone = [0,1,2,3,4].every(function(i){ return answered[k + "e" + i]; });
    if (allDone && curStep === 4) {
        setTimeout(function() {
            var sf = document.getElementById("summaryFinal");
            document.getElementById("summaryList").innerHTML = SUMMARY.map(function(s){ return "<li>" + s + "</li>"; }).join("");
            sf.classList.add("show");
            sf.scrollIntoView({behavior:"smooth"});
        }, 600);
    }
}

renderStepTabs();
renderCard();
</script>
