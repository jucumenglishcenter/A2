<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grammar Summary — Punctuation | A2 | JUCUM</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Fredoka:wght@400;500;600;700&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
:root{
--bg:#FAFAF6;--card:#fff;--text:#2A2A2A;--text-soft:#777;--border:#E8E5DC;
--shadow:0 3px 16px rgba(0,0,0,.06);--radius:14px;
--lp:#4CAF50;--ld:#1B5E20;--ll:#E8F5E9;--lm:#C8E6C9;
--lg:linear-gradient(135deg,#388E3C,#4CAF50);--lglow:rgba(76,175,80,.15);
--badge-text:#1A3D1C;
--subj:#1565C0;--subj-bg:#E3F2FD;
--verb:#E53935;--verb-bg:#FFEBEE;
--comp:#00897B;--comp-bg:#E0F2F1;
--neg:#AD1457;--neg-bg:#FCE4EC;
--quest:#7B1FA2;--quest-bg:#F3E5F5;
--ok:#2E7D32;--ok-bg:#E8F5E9;
--err:#C62828;--err-bg:#FFEBEE;
--note-bg:#F1F8E9;--note-border:#AED581;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Nunito",sans-serif;background:var(--bg);color:var(--text);line-height:1.7;padding:1.5rem 1rem;-webkit-font-smoothing:antialiased}
.container{max-width:800px;margin:0 auto}
.level-header{text-align:center;padding:2rem;border-radius:20px;color:#fff;position:relative;overflow:hidden;margin-bottom:1.2rem;background:var(--lg)}
.level-header::before{content:"";position:absolute;top:-40%;right:-15%;width:250px;height:250px;background:rgba(255,255,255,.1);border-radius:50%}
.level-header h1{font-family:"Fredoka",sans-serif;font-size:1.8rem;font-weight:600;position:relative;z-index:1}
.level-header .module-name{font-family:"Fredoka",sans-serif;font-size:1.05rem;opacity:.95;position:relative;z-index:1;margin-top:.2rem}
.level-header .subtitle{opacity:.8;font-size:.83rem;position:relative;z-index:1;margin-top:.15rem}
.level-badge{display:inline-flex;align-items:center;gap:6px;font-size:.7rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;background:var(--ll);color:var(--badge-text);padding:4px 12px;border-radius:20px;border:1.5px solid var(--lm);margin-bottom:.8rem}
.step-tabs{display:flex;gap:.35rem;margin-bottom:1rem;flex-wrap:wrap}
.step-tab{padding:.45rem .85rem;border-radius:8px;font-size:.78rem;font-weight:700;cursor:pointer;border:2px solid var(--border);background:var(--card);transition:.2s;font-family:"Nunito",sans-serif}
.step-tab:hover{background:var(--ll)}
.step-tab.active{background:var(--ll);border-color:var(--lp);color:var(--ld)}
.step-tab.done{background:var(--ok-bg);border-color:var(--ok);color:var(--ok)}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.6rem;margin-bottom:1.2rem;box-shadow:var(--shadow);border-top:3.5px solid var(--lp);animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.section-label{display:flex;align-items:center;gap:.5rem;font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--ld);margin-bottom:.3rem;margin-top:1.1rem}
.section-label::before{content:"";width:20px;height:3px;background:var(--lp);border-radius:2px}
.section-label:first-child{margin-top:0}
.section-title{font-family:"Fredoka",sans-serif;font-size:1.25rem;font-weight:600;margin-bottom:.1rem}
.section-desc{font-size:.85rem;color:var(--text-soft);margin-bottom:1rem}
.g-subj{background:var(--subj-bg);color:var(--subj);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--subj)}
.g-verb{background:var(--verb-bg);color:var(--verb);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--verb)}
.g-comp{background:var(--comp-bg);color:var(--comp);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--comp)}
.g-neg{background:var(--neg-bg);color:var(--neg);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--neg)}
.g-quest{background:var(--quest-bg);color:var(--quest);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--quest)}
.g-table{width:100%;border-collapse:separate;border-spacing:0;margin:.8rem 0;border-radius:10px;overflow:hidden;font-size:.83rem;border:1px solid var(--border)}
.g-table th{background:var(--lg);color:#fff;padding:.65rem .6rem;font-size:.7rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
.g-table td{padding:.6rem;border-bottom:1px solid #f0f0f0;vertical-align:middle}
.g-table tr:nth-child(even) td{background:var(--ll)}
.g-table tr:last-child td{border-bottom:none}
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin:.8rem 0}
.compare-card{padding:1rem;border-radius:12px;text-align:center}
.compare-card.esp{background:var(--ll);border:2px solid var(--lm)}
.compare-card.eng{background:var(--subj-bg);border:2px solid #90CAF9}
.compare-card h4{font-family:"Fredoka",sans-serif;font-size:.85rem;margin-bottom:.5rem}
.compare-card.esp h4{color:var(--ld)}
.compare-card.eng h4{color:var(--subj)}
.compare-card ul{list-style:none;font-size:.82rem;color:var(--text-soft)}
.compare-card li{padding:3px 0}
.formula-box{background:var(--note-bg);border:2px solid var(--note-border);border-radius:12px;padding:1rem;margin:.8rem 0;text-align:center;font-family:"Fredoka",sans-serif;font-size:.9rem;color:var(--ld);line-height:2.2}
.tip-card{background:var(--ll);border-radius:10px;padding:.8rem 1rem;margin:.5rem 0;font-size:.83rem;border-left:3px solid var(--lp)}
.tip-card strong{color:var(--ld)}
.alert-card{background:var(--err-bg);border:2px solid #EF5350;border-radius:10px;padding:.8rem 1rem;margin:.8rem 0}
.alert-card .atitle{font-family:"Fredoka",sans-serif;color:var(--err);font-size:.82rem;margin-bottom:.3rem;font-weight:700}
.alert-card p{font-size:.82rem;color:#555;line-height:1.7}
.ex-row{display:flex;align-items:flex-start;gap:.6rem;padding:.6rem .8rem;border-radius:10px;margin:.4rem 0;font-size:.88rem}
.ex-row .icon{font-size:1.2rem;flex-shrink:0;margin-top:2px}
.ex-row .en{font-weight:700;color:var(--text)}
.ex-row .es{font-family:"Lora",serif;font-style:italic;font-size:.82rem;color:var(--text-soft);margin-top:1px}
.ex-right{border-left:3px solid var(--ok);background:var(--ok-bg)}
.ex-wrong{border-left:3px solid var(--err);background:var(--err-bg)}

/* PUNCT INTRO GRID */
.punct-intro-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:.4rem;margin:1rem 0}
.pig-item{text-align:center;padding:.65rem .4rem;border-radius:12px}
.pig-comma{background:#E3F2FD;border:2px solid #90CAF9}
.pig-period{background:var(--ok-bg);border:2px solid #A5D6A7}
.pig-question{background:var(--quest-bg);border:2px solid #CE93D8}
.pig-exclaim{background:#FFF3E0;border:2px solid #FFB74D}
.pig-apos{background:var(--neg-bg);border:2px solid #F48FB1}
.pig-symbol{font-family:"Fredoka",sans-serif;font-size:1.6rem;font-weight:700;line-height:1.2}
.pig-comma .pig-symbol{color:var(--subj)}
.pig-period .pig-symbol{color:var(--ok)}
.pig-question .pig-symbol{color:var(--quest)}
.pig-exclaim .pig-symbol{color:#E65100}
.pig-apos .pig-symbol{color:var(--neg)}
.pig-name{font-size:.65rem;font-weight:700;color:var(--text);margin:.2rem 0}
.pig-use{font-size:.61rem;color:var(--text-soft);line-height:1.3}
/* COMMA USES */
.comma-uses{display:flex;flex-direction:column;gap:.4rem;margin:.8rem 0}
.cu-item{display:grid;grid-template-columns:auto 1.5fr 3fr;align-items:center;gap:.7rem;padding:.5rem .8rem;background:#FAFAFA;border-radius:10px;border:1px solid var(--border);font-size:.8rem}
.cu-num{font-family:"Fredoka",sans-serif;font-size:1.1rem;font-weight:700;color:#fff;background:var(--subj);border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cu-use{font-weight:700;color:var(--text)}
.cu-ex{color:var(--text-soft);font-size:.77rem}
.pu-comma{color:var(--subj);font-weight:900;font-size:1.1rem}
.pu-period{color:var(--ok);font-weight:900}
.pu-question{color:var(--quest);font-weight:900}
/* APOSTROPHE TRAPS */
.apostrophe-traps{display:flex;flex-direction:column;gap:.5rem;margin-top:.6rem}
.at-pair{background:#fff;border-radius:10px;padding:.75rem .9rem;border:1.5px solid var(--border)}
.at-header{font-family:"Fredoka",sans-serif;font-size:.8rem;font-weight:700;color:var(--subj);margin-bottom:.4rem;padding-bottom:.25rem;border-bottom:1px dashed #e0e0e0}
.at-good{font-size:.79rem;color:var(--ok);margin:.2rem 0}
.at-bad{font-size:.79rem;color:var(--err);margin:.2rem 0}
/* POSSESSIVE VISUAL */
.possessive-visual{display:flex;flex-direction:column;gap:.35rem;margin:.8rem 0}
.pv-row{display:grid;grid-template-columns:1.4fr .9fr 2fr;gap:.6rem;align-items:center;padding:.45rem .7rem;border-radius:8px;background:#fafafa;border:1px solid var(--border);font-size:.79rem}
.pv-type{color:var(--text);font-weight:600}
.pv-rule{font-family:"Fredoka",sans-serif;font-weight:700;color:var(--neg);font-size:.82rem}
.pv-ex{color:var(--text-soft);font-size:.76rem}
/* CONTRACTIONS GRID */
.contractions-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.4rem;margin:.9rem 0}
.cg-item{border-radius:8px;overflow:hidden;border:1.5px solid var(--border);text-align:center}
.cg-full{font-size:.72rem;color:var(--text-soft);padding:3px 0;background:#fafafa}
.cg-short{font-size:.82rem;font-weight:700;color:var(--neg);padding:3px 0;background:var(--neg-bg)}
@media(max-width:600px){
.punct-intro-grid{grid-template-columns:repeat(3,1fr)}
.cu-item{grid-template-columns:auto 1fr}
.cu-ex{grid-column:1/-1;padding-left:2rem}
.pv-row{grid-template-columns:1fr 1fr}
.pv-ex{grid-column:1/-1}
.contractions-grid{grid-template-columns:repeat(3,1fr)}
}

.ex-section{margin-top:1.2rem;padding-top:1rem;border-top:2px dashed var(--lm)}
.ex-section h3{font-family:"Fredoka",sans-serif;color:var(--ld);font-size:.9rem;margin-bottom:.8rem}
.exercise{background:#fafafa;border-radius:12px;padding:1rem;margin-bottom:.7rem;border:2px solid #eee;transition:.2s}
.exercise.correct{border-color:var(--ok);background:var(--ok-bg)}
.exercise.incorrect{border-color:var(--err);background:var(--err-bg)}
.exercise-q{font-size:.88rem;margin-bottom:.7rem;line-height:1.4}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:.4rem}
.opt-btn{padding:.65rem .5rem;border:2px solid #e0e0e0;border-radius:10px;background:var(--card);color:var(--text-soft);font-size:.83rem;font-weight:600;cursor:pointer;transition:.15s;font-family:"Nunito",sans-serif;text-align:left}
.opt-btn:hover:not(:disabled){border-color:var(--lp);background:var(--ll)}
.opt-btn:disabled{cursor:not-allowed;opacity:.7}
.opt-btn.sel-ok{background:var(--ok);color:#fff;border-color:var(--ok)}
.opt-btn.sel-bad{background:var(--err);color:#fff;border-color:var(--err)}
.opt-btn.show-ok{background:var(--ok);color:#fff;border-color:var(--ok)}
.fb{margin-top:.7rem;padding:0;border-radius:12px;font-size:.82rem;display:none;line-height:1.6;overflow:hidden}
.fb.show{display:block;animation:fbSlide .35s ease}
@keyframes fbSlide{from{opacity:0;max-height:0;transform:translateY(-8px)}to{opacity:1;max-height:600px;transform:translateY(0)}}
.fb-header{display:flex;align-items:center;gap:.5rem;padding:.7rem 1rem;font-family:"Fredoka",sans-serif;font-size:.85rem;font-weight:600}
.fb.fb-ok .fb-header{background:#C8E6C9;color:var(--ok)}
.fb.fb-bad .fb-header{background:#FFCDD2;color:var(--err)}
.fb-icon{font-size:1.2rem}
.fb-body{padding:.8rem 1rem}
.fb.fb-ok .fb-body{background:var(--ok-bg)}
.fb.fb-bad .fb-body{background:var(--err-bg)}
.fb-row{display:flex;align-items:flex-start;gap:.5rem;margin-bottom:.4rem}
.fb-row:last-child{margin-bottom:0}
.fb-dot{font-size:.9rem;flex-shrink:0;margin-top:1px}
.fb-text{flex:1}
.fb-correct-answer{color:var(--ok);font-weight:700}
.fb-wrong-reason{color:var(--err);font-weight:600}
.fb-example{display:inline-flex;align-items:center;gap:.3rem;margin-top:.4rem;padding:4px 10px;border-radius:6px;font-size:.78rem;font-weight:700}
.fb.fb-ok .fb-example{background:#A5D6A7;color:#1B5E20}
.fb.fb-bad .fb-example{background:#EF9A9A;color:#B71C1C}
.fb-tip{margin-top:.5rem;padding:.5rem .7rem;border-radius:8px;background:var(--note-bg);border:1px solid var(--note-border);font-size:.76rem;color:#33691E}
.fb-tip strong{color:var(--ld)}
.score-bar{text-align:center;padding:.8rem;background:var(--ll);border-radius:10px;margin-top:.8rem;border:1px solid var(--lm)}
.score-bar .num{font-family:"Fredoka",sans-serif;font-size:1.4rem;color:var(--ld)}
.score-bar .lbl{font-size:.7rem;color:var(--lp);font-weight:700;text-transform:uppercase;letter-spacing:1px}
.summary-final{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.6rem;margin-top:1rem;box-shadow:var(--shadow);border-top:3.5px solid var(--ok);display:none}
.summary-final.show{display:block;animation:fadeIn .4s ease}
.summary-final h3{font-family:"Fredoka",sans-serif;color:var(--ok);margin-bottom:.8rem;font-size:1.1rem}
.summary-final ul{list-style:none}
.summary-final li{padding:5px 0 5px 22px;position:relative;font-size:.84rem;color:var(--text-soft);border-bottom:1px solid var(--lm)}
.summary-final li:last-child{border-bottom:none}
.summary-final li:before{content:"&#10003;";position:absolute;left:0;color:var(--lp);font-weight:700}
@media(max-width:600px){
.level-header h1{font-size:1.4rem}
.compare-grid{grid-template-columns:1fr}
.card{padding:1.2rem}
.opts{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="container">
<div class="level-header">
  <div class="level-badge">&#x1F49A; A2 &middot; Grammar Summary</div>
  <h1>&#x1F4DD; Grammar Summary</h1>
  <div class="module-name">&#x1F6CE;&#xFE0F; Services, Support &amp; Problem Solving</div>
  <p class="subtitle">Punctuation: commas, end punctuation, apostrophes &middot; 5 steps &times; 5 exercises</p>
</div>
<div class="step-tabs" id="stepTabs"></div>
<div id="cardArea"></div>
<div class="summary-final" id="summaryFinal">
  <h3>&#x1F393; Key Points &mdash; Punctuation</h3>
  <ul id="summaryList"></ul>
</div>
</div>
<script>
var STEPS = [{"icon": "\ud83c\uddea\ud83c\uddf8", "title": "Repaso en Espa\u00f1ol", "html": "<div class=\"section-label\">Paso 1</div>\n<div class=\"section-title\">Paso 1: \ud83c\uddea\ud83c\uddf8 Repaso en Espa\u00f1ol</div>\n<div class=\"section-desc\">En espa\u00f1ol y en ingl\u00e9s se usan los mismos signos de puntuaci\u00f3n b\u00e1sicos, pero con diferencias importantes en c\u00f3mo y d\u00f3nde se colocan.</div>\n<div class=\"compare-grid\">\n  <div class=\"compare-card esp\">\n    <h4>\ud83c\uddea\ud83c\uddf8 Espa\u00f1ol</h4>\n    <ul>\n      <li>\u00bfPuedes ayudarme? <em>(doble signo)</em></li>\n      <li>\u00a1Gracias! <em>(doble signo)</em></li>\n      <li>la queja <b>del</b> cliente</li>\n      <li>el informe <b>de los</b> agentes</li>\n    </ul>\n  </div>\n  <div class=\"compare-card eng\">\n    <h4>\ud83c\uddec\ud83c\udde7 English</h4>\n    <ul>\n      <li>Can you help me? <em>(solo al final)</em></li>\n      <li>Thank you! <em>(solo al final)</em></li>\n      <li><b>the customer's</b> complaint</li>\n      <li><b>the agents'</b> reports</li>\n    </ul>\n  </div>\n</div>\n<div class=\"tip-card\"><strong>\ud83d\udca1 Diferencias clave:</strong> En ingl\u00e9s (1) solo hay signos de puntuaci\u00f3n al <b>final</b>, no al inicio \u00b7 (2) el posesivo usa <b>ap\u00f3strofe + s</b> \u00b7 (3) las contracciones tambi\u00e9n usan ap\u00f3strofe para marcar letras omitidas.</div>\n<div class=\"punct-intro-grid\">\n  <div class=\"pig-item pig-comma\">\n    <div class=\"pig-symbol\">,</div>\n    <div class=\"pig-name\">Comma</div>\n    <div class=\"pig-use\">Listas \u00b7 Cl\u00e1usulas \u00b7 Conjunciones</div>\n  </div>\n  <div class=\"pig-item pig-period\">\n    <div class=\"pig-symbol\">.</div>\n    <div class=\"pig-name\">Period / Full stop</div>\n    <div class=\"pig-use\">Final de oraci\u00f3n</div>\n  </div>\n  <div class=\"pig-item pig-question\">\n    <div class=\"pig-symbol\">?</div>\n    <div class=\"pig-name\">Question mark</div>\n    <div class=\"pig-use\">Preguntas directas</div>\n  </div>\n  <div class=\"pig-item pig-exclaim\">\n    <div class=\"pig-symbol\">!</div>\n    <div class=\"pig-name\">Exclamation mark</div>\n    <div class=\"pig-use\">\u00c9nfasis \u00b7 Emoci\u00f3n \u00b7 Urgencia</div>\n  </div>\n  <div class=\"pig-item pig-apos\">\n    <div class=\"pig-symbol\">'</div>\n    <div class=\"pig-name\">Apostrophe</div>\n    <div class=\"pig-use\">Contracci\u00f3n \u00b7 Posesivo</div>\n  </div>\n</div>"}, {"icon": "\ud83e\udd1d", "title": "Similitudes", "html": "<div class=\"section-label\">Paso 2</div>\n<div class=\"section-title\">Paso 2: \ud83e\udd1d Similitudes ESP \u2194 ENG</div>\n<div class=\"section-desc\">Most punctuation marks serve the same purpose in both languages \u2014 the differences are mostly about where they appear.</div>\n<table class=\"g-table\">\n  <tr><th>Signo</th><th>\ud83c\uddea\ud83c\uddf8 Espa\u00f1ol</th><th>\ud83c\uddec\ud83c\udde7 English</th></tr>\n  <tr><td>Coma en lista</td><td>formularios, quejas, facturas</td><td>forms, complaints, <span class=\"g-comp\">invoices</span></td></tr>\n  <tr><td>Punto final</td><td>Gracias por su llamada.</td><td>Thank you for your call.</td></tr>\n  <tr><td>Pregunta (final)</td><td>\u00bfPuedes ayudarme?</td><td>Can you help me<span class=\"g-quest\">?</span></td></tr>\n  <tr><td>Posesivo</td><td>el formulario del cliente</td><td>the customer<span class=\"g-comp\">'s</span> form</td></tr>\n  <tr><td>Contracci\u00f3n</td><td>no existe igual</td><td>I<span class=\"g-comp\">'m</span> / don<span class=\"g-comp\">'t</span> / it<span class=\"g-comp\">'s</span></td></tr>\n</table>\n<div class=\"section-label\">La coma \u2014 4 usos principales</div>\n<div class=\"comma-uses\">\n  <div class=\"cu-item\">\n    <div class=\"cu-num\">1</div>\n    <div class=\"cu-use\">Lista de 3+ elementos</div>\n    <div class=\"cu-ex\">Please bring your ID<span class=\"pu-comma\">,</span> your form<span class=\"pu-comma\">,</span> and your reference number.</div>\n  </div>\n  <div class=\"cu-item\">\n    <div class=\"cu-num\">2</div>\n    <div class=\"cu-use\">Cl\u00e1usula introductoria</div>\n    <div class=\"cu-ex\">After reviewing your case<span class=\"pu-comma\">,</span> we found an error in your account.</div>\n  </div>\n  <div class=\"cu-item\">\n    <div class=\"cu-num\">3</div>\n    <div class=\"cu-use\">Conjunciones (but/and/so)</div>\n    <div class=\"cu-ex\">I checked your account<span class=\"pu-comma\">,</span> but I could not find the payment.</div>\n  </div>\n  <div class=\"cu-item\">\n    <div class=\"cu-num\">4</div>\n    <div class=\"cu-use\">Vocativo (nombre directo)</div>\n    <div class=\"cu-ex\">Thank you<span class=\"pu-comma\">,</span> Mr. Garc\u00eda<span class=\"pu-comma\">,</span> for your patience.</div>\n  </div>\n</div>"}, {"icon": "\u26a1", "title": "Diferencias", "html": "<div class=\"section-label\">Paso 3</div>\n<div class=\"section-title\">Paso 3: \u26a1 Diferencias Importantes</div>\n<table class=\"g-table\">\n  <tr><th>\ud83c\uddea\ud83c\uddf8 Espa\u00f1ol</th><th>\ud83c\uddec\ud83c\udde7 English</th><th>\ud83d\udca1 Diferencia</th></tr>\n  <tr><td>\u00bfPuedes ayudarme?</td><td>Can you help me?</td><td>Solo ? al final \u2014 no \u00bf al inicio</td></tr>\n  <tr><td>\u00a1Gracias!</td><td>Thank you!</td><td>Solo ! al final \u2014 no \u00a1 al inicio</td></tr>\n  <tr><td>el informe del gerente</td><td>the manager<b>'s</b> report</td><td>Posesivo: 's (singular)</td></tr>\n  <tr><td>el informe de los agentes</td><td>the agents<b>'</b> report</td><td>Posesivo: s' (plural)</td></tr>\n  <tr><td>\u2014 (no existe igual)</td><td>I<b>'m</b> / do<b>n't</b> / it<b>'s</b></td><td>Contracci\u00f3n: ap\u00f3strofe marca omisi\u00f3n</td></tr>\n</table>\n<div class=\"alert-card\">\n  <div class=\"atitle\">\u26a0\ufe0f Las trampas m\u00e1s comunes del ap\u00f3strofe</div>\n  <div class=\"apostrophe-traps\">\n    <div class=\"at-pair\">\n      <div class=\"at-header\">it's vs its</div>\n      <div class=\"at-good\">\u2705 <b>It's</b> a billing error. <em>= It IS a billing error.</em></div>\n      <div class=\"at-good\">\u2705 The system has lost <b>its</b> data. <em>= posesivo de \"it\"</em></div>\n      <div class=\"at-bad\">\u274c The form has lost <b>it's</b> data. <em>(incorrecto \u2014 posesivo sin ap\u00f3strofe)</em></div>\n    </div>\n    <div class=\"at-pair\">\n      <div class=\"at-header\">who's vs whose</div>\n      <div class=\"at-good\">\u2705 <b>Who's</b> responsible? <em>= Who IS responsible?</em></div>\n      <div class=\"at-good\">\u2705 <b>Whose</b> account is this? <em>= posesivo de \"who\"</em></div>\n      <div class=\"at-bad\">\u274c <b>Who's</b> account is this? <em>(incorrecto \u2014 confunde contracci\u00f3n con posesivo)</em></div>\n    </div>\n    <div class=\"at-pair\">\n      <div class=\"at-header\">Plural simple \u2014 sin ap\u00f3strofe</div>\n      <div class=\"at-good\">\u2705 Three <b>forms</b> are missing. <em>(plural simple)</em></div>\n      <div class=\"at-bad\">\u274c Three <b>form's</b> are missing. <em>(incorrecto \u2014 ap\u00f3strofe innecesario)</em></div>\n      <div class=\"at-good\">\u2705 The <b>form's</b> content is correct. <em>(posesivo: el contenido del formulario)</em></div>\n    </div>\n  </div>\n</div>\n<div class=\"section-label\">Posesivo singular vs plural</div>\n<div class=\"possessive-visual\">\n  <div class=\"pv-row\">\n    <div class=\"pv-type\">Singular (una persona/cosa)</div>\n    <div class=\"pv-rule\">noun + <b>'s</b></div>\n    <div class=\"pv-ex\">the <b>manager's</b> office \u00b7 the <b>customer's</b> complaint</div>\n  </div>\n  <div class=\"pv-row\">\n    <div class=\"pv-type\">Plural regular (\u2192 s)</div>\n    <div class=\"pv-rule\">noun<b>s'</b> (solo ap\u00f3strofe)</div>\n    <div class=\"pv-ex\">the <b>agents'</b> reports \u00b7 the <b>customers'</b> feedback</div>\n  </div>\n  <div class=\"pv-row\">\n    <div class=\"pv-type\">Plural irregular (children, men)</div>\n    <div class=\"pv-rule\">noun + <b>'s</b></div>\n    <div class=\"pv-ex\">the <b>children's</b> area \u00b7 the <b>men's</b> department</div>\n  </div>\n</div>"}, {"icon": "\ud83d\udca1", "title": "Consejos", "html": "<div class=\"section-label\">Paso 4</div>\n<div class=\"section-title\">Paso 4: \ud83d\udca1 Consejos Pr\u00e1cticos</div>\n<div class=\"tip-card\"><strong>Tip 1 \u2014 Test del ap\u00f3strofe de contracci\u00f3n:</strong> \u00bfPuedes expandir la contracci\u00f3n? <em>It's \u2192 It is</em> \u2705 \u00bfTiene sentido? Entonces usa ap\u00f3strofe. <em>Its data \u2192 It is data</em> \u274c No tiene sentido \u2192 sin ap\u00f3strofe. Aplica a: it's/its, who's/whose, they're/their, you're/your.</div>\n<div class=\"tip-card\"><strong>Tip 2 \u2014 Posesivo: singular o plural primero:</strong> Primero decide si el poseedor es singular o plural. Singular \u2192 a\u00f1ade 's: <em>the manager's report</em>. Plural regular (ya termina en -s) \u2192 solo a\u00f1ade ': <em>the managers' report</em> (varios gerentes).</div>\n<div class=\"tip-card\"><strong>Tip 3 \u2014 Coma antes de but/and/so:</strong> Cuando \"but\", \"and\", o \"so\" conectan dos oraciones completas, va una coma antes: <em>\"I checked the account<b>,</b> but I found no error.\"</em> Si solo conecta dos palabras o frases cortas, no se necesita coma.</div>\n<div class=\"tip-card\"><strong>Tip 4 \u2014 En correos profesionales:</strong> Usa coma despu\u00e9s del saludo inicial y del cierre. <em>\"Dear Mr. Garc\u00eda<b>,</b>\"</em> / <em>\"Best regards<b>,</b>\"</em>. En ingl\u00e9s americano se usa coma; en ingl\u00e9s brit\u00e1nico a veces se omite, pero poner coma nunca est\u00e1 mal.</div>\n<div class=\"section-label\">Contracciones comunes \u2014 referencia r\u00e1pida</div>\n<div class=\"contractions-grid\">\n  <div class=\"cg-item\"><div class=\"cg-full\">I am</div><div class=\"cg-short\">I'm</div></div>\n  <div class=\"cg-item\"><div class=\"cg-full\">I have</div><div class=\"cg-short\">I've</div></div>\n  <div class=\"cg-item\"><div class=\"cg-full\">I will</div><div class=\"cg-short\">I'll</div></div>\n  <div class=\"cg-item\"><div class=\"cg-full\">do not</div><div class=\"cg-short\">don't</div></div>\n  <div class=\"cg-item\"><div class=\"cg-full\">does not</div><div class=\"cg-short\">doesn't</div></div>\n  <div class=\"cg-item\"><div class=\"cg-full\">it is</div><div class=\"cg-short\">it's</div></div>\n  <div class=\"cg-item\"><div class=\"cg-full\">cannot</div><div class=\"cg-short\">can't</div></div>\n  <div class=\"cg-item\"><div class=\"cg-full\">will not</div><div class=\"cg-short\">won't</div></div>\n  <div class=\"cg-item\"><div class=\"cg-full\">would not</div><div class=\"cg-short\">wouldn't</div></div>\n  <div class=\"cg-item\"><div class=\"cg-full\">they are</div><div class=\"cg-short\">they're</div></div>\n  <div class=\"cg-item\"><div class=\"cg-full\">you are</div><div class=\"cg-short\">you're</div></div>\n  <div class=\"cg-item\"><div class=\"cg-full\">have not</div><div class=\"cg-short\">haven't</div></div>\n</div>"}, {"icon": "\u2728", "title": "Pr\u00e1ctica Final", "html": "<div class=\"section-label\">Paso 5</div>\n<div class=\"section-title\">Paso 5: \u2728 Pr\u00e1ctica Final</div>\n<div class=\"formula-box\">\n  <span class=\"g-comp\">Comma (,)</span>: lista \u00b7 cl\u00e1usula intro \u00b7 but/and/so \u00b7 vocativo<br>\n  <span class=\"g-comp\">Apostrophe ('):</span> contracci\u00f3n (it'<b>s</b> = it is) \u00b7 posesivo (manager'<b>s</b>)<br>\n  <span class=\"g-neg\">NO apostrophe:</span> plural simple (forms) \u00b7 posesivo de \"it\" (its)\n</div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\ud83d\udce7</div><div><div class=\"en\">Dear Mr. Garc\u00eda<span class=\"pu-comma\">,</span> thank you for your patience<span class=\"pu-period\">.</span></div><div class=\"es\">Vocativo: coma despu\u00e9s del nombre. Punto al final.</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\ud83d\udccb</div><div><div class=\"en\">Please submit your form<span class=\"pu-comma\">,</span> your ID<span class=\"pu-comma\">,</span> and your reference number<span class=\"pu-period\">.</span></div><div class=\"es\">Lista de 3 elementos: comas entre cada uno.</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\ud83d\udc64</div><div><div class=\"en\">The <span class=\"g-comp\">customer's</span> complaint was resolved<span class=\"pu-comma\">,</span> but <span class=\"g-comp\">it's</span> not the first time this has happened<span class=\"pu-period\">.</span></div><div class=\"es\">customer's = posesivo singular \u00b7 it's = it is \u00b7 coma antes de but</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\u2753</div><div><div class=\"en\">Could you please check the <span class=\"g-comp\">agents'</span> records<span class=\"pu-question\">?</span></div><div class=\"es\">agents' = posesivo plural (ya termina en s, solo se a\u00f1ade ')</div></div></div>\n<div class=\"ex-row ex-wrong\"><div class=\"icon\">\u274c</div><div><div class=\"en\">Three form's are missing. / Its a billing error. / \u00bfCan you help me?</div><div class=\"es\">Errores: form's (plural sin posesivo) \u00b7 Its \u2192 It's (contracci\u00f3n) \u00b7 \u00bf no existe en ingl\u00e9s</div></div></div>\n<div class=\"alert-card\">\n  <div class=\"atitle\">\u26a0\ufe0f 3 Errores Comunes</div>\n  <p>\u274c \"Three <b>form's</b> are missing\" \u2192 \u2705 \"Three <b>forms</b> are missing\" (plural simple \u2014 sin ap\u00f3strofe)<br>\n  \u274c \"<b>Its</b> a billing error\" \u2192 \u2705 \"<b>It's</b> a billing error\" (contracci\u00f3n it is \u2192 it's)<br>\n  \u274c \"The system's <b>data's</b> are correct\" \u2192 \u2705 \"The system's <b>data</b> are correct\" (data = plural ya)</p>\n</div>"}];
var EXERCISES = [[{"q": "En ingl\u00e9s, \u00bfc\u00f3mo se escribe una pregunta?", "a": "b", "o": ["\u00bfCan you help me?", "Can you help me?"], "fc": "En ingl\u00e9s solo hay ? al final. El signo \u00bf al inicio no existe en ingl\u00e9s.", "fi": "El signo \u00bf es exclusivo del espa\u00f1ol. En ingl\u00e9s siempre ? al final solamente.", "ex": "Can you help me? / Is the form ready?", "tip": "Ingl\u00e9s: solo ? al final \u2014 nunca \u00bf al inicio"}, {"q": "\u00bfCu\u00e1l es el uso correcto del ap\u00f3strofe en \"the manager___s report\"?", "a": "a", "o": ["the manager's report (posesivo singular)", "the managers report (sin ap\u00f3strofe)"], "fc": "Posesivo singular: manager's. El ap\u00f3strofe + s indica que el informe pertenece al gerente.", "fi": "Sin ap\u00f3strofe no hay posesivo. Managers report no tiene la relaci\u00f3n de posesi\u00f3n.", "ex": "the manager's report = el informe del gerente", "tip": "Posesivo singular \u2192 noun + 's"}, {"q": "\"I_m calling about my complaint.\" \u00bfQu\u00e9 va en el espacio?", "a": "b", "o": ["Im (sin ap\u00f3strofe)", "'m (ap\u00f3strofe + m)"], "fc": "I'm = I am (contracci\u00f3n). El ap\u00f3strofe marca la 'a' omitida de 'am'.", "fi": "Im sin ap\u00f3strofe no es una contracci\u00f3n correcta. Siempre I'm con ap\u00f3strofe.", "ex": "I'm calling about my complaint. = I am calling...", "tip": "Contracci\u00f3n: ap\u00f3strofe marca letras omitidas"}, {"q": "\"Please bring your ID___ your form___ and your receipt.\" \u00bfC\u00f3mo puntuar la lista?", "a": "a", "o": ["ID, your form, and your receipt", "ID your form and your receipt"], "fc": "Lista de 3+ elementos: coma despu\u00e9s de cada elemento. ID, form, and receipt.", "fi": "Sin comas la lista es dif\u00edcil de leer. Las comas separan cada elemento de la lista.", "ex": "Please bring your ID, your form, and your receipt.", "tip": "Lista: coma entre cada elemento"}, {"q": "\"Thank___ you!\" \u2014 \u00bfCu\u00e1ntos signos de exclamaci\u00f3n se necesitan?", "a": "b", "o": ["\u00a1Thank you! (inicio y final)", "Thank you! (solo al final)"], "fc": "En ingl\u00e9s solo ! al final. El signo \u00a1 no existe en ingl\u00e9s.", "fi": "\u00a1 es exclusivo del espa\u00f1ol. Ingl\u00e9s: solo ! al final.", "ex": "Thank you! / Great news! (solo al final)", "tip": "Ingl\u00e9s: solo ! al final \u2014 nunca \u00a1 al inicio"}], [{"q": "Coma correcta en: \"After reviewing your case___ we found an error.\"", "a": "a", "o": ["After reviewing your case, we found an error.", "After reviewing your case we found an error."], "fc": "Cl\u00e1usula introductoria (After reviewing your case) \u2192 coma antes de la oraci\u00f3n principal.", "fi": "Sin coma despu\u00e9s de la cl\u00e1usula introductoria, la oraci\u00f3n es dif\u00edcil de leer.", "ex": "After reviewing your account, we identified the problem.", "tip": "Cl\u00e1usula introductoria \u2192 coma antes de la oraci\u00f3n principal"}, {"q": "\"I checked the account___ but I could not find the payment.\"", "a": "b", "o": ["account but (sin coma)", "account, but (coma antes de but)"], "fc": "Coma antes de but cuando conecta dos oraciones completas. I checked... (oraci\u00f3n) + I could not find... (oraci\u00f3n).", "fi": "Sin coma antes de but cuando conecta dos oraciones completas es un error com\u00fan.", "ex": "I checked the account, but I found no error.", "tip": "Coma + but cuando conecta dos oraciones completas"}, {"q": "\"Thank you___ Ms. Smith___ for your patience.\"", "a": "a", "o": ["Thank you, Ms. Smith, for your patience.", "Thank you Ms. Smith for your patience."], "fc": "Vocativo: se ponen comas alrededor del nombre cuando se dirige a alguien directamente.", "fi": "Sin comas el nombre puede confundirse con parte del sujeto o complemento.", "ex": "Thank you, Mr. Garc\u00eda, for waiting. / Please hold, Ms. Smith.", "tip": "Vocativo (nombre directo) \u2192 comas antes y despu\u00e9s del nombre"}, {"q": "Contracci\u00f3n correcta de \"do not\":", "a": "b", "o": ["dont", "don't"], "fc": "Don't = do not. El ap\u00f3strofe reemplaza la 'o' omitida de 'not'.", "fi": "Dont sin ap\u00f3strofe no es una contracci\u00f3n correcta.", "ex": "I don't have your reference number. / We don't process claims on weekends.", "tip": "don't = do + not (ap\u00f3strofe en lugar de la 'o' de not)"}, {"q": "La coma se usa en listas cuando hay:", "a": "b", "o": ["Solo 2 elementos: forms and IDs", "3 o m\u00e1s elementos: forms, IDs, and receipts"], "fc": "La coma en lista se usa con 3 o m\u00e1s elementos. Con 2 elementos solo se usa 'and'.", "fi": "Con 2 elementos no se necesita coma: forms and IDs. Coma con 3+.", "ex": "forms and IDs (2 elementos) / forms, IDs, and receipts (3+)", "tip": "Lista: coma con 3+ elementos. Solo 'and' con 2 elementos."}], [{"q": "\"___ a system error.\" \u00bfIt's o Its?", "a": "a", "o": ["It's a system error.", "Its a system error."], "fc": "It's = It is. Prueba: 'It is a system error' \u2705 \u2192 se puede contraer \u2192 It's.", "fi": "Its (sin ap\u00f3strofe) es el posesivo de it: 'the system lost its data'. Aqu\u00ed necesitamos 'It is'.", "ex": "It's a billing error. = It is a billing error.", "tip": "Test: \u00bfPuedes decir 'It IS'? \u2192 it's (con ap\u00f3strofe)"}, {"q": "\"The system lost ___ data.\" \u00bfIt's o Its?", "a": "b", "o": ["it's data", "its data"], "fc": "Its (sin ap\u00f3strofe) = posesivo de it. 'The system's data' = 'its data'. Sin ap\u00f3strofe.", "fi": "It's = It is. 'The system lost it is data' \u274c no tiene sentido \u2192 posesivo \u2192 its.", "ex": "The system lost its data. (posesivo de it \u2014 sin ap\u00f3strofe)", "tip": "Posesivo de it \u2192 its (sin ap\u00f3strofe)"}, {"q": "\"___ account is this?\" \u00bfWho's o Whose?", "a": "b", "o": ["Who's account is this?", "Whose account is this?"], "fc": "Whose = posesivo interrogativo. 'Who is account' \u274c no tiene sentido \u2192 posesivo \u2192 whose.", "fi": "Who's = Who is. 'Who is account is this?' \u274c no tiene sentido. El posesivo es whose.", "ex": "Whose account is this? (= \u00bfDe qui\u00e9n es esta cuenta?)", "tip": "Posesivo interrogativo \u2192 whose (sin ap\u00f3strofe)"}, {"q": "\"The ___ reports need updating.\" (varios agentes, posesivo plural)", "a": "b", "o": ["agent's reports", "agents' reports"], "fc": "Plural regular (agents, ya termina en s) \u2192 solo a\u00f1adir ap\u00f3strofe despu\u00e9s: agents'.", "fi": "Agent's = posesivo singular (un agente). Agents' = posesivo plural (varios agentes).", "ex": "the agent's report (uno) / the agents' reports (varios)", "tip": "Plural regular \u2192 s' (ap\u00f3strofe despu\u00e9s de la s)"}, {"q": "\"Three ___ are missing from your application.\"", "a": "a", "o": ["forms", "form's"], "fc": "Plural simple: forms (sin ap\u00f3strofe). El ap\u00f3strofe de posesivo no va en plurales simples.", "fi": "Form's indica posesivo ('el X del formulario'). Para plural simple, solo forms.", "ex": "Three forms are missing. (plural simple \u2014 sin ap\u00f3strofe)", "tip": "Plural simple \u2192 NO ap\u00f3strofe (forms, IDs, receipts)"}], [{"q": "\"___ responsible for this case?\" \u00bfWho's o Whose?", "a": "a", "o": ["Who's responsible?", "Whose responsible?"], "fc": "Who's = Who is. 'Who is responsible?' \u2705 \u2192 se puede contraer \u2192 Who's.", "fi": "Whose = posesivo. 'Whose responsible' \u274c no tiene sentido aqu\u00ed. Necesitamos 'Who is'.", "ex": "Who's responsible for this complaint? = Who is responsible?", "tip": "\u00bfPuedes decir 'Who IS'? \u2192 who's (con ap\u00f3strofe)"}, {"q": "\"I checked your account___ and I found the error.\" \u00bfComa antes de 'and'?", "a": "b", "o": ["I checked your account and I found the error. (sin coma)", "I checked your account, and I found the error. (coma)"], "fc": "Coma opcional antes de 'and' cuando conecta dos oraciones completas. Ambas son correctas pero la coma ayuda a claridad.", "fi": "Sin coma tambi\u00e9n es correcto. La coma es opcional con 'and' (a diferencia de 'but' donde se prefiere).", "ex": "I checked your account, and I found the error. / I checked and found the error.", "tip": "Coma + and (dos oraciones completas) = opcional pero recomendado"}, {"q": "Email de servicio: \"Dear Ms. Johnson___ Thank you for contacting us.\"", "a": "a", "o": ["Dear Ms. Johnson, Thank you...", "Dear Ms. Johnson. Thank you..."], "fc": "Coma despu\u00e9s del saludo en cartas/emails formales. Dear [nombre], \u2192 coma, no punto.", "fi": "Punto despu\u00e9s del saludo ser\u00eda m\u00e1s bien norteamericano en algunas convenciones, pero la coma es est\u00e1ndar.", "ex": "Dear Mr. Garc\u00eda, / Dear Ms. Smith,", "tip": "Saludo de email/carta \u2192 Dear [nombre], (coma, no punto)"}, {"q": "\"The ___ feedback was positive.\" (varios clientes, posesivo plural)", "a": "b", "o": ["customer's feedback", "customers' feedback"], "fc": "Plural regular (customers, ya termina en s) \u2192 ap\u00f3strofe despu\u00e9s: customers'.", "fi": "Customer's = posesivo singular (un cliente). Customers' = posesivo plural (varios).", "ex": "the customer's feedback (uno) / the customers' feedback (varios)", "tip": "Plural regular + posesivo \u2192 s' (ap\u00f3strofe despu\u00e9s de la s existente)"}, {"q": "\"___ a great idea to check your spam folder.\"", "a": "a", "o": ["It's a great idea", "Its a great idea"], "fc": "It's = It is. 'It is a great idea to check...' \u2705 \u2192 contracci\u00f3n \u2192 It's.", "fi": "Its sin ap\u00f3strofe es el posesivo de it. 'The folder and its settings' = posesivo.", "ex": "It's a great idea. = It is a great idea.", "tip": "It is \u2192 It's (contracci\u00f3n con ap\u00f3strofe)"}], [{"q": "Elige la oraci\u00f3n correctamente puntuada:", "a": "b", "o": ["The manager's are checking the forms.", "The managers are checking the forms."], "fc": "Manager's = posesivo singular ('del gerente'). Aqu\u00ed solo queremos el plural del sujeto: managers.", "fi": "Manager's implica posesivo. Para plural simple del sujeto: managers (sin ap\u00f3strofe).", "ex": "The managers are checking the forms. (plural sujeto \u2014 sin ap\u00f3strofe)", "tip": "Plural simple como sujeto \u2192 NO ap\u00f3strofe"}, {"q": "\"Please submit your complaint___ your ID___ and your bank statement.\"", "a": "a", "o": ["complaint, your ID, and your bank statement.", "complaint your ID and your bank statement."], "fc": "Lista de 3 elementos \u2192 comas entre cada uno. Coma tambi\u00e9n antes de 'and' (Oxford comma).", "fi": "Sin comas la lista de instrucciones es confusa y dif\u00edcil de seguir.", "ex": "Please submit your complaint, your ID, and your bank statement.", "tip": "Lista de 3+ \u2192 coma entre cada elemento"}, {"q": "\"___ not our policy to charge twice.\"", "a": "b", "o": ["Its not our policy", "It's not our policy"], "fc": "It's = It is. 'It is not our policy' \u2705 \u2192 contracci\u00f3n \u2192 It's not.", "fi": "Its (sin ap\u00f3strofe) es posesivo. 'It is not our policy' necesita contracci\u00f3n con ap\u00f3strofe.", "ex": "It's not our policy to charge twice. = It is not our policy.", "tip": "It is \u2192 It's (siempre con ap\u00f3strofe en contracci\u00f3n)"}, {"q": "\"We have reviewed the ___ complaint and the ___ decision.\" (un cliente, varios directores)", "a": "a", "o": ["customer's complaint / directors' decision", "customers' complaint / director's decision"], "fc": "Un cliente \u2192 customer's (singular 's). Varios directores \u2192 directors' (plural s').", "fi": "Customer's = singular correcto. Director's ser\u00eda singular (un director). Plural: directors'.", "ex": "the customer's complaint (uno) / the directors' decision (varios)", "tip": "Singular \u2192 's \u00b7 Plural regular \u2192 s'"}, {"q": "Elige el email correctamente puntuado:", "a": "b", "o": ["Dear Mr. Smith. I cant find you're account.", "Dear Mr. Smith, I can't find your account."], "fc": "Dear Mr. Smith, (coma) \u00b7 can't (contracci\u00f3n correcta) \u00b7 your (posesivo de you, sin ap\u00f3strofe).", "fi": "Punto despu\u00e9s del saludo (incorrecto), cant (falta ap\u00f3strofe), you're (= you are, no posesivo).", "ex": "Dear Mr. Smith, I can't find your account.", "tip": "Saludo \u2192 coma \u00b7 can't \u2192 ap\u00f3strofe \u00b7 your (posesivo) vs you're (you are)"}]];
var SUMMARY = ["<b>Coma (,)</b> \u2192 listas, cl\u00e1usulas introductorias, conjunciones (but/and/so/yet), vocativos", "<b>Punto (.)</b> \u2192 final de oraci\u00f3n \u00b7 Signo de interrogaci\u00f3n (?): preguntas directas \u00b7 Exclamaci\u00f3n (!): urgencia/emoci\u00f3n", "<b>Ap\u00f3strofe de contracci\u00f3n:</b> I'm, don't, it's, can't \u2014 marca letras omitidas", "<b>Ap\u00f3strofe posesivo:</b> the manager's office, the customer's complaint, the agents' reports (plural)", "<b>Trampa cl\u00e1sica:</b> it's (it is) vs its (posesivo sin ap\u00f3strofe) \u00b7 who's (who is) vs whose (posesivo)", "<b>NO ap\u00f3strofe en plurales simples:</b> forms \u2705 \u00b7 form's \u274c (a menos que sea posesivo)", "<b>En ingl\u00e9s NO se usa:</b> \u00bf...? ni \u00a1...! \u2014 solo ? y ! al final de la oraci\u00f3n"];
var curStep = 0;
var scores = {};
var answered = {};

function renderStepTabs() {
    var c = document.getElementById("stepTabs");
    c.innerHTML = "";
    STEPS.forEach(function(s, i) {
        var k = "s" + i;
        var allDone = [0,1,2,3,4].every(function(j){ return answered[k+"e"+j]; });
        var b = document.createElement("button");
        b.className = "step-tab" + (i === curStep ? " active" : "") + (allDone && i !== curStep ? " done" : "");
        b.textContent = (i + 1) + ". " + s.icon + " " + s.title;
        b.addEventListener("click", (function(idx){ return function(){
            curStep = idx;
            renderStepTabs();
            renderCard();
            document.getElementById("summaryFinal").classList.remove("show");
        };})(i));
        c.appendChild(b);
    });
}

function renderCard() {
    var s = STEPS[curStep];
    var exs = EXERCISES[curStep];
    var k = "s" + curStep;
    if (scores[k] === undefined) scores[k] = 0;
    var h = "<div class=\"card\">" + s.html;
    h += "<div class=\"ex-section\"><h3>&#x270F;&#xFE0F; Exercises &mdash; " + s.title + "</h3>";
    exs.forEach(function(e, i) {
        var eid = k + "e" + i;
        var longOpts = e.o[0].length > 44 || e.o[1].length > 44;
        var gs = longOpts ? " style=\"grid-template-columns:1fr\"" : "";
        h += "<div class=\"exercise\" id=\"" + eid + "\">";
        h += "<div class=\"exercise-q\">" + (i+1) + ". " + e.q + "</div>";
        h += "<div class=\"opts\"" + gs + ">";
        h += "<button class=\"opt-btn\" id=\"" + eid + "ba\">a) " + e.o[0] + "</button>";
        h += "<button class=\"opt-btn\" id=\"" + eid + "bb\">b) " + e.o[1] + "</button>";
        h += "</div>";
        var ct = e.a === "a" ? e.o[0] : e.o[1];
        h += "<div class=\"fb fb-ok\" id=\"fbok-" + eid + "\">";
        h += "<div class=\"fb-header\"><span class=\"fb-icon\">&#x1F389;</span> Correct!</div>";
        h += "<div class=\"fb-body\">";
        h += "<div class=\"fb-row\"><span class=\"fb-dot\">&#x2705;</span><div class=\"fb-text\"><span class=\"fb-correct-answer\">" + ct + "</span> &mdash; " + e.fc + "</div></div>";
        h += "<div class=\"fb-row\"><span class=\"fb-dot\">&#x1F4A1;</span><div class=\"fb-text\">The other option: " + e.fi + "</div></div>";
        if (e.ex) h += "<div class=\"fb-example\">&#x1F4DD; " + e.ex + "</div>";
        if (e.tip) h += "<div class=\"fb-tip\"><strong>&#x1F4A1; Remember:</strong> " + e.tip + "</div>";
        h += "</div></div>";
        h += "<div class=\"fb fb-bad\" id=\"fbbad-" + eid + "\">";
        h += "<div class=\"fb-header\"><span class=\"fb-icon\">&#x1F615;</span> Not quite right</div>";
        h += "<div class=\"fb-body\">";
        h += "<div class=\"fb-row\"><span class=\"fb-dot\">&#x274C;</span><div class=\"fb-text\"><span class=\"fb-wrong-reason\">" + e.fi + "</span></div></div>";
        h += "<div class=\"fb-row\"><span class=\"fb-dot\">&#x2705;</span><div class=\"fb-text\">The correct answer is <span class=\"fb-correct-answer\">" + ct + "</span> &mdash; " + e.fc + "</div></div>";
        if (e.ex) h += "<div class=\"fb-example\">&#x1F4DD; " + e.ex + "</div>";
        if (e.tip) h += "<div class=\"fb-tip\"><strong>&#x1F4A1; Remember:</strong> " + e.tip + "</div>";
        h += "</div></div></div>";
    });
    h += "<div class=\"score-bar\"><div class=\"num\" id=\"sc-" + k + "\">0/5</div><div class=\"lbl\">Score</div></div>";
    h += "</div></div>";
    document.getElementById("cardArea").innerHTML = h;
    exs.forEach(function(e, i) {
        var eid = k + "e" + i;
        document.getElementById(eid + "ba").addEventListener("click", (function(id){ return function(){ chk(id,"a"); }; })(eid));
        document.getElementById(eid + "bb").addEventListener("click", (function(id){ return function(){ chk(id,"b"); }; })(eid));
    });
}

function chk(eid, sel) {
    if (answered[eid]) return;
    answered[eid] = true;
    var parts = eid.match(/s(\d+)e(\d+)/);
    var si = parseInt(parts[1]);
    var ei = parseInt(parts[2]);
    var e = EXERCISES[si][ei];
    var k = "s" + si;
    var ex = document.getElementById(eid);
    var btnA = document.getElementById(eid + "ba");
    var btnB = document.getElementById(eid + "bb");
    btnA.disabled = true;
    btnB.disabled = true;
    if (sel === e.a) {
        ex.classList.add("correct");
        (sel === "a" ? btnA : btnB).classList.add("sel-ok");
        document.getElementById("fbok-" + eid).classList.add("show");
        scores[k]++;
    } else {
        ex.classList.add("incorrect");
        (sel === "a" ? btnA : btnB).classList.add("sel-bad");
        (e.a === "a" ? btnA : btnB).classList.add("show-ok");
        document.getElementById("fbbad-" + eid).classList.add("show");
    }
    document.getElementById("sc-" + k).textContent = scores[k] + "/5";
    var allDone = [0,1,2,3,4].every(function(i){ return answered[k + "e" + i]; });
    if (allDone && curStep === 4) {
        setTimeout(function() {
            var sf = document.getElementById("summaryFinal");
            document.getElementById("summaryList").innerHTML = SUMMARY.map(function(s){ return "<li>" + s + "</li>"; }).join("");
            sf.classList.add("show");
            sf.scrollIntoView({behavior:"smooth"});
        }, 600);
    }
}

renderStepTabs();
renderCard();
</script>
</body>
</html>
