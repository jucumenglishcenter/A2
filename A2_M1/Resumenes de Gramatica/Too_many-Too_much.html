<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grammar Summary — too many / too much | A2 | JUCUM</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Fredoka:wght@400;500;600;700&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
:root{
--bg:#FAFAF6;--card:#fff;--text:#2A2A2A;--text-soft:#777;--border:#E8E5DC;
--shadow:0 3px 16px rgba(0,0,0,.06);--radius:14px;
--lp:#4CAF50;--ld:#1B5E20;--ll:#E8F5E9;--lm:#C8E6C9;
--lg:linear-gradient(135deg,#388E3C,#4CAF50);--lglow:rgba(76,175,80,.15);
--badge-text:#1A3D1C;
--subj:#1565C0;--subj-bg:#E3F2FD;
--verb:#E53935;--verb-bg:#FFEBEE;
--comp:#00897B;--comp-bg:#E0F2F1;
--neg:#AD1457;--neg-bg:#FCE4EC;
--quest:#7B1FA2;--quest-bg:#F3E5F5;
--ok:#2E7D32;--ok-bg:#E8F5E9;
--err:#C62828;--err-bg:#FFEBEE;
--note-bg:#F1F8E9;--note-border:#AED581;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Nunito",sans-serif;background:var(--bg);color:var(--text);line-height:1.7;padding:1.5rem 1rem;-webkit-font-smoothing:antialiased}
.container{max-width:800px;margin:0 auto}
.level-header{text-align:center;padding:2rem;border-radius:20px;color:#fff;position:relative;overflow:hidden;margin-bottom:1.2rem;background:var(--lg)}
.level-header::before{content:"";position:absolute;top:-40%;right:-15%;width:250px;height:250px;background:rgba(255,255,255,.1);border-radius:50%}
.level-header h1{font-family:"Fredoka",sans-serif;font-size:1.8rem;font-weight:600;position:relative;z-index:1}
.level-header .module-name{font-family:"Fredoka",sans-serif;font-size:1.05rem;opacity:.95;position:relative;z-index:1;margin-top:.2rem}
.level-header .subtitle{opacity:.8;font-size:.83rem;position:relative;z-index:1;margin-top:.15rem}
.level-badge{display:inline-flex;align-items:center;gap:6px;font-size:.7rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;background:var(--ll);color:var(--badge-text);padding:4px 12px;border-radius:20px;border:1.5px solid var(--lm);margin-bottom:.8rem}
.step-tabs{display:flex;gap:.35rem;margin-bottom:1rem;flex-wrap:wrap}
.step-tab{padding:.45rem .85rem;border-radius:8px;font-size:.78rem;font-weight:700;cursor:pointer;border:2px solid var(--border);background:var(--card);transition:.2s;font-family:"Nunito",sans-serif}
.step-tab:hover{background:var(--ll)}
.step-tab.active{background:var(--ll);border-color:var(--lp);color:var(--ld)}
.step-tab.done{background:var(--ok-bg);border-color:var(--ok);color:var(--ok)}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.6rem;margin-bottom:1.2rem;box-shadow:var(--shadow);border-top:3.5px solid var(--lp);animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.section-label{display:flex;align-items:center;gap:.5rem;font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--ld);margin-bottom:.3rem;margin-top:1.1rem}
.section-label::before{content:"";width:20px;height:3px;background:var(--lp);border-radius:2px}
.section-label:first-child{margin-top:0}
.section-title{font-family:"Fredoka",sans-serif;font-size:1.25rem;font-weight:600;margin-bottom:.1rem}
.section-desc{font-size:.85rem;color:var(--text-soft);margin-bottom:1rem}
.g-subj{background:var(--subj-bg);color:var(--subj);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--subj)}
.g-verb{background:var(--verb-bg);color:var(--verb);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--verb)}
.g-comp{background:var(--comp-bg);color:var(--comp);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--comp)}
.g-neg{background:var(--neg-bg);color:var(--neg);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--neg)}
.g-quest{background:var(--quest-bg);color:var(--quest);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--quest)}
.g-table{width:100%;border-collapse:separate;border-spacing:0;margin:.8rem 0;border-radius:10px;overflow:hidden;font-size:.83rem;border:1px solid var(--border)}
.g-table th{background:var(--lg);color:#fff;padding:.65rem .6rem;font-size:.7rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
.g-table td{padding:.6rem;border-bottom:1px solid #f0f0f0;vertical-align:middle}
.g-table tr:nth-child(even) td{background:var(--ll)}
.g-table tr:last-child td{border-bottom:none}
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin:.8rem 0}
.compare-card{padding:1rem;border-radius:12px;text-align:center}
.compare-card.esp{background:var(--ll);border:2px solid var(--lm)}
.compare-card.eng{background:var(--subj-bg);border:2px solid #90CAF9}
.compare-card h4{font-family:"Fredoka",sans-serif;font-size:.85rem;margin-bottom:.5rem}
.compare-card.esp h4{color:var(--ld)}
.compare-card.eng h4{color:var(--subj)}
.compare-card ul{list-style:none;font-size:.82rem;color:var(--text-soft)}
.compare-card li{padding:3px 0}
.formula-box{background:var(--note-bg);border:2px solid var(--note-border);border-radius:12px;padding:1rem;margin:.8rem 0;text-align:center;font-family:"Fredoka",sans-serif;font-size:.93rem;color:var(--ld);line-height:2.2}
.tip-card{background:var(--ll);border-radius:10px;padding:.8rem 1rem;margin:.5rem 0;font-size:.83rem;border-left:3px solid var(--lp)}
.tip-card strong{color:var(--ld)}
.alert-card{background:var(--err-bg);border:2px solid #EF5350;border-radius:10px;padding:.8rem 1rem;margin:.8rem 0}
.alert-card .atitle{font-family:"Fredoka",sans-serif;color:var(--err);font-size:.82rem;margin-bottom:.3rem;font-weight:700}
.alert-card p{font-size:.82rem;color:#555;line-height:1.7}
.ex-row{display:flex;align-items:flex-start;gap:.6rem;padding:.6rem .8rem;border-radius:10px;margin:.4rem 0;font-size:.88rem}
.ex-row .icon{font-size:1.2rem;flex-shrink:0;margin-top:2px}
.ex-row .en{font-weight:700;color:var(--text)}
.ex-row .es{font-family:"Lora",serif;font-style:italic;font-size:.82rem;color:var(--text-soft);margin-top:1px}
.ex-right{border-left:3px solid var(--ok);background:var(--ok-bg)}
.ex-wrong{border-left:3px solid var(--err);background:var(--err-bg)}

/* TOO INTRO GRID */
.too-intro-grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin:1rem 0}
.tig-item{border-radius:14px;padding:1rem;text-align:center}
.tig-many{background:#FFF3E0;border:2px solid #FFCC02}
.tig-much{background:#FCE4EC;border:2px solid #F48FB1}
.tig-label{font-family:"Fredoka",sans-serif;font-size:1.1rem;font-weight:700;margin-bottom:.1rem}
.tig-many .tig-label{color:#E65100}
.tig-much .tig-label{color:#AD1457}
.tig-sub{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-soft);margin-bottom:.6rem}
.tig-examples{text-align:left;margin-bottom:.6rem}
.tig-ex{font-size:.8rem;color:var(--text-soft);padding:2px 0}
.tig-badge{display:inline-block;font-size:.72rem;font-weight:800;padding:3px 10px;border-radius:20px}
.tig-many .tig-badge{background:#E65100;color:#fff}
.tig-much .tig-badge{background:#AD1457;color:#fff}
/* MODULE VOCAB GRID */
.module-vocab-grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin:.9rem 0}
.mvg-col{border-radius:12px;overflow:hidden;border:2px solid var(--border)}
.mvg-many{border-color:#FFCC02}
.mvg-much{border-color:#F48FB1}
.mvg-header{padding:.55rem .8rem;font-family:"Fredoka",sans-serif;font-size:.8rem;font-weight:700;text-align:center}
.mvg-many .mvg-header{background:#FFF3E0;color:#E65100}
.mvg-much .mvg-header{background:#FCE4EC;color:#AD1457}
.mvg-item{padding:.38rem .8rem;font-size:.79rem;color:var(--text-soft);border-top:1px solid #f0f0f0}
.mvg-item:nth-child(even){background:#fafafa}
.mvg-q{font-weight:800;color:var(--neg)}
/* TOO VS VERY */
.too-vs-very{display:flex;flex-direction:column;gap:.5rem;margin-top:.6rem}
.tvv-row{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
.tvv-sent{padding:.5rem .8rem;border-radius:8px;font-size:.81rem}
.ok-sent{background:#F3E5F5;border:1.5px solid #CE93D8;color:#6A1B9A}
.bad-sent{background:var(--err-bg);border:1.5px solid #EF9A9A;color:var(--err)}
/* SOLUTION GRID */
.solution-grid{display:flex;flex-direction:column;gap:.45rem;margin:1rem 0}
.sg-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:.5rem;background:#fafafa;border-radius:10px;padding:.55rem .8rem;border:1px solid var(--border);font-size:.82rem}
.sg-prob{color:var(--err)}
.sg-arrow{font-size:1rem;color:var(--text-soft);font-weight:700;padding:0 .2rem}
.sg-sol{color:var(--ok);font-weight:700}
/* CONTEXT USAGE MAP */
.context-usage-map{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin:1rem 0}
.cum-item{border-radius:12px;padding:.85rem;border:2px solid var(--border);background:#FAFAFA}
.cum-item:nth-child(1){border-color:#FFCC02;background:#FFFDE7}
.cum-item:nth-child(2){border-color:#EF9A9A;background:#FFF8F8}
.cum-item:nth-child(3){border-color:#CE93D8;background:#F9F0FF}
.cum-item:nth-child(4){border-color:#80DEEA;background:#E0FDFF}
.cum-icon{font-size:1.4rem;margin-bottom:.3rem}
.cum-context{font-family:"Fredoka",sans-serif;font-size:.78rem;font-weight:600;color:var(--text-soft);margin-bottom:.3rem}
.cum-ex{font-size:.79rem;color:var(--text);line-height:1.5}
@media(max-width:600px){
.too-intro-grid,.module-vocab-grid,.tvv-row,.context-usage-map{grid-template-columns:1fr}
.sg-row{grid-template-columns:1fr}
.sg-arrow{text-align:center}
}

.ex-section{margin-top:1.2rem;padding-top:1rem;border-top:2px dashed var(--lm)}
.ex-section h3{font-family:"Fredoka",sans-serif;color:var(--ld);font-size:.9rem;margin-bottom:.8rem}
.exercise{background:#fafafa;border-radius:12px;padding:1rem;margin-bottom:.7rem;border:2px solid #eee;transition:.2s}
.exercise.correct{border-color:var(--ok);background:var(--ok-bg)}
.exercise.incorrect{border-color:var(--err);background:var(--err-bg)}
.exercise-q{font-size:.88rem;margin-bottom:.7rem;line-height:1.4}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:.4rem}
.opt-btn{padding:.65rem .5rem;border:2px solid #e0e0e0;border-radius:10px;background:var(--card);color:var(--text-soft);font-size:.83rem;font-weight:600;cursor:pointer;transition:.15s;font-family:"Nunito",sans-serif;text-align:left}
.opt-btn:hover:not(:disabled){border-color:var(--lp);background:var(--ll)}
.opt-btn:disabled{cursor:not-allowed;opacity:.7}
.opt-btn.sel-ok{background:var(--ok);color:#fff;border-color:var(--ok)}
.opt-btn.sel-bad{background:var(--err);color:#fff;border-color:var(--err)}
.opt-btn.show-ok{background:var(--ok);color:#fff;border-color:var(--ok)}
.fb{margin-top:.7rem;padding:0;border-radius:12px;font-size:.82rem;display:none;line-height:1.6;overflow:hidden}
.fb.show{display:block;animation:fbSlide .35s ease}
@keyframes fbSlide{from{opacity:0;max-height:0;transform:translateY(-8px)}to{opacity:1;max-height:600px;transform:translateY(0)}}
.fb-header{display:flex;align-items:center;gap:.5rem;padding:.7rem 1rem;font-family:"Fredoka",sans-serif;font-size:.85rem;font-weight:600}
.fb.fb-ok .fb-header{background:#C8E6C9;color:var(--ok)}
.fb.fb-bad .fb-header{background:#FFCDD2;color:var(--err)}
.fb-icon{font-size:1.2rem}
.fb-body{padding:.8rem 1rem}
.fb.fb-ok .fb-body{background:var(--ok-bg)}
.fb.fb-bad .fb-body{background:var(--err-bg)}
.fb-row{display:flex;align-items:flex-start;gap:.5rem;margin-bottom:.4rem}
.fb-row:last-child{margin-bottom:0}
.fb-dot{font-size:.9rem;flex-shrink:0;margin-top:1px}
.fb-text{flex:1}
.fb-correct-answer{color:var(--ok);font-weight:700}
.fb-wrong-reason{color:var(--err);font-weight:600}
.fb-example{display:inline-flex;align-items:center;gap:.3rem;margin-top:.4rem;padding:4px 10px;border-radius:6px;font-size:.78rem;font-weight:700}
.fb.fb-ok .fb-example{background:#A5D6A7;color:#1B5E20}
.fb.fb-bad .fb-example{background:#EF9A9A;color:#B71C1C}
.fb-tip{margin-top:.5rem;padding:.5rem .7rem;border-radius:8px;background:var(--note-bg);border:1px solid var(--note-border);font-size:.76rem;color:#33691E}
.fb-tip strong{color:var(--ld)}
.score-bar{text-align:center;padding:.8rem;background:var(--ll);border-radius:10px;margin-top:.8rem;border:1px solid var(--lm)}
.score-bar .num{font-family:"Fredoka",sans-serif;font-size:1.4rem;color:var(--ld)}
.score-bar .lbl{font-size:.7rem;color:var(--lp);font-weight:700;text-transform:uppercase;letter-spacing:1px}
.summary-final{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.6rem;margin-top:1rem;box-shadow:var(--shadow);border-top:3.5px solid var(--ok);display:none}
.summary-final.show{display:block;animation:fadeIn .4s ease}
.summary-final h3{font-family:"Fredoka",sans-serif;color:var(--ok);margin-bottom:.8rem;font-size:1.1rem}
.summary-final ul{list-style:none}
.summary-final li{padding:5px 0 5px 22px;position:relative;font-size:.84rem;color:var(--text-soft);border-bottom:1px solid var(--lm)}
.summary-final li:last-child{border-bottom:none}
.summary-final li:before{content:"\2713";position:absolute;left:0;color:var(--lp);font-weight:700}
@media(max-width:600px){
.level-header h1{font-size:1.4rem}
.compare-grid{grid-template-columns:1fr}
.card{padding:1.2rem}
.opts{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="container">
<div class="level-header">
  <div class="level-badge">&#x1F49A; A2 &middot; Grammar Summary</div>
  <h1>&#x1F4DD; Grammar Summary</h1>
  <div class="module-name">&#x1F6CE;&#xFE0F; Services, Support &amp; Problem Solving</div>
  <p class="subtitle">Quantifiers: too many / too much &middot; 5 steps &times; 5 exercises</p>
</div>
<div class="step-tabs" id="stepTabs"></div>
<div id="cardArea"></div>
<div class="summary-final" id="summaryFinal">
  <h3>&#x1F393; Key Points &mdash; too many / too much</h3>
  <ul id="summaryList"></ul>
</div>
</div>
<script>
var STEPS = [{"icon": "\ud83c\uddea\ud83c\uddf8", "title": "Repaso en Espa\u00f1ol", "html": "<div class=\"section-label\">Paso 1</div>\n<div class=\"section-title\">Paso 1: \ud83c\uddea\ud83c\uddf8 Repaso en Espa\u00f1ol</div>\n<div class=\"section-desc\">En espa\u00f1ol \"demasiado\" cambia seg\u00fan g\u00e9nero y n\u00famero. En ingl\u00e9s \"too\" es fijo y solo cambia el cuantificador seg\u00fan el tipo de sustantivo.</div>\n<div class=\"compare-grid\">\n  <div class=\"compare-card esp\">\n    <h4>\ud83c\uddea\ud83c\uddf8 Espa\u00f1ol \u2014 \"demasiado\" cambia</h4>\n    <ul>\n      <li><b>Demasiados</b> problemas.</li>\n      <li><b>Demasiadas</b> quejas.</li>\n      <li><b>Demasiado</b> tiempo.</li>\n      <li><b>Demasiada</b> informaci\u00f3n.</li>\n    </ul>\n  </div>\n  <div class=\"compare-card eng\">\n    <h4>\ud83c\uddec\ud83c\udde7 English \u2014 solo 2 formas</h4>\n    <ul>\n      <li><b>Too many</b> problems.</li>\n      <li><b>Too many</b> complaints.</li>\n      <li><b>Too much</b> time.</li>\n      <li><b>Too much</b> information.</li>\n    </ul>\n  </div>\n</div>\n<div class=\"tip-card\"><strong>\ud83d\udca1 La regla de oro:</strong> <b>Too many</b> = contable plural (puedes contarlos). <b>Too much</b> = incontable (no puedes contarlos). La palabra <b>too</b> siempre expresa que hay un <b>problema o exceso</b>.</div>\n<div class=\"too-intro-grid\">\n  <div class=\"tig-item tig-many\">\n    <div class=\"tig-label\">TOO MANY</div>\n    <div class=\"tig-sub\">+ contable plural</div>\n    <div class=\"tig-examples\">\n      <div class=\"tig-ex\">too many <b>complaints</b></div>\n      <div class=\"tig-ex\">too many <b>forms</b></div>\n      <div class=\"tig-ex\">too many <b>errors</b></div>\n    </div>\n    <div class=\"tig-badge\">\ud83d\udd22 se puede contar</div>\n  </div>\n  <div class=\"tig-item tig-much\">\n    <div class=\"tig-label\">TOO MUCH</div>\n    <div class=\"tig-sub\">+ incontable</div>\n    <div class=\"tig-examples\">\n      <div class=\"tig-ex\">too much <b>stress</b></div>\n      <div class=\"tig-ex\">too much <b>information</b></div>\n      <div class=\"tig-ex\">too much <b>time</b></div>\n    </div>\n    <div class=\"tig-badge\">\ud83d\udca7 no se puede contar</div>\n  </div>\n</div>\n<div class=\"ex-row\"><div class=\"icon\">\ud83d\ude24</div><div><div class=\"en\">There are <b>too many</b> complaints this week.</div><div class=\"es\">Hay demasiadas quejas esta semana. (problema)</div></div></div>\n<div class=\"ex-row\"><div class=\"icon\">\ud83d\ude30</div><div><div class=\"en\">There is <b>too much</b> stress in this department.</div><div class=\"es\">Hay demasiado estr\u00e9s en este departamento. (problema)</div></div></div>"}, {"icon": "\ud83e\udd1d", "title": "Similitudes", "html": "<div class=\"section-label\">Paso 2</div>\n<div class=\"section-title\">Paso 2: \ud83e\udd1d Similitudes ESP \u2194 ENG</div>\n<div class=\"section-desc\">Both languages express \"excess\" \u2014 an amount that causes a problem. The logic is identical.</div>\n<table class=\"g-table\">\n  <tr><th>Similitud</th><th>\ud83c\uddea\ud83c\uddf8 Espa\u00f1ol</th><th>\ud83c\uddec\ud83c\udde7 English</th></tr>\n  <tr><td>Exceso (contable)</td><td>demasiados problemas</td><td><span class=\"g-neg\">too many</span> problems</td></tr>\n  <tr><td>Exceso (incontable)</td><td>demasiado tiempo</td><td><span class=\"g-neg\">too much</span> time</td></tr>\n  <tr><td>Siempre negativo</td><td>implica un problema</td><td>always implies a problem</td></tr>\n  <tr><td>Posici\u00f3n: antes del sustantivo</td><td>demasiadas + quejas</td><td>too many + complaints</td></tr>\n  <tr><td>Con adjetivos (sin sustantivo)</td><td>demasiado lento</td><td>too slow / too expensive</td></div></tr>\n</table>\n<div class=\"section-label\">Too many / too much \u2014 con sustantivos del m\u00f3dulo</div>\n<div class=\"module-vocab-grid\">\n  <div class=\"mvg-col mvg-many\">\n    <div class=\"mvg-header\">TOO MANY + contable</div>\n    <div class=\"mvg-item\"><span class=\"mvg-q\">too many</span> complaints</div>\n    <div class=\"mvg-item\"><span class=\"mvg-q\">too many</span> forms to fill</div>\n    <div class=\"mvg-item\"><span class=\"mvg-q\">too many</span> errors in the report</div>\n    <div class=\"mvg-item\"><span class=\"mvg-q\">too many</span> appointments in one day</div>\n    <div class=\"mvg-item\"><span class=\"mvg-q\">too many</span> steps in the process</div>\n  </div>\n  <div class=\"mvg-col mvg-much\">\n    <div class=\"mvg-header\">TOO MUCH + incontable</div>\n    <div class=\"mvg-item\"><span class=\"mvg-q\">too much</span> stress</div>\n    <div class=\"mvg-item\"><span class=\"mvg-q\">too much</span> information at once</div>\n    <div class=\"mvg-item\"><span class=\"mvg-q\">too much</span> time wasted</div>\n    <div class=\"mvg-item\"><span class=\"mvg-q\">too much</span> pressure on staff</div>\n    <div class=\"mvg-item\"><span class=\"mvg-q\">too much</span> paperwork</div>\n  </div>\n</div>\n<div class=\"tip-card\"><strong>\ud83d\udca1 Clave:</strong> <b>Too</b> siempre implica que la cantidad es un <b>problema o crea una consecuencia negativa</b>. Sin ese problema, no usas too \u2014 usas many/much o a lot of.</div>"}, {"icon": "\u26a1", "title": "Diferencias", "html": "<div class=\"section-label\">Paso 3</div>\n<div class=\"section-title\">Paso 3: \u26a1 Diferencias Importantes</div>\n<table class=\"g-table\">\n  <tr><th>\ud83c\uddea\ud83c\uddf8 Espa\u00f1ol</th><th>\ud83c\uddec\ud83c\udde7 Ingl\u00e9s</th><th>\ud83d\udca1 Explicaci\u00f3n</th></tr>\n  <tr><td>Hay muchos problemas.</td><td>There are <span class=\"g-comp\">many</span> problems. <em>(neutro)</em><br>There are <span class=\"g-neg\">too many</span> problems. <em>(exceso)</em></td><td>too a\u00f1ade el problema</td></tr>\n  <tr><td>Mucho estr\u00e9s. (general)</td><td><span class=\"g-comp\">A lot of</span> stress. <em>(neutro)</em><br><span class=\"g-neg\">Too much</span> stress. <em>(exceso)</em></td><td>too = hay un problema</td></tr>\n  <tr><td>Demasiado lento. (adj.)</td><td><span class=\"g-neg\">Too</span> slow.</td><td>too + adj. (sin many/much)</td></tr>\n  <tr><td>Soluci\u00f3n al exceso contable</td><td><span class=\"g-comp\">fewer</span> complaints</td><td>too many \u2192 fewer</td></tr>\n  <tr><td>Soluci\u00f3n al exceso incontable</td><td><span class=\"g-comp\">less</span> stress</td><td>too much \u2192 less</td></tr>\n</table>\n<div class=\"alert-card\">\n  <div class=\"atitle\">\u26a0\ufe0f too vs very \u2014 no son sin\u00f3nimos</div>\n  <p><b>Very</b> intensifica pero no implica problema. <b>Too</b> implica un exceso que causa un problema:</p>\n  <div class=\"too-vs-very\">\n    <div class=\"tvv-row\">\n      <div class=\"tvv-sent ok-sent\">The process is <b>very</b> long. <em>(largo, quiz\u00e1s informativo)</em></div>\n      <div class=\"tvv-sent bad-sent\">The process is <b>too</b> long. <em>(tan largo que es un problema)</em></div>\n    </div>\n    <div class=\"tvv-row\">\n      <div class=\"tvv-sent ok-sent\">We have <b>a lot of</b> complaints. <em>(muchas, dato neutro)</em></div>\n      <div class=\"tvv-sent bad-sent\">We have <b>too many</b> complaints. <em>(exceso \u2014 hay un problema)</em></div>\n    </div>\n  </div>\n</div>\n<div class=\"section-label\">Exceso \u2192 Soluci\u00f3n</div>\n<div class=\"solution-grid\">\n  <div class=\"sg-row\">\n    <div class=\"sg-prob\"><span class=\"g-neg\">Too many</span> complaints</div>\n    <div class=\"sg-arrow\">\u2192</div>\n    <div class=\"sg-sol\">We need <span class=\"g-comp\">fewer</span> complaints</div>\n  </div>\n  <div class=\"sg-row\">\n    <div class=\"sg-prob\"><span class=\"g-neg\">Too much</span> paperwork</div>\n    <div class=\"sg-arrow\">\u2192</div>\n    <div class=\"sg-sol\">We need <span class=\"g-comp\">less</span> paperwork</div>\n  </div>\n  <div class=\"sg-row\">\n    <div class=\"sg-prob\"><span class=\"g-neg\">Too many</span> steps in the process</div>\n    <div class=\"sg-arrow\">\u2192</div>\n    <div class=\"sg-sol\">We need <span class=\"g-comp\">fewer</span> steps</div>\n  </div>\n  <div class=\"sg-row\">\n    <div class=\"sg-prob\"><span class=\"g-neg\">Too much</span> waiting time</div>\n    <div class=\"sg-arrow\">\u2192</div>\n    <div class=\"sg-sol\">We need <span class=\"g-comp\">less</span> waiting time</div>\n  </div>\n</div>"}, {"icon": "\ud83d\udca1", "title": "Consejos", "html": "<div class=\"section-label\">Paso 4</div>\n<div class=\"section-title\">Paso 4: \ud83d\udca1 Consejos Pr\u00e1cticos</div>\n<div class=\"tip-card\"><strong>Tip 1 \u2014 Too = problema siempre:</strong> Antes de usar \"too\", preg\u00fantate: \u00bfla cantidad causa un problema? \"There are many complaints\" (dato) vs \"There are too many complaints\" (es un problema que hay que resolver).</div>\n<div class=\"tip-card\"><strong>Tip 2 \u2014 Many o much despu\u00e9s de too:</strong> La regla no cambia: too + <b>many</b> para contables, too + <b>much</b> para incontables. El mismo test de antes: \u00bfpuedo decir \"one ___, two ___s\"? \u2192 too many. \u00bfNo? \u2192 too much.</div>\n<div class=\"tip-card\"><strong>Tip 3 \u2014 La soluci\u00f3n al exceso:</strong> too many \u2192 <b>fewer</b> (menos cantidad contable) \u00b7 too much \u2192 <b>less</b> (menos cantidad incontable). \"We have too many forms \u2192 We need <b>fewer</b> forms.\" / \"Too much stress \u2192 We need <b>less</b> stress.\"</div>\n<div class=\"tip-card\"><strong>Tip 4 \u2014 Too + adjetivo (sin sustantivo):</strong> \"The wait is too <b>long</b>\" / \"The process is too <b>complicated</b>\" \u2014 aqu\u00ed too va directo con el adjetivo, sin many ni much. Es una estructura diferente.</div>\n<div class=\"section-label\">Mapa visual \u2014 too many / too much en contexto</div>\n<div class=\"context-usage-map\">\n  <div class=\"cum-item cum-problem\">\n    <div class=\"cum-icon\">\ud83d\ude24</div>\n    <div class=\"cum-context\">Queja de cliente</div>\n    <div class=\"cum-ex\">\"There are <b>too many</b> steps to get a refund.\"</div>\n  </div>\n  <div class=\"cum-item cum-report\">\n    <div class=\"cum-icon\">\ud83d\udcca</div>\n    <div class=\"cum-context\">Reporte de calidad</div>\n    <div class=\"cum-ex\">\"We received <b>too many</b> complaints last quarter.\"</div>\n  </div>\n  <div class=\"cum-item cum-stress\">\n    <div class=\"cum-icon\">\ud83d\ude30</div>\n    <div class=\"cum-context\">Problema de equipo</div>\n    <div class=\"cum-ex\">\"There is <b>too much</b> pressure on front-line staff.\"</div>\n  </div>\n  <div class=\"cum-item cum-process\">\n    <div class=\"cum-icon\">\u2699\ufe0f</div>\n    <div class=\"cum-context\">Mejora de proceso</div>\n    <div class=\"cum-ex\">\"The form has <b>too much</b> information to fill in.\"</div>\n  </div>\n</div>"}, {"icon": "\u2728", "title": "Pr\u00e1ctica Final", "html": "<div class=\"section-label\">Paso 5</div>\n<div class=\"section-title\">Paso 5: \u2728 Pr\u00e1ctica Final</div>\n<div class=\"formula-box\">\n  <span class=\"g-neg\">too many</span> + countable plural \u2192 excess \u26a0\ufe0f (= demasiados/as)<br>\n  <span class=\"g-neg\">too much</span> + uncountable \u2192 excess \u26a0\ufe0f (= demasiado/a)<br>\n  Fix: <span class=\"g-neg\">too many</span> \u2192 <span class=\"g-comp\">fewer</span> &nbsp;|&nbsp; <span class=\"g-neg\">too much</span> \u2192 <span class=\"g-comp\">less</span>\n</div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\ud83d\ude24</div><div><div class=\"en\">The customer says there are <span class=\"g-neg\">too many</span> <span class=\"g-comp\">forms</span> to complete for a simple refund.</div><div class=\"es\">El cliente dice que hay demasiados formularios para un simple reembolso.</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\u23f0</div><div><div class=\"en\">We are spending <span class=\"g-neg\">too much</span> <span class=\"g-comp\">time</span> on each complaint \u2014 we need a faster process.</div><div class=\"es\">Estamos gastando demasiado tiempo en cada queja \u2014 necesitamos un proceso m\u00e1s r\u00e1pido.</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\ud83d\udcca</div><div><div class=\"en\">There are <span class=\"g-neg\">too many</span> <span class=\"g-comp\">errors</span> in the system \u2014 we need <span class=\"g-comp\">fewer</span> errors.</div><div class=\"es\">Hay demasiados errores en el sistema \u2014 necesitamos menos errores.</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\ud83d\udcbc</div><div><div class=\"en\">There is <span class=\"g-neg\">too much</span> <span class=\"g-comp\">paperwork</span> \u2014 let's reduce it. We need <span class=\"g-comp\">less</span> paperwork.</div><div class=\"es\">Hay demasiado papeleo \u2014 reduzc\u00e1moslo. Necesitamos menos papeleo.</div></div></div>\n<div class=\"ex-row ex-wrong\"><div class=\"icon\">\u274c</div><div><div class=\"en\">There is too many information and too much complaints.</div><div class=\"es\">Error doble: information = incontable (too much) \u00b7 complaints = contable (too many)</div></div></div>\n<div class=\"alert-card\">\n  <div class=\"atitle\">\u26a0\ufe0f 3 Errores Comunes</div>\n  <p>\u274c \"There is <b>too many</b> information\" \u2192 \u2705 \"There is <b>too much</b> information\" (incontable)<br>\n  \u274c \"There are <b>too much</b> complaints\" \u2192 \u2705 \"There are <b>too many</b> complaints\" (contable)<br>\n  \u274c \"The process is <b>too much</b> long\" \u2192 \u2705 \"The process is <b>too</b> long\" (adj. \u2192 sin much)</p>\n</div>"}];

 un problema: son demasiados.", "fi": "Too much es para incontables: too much paperwork, too much time.", "ex": "The customer submitted too many forms for a simple request.", "tip": "forms = contable \u2192 too many"}, {"q": "We are wasting ___ time on this process.", "a": "b", "o": ["too many", "too much"], "fc": "Time es incontable \u2192 too much time. El tiempo desperdiciado es un problema.", "fi": "Too many requiere contable plural: too many steps, too many meetings.", "ex": "We are wasting too much time on this process.", "tip": "time = incontable \u2192 too much"}, {"q": "\"Too many appointments in one day\" implica:", "a": "b", "o": ["Muchas citas \u2014 solo un dato", "Demasiadas citas \u2014 hay un problema"], "fc": "Too siempre implica problema. Too many appointments = el n\u00famero de citas es excesivo.", "fi": "Solo dato: 'many appointments' / 'a lot of appointments' (sin too).", "ex": "I have too many appointments today \u2014 I'm exhausted.", "tip": "too = siempre hay un problema o consecuencia negativa"}, {"q": "There is ___ paperwork in this department.", "a": "b", "o": ["too many", "too much"], "fc": "Paperwork es incontable \u2192 too much paperwork.", "fi": "Too many es para contables: too many documents, too many files.", "ex": "There is too much paperwork \u2014 we need to go digital.", "tip": "paperwork = incontable \u2192 too much"}, {"q": "The report has ___ errors to be acceptable.", "a": "a", "o": ["too many", "too much"], "fc": "Errors es contable (plural) \u2192 too many errors. La cantidad de errores es un problema.", "fi": "Too much es para incontables: too much information, too much confusion.", "ex": "The report has too many errors \u2014 please revise it.", "tip": "errors = contable \u2192 too many"}], [{"q": "\u00bfCu\u00e1l expresa un problema \u2014 no solo una cantidad?", "a": "b", "o": ["We have a lot of complaints.", "We have too many complaints."], "fc": "Too many complaints = el n\u00famero de quejas es excesivo y hay que resolverlo.", "fi": "A lot of complaints es un dato neutro \u2014 puede ser mucho, pero no implica problema.", "ex": "Too many complaints = we need to take action!", "tip": "too many/much = problema \u00b7 a lot of = dato neutro"}, {"q": "\"The process is too long\" \u2014 \u00bfqu\u00e9 estructura usa?", "a": "a", "o": ["Too + adjetivo (sin many/much)", "Too many + sustantivo"], "fc": "Too + adjetivo (long, slow, complicated) \u2014 no se usa many ni much con adjetivos.", "fi": "Too many/much va antes de sustantivos. Too + adjetivo es una estructura diferente.", "ex": "too long / too slow / too expensive / too complicated", "tip": "too + adj (sin sustantivo) \u2192 sin many/much"}, {"q": "La soluci\u00f3n a \"too many complaints\" es:", "a": "b", "o": ["less complaints", "fewer complaints"], "fc": "Too many (contable) \u2192 fewer (menos cantidad contable). We need fewer complaints.", "fi": "Less es para incontables: less stress, less paperwork. Fewer para contables.", "ex": "too many complaints \u2192 we need fewer complaints", "tip": "too many \u2192 fewer \u00b7 too much \u2192 less"}, {"q": "La soluci\u00f3n a \"too much stress\" es:", "a": "a", "o": ["less stress", "fewer stress"], "fc": "Too much (incontable) \u2192 less (menos cantidad incontable). We need less stress.", "fi": "Fewer es para contables: fewer complaints, fewer forms.", "ex": "too much stress \u2192 we need less stress in the workplace", "tip": "too much \u2192 less \u00b7 too many \u2192 fewer"}, {"q": "\"The wait is very long\" vs \"The wait is too long\" \u2014 la diferencia:", "a": "b", "o": ["Son sin\u00f3nimos \u2014 mismo significado", "Very = intensifica / Too = hay un problema por resolver"], "fc": "Very long = muy largo (descriptivo). Too long = tan largo que es un problema.", "fi": "Very y too no son sin\u00f3nimos. Too siempre implica consecuencia negativa.", "ex": "very long (descriptivo) / too long (problema que resolver)", "tip": "very = intensifica \u00b7 too = exceso con consecuencia negativa"}], [{"q": "Customer complaint: \"There are ___ steps to request a refund.\"", "a": "a", "o": ["too many", "too much"], "fc": "Steps es contable (plural) \u2192 too many steps. El cliente se queja del exceso.", "fi": "Too much es para incontables. Steps tiene plural \u2192 too many.", "ex": "There are too many steps to get a refund \u2014 it should be simpler.", "tip": "steps = contable \u2192 too many"}, {"q": "Team meeting: \"We spend ___ time on hold music before answering.\"", "a": "b", "o": ["too many", "too much"], "fc": "Time es incontable \u2192 too much time. El tiempo en espera es excesivo.", "fi": "Too many es para contables: too many calls, too many agents.", "ex": "We spend too much time on hold \u2014 customers get frustrated.", "tip": "time = incontable \u2192 too much"}, {"q": "\"We have too many complaints \u2192 we need ___\"", "a": "b", "o": ["less complaints", "fewer complaints"], "fc": "Complaints es contable \u2192 usamos fewer para expresar la soluci\u00f3n. We need fewer complaints.", "fi": "Less es para incontables: less stress, less paperwork.", "ex": "too many complaints \u2192 fewer complaints / too much stress \u2192 less stress", "tip": "too many \u2192 fewer (contable)"}, {"q": "\"There is too much confusion \u2192 we need ___\"", "a": "a", "o": ["less confusion", "fewer confusion"], "fc": "Confusion es incontable \u2192 usamos less. We need less confusion.", "fi": "Fewer es para contables: fewer errors, fewer steps, fewer complaints.", "ex": "too much confusion \u2192 less confusion in the process", "tip": "too much \u2192 less (incontable)"}, {"q": "\"The form is ___ complicated for most customers.\" (demasiado)", "a": "b", "o": ["too much", "too"], "fc": "Complicated es un adjetivo \u2192 too + adjetivo (sin much). The form is too complicated.", "fi": "Too much va con sustantivos incontables. Con adjetivos solo se usa too.", "ex": "too complicated / too long / too confusing (adj. \u2192 solo too)", "tip": "too + adjetivo \u2192 sin much ni many"}], [{"q": "The department received ___ complaints last month \u2014 action is needed.", "a": "a", "o": ["too many", "too much"], "fc": "Complaints es contable (plural) + hay un problema que requiere acci\u00f3n \u2192 too many.", "fi": "Too much es para incontables: too much feedback, too much pressure.", "ex": "We received too many complaints \u2014 we need to improve the service.", "tip": "Contable + problema \u2192 too many"}, {"q": "There is ___ pressure on the customer service team right now.", "a": "b", "o": ["too many", "too much"], "fc": "Pressure es incontable \u2192 too much pressure.", "fi": "Too many es para contables en plural: too many calls, too many tasks.", "ex": "There is too much pressure on the team \u2014 we need more staff.", "tip": "pressure = incontable \u2192 too much"}, {"q": "We have too many steps in this process \u2192 we need to have ___", "a": "a", "o": ["fewer steps", "less steps"], "fc": "Steps es contable \u2192 la soluci\u00f3n es fewer steps (menos cantidad contable).", "fi": "Less es para incontables: less time, less paperwork.", "ex": "too many steps \u2192 fewer steps / too much paperwork \u2192 less paperwork", "tip": "Soluci\u00f3n a too many \u2192 fewer"}, {"q": "Elige la oraci\u00f3n correcta:", "a": "b", "o": ["There are too much errors in this report.", "There are too many errors in this report."], "fc": "Errors es contable (plural) \u2192 too many errors. Adem\u00e1s: there are (plural) confirma que es contable.", "fi": "Too much errors combina mal: too much es para incontables que no tienen plural.", "ex": "There are too many errors. / There is too much confusion.", "tip": "Errors = contable \u2192 too many (+ there ARE)"}, {"q": "\"The waiting time is ___ long \u2014 customers are leaving.\" (demasiado)", "a": "a", "o": ["too", "too much"], "fc": "Long es un adjetivo \u2192 too + adjetivo = too long. Sin much.", "fi": "Too much long no existe. Con adjetivos: too + adj (too long, too slow, too expensive).", "ex": "The wait is too long. / The process is too complicated. (too + adj.)", "tip": "Adjetivo solo \u2192 too (sin much/many)"}]];
var SUMMARY = ["<b>too many</b> \u2192 contables en plural, cantidad excesiva: too many complaints = demasiadas quejas", "<b>too much</b> \u2192 incontables, cantidad excesiva: too much stress = demasiado estr\u00e9s", "<b>too</b> siempre expresa un <b>problema o exceso</b> \u2014 algo negativo o inconveniente", "<b>too many/much \u2260 very many/much</b>: 'too' implica consecuencia negativa, 'very' no", "<b>Posici\u00f3n fija:</b> too many/much + noun: too many forms \u2705 \u00b7 many too forms \u274c", "<b>too + adjetivo:</b> too slow, too expensive \u2014 tambi\u00e9n expresa exceso (no es too many/much)", "<b>Soluci\u00f3n al exceso:</b> too many \u2192 fewer / too much \u2192 less: fewer complaints / less stress"];
var curStep = 0;
var scores = {};
var answered = {};

function renderStepTabs() {
    var c = document.getElementById("stepTabs");
    c.innerHTML = "";
    STEPS.forEach(function(s, i) {
        var k = "s" + i;
        var allDone = [0,1,2,3,4].every(function(j){ return answered[k+"e"+j]; });
        var b = document.createElement("button");
        b.className = "step-tab" + (i === curStep ? " active" : "") + (allDone && i !== curStep ? " done" : "");
        b.textContent = (i + 1) + ". " + s.icon + " " + s.title;
        b.addEventListener("click", (function(idx){ return function(){
            curStep = idx;
            renderStepTabs();
            renderCard();
            document.getElementById("summaryFinal").classList.remove("show");
        };})(i));
        c.appendChild(b);
    });
}

function renderCard() {
    var s = STEPS[curStep];
    var exs = EXERCISES[curStep];
    var k = "s" + curStep;
    if (scores[k] === undefined) scores[k] = 0;
    var h = "<div class=\"card\">" + s.html;
    h += "<div class=\"ex-section\"><h3>&#x270F;&#xFE0F; Exercises &mdash; " + s.title + "</h3>";
    exs.forEach(function(e, i) {
        var eid = k + "e" + i;
        var longOpts = e.o[0].length > 40 || e.o[1].length > 40;
        var gs = longOpts ? " style=\"grid-template-columns:1fr\"" : "";
        h += "<div class=\"exercise\" id=\"" + eid + "\">";
        h += "<div class=\"exercise-q\">" + (i+1) + ". " + e.q + "</div>";
        h += "<div class=\"opts\"" + gs + ">";
        h += "<button class=\"opt-btn\" id=\"" + eid + "ba\">a) " + e.o[0] + "</button>";
        h += "<button class=\"opt-btn\" id=\"" + eid + "bb\">b) " + e.o[1] + "</button>";
        h += "</div>";
        var ct = e.a === "a" ? e.o[0] : e.o[1];
        h += "<div class=\"fb fb-ok\" id=\"fbok-" + eid + "\">";
        h += "<div class=\"fb-header\"><span class=\"fb-icon\">&#x1F389;</span> Correct!</div>";
        h += "<div class=\"fb-body\">";
        h += "<div class=\"fb-row\"><span class=\"fb-dot\">&#x2705;</span><div class=\"fb-text\"><span class=\"fb-correct-answer\">" + ct + "</span> &mdash; " + e.fc + "</div></div>";
        h += "<div class=\"fb-row\"><span class=\"fb-dot\">&#x1F4A1;</span><div class=\"fb-text\">The other option: " + e.fi + "</div></div>";
        if (e.ex) h += "<div class=\"fb-example\">&#x1F4DD; " + e.ex + "</div>";
        if (e.tip) h += "<div class=\"fb-tip\"><strong>&#x1F4A1; Remember:</strong> " + e.tip + "</div>";
        h += "</div></div>";
        h += "<div class=\"fb fb-bad\" id=\"fbbad-" + eid + "\">";
        h += "<div class=\"fb-header\"><span class=\"fb-icon\">&#x1F615;</span> Not quite right</div>";
        h += "<div class=\"fb-body\">";
        h += "<div class=\"fb-row\"><span class=\"fb-dot\">&#x274C;</span><div class=\"fb-text\"><span class=\"fb-wrong-reason\">" + e.fi + "</span></div></div>";
        h += "<div class=\"fb-row\"><span class=\"fb-dot\">&#x2705;</span><div class=\"fb-text\">The correct answer is <span class=\"fb-correct-answer\">" + ct + "</span> &mdash; " + e.fc + "</div></div>";
        if (e.ex) h += "<div class=\"fb-example\">&#x1F4DD; " + e.ex + "</div>";
        if (e.tip) h += "<div class=\"fb-tip\"><strong>&#x1F4A1; Remember:</strong> " + e.tip + "</div>";
        h += "</div></div></div>";
    });
    h += "<div class=\"score-bar\"><div class=\"num\" id=\"sc-" + k + "\">0/5</div><div class=\"lbl\">Score</div></div>";
    h += "</div></div>";
    document.getElementById("cardArea").innerHTML = h;
    exs.forEach(function(e, i) {
        var eid = k + "e" + i;
        document.getElementById(eid + "ba").addEventListener("click", (function(id){ return function(){ chk(id,"a"); }; })(eid));
        document.getElementById(eid + "bb").addEventListener("click", (function(id){ return function(){ chk(id,"b"); }; })(eid));
    });
}

function chk(eid, sel) {
    if (answered[eid]) return;
    answered[eid] = true;
    var parts = eid.match(/s(\d+)e(\d+)/);
    var si = parseInt(parts[1]);
    var ei = parseInt(parts[2]);
    var e = EXERCISES[si][ei];
    var k = "s" + si;
    var ex = document.getElementById(eid);
    var btnA = document.getElementById(eid + "ba");
    var btnB = document.getElementById(eid + "bb");
    btnA.disabled = true;
    btnB.disabled = true;
    if (sel === e.a) {
        ex.classList.add("correct");
        (sel === "a" ? btnA : btnB).classList.add("sel-ok");
        document.getElementById("fbok-" + eid).classList.add("show");
        scores[k]++;
    } else {
        ex.classList.add("incorrect");
        (sel === "a" ? btnA : btnB).classList.add("sel-bad");
        (e.a === "a" ? btnA : btnB).classList.add("show-ok");
        document.getElementById("fbbad-" + eid).classList.add("show");
    }
    document.getElementById("sc-" + k).textContent = scores[k] + "/5";
    var allDone = [0,1,2,3,4].every(function(i){ return answered[k + "e" + i]; });
    if (allDone && curStep === 4) {
        setTimeout(function() {
            var sf = document.getElementById("summaryFinal");
            document.getElementById("summaryList").innerHTML = SUMMARY.map(function(s){ return "<li>" + s + "</li>"; }).join("");
            sf.classList.add("show");
            sf.scrollIntoView({behavior:"smooth"});
        }, 600);
    }
}

renderStepTabs();
renderCard();
</script>
