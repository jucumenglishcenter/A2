<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grammar Summary — Used to | A2 | JUCUM</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Fredoka:wght@400;500;600;700&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
:root{
--bg:#FAFAF6;--card:#fff;--text:#2A2A2A;--text-soft:#777;--border:#E8E5DC;
--shadow:0 3px 16px rgba(0,0,0,.06);--radius:14px;
--lp:#4CAF50;--ld:#1B5E20;--ll:#E8F5E9;--lm:#C8E6C9;
--lg:linear-gradient(135deg,#388E3C,#4CAF50);--lglow:rgba(76,175,80,.15);
--badge-text:#1A3D1C;
--subj:#1565C0;--subj-bg:#E3F2FD;
--verb:#E53935;--verb-bg:#FFEBEE;
--comp:#00897B;--comp-bg:#E0F2F1;
--neg:#AD1457;--neg-bg:#FCE4EC;
--quest:#7B1FA2;--quest-bg:#F3E5F5;
--ok:#2E7D32;--ok-bg:#E8F5E9;
--err:#C62828;--err-bg:#FFEBEE;
--note-bg:#F1F8E9;--note-border:#AED581;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Nunito",sans-serif;background:var(--bg);color:var(--text);line-height:1.7;padding:1.5rem 1rem;-webkit-font-smoothing:antialiased}
.container{max-width:800px;margin:0 auto}
.level-header{text-align:center;padding:2rem;border-radius:20px;color:#fff;position:relative;overflow:hidden;margin-bottom:1.2rem;background:var(--lg)}
.level-header::before{content:"";position:absolute;top:-40%;right:-15%;width:250px;height:250px;background:rgba(255,255,255,.1);border-radius:50%}
.level-header h1{font-family:"Fredoka",sans-serif;font-size:1.8rem;font-weight:600;position:relative;z-index:1}
.level-header .module-name{font-family:"Fredoka",sans-serif;font-size:1.05rem;opacity:.95;position:relative;z-index:1;margin-top:.2rem}
.level-header .subtitle{opacity:.8;font-size:.83rem;position:relative;z-index:1;margin-top:.15rem}
.level-badge{display:inline-flex;align-items:center;gap:6px;font-size:.7rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;background:var(--ll);color:var(--badge-text);padding:4px 12px;border-radius:20px;border:1.5px solid var(--lm);margin-bottom:.8rem}
.step-tabs{display:flex;gap:.35rem;margin-bottom:1rem;flex-wrap:wrap}
.step-tab{padding:.45rem .85rem;border-radius:8px;font-size:.78rem;font-weight:700;cursor:pointer;border:2px solid var(--border);background:var(--card);transition:.2s;font-family:"Nunito",sans-serif}
.step-tab:hover{background:var(--ll)}
.step-tab.active{background:var(--ll);border-color:var(--lp);color:var(--ld)}
.step-tab.done{background:var(--ok-bg);border-color:var(--ok);color:var(--ok)}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.6rem;margin-bottom:1.2rem;box-shadow:var(--shadow);border-top:3.5px solid var(--lp);animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.section-label{display:flex;align-items:center;gap:.5rem;font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--ld);margin-bottom:.3rem;margin-top:1.1rem}
.section-label::before{content:"";width:20px;height:3px;background:var(--lp);border-radius:2px}
.section-label:first-child{margin-top:0}
.section-title{font-family:"Fredoka",sans-serif;font-size:1.25rem;font-weight:600;margin-bottom:.1rem}
.section-desc{font-size:.85rem;color:var(--text-soft);margin-bottom:1rem}
.g-subj{background:var(--subj-bg);color:var(--subj);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--subj)}
.g-verb{background:var(--verb-bg);color:var(--verb);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--verb)}
.g-comp{background:var(--comp-bg);color:var(--comp);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--comp)}
.g-neg{background:var(--neg-bg);color:var(--neg);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--neg)}
.g-quest{background:var(--quest-bg);color:var(--quest);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--quest)}
.g-table{width:100%;border-collapse:separate;border-spacing:0;margin:.8rem 0;border-radius:10px;overflow:hidden;font-size:.83rem;border:1px solid var(--border)}
.g-table th{background:var(--lg);color:#fff;padding:.65rem .6rem;font-size:.7rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
.g-table td{padding:.6rem;border-bottom:1px solid #f0f0f0;vertical-align:middle}
.g-table tr:nth-child(even) td{background:var(--ll)}
.g-table tr:last-child td{border-bottom:none}
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin:.8rem 0}
.compare-card{padding:1rem;border-radius:12px;text-align:center}
.compare-card.esp{background:var(--ll);border:2px solid var(--lm)}
.compare-card.eng{background:var(--subj-bg);border:2px solid #90CAF9}
.compare-card h4{font-family:"Fredoka",sans-serif;font-size:.85rem;margin-bottom:.5rem}
.compare-card.esp h4{color:var(--ld)}
.compare-card.eng h4{color:var(--subj)}
.compare-card ul{list-style:none;font-size:.82rem;color:var(--text-soft)}
.compare-card li{padding:3px 0}
.formula-box{background:var(--note-bg);border:2px solid var(--note-border);border-radius:12px;padding:1rem;margin:.8rem 0;text-align:center;font-family:"Fredoka",sans-serif;font-size:.9rem;color:var(--ld);line-height:2.2}
.tip-card{background:var(--ll);border-radius:10px;padding:.8rem 1rem;margin:.5rem 0;font-size:.83rem;border-left:3px solid var(--lp)}
.tip-card strong{color:var(--ld)}
.alert-card{background:var(--err-bg);border:2px solid #EF5350;border-radius:10px;padding:.8rem 1rem;margin:.8rem 0}
.alert-card .atitle{font-family:"Fredoka",sans-serif;color:var(--err);font-size:.82rem;margin-bottom:.3rem;font-weight:700}
.alert-card p{font-size:.82rem;color:#555;line-height:1.7}
.ex-row{display:flex;align-items:flex-start;gap:.6rem;padding:.6rem .8rem;border-radius:10px;margin:.4rem 0;font-size:.88rem}
.ex-row .icon{font-size:1.2rem;flex-shrink:0;margin-top:2px}
.ex-row .en{font-weight:700;color:var(--text)}
.ex-row .es{font-family:"Lora",serif;font-style:italic;font-size:.82rem;color:var(--text-soft);margin-top:1px}
.ex-right{border-left:3px solid var(--ok);background:var(--ok-bg)}
.ex-wrong{border-left:3px solid var(--err);background:var(--err-bg)}

/* USED TO VISUAL */
.used-to-visual{margin:1rem 0}
.utv-timeline{display:flex;align-items:stretch;gap:0;border-radius:12px;overflow:hidden;border:1.5px solid var(--border)}
.utv-past{flex:2;background:#FFF3E0;padding:.8rem;text-align:center}
.utv-past-label{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:#E65100;margin-bottom:.5rem}
.utv-habit{display:flex;align-items:center;justify-content:center;gap:.3rem;margin-bottom:.3rem}
.utv-dot{width:10px;height:10px;border-radius:50%;background:#E65100}
.utv-dot-label{font-size:.68rem;color:#E65100;font-weight:700;margin-left:.3rem}
.utv-ex{font-size:.79rem;font-weight:700;color:#BF360C}
.utv-break{flex-shrink:0;background:#E8E5DC;display:flex;align-items:center;justify-content:center;padding:.5rem;font-size:1rem;color:var(--text-soft);writing-mode:vertical-rl}
.utv-now{flex:1;background:var(--ok-bg);padding:.8rem;text-align:center}
.utv-now-label{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--ok);margin-bottom:.5rem}
.utv-now-ex{font-size:.79rem;font-weight:700;color:var(--ld)}
/* THREE FORMS GRID */
.three-forms-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem;margin:.9rem 0}
.tfg-item{border-radius:12px;padding:.8rem;text-align:center}
.tfg-aff{background:var(--ok-bg);border:2px solid #A5D6A7}
.tfg-neg{background:var(--err-bg);border:2px solid #EF9A9A}
.tfg-q{background:var(--quest-bg);border:2px solid #CE93D8}
.tfg-label{font-family:"Fredoka",sans-serif;font-size:.78rem;font-weight:600;margin-bottom:.4rem}
.tfg-aff .tfg-label{color:var(--ok)}
.tfg-neg .tfg-label{color:var(--err)}
.tfg-q .tfg-label{color:var(--quest)}
.tfg-formula{font-size:.72rem;font-weight:700;color:var(--text);background:#fff;border-radius:6px;padding:3px 6px;margin-bottom:.4rem}
.tfg-ex{font-size:.76rem;color:var(--text-soft);margin-bottom:.2rem;font-style:italic}
.tfg-es{font-family:"Lora",serif;font-size:.72rem;color:var(--text-soft);font-style:italic}
/* USED USE COMPARE */
.used-use-compare{display:flex;flex-direction:column;gap:.35rem;margin-top:.6rem}
.uuc-row{display:grid;grid-template-columns:.8fr 1.8fr 1.2fr;gap:.5rem;align-items:center;padding:.45rem .7rem;border-radius:8px;background:#fafafa;border:1px solid var(--border);font-size:.79rem}
.uuc-row.uuc-err{background:var(--err-bg);border-color:#EF9A9A}
.uuc-ctx{font-weight:700;color:var(--text-soft);font-size:.72rem}
.uuc-right{color:var(--ok);font-weight:700}
.uuc-wrong{color:var(--err);font-weight:700}
.uuc-note{font-size:.7rem;color:var(--text-soft);font-style:italic}
/* MATIZ GRID */
.matiz-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin:.8rem 0}
.mz-col{border-radius:10px;padding:.8rem}
.mz-ut{background:var(--ok-bg);border:2px solid #A5D6A7}
.mz-ps{background:var(--subj-bg);border:2px solid #90CAF9}
.mz-header{font-family:"Fredoka",sans-serif;font-size:.78rem;font-weight:600;margin-bottom:.4rem}
.mz-ut .mz-header{color:var(--ok)}
.mz-ps .mz-header{color:var(--subj)}
.mz-item{font-size:.8rem;font-weight:700;color:var(--text);margin-bottom:.3rem}
.mz-note{font-size:.73rem;color:var(--text-soft);font-style:italic}
/* CONTEXT EXAMPLES GRID */
.context-examples-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin:1rem 0}
.ceg-item{border-radius:10px;padding:.8rem;background:#FAFAFA;border:1.5px solid var(--border)}
.ceg-icon{font-size:1.3rem;margin-bottom:.3rem}
.ceg-ex{font-size:.79rem;font-weight:700;color:var(--text);margin-bottom:.3rem;line-height:1.4}
.ceg-now{font-size:.72rem;color:var(--ok);font-style:italic;padding-top:.3rem;border-top:1px dashed var(--lm)}
@media(max-width:600px){
.three-forms-grid,.matiz-grid,.context-examples-grid{grid-template-columns:1fr}
.uuc-row{grid-template-columns:1fr;text-align:center}
.utv-timeline{flex-direction:column}
.utv-break{writing-mode:horizontal-tb;padding:.3rem}
}

.ex-section{margin-top:1.2rem;padding-top:1rem;border-top:2px dashed var(--lm)}
.ex-section h3{font-family:"Fredoka",sans-serif;color:var(--ld);font-size:.9rem;margin-bottom:.8rem}
.exercise{background:#fafafa;border-radius:12px;padding:1rem;margin-bottom:.7rem;border:2px solid #eee;transition:.2s}
.exercise.correct{border-color:var(--ok);background:var(--ok-bg)}
.exercise.incorrect{border-color:var(--err);background:var(--err-bg)}
.exercise-q{font-size:.88rem;margin-bottom:.7rem;line-height:1.4}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:.4rem}
.opt-btn{padding:.65rem .5rem;border:2px solid #e0e0e0;border-radius:10px;background:var(--card);color:var(--text-soft);font-size:.83rem;font-weight:600;cursor:pointer;transition:.15s;font-family:"Nunito",sans-serif;text-align:left}
.opt-btn:hover:not(:disabled){border-color:var(--lp);background:var(--ll)}
.opt-btn:disabled{cursor:not-allowed;opacity:.7}
.opt-btn.sel-ok{background:var(--ok);color:#fff;border-color:var(--ok)}
.opt-btn.sel-bad{background:var(--err);color:#fff;border-color:var(--err)}
.opt-btn.show-ok{background:var(--ok);color:#fff;border-color:var(--ok)}
.fb{margin-top:.7rem;padding:0;border-radius:12px;font-size:.82rem;display:none;line-height:1.6;overflow:hidden}
.fb.show{display:block;animation:fbSlide .35s ease}
@keyframes fbSlide{from{opacity:0;max-height:0;transform:translateY(-8px)}to{opacity:1;max-height:600px;transform:translateY(0)}}
.fb-header{display:flex;align-items:center;gap:.5rem;padding:.7rem 1rem;font-family:"Fredoka",sans-serif;font-size:.85rem;font-weight:600}
.fb.fb-ok .fb-header{background:#C8E6C9;color:var(--ok)}
.fb.fb-bad .fb-header{background:#FFCDD2;color:var(--err)}
.fb-icon{font-size:1.2rem}
.fb-body{padding:.8rem 1rem}
.fb.fb-ok .fb-body{background:var(--ok-bg)}
.fb.fb-bad .fb-body{background:var(--err-bg)}
.fb-row{display:flex;align-items:flex-start;gap:.5rem;margin-bottom:.4rem}
.fb-row:last-child{margin-bottom:0}
.fb-dot{font-size:.9rem;flex-shrink:0;margin-top:1px}
.fb-text{flex:1}
.fb-correct-answer{color:var(--ok);font-weight:700}
.fb-wrong-reason{color:var(--err);font-weight:600}
.fb-example{display:inline-flex;align-items:center;gap:.3rem;margin-top:.4rem;padding:4px 10px;border-radius:6px;font-size:.78rem;font-weight:700}
.fb.fb-ok .fb-example{background:#A5D6A7;color:#1B5E20}
.fb.fb-bad .fb-example{background:#EF9A9A;color:#B71C1C}
.fb-tip{margin-top:.5rem;padding:.5rem .7rem;border-radius:8px;background:var(--note-bg);border:1px solid var(--note-border);font-size:.76rem;color:#33691E}
.fb-tip strong{color:var(--ld)}
.score-bar{text-align:center;padding:.8rem;background:var(--ll);border-radius:10px;margin-top:.8rem;border:1px solid var(--lm)}
.score-bar .num{font-family:"Fredoka",sans-serif;font-size:1.4rem;color:var(--ld)}
.score-bar .lbl{font-size:.7rem;color:var(--lp);font-weight:700;text-transform:uppercase;letter-spacing:1px}
.summary-final{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.6rem;margin-top:1rem;box-shadow:var(--shadow);border-top:3.5px solid var(--ok);display:none}
.summary-final.show{display:block;animation:fadeIn .4s ease}
.summary-final h3{font-family:"Fredoka",sans-serif;color:var(--ok);margin-bottom:.8rem;font-size:1.1rem}
.summary-final ul{list-style:none}
.summary-final li{padding:5px 0 5px 22px;position:relative;font-size:.84rem;color:var(--text-soft);border-bottom:1px solid var(--lm)}
.summary-final li:last-child{border-bottom:none}
.summary-final li:before{content:"\2713";position:absolute;left:0;color:var(--lp);font-weight:700}
@media(max-width:600px){
.level-header h1{font-size:1.4rem}
.compare-grid{grid-template-columns:1fr}
.card{padding:1.2rem}
.opts{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="container">
<div class="level-header">
  <div class="level-badge">&#x1F49A; A2 &middot; Grammar Summary</div>
  <h1>&#x1F4DD; Grammar Summary</h1>
  <div class="module-name">&#x1F6CE;&#xFE0F; Services, Support &amp; Problem Solving</div>
  <p class="subtitle">Used to (Past Habits &amp; States) &middot; 5 steps &times; 5 exercises</p>
</div>
<div class="step-tabs" id="stepTabs"></div>
<div id="cardArea"></div>
<div class="summary-final" id="summaryFinal">
  <h3>&#x1F393; Key Points &mdash; Used to</h3>
  <ul id="summaryList"></ul>
</div>
</div>
<script>
var STEPS = [{"icon": "\ud83c\uddea\ud83c\uddf8", "title": "Repaso en Espa\u00f1ol", "html": "<div class=\"section-label\">Paso 1</div>\n<div class=\"section-title\">Paso 1: \ud83c\uddea\ud83c\uddf8 Repaso en Espa\u00f1ol</div>\n<div class=\"section-desc\">En espa\u00f1ol usamos \"sol\u00eda + infinitivo\" o \"acostumbraba a + infinitivo\" para hablar de h\u00e1bitos o estados del pasado que ya no existen. En ingl\u00e9s existe una estructura fija para esto.</div>\n<div class=\"compare-grid\">\n  <div class=\"compare-card esp\">\n    <h4>\ud83c\uddea\ud83c\uddf8 Espa\u00f1ol \u2014 varias formas</h4>\n    <ul>\n      <li><b>Sol\u00eda</b> llamar a los clientes.</li>\n      <li><b>Acostumbraba</b> trabajar aqu\u00ed.</li>\n      <li>Antes <b>hab\u00eda</b> m\u00e1s problemas.</li>\n      <li>No <b>sol\u00edamos</b> tener soporte online.</li>\n    </ul>\n  </div>\n  <div class=\"compare-card eng\">\n    <h4>\ud83c\uddec\ud83c\udde7 English \u2014 estructura fija</h4>\n    <ul>\n      <li>I <b>used to</b> call the clients.</li>\n      <li>She <b>used to</b> work here.</li>\n      <li>There <b>used to be</b> more problems.</li>\n      <li>We <b>didn't use to</b> have online support.</li>\n    </ul>\n  </div>\n</div>\n<div class=\"tip-card\"><strong>\ud83d\udca1 Idea clave:</strong> <b>Used to</b> describe un h\u00e1bito o estado del pasado que ya <b>NO</b> existe ahora. Implica que las cosas han cambiado. \"I used to work there\" \u2192 ya no trabajo ah\u00ed.</div>\n<div class=\"used-to-visual\">\n  <div class=\"utv-timeline\">\n    <div class=\"utv-past\">\n      <div class=\"utv-past-label\">PASADO \u27f5</div>\n      <div class=\"utv-habit\">\n        <div class=\"utv-dot\">\u25cf</div>\n        <div class=\"utv-dot\">\u25cf</div>\n        <div class=\"utv-dot\">\u25cf</div>\n        <div class=\"utv-dot-label\">h\u00e1bito repetido</div>\n      </div>\n      <div class=\"utv-ex\">I <b>used to</b> call clients daily.</div>\n    </div>\n    <div class=\"utv-break\">\u2702\ufe0f cambio</div>\n    <div class=\"utv-now\">\n      <div class=\"utv-now-label\">AHORA \u25cf</div>\n      <div class=\"utv-now-ex\">I <b>don't</b> call them anymore.</div>\n    </div>\n  </div>\n</div>\n<div class=\"ex-row\"><div class=\"icon\">\ud83d\udcde</div><div><div class=\"en\">We <b>used to</b> handle all complaints by phone. <em>(ahora ya no)</em></div><div class=\"es\">Sol\u00edamos gestionar todas las quejas por tel\u00e9fono.</div></div></div>\n<div class=\"ex-row\"><div class=\"icon\">\ud83d\udcbb</div><div><div class=\"en\">There <b>used to be</b> no online system. <em>(ahora s\u00ed hay)</em></div><div class=\"es\">Antes no hab\u00eda ning\u00fan sistema online.</div></div></div>"}, {"icon": "\ud83e\udd1d", "title": "Similitudes", "html": "<div class=\"section-label\">Paso 2</div>\n<div class=\"section-title\">Paso 2: \ud83e\udd1d Similitudes ESP \u2194 ENG</div>\n<div class=\"section-desc\">Both languages use a specific structure to describe past habits that no longer continue. The concept is identical \u2014 the form is what differs.</div>\n<table class=\"g-table\">\n  <tr><th>Similitud</th><th>\ud83c\uddea\ud83c\uddf8 Espa\u00f1ol</th><th>\ud83c\uddec\ud83c\udde7 English</th></tr>\n  <tr><td>H\u00e1bito pasado terminado</td><td>Sol\u00eda llamar a los clientes.</td><td>I <span class=\"g-comp\">used to</span> call the clients.</td></tr>\n  <tr><td>Estado pasado terminado</td><td>Antes hab\u00eda m\u00e1s quejas.</td><td>There <span class=\"g-comp\">used to be</span> more complaints.</td></tr>\n  <tr><td>Negativo del h\u00e1bito</td><td>No sol\u00edamos tener sistema.</td><td>We <span class=\"g-neg\">didn't use to</span> have a system.</td></tr>\n  <tr><td>Pregunta sobre h\u00e1bito</td><td>\u00bfSol\u00edas hablar con ellos?</td><td><span class=\"g-quest\">Did</span> you <span class=\"g-quest\">use to</span> speak with them?</td></tr>\n  <tr><td>Implica cambio</td><td>Antes (ya no)</td><td>used to (not anymore)</td></tr>\n</table>\n<div class=\"section-label\">Las tres formas de used to</div>\n<div class=\"three-forms-grid\">\n  <div class=\"tfg-item tfg-aff\">\n    <div class=\"tfg-label\">\u2705 Afirmativo</div>\n    <div class=\"tfg-formula\">Subject + <b>used to</b> + V\u221e</div>\n    <div class=\"tfg-ex\">She <b>used to</b> send reports weekly.</div>\n    <div class=\"tfg-es\">Sol\u00eda enviar informes semanalmente.</div>\n  </div>\n  <div class=\"tfg-item tfg-neg\">\n    <div class=\"tfg-label\">\u274c Negativo</div>\n    <div class=\"tfg-formula\">Subject + <b>didn't use to</b> + V\u221e</div>\n    <div class=\"tfg-ex\">We <b>didn't use to</b> have online forms.</div>\n    <div class=\"tfg-es\">No sol\u00edamos tener formularios online.</div>\n  </div>\n  <div class=\"tfg-item tfg-q\">\n    <div class=\"tfg-label\">\u2753 Pregunta</div>\n    <div class=\"tfg-formula\"><b>Did</b> + subject + <b>use to</b> + V\u221e?</div>\n    <div class=\"tfg-ex\"><b>Did</b> you <b>use to</b> handle this manually?</div>\n    <div class=\"tfg-es\">\u00bfSol\u00edas gestionar esto manualmente?</div>\n  </div>\n</div>"}, {"icon": "\u26a1", "title": "Diferencias", "html": "<div class=\"section-label\">Paso 3</div>\n<div class=\"section-title\">Paso 3: \u26a1 Diferencias Importantes</div>\n<table class=\"g-table\">\n  <tr><th>\ud83c\uddea\ud83c\uddf8 Espa\u00f1ol</th><th>\ud83c\uddec\ud83c\udde7 Ingl\u00e9s</th><th>\ud83d\udca1 Regla</th></tr>\n  <tr><td>Sol\u00eda trabajar aqu\u00ed.</td><td>I <span class=\"g-comp\">used to</span> work here.</td><td>Afirmativo: used to (con -d)</td></tr>\n  <tr><td>No sol\u00eda trabajar aqu\u00ed.</td><td>I <span class=\"g-neg\">didn't use to</span> work here.</td><td>Negativo: use to (sin -d)</td></tr>\n  <tr><td>\u00bfSol\u00edas trabajar aqu\u00ed?</td><td><span class=\"g-quest\">Did</span> you <span class=\"g-quest\">use to</span> work here?</td><td>Pregunta: use to (sin -d)</td></tr>\n  <tr><td>Trabajaba aqu\u00ed. (una vez)</td><td>I <span class=\"g-verb\">worked</span> here. <em>(Past Simple)</em></td><td>Past Simple \u2260 used to</td></tr>\n  <tr><td>Estoy acostumbrado a trabajar.</td><td>I am <span class=\"g-verb\">used to</span> <span class=\"g-comp\">working</span>.</td><td>be used to + -ing (diferente)</td></tr>\n</table>\n<div class=\"alert-card\">\n  <div class=\"atitle\">\u26a0\ufe0f El error m\u00e1s com\u00fan: used to vs use to</div>\n  <div class=\"used-use-compare\">\n    <div class=\"uuc-row\">\n      <div class=\"uuc-ctx\">Afirmativo</div>\n      <div class=\"uuc-right\">She <b>used to</b> work here. \u2705</div>\n      <div class=\"uuc-note\">used to (con -d)</div>\n    </div>\n    <div class=\"uuc-row\">\n      <div class=\"uuc-ctx\">Negativo</div>\n      <div class=\"uuc-right\">She <b>didn't use to</b> work here. \u2705</div>\n      <div class=\"uuc-note\">use to (sin -d) \u2014 did ya marca pasado</div>\n    </div>\n    <div class=\"uuc-row uuc-err\">\n      <div class=\"uuc-ctx\">Error com\u00fan</div>\n      <div class=\"uuc-wrong\">She <b>didn't used to</b> work here. \u274c</div>\n      <div class=\"uuc-note\">Doble pasado \u2014 incorrecto</div>\n    </div>\n    <div class=\"uuc-row\">\n      <div class=\"uuc-ctx\">Pregunta</div>\n      <div class=\"uuc-right\">Did she <b>use to</b> work here? \u2705</div>\n      <div class=\"uuc-note\">use to (sin -d) \u2014 did ya marca pasado</div>\n    </div>\n    <div class=\"uuc-row uuc-err\">\n      <div class=\"uuc-ctx\">Error com\u00fan</div>\n      <div class=\"uuc-wrong\">Did she <b>used to</b> work here? \u274c</div>\n      <div class=\"uuc-note\">Doble pasado \u2014 incorrecto</div>\n    </div>\n  </div>\n</div>\n<div class=\"section-label\">Used to vs Past Simple \u2014 diferencia de matiz</div>\n<div class=\"matiz-grid\">\n  <div class=\"mz-col mz-ut\">\n    <div class=\"mz-header\">Used to \u2192 h\u00e1bito repetido</div>\n    <div class=\"mz-item\">I <b>used to call</b> clients every morning.</div>\n    <div class=\"mz-note\">\u2192 Era mi rutina habitual (ya no)</div>\n  </div>\n  <div class=\"mz-col mz-ps\">\n    <div class=\"mz-header\">Past Simple \u2192 acci\u00f3n concreta</div>\n    <div class=\"mz-item\">I <b>called</b> a client this morning.</div>\n    <div class=\"mz-note\">\u2192 Una acci\u00f3n espec\u00edfica (puede repetirse)</div>\n  </div>\n</div>"}, {"icon": "\ud83d\udca1", "title": "Consejos", "html": "<div class=\"section-label\">Paso 4</div>\n<div class=\"section-title\">Paso 4: \ud83d\udca1 Consejos Pr\u00e1cticos</div>\n<div class=\"tip-card\"><strong>Tip 1 \u2014 La regla del \"-d\":</strong> Solo el afirmativo lleva \"-d\": <b>used to</b>. En negativo e interrogativo, \"did\" ya marca el pasado, as\u00ed que el verbo vuelve a su forma base: <b>use to</b>. \"I <b>used</b> to call\" \u2705 / \"I <b>didn't use</b> to call\" \u2705 / \"Did you <b>use</b> to call?\" \u2705</div>\n<div class=\"tip-card\"><strong>Tip 2 \u2014 Se\u00f1al de cambio:</strong> Used to implica siempre un contraste con el presente. Si quieres enfatizarlo, a\u00f1ade \"but now...\": \"We <b>used to</b> handle complaints by phone, <b>but now</b> we have an online system.\" Esto hace el cambio muy claro.</div>\n<div class=\"tip-card\"><strong>Tip 3 \u2014 Used to \u2260 be used to:</strong> Son estructuras completamente diferentes. \"I <b>used to work</b> at night\" = sol\u00eda trabajar (h\u00e1bito pasado). \"I <b>am used to working</b> at night\" = estoy acostumbrado a trabajar (estado presente). La segunda usa -ing, no infinitivo.</div>\n<div class=\"tip-card\"><strong>Tip 4 \u2014 There used to be:</strong> Para hablar de cosas que exist\u00edan antes: \"There <b>used to be</b> a complaints department on this floor.\" (Ya no existe.) Es una estructura muy \u00fatil para describir cambios en organizaciones o procesos.</div>\n<div class=\"section-label\">Used to en contexto de servicios \u2014 ejemplos reales</div>\n<div class=\"context-examples-grid\">\n  <div class=\"ceg-item\">\n    <div class=\"ceg-icon\">\ud83d\udcde</div>\n    <div class=\"ceg-ex\">We <b>used to</b> handle all calls manually.</div>\n    <div class=\"ceg-now\">Now: we have an automated system.</div>\n  </div>\n  <div class=\"ceg-item\">\n    <div class=\"ceg-icon\">\ud83d\udccb</div>\n    <div class=\"ceg-ex\">Customers <b>used to</b> fill in paper forms.</div>\n    <div class=\"ceg-now\">Now: everything is digital.</div>\n  </div>\n  <div class=\"ceg-item\">\n    <div class=\"ceg-icon\">\u23f1\ufe0f</div>\n    <div class=\"ceg-ex\">Complaints <b>used to</b> take weeks to resolve.</div>\n    <div class=\"ceg-now\">Now: most are resolved in 3 days.</div>\n  </div>\n  <div class=\"ceg-item\">\n    <div class=\"ceg-icon\">\ud83d\udc65</div>\n    <div class=\"ceg-ex\">There <b>used to be</b> only one support agent.</div>\n    <div class=\"ceg-now\">Now: we have a full team.</div>\n  </div>\n</div>"}, {"icon": "\u2728", "title": "Pr\u00e1ctica Final", "html": "<div class=\"section-label\">Paso 5</div>\n<div class=\"section-title\">Paso 5: \u2728 Pr\u00e1ctica Final</div>\n<div class=\"formula-box\">\n  \u2705 <span class=\"g-subj\">Subject</span> + <span class=\"g-comp\">used to</span> + <span class=\"g-verb\">V\u221e</span> \u2192 h\u00e1bito/estado pasado terminado<br>\n  \u274c <span class=\"g-subj\">Subject</span> + <span class=\"g-neg\">didn't use to</span> + <span class=\"g-verb\">V\u221e</span> \u2192 negativo (use to, sin -d)<br>\n  \u2753 <span class=\"g-quest\">Did</span> + <span class=\"g-subj\">subject</span> + <span class=\"g-quest\">use to</span> + <span class=\"g-verb\">V\u221e</span>? \u2192 pregunta (use to, sin -d)\n</div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\ud83d\udcde</div><div><div class=\"en\">Our agents <span class=\"g-comp\">used to</span> <span class=\"g-verb\">call</span> every customer personally, but now we send automated emails.</div><div class=\"es\">Nuestros agentes sol\u00edan llamar a cada cliente personalmente, pero ahora enviamos emails autom\u00e1ticos.</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\ud83d\udcbb</div><div><div class=\"en\">We <span class=\"g-neg\">didn't use to</span> <span class=\"g-verb\">have</span> an online complaints system \u2014 everything was on paper.</div><div class=\"es\">No sol\u00edamos tener un sistema de quejas online \u2014 todo era en papel.</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\u2753</div><div><div class=\"en\"><span class=\"g-quest\">Did</span> the company <span class=\"g-quest\">use to</span> <span class=\"g-verb\">offer</span> 24-hour support?</div><div class=\"es\">\u00bfSol\u00eda la empresa ofrecer soporte 24 horas?</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\ud83c\udfe2</div><div><div class=\"en\">There <span class=\"g-comp\">used to be</span> a dedicated billing department, but it was merged with support.</div><div class=\"es\">Antes hab\u00eda un departamento de facturaci\u00f3n dedicado, pero se fusion\u00f3 con soporte.</div></div></div>\n<div class=\"ex-row ex-wrong\"><div class=\"icon\">\u274c</div><div><div class=\"en\">We didn't <b>used to</b> have this system. / Did they <b>used to</b> call daily?</div><div class=\"es\">Error: con did \u2192 use to (sin -d). Did ya marca el pasado.</div></div></div>\n<div class=\"alert-card\">\n  <div class=\"atitle\">\u26a0\ufe0f 3 Errores Comunes</div>\n  <p>\u274c \"She <b>didn't used to</b> work here\" \u2192 \u2705 \"She <b>didn't use to</b> work here\" (use to sin -d)<br>\n  \u274c \"Did you <b>used to</b> call them?\" \u2192 \u2705 \"Did you <b>use to</b> call them?\" (use to sin -d)<br>\n  \u274c \"I am <b>used to work</b> at night\" \u2192 \u2705 \"I am <b>used to working</b> at night\" (be used to + -ing)</p>\n</div>"}];
var EXERCISES = [[{"q": "\"Sol\u00edamos gestionar las quejas por tel\u00e9fono.\" \u2192 en ingl\u00e9s:", "a": "a", "o": ["We used to handle complaints by phone.", "We use to handle complaints by phone."], "fc": "Afirmativo: used to (con -d). We used to handle complaints by phone.", "fi": "Use to (sin -d) es para negativo e interrogativo. Afirmativo \u2192 used to.", "ex": "We used to handle complaints by phone. (h\u00e1bito pasado terminado)", "tip": "Afirmativo \u2192 used to (con -d)"}, {"q": "\"Used to\" implica que el h\u00e1bito:", "a": "b", "o": ["Contin\u00faa en el presente", "Ya no existe \u2014 hubo un cambio"], "fc": "Used to siempre implica que la situaci\u00f3n ha cambiado. Ya no ocurre.", "fi": "Si el h\u00e1bito contin\u00faa, no se usa used to. Se usa el presente simple.", "ex": "I used to work there. (ya no trabajo ah\u00ed \u2014 cambio)", "tip": "used to = h\u00e1bito PASADO que ya NO existe"}, {"q": "\"Antes no sol\u00edamos tener soporte online.\" \u2192 en ingl\u00e9s:", "a": "b", "o": ["We didn't used to have online support.", "We didn't use to have online support."], "fc": "Negativo: didn't use to (sin -d). Did ya marca el pasado.", "fi": "Didn't used to tiene doble pasado \u2014 incorrecto. La -d de pasado la pone did.", "ex": "We didn't use to have online support.", "tip": "Negativo \u2192 didn't use to (sin -d, did ya marca el pasado)"}, {"q": "\"\u00bfSol\u00edan los clientes rellenar formularios en papel?\" \u2192 en ingl\u00e9s:", "a": "a", "o": ["Did customers use to fill in paper forms?", "Did customers used to fill in paper forms?"], "fc": "Pregunta: Did + subject + use to (sin -d). Did ya marca el pasado.", "fi": "Did + used to tiene doble pasado \u2014 incorrecto.", "ex": "Did customers use to fill in paper forms?", "tip": "Pregunta \u2192 Did + subject + use to (sin -d)"}, {"q": "\"There ___ be a complaints department on this floor.\" (antes hab\u00eda)", "a": "a", "o": ["used to", "use to"], "fc": "Afirmativo: There used to be... Con -d. Para cosas que exist\u00edan antes.", "fi": "Use to (sin -d) es para negativo e interrogativo. Afirmativo \u2192 used to.", "ex": "There used to be a complaints department on this floor.", "tip": "There used to be = antes hab\u00eda (afirmativo \u2192 con -d)"}], [{"q": "\"She ___ to send weekly reports.\" (afirmativo \u2014 antes lo hac\u00eda)", "a": "a", "o": ["used", "use"], "fc": "Afirmativo: She used to send weekly reports. Con -d.", "fi": "Use (sin -d) va con did en negativo e interrogativo.", "ex": "She used to send weekly reports. (ya no lo hace)", "tip": "Afirmativo \u2192 used to (con -d)"}, {"q": "\"___ you use to work the night shift?\"", "a": "b", "o": ["Used", "Did"], "fc": "Pregunta: Did you use to...? Did introduce la pregunta.", "fi": "Used to es para afirmativo. La pregunta necesita Did como auxiliar.", "ex": "Did you use to work the night shift?", "tip": "Pregunta \u2192 Did + subject + use to (sin -d)"}, {"q": "\"We ___ use to have an automated system.\" (negativo)", "a": "a", "o": ["didn't", "not"], "fc": "Negativo: We didn't use to have... Auxiliar: didn't.", "fi": "Not solo no es suficiente. La negaci\u00f3n de used to necesita didn't use to.", "ex": "We didn't use to have an automated system.", "tip": "Negativo \u2192 didn't use to (auxiliar didn't)"}, {"q": "\"Used to\" describe:", "a": "b", "o": ["Una acci\u00f3n que ocurri\u00f3 una sola vez en el pasado", "Un h\u00e1bito o estado pasado que ya no existe"], "fc": "Used to = h\u00e1bito o estado repetido en el pasado que ya no existe ahora.", "fi": "Para una acci\u00f3n espec\u00edfica de una vez usamos Past Simple: I called yesterday.", "ex": "I used to call clients daily. (h\u00e1bito repetido, ya no)", "tip": "used to = h\u00e1bito/estado repetido, ya no \u00b7 PS = acci\u00f3n puntual"}, {"q": "Elige la oraci\u00f3n que describe un cambio en el pasado:", "a": "a", "o": ["Customers used to wait weeks for a response.", "Customers waited weeks for a response last year."], "fc": "Used to wait = h\u00e1bito del pasado que ya no existe (implica cambio).", "fi": "Waited last year es Past Simple \u2014 un momento espec\u00edfico, no implica necesariamente un cambio continuo.", "ex": "Customers used to wait weeks \u2014 now it takes 3 days.", "tip": "used to = h\u00e1bito pasado + cambio impl\u00edcito"}], [{"q": "Identifica el error:", "a": "b", "o": ["She used to manage the team. \u2705", "She didn't used to manage the team. \u274c \u2192 didn't use to"], "fc": "Didn't used to es doble pasado \u2014 incorrecto. La forma correcta es didn't use to (sin -d).", "fi": "She used to manage es correcto (afirmativo). El error est\u00e1 en el negativo.", "ex": "She didn't use to manage the team. (correcto)", "tip": "didn't + use to (sin -d) \u2014 did ya marca el pasado"}, {"q": "\"Did the company use to ___ support 24/7?\"", "a": "a", "o": ["offer", "offered"], "fc": "Despu\u00e9s de use to siempre va infinitivo: Did + subject + use to + infinitive.", "fi": "Offered es pasado simple. Despu\u00e9s de use to se usa el infinitivo (forma base).", "ex": "Did the company use to offer 24/7 support?", "tip": "use to + infinitivo (forma base, sin -ed)"}, {"q": "\"I used to work at night\" vs \"I am used to working at night\" \u2014 la diferencia:", "a": "b", "o": ["Son lo mismo, solo diferente registro", "La primera = h\u00e1bito pasado \u00b7 La segunda = estoy acostumbrado (ahora)"], "fc": "Used to + infinitivo = h\u00e1bito pasado terminado. Be used to + -ing = estar acostumbrado (estado presente).", "fi": "No son iguales. Used to work = sol\u00eda trabajar (ya no). Am used to working = ahora estoy acostumbrado.", "ex": "I used to work nights. (ya no) / I am used to working nights. (estoy acostumbrado)", "tip": "used to + V\u221e (h\u00e1bito pasado) vs be used to + -ing (acostumbrado)"}, {"q": "\"He ___ to call clients, but now he sends emails.\"", "a": "a", "o": ["used", "uses"], "fc": "H\u00e1bito pasado terminado \u2192 He used to call. Con -d. Contraste con el presente (but now).", "fi": "Uses to no existe. Para h\u00e1bito pasado: used to.", "ex": "He used to call clients, but now he sends emails. (cambio)", "tip": "Contraste con now \u2192 se\u00f1al de used to"}, {"q": "\"___ they use to process complaints manually?\" \u00bfCu\u00e1l es correcta?", "a": "b", "o": ["Used", "Did"], "fc": "Pregunta: Did + subject + use to... Did es el auxiliar para formar preguntas.", "fi": "Used to introduce el afirmativo, no la pregunta. La pregunta necesita Did.", "ex": "Did they use to process complaints manually?", "tip": "Pregunta \u2192 Did + use to (sin -d)"}], [{"q": "Un gerente describe cambios en la empresa: \"We ___ have paper files for everything.\"", "a": "a", "o": ["used to", "use to"], "fc": "Afirmativo: We used to have paper files. Con -d. Describe h\u00e1bito pasado terminado.", "fi": "Use to (sin -d) es para negativo e interrogativo.", "ex": "We used to have paper files for everything. (ya no)", "tip": "Afirmativo \u2192 used to (con -d)"}, {"q": "\"Customers ___ use to wait so long \u2014 it was much faster before.\"", "a": "b", "o": ["used", "didn't"], "fc": "El contexto es negativo (it was faster = no esperaban tanto). Didn't use to wait.", "fi": "Used to wait ser\u00eda afirmativo: sol\u00edan esperar mucho \u2014 pero el contexto indica lo contrario.", "ex": "Customers didn't use to wait so long. (negativo \u2014 antes era m\u00e1s r\u00e1pido)", "tip": "Contexto negativo \u2192 didn't use to"}, {"q": "\"___ the department ___ to handle international complaints?\"", "a": "a", "o": ["Did / use", "Used / to"], "fc": "Pregunta: Did the department use to...? Did + subject + use to.", "fi": "Used to sin Did no forma preguntas correctamente en ingl\u00e9s est\u00e1ndar.", "ex": "Did the department use to handle international complaints?", "tip": "Pregunta \u2192 Did + subject + use to + infinitive"}, {"q": "\"There ___ ___ only one customer service agent in this office.\"", "a": "b", "o": ["use to be", "used to be"], "fc": "Afirmativo: There used to be. Con -d. Para describir cosas que exist\u00edan antes.", "fi": "Use to be (sin -d) es para negativo e interrogativo.", "ex": "There used to be only one agent. (ya no)", "tip": "There used to be = antes hab\u00eda (afirmativo \u2192 con -d)"}, {"q": "\"I ___ used to receiving complaints like this.\" \u2014 \u00bfQu\u00e9 significa?", "a": "a", "o": ["am (be used to -ing = estoy acostumbrado)", "used to (h\u00e1bito pasado)"], "fc": "Am used to + -ing = estar acostumbrado a algo (estado presente). Diferente de used to + infinitivo.", "fi": "Used to + infinitivo = h\u00e1bito pasado terminado. Am used to + -ing = acostumbrado ahora.", "ex": "I am used to receiving complaints. (estoy acostumbrado = be used to + -ing)", "tip": "am/is/are used to + -ing = acostumbrado (estado presente)"}], [{"q": "\"Our team ___ to work from the office every day.\" (antes \u2014 afirmativo)", "a": "a", "o": ["used", "use"], "fc": "Afirmativo: Our team used to work from the office. Con -d.", "fi": "Use (sin -d) es para negativo e interrogativo.", "ex": "Our team used to work from the office every day.", "tip": "Afirmativo \u2192 used to (con -d)"}, {"q": "\"___ the company ___ to offer refunds automatically?\" (pregunta)", "a": "b", "o": ["Used / to", "Did / use"], "fc": "Pregunta: Did the company use to offer refunds? Did + subject + use to + infinitive.", "fi": "Used to sin Did no forma la pregunta correctamente.", "ex": "Did the company use to offer refunds automatically?", "tip": "Pregunta \u2192 Did + subject + use to (sin -d)"}, {"q": "\"Agents ___ use to have to fill in so many forms \u2014 the new system is much better.\"", "a": "b", "o": ["used", "didn't"], "fc": "El contexto es positivo sobre el cambio \u2014 antes era peor (muchos formularios). Didn't use to = negativo (ya no tienen que hacerlo, o antes ten\u00edan y ahora no).", "fi": "Revisando el contexto: 'new system is much better' implica que antes era m\u00e1s dif\u00edcil. Agents didn't use to have such a simple system.", "ex": "Agents didn't use to have such an efficient system.", "tip": "Contexto de mejora \u2192 negativo de lo que no hab\u00eda antes"}, {"q": "\"She ___ to be in charge of complaints, but her role changed.\"", "a": "a", "o": ["used", "use"], "fc": "Afirmativo: She used to be in charge. Con -d. H\u00e1bito/estado pasado terminado.", "fi": "Use to (sin -d) es solo para negativo e interrogativo.", "ex": "She used to be in charge of complaints.", "tip": "Afirmativo \u2192 used to (siempre con -d)"}, {"q": "Elige la oraci\u00f3n completamente correcta:", "a": "b", "o": ["Did they used to process claims this way?", "Did they use to process claims this way?"], "fc": "Pregunta: Did + subject + use to (sin -d). Did ya marca el pasado.", "fi": "Did they used to tiene doble pasado \u2014 incorrecto en ingl\u00e9s est\u00e1ndar.", "ex": "Did they use to process claims this way? (correcto)", "tip": "Did + use to (sin -d) \u2014 nunca: did + used to"}]];
var SUMMARY = ["<b>Used to + infinitivo</b> \u2192 h\u00e1bito o estado del pasado que ya NO ocurre: I used to work there", "<b>Afirmativo:</b> Subject + used to + infinitive: She used to handle complaints manually", "<b>Negativo:</b> Subject + didn't use to + infinitive: We didn't use to have online support", "<b>Pregunta:</b> Did + subject + use to + infinitive?: Did you use to call them every day?", "<b>OJO:</b> En negativo e interrogativo: 'use to' (sin -d) \u2014 porque 'did' ya marca el pasado", "<b>Used to \u2260 Past Simple:</b> 'used to work' implica h\u00e1bito repetido \u00b7 'worked' puede ser una vez", "<b>Used to \u2260 be used to:</b> 'used to do' = h\u00e1bito pasado \u00b7 'be used to doing' = estar acostumbrado"];
var curStep = 0;
var scores = {};
var answered = {};

function renderStepTabs() {
    var c = document.getElementById("stepTabs");
    c.innerHTML = "";
    STEPS.forEach(function(s, i) {
        var k = "s" + i;
        var allDone = [0,1,2,3,4].every(function(j){ return answered[k+"e"+j]; });
        var b = document.createElement("button");
        b.className = "step-tab" + (i === curStep ? " active" : "") + (allDone && i !== curStep ? " done" : "");
        b.textContent = (i + 1) + ". " + s.icon + " " + s.title;
        b.addEventListener("click", (function(idx){ return function(){
            curStep = idx;
            renderStepTabs();
            renderCard();
            document.getElementById("summaryFinal").classList.remove("show");
        };})(i));
        c.appendChild(b);
    });
}

function renderCard() {
    var s = STEPS[curStep];
    var exs = EXERCISES[curStep];
    var k = "s" + curStep;
    if (scores[k] === undefined) scores[k] = 0;
    var h = "<div class=\"card\">" + s.html;
    h += "<div class=\"ex-section\"><h3>&#x270F;&#xFE0F; Exercises &mdash; " + s.title + "</h3>";
    exs.forEach(function(e, i) {
        var eid = k + "e" + i;
        var longOpts = e.o[0].length > 44 || e.o[1].length > 44;
        var gs = longOpts ? " style=\"grid-template-columns:1fr\"" : "";
        h += "<div class=\"exercise\" id=\"" + eid + "\">";
        h += "<div class=\"exercise-q\">" + (i+1) + ". " + e.q + "</div>";
        h += "<div class=\"opts\"" + gs + ">";
        h += "<button class=\"opt-btn\" id=\"" + eid + "ba\">a) " + e.o[0] + "</button>";
        h += "<button class=\"opt-btn\" id=\"" + eid + "bb\">b) " + e.o[1] + "</button>";
        h += "</div>";
        var ct = e.a === "a" ? e.o[0] : e.o[1];
        h += "<div class=\"fb fb-ok\" id=\"fbok-" + eid + "\">";
        h += "<div class=\"fb-header\"><span class=\"fb-icon\">&#x1F389;</span> Correct!</div>";
        h += "<div class=\"fb-body\">";
        h += "<div class=\"fb-row\"><span class=\"fb-dot\">&#x2705;</span><div class=\"fb-text\"><span class=\"fb-correct-answer\">" + ct + "</span> &mdash; " + e.fc + "</div></div>";
        h += "<div class=\"fb-row\"><span class=\"fb-dot\">&#x1F4A1;</span><div class=\"fb-text\">The other option: " + e.fi + "</div></div>";
        if (e.ex) h += "<div class=\"fb-example\">&#x1F4DD; " + e.ex + "</div>";
        if (e.tip) h += "<div class=\"fb-tip\"><strong>&#x1F4A1; Remember:</strong> " + e.tip + "</div>";
        h += "</div></div>";
        h += "<div class=\"fb fb-bad\" id=\"fbbad-" + eid + "\">";
        h += "<div class=\"fb-header\"><span class=\"fb-icon\">&#x1F615;</span> Not quite right</div>";
        h += "<div class=\"fb-body\">";
        h += "<div class=\"fb-row\"><span class=\"fb-dot\">&#x274C;</span><div class=\"fb-text\"><span class=\"fb-wrong-reason\">" + e.fi + "</span></div></div>";
        h += "<div class=\"fb-row\"><span class=\"fb-dot\">&#x2705;</span><div class=\"fb-text\">The correct answer is <span class=\"fb-correct-answer\">" + ct + "</span> &mdash; " + e.fc + "</div></div>";
        if (e.ex) h += "<div class=\"fb-example\">&#x1F4DD; " + e.ex + "</div>";
        if (e.tip) h += "<div class=\"fb-tip\"><strong>&#x1F4A1; Remember:</strong> " + e.tip + "</div>";
        h += "</div></div></div>";
    });
    h += "<div class=\"score-bar\"><div class=\"num\" id=\"sc-" + k + "\">0/5</div><div class=\"lbl\">Score</div></div>";
    h += "</div></div>";
    document.getElementById("cardArea").innerHTML = h;
    exs.forEach(function(e, i) {
        var eid = k + "e" + i;
        document.getElementById(eid + "ba").addEventListener("click", (function(id){ return function(){ chk(id,"a"); }; })(eid));
        document.getElementById(eid + "bb").addEventListener("click", (function(id){ return function(){ chk(id,"b"); }; })(eid));
    });
}

function chk(eid, sel) {
    if (answered[eid]) return;
    answered[eid] = true;
    var parts = eid.match(/s(\d+)e(\d+)/);
    var si = parseInt(parts[1]);
    var ei = parseInt(parts[2]);
    var e = EXERCISES[si][ei];
    var k = "s" + si;
    var ex = document.getElementById(eid);
    var btnA = document.getElementById(eid + "ba");
    var btnB = document.getElementById(eid + "bb");
    btnA.disabled = true;
    btnB.disabled = true;
    if (sel === e.a) {
        ex.classList.add("correct");
        (sel === "a" ? btnA : btnB).classList.add("sel-ok");
        document.getElementById("fbok-" + eid).classList.add("show");
        scores[k]++;
    } else {
        ex.classList.add("incorrect");
        (sel === "a" ? btnA : btnB).classList.add("sel-bad");
        (e.a === "a" ? btnA : btnB).classList.add("show-ok");
        document.getElementById("fbbad-" + eid).classList.add("show");
    }
    document.getElementById("sc-" + k).textContent = scores[k] + "/5";
    var allDone = [0,1,2,3,4].every(function(i){ return answered[k + "e" + i]; });
    if (allDone && curStep === 4) {
        setTimeout(function() {
            var sf = document.getElementById("summaryFinal");
            document.getElementById("summaryList").innerHTML = SUMMARY.map(function(s){ return "<li>" + s + "</li>"; }).join("");
            sf.classList.add("show");
            sf.scrollIntoView({behavior:"smooth"});
        }, 600);
    }
}

renderStepTabs();
renderCard();
</script>
