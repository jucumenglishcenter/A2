<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grammar Summary — Indirect Questions | A2 | JUCUM</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Fredoka:wght@400;500;600;700&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
:root{
--bg:#FAFAF6;--card:#fff;--text:#2A2A2A;--text-soft:#777;--border:#E8E5DC;
--shadow:0 3px 16px rgba(0,0,0,.06);--radius:14px;
--lp:#4CAF50;--ld:#1B5E20;--ll:#E8F5E9;--lm:#C8E6C9;
--lg:linear-gradient(135deg,#388E3C,#4CAF50);--lglow:rgba(76,175,80,.15);
--badge-text:#1A3D1C;
--subj:#1565C0;--subj-bg:#E3F2FD;
--verb:#E53935;--verb-bg:#FFEBEE;
--comp:#00897B;--comp-bg:#E0F2F1;
--neg:#AD1457;--neg-bg:#FCE4EC;
--quest:#7B1FA2;--quest-bg:#F3E5F5;
--ok:#2E7D32;--ok-bg:#E8F5E9;
--err:#C62828;--err-bg:#FFEBEE;
--note-bg:#F1F8E9;--note-border:#AED581;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Nunito",sans-serif;background:var(--bg);color:var(--text);line-height:1.7;padding:1.5rem 1rem;-webkit-font-smoothing:antialiased}
.container{max-width:800px;margin:0 auto}
.level-header{text-align:center;padding:2rem;border-radius:20px;color:#fff;position:relative;overflow:hidden;margin-bottom:1.2rem;background:var(--lg)}
.level-header::before{content:"";position:absolute;top:-40%;right:-15%;width:250px;height:250px;background:rgba(255,255,255,.1);border-radius:50%}
.level-header h1{font-family:"Fredoka",sans-serif;font-size:1.8rem;font-weight:600;position:relative;z-index:1}
.level-header .module-name{font-family:"Fredoka",sans-serif;font-size:1.05rem;opacity:.95;position:relative;z-index:1;margin-top:.2rem}
.level-header .subtitle{opacity:.8;font-size:.83rem;position:relative;z-index:1;margin-top:.15rem}
.level-badge{display:inline-flex;align-items:center;gap:6px;font-size:.7rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;background:var(--ll);color:var(--badge-text);padding:4px 12px;border-radius:20px;border:1.5px solid var(--lm);margin-bottom:.8rem}
.step-tabs{display:flex;gap:.35rem;margin-bottom:1rem;flex-wrap:wrap}
.step-tab{padding:.45rem .85rem;border-radius:8px;font-size:.78rem;font-weight:700;cursor:pointer;border:2px solid var(--border);background:var(--card);transition:.2s;font-family:"Nunito",sans-serif}
.step-tab:hover{background:var(--ll)}
.step-tab.active{background:var(--ll);border-color:var(--lp);color:var(--ld)}
.step-tab.done{background:var(--ok-bg);border-color:var(--ok);color:var(--ok)}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.6rem;margin-bottom:1.2rem;box-shadow:var(--shadow);border-top:3.5px solid var(--lp);animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.section-label{display:flex;align-items:center;gap:.5rem;font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--ld);margin-bottom:.3rem;margin-top:1.1rem}
.section-label::before{content:"";width:20px;height:3px;background:var(--lp);border-radius:2px}
.section-label:first-child{margin-top:0}
.section-title{font-family:"Fredoka",sans-serif;font-size:1.25rem;font-weight:600;margin-bottom:.1rem}
.section-desc{font-size:.85rem;color:var(--text-soft);margin-bottom:1rem}
.g-subj{background:var(--subj-bg);color:var(--subj);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--subj);display:inline;margin:0 2px}
.g-verb{background:var(--verb-bg);color:var(--verb);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--verb);display:inline;margin:0 2px}
.g-comp{background:var(--comp-bg);color:var(--comp);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--comp);display:inline;margin:0 2px}
.g-neg{background:var(--neg-bg);color:var(--neg);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--neg);display:inline;margin:0 2px}
.g-quest{background:var(--quest-bg);color:var(--quest);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--quest);display:inline;margin:0 2px}
.g-table{width:100%;border-collapse:separate;border-spacing:0;margin:.8rem 0;border-radius:10px;overflow:hidden;font-size:.83rem;border:1px solid var(--border)}
.g-table th{background:var(--lg);color:#fff;padding:.65rem .6rem;font-size:.7rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
.g-table td{padding:.6rem;border-bottom:1px solid #f0f0f0;vertical-align:middle}
.g-table tr:nth-child(even) td{background:var(--ll)}
.g-table tr:last-child td{border-bottom:none}
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin:.8rem 0}
.compare-card{padding:1rem;border-radius:12px;text-align:center}
.compare-card.esp{background:var(--ll);border:2px solid var(--lm)}
.compare-card.eng{background:var(--subj-bg);border:2px solid #90CAF9}
.compare-card h4{font-family:"Fredoka",sans-serif;font-size:.85rem;margin-bottom:.5rem}
.compare-card.esp h4{color:var(--ld)}
.compare-card.eng h4{color:var(--subj)}
.compare-card ul{list-style:none;font-size:.82rem;color:var(--text-soft)}
.compare-card li{padding:3px 0}
.formula-box{background:var(--note-bg);border:2px solid var(--note-border);border-radius:12px;padding:1rem;margin:.8rem 0;text-align:center;font-family:"Fredoka",sans-serif;font-size:.9rem;color:var(--ld);line-height:2.2}
.tip-card{background:var(--ll);border-radius:10px;padding:.8rem 1rem;margin:.5rem 0;font-size:.83rem;border-left:3px solid var(--lp)}
.tip-card strong{color:var(--ld)}
.alert-card{background:var(--err-bg);border:2px solid #EF5350;border-radius:10px;padding:.8rem 1rem;margin:.8rem 0}
.alert-card .atitle{font-family:"Fredoka",sans-serif;color:var(--err);font-size:.82rem;margin-bottom:.3rem;font-weight:700}
.alert-card p{font-size:.82rem;color:#555;line-height:1.7}
.ex-row{display:flex;align-items:flex-start;gap:.6rem;padding:.6rem .8rem;border-radius:10px;margin:.4rem 0;font-size:.88rem}
.ex-row .icon{font-size:1.2rem;flex-shrink:0;margin-top:2px}
.ex-row .en{font-weight:700;color:var(--text)}
.ex-row .es{font-family:"Lora",serif;font-style:italic;font-size:.82rem;color:var(--text-soft);margin-top:1px}
.ex-right{border-left:3px solid var(--ok);background:var(--ok-bg)}
.ex-wrong{border-left:3px solid var(--err);background:var(--err-bg)}

/* REGISTER VISUAL */
.register-visual{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:.6rem;margin:1rem 0}
.rv-item{border-radius:12px;padding:.9rem;text-align:center}
.rv-direct{background:#FFF3E0;border:2px solid #FFB74D}
.rv-polite{background:var(--ok-bg);border:2px solid #A5D6A7}
.rv-label{font-family:"Fredoka",sans-serif;font-size:.85rem;font-weight:600;margin-bottom:.3rem}
.rv-direct .rv-label{color:#E65100}
.rv-polite .rv-label{color:var(--ok)}
.rv-ex{font-size:.79rem;font-weight:700;color:var(--text);margin-bottom:.3rem;line-height:1.4}
.rv-note{font-size:.7rem;color:var(--text-soft);font-style:italic}
.rv-arrow{font-size:1.5rem;color:var(--lp);font-weight:700;text-align:center}
/* INTRO PHRASES GRID */
.intro-phrases-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin:.9rem 0}
.ipg-item{border-radius:10px;padding:.7rem .9rem;background:#FAFAFA;border:1.5px solid var(--border)}
.ipg-phrase{font-weight:700;font-size:.82rem;color:var(--subj);margin-bottom:.15rem}
.ipg-es{font-family:"Lora",serif;font-style:italic;font-size:.76rem;color:var(--text-soft)}
.ipg-level{font-size:.68rem;font-weight:800;margin-top:.25rem;color:var(--lp)}
/* TWO RULES */
.two-rules{display:flex;flex-direction:column;gap:.5rem;margin-top:.6rem}
.rule-item{display:flex;align-items:flex-start;gap:.7rem;background:#fff;border-radius:10px;padding:.7rem .9rem;border:1px solid var(--border)}
.rule-num{font-family:"Fredoka",sans-serif;font-size:1.3rem;font-weight:700;color:#fff;background:var(--err);border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.rule-title{font-weight:700;font-size:.82rem;color:var(--text);margin-bottom:.3rem}
.rule-bad{font-size:.79rem;color:var(--err);margin-bottom:.2rem}
.rule-good{font-size:.79rem;color:var(--ok);font-weight:600}
/* TRANSFORM STEPS */
.transform-steps{margin:.9rem 0;background:#F8F9FA;border-radius:12px;padding:1rem;border:1px solid var(--border)}
.ts-example{margin:.3rem 0}
.ts-label{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--text-soft);margin-bottom:.2rem}
.ts-sent{font-size:.88rem;font-weight:700;padding:.4rem .7rem;border-radius:8px}
.direct-sent{background:#FFF3E0;color:#E65100}
.polite-sent{background:var(--ok-bg);color:var(--ld)}
.ts-arrow{text-align:center;font-size:.75rem;color:var(--text-soft);padding:.4rem 0;font-weight:600}
/* TRANSFORM GUIDE */
.transform-guide{border-radius:12px;overflow:hidden;border:1px solid var(--border);margin:1rem 0}
.tg-row{display:grid;grid-template-columns:1.4fr 1.4fr 1fr;border-bottom:1px solid #f0f0f0;font-size:.8rem}
.tg-row:last-child{border-bottom:none}
.tg-header{background:var(--lg);color:#fff;font-weight:800;font-size:.72rem;text-transform:uppercase;letter-spacing:.05em}
.tg-header .tg-cell{padding:.55rem .7rem}
.tg-cell{padding:.5rem .7rem;display:flex;align-items:center}
.direct-c{color:#E65100;font-weight:600}
.polite-c{color:var(--ok);font-weight:700}
.rule-c{color:var(--subj);font-size:.73rem;font-weight:700;font-style:italic}
@media(max-width:600px){
.register-visual{grid-template-columns:1fr;text-align:center}
.rv-arrow{transform:rotate(90deg)}
.intro-phrases-grid{grid-template-columns:1fr}
.tg-row{grid-template-columns:1fr 1fr}
.rule-c{display:none}
}

.ex-section{margin-top:1.2rem;padding-top:1rem;border-top:2px dashed var(--lm)}
.ex-section h3{font-family:"Fredoka",sans-serif;color:var(--ld);font-size:.9rem;margin-bottom:.8rem}
.exercise{background:#fafafa;border-radius:12px;padding:1rem;margin-bottom:.7rem;border:2px solid #eee;transition:.2s}
.exercise.correct{border-color:var(--ok);background:var(--ok-bg)}
.exercise.incorrect{border-color:var(--err);background:var(--err-bg)}
.exercise-q{font-size:.88rem;margin-bottom:.7rem;line-height:1.4}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:.4rem}
.opt-btn{padding:.65rem .5rem;border:2px solid #e0e0e0;border-radius:10px;background:var(--card);color:var(--text-soft);font-size:.83rem;font-weight:600;cursor:pointer;transition:.15s;font-family:"Nunito",sans-serif;text-align:left}
.opt-btn:hover:not(:disabled){border-color:var(--lp);background:var(--ll)}
.opt-btn:disabled{cursor:not-allowed;opacity:.7}
.opt-btn.sel-ok{background:var(--ok);color:#fff;border-color:var(--ok)}
.opt-btn.sel-bad{background:var(--err);color:#fff;border-color:var(--err)}
.opt-btn.show-ok{background:var(--ok);color:#fff;border-color:var(--ok)}
.fb{margin-top:.7rem;padding:0;border-radius:12px;font-size:.82rem;display:none;line-height:1.6;overflow:hidden}
.fb.show{display:block;animation:fbSlide .35s ease}
@keyframes fbSlide{from{opacity:0;max-height:0;transform:translateY(-8px)}to{opacity:1;max-height:600px;transform:translateY(0)}}
.fb-header{display:flex;align-items:center;gap:.5rem;padding:.7rem 1rem;font-family:"Fredoka",sans-serif;font-size:.85rem;font-weight:600}
.fb.fb-ok .fb-header{background:#C8E6C9;color:var(--ok)}
.fb.fb-bad .fb-header{background:#FFCDD2;color:var(--err)}
.fb-icon{font-size:1.2rem}
.fb-body{padding:.8rem 1rem}
.fb.fb-ok .fb-body{background:var(--ok-bg)}
.fb.fb-bad .fb-body{background:var(--err-bg)}
.fb-row{display:flex;align-items:flex-start;gap:.5rem;margin-bottom:.4rem}
.fb-row:last-child{margin-bottom:0}
.fb-dot{font-size:.9rem;flex-shrink:0;margin-top:1px}
.fb-text{flex:1}
.fb-correct-answer{color:var(--ok);font-weight:700}
.fb-wrong-reason{color:var(--err);font-weight:600}
.fb-example{display:inline-flex;align-items:center;gap:.3rem;margin-top:.4rem;padding:4px 10px;border-radius:6px;font-size:.78rem;font-weight:700}
.fb.fb-ok .fb-example{background:#A5D6A7;color:#1B5E20}
.fb.fb-bad .fb-example{background:#EF9A9A;color:#B71C1C}
.fb-tip{margin-top:.5rem;padding:.5rem .7rem;border-radius:8px;background:var(--note-bg);border:1px solid var(--note-border);font-size:.76rem;color:#33691E}
.fb-tip strong{color:var(--ld)}
.score-bar{text-align:center;padding:.8rem;background:var(--ll);border-radius:10px;margin-top:.8rem;border:1px solid var(--lm)}
.score-bar .num{font-family:"Fredoka",sans-serif;font-size:1.4rem;color:var(--ld)}
.score-bar .lbl{font-size:.7rem;color:var(--lp);font-weight:700;text-transform:uppercase;letter-spacing:1px}
.summary-final{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.6rem;margin-top:1rem;box-shadow:var(--shadow);border-top:3.5px solid var(--ok);display:none}
.summary-final.show{display:block;animation:fadeIn .4s ease}
.summary-final h3{font-family:"Fredoka",sans-serif;color:var(--ok);margin-bottom:.8rem;font-size:1.1rem}
.summary-final ul{list-style:none}
.summary-final li{padding:5px 0 5px 22px;position:relative;font-size:.84rem;color:var(--text-soft);border-bottom:1px solid var(--lm)}
.summary-final li:last-child{border-bottom:none}
.summary-final li:before{content:"\2713";position:absolute;left:0;color:var(--lp);font-weight:700}
@media(max-width:600px){
.level-header h1{font-size:1.4rem}
.compare-grid{grid-template-columns:1fr}
.card{padding:1.2rem}
.opts{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="container">
<div class="level-header">
  <div class="level-badge">&#x1F49A; A2 &middot; Grammar Summary</div>
  <h1>&#x1F4DD; Grammar Summary</h1>
  <div class="module-name">&#x1F6CE;&#xFE0F; Services, Support &amp; Problem Solving</div>
  <p class="subtitle">Indirect Questions (Polite Forms) &middot; 5 steps &times; 5 exercises</p>
</div>
<div class="step-tabs" id="stepTabs"></div>
<div id="cardArea"></div>
<div class="summary-final" id="summaryFinal">
  <h3>&#x1F393; Key Points &mdash; Indirect Questions</h3>
  <ul id="summaryList"></ul>
</div>
</div>
<script>
var STEPS = [{"icon": "\ud83c\uddea\ud83c\uddf8", "title": "Repaso en Espa\u00f1ol", "html": "<div class=\"section-label\">Paso 1</div>\n<div class=\"section-title\">Paso 1: \ud83c\uddea\ud83c\uddf8 Repaso en Espa\u00f1ol</div>\n<div class=\"section-desc\">En espa\u00f1ol tambi\u00e9n usamos preguntas indirectas para ser m\u00e1s corteses. La estructura es muy similar al ingl\u00e9s.</div>\n<div class=\"compare-grid\">\n  <div class=\"compare-card esp\">\n    <h4>\ud83c\uddea\ud83c\uddf8 Pregunta directa</h4>\n    <ul>\n      <li>\u00bfD\u00f3nde est\u00e1 la oficina?</li>\n      <li>\u00bfCu\u00e1ndo cierra?</li>\n      <li>\u00bfHay un gerente disponible?</li>\n      <li>\u00bfCu\u00e1nto cuesta?</li>\n    </ul>\n  </div>\n  <div class=\"compare-card eng\">\n    <h4>\ud83c\udfa9 Pregunta indirecta (cort\u00e9s)</h4>\n    <ul>\n      <li>\u00bfMe podr\u00eda decir <b>d\u00f3nde est\u00e1</b> la oficina?</li>\n      <li>\u00bfSabe <b>cu\u00e1ndo cierra</b>?</li>\n      <li>\u00bfPodr\u00eda decirme <b>si hay</b> un gerente?</li>\n      <li>\u00bfMe podr\u00eda indicar <b>cu\u00e1nto cuesta</b>?</li>\n    </ul>\n  </div>\n</div>\n<div class=\"tip-card\"><strong>\ud83d\udca1 Idea clave:</strong> La pregunta indirecta \"envuelve\" la pregunta directa con una frase cort\u00e9s. En espa\u00f1ol y en ingl\u00e9s el orden de las palabras cambia al hacerlo \u2014 el verbo ya no se invierte.</div>\n<div class=\"register-visual\">\n  <div class=\"rv-item rv-direct\">\n    <div class=\"rv-label\">\u26a1 Directo</div>\n    <div class=\"rv-ex\">\"Where is the manager?\"</div>\n    <div class=\"rv-note\">R\u00e1pido \u00b7 informal \u00b7 puede sonar brusco</div>\n  </div>\n  <div class=\"rv-arrow\">\u2192</div>\n  <div class=\"rv-item rv-polite\">\n    <div class=\"rv-label\">\ud83c\udfa9 Indirecto</div>\n    <div class=\"rv-ex\">\"Could you tell me where the manager is?\"</div>\n    <div class=\"rv-note\">Cort\u00e9s \u00b7 profesional \u00b7 atenci\u00f3n al cliente</div>\n  </div>\n</div>\n<div class=\"ex-row\"><div class=\"icon\">\ud83d\ude24</div><div><div class=\"en\">\"Where is my refund?\" <em>(directo \u2014 puede sonar agresivo)</em></div><div class=\"es\">\u00bfD\u00f3nde est\u00e1 mi reembolso?</div></div></div>\n<div class=\"ex-row\"><div class=\"icon\">\ud83d\ude0a</div><div><div class=\"en\">\"Could you tell me where my refund is?\" <em>(indirecto \u2014 profesional)</em></div><div class=\"es\">\u00bfPodr\u00eda decirme d\u00f3nde est\u00e1 mi reembolso?</div></div></div>"}, {"icon": "\ud83e\udd1d", "title": "Similitudes", "html": "<div class=\"section-label\">Paso 2</div>\n<div class=\"section-title\">Paso 2: \ud83e\udd1d Similitudes ESP \u2194 ENG</div>\n<div class=\"section-desc\">Both languages \"wrap\" a direct question inside a polite phrase \u2014 and both change word order when they do.</div>\n<table class=\"g-table\">\n  <tr><th>Similitud</th><th>\ud83c\uddea\ud83c\uddf8 Espa\u00f1ol</th><th>\ud83c\uddec\ud83c\udde7 English</th></tr>\n  <tr><td>Frase cort\u00e9s introductoria</td><td>\u00bfMe podr\u00eda decir...?</td><td><span class=\"g-quest\">Could you tell me</span>...?</td></tr>\n  <tr><td>Mismas palabras interrogativas</td><td>d\u00f3nde / cu\u00e1ndo / qui\u00e9n</td><td><span class=\"g-quest\">where / when / who</span></td></tr>\n  <tr><td>Orden afirmativo (no invertido)</td><td>...d\u00f3nde <b>est\u00e1</b> la oficina</td><td>...where the office <b>is</b></td></tr>\n  <tr><td>S\u00ed/No \u2192 conector especial</td><td>...si hay un gerente</td><td>...if/whether there is a manager</td></tr>\n  <tr><td>M\u00e1s cort\u00e9s que la directa</td><td>m\u00e1s formal / educado</td><td>more polite / professional</td></tr>\n</table>\n<div class=\"section-label\">Frases introductorias comunes</div>\n<div class=\"intro-phrases-grid\">\n  <div class=\"ipg-item\">\n    <div class=\"ipg-phrase\">Could you tell me...?</div>\n    <div class=\"ipg-es\">\u00bfMe podr\u00eda decir...?</div>\n    <div class=\"ipg-level\">\u2b50 muy com\u00fan</div>\n  </div>\n  <div class=\"ipg-item\">\n    <div class=\"ipg-phrase\">Do you know...?</div>\n    <div class=\"ipg-es\">\u00bfSabe usted...?</div>\n    <div class=\"ipg-level\">\u2b50 muy com\u00fan</div>\n  </div>\n  <div class=\"ipg-item\">\n    <div class=\"ipg-phrase\">Would you mind telling me...?</div>\n    <div class=\"ipg-es\">\u00bfLe importar\u00eda decirme...?</div>\n    <div class=\"ipg-level\">\ud83c\udfa9 muy formal</div>\n  </div>\n  <div class=\"ipg-item\">\n    <div class=\"ipg-phrase\">I was wondering...</div>\n    <div class=\"ipg-es\">Me preguntaba si...</div>\n    <div class=\"ipg-level\">\ud83c\udfa9 muy formal</div>\n  </div>\n  <div class=\"ipg-item\">\n    <div class=\"ipg-phrase\">Could you let me know...?</div>\n    <div class=\"ipg-es\">\u00bfMe podr\u00eda informar...?</div>\n    <div class=\"ipg-level\">\u2b50 muy com\u00fan</div>\n  </div>\n  <div class=\"ipg-item\">\n    <div class=\"ipg-phrase\">I'd like to know...</div>\n    <div class=\"ipg-es\">Me gustar\u00eda saber...</div>\n    <div class=\"ipg-level\">\u2705 neutro</div>\n  </div>\n</div>"}, {"icon": "\u26a1", "title": "Diferencias", "html": "<div class=\"section-label\">Paso 3</div>\n<div class=\"section-title\">Paso 3: \u26a1 Diferencias Importantes</div>\n<table class=\"g-table\">\n  <tr><th>\ud83c\uddea\ud83c\uddf8 / Pregunta directa</th><th>\ud83c\uddec\ud83c\udde7 Pregunta indirecta</th><th>\ud83d\udca1 Cambio</th></tr>\n  <tr><td>Where <b>is</b> the office?</td><td>Could you tell me where the office <b>is</b>?</td><td>Verbo al final, no invertido</td></tr>\n  <tr><td>When <b>does</b> it close?</td><td>Do you know when it <b>closes</b>?</td><td>Sin do/does/did</td></tr>\n  <tr><td>Who <b>did</b> you speak to?</td><td>Could you tell me who you <b>spoke</b> to?</td><td>Sin did \u2014 verbo en pasado</td></tr>\n  <tr><td><b>Is</b> there a manager?</td><td>Could you tell me <b>if</b> there is a manager?</td><td>S\u00ed/No \u2192 if/whether</td></tr>\n  <tr><td>What <b>does</b> it cost?</td><td>I was wondering what it <b>costs</b>.</td><td>Sin does; costs (3\u00aa persona)</td></tr>\n</table>\n<div class=\"alert-card\">\n  <div class=\"atitle\">\u26a0\ufe0f Las dos reglas cr\u00edticas</div>\n  <div class=\"two-rules\">\n    <div class=\"rule-item rule-1\">\n      <div class=\"rule-num\">1</div>\n      <div class=\"rule-content\">\n        <div class=\"rule-title\">Orden afirmativo \u2014 NO inversi\u00f3n</div>\n        <div class=\"rule-bad\">\u274c Could you tell me <b>where is</b> the office?</div>\n        <div class=\"rule-good\">\u2705 Could you tell me <b>where the office is</b>?</div>\n      </div>\n    </div>\n    <div class=\"rule-item rule-2\">\n      <div class=\"rule-num\">2</div>\n      <div class=\"rule-content\">\n        <div class=\"rule-title\">S\u00ed/No questions \u2192 if / whether</div>\n        <div class=\"rule-bad\">\u274c Could you tell me <b>is there</b> a manager?</div>\n        <div class=\"rule-good\">\u2705 Could you tell me <b>if there is</b> a manager?</div>\n      </div>\n    </div>\n  </div>\n</div>\n<div class=\"section-label\">Transformaci\u00f3n paso a paso</div>\n<div class=\"transform-steps\">\n  <div class=\"ts-example\">\n    <div class=\"ts-label\">Pregunta directa:</div>\n    <div class=\"ts-sent direct-sent\"><span class=\"g-quest\">Where</span> <span class=\"g-verb\">does</span> the manager <span class=\"g-verb\">work</span>?</div>\n  </div>\n  <div class=\"ts-arrow\">\u2193 1. A\u00f1adir frase cort\u00e9s &nbsp; 2. Quitar do/does &nbsp; 3. Orden afirmativo</div>\n  <div class=\"ts-example\">\n    <div class=\"ts-label\">Pregunta indirecta:</div>\n    <div class=\"ts-sent polite-sent\">Could you tell me <span class=\"g-quest\">where</span> the manager <span class=\"g-comp\">works</span>?</div>\n  </div>\n</div>\n<div class=\"ex-row ex-wrong\"><div class=\"icon\">\u274c</div><div><div class=\"en\">Do you know where <b>does</b> the office close?</div><div class=\"es\">Error: no se usa do/does en indirecta \u2192 where the office closes</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\u2705</div><div><div class=\"en\">Do you know where the office <span class=\"g-comp\">closes</span>?</div><div class=\"es\">\u00bfSabe a qu\u00e9 hora cierra la oficina?</div></div></div>"}, {"icon": "\ud83d\udca1", "title": "Consejos", "html": "<div class=\"section-label\">Paso 4</div>\n<div class=\"section-title\">Paso 4: \ud83d\udca1 Consejos Pr\u00e1cticos</div>\n<div class=\"tip-card\"><strong>Tip 1 \u2014 Orden afirmativo siempre:</strong> Despu\u00e9s de la frase introductoria, escribe la pregunta como si fuera una oraci\u00f3n afirmativa. \"Where IS the office?\" \u2192 \"...where the office IS.\" El verbo va al final, nunca antes del sujeto.</div>\n<div class=\"tip-card\"><strong>Tip 2 \u2014 Adi\u00f3s a do/does/did:</strong> En las preguntas directas necesitas do/does/did. En las indirectas NO. \"Where does it close?\" \u2192 \"...where it closes.\" El verbo recupera su forma normal con -s (3\u00aa persona).</div>\n<div class=\"tip-card\"><strong>Tip 3 \u2014 S\u00ed/No siempre con if o whether:</strong> Si la pregunta directa no tiene palabra interrogativa (who, what, where...) \u2192 a\u00f1ade <b>if</b> o <b>whether</b>. \"Is the manager available?\" \u2192 \"...if/whether the manager is available.\"</div>\n<div class=\"tip-card\"><strong>Tip 4 \u2014 En atenci\u00f3n al cliente, elige siempre la indirecta:</strong> \"Where is the form?\" (directo, brusco) \u2192 \"Could you tell me where the form is?\" (cort\u00e9s, profesional). En servicios, la pregunta indirecta construye mejor relaci\u00f3n con el cliente.</div>\n<div class=\"section-label\">Gu\u00eda de transformaci\u00f3n r\u00e1pida</div>\n<div class=\"transform-guide\">\n  <div class=\"tg-row tg-header\">\n    <div class=\"tg-cell\">Pregunta directa</div>\n    <div class=\"tg-cell\">Pregunta indirecta</div>\n    <div class=\"tg-cell\">Regla aplicada</div>\n  </div>\n  <div class=\"tg-row\">\n    <div class=\"tg-cell direct-c\">Where <b>is</b> the form?</div>\n    <div class=\"tg-cell polite-c\">...where the form <b>is</b></div>\n    <div class=\"tg-cell rule-c\">orden afirmativo</div>\n  </div>\n  <div class=\"tg-row\">\n    <div class=\"tg-cell direct-c\">When <b>does</b> it open?</div>\n    <div class=\"tg-cell polite-c\">...when it <b>opens</b></div>\n    <div class=\"tg-cell rule-c\">sin do/does</div>\n  </div>\n  <div class=\"tg-row\">\n    <div class=\"tg-cell direct-c\">Who <b>did</b> she call?</div>\n    <div class=\"tg-cell polite-c\">...who she <b>called</b></div>\n    <div class=\"tg-cell rule-c\">sin did</div>\n  </div>\n  <div class=\"tg-row\">\n    <div class=\"tg-cell direct-c\"><b>Is</b> there a manager?</div>\n    <div class=\"tg-cell polite-c\">...<b>if</b> there is a manager</div>\n    <div class=\"tg-cell rule-c\">s\u00ed/no \u2192 if</div>\n  </div>\n  <div class=\"tg-row\">\n    <div class=\"tg-cell direct-c\">What <b>does</b> it cost?</div>\n    <div class=\"tg-cell polite-c\">...what it <b>costs</b></div>\n    <div class=\"tg-cell rule-c\">sin does; -s</div>\n  </div>\n</div>"}, {"icon": "\u2728", "title": "Pr\u00e1ctica Final", "html": "<div class=\"section-label\">Paso 5</div>\n<div class=\"section-title\">Paso 5: \u2728 Pr\u00e1ctica Final</div>\n<div class=\"formula-box\">\n  <span class=\"g-quest\">Polite phrase</span> + <span class=\"g-comp\">question word</span> + <span class=\"g-subj\">subject</span> + <span class=\"g-verb\">verb</span> (afirmativo) ?<br>\n  <span class=\"g-quest\">Polite phrase</span> + <span class=\"g-neg\">if / whether</span> + <span class=\"g-subj\">subject</span> + <span class=\"g-verb\">verb</span> ? <em>(s\u00ed/no)</em>\n</div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\ud83d\udccb</div><div><div class=\"en\"><span class=\"g-quest\">Could you tell me</span> <span class=\"g-comp\">where</span> <span class=\"g-subj\">I</span> <span class=\"g-verb\">can</span> find the complaint form?</div><div class=\"es\">\u00bfPodr\u00eda decirme d\u00f3nde puedo encontrar el formulario de queja?</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\u23f0</div><div><div class=\"en\"><span class=\"g-quest\">Do you know</span> <span class=\"g-comp\">when</span> <span class=\"g-subj\">the office</span> <span class=\"g-verb\">opens</span> on Mondays?</div><div class=\"es\">\u00bfSabe cu\u00e1ndo abre la oficina los lunes?</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\ud83d\udc64</div><div><div class=\"en\"><span class=\"g-quest\">Could you let me know</span> <span class=\"g-neg\">if</span> <span class=\"g-subj\">a manager</span> <span class=\"g-verb\">is</span> available?</div><div class=\"es\">\u00bfMe podr\u00eda informar si hay un gerente disponible?</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">\ud83d\udcb0</div><div><div class=\"en\"><span class=\"g-quest\">I was wondering</span> <span class=\"g-comp\">what</span> <span class=\"g-subj\">the processing fee</span> <span class=\"g-verb\">is</span>.</div><div class=\"es\">Me preguntaba cu\u00e1l era la tarifa de gesti\u00f3n.</div></div></div>\n<div class=\"ex-row ex-wrong\"><div class=\"icon\">\u274c</div><div><div class=\"en\">Could you tell me where <b>is</b> the manager? / Do you know when <b>does</b> it close?</div><div class=\"es\">Error: inversi\u00f3n y do/does no se usan en preguntas indirectas</div></div></div>\n<div class=\"alert-card\">\n  <div class=\"atitle\">\u26a0\ufe0f 3 Errores Comunes</div>\n  <p>\u274c \"Could you tell me <b>where is</b> the form?\" \u2192 \u2705 \"...where the form <b>is</b>?\" (orden afirmativo)<br>\n  \u274c \"Do you know when <b>does</b> it open?\" \u2192 \u2705 \"...when it <b>opens</b>?\" (sin do/does)<br>\n  \u274c \"Could you tell me <b>is</b> there a manager?\" \u2192 \u2705 \"...<b>if</b> there is a manager?\" (s\u00ed/no \u2192 if)</p>\n</div>"}];
var EXERCISES = [[{"q": "\u00bfPara qu\u00e9 sirve una pregunta indirecta?", "a": "b", "o": ["Para pedir informaci\u00f3n urgente", "Para ser m\u00e1s cort\u00e9s y profesional"], "fc": "Las preguntas indirectas son m\u00e1s corteses y formales. Ideales en atenci\u00f3n al cliente.", "fi": "Para urgencia se usa la pregunta directa. La indirecta prioriza la cortes\u00eda.", "ex": "Could you tell me where the manager is? (cort\u00e9s)", "tip": "Indirecta = cortes\u00eda \u00b7 Directa = r\u00e1pido/informal"}, {"q": "\"Where is the form?\" \u2192 pregunta indirecta cort\u00e9s:", "a": "a", "o": ["Could you tell me where the form is?", "Could you tell me where is the form?"], "fc": "Orden afirmativo: where the form IS (no invertimos verbo y sujeto).", "fi": "Where is the form? invierte. En indirecta: where the form is (orden afirmativo).", "ex": "Could you tell me where the form is?", "tip": "Indirecta \u2192 orden afirmativo (sujeto + verbo, no invertido)"}, {"q": "\u00bfCu\u00e1l es la frase introductoria?", "a": "b", "o": ["Where the office is?", "Could you tell me where the office is?"], "fc": "La pregunta indirecta siempre empieza con una frase cort\u00e9s: Could you tell me / Do you know...", "fi": "Where the office is es solo la parte interior. Necesita la frase introductoria.", "ex": "Could you tell me... / Do you know... / I was wondering...", "tip": "Siempre empieza con la frase introductoria cort\u00e9s"}, {"q": "\"Is there a manager available?\" \u2192 pregunta indirecta:", "a": "b", "o": ["Do you know where there is a manager available?", "Do you know if there is a manager available?"], "fc": "Pregunta de s\u00ed/no \u2192 a\u00f1adimos 'if'. Do you know if there is a manager available?", "fi": "Where es para preguntar lugar. Is there...? es s\u00ed/no \u2192 if/whether.", "ex": "Could you tell me if a manager is available?", "tip": "S\u00ed/No sin palabra interrogativa \u2192 if / whether"}, {"q": "En atenci\u00f3n al cliente, \u00bfcu\u00e1l es preferible?", "a": "b", "o": ["Where is the complaint form?", "Could you tell me where the complaint form is?"], "fc": "La indirecta es m\u00e1s profesional y cort\u00e9s \u2014 mejor para construir relaci\u00f3n con el cliente.", "fi": "La directa no es incorrecta, pero suena m\u00e1s brusca en un contexto de servicio.", "ex": "Could you tell me where the complaint form is? (profesional)", "tip": "Servicio al cliente \u2192 siempre preferir la pregunta indirecta"}], [{"q": "\"Do you know...?\" es una frase introductoria que:", "a": "a", "o": ["Introduce una pregunta indirecta cort\u00e9s", "Pide confirmaci\u00f3n de algo conocido"], "fc": "Do you know...? es una de las frases introductorias m\u00e1s comunes para preguntas indirectas.", "fi": "Aunque suena a pregunta sobre conocimiento, su funci\u00f3n es introducir cort\u00e9smente una pregunta.", "ex": "Do you know where the office is? / Do you know when it opens?", "tip": "Do you know + question word + subject + verb (afirmativo)"}, {"q": "\"Could you tell me where the manager IS?\" \u2014 el verbo \"is\" est\u00e1 al final porque:", "a": "b", "o": ["Es un error \u2014 deber\u00eda ir antes", "El orden en indirectas es afirmativo (sujeto + verbo)"], "fc": "En indirectas el orden es afirmativo: where the manager IS. No se invierte.", "fi": "En directas: Where IS the manager? En indirectas el orden cambia a afirmativo.", "ex": "where the manager is / when the office opens / what the fee is", "tip": "Orden indirecto = sujeto + verbo (afirmativo, no invertido)"}, {"q": "\"Would you mind telling me...?\" es:", "a": "a", "o": ["Una frase introductoria muy formal", "Una pregunta directa"], "fc": "Would you mind telling me...? es muy formal y educada. Ideal en situaciones delicadas.", "fi": "No es directa \u2014 es una de las formas m\u00e1s corteses de hacer una pregunta indirecta.", "ex": "Would you mind telling me what the problem is?", "tip": "Would you mind telling me = muy formal/cort\u00e9s"}, {"q": "\"I was wondering...\" introduce una pregunta indirecta que termina en:", "a": "b", "o": ["Signo de interrogaci\u00f3n (?)", "Punto (.)"], "fc": "I was wondering... es un statement, no una pregunta. Termina en punto: I was wondering what the fee is.", "fi": "Las frases con I was wondering / I'd like to know terminan en punto, no en ?", "ex": "I was wondering what the processing fee is. (punto)", "tip": "I was wondering... \u2192 termina en punto (.)"}, {"q": "La frase 'if' en preguntas indirectas reemplaza a:", "a": "a", "o": ["La inversi\u00f3n de sujeto-verbo en preguntas s\u00ed/no", "La palabra 'where' en preguntas de lugar"], "fc": "If reemplaza la inversi\u00f3n. 'Is there a form?' \u2192 '...if there is a form' (no inversi\u00f3n).", "fi": "Where es para lugar. If es para preguntas s\u00ed/no que no tienen palabra interrogativa.", "ex": "Is there a manager? \u2192 if there is a manager", "tip": "S\u00ed/No sin wh- word \u2192 if / whether"}], [{"q": "\"When does the office close?\" \u2192 pregunta indirecta:", "a": "b", "o": ["Do you know when does the office close?", "Do you know when the office closes?"], "fc": "Sin do/does en indirectas. El verbo recupera su forma: closes (3\u00aa persona + s).", "fi": "Does no se usa en preguntas indirectas. La forma del verbo cambia: close \u2192 closes.", "ex": "Do you know when the office closes?", "tip": "Sin do/does en indirectas. Verbo: +s en 3\u00aa persona"}, {"q": "\"Who did the customer speak to?\" \u2192 pregunta indirecta:", "a": "a", "o": ["Could you tell me who the customer spoke to?", "Could you tell me who did the customer speak to?"], "fc": "Sin did en indirectas. El verbo va en pasado simple: spoke (no did speak).", "fi": "Did no se usa en indirectas. El verbo va en su forma de pasado directamente: spoke.", "ex": "Could you tell me who the customer spoke to?", "tip": "Sin did en indirectas \u2192 verbo en pasado simple"}, {"q": "\"Is the complaint form available online?\" \u2192 pregunta indirecta:", "a": "b", "o": ["Could you tell me where the complaint form is available online?", "Could you tell me if the complaint form is available online?"], "fc": "Is there...? / Is it...? = s\u00ed/no \u2192 a\u00f1adimos if. No hay wh- word \u2192 if/whether.", "fi": "Where es para preguntar lugar. Esta es una pregunta s\u00ed/no \u2192 if.", "ex": "Could you tell me if the complaint form is available online?", "tip": "Pregunta s\u00ed/no \u2192 if / whether (no where)"}, {"q": "Identifica el error:", "a": "a", "o": ["Could you tell me where is the refund? \u274c", "Could you tell me where the refund is? \u2705"], "fc": "Where is the refund? = directa. En indirecta: where the refund IS (orden afirmativo).", "fi": "La segunda opci\u00f3n es correcta: orden afirmativo where the refund is.", "ex": "Could you tell me where the refund is? (correcto)", "tip": "Nunca invertir verbo y sujeto en la pregunta indirecta"}, {"q": "\"What does the service cost?\" \u2192 pregunta indirecta:", "a": "a", "o": ["I was wondering what the service costs.", "I was wondering what does the service cost."], "fc": "Sin does; el verbo recupera forma: costs. I was wondering \u2192 termina en punto.", "fi": "Does no se usa en indirectas. Tampoco se invierte: what the service costs.", "ex": "I was wondering what the service costs. (punto al final)", "tip": "Sin does \u2192 verbo con -s (3\u00aa persona). I was wondering \u2192 punto"}], [{"q": "Un agente quiere preguntar d\u00f3nde firm\u00f3 el cliente. \u00bfCu\u00e1l es m\u00e1s profesional?", "a": "b", "o": ["Where did you sign?", "Could you tell me where you signed?"], "fc": "La indirecta es m\u00e1s profesional y cort\u00e9s en atenci\u00f3n al cliente.", "fi": "La directa no es incorrecta pero suena menos profesional en este contexto.", "ex": "Could you tell me where you signed the form?", "tip": "Atenci\u00f3n al cliente \u2192 preferir la indirecta"}, {"q": "\"Do you know if the system is working?\" \u2014 \u00bfpor qu\u00e9 se usa \"if\"?", "a": "a", "o": ["Porque la pregunta directa es s\u00ed/no: 'Is the system working?'", "Porque 'if' siempre va en preguntas indirectas"], "fc": "Is the system working? = s\u00ed/no \u2192 en indirecta se a\u00f1ade if. No hay wh- word.", "fi": "If no va en todas las indirectas \u2014 solo en las que vienen de preguntas s\u00ed/no.", "ex": "Is the system working? \u2192 Do you know if the system is working?", "tip": "if solo para preguntas de s\u00ed/no (sin wh- word)"}, {"q": "Transforma: \"When does the manager arrive?\" (con Could you tell me)", "a": "b", "o": ["Could you tell me when does the manager arrive?", "Could you tell me when the manager arrives?"], "fc": "Sin does; verbo con -s: arrives. Orden afirmativo: the manager arrives.", "fi": "Does no se usa en indirectas. El verbo toma su forma normal con -s.", "ex": "Could you tell me when the manager arrives?", "tip": "When does \u2192 when + sujeto + verbo(-s)"}, {"q": "\u00bfCu\u00e1l termina correctamente en punto?", "a": "a", "o": ["I was wondering if you could help me.", "I was wondering if you could help me?"], "fc": "I was wondering... es un statement. Termina en punto, no en signo de interrogaci\u00f3n.", "fi": "Aunque tiene sentido de pregunta, I was wondering es gramaticalmente un statement \u2192 punto.", "ex": "I was wondering if you could help me. / I was wondering what the policy is.", "tip": "I was wondering / I'd like to know \u2192 punto (no ?)"}, {"q": "\"Could you let me know ___ the office is open on Saturdays?\"", "a": "b", "o": ["where", "if"], "fc": "Is the office open on Saturdays? = s\u00ed/no \u2192 if. No hay lugar que preguntar.", "fi": "Where pregunta lugar. Esta pregunta es s\u00ed/no (open or not) \u2192 if/whether.", "ex": "Could you let me know if the office is open on Saturdays?", "tip": "S\u00ed/No \u2192 if \u00b7 Lugar \u2192 where \u00b7 Tiempo \u2192 when"}], [{"q": "\"Where is the complaint department?\" \u2192 forma cort\u00e9s:", "a": "a", "o": ["Could you tell me where the complaint department is?", "Could you tell me where is the complaint department?"], "fc": "Orden afirmativo: where the complaint department IS. No se invierte.", "fi": "Where is the complaint department = directa. Indirecta \u2192 orden afirmativo.", "ex": "Could you tell me where the complaint department is?", "tip": "Indirecta \u2192 orden afirmativo (sujeto + verbo al final)"}, {"q": "\"Does the manager handle refunds?\" \u2192 pregunta indirecta:", "a": "b", "o": ["Do you know if does the manager handle refunds?", "Do you know if the manager handles refunds?"], "fc": "S\u00ed/No \u2192 if. Sin does; verbo con -s: handles. Orden afirmativo.", "fi": "Does no se usa en indirectas. La forma correcta es handles (3\u00aa persona).", "ex": "Do you know if the manager handles refunds?", "tip": "S\u00ed/No \u2192 if + sujeto + verbo (sin does/did)"}, {"q": "\"What time did the customer call?\" \u2192 pregunta indirecta cort\u00e9s:", "a": "a", "o": ["Could you tell me what time the customer called?", "Could you tell me what time did the customer call?"], "fc": "Sin did; verbo en pasado: called. Orden afirmativo: the customer called.", "fi": "Did no se usa en indirectas. El verbo va en su forma de pasado: called.", "ex": "Could you tell me what time the customer called?", "tip": "Sin did \u2192 verbo en pasado simple"}, {"q": "El cliente dice: \"I was wondering ___ I could speak to a supervisor.\"", "a": "b", "o": ["where", "if"], "fc": "Could I speak to a supervisor? = s\u00ed/no \u2192 if. I was wondering termina en punto.", "fi": "Where pregunta lugar. Aqu\u00ed la pregunta base es s\u00ed/no (can I speak to...?).", "ex": "I was wondering if I could speak to a supervisor.", "tip": "I was wondering + if (s\u00ed/no) \u00b7 termina en punto"}, {"q": "Elige la pregunta indirecta completamente correcta:", "a": "b", "o": ["Do you know when does the office close?", "Do you know when the office closes?"], "fc": "Sin does; verbo con -s: closes. Orden afirmativo: the office closes.", "fi": "Does no se usa en indirectas y el orden no se invierte.", "ex": "Do you know when the office closes?", "tip": "Sin do/does/did + orden afirmativo = las dos reglas clave"}]];
var SUMMARY = ["<b>Indirect questions</b> \u2192 m\u00e1s corteses y formales: Could you tell me where the office is?", "<b>Estructura:</b> polite phrase + question word + subject + verb (orden afirmativo, NO invertido)", "<b>Frases introductorias comunes:</b> Could you tell me...? / Do you know...? / Would you mind telling me...? / I was wondering...", "<b>Sin inversi\u00f3n:</b> Where IS the office? \u2192 Could you tell me where the office IS? (no: where IS the office)", "<b>Con yes/no questions:</b> usar 'if' o 'whether': Is there a manager? \u2192 Could you tell me IF there is a manager?", "<b>Sin auxiliar do/does/did:</b> Where does she work? \u2192 Do you know where she WORKS? (no: where does she work)", "<b>Registro:</b> directo = r\u00e1pido \u00b7 indirecto = cort\u00e9s, profesional, atenci\u00f3n al cliente"];
var curStep = 0;
var scores = {};
var answered = {};

function renderStepTabs() {
    var c = document.getElementById("stepTabs");
    c.innerHTML = "";
    STEPS.forEach(function(s, i) {
        var k = "s" + i;
        var allDone = [0,1,2,3,4].every(function(j){ return answered[k+"e"+j]; });
        var b = document.createElement("button");
        b.className = "step-tab" + (i === curStep ? " active" : "") + (allDone && i !== curStep ? " done" : "");
        b.textContent = (i + 1) + ". " + s.icon + " " + s.title;
        b.addEventListener("click", (function(idx){ return function(){
            curStep = idx;
            renderStepTabs();
            renderCard();
            document.getElementById("summaryFinal").classList.remove("show");
        };})(i));
        c.appendChild(b);
    });
}

function renderCard() {
    var s = STEPS[curStep];
    var exs = EXERCISES[curStep];
    var k = "s" + curStep;
    if (scores[k] === undefined) scores[k] = 0;
    var h = "<div class=\"card\">" + s.html;
    h += "<div class=\"ex-section\"><h3>&#x270F;&#xFE0F; Exercises &mdash; " + s.title + "</h3>";
    exs.forEach(function(e, i) {
        var eid = k + "e" + i;
        var longOpts = e.o[0].length > 42 || e.o[1].length > 42;
        var gs = longOpts ? " style=\"grid-template-columns:1fr\"" : "";
        h += "<div class=\"exercise\" id=\"" + eid + "\">";
        h += "<div class=\"exercise-q\">" + (i+1) + ". " + e.q + "</div>";
        h += "<div class=\"opts\"" + gs + ">";
        h += "<button class=\"opt-btn\" id=\"" + eid + "ba\">a) " + e.o[0] + "</button>";
        h += "<button class=\"opt-btn\" id=\"" + eid + "bb\">b) " + e.o[1] + "</button>";
        h += "</div>";
        var ct = e.a === "a" ? e.o[0] : e.o[1];
        h += "<div class=\"fb fb-ok\" id=\"fbok-" + eid + "\">";
        h += "<div class=\"fb-header\"><span class=\"fb-icon\">&#x1F389;</span> Correct!</div>";
        h += "<div class=\"fb-body\">";
        h += "<div class=\"fb-row\"><span class=\"fb-dot\">&#x2705;</span><div class=\"fb-text\"><span class=\"fb-correct-answer\">" + ct + "</span> &mdash; " + e.fc + "</div></div>";
        h += "<div class=\"fb-row\"><span class=\"fb-dot\">&#x1F4A1;</span><div class=\"fb-text\">The other option: " + e.fi + "</div></div>";
        if (e.ex) h += "<div class=\"fb-example\">&#x1F4DD; " + e.ex + "</div>";
        if (e.tip) h += "<div class=\"fb-tip\"><strong>&#x1F4A1; Remember:</strong> " + e.tip + "</div>";
        h += "</div></div>";
        h += "<div class=\"fb fb-bad\" id=\"fbbad-" + eid + "\">";
        h += "<div class=\"fb-header\"><span class=\"fb-icon\">&#x1F615;</span> Not quite right</div>";
        h += "<div class=\"fb-body\">";
        h += "<div class=\"fb-row\"><span class=\"fb-dot\">&#x274C;</span><div class=\"fb-text\"><span class=\"fb-wrong-reason\">" + e.fi + "</span></div></div>";
        h += "<div class=\"fb-row\"><span class=\"fb-dot\">&#x2705;</span><div class=\"fb-text\">The correct answer is <span class=\"fb-correct-answer\">" + ct + "</span> &mdash; " + e.fc + "</div></div>";
        if (e.ex) h += "<div class=\"fb-example\">&#x1F4DD; " + e.ex + "</div>";
        if (e.tip) h += "<div class=\"fb-tip\"><strong>&#x1F4A1; Remember:</strong> " + e.tip + "</div>";
        h += "</div></div></div>";
    });
    h += "<div class=\"score-bar\"><div class=\"num\" id=\"sc-" + k + "\">0/5</div><div class=\"lbl\">Score</div></div>";
    h += "</div></div>";
    document.getElementById("cardArea").innerHTML = h;
    exs.forEach(function(e, i) {
        var eid = k + "e" + i;
        document.getElementById(eid + "ba").addEventListener("click", (function(id){ return function(){ chk(id,"a"); }; })(eid));
        document.getElementById(eid + "bb").addEventListener("click", (function(id){ return function(){ chk(id,"b"); }; })(eid));
    });
}

function chk(eid, sel) {
    if (answered[eid]) return;
    answered[eid] = true;
    var parts = eid.match(/s(\d+)e(\d+)/);
    var si = parseInt(parts[1]);
    var ei = parseInt(parts[2]);
    var e = EXERCISES[si][ei];
    var k = "s" + si;
    var ex = document.getElementById(eid);
    var btnA = document.getElementById(eid + "ba");
    var btnB = document.getElementById(eid + "bb");
    btnA.disabled = true;
    btnB.disabled = true;
    if (sel === e.a) {
        ex.classList.add("correct");
        (sel === "a" ? btnA : btnB).classList.add("sel-ok");
        document.getElementById("fbok-" + eid).classList.add("show");
        scores[k]++;
    } else {
        ex.classList.add("incorrect");
        (sel === "a" ? btnA : btnB).classList.add("sel-bad");
        (e.a === "a" ? btnA : btnB).classList.add("show-ok");
        document.getElementById("fbbad-" + eid).classList.add("show");
    }
    document.getElementById("sc-" + k).textContent = scores[k] + "/5";
    var allDone = [0,1,2,3,4].every(function(i){ return answered[k + "e" + i]; });
    if (allDone && curStep === 4) {
        setTimeout(function() {
            var sf = document.getElementById("summaryFinal");
            document.getElementById("summaryList").innerHTML = SUMMARY.map(function(s){ return "<li>" + s + "</li>"; }).join("");
            sf.classList.add("show");
            sf.scrollIntoView({behavior:"smooth"});
        }, 600);
    }
}

renderStepTabs();
renderCard();
</script>
